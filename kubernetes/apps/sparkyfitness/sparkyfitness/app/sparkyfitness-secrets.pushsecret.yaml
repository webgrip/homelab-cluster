---
# Migration phase 6 (seed): sparkyfitness-secrets (app config) -> OpenBao secret/sparkyfitness/app.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: sparkyfitness-secrets, namespace: sparkyfitness}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: sparkyfitness-secrets}}
  data:
    - match: {secretKey: JWT_SECRET, remoteRef: {remoteKey: sparkyfitness/app, property: JWT_SECRET}}
    - match: {secretKey: SPARKY_FITNESS_ADMIN_EMAIL, remoteRef: {remoteKey: sparkyfitness/app, property: SPARKY_FITNESS_ADMIN_EMAIL}}
    - match: {secretKey: SPARKY_FITNESS_API_ENCRYPTION_KEY, remoteRef: {remoteKey: sparkyfitness/app, property: SPARKY_FITNESS_API_ENCRYPTION_KEY}}
    - match: {secretKey: SPARKY_FITNESS_APP_DB_PASSWORD, remoteRef: {remoteKey: sparkyfitness/app, property: SPARKY_FITNESS_APP_DB_PASSWORD}}
    - match: {secretKey: SPARKY_FITNESS_APP_DB_USER, remoteRef: {remoteKey: sparkyfitness/app, property: SPARKY_FITNESS_APP_DB_USER}}
    - match: {secretKey: SPARKY_FITNESS_EMAIL_PASS, remoteRef: {remoteKey: sparkyfitness/app, property: SPARKY_FITNESS_EMAIL_PASS}}
    - match: {secretKey: SPARKY_FITNESS_EMAIL_USER, remoteRef: {remoteKey: sparkyfitness/app, property: SPARKY_FITNESS_EMAIL_USER}}
