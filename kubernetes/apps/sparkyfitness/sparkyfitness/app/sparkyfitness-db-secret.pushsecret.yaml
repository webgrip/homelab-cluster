---
# Migration phase 6 (seed): sparkyfitness-db-secret (CNPG managed role passwordSecret) -> OpenBao.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: sparkyfitness-db-secret, namespace: sparkyfitness}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: sparkyfitness-db-secret}}
  data:
    - match: {secretKey: username, remoteRef: {remoteKey: sparkyfitness/db, property: username}}
    - match: {secretKey: password, remoteRef: {remoteKey: sparkyfitness/db, property: password}}
