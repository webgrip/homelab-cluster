---
apiVersion: batch/v1
kind: Job
metadata:
  name: sparkyfitness-db-pgstatstatements-perms
  namespace: sparkyfitness
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: psql
          image: docker.io/library/postgres:18.4-alpine3.23@sha256:996d0920e4ff9df1fc19dacb904492f3c1ec0ec1cc338f0ad7123be7731c5f5e
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
          env:
            - name: HOME
              value: /tmp
            - name: PGHOST
              value: sparkyfitness-db-rw
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: sparkyfitness_db
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: sparkyfitness-db-superuser
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: sparkyfitness-db-superuser
                  key: password
          command:
            - /bin/sh
            - -ceu
          args:
            - |
              psql -v ON_ERROR_STOP=1 <<'SQL'
              CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
              DO $pgstat$
              DECLARE
                fn RECORD;
              BEGIN
                FOR fn IN
                  SELECT
                    n.nspname AS schema_name,
                    p.proname AS function_name,
                    pg_get_function_identity_arguments(p.oid) AS args
                  FROM pg_proc p
                  JOIN pg_namespace n ON n.oid = p.pronamespace
                  WHERE p.proname = 'pg_stat_statements_reset'
                LOOP
                  EXECUTE format(
                    'GRANT EXECUTE ON FUNCTION %I.%I(%s) TO %I WITH GRANT OPTION',
                    fn.schema_name,
                    fn.function_name,
                    fn.args,
                    'sparky'
                  );
                END LOOP;
              END;
              $pgstat$;
              SQL
      volumes:
        - {name: tmp, emptyDir: {}}
