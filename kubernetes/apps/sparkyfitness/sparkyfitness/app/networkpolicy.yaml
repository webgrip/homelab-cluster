---
# Zero-trust for sparkyfitness (W7). The namespace label generates default-deny
# (ingress+egress) + allow-dns. Flow: gateway -> frontend:80 -> server:3010 ->
# db:5432 (CNPG). The db archives WAL to Garage S3 and talks to the kube-apiserver.
# sparkyfitness is internal — no internet egress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sparkyfitness-allow-ingress
  labels:
    app.kubernetes.io/part-of: sparkyfitness
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # intra-namespace: frontend -> server -> db (all ports)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sparkyfitness
    # gateway (network ns) + LAN (gateway traffic can masquerade to a node IP) -> frontend
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
        - ipBlock:
            cidr: 127.0.0.0/8
        - ipBlock:
            cidr: fd00::/8
        - ipBlock:
            cidr: ::1/128
      ports:
        - protocol: TCP
          port: 80
    # Prometheus (observability ns) scraping pod/db metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
    # CNPG operator (cnpg-system) -> instance status (8000) + Postgres (5432).
    # Without this the operator can't extract instance status, so the Cluster
    # never reports Ready (CNPG-managed control-plane, not the app).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sparkyfitness-allow-egress
  labels:
    app.kubernetes.io/part-of: sparkyfitness
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # intra-namespace: server -> db, db replication
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sparkyfitness
    # LAN: Garage S3 (10.0.0.110:3900) for CNPG WAL/backups, nodes, API VIP.
    # CRITICAL: blocking this breaks WAL archiving -> the Garage-WAL SPOF outage.
    - to:
        - ipBlock:
            cidr: 10.0.0.0/24
            # NOTE: no ipBlock rule for the kube-apiserver — Cilium matches API-server
            # traffic by the reserved `kube-apiserver` identity, so a 10.43.0.1/32 CIDR
            # rule silently never matches (the 2026-07-17 forgejo-db outage trap). CNPG
            # pods get identity-based API egress from components/cnpg-netpol.
