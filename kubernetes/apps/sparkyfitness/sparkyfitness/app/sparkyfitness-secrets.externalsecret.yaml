---
# Migration phase 6 (swap): sparkyfitness-secrets (app config) <- OpenBao secret/sparkyfitness/app.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: sparkyfitness-secrets, namespace: sparkyfitness}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: sparkyfitness-secrets, creationPolicy: Owner}
  dataFrom:
    - extract: {key: sparkyfitness/app}
