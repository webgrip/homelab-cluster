---
# sparkyfitness-db-secret now sourced from OpenBao. Replaces SOPS. Value-preserving.
# CNPG managed-role passwordSecret → CNPG reconciles, but same value = no-op.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: sparkyfitness-db-secret, namespace: sparkyfitness}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: sparkyfitness-db-secret, creationPolicy: Owner}
  dataFrom:
    - extract: {key: sparkyfitness/db}
