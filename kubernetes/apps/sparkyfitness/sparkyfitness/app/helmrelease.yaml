---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sparkyfitness
spec:
  chartRef:
    kind: OCIRepository
    name: sparkyfitness
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
    controllers:
      frontend:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          nodeSelector:
            node.webgrip.io/pool: worker
          tolerations:
            - key: dedicated
              operator: Equal
              value: fringe
              effect: NoSchedule
        containers:
          app:
            image:
              repository: docker.io/codewithcj/sparkyfitness
              tag: v0.16.6.3@sha256:554feb804a1c1a2fe2f1b0a5870ad9b43864a4c34a1be4b74d66797147659187
            ports:
              - name: http
                containerPort: 80
            envFrom:
              - configMapRef:
                  name: sparkyfitness-frontend-config
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                add:
                  - CHOWN
                  - NET_BIND_SERVICE
                  - SETGID
                  - SETUID
                drop:
                  - "ALL"
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /
                port: 80
              readiness:
                enabled: true
                type: HTTP
                path: /
                port: 80
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
      server:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          # Hard-pin to the worker pool (ADR-0028): runs only on workers, Pending
          # if both workers are down. (frontend stays pinned to fringe above; it
          # moves to the worker pool when the fringe scheme is retired.)
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node.webgrip.io/pool
                        operator: In
                        values:
                          - worker
        containers:
          app:
            image:
              repository: docker.io/codewithcj/sparkyfitness_server
              tag: v0.16.6.3@sha256:b6a1395f02f793d61a7631b840153719a8d07e53fad32655126266b3769c4a97
            ports:
              - name: http
                containerPort: 3010
            envFrom:
              - configMapRef:
                  name: sparkyfitness-server-config
              - secretRef:
                  name: sparkyfitness-secrets
            env:
              - name: SPARKY_FITNESS_DB_USER
                valueFrom:
                  secretKeyRef:
                    name: sparkyfitness-db-secret
                    key: username
              - name: SPARKY_FITNESS_DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: sparkyfitness-db-secret
                    key: password
              - name: BETTER_AUTH_SECRET
                valueFrom:
                  secretKeyRef:
                    name: sparkyfitness-secrets
                    key: JWT_SECRET
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - "ALL"
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /api/health
                port: 3010
              readiness:
                enabled: true
                type: HTTP
                path: /api/health
                port: 3010
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    persistence:
      backup:
        existingClaim: sparkyfitness-backup
        advancedMounts:
          server:
            app:
              - path: /backup
                readOnly: false
      uploads:
        existingClaim: sparkyfitness-uploads
        advancedMounts:
          server:
            app:
              - path: /uploads
                readOnly: false
    service:
      frontend:
        controller: frontend
        ports:
          http:
            port: 80
      server:
        controller: server
        ports:
          http:
            port: 3010
    route:
      app:
        annotations:
          monitoring.webgrip.io/synthetic-check: k6-ingress-canary
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: frontend
                port: 80
