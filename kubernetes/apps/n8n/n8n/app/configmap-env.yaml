# Active n8n environment variables used by the HelmRelease.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-env
data:
  DB_POSTGRESDB_DATABASE: "n8n"
  DB_POSTGRESDB_HOST: "n8n-db-rw.n8n.svc.cluster.local"
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_SCHEMA: "public"
  DB_POSTGRESDB_USER: "n8n"
  DB_TYPE: "postgresdb"
  N8N_HOST: "n8n.${SECRET_DOMAIN}"
  N8N_PORT: "5678"
  N8N_PROTOCOL: "https"
  N8N_EDITOR_BASE_URL: "https://n8n.${SECRET_DOMAIN}"
  WEBHOOK_URL: "https://n8n.${SECRET_DOMAIN}/"
  N8N_PROXY_HOPS: "1"
  N8N_SECURE_COOKIE: "true"
  # NOTE: no OIDC/SSO here. n8n's OIDC SSO (N8N_SSO_OIDC_*) is a paid Enterprise
  # feature gated behind N8N_LICENSE_ACTIVATION_KEY — not available on this
  # unlicensed community deployment. A prior attempt set non-existent
  # N8N_USER_MANAGEMENT_AUTHENTICATION_* vars (silently ignored). Removed
  # 2026-06-30; revisit only with a license or an external auth proxy.
