---
# n8n-db-secret now sourced from OpenBao. Replaces SOPS. Value-preserving (CNPG bootstrap secret).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: n8n-db-secret, namespace: n8n}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: n8n-db-secret, creationPolicy: Owner}
  dataFrom:
    - extract: {key: n8n/db}
