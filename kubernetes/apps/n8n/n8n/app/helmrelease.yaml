---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
spec:
  chartRef:
    kind: OCIRepository
    name: n8n
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: uninstall
  values:
    controllers:
      n8n:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        pod:
          # Pin to the worker pool off the soyos (ADR-0002) via native nodeSelector
          # + strategy:Recreate above — NOT the postRenderer component, which
          # deadlocks helm-controller on this RWO move. Lands on fringe (WFFC-era
          # volume predates worker-1).
          nodeSelector:
            node.webgrip.io/pool: worker
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: n8nio/n8n
              tag: 2.23.0@sha256:8978cc98ec5ba609bdbf250d27ea672ac893ad55f4a61a026d808867381ff9fd
            envFrom:
              - configMapRef:
                  name: n8n-env
              - secretRef:
                  name: n8n-secrets
            ports:
              - name: http
                containerPort: 5678
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 384Mi
              limits:
                memory: 768Mi
    service:
      app:
        ports:
          http:
            port: 80
            targetPort: http
    persistence:
      data:
        existingClaim: n8n
        advancedMounts:
          n8n:
            app:
              - path: /home/node/.n8n
                readOnly: false
