---
# Adopt: ExternalSecret takes over the previously-unmanaged n8n-oidc-secrets from OpenBao.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-oidc-secrets
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: n8n-oidc-secrets, creationPolicy: Owner}
  data:
    - {secretKey: N8N_USER_MANAGEMENT_AUTHENTICATION_OIDC_CLIENT_ID, remoteRef: {key: n8n/oidc, property: N8N_USER_MANAGEMENT_AUTHENTICATION_OIDC_CLIENT_ID}}
    - {secretKey: N8N_USER_MANAGEMENT_AUTHENTICATION_OIDC_CLIENT_SECRET, remoteRef: {key: n8n/oidc, property: N8N_USER_MANAGEMENT_AUTHENTICATION_OIDC_CLIENT_SECRET}}
