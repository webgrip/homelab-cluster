---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./configmap-env.yaml
  - ./configmap-env-all.yaml
  - ./ocirepository.yaml
  - ./pvc.yaml
  - ./httproute.yaml
  - ./helmrelease.yaml
  - ./networkpolicy.yaml
  - ./n8n-secrets.externalsecret.yaml
  - ./n8n-secrets.pushsecret.yaml
  - ./n8n-db-secret.externalsecret.yaml
  - ./n8n-db-secret.pushsecret.yaml
components:
  # Identity-based egress to the `network` ns so n8n's server-side workflow HTTP
  # calls can hairpin to in-cluster gateway-fronted hosts via the envoy-internal
  # VIP under default-deny (e.g. the DevEx ETL pulls from forgejo/prometheus).
  # Cilium enforces on the post-DNAT backend identity, so a CIDR/port rule won't
  # work (ADR-0021). Originally added for OIDC discovery to authentik; OIDC was
  # removed 2026-06-30 (paid n8n feature) but this allow stays for the ETL calls.
  - ../../../../components/gateway-egress
  # NOTE: worker-pool pin removed 2026-06-19 — n8n's Longhorn PV node-affinity
  # excludes worker-1 (volume predates that node) and fringe is still tainted, so
  # the hard pin left it unschedulable. Re-add AFTER Phase E moves a replica onto
  # worker-1 (which opens the PV affinity) or after the fringe taint is retired.
  # - ../../../../components/placement/worker-pool
