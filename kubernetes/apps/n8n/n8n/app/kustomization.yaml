---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./configmap-env.yaml
  - ./configmap-env-all.yaml
  - ./ocirepository.yaml
  - ./pvc.yaml
  - ./httproute.yaml
  - ./helmrelease.yaml
  - ./networkpolicy.yaml
  - ./n8n-secrets.externalsecret.yaml
  - ./n8n-secrets.pushsecret.yaml
  - ./n8n-db-secret.externalsecret.yaml
  - ./n8n-db-secret.pushsecret.yaml
  - ./n8n-oidc-secrets.pushsecret.yaml
  - ./n8n-oidc-secrets.externalsecret.yaml
components:
  # server-side OIDC discovery to authentik hairpins through envoy-internal;
  # default-deny requires an identity-based egress allow to ns network (ADR-0021)
  - ../../../../components/gateway-egress
  # NOTE: worker-pool pin removed 2026-06-19 — n8n's Longhorn PV node-affinity
  # excludes worker-1 (volume predates that node) and fringe is still tainted, so
  # the hard pin left it unschedulable. Re-add AFTER Phase E moves a replica onto
  # worker-1 (which opens the PV affinity) or after the fringe taint is retired.
  # - ../../../../components/placement/worker-pool
