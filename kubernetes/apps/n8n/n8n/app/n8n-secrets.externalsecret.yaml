---
# n8n-secrets now sourced from OpenBao (all keys via dataFrom.extract). Replaces SOPS.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: n8n-secrets, namespace: n8n}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: n8n-secrets, creationPolicy: Owner}
  dataFrom:
    - extract: {key: n8n/app}
