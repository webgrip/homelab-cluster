---
# Migration phase 6 (seed): n8n-db-secret (CNPG bootstrap.initdb) -> OpenBao secret/n8n/db.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: n8n-db-secret, namespace: n8n}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: n8n-db-secret}}
  data:
    - match: {secretKey: username, remoteRef: {remoteKey: n8n/db, property: username}}
    - match: {secretKey: password, remoteRef: {remoteKey: n8n/db, property: password}}
