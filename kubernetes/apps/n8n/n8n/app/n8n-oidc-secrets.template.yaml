---
# Plaintext template for n8n OIDC secrets.
#
# SOPS policy: do NOT commit this file with real values.
#
# How to use:
# 1) After the Authentik blueprint creates the n8n OIDC provider,
#    get the client ID and secret from: Authentik Admin → Applications → n8n → Provider
# 2) Fill in the values below
# 3) Encrypt with SOPS into: n8n-oidc-secrets.sops.yaml
# 4) Add the encrypted file to: kubernetes/apps/n8n/n8n/app/kustomization.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: n8n-oidc-secrets
  namespace: n8n
type: Opaque
stringData:
  N8N_USER_MANAGEMENT_AUTHENTICATION_OIDC_CLIENT_ID: "<from-authentik>"
  N8N_USER_MANAGEMENT_AUTHENTICATION_OIDC_CLIENT_SECRET: "<from-authentik>"
