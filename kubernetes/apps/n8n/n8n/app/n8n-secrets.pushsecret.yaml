---
# Migration phase 5 (seed): n8n-secrets (at-rest N8N_ENCRYPTION_KEY) -> OpenBao.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: n8n-secrets, namespace: n8n}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: n8n-secrets}}
  data:
    - match: {secretKey: DB_POSTGRESDB_PASSWORD, remoteRef: {remoteKey: n8n/app, property: DB_POSTGRESDB_PASSWORD}}
    - match: {secretKey: N8N_ENCRYPTION_KEY, remoteRef: {remoteKey: n8n/app, property: N8N_ENCRYPTION_KEY}}
