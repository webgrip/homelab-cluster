---
# Adopt: n8n-oidc-secrets is live but was unmanaged (sops unwired). Seed into OpenBao.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: n8n-oidc-secrets
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: n8n-oidc-secrets}}
  data:
    - match: {secretKey: N8N_USER_MANAGEMENT_AUTHENTICATION_OIDC_CLIENT_ID, remoteRef: {remoteKey: n8n/oidc, property: N8N_USER_MANAGEMENT_AUTHENTICATION_OIDC_CLIENT_ID}}
    - match: {secretKey: N8N_USER_MANAGEMENT_AUTHENTICATION_OIDC_CLIENT_SECRET, remoteRef: {remoteKey: n8n/oidc, property: N8N_USER_MANAGEMENT_AUTHENTICATION_OIDC_CLIENT_SECRET}}
