---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: cluster-user-auth
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: cluster-user-auth}}
  data:
    - match: {secretKey: username, remoteRef: {remoteKey: flux/weave-gitops, property: username}}
    - match: {secretKey: password, remoteRef: {remoteKey: flux/weave-gitops, property: password}}
