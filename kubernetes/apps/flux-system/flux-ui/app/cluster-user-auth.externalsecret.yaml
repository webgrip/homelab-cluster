---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cluster-user-auth
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: cluster-user-auth, creationPolicy: Owner}
  data:
    - {secretKey: username, remoteRef: {key: flux/weave-gitops, property: username}}
    - {secretKey: password, remoteRef: {key: flux/weave-gitops, property: password}}
