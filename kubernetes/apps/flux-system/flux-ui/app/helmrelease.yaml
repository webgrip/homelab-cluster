---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: weave-gitops
spec:
  chartRef:
    kind: OCIRepository
    name: weave-gitops
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    adminUser:
      create: true
      createSecret: false
      username: ${GITOPS_UI_ADMIN_USERNAME:=wego-admin}
    rbac:
      impersonationResourceNames:
        - ${GITOPS_UI_ADMIN_USERNAME:=wego-admin}
    envVars:
      - name: WEAVE_GITOPS_FEATURE_TENANCY
        value: "true"
      - name: WEAVE_GITOPS_FEATURE_CLUSTER
        value: "false"
      - name: WEAVE_GITOPS_FEATURE_GITOPS_RUNTIME
        value: "false"
    service:
      annotations: {}
      type: ClusterIP
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
    nodeSelector:
      node.webgrip.io/pool: worker
    tolerations:
      - key: dedicated
        operator: Equal
        value: fringe
        effect: NoSchedule
