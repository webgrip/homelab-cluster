---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
spec:
  chartRef:
    kind: OCIRepository
    name: flux-operator
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    priorityClassName: system-cluster-critical
    apiPriority:
      enabled: true
      level: workload-high
      extraServiceAccounts:
        - name: kustomize-controller
          namespace: flux-system
        - name: helm-controller
          namespace: flux-system
        - name: source-controller
          namespace: flux-system
        - name: notification-controller
          namespace: flux-system
    serviceMonitor:
      create: true
