---
# Migration phase 1 (seed): grafana-annotations-token -> OpenBao secret/flux/grafana-annotations.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: grafana-annotations-token
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: grafana-annotations-token
  data:
    - match: {secretKey: token, remoteRef: {remoteKey: flux/grafana-annotations, property: token}}
