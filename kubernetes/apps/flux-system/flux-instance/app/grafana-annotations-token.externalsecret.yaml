---
# grafana-annotations-token now sourced from OpenBao. Replaces grafana-annotations-token.sops.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-annotations-token
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: grafana-annotations-token, creationPolicy: Owner}
  data:
    - secretKey: token
      remoteRef: {key: flux/grafana-annotations, property: token}
