---
# Migration phase 1 (seed): github-webhook-token-secret -> OpenBao secret/flux/github-webhook.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: github-webhook-token-secret
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: github-webhook-token-secret
  data:
    - match: {secretKey: token, remoteRef: {remoteKey: flux/github-webhook, property: token}}
