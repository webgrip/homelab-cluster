---
# github-webhook-token-secret now sourced from OpenBao. Replaces secret.sops.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-webhook-token-secret
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: github-webhook-token-secret, creationPolicy: Owner}
  data:
    - secretKey: token
      remoteRef: {key: flux/github-webhook, property: token}
