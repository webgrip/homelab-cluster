---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./ocirepository.yaml
  - ./pvc.yaml
  - ./httproute.yaml
  - ./helmrelease.yaml
  - ./networkpolicy.yaml
  - ./freshrss-secrets.externalsecret.yaml
  - ./freshrss-secrets.pushsecret.yaml
  - ./freshrss-db-secret.externalsecret.yaml
  - ./freshrss-db-secret.pushsecret.yaml
  # Dynamic Postgres credentials (ADR-0010): vault_admin password for the CNPG managed role.
  - ./freshrss-vault-admin.externalsecret.yaml
  # Zero-downtime dynamic-cred pooler (ADR-0010): stable app<->pooler cred, the rotating backend
  # cred (minted from the database engine), and the PgBouncer sidecar config.
  - ./freshrss-pooler-app-cred.externalsecret.yaml
  - ./freshrss-pgbouncer-backend.externalsecret.yaml
  - ./pgbouncer-config.configmap.yaml
  # TEMPORARY: validates the pooler pod spec out-of-band before the freshrss cutover. Remove after.
  - ./pgbouncer-test.deployment.yaml
  - ./database
