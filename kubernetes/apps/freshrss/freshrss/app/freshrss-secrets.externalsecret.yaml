---
# Migration phase 6 (swap): freshrss-secrets (app config) <- OpenBao secret/freshrss/app.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: freshrss-secrets, namespace: freshrss}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: freshrss-secrets, creationPolicy: Owner}
  dataFrom:
    - extract: {key: freshrss/app}
