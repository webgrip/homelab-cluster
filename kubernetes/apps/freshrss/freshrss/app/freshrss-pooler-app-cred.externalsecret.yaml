---
# Stable app<->pooler identity, generated once (Retain). freshrss authenticates to the local
# PgBouncer with this `freshrss` password, which NEVER rotates -> the app pod never restarts on
# a DB-credential rotation. Only PgBouncer's BACKEND credential to Postgres rotates (see
# freshrss-pgbouncer-backend). Keys:
#   password     -> freshrss env POSTGRES_PASSWORD (app -> pooler, loopback)
#   userlist.txt -> PgBouncer auth_file (SCRAM computed on the fly from the plaintext)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: freshrss-pooler-app-cred, namespace: freshrss}
spec:
  refreshInterval: "0" # generate once, never rotate (stable app<->pooler identity)
  target:
    name: freshrss-pooler-app-cred
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        password: "{{ .password }}"
        userlist.txt: |
          "freshrss" "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
