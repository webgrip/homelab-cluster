---
# Migration phase 6 (seed): freshrss-secrets (app config) -> OpenBao secret/freshrss/app.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: freshrss-secrets, namespace: freshrss}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: freshrss-secrets}}
  data:
    - match: {secretKey: FRESHRSS_ADMIN_EMAIL, remoteRef: {remoteKey: freshrss/app, property: FRESHRSS_ADMIN_EMAIL}}
    - match: {secretKey: FRESHRSS_ADMIN_PASSWORD, remoteRef: {remoteKey: freshrss/app, property: FRESHRSS_ADMIN_PASSWORD}}
    - match: {secretKey: FRESHRSS_BASE_URL, remoteRef: {remoteKey: freshrss/app, property: FRESHRSS_BASE_URL}}
    - match: {secretKey: FRESHRSS_DEFAULT_USER, remoteRef: {remoteKey: freshrss/app, property: FRESHRSS_DEFAULT_USER}}
    - match: {secretKey: FRESHRSS_EXTENSIONS_ARCHIVE_URL, remoteRef: {remoteKey: freshrss/app, property: FRESHRSS_EXTENSIONS_ARCHIVE_URL}}
    - match: {secretKey: FRESHRSS_EXTENSIONS_VERSION, remoteRef: {remoteKey: freshrss/app, property: FRESHRSS_EXTENSIONS_VERSION}}
    - match: {secretKey: POSTGRES_DB, remoteRef: {remoteKey: freshrss/app, property: POSTGRES_DB}}
    - match: {secretKey: POSTGRES_HOST, remoteRef: {remoteKey: freshrss/app, property: POSTGRES_HOST}}
    - match: {secretKey: POSTGRES_PASSWORD, remoteRef: {remoteKey: freshrss/app, property: POSTGRES_PASSWORD}}
    - match: {secretKey: POSTGRES_SUPERUSER_PASSWORD, remoteRef: {remoteKey: freshrss/app, property: POSTGRES_SUPERUSER_PASSWORD}}
    - match: {secretKey: POSTGRES_USER, remoteRef: {remoteKey: freshrss/app, property: POSTGRES_USER}}
