---
# Zero-trust for freshrss (W7). default-deny + allow-dns generated. freshrss is
# CNPG-backed AND needs broad internet egress (it fetches arbitrary RSS/Atom
# feeds), so egress opens the internet while still blocking cross-namespace pod
# and service lateral movement.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: freshrss-allow-ingress
  labels:
    app.kubernetes.io/part-of: freshrss
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: freshrss
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
        - ipBlock:
            cidr: 127.0.0.0/8
        - ipBlock:
            cidr: fd00::/8
        - ipBlock:
            cidr: ::1/128
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
    # CNPG operator (cnpg-system) -> instance status (8000) + Postgres (5432).
    # Without this the operator can't extract instance status, so the Cluster
    # never reports Ready (CNPG-managed control-plane, not the app).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: freshrss-allow-egress
  labels:
    app.kubernetes.io/part-of: freshrss
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # intra-namespace: freshrss -> db
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: freshrss
    # Internet + LAN (RSS feeds + Garage S3 for CNPG WAL), but NOT cross-namespace
    # cluster pods/services — blocks lateral movement while allowing outbound.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.42.0.0/16
              - 10.43.0.0/16
    # kube-apiserver ClusterIP (CNPG instance manager); carved back in since the
    # internet rule excepts the service CIDR.
    - to:
        - ipBlock:
            cidr: 10.43.0.1/32
      ports:
        - protocol: TCP
          port: 443
