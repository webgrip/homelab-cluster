---
# The ROTATING backend credential (PgBouncer -> Postgres). ESO mints a fresh dynamic lease from
# OpenBao's database engine every refresh and renders it into a PgBouncer %include file. Each
# mint has a DIFFERENT username (v-freshrss-<random>), so a PgBouncer RELOAD reliably flags the
# server connections `close_needed` and cycles them onto the new cred.
#
# The reloader.stakater.com/ignore annotation is CRITICAL: without it Reloader would restart the
# whole freshrss pod on every rotation, defeating zero-downtime. Instead the pgbouncer-reload
# sidecar issues RELOAD/RECONNECT so PgBouncer swaps server connections without dropping clients.
# refreshInterval (15m) << the role's default_ttl (1h) so the old lease stays valid during the
# swap (ESO re-reads = new lease; the old one lives out its TTL and is then auto-revoked).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: freshrss-pgbouncer-backend
  namespace: freshrss
spec:
  refreshInterval: 15m
  secretStoreRef: {kind: ClusterSecretStore, name: openbao-db}
  target:
    name: freshrss-pgbouncer-backend
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        annotations:
          reloader.stakater.com/ignore: "true"
      data:
        databases.ini: |
          [databases]
          freshrss = host=freshrss-db-rw.freshrss.svc.cluster.local port=5432 dbname=freshrss user={{ .username }} password={{ .password }}
  data:
    - secretKey: username
      remoteRef: {key: creds/freshrss, property: username}
    - secretKey: password
      remoteRef: {key: creds/freshrss, property: password}
