---
# vault_admin password for the freshrss-db CNPG managed role — the SAME value OpenBao uses to
# connect (generated + pushed to OpenBao KV from the security ns, read back here). CNPG owns
# this password ongoing; OpenBao never rotates it (ADR-0010, no rotate-root). Basic-auth shape
# (username + password) consumed by managed.roles.passwordSecret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: freshrss-vault-admin, namespace: freshrss}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: freshrss-vault-admin, creationPolicy: Owner}
  dataFrom:
    - extract: {key: db-admin/freshrss}
