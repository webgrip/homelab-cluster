---
# Migration phase 6 (seed): freshrss-db-secret (CNPG bootstrap.initdb) -> OpenBao secret/freshrss/db.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: freshrss-db-secret, namespace: freshrss}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: freshrss-db-secret}}
  data:
    - match: {secretKey: username, remoteRef: {remoteKey: freshrss/db, property: username}}
    - match: {secretKey: password, remoteRef: {remoteKey: freshrss/db, property: password}}
