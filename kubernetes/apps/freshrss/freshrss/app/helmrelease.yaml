---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: freshrss
spec:
  chartRef:
    kind: OCIRepository
    name: freshrss
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    controllers:
      freshrss:
        annotations:
          # Zero-downtime dynamic-cred rotation (ADR-0016): the rotating freshrss-pgbouncer-backend
          # Secret must NOT restart the pod (the pgbouncer-reload sidecar reloads PgBouncer via
          # SIGHUP), so we do NOT use reloader auto. Only the static app config restarts the pod.
          secret.reloader.stakater.com/reload: "freshrss-secrets"
          configmap.reloader.stakater.com/reload: "freshrss-pgbouncer-config"
        # RWO longhorn-general volume → Recreate avoids the Multi-Attach deadlock
        # when the pod relocates; pin to the worker pool off the soyos (ADR-0002).
        # Lands on fringe — the WFFC-era volume predates worker-1 (use native
        # nodeSelector, not the postRenderer component, which deadlocks on RWO moves).
        strategy: Recreate
        pod:
          hostUsers: false
          # Shared PID namespace lets the pgbouncer-reload sidecar SIGHUP the pgbouncer process
          # (pod-internal only, NOT hostPID → passes pod-security-baseline-enforce).
          shareProcessNamespace: true
          # fsGroup 70 so the NON-root pgbouncer (uid 70) can write the /var/run/pgbouncer
          # emptyDir (socket + pidfile). OnRootMismatch avoids re-chowning the data PVC each mount
          # (owner is unchanged; only the group is set, so freshrss's own access is unaffected).
          securityContext:
            fsGroup: 70
            fsGroupChangePolicy: OnRootMismatch
          nodeSelector:
            node.webgrip.io/pool: worker
        containers:
          app:
            image:
              repository: freshrss/freshrss
              tag: 1.29.1-alpine@sha256:e1c956e586ae20ba7f9a0c6582043172ee084af43f17ff48b8de22ade026b6c4
            envFrom:
              - secretRef:
                  name: freshrss-secrets
            env:
              CRON_MIN: "*"
              DOMAIN: freshrss.${SECRET_DOMAIN}
              LISTEN: &port 8080
              # Connect to the local PgBouncer sidecar (loopback), NOT the DB directly, so the
              # backend credential rotates with zero downtime. POSTGRES_USER/PASSWORD are the
              # STABLE app->pooler identity (override the values from the freshrss-secrets envFrom).
              POSTGRES_HOST: "127.0.0.1"
              POSTGRES_USER: "freshrss"
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: freshrss-pooler-app-cred
                    key: password
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M
          # PgBouncer pooler: app talks to it on loopback with a STABLE cred; only its BACKEND
          # cred to Postgres rotates -> zero-downtime rotation, no app restart.
          pgbouncer:
            image:
              repository: docker.io/edoburu/pgbouncer
              tag: v1.25.2-p0@sha256:7d7a27d9e90985cab5cf42256f5c13a3120baa4b055b69df37beb272b89b2340
            command:
              - "pgbouncer"
              - "/etc/pgbouncer/pgbouncer.ini"
            securityContext:
              # pgbouncer refuses to run as root; run as its own uid 70. The pod fsGroup 70 lets
              # it write the /var/run/pgbouncer emptyDir. readOnlyRootFilesystem + drop all caps.
              runAsNonRoot: true
              runAsUser: 70
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            probes:
              # pgbouncer binds ONLY 127.0.0.1:5432 (loopback -- app talks to it locally with a
              # stable cred, see the comment above). Kubernetes' tcpSocket probe connects to the
              # POD IP from the kubelet, not the pod's own loopback, so it can NEVER reach a
              # loopback-only listener -- confirmed live: it 3x-failed and SIGTERM'd this
              # container in a restart loop. An exec probe runs inside the pod's network
              # namespace instead, where 127.0.0.1 correctly resolves to the shared pod loopback.
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "nc"
                      - "-z"
                      - "127.0.0.1"
                      - "5432"
                  initialDelaySeconds: 5
                  periodSeconds: 15
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "nc"
                      - "-z"
                      - "127.0.0.1"
                      - "5432"
                  initialDelaySeconds: 5
                  periodSeconds: 15
            resources:
              requests:
                cpu: 10m
                memory: 24Mi
              limits:
                memory: 64Mi
          # Watches the rotating backend cred file; SIGHUPs pgbouncer to reload it without
          # dropping client connections (needs the shared PID namespace above).
          pgbouncer-reload:
            image:
              repository: docker.io/edoburu/pgbouncer
              tag: v1.25.2-p0@sha256:7d7a27d9e90985cab5cf42256f5c13a3120baa4b055b69df37beb272b89b2340
            command:
              - /bin/sh
              - -c
              # Shell vars escaped as $$ so Flux envsubst (postBuild.substituteFrom on this ks)
              # doesn't blank them — validated by the pgbouncer-test harness. Unescaped $cur/$BACKEND
              # would render to empty and the reloader would silently never fire.
              - |
                set -eu
                last=""
                while true; do
                  cur="$$(sha256sum /etc/pgbouncer/backend/databases.ini 2>/dev/null | cut -d' ' -f1 || true)"
                  if [ -n "$$cur" ] && [ "$$cur" != "$$last" ] && [ -f /var/run/pgbouncer/pgbouncer.pid ]; then
                    if kill -HUP "$$(cat /var/run/pgbouncer/pgbouncer.pid)" 2>/dev/null; then
                      echo "SIGHUP -> pgbouncer reloaded onto rotated backend cred"
                      last="$$cur"
                    fi
                  fi
                  # Heartbeat for the liveness/readiness probe below -- this is a foreground
                  # watch loop with no listening port, so a fresh-mtime file is the probe signal.
                  touch /var/run/pgbouncer/reload-heartbeat
                  sleep 10
                done
            securityContext:
              runAsNonRoot: true
              runAsUser: 70
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    # Heartbeat touched every 10s; failing to refresh within a minute means the
                    # loop is hung or dead. `find`'s own exit code ignores match results (it's
                    # 0 as long as the path exists, even on a stale mtime) -- wrap in `[ -n ... ]`
                    # to turn "did it print a match" into the exit code the probe actually needs.
                    command:
                      - "sh"
                      - "-c"
                      - "[ -n \"$(find /var/run/pgbouncer/reload-heartbeat -mmin -1)\" ]"
                  initialDelaySeconds: 15
                  periodSeconds: 20
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - "sh"
                      - "-c"
                      - "[ -n \"$(find /var/run/pgbouncer/reload-heartbeat -mmin -1)\" ]"
                  initialDelaySeconds: 15
                  periodSeconds: 20
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                memory: 32Mi
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      data:
        existingClaim: freshrss
        advancedMounts:
          freshrss:
            app:
              - path: /var/www/FreshRSS/data
                subPath: data
                readOnly: false
              - path: /var/www/FreshRSS/extensions
                subPath: extensions
                readOnly: false
      # PgBouncer static config (subPath OK — never changes).
      pgbouncer-config:
        type: configMap
        name: freshrss-pgbouncer-config
        advancedMounts:
          freshrss:
            pgbouncer:
              - path: /etc/pgbouncer/pgbouncer.ini
                subPath: pgbouncer.ini
                readOnly: true
      pgbouncer-userlist:
        type: secret
        name: freshrss-pooler-app-cred
        advancedMounts:
          freshrss:
            pgbouncer:
              - path: /etc/pgbouncer/userlist.txt
                subPath: userlist.txt
                readOnly: true
      # The ROTATING backend cred — WHOLE-DIR mount (NOT subPath) so kubelet updates it in place
      # on rotation; subPath mounts are frozen at pod start and would never see the new cred.
      pgbouncer-backend:
        type: secret
        name: freshrss-pgbouncer-backend
        advancedMounts:
          freshrss:
            pgbouncer:
              - path: /etc/pgbouncer/backend
                readOnly: true
            pgbouncer-reload:
              - path: /etc/pgbouncer/backend
                readOnly: true
      # Writable runtime dir for the pgbouncer socket + pidfile (shared so the reloader reads the pid).
      pgbouncer-run:
        type: emptyDir
        advancedMounts:
          freshrss:
            pgbouncer:
              - path: /var/run/pgbouncer
            pgbouncer-reload:
              - path: /var/run/pgbouncer
