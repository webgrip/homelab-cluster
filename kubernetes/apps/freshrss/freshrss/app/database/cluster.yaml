---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: freshrss-db
  namespace: freshrss
spec:
  instances: 1
  inheritedMetadata:
    annotations:
      reloader.stakater.com/auto: "true"
  storage:
    size: 10Gi
    storageClass: longhorn
  walStorage:
    size: 5Gi
    storageClass: longhorn
  postgresql:
    parameters:
      # Backup-tier policy: compress WAL full-page images to shrink the S3 archive
      # and local WAL. See docs/techdocs/docs/database-backup-tiers.md
      wal_compression: "zstd"
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: freshrss-db-store
        serverName: freshrss-db
  bootstrap:
    initdb:
      database: freshrss
      owner: freshrss
      secret:
        name: freshrss-db-secret
