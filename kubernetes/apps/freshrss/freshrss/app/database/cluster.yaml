---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: freshrss-db
  namespace: freshrss
spec:
  instances: 1
  # Burstable, not BestEffort: the Talos PSI OOM controller kills the largest
  # BestEffort cgroups first — every CNPG DB was SIGKILLed at once on
  # fringe-workstation (2026-07-11 01:27). Limits ~3x observed peak; no CPU
  # limit (avoid throttling checkpoints/vacuum).
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      memory: 768Mi
  # Pin the DB off the soyo control-planes onto the worker pool (ADR-0002).
  affinity:
    nodeSelector:
      node.webgrip.io/pool: worker
  inheritedMetadata:
    annotations:
      reloader.stakater.com/auto: "true"
  storage:
    size: 10Gi
    storageClass: longhorn
  walStorage:
    size: 5Gi
    storageClass: longhorn
  postgresql:
    parameters:
      # Backup-tier policy: compress WAL full-page images to shrink the S3 archive
      # and local WAL. See docs/techdocs/docs/database-backup-tiers.md
      wal_compression: "zstd"
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: freshrss-db-store
        serverName: freshrss-db
  managed:
    roles:
      # OpenBao database-engine connection role (ADR-0016). CREATEROLE lets it mint/drop the
      # ephemeral v-freshrss-* login roles; explicitly NOT superuser / NOT bypassrls.
      # inRoles: [freshrss] gives membership in the app owner role so it can GRANT it onward to
      # ephemeral roles. NB PG16+: GRANT of a role needs ADMIN OPTION — verify `admin_option=t`
      # for vault_admin on freshrss after reconcile; if CNPG's inRoles didn't set it, apply the
      # one-time `GRANT freshrss TO vault_admin WITH ADMIN OPTION` (runbook). Password is the
      # shared generate-once freshrss-vault-admin (same value OpenBao connects with).
      - name: vault_admin
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: true
        bypassrls: false
        inRoles:
          - freshrss
        passwordSecret:
          name: freshrss-vault-admin
  bootstrap:
    initdb:
      database: freshrss
      owner: freshrss
      secret:
        name: freshrss-db-secret
