---
# freshrss-db-secret now sourced from OpenBao. Replaces SOPS. Value-preserving (CNPG bootstrap secret).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: freshrss-db-secret, namespace: freshrss}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: freshrss-db-secret, creationPolicy: Owner}
  dataFrom:
    - extract: {key: freshrss/db}
