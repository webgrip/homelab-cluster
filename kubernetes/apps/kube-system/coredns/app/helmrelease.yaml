---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns
spec:
  chartRef:
    kind: OCIRepository
    name: coredns
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    fullnameOverride: coredns
    image:
      repository: mirror.gcr.io/coredns/coredns
    k8sAppLabelOverride: kube-dns
    serviceAccount:
      create: true
    service:
      name: kube-dns
      clusterIP: "10.43.0.10"
    replicaCount: 2
    # Cluster DNS is critical-path: protect it from OOM eviction order
    # (built-in class, always present so no admission-ordering risk).
    priorityClassName: system-cluster-critical
    servers:
      # Split-DNS stub zone: resolve <app>.${SECRET_DOMAIN} via internal k8s-gateway.
      # Must appear exactly once — a second block for the same zone:port (e.g. a
      # hardcoded literal duplicate) is a fatal Corefile error and crash-loops CoreDNS.
      - zones:
          - zone: ${SECRET_DOMAIN}
            scheme: dns://
            use_tcp: true
        port: 53
        plugins:
          - name: errors
          - name: forward
            parameters: . 10.0.0.26
          - name: cache
            configBlock: |-
              prefetch 20
              serve_stale
          - name: log
            configBlock: |-
              class error
      - zones:
          - zone: .
            scheme: dns://
            use_tcp: true
        port: 53
        plugins:
          - name: errors
          - name: health
            configBlock: |-
              lameduck 5s
          - name: ready
          - name: kubernetes
            parameters: cluster.local in-addr.arpa ip6.arpa
            configBlock: |-
              pods verified
              fallthrough in-addr.arpa ip6.arpa
          # NO autopath here. It answers pods' search-expanded queries (ndots:5 makes
          # `forgejo.${SECRET_DOMAIN}` arrive as `....svc.cluster.local` first) by
          # resolving the stripped name inside THIS block — via the public upstream
          # below — so ${SECRET_DOMAIN} names bypass the k8s-gateway stub zone above
          # and every pod hairpins through Cloudflare (intermittent CI TLS failures).
          - name: forward
            parameters: . /etc/resolv.conf
          - name: cache
            configBlock: |-
              prefetch 20
              serve_stale
          - name: loop
          - name: reload
          - name: loadbalance
          - name: prometheus
            parameters: 0.0.0.0:9153
          - name: log
            configBlock: |-
              class error
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
