---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
spec:
  chartRef:
    kind: OCIRepository
    name: spegel
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    livenessProbe:
      enabled: true
    spegel:
      containerdSock: /run/containerd/containerd.sock
      containerdRegistryConfigPath: /etc/cri/conf.d/hosts
      # Compose with the Talos-written Harbor mirror (ADR-0017): keep existing per-registry
      # mirror config and prepend the peer cache → Spegel peers -> Harbor proxy -> upstream.
      prependExisting: true
      persistence:
        enabled: true
        hostPath: /var/lib/spegel
        path: /var/lib/spegel
    service:
      registry:
        hostPort: 29999
    serviceMonitor:
      enabled: true
