---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Erfbeeld runs in FOUR environments. Three are full stacks (nginx SPA + php-fpm), each in its
# own namespace for isolation + independent Flux reconcile; the fourth — feature previews — is
# static-SPA-per-branch served by the existing forgejo/preview-host (no per-branch backend).
# This establishes the repo's first multi-environment app.
resources:
  - ./production
  - ./staging
  - ./dev
