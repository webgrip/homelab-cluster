---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: erfbeeld-dev
spec:
  dependsOn:
    - name: external-secrets-stores
      namespace: security
  interval: 1h
  retryInterval: 5m
  path: ./kubernetes/apps/erfbeeld/dev/app
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: erfbeeld-dev
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
