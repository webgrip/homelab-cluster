---
# APP_KEY (and any future backend secrets) from OpenBao erfbeeld/app. Laravel requires a valid
# APP_KEY to boot even though this stateless API barely uses it. Seed OpenBao erfbeeld/app with
# a base64:-prefixed key once (shared across envs is fine — no persisted state).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: erfbeeld-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: erfbeeld-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: erfbeeld/app
