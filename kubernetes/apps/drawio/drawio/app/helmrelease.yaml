---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drawio
spec:
  chartRef:
    kind: OCIRepository
    name: drawio
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    controllers:
      drawio:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          nodeSelector:
            node.webgrip.io/pool: worker
          tolerations:
            - key: dedicated
              operator: Equal
              value: fringe
              effect: NoSchedule
        containers:
          app:
            image:
              repository: jgraph/drawio
              tag: latest@sha256:972f6d497346003e513518c37b11374d18148fb82eaa909300f20f9eb32166d2
            env:
              DRAWIO_BASE_URL: https://drawio.${SECRET_DOMAIN}
              DRAWIO_SELF_CONTAINED: "1"
              PLANTUML_URL: http://plantuml-server:8080/
            ports:
              - name: http
                containerPort: &drawioPort 8080
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: http
                  initialDelaySeconds: 10
                  periodSeconds: 20
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness: *probe
            resources:
              requests:
                cpu: 100m
                # Right-sized: drawio idles ~135Mi; was 512Mi. Limit kept 1Gi.
                memory: 192Mi
              limits:
                memory: 1Gi
      plantuml-server:
        pod:
          nodeSelector:
            node.webgrip.io/pool: worker
          tolerations:
            - key: dedicated
              operator: Equal
              value: fringe
              effect: NoSchedule
        containers:
          app:
            image:
              repository: jgraph/plantuml-server
              tag: latest@sha256:97f22b700223264223e057089c1a0ccdabd062ed2e4a3e904538434a487f757b
            ports:
              - name: http
                containerPort: &plantumlPort 8080
            probes:
              liveness: &plantumlProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: http
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *plantumlProbe
            resources:
              requests:
                cpu: 25m
                memory: 512Mi
              limits:
                memory: 2Gi
    service:
      drawio:
        controller: drawio
        ports:
          http:
            port: *drawioPort
      plantuml-server:
        controller: plantuml-server
        ports:
          http:
            port: *plantumlPort
