---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      nodeSelector:
        node.webgrip.io/pool: worker
      tolerations:
        - key: dedicated
          operator: Equal
          value: fringe
          effect: NoSchedule
      serviceAccountName: backstage-kubernetes
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backstage
          image: harbor.webgrip.dev/dockerhub/webgrip/backstage-application:1.0.4@sha256:1918c9e90b09e4c09303dd24e3e221202557c9f51167ba824a786e54ca5ba934
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          ports:
            - name: http
              containerPort: 7007
          envFrom:
            - configMapRef:
                name: backstage-config
            - secretRef:
                name: backstage-secrets
            - secretRef:
                name: backstage-db-secret
            - secretRef:
                name: backstage-oidc-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: K8S_SERVICE_ACCOUNT_TOKEN_BACKSTAGE
              valueFrom:
                secretKeyRef:
                  name: backstage-kubernetes-token
                  key: token
            - name: POSTGRES_HOST
              value: "backstage-db-rw.backstage.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: backstage-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backstage-db-secret
                  key: password
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 7007
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 7007
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 640Mi
