---
# Migration phase 5 (seed): backstage-secrets (at-rest BACKEND_SECRET + provider tokens) -> OpenBao.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: backstage-secrets, namespace: backstage}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: backstage-secrets}}
  data:
    - match: {secretKey: AUTH_GITHUB_CLIENT_ID, remoteRef: {remoteKey: backstage/app, property: AUTH_GITHUB_CLIENT_ID}}
    - match: {secretKey: AUTH_GITHUB_CLIENT_SECRET, remoteRef: {remoteKey: backstage/app, property: AUTH_GITHUB_CLIENT_SECRET}}
    - match: {secretKey: BACKEND_SECRET, remoteRef: {remoteKey: backstage/app, property: BACKEND_SECRET}}
    - match: {secretKey: GA_MEASUREMENT_ID, remoteRef: {remoteKey: backstage/app, property: GA_MEASUREMENT_ID}}
    - match: {secretKey: GITHUB_APP_CLIENT_ID, remoteRef: {remoteKey: backstage/app, property: GITHUB_APP_CLIENT_ID}}
    - match: {secretKey: GITHUB_APP_CLIENT_SECRET, remoteRef: {remoteKey: backstage/app, property: GITHUB_APP_CLIENT_SECRET}}
    - match: {secretKey: GITHUB_APP_ID, remoteRef: {remoteKey: backstage/app, property: GITHUB_APP_ID}}
    - match: {secretKey: GITHUB_APP_PRIVATE_KEY, remoteRef: {remoteKey: backstage/app, property: GITHUB_APP_PRIVATE_KEY}}
    - match: {secretKey: GITHUB_APP_WEBHOOK_SECRET, remoteRef: {remoteKey: backstage/app, property: GITHUB_APP_WEBHOOK_SECRET}}
    - match: {secretKey: GITHUB_TOKEN, remoteRef: {remoteKey: backstage/app, property: GITHUB_TOKEN}}
    - match: {secretKey: NEW_RELIC_REST_API_KEY, remoteRef: {remoteKey: backstage/app, property: NEW_RELIC_REST_API_KEY}}
    - match: {secretKey: NEW_RELIC_USER_KEY, remoteRef: {remoteKey: backstage/app, property: NEW_RELIC_USER_KEY}}
    - match: {secretKey: OPENAPI_AI_KEY, remoteRef: {remoteKey: backstage/app, property: OPENAPI_AI_KEY}}
    - match: {secretKey: POSTGRES_DB, remoteRef: {remoteKey: backstage/app, property: POSTGRES_DB}}
    - match: {secretKey: SENTRY_TOKEN, remoteRef: {remoteKey: backstage/app, property: SENTRY_TOKEN}}
