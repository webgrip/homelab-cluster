---
# backstage-secrets now sourced from OpenBao (all keys via dataFrom.extract). Replaces SOPS.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: backstage-secrets, namespace: backstage}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: backstage-secrets, creationPolicy: Owner}
  dataFrom:
    - extract: {key: backstage/app}
