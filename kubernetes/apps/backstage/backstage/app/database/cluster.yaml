---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: backstage-db
  namespace: backstage
spec:
  instances: 1
  # Burstable, not BestEffort: the Talos PSI OOM controller kills the largest
  # BestEffort cgroups first — every CNPG DB was SIGKILLed at once on
  # fringe-workstation (2026-07-11 01:27). Limits ~3x observed peak. No CPU
  # request/limit: worker-1 is CPU-request-saturated (98%) — a 100m request
  # left 7 DBs Pending (fringe is memory-request-full); memory request alone
  # keeps Burstable QoS, and no limit avoids throttling checkpoints/vacuum.
  resources:
    requests:
      memory: 384Mi
    limits:
      memory: 768Mi
  inheritedMetadata:
    annotations:
      reloader.stakater.com/auto: "true"
  storage:
    size: 20Gi
    storageClass: longhorn
  walStorage:
    size: 5Gi
    storageClass: longhorn
  postgresql:
    parameters:
      # Backup-tier policy: compress WAL full-page images to shrink the S3 archive
      # and local WAL. See docs/techdocs/docs/database-backup-tiers.md
      wal_compression: "zstd"
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: backstage-db-store
        serverName: backstage-db
  bootstrap:
    initdb:
      database: backstage
      owner: backstage
      secret:
        name: backstage-db-secret
      postInitSQL:
        - "ALTER ROLE backstage CREATEDB;"
