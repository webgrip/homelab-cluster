---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./configmap.yaml
  - ./backstage-secrets.externalsecret.yaml
  - ./backstage-secrets.pushsecret.yaml
  - ./backstage-oidc-secrets.pushsecret.yaml
  - ./backstage-oidc-secrets.externalsecret.yaml
  - ./backstage-db-secret.externalsecret.yaml
  - ./backstage-db-secret.pushsecret.yaml
  - ./kubernetes-serviceaccount.yaml
  - ./database
  - ./deployment.yaml
  - ./service.yaml
  - ./httproute.yaml
  - ./networkpolicy.yaml
components:
  # server-side OIDC discovery to authentik hairpins through envoy-internal;
  # default-deny requires an identity-based egress allow to ns network (ADR-0005)
  - ../../../../components/gateway-egress
  # Stateless app + CNPG db → worker pool (ADR-0002). Deploy has no RWO PVC;
  # the db is CNPG (Immediate, clean ordered move).
  - ../../../../components/placement/worker-pool
