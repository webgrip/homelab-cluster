---
# Adopt: ExternalSecret takes over the previously-unmanaged backstage-oidc-secrets from OpenBao.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backstage-oidc-secrets
  namespace: backstage
spec:
  refreshInterval: 15m
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: backstage-oidc-secrets, creationPolicy: Owner}
  data:
    - {secretKey: AUTH_OIDC_CLIENT_ID, remoteRef: {key: backstage/oidc, property: AUTH_OIDC_CLIENT_ID}}
    - {secretKey: AUTH_OIDC_CLIENT_SECRET, remoteRef: {key: backstage/oidc, property: AUTH_OIDC_CLIENT_SECRET}}
