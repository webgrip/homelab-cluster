---
# Plaintext template for Backstage OIDC secrets.
#
# SOPS policy: do NOT commit this file with real values.
#
# PREREQUISITE: The Backstage Docker image must include the
# @backstage/plugin-auth-backend-module-oidc-provider plugin.
# If not, rebuild the image with this plugin before applying OIDC config.
#
# How to use:
# 1) After the Authentik blueprint creates the Backstage OIDC provider,
#    get the client ID and secret from: Authentik Admin → Applications → Backstage → Provider
# 2) Fill in the values below
# 3) Encrypt with SOPS into: backstage-oidc-secrets.sops.yaml
# 4) Add the encrypted file to: kubernetes/apps/backstage/backstage/app/kustomization.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: backstage-oidc-secrets
  namespace: backstage
type: Opaque
stringData:
  AUTH_OIDC_CLIENT_ID: "<from-authentik>"
  AUTH_OIDC_CLIENT_SECRET: "<from-authentik>"
