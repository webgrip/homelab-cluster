---
# Migration phase 6 (seed): backstage-db-secret (CNPG bootstrap.initdb) -> OpenBao secret/backstage/db.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: backstage-db-secret, namespace: backstage}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: backstage-db-secret}}
  data:
    - match: {secretKey: username, remoteRef: {remoteKey: backstage/db, property: username}}
    - match: {secretKey: password, remoteRef: {remoteKey: backstage/db, property: password}}
