---
# backstage-db-secret now sourced from OpenBao. Replaces SOPS. Value-preserving (CNPG bootstrap secret).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: backstage-db-secret, namespace: backstage}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: backstage-db-secret, creationPolicy: Owner}
  dataFrom:
    - extract: {key: backstage/db}
