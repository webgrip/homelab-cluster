---
# Adopt: backstage-oidc-secrets is live but was unmanaged (sops unwired). Seed into OpenBao.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: backstage-oidc-secrets
  namespace: backstage
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: backstage-oidc-secrets}}
  data:
    - match: {secretKey: AUTH_OIDC_CLIENT_ID, remoteRef: {remoteKey: backstage/oidc, property: AUTH_OIDC_CLIENT_ID}}
    - match: {secretKey: AUTH_OIDC_CLIENT_SECRET, remoteRef: {remoteKey: backstage/oidc, property: AUTH_OIDC_CLIENT_SECRET}}
