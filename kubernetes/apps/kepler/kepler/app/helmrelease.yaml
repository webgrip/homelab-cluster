---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kepler
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kepler
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    image:
      # renovate: datasource=docker depName=quay.io/sustainable_computing_io/kepler
      tag: v0.11.4
    # DaemonSet: chart defaults already set hostPID + control-plane tolerations so
    # it runs on every node. Privileged + root are required to read host RAPL via
    # /sys powercap (paired with the kepler-privileged Kyverno exception). Explicit
    # requests keep it Burstable (this cluster OOM-kills BestEffort pods).
    daemonset:
      securityContext:
        privileged: true
        runAsNonRoot: false
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
      # Tolerate ALL taints so the power DaemonSet covers every node (the chart
      # default only tolerates control-plane/master; worker-1 had a taint that
      # left its pod Pending).
      tolerations:
        - operator: Exists
    config:
      log:
        level: info
        # Node-level real RAPL power only (dev.fake off, auto-discovered powercap
        # zones — chart defaults). Kube per-pod attribution is intentionally NOT
        # enabled: the chart's config.kube.enabled writes kube.enable=true with an
        # empty kube.node-name into the shared config file, which fails Kepler's
        # startup validation (node-name is per-node, supplied only via the CLI arg
        # AFTER file validation). Node power is the real measured value for EUR/kWh
        # + carbon; per-pod is only CPU-time attribution, so we skip it.
    serviceMonitor:
      enabled: true
      interval: 30s
      # Match the kube-prometheus-stack serviceMonitorSelector so it's scraped.
      labels:
        release: kube-prometheus-stack
