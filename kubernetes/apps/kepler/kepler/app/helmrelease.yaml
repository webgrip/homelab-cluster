---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kepler
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kepler
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    image:
      # Routed through the Harbor pull-through proxy-cache (ADR-0025) instead of
      # quay.io direct. Digest verified live (running pod imageID) and via
      # `docker buildx imagetools inspect` against the Harbor proxy before
      # landing -- same content, no version change. The chart has no separate
      # digest field, so it's appended inline onto tag (repo:tag@digest), same
      # pattern as gitea-mirror/KEDA. VIK-241/242, ticket #68.
      repository: harbor.webgrip.dev/quay/sustainable_computing_io/kepler
      # renovate: datasource=docker depName=quay.io/sustainable_computing_io/kepler
      tag: v0.11.4@sha256:1936d0e05276296cd4aeb0315b1c5fee5024c115bbead03daf3b3cf9b485dafc
    # DaemonSet: chart defaults already set hostPID + control-plane tolerations so
    # it runs on every node. Explicit requests keep it Burstable (this cluster
    # OOM-kills BestEffort pods).
    daemonset:
      # Real fix, not the blanket privileged:true the chart defaults to (ticket #68).
      # Kepler 0.11.x's RAPL path is pure sysfs reads (github.com/prometheus/procfs/
      # sysfs) -- no eBPF, so CAP_BPF/CAP_PERFMON are irrelevant. Kepler's own
      # actively-maintained operator (sustainable-computing-io/kepler-operator
      # pkg/components/power-monitor/deployment.go) runs unprivileged with exactly
      # this capability set: "Kepler requires CAP_SYS_PTRACE to read /proc, hence
      # drop ALL capabilities and set Privileged to false". Verified live after
      # rollout: kepler_node_cpu_watts still reports real, changing RAPL wattage.
      # runAsNonRoot/seccompProfile are NOT set: upstream's own hardened config
      # still runs as root (RAPL energy_uj files are root-owned mode 0400; without
      # CAP_DAC_READ_SEARCH, dropping to non-root would break reads) and doesn't
      # set a seccomp profile either -- untested upstream, left as a follow-up
      # rather than guessed at on a fleet-wide DaemonSet.
      securityContext:
        privileged: false
        runAsNonRoot: false
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - "ALL"
          add:
            - "SYS_PTRACE"
      resources:
        requests:
          # Light sysfs reader — keep the request tiny so it also fits worker-1,
          # which is CPU-request-saturated. Explicit request = Burstable, not
          # BestEffort (this cluster OOM-kills BestEffort pods).
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 256Mi
      # Tolerate ALL taints so the power DaemonSet covers every node.
      tolerations:
        - operator: Exists
      # /metrics doubles as the liveness endpoint (kepler has no healthz —
      # upstream #2282) and blocks on a fresh power computation: 3-3.6s on
      # fringe-workstation (10s worst case), ~1.5s peaks even on the soyo minis.
      # The chart sets no timeoutSeconds, so the k8s default 1s probe-killed the
      # pod every ~10min (1441 restarts in 10 days). 15s covers the worst case
      # while still catching a truly hung process within failureThreshold*period.
      livenessProbe:
        httpGet:
          path: /metrics
          port: http
        initialDelaySeconds: 10
        periodSeconds: 60
        timeoutSeconds: 15
        failureThreshold: 3
    config:
      log:
        level: info
        # Real RAPL meter (dev.fake off, auto-discovered powercap zones — chart
        # defaults). We deliberately do NOT set config.kube.enabled: it writes
        # kube.enable=true with an empty kube.node-name into the shared config file,
        # which fails Kepler's startup validation (node-name is per-node). The chart
        # ALWAYS passes --kube.enable --kube.node-name=$(NODE_NAME) as CLI args, so
        # per-pod/container attribution still works — we get both node power (real,
        # measured) and per-pod power (CPU-time attribution).
    serviceMonitor:
      enabled: true
      interval: 30s
      # Match the kube-prometheus-stack serviceMonitorSelector so it's scraped.
      labels:
        release: kube-prometheus-stack
