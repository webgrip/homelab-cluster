---
# Vikunja's JWT signing secret (VIKUNJA_SERVICE_SECRET), generated in-cluster.
# generate-once + Retain: rotating it invalidates every session/API token, so
# rotation is deliberate — delete the vikunja-secret Secret to re-generate.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vikunja-secret
spec:
  refreshInterval: "0" # generate once
  target:
    name: vikunja-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator
      rewrite:
        - regexp: {source: "password", target: "VIKUNJA_SERVICE_SECRET"}
