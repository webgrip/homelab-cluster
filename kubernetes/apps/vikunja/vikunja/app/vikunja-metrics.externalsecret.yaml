---
# Basic-auth credential for Vikunja's built-in Prometheus /metrics endpoint. Generated
# in-cluster, generate-once + Retain (both the app env and the VMServiceScrape read this
# same in-namespace Secret — vm-operator resolves basicAuth secrets from the scrape's
# namespace). Auth is required because /metrics rides the public HTTPRoute path space.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vikunja-metrics
spec:
  refreshInterval: "0" # generate once
  target:
    name: vikunja-metrics
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        username: "metrics"
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
