---
# Seed the generated grafana_ro credential into OpenBao KV (secret/vikunja/grafana-ro) so
# the observability namespace can read the SAME value for the Grafana vikunja-db datasource.
# push.hcl already grants write on secret/data/* + secret/metadata/*, no policy change needed.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: vikunja-grafana-ro
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: vikunja-grafana-ro}}
  data:
    - match: {secretKey: username, remoteRef: {remoteKey: vikunja/grafana-ro, property: username}}
    - match: {secretKey: password, remoteRef: {remoteKey: vikunja/grafana-ro, property: password}}
