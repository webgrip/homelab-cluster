---
# Read-only credential for Grafana's vikunja-db datasource (agent-observability suite).
# Generated in-cluster (generate-once + Retain — CNPG managed.roles owns the password
# ongoing), pushed to OpenBao KV so the observability namespace can read the SAME value
# for the GrafanaDatasource (a generator yields independent values per ExternalSecret,
# so it cannot simply be generated twice).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vikunja-grafana-ro
spec:
  refreshInterval: "0" # generate once, never rotate (CNPG owns the value ongoing)
  target:
    name: vikunja-grafana-ro
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        username: "grafana_ro"
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
