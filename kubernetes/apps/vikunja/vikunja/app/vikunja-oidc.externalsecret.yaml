---
# Vikunja's side of the OIDC client secret: generated in the authentik ns
# (vikunja-oidc-client ExternalSecret), consumed by Authentik via !Env in
# blueprint 37-oidc-vikunja, mirrored to OpenBao secret/vikunja/oidc by the
# matching PushSecret, and read back here as the env var Vikunja expects.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vikunja-oidc
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: vikunja-oidc
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_CLIENTSECRET: "{{ .client_secret }}"
  data:
    - secretKey: client_secret
      remoteRef: {key: vikunja/oidc, property: client_secret}
