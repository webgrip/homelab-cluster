server {
    listen 8080;
    server_name _;
    server_tokens off;
    # TLS terminates at envoy: absolute redirects would leak this pod's
    # listen port/scheme (http://…:8080). Relative Location headers let the
    # browser keep https://…/443.
    absolute_redirect off;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /board {
        return 301 /board/;
    }

    # The SPA is a single file; any sub-path falls back to it.
    location /board/ {
        alias /var/www/board/;
        index index.html;
        try_files $uri /board/index.html;
    }

    # Only /board is routed here by the HTTPRoute, but be a good citizen anyway.
    location / {
        return 302 /board/;
    }
}
