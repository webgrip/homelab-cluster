---
# Additive rules scoped to the board pod, on top of the namespace-wide vikunja
# default-deny (which grants intra-ns + DNS). Static file server: gateway
# ingress only, zero egress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vikunja-board-allow-ingress
  labels:
    app.kubernetes.io/part-of: vikunja
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vikunja-board
  policyTypes:
    - Ingress
  ingress:
    # gateway (network ns) + LAN (gateway traffic can masquerade to a node IP)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
        - ipBlock:
            cidr: 127.0.0.0/8
        - ipBlock:
            cidr: fd00::/8
        - ipBlock:
            cidr: ::1/128
      ports:
        - protocol: TCP
          port: 8080
