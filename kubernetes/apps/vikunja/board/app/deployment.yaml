---
# Custom Vikunja front end ("the board"): a single-file SPA on the Vikunja REST
# API, served same-origin under vikunja.<domain>/board so it reuses the stock
# UI's login session (same-origin localStorage JWT) and needs no CORS changes.
# Stock UI stays untouched at /.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vikunja-board
  labels:
    app.kubernetes.io/name: vikunja-board
    app.kubernetes.io/part-of: vikunja
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vikunja-board
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vikunja-board
    spec:
      nodeSelector:
        node.webgrip.io/pool: worker
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          # Same Harbor-proxied pin as invoiceninja's web sidecar (ADR-0025).
          image: harbor.webgrip.dev/dockerhub/nginxinc/nginx-unprivileged:1.31.1-alpine@sha256:cc300bd2e8776708a8c2c8686a74f06eadf221c5ce01e85d0e821955d7a730ab
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: html
              mountPath: /var/www/board
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            # unprivileged image keeps pid + temp files under /tmp
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 48Mi
      volumes:
        - name: html
          configMap:
            name: vikunja-board-html
        - name: nginx-conf
          configMap:
            name: vikunja-board-nginx
        - name: tmp
          emptyDir: {}
