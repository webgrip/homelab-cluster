---
# Same hostname as the stock Vikunja UI; Gateway API longest-path precedence
# sends /board here and everything else (UI + /api) to Vikunja itself — which
# is what lets the SPA call /api/v1 same-origin with the existing session.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vikunja-board
  annotations:
    external-dns.alpha.kubernetes.io/exclude: "true"
spec:
  hostnames:
    - vikunja.${SECRET_DOMAIN}
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /board
      backendRefs:
        - name: vikunja-board
          namespace: vikunja
          port: 8080
