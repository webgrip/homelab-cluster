---
# Vikunja API token for the MCP bridge. Provided value (created by a human in
# the Vikunja UI: Settings → API Tokens), seeded into OpenBao at
# secret/vikunja/mcp (key: api_token) — see the vikunja skill for the exact
# token permissions + rotation steps. Until seeded, the deployment stays
# Pending on this Secret (CreateContainerConfigError is the expected signal).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-vikunja-token
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: mcp-vikunja-token
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        VIKUNJA_API_TOKEN: "{{ .api_token }}"
  data:
    - secretKey: api_token
      remoteRef: {key: vikunja/mcp, property: api_token}
