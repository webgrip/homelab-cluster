---
# Vikunja MCP for Claude Code: supergateway bridges the stdio-only
# @aimbitgmbh/vikunja-mcp npm server to streamable HTTP at /mcp (the npm
# ecosystem has no native-HTTP Vikunja MCP). npx fetches the pinned package at
# session spawn — hence the internet-egress NetworkPolicy carve-out; the npm
# cache lives in the /tmp emptyDir so respawns within a pod's lifetime are
# offline. WRITE-CAPABLE: acts as the token owner's Vikunja user.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-vikunja
  labels:
    app.kubernetes.io/name: mcp-vikunja
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-vikunja
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-vikunja
    spec:
      # Pinned to worker-1 — co-located with the vikunja API + DB primary
      # (vikunja-db-1). The oversubscribed fringe-workstation node was
      # CPU-throttling this bridge into ~17s responses and exit-1 crashes
      # (9 restarts / 9h, 2026-07-18); worker-1 keeps the whole request path
      # (mcp → API → primary) on one node.
      nodeSelector:
        kubernetes.io/hostname: worker-1
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: mcp-vikunja
          image: docker.io/supercorp/supergateway:3.4.3@sha256:095acf4471e142553c1a5514aa5e480abbc5885d00549d4a3481cc70eac53889
          args:
            - --stdio
            - npx -y @aimbitgmbh/vikunja-mcp@0.1.0
            - --outputTransport
            - streamableHttp
            - --port
            - "8000"
            # STATELESS (2026-07-18, VIK-314/VIK-263): a fresh vikunja-mcp child
            # per request, npx warm from the /tmp cache (~1-2s/call). Stateful
            # session mode broke TWO consumer classes: strict MCP SDK clients
            # (LiteLLM gateway: "Session termination failed: 400" →
            # BrokenResourceError on list_tools) and the 2026-07-12 session-leak
            # OOM. Stateless trades per-call latency for correctness — bulk
            # board scripts get slower but reliable.
            # Real health endpoint (supergateway returns "ok") so the probes can
            # catch a functionally-dead gateway, not just an open TCP port.
            - --healthEndpoint
            - /healthz
          env:
            # In-cluster direct to the app Service — no gateway hairpin.
            # The trailing /api/v1 is required by vikunja-mcp.
            - name: VIKUNJA_URL
              value: "http://vikunja.vikunja.svc.cluster.local:3456/api/v1"
            # Hard deletes for projects/tasks stay off (vikunja-mcp safe mode):
            # project_delete archives, task_delete completes — Vikunja has no
            # trash/undo. Label deletes ARE enabled: a label delete only unlinks
            # metadata (tasks keep their other labels), and board hygiene needs
            # it (duplicate-label dedup).
            - name: ENABLE_LABEL_DELETE
              value: "true"
            - name: HOME
              value: /tmp
            - name: npm_config_cache
              value: /tmp/npm-cache
          envFrom:
            - secretRef:
                name: mcp-vikunja-token # VIKUNJA_API_TOKEN
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          # httpGet /healthz (supergateway --healthEndpoint): a tcpSocket probe
          # only checks the port is open, so it reported Ready while the gateway
          # was serving 17s responses and never restarted a wedged child.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              # 25m starved the bridge under node contention; give it a real
              # CPU floor so it is not throttled to 17s latencies.
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
