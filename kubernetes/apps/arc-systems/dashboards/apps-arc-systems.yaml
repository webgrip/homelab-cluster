---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: apps-arc-systems
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: true
  folder: "Apps"
  json: |-
    {
      "schemaVersion": 39,
      "title": "ARC Systems / Runtime Health",
      "uid": "apps-arc-systems",
      "timezone": "browser",
      "tags": ["apps", "arc-systems"],
      "editable": false,
      "graphTooltip": 0,
      "refresh": "30s",
      "time": {"from": "now-6h", "to": "now"},
      "annotations": {"list": [{"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}]},
      "panels": [
        {"id": 1, "type": "stat", "title": "Up targets (arc-systems)", "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum(up{namespace=\"arc-systems\"} == 1)", "legendFormat": "up"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"}, "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}},
        {"id": 2, "type": "stat", "title": "Pods not Running", "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum(kube_pod_status_phase{namespace=\"arc-systems\", phase=~\"Pending|Failed|Unknown\"} == 1)", "legendFormat": "not_running"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"}, "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}},
        {"id": 3, "type": "stat", "title": "Deployment replicas missing", "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "clamp_min(sum(kube_deployment_spec_replicas{namespace=\"arc-systems\"}) - sum(kube_deployment_status_replicas_available{namespace=\"arc-systems\"}), 0)", "legendFormat": "missing"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"}, "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}},
        {"id": 8, "type": "stat", "title": "ARC runner utilization", "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "(100 * sum(gha_busy_runners{namespace=\"arc-systems\"}) / clamp_min(sum(gha_registered_runners{namespace=\"arc-systems\"}), 1)) or vector(0)", "legendFormat": "utilization"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"}, "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1, "max": 100, "min": 0}, "overrides": []}},
        {"id": 4, "type": "timeseries", "title": "Pod restarts (top 10, 30m)", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "topk(10, sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"arc-systems\"}[30m])))", "legendFormat": "{{pod}}"}], "options": {"legend": {"displayMode": "list", "placement": "right"}}, "fieldConfig": {"defaults": {}, "overrides": []}},
        {"id": 5, "type": "timeseries", "title": "CPU usage (cores)", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"arc-systems\", image!=\"\"}[5m]))", "legendFormat": "cpu"}], "options": {"legend": {"displayMode": "list", "placement": "right"}}, "fieldConfig": {"defaults": {"unit": "cores"}, "overrides": []}},
        {"id": 6, "type": "timeseries", "title": "Memory working set", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum(container_memory_working_set_bytes{namespace=\"arc-systems\", image!=\"\"})", "legendFormat": "mem"}], "options": {"legend": {"displayMode": "list", "placement": "right"}}, "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []}},
        {"id": 7, "type": "timeseries", "title": "PVC usage % (top 10)", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "topk(10, (kubelet_volume_stats_used_bytes{namespace=\"arc-systems\"} / kubelet_volume_stats_capacity_bytes{namespace=\"arc-systems\"}) * 100)", "legendFormat": "{{persistentvolumeclaim}}"}], "options": {"legend": {"displayMode": "list", "placement": "right"}}, "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1}, "overrides": []}},
        {"id": 9, "type": "timeseries", "title": "ARC jobs (assigned vs running)", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum(gha_assigned_jobs{namespace=\"arc-systems\"}) or vector(0)", "legendFormat": "assigned jobs"}, {"refId": "B", "expr": "sum(gha_running_jobs{namespace=\"arc-systems\"}) or vector(0)", "legendFormat": "running jobs"}], "options": {"legend": {"displayMode": "list", "placement": "right"}}, "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}, "overrides": []}},
        {"id": 10, "type": "timeseries", "title": "ARC runners (desired/registered/busy/idle)", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum(gha_desired_runners{namespace=\"arc-systems\"}) or vector(0)", "legendFormat": "desired"}, {"refId": "B", "expr": "sum(gha_registered_runners{namespace=\"arc-systems\"}) or vector(0)", "legendFormat": "registered"}, {"refId": "C", "expr": "sum(gha_busy_runners{namespace=\"arc-systems\"}) or vector(0)", "legendFormat": "busy"}, {"refId": "D", "expr": "sum(gha_idle_runners{namespace=\"arc-systems\"}) or vector(0)", "legendFormat": "idle"}], "options": {"legend": {"displayMode": "list", "placement": "right"}}, "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}, "overrides": []}}
      ]
    }
