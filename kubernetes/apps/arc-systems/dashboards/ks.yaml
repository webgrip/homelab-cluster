---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: arc-systems-dashboards
spec:
  dependsOn:
    - name: grafana-operator
      namespace: observability
  interval: 1h
  path: ./kubernetes/apps/arc-systems/dashboards
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: arc-systems
  wait: false
