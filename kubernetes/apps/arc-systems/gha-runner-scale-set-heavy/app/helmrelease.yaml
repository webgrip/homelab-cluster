---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gha-runner-scale-set-heavy
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set-heavy
  dependsOn:
    - name: actions-runner-controller
      namespace: arc-systems
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  valuesFrom:
    - kind: Secret
      name: gha-runner-scale-set-secrets
      valuesKey: github_config_url
      targetPath: githubConfigUrl
  values:
    controllerServiceAccount:
      namespace: arc-systems
      name: actions-runner-controller-gha-rs-controller
    githubConfigSecret: gha-runner-scale-set-secrets
    # TEMP (2026-06-18 Longhorn IM-cpu detonation): heavy pool suspended to 0 runners to keep DinD
    # builds off the nodes while storage heals. Restore to maxRunners: 2 once converged.
    minRunners: 0
    maxRunners: 0
    scaleSetLabels:
      - arc-runner-set
      - arc
      - homelab
      - fringe
      - heavy
      - dind
    runnerGroup: Default
    runnerScaleSetName: arc-runner-set-heavy
    resourceMeta:
      autoscalingListener:
        labels:
          app.kubernetes.io/component: listener
          homelab.webgrip.nl/runner-pool: heavy
        annotations:
          homelab.webgrip.nl/arc-0-14-2-workaround: "true"
      ephemeralRunnerSet:
        labels:
          app.kubernetes.io/component: ephemeral-runner-set
          homelab.webgrip.nl/runner-pool: heavy
        annotations:
          homelab.webgrip.nl/arc-0-14-2-workaround: "true"
    listenerMetrics:
      gauges:
        gha_assigned_jobs:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_running_jobs:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_registered_runners:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_busy_runners:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_min_runners:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_max_runners:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_desired_runners:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_idle_runners:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
    template:
      metadata:
        labels:
          app.kubernetes.io/component: runner
          homelab.webgrip.nl/runner-pool: heavy
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/path: "/metrics"
          prometheus.io/port: "8080"
      spec:
        # first-party image now comes from the private Harbor project (see forgejo-runner)
        imagePullSecrets:
          - name: harbor-pull
        serviceAccountName: arc-runner-set
        nodeSelector:
          node.webgrip.io/pool: worker
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        initContainers:
          - name: init-dind-externals
            image: harbor.webgrip.dev/webgrip/ci-runner@sha256:14967fe17bb920669bef4c5f7725d4b96b1da9eb174d5784ec169a01d4550dbd
            command:
              - "cp"
              - "-r"
              - "-v"
              - "/home/runner/externals/."
              - "/home/runner/tmpDir/"
            volumeMounts:
              - name: dind-externals
                mountPath: /home/runner/tmpDir
        containers:
          - name: runner
            image: harbor.webgrip.dev/webgrip/ci-runner@sha256:14967fe17bb920669bef4c5f7725d4b96b1da9eb174d5784ec169a01d4550dbd
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                cpu: "2"
                memory: 4Gi
            command:
              - "/home/runner/run.sh"
            env:
              - name: DOCKER_HOST
                value: unix:///var/run/docker.sock
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /var/run
          - name: dind
            image: docker.io/library/docker:dind@sha256:bfec1f5159c63a81ca6fdedbd81404d2c0e16378ed0feec3bb3fbf3998847659
            args:
              - dockerd
              - --host=unix:///var/run/docker.sock
              - --group=$(DOCKER_GROUP_GID)
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                cpu: "4"
                memory: 8Gi
            env:
              - name: DOCKER_GROUP_GID
                value: "123"
            securityContext:
              privileged: true
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /var/run
              - name: dind-externals
                mountPath: /home/runner/externals
        volumes:
          - name: work
            emptyDir: {}
          - name: dind-sock
            emptyDir: {}
          - name: dind-externals
            emptyDir: {}
    listenerTemplate:
      metadata:
        labels:
          app.kubernetes.io/component: listener
          homelab.webgrip.nl/runner-pool: heavy
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/path: "/metrics"
          prometheus.io/port: "8080"
      spec:
        nodeSelector:
          node.webgrip.io/pool: worker
        containers:
          - name: listener
