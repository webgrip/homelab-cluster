---
# Migration (swap): gha-runner-scale-set-secrets (GitHub App auth) <- OpenBao secret/arc/runners.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: gha-runner-scale-set-secrets, namespace: arc-systems}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: gha-runner-scale-set-secrets, creationPolicy: Owner}
  dataFrom:
    - extract: {key: arc/runners}
