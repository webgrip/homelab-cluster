---
# Migration (seed): gha-runner-scale-set-secrets (GitHub App auth, shared by both
# runner sets) -> OpenBao secret/arc/runners.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: gha-runner-scale-set-secrets, namespace: arc-systems}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: gha-runner-scale-set-secrets}}
  data:
    - match: {secretKey: github_app_id, remoteRef: {remoteKey: arc/runners, property: github_app_id}}
    - match: {secretKey: github_app_installation_id, remoteRef: {remoteKey: arc/runners, property: github_app_installation_id}}
    - match: {secretKey: github_app_private_key, remoteRef: {remoteKey: arc/runners, property: github_app_private_key}}
    - match: {secretKey: github_config_url, remoteRef: {remoteKey: arc/runners, property: github_config_url}}
