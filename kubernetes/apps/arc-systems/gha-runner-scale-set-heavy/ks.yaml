---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gha-runner-scale-set-heavy
spec:
  dependsOn:
    - name: actions-runner-controller
      namespace: arc-systems
  interval: 1h
  path: ./kubernetes/apps/arc-systems/gha-runner-scale-set-heavy/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: arc-systems
  wait: false
