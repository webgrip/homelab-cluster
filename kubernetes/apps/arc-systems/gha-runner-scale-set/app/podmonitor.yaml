---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: gha-runner-scale-set-normal-metrics
  labels:
    app.kubernetes.io/name: gha-runner-scale-set
spec:
  namespaceSelector:
    matchNames:
      - arc-systems
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      metricRelabelings:
        - targetLabel: pool
          replacement: normal
  selector:
    matchLabels:
      homelab.webgrip.nl/runner-pool: normal
