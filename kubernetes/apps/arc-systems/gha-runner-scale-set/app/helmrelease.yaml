---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gha-runner-scale-set
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
  dependsOn:
    - name: actions-runner-controller
      namespace: arc-systems
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  valuesFrom:
    - kind: Secret
      name: gha-runner-scale-set-secrets
      valuesKey: github_config_url
      targetPath: githubConfigUrl
  values:
    controllerServiceAccount:
      namespace: arc-systems
      name: actions-runner-controller-gha-rs-controller
    githubConfigSecret: gha-runner-scale-set-secrets
    # TEMP (2026-06-18 Longhorn IM-cpu detonation): ARC suspended to 0 runners to shed node load
    # while the storage layer heals. Restore to minRunners: 1 / maxRunners: 3 once converged.
    minRunners: 0
    maxRunners: 0
    scaleSetLabels:
      - arc-runner-set
      - arc
      - homelab
      - normal
    runnerGroup: Default
    runnerScaleSetName: arc-runner-set
    resourceMeta:
      autoscalingListener:
        labels:
          app.kubernetes.io/component: listener
          homelab.webgrip.nl/runner-pool: normal
        annotations:
          homelab.webgrip.nl/arc-0-14-2-workaround: "true"
      ephemeralRunnerSet:
        labels:
          app.kubernetes.io/component: ephemeral-runner-set
          homelab.webgrip.nl/runner-pool: normal
        annotations:
          homelab.webgrip.nl/arc-0-14-2-workaround: "true"
    listenerMetrics:
      gauges:
        gha_assigned_jobs:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_running_jobs:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_registered_runners:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_busy_runners:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_min_runners:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_max_runners:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_desired_runners:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
        gha_idle_runners:
          labels:
            - "name"
            - "namespace"
            - "repository"
            - "organization"
            - "enterprise"
    template:
      metadata:
        labels:
          app.kubernetes.io/component: runner
          homelab.webgrip.nl/runner-pool: normal
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/path: "/metrics"
          prometheus.io/port: "8080"
      spec:
        # first-party image now comes from the private Harbor project (see forgejo-runner)
        imagePullSecrets:
          - name: harbor-pull
        serviceAccountName: arc-runner-set
        nodeSelector:
          node.webgrip.io/pool: worker
        containers:
          - name: runner
            image: harbor.webgrip.dev/webgrip/ci-runner@sha256:14967fe17bb920669bef4c5f7725d4b96b1da9eb174d5784ec169a01d4550dbd
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 2Gi
            command:
              - "/home/runner/run.sh"
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
        volumes:
          - name: work
            emptyDir: {}
    listenerTemplate:
      metadata:
        labels:
          app.kubernetes.io/component: listener
          homelab.webgrip.nl/runner-pool: normal
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/path: "/metrics"
          prometheus.io/port: "8080"
      spec:
        nodeSelector:
          node.webgrip.io/pool: worker
        containers:
          - name: listener
