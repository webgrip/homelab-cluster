---
# imagePullSecret for first-party runner images (harbor.webgrip.dev/webgrip/*), shared by
# BOTH scale-sets in this namespace — they dependsOn actions-runner-controller, so it is present
# before either AutoscalingRunnerSet templates a pod.
#
# The runner toolchain is published to both the in-cluster Harbor and ghcr.io; we pull the Harbor
# copy because it is LAN-local (no internet round-trip when a node cold-starts a runner), keeps
# working during a WAN/upstream outage, and avoids ghcr package visibility (new ghcr packages
# default to private, which kubelet cannot pull anonymously). Supply-chain coverage is unchanged:
# image-verify-harbor-audit already targets harbor.webgrip.dev/webgrip/*.
#
# Same OpenBao-backed robot credential Kyverno uses (secret/harbor/robot-webgrip), rendered here
# as a dockerconfigjson for the workload side.
# Literal harbor.webgrip.dev (not ${SECRET_DOMAIN}): this Kustomization has no
# postBuild.substituteFrom, and adding one here would also envsubst the ScaledJob's inline
# shell (it references $PATH), so the literal is safer -- and matches the sidecar image refs
# in the same app.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pull
  namespace: arc-systems
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target:
    name: harbor-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"harbor.webgrip.dev":{"username":"{{ .CI_USER }}","password":"{{ .CI_TOKEN }}","auth":"{{ printf "%s:%s" .CI_USER .CI_TOKEN | b64enc }}"}}}
  data:
    - {secretKey: CI_USER, remoteRef: {key: harbor/robot-webgrip, property: CI_USER}}
    - {secretKey: CI_TOKEN, remoteRef: {key: harbor/robot-webgrip, property: CI_TOKEN}}
