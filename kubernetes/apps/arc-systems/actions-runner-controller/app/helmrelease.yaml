---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actions-runner-controller
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set-controller
  interval: 1h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    replicaCount: 1
    flags:
      healthProbeBindAddress: ":8081"
    metrics:
      controllerManagerAddr: ":8080"
      listenerAddr: ":8080"
      listenerEndpoint: "/metrics"
    podAnnotations:
      prometheus.io/path: "/metrics"
      prometheus.io/port: "8080"
      prometheus.io/scrape: "true"
      # Placement comes from the worker-pool component (pool=worker affinity,
      # ADR-0002). The legacy nodeSelector nodegroup=soyo was removed 2026-06-20 —
      # it contradicted the pin and left the controller pod Pending.
