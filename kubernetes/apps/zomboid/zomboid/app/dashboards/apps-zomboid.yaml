apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-apps-zomboid
  annotations:
    grafana_folder: Apps
  labels:
    grafana_dashboard: "1"
data:
  apps-zomboid.json: |-
    {
      "schemaVersion": 39,
      "title": "Apps / Zomboid",
      "uid": "apps-zomboid",
      "timezone": "browser",
      "tags": ["apps", "zomboid"],
      "editable": false,
      "graphTooltip": 0,
      "refresh": "30s",
      "time": {"from": "now-6h", "to": "now"},
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "A2S up",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(a2s_server_up{namespace=\"zomboid\"}) or max(a2s_up{namespace=\"zomboid\"}) or vector(0)", "legendFormat": "up"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "mappings": [{"type": "value", "options": {"0": {"text": "down"}, "1": {"text": "up"}}}],
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Players (A2S)",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(a2s_server_players{namespace=\"zomboid\"}) or max(a2s_players{namespace=\"zomboid\"}) or vector(0)", "legendFormat": "players"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Max players (A2S)",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(a2s_server_max_players{namespace=\"zomboid\"}) or max(a2s_max_players{namespace=\"zomboid\"}) or vector(0)", "legendFormat": "max"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Map (A2S)",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "(max by (map) (a2s_server_info{namespace=\"zomboid\"})) or (max by (map) (a2s_info{namespace=\"zomboid\"}))", "legendFormat": "{{map}}"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "name"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },

        {
          "id": 5,
          "type": "gauge",
          "title": "CPU bite risk (throttling %, 5m)",
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "(100 * sum(rate(container_cpu_cfs_throttled_periods_total{namespace=\"zomboid\", pod=~\"zomboid-.*\", container!=\"POD\", image!=\"\"}[5m])) / clamp_min(sum(rate(container_cpu_cfs_periods_total{namespace=\"zomboid\", pod=~\"zomboid-.*\", container!=\"POD\", image!=\"\"}[5m])), 1)) or vector(0)"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": false, "showThresholdMarkers": true},
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 1,
              "min": 0,
              "max": 100,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 5}, {"color": "red", "value": 15}]}
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "gauge",
          "title": "Memory hunger (% of limit)",
          "gridPos": {"h": 6, "w": 6, "x": 6, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "(100 * sum(container_memory_working_set_bytes{namespace=\"zomboid\", pod=~\"zomboid-.*\", image!=\"\"}) / clamp_min(sum(kube_pod_container_resource_limits{namespace=\"zomboid\", pod=~\"zomboid-.*\", resource=\"memory\", unit=\"byte\"}), 1)) or vector(0)"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": false, "showThresholdMarkers": true},
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 1,
              "min": 0,
              "max": 100,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 85}]}
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "gauge",
          "title": "Disk hoarding (PVC used %)",
          "gridPos": {"h": 6, "w": 6, "x": 12, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "(100 * max(kubelet_volume_stats_used_bytes{namespace=\"zomboid\", persistentvolumeclaim=~\"zomboid.*\"}) / clamp_min(max(kubelet_volume_stats_capacity_bytes{namespace=\"zomboid\", persistentvolumeclaim=~\"zomboid.*\"}), 1)) or vector(0)"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": false, "showThresholdMarkers": true},
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 1,
              "min": 0,
              "max": 100,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 85}]}
            },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "gauge",
          "title": "Player slots used %",
          "gridPos": {"h": 6, "w": 6, "x": 18, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "(100 * ((max(a2s_server_players{namespace=\"zomboid\"}) or max(a2s_players{namespace=\"zomboid\"}) or vector(0)) / clamp_min((max(a2s_server_max_players{namespace=\"zomboid\"}) or max(a2s_max_players{namespace=\"zomboid\"}) or vector(0)), 1))) or vector(0)"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": false, "showThresholdMarkers": true},
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 0,
              "min": 0,
              "max": 100,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 60}, {"color": "red", "value": 85}]}
            },
            "overrides": []
          }
        },

        {
          "id": 9,
          "type": "gauge",
          "title": "Scrape p95 (seconds)",
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 10},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "quantile(0.95, max_over_time(scrape_duration_seconds{namespace=\"zomboid\"}[5m])) or vector(0)"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": false, "showThresholdMarkers": true},
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 3,
              "min": 0,
              "max": 2,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.25}, {"color": "red", "value": 0.75}]}
            },
            "overrides": []
          }
        },
        {
          "id": 10,
          "type": "stat",
          "title": "Restarts (30m)",
          "gridPos": {"h": 6, "w": 6, "x": 6, "y": 10},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "(sum(increase(kube_pod_container_status_restarts_total{namespace=\"zomboid\", pod=~\"zomboid-.*\"}[30m])) or vector(0))", "legendFormat": "restarts"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 11,
          "type": "stat",
          "title": "Spooky logs (errors/exceptions, 5m)",
          "gridPos": {"h": 6, "w": 6, "x": 12, "y": 10},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "(sum(count_over_time({namespace=\"zomboid\", pod=~\"zomboid-.*\"} |~ \"(?i)(error|exception)\" [5m])) or vector(0))"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 10}]}}, "overrides": []}
        },
        {
          "id": 12,
          "type": "gauge",
          "title": "Apocalypse Health (0–100)",
          "gridPos": {"h": 6, "w": 6, "x": 18, "y": 10},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "(clamp_min(100 - clamp_max((\n  ((100 * sum(rate(container_cpu_cfs_throttled_periods_total{namespace=\"zomboid\", pod=~\"zomboid-.*\", container!=\"POD\", image!=\"\"}[5m])) / clamp_min(sum(rate(container_cpu_cfs_periods_total{namespace=\"zomboid\", pod=~\"zomboid-.*\", container!=\"POD\", image!=\"\"}[5m])), 1)) or vector(0))\n  + 0.5 * ((100 * sum(container_memory_working_set_bytes{namespace=\"zomboid\", pod=~\"zomboid-.*\", image!=\"\"}) / clamp_min(sum(kube_pod_container_resource_limits{namespace=\"zomboid\", pod=~\"zomboid-.*\", resource=\"memory\", unit=\"byte\"}), 1)) or vector(0))\n  + 0.3 * ((100 * max(kubelet_volume_stats_used_bytes{namespace=\"zomboid\", persistentvolumeclaim=~\"zomboid.*\"}) / clamp_min(max(kubelet_volume_stats_capacity_bytes{namespace=\"zomboid\", persistentvolumeclaim=~\"zomboid.*\"}), 1)) or vector(0))\n  + 20 * (sum(increase(kube_pod_container_status_restarts_total{namespace=\"zomboid\", pod=~\"zomboid-.*\"}[30m])) or vector(0))\n), 100), 0)) * (max(a2s_server_up{namespace=\"zomboid\"}) or max(a2s_up{namespace=\"zomboid\"}) or vector(1))"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": false, "showThresholdMarkers": true},
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 0,
              "min": 0,
              "max": 100,
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 40}, {"color": "green", "value": 70}]}
            },
            "overrides": []
          }
        },

        {
          "id": 13,
          "type": "timeseries",
          "title": "Players over time",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(a2s_server_players{namespace=\"zomboid\"}) or max(a2s_players{namespace=\"zomboid\"}) or vector(0)", "legendFormat": "players"}],
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Pod network (bytes/s)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"zomboid\", pod=~\"zomboid-.*\"}[5m]))", "legendFormat": "rx"},
            {"refId": "B", "expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"zomboid\", pod=~\"zomboid-.*\"}[5m]))", "legendFormat": "tx"}
          ],
          "fieldConfig": {"defaults": {"unit": "Bps"}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "Pod CPU (cores)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"zomboid\", pod=~\"zomboid-.*\", image!=\"\"}[5m]))", "legendFormat": "cpu"}],
          "fieldConfig": {"defaults": {"unit": "cores"}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Pod memory (bytes)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(container_memory_working_set_bytes{namespace=\"zomboid\", pod=~\"zomboid-.*\", image!=\"\"})", "legendFormat": "mem"}],
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 17,
          "type": "timeseries",
          "title": "CPU throttling % (over time)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 32},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "100 * sum(rate(container_cpu_cfs_throttled_periods_total{namespace=\"zomboid\", pod=~\"zomboid-.*\", container!=\"POD\", image!=\"\"}[5m])) / clamp_min(sum(rate(container_cpu_cfs_periods_total{namespace=\"zomboid\", pod=~\"zomboid-.*\", container!=\"POD\", image!=\"\"}[5m])), 1)", "legendFormat": "throttle%"}],
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 18,
          "type": "timeseries",
          "title": "PVC usage % (zomboid)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 32},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "100 * max(kubelet_volume_stats_used_bytes{namespace=\"zomboid\", persistentvolumeclaim=~\"zomboid.*\"}) / clamp_min(max(kubelet_volume_stats_capacity_bytes{namespace=\"zomboid\", persistentvolumeclaim=~\"zomboid.*\"}), 1)", "legendFormat": "pvc%"}],
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 19,
          "type": "timeseries",
          "title": "Joins / disconnects (logs, 5m)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 40},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {"refId": "A", "expr": "sum(count_over_time({namespace=\"zomboid\", pod=~\"zomboid-.*\"} |~ \"fully-connected\" [5m]))"},
            {"refId": "B", "expr": "sum(count_over_time({namespace=\"zomboid\", pod=~\"zomboid-.*\"} |~ \"\\\\[disconnected\\\\]\" [5m]))"}
          ],
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 20,
          "type": "timeseries",
          "title": "Errors/exceptions (logs, 5m)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 40},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum(count_over_time({namespace=\"zomboid\", pod=~\"zomboid-.*\"} |~ \"(?i)(error|exception)\" [5m]))"}],
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 21,
          "type": "logs",
          "title": "Zomboid logs",
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 48},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "{namespace=\"zomboid\", pod=~\"zomboid-.*\"}"}],
          "options": {"showLabels": false, "showTime": true, "wrapLogMessage": true, "sortOrder": "Descending"}
        }
      ]
    }
