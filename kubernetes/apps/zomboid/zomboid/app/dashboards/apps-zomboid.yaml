apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-apps-zomboid
  annotations:
    grafana_folder: Apps
  labels:
    grafana_dashboard: "1"
data:
  apps-zomboid.json: |-
    {
      "schemaVersion": 39,
      "title": "Apps / Zomboid",
      "uid": "apps-zomboid",
      "timezone": "browser",
      "tags": ["apps", "zomboid"],
      "editable": false,
      "graphTooltip": 0,
      "refresh": "30s",
      "time": {"from": "now-6h", "to": "now"},
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "A2S up",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "max(a2s_server_up{namespace=\"zomboid\", service=\"zomboid-metrics\"})",
              "legendFormat": "up"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0, "mappings": [{"options": {"0": {"text": "down"}, "1": {"text": "up"}}, "type": "value"}]}, "overrides": []}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Players",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "max(a2s_server_players{namespace=\"zomboid\", service=\"zomboid-metrics\"})",
              "legendFormat": "players"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Max players",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "max(a2s_server_max_players{namespace=\"zomboid\", service=\"zomboid-metrics\"})",
              "legendFormat": "max"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Map (A2S)",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "max by (map) (a2s_server_info{namespace=\"zomboid\", service=\"zomboid-metrics\"})",
              "legendFormat": "{{map}}"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "name"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Players over time",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "max(a2s_server_players{namespace=\"zomboid\", service=\"zomboid-metrics\"})",
              "legendFormat": "players"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "none", "decimals": 0}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Pod CPU (cores)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"zomboid\", pod=~\"zomboid-.*\", container=\"app\"}[5m]))",
              "legendFormat": "cpu"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "cores"}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Pod memory (bytes)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(container_memory_working_set_bytes{namespace=\"zomboid\", pod=~\"zomboid-.*\", container=\"app\"})",
              "legendFormat": "mem"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Pod network (bytes/s)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"zomboid\", pod=~\"zomboid-.*\"}[5m]))",
              "legendFormat": "rx"
            },
            {
              "refId": "B",
              "expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"zomboid\", pod=~\"zomboid-.*\"}[5m]))",
              "legendFormat": "tx"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "Bps"}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 9,
          "type": "logs",
          "title": "Zomboid logs",
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 20},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"zomboid\", pod=~\"zomboid-.*\"}"
            }
          ],
          "options": {
            "showLabels": false,
            "showTime": true,
            "wrapLogMessage": true,
            "sortOrder": "Descending"
          }
        }
      ]
    }
