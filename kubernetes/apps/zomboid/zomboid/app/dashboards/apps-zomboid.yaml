apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-apps-zomboid
  annotations:
    grafana_folder: Apps
  labels:
    grafana_dashboard: "1"
data:
  apps-zomboid.json: |-
    {
      "schemaVersion": 39,
      "title": "Apps / Zomboid",
      "uid": "apps-zomboid",
      "timezone": "browser",
      "tags": ["apps", "zomboid"],
      "editable": false,
      "graphTooltip": 0,
      "refresh": "30s",
      "time": {"from": "now-6h", "to": "now"},
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "A2S up",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "max(a2s_server_up{namespace=\\\"zomboid\\\"})",
              "legendFormat": "up"
            }
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "mappings": [
                {
                  "type": "value",
                  "options": {"0": {"text": "down"}, "1": {"text": "up"}}
                }
              ]
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Players (A2S)",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "max(a2s_server_players{namespace=\\\"zomboid\\\"})",
              "legendFormat": "players"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Max players (A2S)",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "max(a2s_server_max_players{namespace=\\\"zomboid\\\"})",
              "legendFormat": "max"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Map (A2S)",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "max by (map) (a2s_server_info{namespace=\\\"zomboid\\\"})",
              "legendFormat": "{{map}}"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "name"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 5,
          "type": "stat",
          "title": "CPU throttling % (5m)",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "100 * sum(rate(container_cpu_cfs_throttled_periods_total{namespace=\\\"zomboid\\\", pod=~\\\"zomboid-.*\\\", container=\\\"app\\\"}[5m])) / clamp_min(sum(rate(container_cpu_cfs_periods_total{namespace=\\\"zomboid\\\", pod=~\\\"zomboid-.*\\\", container=\\\"app\\\"}[5m])), 1)",
              "legendFormat": "throttle"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1}, "overrides": []
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Restarts (30m)",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\\\"zomboid\\\"}[30m]))",
              "legendFormat": "restarts"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Memory used % (current)",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "100 * sum(container_memory_working_set_bytes{namespace=\\\"zomboid\\\", pod=~\\\"zomboid-.*\\\", container=\\\"app\\\"}) / clamp_min(sum(kube_pod_container_resource_limits{namespace=\\\"zomboid\\\", pod=~\\\"zomboid-.*\\\", container=\\\"app\\\", resource=\\\"memory\\\", unit=\\\"byte\\\"}), 1)",
              "legendFormat": "mem%"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1}, "overrides": []}
        },
        {
          "id": 8,
          "type": "stat",
          "title": "PVC used % (zomboid)",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "100 * max(kubelet_volume_stats_used_bytes{namespace=\\\"zomboid\\\", persistentvolumeclaim=~\\\"zomboid.*\\\"}) / clamp_min(max(kubelet_volume_stats_capacity_bytes{namespace=\\\"zomboid\\\", persistentvolumeclaim=~\\\"zomboid.*\\\"}), 1)",
              "legendFormat": "pvc%"
            }
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1}, "overrides": []}
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Players over time",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "max(a2s_server_players{namespace=\\\"zomboid\\\"})",
              "legendFormat": "players"
            }
          ],
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Pod CPU (cores)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\\\"zomboid\\\", pod=~\\\"zomboid-.*\\\", container=\\\"app\\\"}[5m]))",
              "legendFormat": "cpu"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "cores"}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Pod memory (bytes)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(container_memory_working_set_bytes{namespace=\\\"zomboid\\\", pod=~\\\"zomboid-.*\\\", container=\\\"app\\\"})",
              "legendFormat": "mem"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "CPU throttling % (over time)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "100 * sum(rate(container_cpu_cfs_throttled_periods_total{namespace=\\\"zomboid\\\", pod=~\\\"zomboid-.*\\\", container=\\\"app\\\"}[5m])) / clamp_min(sum(rate(container_cpu_cfs_periods_total{namespace=\\\"zomboid\\\", pod=~\\\"zomboid-.*\\\", container=\\\"app\\\"}[5m])), 1)",
              "legendFormat": "throttle%"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "PVC usage % (zomboid)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "100 * max(kubelet_volume_stats_used_bytes{namespace=\\\"zomboid\\\", persistentvolumeclaim=~\\\"zomboid.*\\\"}) / clamp_min(max(kubelet_volume_stats_capacity_bytes{namespace=\\\"zomboid\\\", persistentvolumeclaim=~\\\"zomboid.*\\\"}), 1)",
              "legendFormat": "pvc%"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Metrics scrape p95 (s)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(scrape_duration_seconds_bucket{namespace=\\\"zomboid\\\"}[5m])))",
              "legendFormat": "p95"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 3}, "overrides": []},
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "Joins / disconnects (logs, 5m)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 32},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(count_over_time({namespace=\\\"zomboid\\\", pod=~\\\"zomboid-.*\\\"} |~ \\\"fully-connected\\\" [5m]))"
            },
            {
              "refId": "B",
              "expr": "sum(count_over_time({namespace=\\\"zomboid\\\", pod=~\\\"zomboid-.*\\\"} |~ \\\"\\\\[disconnected\\\\]\\\" [5m]))"
            }
          ],
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Errors/exceptions (logs, 5m)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 32},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(count_over_time({namespace=\\\"zomboid\\\", pod=~\\\"zomboid-.*\\\"} |~ \\\"(?i)(error|exception)\\\" [5m]))"
            }
          ],
          "options": {"legend": {"showLegend": true}}
        },
        {
          "id": 17,
          "type": "logs",
          "title": "Zomboid logs",
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 40},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\\\"zomboid\\\", pod=~\\\"zomboid-.*\\\"}"
            }
          ],
          "options": {
            "showLabels": false,
            "showTime": true,
            "wrapLogMessage": true,
            "sortOrder": "Descending"
          }
        }
      ]
    }
