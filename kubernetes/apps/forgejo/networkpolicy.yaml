---
# Zero-trust for forgejo (W7). The namespace label generates default-deny + allow-dns.
# Handled conservatively (same posture as harbor): this is the git server this very
# repo pushes/pulls through and Flux reconciles from, plus a general-purpose CI runner
# with a privileged DinD sidecar -- broad outbound is a real, unavoidable requirement
# here (arbitrary image pulls, arbitrary repo clones, package installs during CI
# steps), not a shortcut. Components talk to each other intra-namespace (forgejo app,
# forgejo-db, gitea-mirror, the runner, the secrets/token provisioner Jobs).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forgejo-allow-ingress
  labels:
    app.kubernetes.io/part-of: forgejo
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # intra-namespace component mesh (all ports) -- gitea-mirror/runner/provisioners
    # all talk to forgejo's HTTP API; app talks to db.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: forgejo
    # flux-system's source-controller fetches THIS repo's git tarball straight from
    # forgejo-http.forgejo.svc.cluster.local:3000 -- a genuine pod-to-service HTTP call
    # into this namespace, unlike any other app here. An explicit namespace-identity
    # rule, not the LAN ipBlock below: that ipBlock's /8 happens to mathematically cover
    # the pod-network range too, but relying on that overlap for the one dependency that
    # gates Flux reconciling the ENTIRE cluster (not just forgejo) isn't worth the risk
    # given this repo's own documented Cilium Service-VIP/identity gotchas (see
    # components/gateway-egress and components/cnpg-netpol).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: flux-system
      ports:
        - protocol: TCP
          port: 3000
    # renovate hits the Forgejo API + git-over-HTTP in-cluster: the
    # renovate-forgejo-provisioner Job and every webgrip-forgejo RenovateJob
    # worker pod (repo discovery, clones, PRs). Missed in the 2026-07-15
    # zero-trust rollout — Renovate-on-Forgejo was dead for 3 days (provisioner
    # curl timeouts to forgejo-http:3000) until this rule (2026-07-18).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: renovate
      ports:
        - protocol: TCP
          port: 3000
    # ploeg OpenHands workers clone/push branches and open PRs as agent-builder
    # (git-over-HTTP + REST API) — same in-cluster pod-to-service class as the
    # renovate rule above.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ploeg
      ports:
        - protocol: TCP
          port: 3000
    # keda-operator polls Forgejo's runner-queue API
    # (/api/v1/admin/runners/jobs?labels=...) every pollingInterval to size the
    # forgejo-runner + forgejo-agent-runner ScaledJobs. Same missed-rule class as the
    # renovate one above, but with a nastier failure mode than "no scaling": each blocked
    # poll hangs for the full 30s client timeout, so the operator's scaler cache exceeds
    # its ReaderDrainBudget, the scale loop stalls, the 5s leader-election lease renewal
    # misses, and the operator exits 1 ("leader election lost") and restarts. Symptom is
    # CI runs queueing forever behind minReplicaCount with zero completed requests to
    # that path in forgejo's own logs (2026-07-18).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keda
      ports:
        - protocol: TCP
          port: 3000
    # gateway (network ns) + LAN -- all ports (HTTP 3000, SSH 22, gitea-mirror UI 4321;
    # avoid port-guessing breaking git-over-ssh or the web UI, same rationale as harbor).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
        - ipBlock:
            cidr: 127.0.0.0/8
        - ipBlock:
            cidr: fd00::/8
        - ipBlock:
            cidr: ::1/128
    # Prometheus (observability ns) scraping forgejo metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
    # CNPG operator (cnpg-system) -> instance status (8000) + Postgres (5432).
    # Without this the operator can't extract instance status, so the Cluster
    # never reports Ready (CNPG-managed control-plane, not the app).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forgejo-allow-egress
  labels:
    app.kubernetes.io/part-of: forgejo
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # intra-namespace component mesh
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: forgejo
    # NOTE: egress to the envoy gateway (ns network) for forgejo's server-side OIDC
    # discovery to authentik is granted by the shared components/gateway-egress
    # component (see ADR-0005), NOT a rule here -- a CIDR/port rule cannot express it
    # under Cilium.
    # NOTE: kube-apiserver egress (CNPG instance manager, forgejo-runner-provisioner,
    # forgejo-ci-provisioner) is NOT granted here. Cilium matches API-server traffic by
    # the reserved `kube-apiserver` identity, so an ipBlock 10.43.0.1/32:443 rule here
    # silently never matches (this file shipped with exactly that rule on 2026-07-15 and
    # forgejo-db crash-looped on `dial tcp 10.43.0.1:443: i/o timeout` for two days).
    # The working allows are identity-based CiliumNetworkPolicies: components/cnpg-netpol
    # (wired in the forgejo-db layer) for the DB pods, and allow-provisioner-apiserver
    # (below) for the provisioner Jobs. Same trap as ADR-0005's gateway hairpin.
    # internet + LAN: Garage S3 (10.0.0.110:3900, forgejo's bulk-object storage +
    # backups), gitea-mirror pulling from GitHub, the CI runner pulling arbitrary
    # images/cloning arbitrary repos/installing packages during workflow steps.
    # Blocks only direct cross-namespace pod IPs (same shape as harbor's egress).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.42.0.0/16
              - 10.43.0.0/16
---
# Allow the provisioner Jobs to reach the kube-apiserver (RBAC-scoped Secret
# read/write; they run kubectl against the API). Must be identity-based
# (`toEntities: kube-apiserver`) — see the NOTE in forgejo-allow-egress above; a
# CIDR/port rule cannot express this under Cilium. Scoped to the provisioner Jobs'
# stable job-name labels rather than namespace-wide: this namespace also runs CI and
# AGENT runners executing arbitrary (and, for the agent pool, LLM-authored) workflow
# code, which must NOT gain network reach to the API. The agent runner pods are
# excluded here on purpose, and additionally run with automountServiceAccountToken:
# false and a no-authority ServiceAccount (ADR-0048).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-provisioner-apiserver
  labels:
    app.kubernetes.io/part-of: forgejo
spec:
  endpointSelector:
    matchExpressions:
      - key: job-name
        operator: In
        values:
          - forgejo-ci-provisioner
          - forgejo-runner-provisioner
          - forgejo-agent-runner-provisioner
          - agent-builder-provisioner
          - agent-reviewer-provisioner
  egress:
    - toEntities:
        - kube-apiserver
---
# Narrow hole in forgejo-allow-egress's `except: 10.43.0.0/16` for the ONE cross-namespace
# cluster service CI legitimately needs: OpenBao, for the cosign sign-and-attest step.
#
# The runner authenticates with a Forgejo Actions OIDC token exchanged at OpenBao's JWT auth
# (see the automountServiceAccountToken note in forgejo-runner/app/scaledjob.yaml). Without
# this rule the exchange cannot even open the socket: openbao's ClusterIP (10.43.0.0/16) falls
# in the blanket cross-namespace exclusion, so packets are DROPPED, not refused — which surfaces
# as `curl: (28) Failed to connect ... after 134948 ms` / `OpenBao JWT login HTTP 000000`, a
# timeout that reads like an OpenBao outage rather than a policy block.
#
# Scoped to the CI runner's own label, NOT podSelector {}: forgejo-agent-runner carries a
# different app.kubernetes.io/name and is deliberately excluded — it executes LLM-authored
# workflow code and must not reach a secrets backend (ADR-0048, same reasoning as
# allow-provisioner-apiserver above).
#
# Reachability is not authority: OpenBao still binds the signing role to the token's `sub`
# (repo:webgrip/infrastructure:ref:refs/heads/main), so opening the port grants no capability
# a workflow on another repo or branch could use.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forgejo-runner-allow-openbao
  labels:
    app.kubernetes.io/part-of: forgejo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: forgejo-runner
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: security
          podSelector:
            matchLabels:
              app.kubernetes.io/name: openbao
      ports:
        - protocol: TCP
          port: 8200
---
# Second narrow hole in forgejo-allow-egress's `except: 10.43.0.0/16`, same shape and same
# reasoning as forgejo-runner-allow-openbao above: the sign-and-attest step uploads the
# CycloneDX SBOM to Dependency-Track, whose ClusterIP also falls in the blanket
# cross-namespace exclusion.
#
# Kept as its OWN policy rather than a second rule on the OpenBao one so each policy's name
# still describes what it grants (NetworkPolicies are additive, so this composes cleanly).
#
# The upload is deliberately non-fatal in the action, so this failed as a `::warning::` with
# HTTP 000000 while the release itself went green — i.e. signing succeeded and Dependency-Track
# silently received nothing. Worth remembering: a best-effort step hides a policy block until
# someone notices the SBOM inventory is empty.
#
# Scoped to the CI runner only; forgejo-agent-runner stays excluded (ADR-0048).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forgejo-runner-allow-dependency-track
  labels:
    app.kubernetes.io/part-of: forgejo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: forgejo-runner
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: security
          podSelector:
            matchLabels:
              app.kubernetes.io/name: dependency-track-api-server
      ports:
        - protocol: TCP
          port: 8080
