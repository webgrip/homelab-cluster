---
# Zero-trust for forgejo (W7). The namespace label generates default-deny + allow-dns.
# Handled conservatively (same posture as harbor): this is the git server this very
# repo pushes/pulls through and Flux reconciles from, plus a general-purpose CI runner
# with a privileged DinD sidecar -- broad outbound is a real, unavoidable requirement
# here (arbitrary image pulls, arbitrary repo clones, package installs during CI
# steps), not a shortcut. Components talk to each other intra-namespace (forgejo app,
# forgejo-db, gitea-mirror, the runner, the secrets/token provisioner Jobs).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forgejo-allow-ingress
  labels:
    app.kubernetes.io/part-of: forgejo
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # intra-namespace component mesh (all ports) -- gitea-mirror/runner/provisioners
    # all talk to forgejo's HTTP API; app talks to db.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: forgejo
    # flux-system's source-controller fetches THIS repo's git tarball straight from
    # forgejo-http.forgejo.svc.cluster.local:3000 -- a genuine pod-to-service HTTP call
    # into this namespace, unlike any other app here. An explicit namespace-identity
    # rule, not the LAN ipBlock below: that ipBlock's /8 happens to mathematically cover
    # the pod-network range too, but relying on that overlap for the one dependency that
    # gates Flux reconciling the ENTIRE cluster (not just forgejo) isn't worth the risk
    # given this repo's own documented Cilium Service-VIP/identity gotchas (see
    # components/gateway-egress and components/cnpg-netpol).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: flux-system
      ports:
        - protocol: TCP
          port: 3000
    # renovate hits the Forgejo API + git-over-HTTP in-cluster: the
    # renovate-forgejo-provisioner Job and every webgrip-forgejo RenovateJob
    # worker pod (repo discovery, clones, PRs). Missed in the 2026-07-15
    # zero-trust rollout — Renovate-on-Forgejo was dead for 3 days (provisioner
    # curl timeouts to forgejo-http:3000) until this rule (2026-07-18).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: renovate
      ports:
        - protocol: TCP
          port: 3000
    # gateway (network ns) + LAN -- all ports (HTTP 3000, SSH 22, gitea-mirror UI 4321;
    # avoid port-guessing breaking git-over-ssh or the web UI, same rationale as harbor).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
        - ipBlock:
            cidr: 127.0.0.0/8
        - ipBlock:
            cidr: fd00::/8
        - ipBlock:
            cidr: ::1/128
    # Prometheus (observability ns) scraping forgejo metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
    # CNPG operator (cnpg-system) -> instance status (8000) + Postgres (5432).
    # Without this the operator can't extract instance status, so the Cluster
    # never reports Ready (CNPG-managed control-plane, not the app).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forgejo-allow-egress
  labels:
    app.kubernetes.io/part-of: forgejo
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # intra-namespace component mesh
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: forgejo
    # NOTE: egress to the envoy gateway (ns network) for forgejo's server-side OIDC
    # discovery to authentik is granted by the shared components/gateway-egress
    # component (see ADR-0005), NOT a rule here -- a CIDR/port rule cannot express it
    # under Cilium.
    # NOTE: kube-apiserver egress (CNPG instance manager, forgejo-runner-provisioner,
    # forgejo-ci-provisioner) is NOT granted here. Cilium matches API-server traffic by
    # the reserved `kube-apiserver` identity, so an ipBlock 10.43.0.1/32:443 rule here
    # silently never matches (this file shipped with exactly that rule on 2026-07-15 and
    # forgejo-db crash-looped on `dial tcp 10.43.0.1:443: i/o timeout` for two days).
    # The working allows are identity-based CiliumNetworkPolicies: components/cnpg-netpol
    # (wired in the forgejo-db layer) for the DB pods, and allow-provisioner-apiserver
    # (below) for the provisioner Jobs. Same trap as ADR-0005's gateway hairpin.
    # internet + LAN: Garage S3 (10.0.0.110:3900, forgejo's bulk-object storage +
    # backups), gitea-mirror pulling from GitHub, the CI runner pulling arbitrary
    # images/cloning arbitrary repos/installing packages during workflow steps.
    # Blocks only direct cross-namespace pod IPs (same shape as harbor's egress).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.42.0.0/16
              - 10.43.0.0/16
---
# Allow the provisioner Jobs to reach the kube-apiserver (RBAC-scoped Secret
# read/write; they run kubectl against the API). Must be identity-based
# (`toEntities: kube-apiserver`) — see the NOTE in forgejo-allow-egress above; a
# CIDR/port rule cannot express this under Cilium. Scoped to the provisioner Jobs'
# stable job-name labels rather than namespace-wide: this namespace also runs CI and
# AGENT runners executing arbitrary (and, for the agent pool, LLM-authored) workflow
# code, which must NOT gain network reach to the API. The agent runner pods are
# excluded here on purpose, and additionally run with automountServiceAccountToken:
# false and a no-authority ServiceAccount (ADR-0048).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-provisioner-apiserver
  labels:
    app.kubernetes.io/part-of: forgejo
spec:
  endpointSelector:
    matchExpressions:
      - key: job-name
        operator: In
        values:
          - forgejo-ci-provisioner
          - forgejo-runner-provisioner
          - forgejo-agent-runner-provisioner
          - agent-builder-provisioner
          - agent-reviewer-provisioner
  egress:
    - toEntities:
        - kube-apiserver
