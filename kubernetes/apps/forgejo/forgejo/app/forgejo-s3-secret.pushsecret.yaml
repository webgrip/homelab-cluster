---
# Migration phase 1 (seed): forgejo-s3-secret -> OpenBao secret/forgejo/s3.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: forgejo-s3-secret
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: forgejo-s3-secret
  data:
    - match: {secretKey: MINIO_ACCESS_KEY_ID, remoteRef: {remoteKey: forgejo/s3, property: MINIO_ACCESS_KEY_ID}}
    - match: {secretKey: MINIO_SECRET_ACCESS_KEY, remoteRef: {remoteKey: forgejo/s3, property: MINIO_SECRET_ACCESS_KEY}}
