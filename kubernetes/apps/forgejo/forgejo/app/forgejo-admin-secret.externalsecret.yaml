---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-admin-secret
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: forgejo-admin-secret, creationPolicy: Owner}
  data:
    - {secretKey: username, remoteRef: {key: forgejo/admin, property: username}}
    - {secretKey: password, remoteRef: {key: forgejo/admin, property: password}}
    - {secretKey: email, remoteRef: {key: forgejo/admin, property: email}}
