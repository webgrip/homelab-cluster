---
# TEMPLATE — Garage S3 credentials for Forgejo bulk storage (LFS/packages/attachments/avatars).
# (Git repositories always stay on the local PVC; only the heavy objects move to S3.)
#
# You already created the bucket + key on Garage:
#   garage bucket create forgejo
#   garage key create forgejo-app
#   garage bucket allow --read --write --owner forgejo --key forgejo-app
#   garage key info --show-secret forgejo-app   # <- copy Key ID + Secret below
#
# Then:
#   cd kubernetes/apps/forgejo/forgejo/app
#   cp forgejo-s3-secret.template.yaml forgejo-s3-secret.sops.yaml
#   # paste the key id/secret, then:
#   sops --encrypt --in-place forgejo-s3-secret.sops.yaml
#   # add `- ./forgejo-s3-secret.sops.yaml` to ./kustomization.yaml
#
# IMPORTANT — commit the secret together with the helmrelease storage block below,
# in the SAME change. If Forgejo gets STORAGE_TYPE=minio before this Secret exists,
# the pod fails to start (can't reach S3). The storage block to add under
# helmrelease.yaml `gitea.config` and `gitea.additionalConfigFromEnvs`:
#
#   gitea:
#     config:
#       storage:
#         STORAGE_TYPE: minio
#         MINIO_ENDPOINT: "10.0.0.110:3900"
#         MINIO_BUCKET: forgejo
#         MINIO_LOCATION: garage
#         MINIO_USE_SSL: false
#         MINIO_BUCKET_LOOKUP: path      # Garage needs path-style, not virtual-host
#     additionalConfigFromEnvs:
#       - name: FORGEJO__storage__MINIO_ACCESS_KEY_ID
#         valueFrom:
#           secretKeyRef: { name: forgejo-s3-secret, key: MINIO_ACCESS_KEY_ID }
#       - name: FORGEJO__storage__MINIO_SECRET_ACCESS_KEY
#         valueFrom:
#           secretKeyRef: { name: forgejo-s3-secret, key: MINIO_SECRET_ACCESS_KEY }
