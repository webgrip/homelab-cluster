---
# Migration phase 2 (seed): forgejo-oidc-secret -> OpenBao secret/forgejo/oidc.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: forgejo-oidc-secret
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: forgejo-oidc-secret
  data:
    - match: {secretKey: key, remoteRef: {remoteKey: forgejo/oidc, property: key}}
    - match: {secretKey: secret, remoteRef: {remoteKey: forgejo/oidc, property: secret}}
