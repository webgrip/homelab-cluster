---
# forgejo-s3-secret now sourced from OpenBao. Replaces forgejo-s3-secret.sops.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-s3-secret
  namespace: forgejo
spec:
  refreshInterval: 15m
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: forgejo-s3-secret, creationPolicy: Owner}
  data:
    - secretKey: MINIO_ACCESS_KEY_ID
      remoteRef: {key: forgejo/s3, property: MINIO_ACCESS_KEY_ID}
    - secretKey: MINIO_SECRET_ACCESS_KEY
      remoteRef: {key: forgejo/s3, property: MINIO_SECRET_ACCESS_KEY}
