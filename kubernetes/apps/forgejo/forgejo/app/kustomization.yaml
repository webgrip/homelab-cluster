---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  # server-side OIDC discovery to authentik hairpins through envoy-internal;
  # default-deny requires an identity-based egress allow to ns network (ADR-0005)
  - ../../../../components/gateway-egress
resources:
  - ./ocirepository.yaml
  - ./pvc.yaml
  - ./httproute.yaml
  - ./helmrelease.yaml
  - ./prometheusrule.yaml
  - ./forgejo-admin-secret.externalsecret.yaml
  - ./forgejo-admin-secret.pushsecret.yaml
  - ./forgejo-oidc-secret.externalsecret.yaml
  - ./forgejo-oidc-secret.pushsecret.yaml
  - ./forgejo-s3-secret.externalsecret.yaml
  - ./forgejo-s3-secret.pushsecret.yaml
configMapGenerator:
  # UI polish injected as GITEA_CUSTOM/templates/custom/header.tmpl (see the
  # HelmRelease extraVolumes); Reloader rolls the pod when the content changes.
  - name: forgejo-custom-header
    files:
      - header.tmpl=./custom/header.tmpl
    options:
      disableNameSuffixHash: true
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
