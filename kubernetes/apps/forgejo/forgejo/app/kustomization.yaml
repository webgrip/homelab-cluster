---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  # server-side OIDC discovery to authentik hairpins through envoy-internal;
  # default-deny requires an identity-based egress allow to ns network (ADR-0005)
  - ../../../../components/gateway-egress
resources:
  - ./ocirepository.yaml
  - ./pvc.yaml
  - ./httproute.yaml
  - ./helmrelease.yaml
  - ./prometheusrule.yaml
  - ./forgejo-admin-secret.externalsecret.yaml
  - ./forgejo-admin-secret.pushsecret.yaml
  - ./forgejo-oidc-secret.externalsecret.yaml
  - ./forgejo-oidc-secret.pushsecret.yaml
  - ./forgejo-s3-secret.externalsecret.yaml
  - ./forgejo-s3-secret.pushsecret.yaml
configMapGenerator:
  # Stable <head> stub injected as GITEA_CUSTOM/templates/custom/header.tmpl
  # (subPath mount); Reloader rolls the pod when THIS changes — keep it rare.
  - name: forgejo-custom-header
    files:
      - header.tmpl=./custom/header.tmpl
    options:
      disableNameSuffixHash: true
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
  # The actual UI (CSS/JS) served as static assets from a directory mount —
  # kubelet syncs ConfigMap updates live (~1min), NO pod restart: the Reloader
  # ignore annotation exempts this CM from the deployment's reloader auto.
  - name: forgejo-custom-assets
    files:
      - wg-custom.css=./custom/wg-custom.css
      - wg-pipeline.js=./custom/wg-pipeline.js
      - wg-pipeline-canary.js=./custom/wg-pipeline-canary.js
    options:
      disableNameSuffixHash: true
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
        reloader.stakater.com/ignore: "true"
