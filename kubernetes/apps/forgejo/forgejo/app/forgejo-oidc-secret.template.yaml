# TEMPLATE — not applied by Flux. Create the real encrypted Secret from this file:
#
#   cd kubernetes/apps/forgejo/forgejo/app
#   cp forgejo-oidc-secret.template.yaml forgejo-oidc-secret.sops.yaml
#   # fill key/secret from the Authentik "forgejo OIDC" provider, then:
#   sops --encrypt --in-place forgejo-oidc-secret.sops.yaml
#   # finally, uncomment the resource in ./kustomization.yaml and commit.
#
# `key`    = the OIDC Client ID from the Authentik provider
# `secret` = the OIDC Client Secret from the Authentik provider
# These are consumed by the gitea.oauth[0] login source (name: authentik).
---
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-oidc-secret
  namespace: forgejo
type: Opaque
stringData:
  key: "REPLACE_WITH_AUTHENTIK_CLIENT_ID"
  secret: "REPLACE_WITH_AUTHENTIK_CLIENT_SECRET"
