---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: forgejo-admin-secret
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: forgejo-admin-secret}}
  data:
    - match: {secretKey: username, remoteRef: {remoteKey: forgejo/admin, property: username}}
    - match: {secretKey: password, remoteRef: {remoteKey: forgejo/admin, property: password}}
    - match: {secretKey: email, remoteRef: {remoteKey: forgejo/admin, property: email}}
