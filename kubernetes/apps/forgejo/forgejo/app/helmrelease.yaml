---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd/helm-controller/main/docs/api/v2/helmrelease.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo
  interval: 30m
  timeout: 20m
  # Cap stored Helm release history Secrets (hygiene); a spec change here also
  # bumps the generation, which clears a RetriesExceeded stall and re-attempts.
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: uninstall
  values:
    serviceAccount:
      create: true

    # Forgejo is NOT HA-capable: keep a single replica and recreate on upgrade.
    strategy:
      type: Recreate
    replicaCount: 1

    # Prefer the apps-tier node (worker-1) to keep load off the RAM-tight soyo
    # control-planes; soft so it falls back to a soyo if that node is unavailable.
    # Hard-pin to the worker pool (ADR-0002), replacing the legacy soft
    # workload-tier=apps preference. Safe: the chart's deployment strategy is
    # already Recreate (no Multi-Attach on the RWO forgejo-data move) and the
    # forgejo-data PV has no node lock. gitops-critical soyo replica dropped
    # 2026-06-21 (ADR-0008); DR = external Garage S3 backups.
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node.webgrip.io/pool
                  operator: In
                  values:
                    - worker

    # Route the chart's default code.forgejo.org/forgejo/forgejo image through
    # the Harbor pull-through proxy-cache (ADR-0025) instead of direct.
    # Digest verified live (running pod imageID) and via `docker buildx
    # imagetools inspect` against the Harbor proxy before landing. VIK-242.
    image:
      registry: harbor.webgrip.dev
      repository: forgejo/forgejo/forgejo
      rootless: true
      digest: sha256:cc2d74fb4c30385a8ee34de8c8f83344f7316cec70bd2cc7eb82b2802fa28e0b

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"

    deployment:
      annotations:
        reloader.stakater.com/auto: "true"
      terminationGracePeriodSeconds: 60

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 2Gi

    # Chart default leaves initContainers.resources.limits empty (requests-only) --
    # add the memory limit validate-resources requires. VIK-244.
    initContainers:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 256Mi

    service:
      http:
        type: ClusterIP
        port: 3000
      # git-over-SSH on a dedicated Cilium LoadBalancer IP (LAN).
      ssh:
        type: LoadBalancer
        port: 22
        externalTrafficPolicy: Cluster
        annotations:
          lbipam.cilium.io/ips: "10.0.0.31"
          coredns.io/hostname: forgejo-ssh.${SECRET_DOMAIN}

    # Custom <head> template with CSS polish for the Actions UI (selectors
    # pinned to the deployed Forgejo minor — re-verify on major upgrades).
    extraVolumes:
      - name: custom-header
        configMap:
          name: forgejo-custom-header
    extraContainerVolumeMounts:
      - name: custom-header
        mountPath: /data/gitea/templates/custom/header.tmpl
        subPath: header.tmpl
        readOnly: true

    # Repos / LFS / packages / attachments / avatars live on this Longhorn RWO claim.
    persistence:
      enabled: true
      create: false
      mount: true
      claimName: forgejo-data

    gitea:
      # Break-glass local admin (gitea_admin). Credentials come from a SOPS Secret.
      admin:
        existingSecret: forgejo-admin-secret
        passwordMode: keepUpdated

      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack

      # Authentik OIDC login source. client_id/secret come from a SOPS Secret
      # (keys: key, secret) populated after the Authentik blueprint reconciles.
      oauth:
        - name: authentik
          provider: openidConnect
          existingSecret: forgejo-oidc-secret
          autoDiscoverUrl: https://authentik.${SECRET_DOMAIN}/application/o/forgejo/.well-known/openid-configuration
          # Request the groups claim and map Authentik groups -> Forgejo (replaces GitHub teams).
          scopes: "openid email profile groups"
          groupClaimName: groups
          # homelab-admins -> Forgejo SITE admins (so your SSO account stays admin —
          # make sure your user is in homelab-admins or login will demote it).
          adminGroup: homelab-admins
          # group -> {org: [teams]}. The "Developers" team must exist in the webgrip org
          # (create it once in the UI) for homelab-users to be added; missing teams are skipped.
          groupTeamMap: '{"homelab-admins":{"webgrip":["Owners"]},"homelab-users":{"webgrip":["Developers"]}}'
          # Keep team membership strictly in sync with Authentik groups (removes stragglers).
          groupTeamMapRemoval: true

      # Database credentials are injected from the CNPG-managed Secret (forgejo-db-app)
      # as app.ini overrides; non-secret DB settings live under config.database below.
      additionalConfigFromEnvs:
        - name: FORGEJO__database__USER
          valueFrom:
            secretKeyRef:
              name: forgejo-db-app
              key: username
        - name: FORGEJO__database__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-db-app
              key: password
        - name: FORGEJO__storage__MINIO_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: forgejo-s3-secret
              key: MINIO_ACCESS_KEY_ID
        - name: FORGEJO__storage__MINIO_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: forgejo-s3-secret
              key: MINIO_SECRET_ACCESS_KEY

      config:
        APP_NAME: "Forgejo: Webgrip Homelab"
        RUN_MODE: prod
        server:
          DOMAIN: forgejo.${SECRET_DOMAIN}
          ROOT_URL: https://forgejo.${SECRET_DOMAIN}/
          SSH_DOMAIN: forgejo-ssh.${SECRET_DOMAIN}
          SSH_PORT: 22
          SSH_LISTEN_PORT: 2222
          START_SSH_SERVER: true
          LANDING_PAGE: login
          LFS_START_SERVER: true
          OFFLINE_MODE: true
        database:
          DB_TYPE: postgres
          HOST: forgejo-db-rw.forgejo.svc.cluster.local:5432
          NAME: forgejo
          SSL_MODE: require
        # Sessions in Postgres so logins survive pod restarts (no Redis needed).
        session:
          PROVIDER: db
        cache:
          ADAPTER: memory
        queue:
          TYPE: level
        # SSO-managed: hide local signup, auto-provision Authentik users on first login.
        service:
          DISABLE_REGISTRATION: false
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true
          SHOW_REGISTRATION_BUTTON: false
          ENABLE_NOTIFY_MAIL: false
        openid:
          ENABLE_OPENID_SIGNIN: false
          ENABLE_OPENID_SIGNUP: false
        oauth2_client:
          ENABLE_AUTO_REGISTRATION: true
          ACCOUNT_LINKING: auto
          UPDATE_AVATAR: true
          OPENID_CONNECT_SCOPES: "openid profile email"
        # Forgejo Actions available; register a forgejo-runner later to execute jobs.
        actions:
          ENABLED: true
        security:
          INSTALL_LOCK: true
          # Trust X-Forwarded-* from the in-cluster Envoy proxy (pod CIDR) so client
          # IPs are correct now that the web UI is exposed via envoy-external.
          REVERSE_PROXY_TRUSTED_PROXIES: "10.42.0.0/16"
        # Allow webhooks to in-cluster services.
        webhook:
          ALLOWED_HOST_LIST: "*"
        metrics:
          ENABLED: true
        # Bulk objects (LFS/packages/attachments/avatars/artifacts) on Garage S3 to
        # keep the Longhorn PVC small; git repositories stay on the local PVC.
        # Garage requires path-style addressing and plain HTTP.
        storage:
          STORAGE_TYPE: minio
          MINIO_ENDPOINT: "10.0.0.110:3900"
          MINIO_BUCKET: forgejo
          MINIO_LOCATION: garage
          MINIO_USE_SSL: false
          MINIO_BUCKET_LOOKUP: path
