---
# forgejo-oidc-secret now sourced from OpenBao. Replaces forgejo-oidc-secret.sops.yaml.
# Authentik-minted client secret preserved (not rotated) — verify SSO login after swap.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-oidc-secret
  namespace: forgejo
spec:
  refreshInterval: 15m
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: forgejo-oidc-secret, creationPolicy: Owner}
  data:
    - secretKey: key
      remoteRef: {key: forgejo/oidc, property: key}
    - secretKey: secret
      remoteRef: {key: forgejo/oidc, property: secret}
