---
# yaml-language-server: $schema=../../../../../schemas/cnpg-cluster.schema.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: forgejo-db
  namespace: forgejo
  labels:
    monitoring.webgrip.io/enabled: "true"
spec:
  instances: 1
  # Pin the DB off the soyo control-planes onto the worker pool (ADR-0002).
  # gitops-critical soyo replica was dropped 2026-06-21 (ADR-0008) — DR is via
  # external Garage S3 backups, not a live soyo replica.
  affinity:
    nodeSelector:
      node.webgrip.io/pool: worker
  inheritedMetadata:
    annotations:
      reloader.stakater.com/auto: "true"
  storage:
    size: 10Gi
    storageClass: longhorn
  walStorage:
    size: 5Gi
    storageClass: longhorn
  postgresql:
    parameters:
      # Backup-tier policy: compress WAL full-page images to shrink the S3 archive
      # and local WAL. See docs/techdocs/docs/database-backup-tiers.md
      wal_compression: "zstd"
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: forgejo-db-store
        serverName: forgejo-db
  bootstrap:
    initdb:
      database: forgejo
      owner: forgejo
