---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cnpg-restore-test
spec:
  # Re-enabled, staggered overnight (one app per hour) so at most one restore
  # cluster exists at a time — bounds the control-plane/storage pressure that
  # caused the original suspension. concurrencyPolicy=Forbid prevents overlap.
  suspend: false
  schedule: "0 1 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: restore-test
              env:
                - name: SOURCE_CLUSTER
                  value: forgejo-db
                - name: RESTORE_CLUSTER
                  value: forgejo-db-restore
                - name: EXPECTED_DATABASE
                  value: forgejo
                - name: EXPECTED_ROLE
                  value: forgejo
                - name: BARMAN_OBJECT_NAME
                  value: forgejo-db-store
