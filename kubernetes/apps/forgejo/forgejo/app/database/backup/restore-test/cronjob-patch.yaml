---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cnpg-restore-test
spec:
  # Intentionally disabled for now (matches the cluster default to reduce
  # control-plane/storage pressure). Flip suspend to false to re-enable drills.
  suspend: true
  # Poll for a newly completed backup and run once per new backup.
  schedule: "*/10 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: restore-test
              env:
                - name: SOURCE_CLUSTER
                  value: forgejo-db
                - name: RESTORE_CLUSTER
                  value: forgejo-db-restore
                - name: EXPECTED_DATABASE
                  value: forgejo
                - name: EXPECTED_ROLE
                  value: forgejo
                - name: BARMAN_OBJECT_NAME
                  value: forgejo-db-store
