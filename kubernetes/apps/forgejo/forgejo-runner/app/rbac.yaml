---
# Identity for the forgejo-runner registration provisioner Job. The admin Secret it consumes is
# injected as env vars by the kubelet (secretKeyRef) — that path does NOT use this Role — so the
# only k8s API access it needs is over the ONE Secret it owns, forgejo-runner-secret: read it back
# (to skip when the stored uuid is already a well-formed runner UUID) and create-or-update it
# (kubectl apply). No other authority. Mirrors forgejo-ci-provisioner.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-runner-provisioner
  namespace: forgejo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-runner-provisioner
  namespace: forgejo
rules:
  # Read-back + update of the registration Secret this Job owns (kubectl get; kubectl apply patch).
  - apiGroups:
      - ""
    resources:
      - "secrets"
    resourceNames:
      - "forgejo-runner-secret"
    verbs:
      - "get"
      - "update"
      - "patch"
  # First-run creation only. RBAC cannot scope `create` by resourceName, so this is
  # namespace-wide on the type — the narrowest grant the API allows.
  - apiGroups:
      - ""
    resources:
      - "secrets"
    verbs:
      - "create"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-runner-provisioner
  namespace: forgejo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: forgejo-runner-provisioner
subjects:
  - kind: ServiceAccount
    name: forgejo-runner-provisioner
    namespace: forgejo
