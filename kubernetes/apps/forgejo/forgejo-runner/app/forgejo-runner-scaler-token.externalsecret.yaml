---
# forgejo-runner-scaler-token now sourced from OpenBao. Replaces forgejo-runner-scaler-token.sops.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-runner-scaler-token
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: forgejo-runner-scaler-token, creationPolicy: Owner}
  data:
    - secretKey: token
      remoteRef: {key: forgejo/runner-scaler, property: token}
