---
# TEMPLATE — the runner's connection identity (uuid + token).
#
# `register --token` is DEPRECATED in runner 12.x. Use the modern secret method:
# a 40-char hex secret IS the identity — its first 16 chars are the uuid, the
# remaining 24 are the token. Register it server-side, then derive both halves.
#
#   # 1. Generate a 40-char hex runner secret
#   SECRET=$(openssl rand -hex 20); echo "$SECRET"
#
#   # 2. Register it with Forgejo (server-side, inside the running pod).
#   #    Verify the exact subcommand first if needed:
#   #      kubectl -n forgejo exec deploy/forgejo -c forgejo -- forgejo forgejo-cli actions --help
#   kubectl -n forgejo exec deploy/forgejo -c forgejo -- \
#     forgejo forgejo-cli actions register \
#       --name forgejo-runner-k8s --labels docker --secret "$SECRET"
#
#   # 3. Split the secret into the two fields below:
#   echo "uuid:  ${SECRET:0:16}"
#   echo "token: ${SECRET:16}"
#
# Then:
#   cp forgejo-runner-secret.template.yaml forgejo-runner-secret.sops.yaml
#   sops --encrypt --in-place forgejo-runner-secret.sops.yaml
#   # uncomment the resource in ./kustomization.yaml and commit.
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-runner-secret
  namespace: forgejo
type: Opaque
stringData:
  uuid: ENC[AES256_GCM,data:9lSrDNAleIeCL6VFvkUiNA==,iv:fEp4/ibAoJRdbVhlmY9y5OTHf9WoqhS7JQgXOqRWRog=,tag:elRElvvZD53+Fg2vu6NAKQ==,type:str]
