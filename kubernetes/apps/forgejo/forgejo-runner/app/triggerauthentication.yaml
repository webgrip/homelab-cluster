# Auth for the KEDA Forgejo scaler — a Forgejo API token that can read pending jobs.
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: forgejo-runner-scaler
  namespace: forgejo
spec:
  secretTargetRef:
    - parameter: token
      name: forgejo-runner-scaler-token
      key: token
