---
# imagePullSecret for the runner pod's first-party images (harbor.webgrip.dev/webgrip/*).
#
# The runner toolchain is published to BOTH the in-cluster Harbor and ghcr.io, and we pull the
# Harbor copy: it is LAN-local (no internet round-trip on every cold node), it keeps working
# during an upstream/WAN outage, and it sidesteps ghcr package visibility entirely (new ghcr
# packages default to private, which kubelet cannot pull anonymously). Supply-chain coverage is
# unchanged: image-verify-harbor-audit already targets harbor.webgrip.dev/webgrip/*.
#
# Same OpenBao-backed robot credential Kyverno itself uses (secret/harbor/robot-webgrip); this
# is the workload-side copy, rendered into the forgejo namespace as a dockerconfigjson.
# Literal harbor.webgrip.dev (not ${SECRET_DOMAIN}): this Kustomization has no
# postBuild.substituteFrom, and adding one here would also envsubst the ScaledJob's inline
# shell (it references $PATH), so the literal is safer -- and matches the sidecar image refs
# in the same app.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pull
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target:
    name: harbor-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"harbor.webgrip.dev":{"username":"{{ .CI_USER }}","password":"{{ .CI_TOKEN }}","auth":"{{ printf "%s:%s" .CI_USER .CI_TOKEN | b64enc }}"}}}
  data:
    - {secretKey: CI_USER, remoteRef: {key: harbor/robot-webgrip, property: CI_USER}}
    - {secretKey: CI_TOKEN, remoteRef: {key: harbor/robot-webgrip, property: CI_TOKEN}}
