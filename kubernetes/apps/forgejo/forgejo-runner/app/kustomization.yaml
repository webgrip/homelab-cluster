---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./configmap.yaml
  - ./triggerauthentication.yaml
  - ./scaledjob.yaml
  # Shared per-node docker daemon (persistent image cache) + its access policy.
  - ./dind-daemonset.yaml
  # forgejo-runner-secret (uuid + token) is now minted and owned by the registration
  # provisioner Job (the old ESO ExternalSecret + migration PushSecret were removed: the
  # seed carried a malformed 16-hex uuid). The scaler token below stays OpenBao-backed.
  - ./rbac.yaml
  - ./forgejo-runner-provisioner.job.yaml
  - ./forgejo-runner-scaler-token.externalsecret.yaml
  - ./forgejo-runner-scaler-token.pushsecret.yaml
  - ./harbor-pull.externalsecret.yaml
