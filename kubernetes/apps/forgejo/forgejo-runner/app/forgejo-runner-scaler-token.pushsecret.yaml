---
# Migration phase 1 (seed): forgejo-runner-scaler-token -> OpenBao secret/forgejo/runner-scaler.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: forgejo-runner-scaler-token
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: forgejo-runner-scaler-token
  data:
    - match: {secretKey: token, remoteRef: {remoteKey: forgejo/runner-scaler, property: token}}
