# forgejo-runner config for ephemeral one-job runners.
# This runner is exactly one thing: an in-cluster privileged DinD runner. It advertises ONE
# honest label, `docker` — no GitHub-ARC (`arc-runner-set`) or `ubuntu-latest` aliases that
# pretend to be something they aren't. Workflows that need a specific toolchain declare their
# own `container:` (e.g. techdocs). All `.forgejo` workflows target `runs-on: docker`.
# Jobs reach the DinD sidecar via DOCKER_HOST=tcp://localhost:2376.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo
data:
  config.yaml: |-
    log:
      level: info
    runner:
      # One job per ephemeral pod; KEDA spawns more pods for more pending jobs.
      capacity: 1
      timeout: 1h
      labels:
        # The one honest label for this runner. `host` = steps run in the MAIN pod container, which
        # IS the ci-runner toolchain image (docker CLI + buildx plugin, git, php, dotnet). That
        # container shares the pod netns with the dind sidecar, so `docker build` reaches the daemon
        # at DOCKER_HOST=tcp://localhost:2376 with no cross-container networking. Workflows needing a
        # different toolchain set their own job-level `container:` (e.g. techdocs).
        - docker:host
    cache:
      # actions/cache is dead without this: it gates ACTIONS_CACHE_URL entirely.
      enabled: true
      # Point every runner at ONE shared server. The runner's own built-in cache server
      # writes to local disk, which on a scale-to-zero ScaledJob means each cache is
      # discarded with the pod that wrote it — enabling the cache without this line
      # would look configured and store nothing.
      # Origin only: the in-pod proxy overwrites the request path when forwarding, so a
      # path prefix here is silently dropped.
      external_server: "http://forgejo-cache-server.forgejo.svc.cluster.local:8088/"
      # Shared HMAC secret, minted once by forgejo-runner-provisioner. If it is empty the
      # runner generates a per-process secret and the server rejects every request with
      # 403 — the failure mode is a cache that never hits, not an error anyone notices.
      secret_url: "file:/run/forgejo-runner/cache-secret"
    container:
      # "-": use the DOCKER_HOST env (the runner pod exports tcp://<node-ip>:2375 — the shared
      # per-node dind DaemonSet, see dind-daemonset.yaml) and do NOT mount the docker host
      # into job containers.
      docker_host: "-"
      options: ""
      network: ""
      valid_volumes:
        - "**"
