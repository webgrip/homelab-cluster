# forgejo-runner config for ephemeral one-job runners.
# This runner is exactly one thing: an in-cluster privileged DinD runner. It advertises ONE
# honest label, `docker` — no GitHub-ARC (`arc-runner-set`) or `ubuntu-latest` aliases that
# pretend to be something they aren't. Workflows that need a specific toolchain declare their
# own `container:` (e.g. techdocs). All `.forgejo` workflows target `runs-on: docker`.
# Jobs reach the DinD sidecar via DOCKER_HOST=tcp://localhost:2376.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo
data:
  config.yaml: |-
    log:
      level: info
    runner:
      # One job per ephemeral pod; KEDA spawns more pods for more pending jobs.
      capacity: 1
      timeout: 1h
      labels:
        # The one honest label for this runner. `host` = steps run in the MAIN pod container, which
        # IS the github-runner toolchain image (docker CLI + buildx plugin, git, php, dotnet). That
        # container shares the pod netns with the dind sidecar, so `docker build` reaches the daemon
        # at DOCKER_HOST=tcp://localhost:2376 with no cross-container networking. Workflows needing a
        # different toolchain set their own job-level `container:` (e.g. techdocs).
        - docker:host
    cache:
      enabled: false
    container:
      # Talk to the in-pod rootless/privileged DinD sidecar.
      docker_host: tcp://localhost:2376
      options: ""
      network: ""
      valid_volumes:
        - "**"
