# KEDA ScaledJob: ARC-style autoscaling. The Forgejo scaler watches pending jobs for the
# `docker` label. minReplicaCount keeps a WARM POOL of runners blocked on `one-job --wait`
# (ready to grab a job with no cold-start); the scaler adds more — up to maxReplicaCount —
# when pending jobs exceed the pool. Each pod runs forgejo-runner `one-job` (registers, runs
# exactly one job, exits; KEDA backfills to maintain the floor) with a privileged DinD
# native-sidecar for image builds.
#
# Topology A, host-mode (ADR-0026 step 1, "prove the runner first"). The MAIN container is the
# webgrip ci-runner toolchain image (docker CLI + buildx plugin, git, php, dotnet); workflow
# steps run inside it (config.yaml maps `docker` -> host). It shares the pod netns with the dind
# sidecar, so DOCKER_HOST=tcp://localhost:2376 reaches the daemon directly. The ci-runner image
# doesn't ship forgejo-runner, so the `runner-bin` init container injects the static binary.
---
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: forgejo-runner
  namespace: forgejo
spec:
  pollingInterval: 15
  # Warm pool: keep runners always blocked on `one-job --wait` so routine jobs start with no
  # cold-start, then burst up to maxReplicaCount under load. KEDA backfills as a warm runner
  # takes a job and exits. Each pod (a privileged dind sidecar) reserves ~500m CPU / ~1.0Gi by
  # requests and runs 24/7 on the worker pool. Back to 2: the old "2nd warm runner Pending:
  # Insufficient memory" was driven by dind's oversized 4Gi mem LIMIT inflating node pressure;
  # that limit is now 1.5Gi (peak usage ~649Mi) and fringe-workstation (8c/~15Gi) has ample
  # headroom (~1.5c used). Set to 0 for pure scale-from-zero.
  # 4 (was 2): the warm floor is the ONLY scaling that works when the KEDA scaler's metric
  # read fails. 2026-07-18: a Renovate wave (~30 jobs) drained at 2 runners for 2+ hours,
  # starving a ci-runner release for 60+ min. Node math: ~1Gi requests/pod.
  #
  # CORRECTION (2026-07-18, later): that metric-read failure was NOT "the admin-jobs query
  # times out under a deep queue" as originally recorded here — the `keda` namespace was
  # simply missing from forgejo-allow-ingress, so EVERY poll was dropped by the netpol
  # regardless of queue depth (0 completed requests to that path in 45min of forgejo logs).
  # Fixed in apps/forgejo/networkpolicy.yaml; don't re-derive the timeout theory from this
  # comment.
  #
  # maxReplicaCount stays 6 and is NOT the effective ceiling: the worker pool is out of room
  # (fringe-workstation 93% CPU / 96% memory requests, worker-1 98% CPU), and runner pods
  # already hit FailedScheduling "Insufficient cpu, Insufficient memory" at this value.
  # Raising it only manufactures Pending pods and makes KEDA's queue numbers lie. The lever
  # that actually works is making CI do less work per push (see .forgejo/workflows/e2e.yml).
  minReplicaCount: 4
  maxReplicaCount: 6
  successfulJobsHistoryLimit: 3
  # 0: don't retain Failed runner Jobs. The warm-pool runner blocks on `one-job --wait`;
  # a real CI failure is visible in Forgejo's Actions UI, not worth a lingering k8s Job
  # object that trips the stock KubeJobFailed alert. Also reaps the old DeadlineExceeded
  # backlog on the next KEDA reconcile.
  failedJobsHistoryLimit: 0
  # gradual (KEDA default is "default" == immediate): on ANY change to this ScaledJob's spec,
  # the immediate strategy deletes every Job owned by the previous generation — including pods
  # mid-CI-job, which surfaces in Forgejo only as `⚙️ [runner]: context canceled`. Because a
  # ci-runner release bumps the digest below, the release job could kill its own runner. With
  # gradual, in-flight runners finish on the old spec and only new pods pick up the change
  # (each pod is `one-job`, so the fleet rolls over within one job's lifetime anyway).
  rollout:
    strategy: gradual
  jobTargetRef:
    parallelism: 1
    completions: 1
    backoffLimit: 0
    # NO activeDeadlineSeconds: the warm-pool runner intentionally blocks on `one-job --wait`
    # for a task; a 2h deadline killed idle waiters as DeadlineExceeded (false KubeJobFailed
    # churn every ~2h). Actual job runtime is capped by Forgejo's per-job timeout, which
    # cleanly signals the runner to stop — so the k8s deadline only ever hurt the warm pool.
    template:
      metadata:
        labels:
          app.kubernetes.io/name: forgejo-runner
      spec:
        restartPolicy: Never
        terminationGracePeriodSeconds: 30
        serviceAccountName: forgejo-runner
        # No ambient ServiceAccount token: CI signs via Forgejo Actions OIDC (a per-workflow
        # token exchanged at OpenBao's JWT auth) — it never needs the k8s SA token, so we
        # don't expose one to untrusted workflow code.
        automountServiceAccountToken: false
        # First-party images come from the in-cluster Harbor (private `webgrip` project), so the
        # kubelet needs the robot credential. Harbor is LAN-local, keeps working during a WAN
        # outage, and avoids ghcr package visibility (new ghcr packages default to private, which
        # an anonymous kubelet pull cannot fetch). image-verify-harbor-audit already covers
        # harbor.${SECRET_DOMAIN}/webgrip/*, so signature coverage is unchanged.
        imagePullSecrets:
          - name: harbor-pull
        nodeSelector:
          node.webgrip.io/pool: worker
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        securityContext:
          fsGroup: 1000
        # Docker-in-Docker as a native sidecar: starts before the runner and is
        # auto-terminated when the runner (main container) finishes its one job,
        # so the Job completes cleanly.
        initContainers:
          # Inject the forgejo-runner agent into the toolchain image: copy the static binary out
          # of the pinned forgejo/runner image into a shared volume the main container execs from.
          # No bespoke image rebuild needed to prove the runner (ADR-0026).
          - name: runner-bin
            image: harbor.webgrip.dev/forgejo/forgejo/runner:12.10.2@sha256:379b324d6942824b7487706c0a06be4d63e546c17b62bece4ae18c74364a8fae
            command:
              - sh
              - -ec
            args:
              - |
                cp "$(command -v forgejo-runner)" /dist/forgejo-runner
                chmod 0755 /dist/forgejo-runner
                # Seed DOCKER_CONFIG from the read-only harbor-pull secret. The dir itself MUST be
                # writable: `docker buildx create` mkdirs $DOCKER_CONFIG/buildx/certs and
                # docker/login-action rewrites config.json. Pointing DOCKER_CONFIG straight at the
                # secret mount fails with `ENOENT: no such file or directory, mkdir
                # '/harbor-docker/buildx/certs'`.
                cp /harbor-pull/config.json /docker-config/config.json
                # 0640, not 0600: this init runs as uid 1000 but the MAIN runner container is uid
                # 1001. They share only the fsGroup (1000) that owns every volume here, so group
                # read is what actually lets the runner read its own docker creds.
                chmod 0640 /docker-config/config.json
            volumeMounts:
              - name: runner-bin
                mountPath: /dist
              - name: harbor-docker-config
                mountPath: /harbor-pull
                readOnly: true
              - name: docker-config
                mountPath: /docker-config
            # Just a copy+chmod into a shared, fsGroup-writable emptyDir -- no root/privilege
            # of any kind needed, unlike the dind sidecar below.
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              runAsUser: 1000
              seccompProfile:
                type: RuntimeDefault
              capabilities: {drop: ["ALL"]}
            resources:
              requests: {cpu: 10m, memory: 32Mi}
              limits: {memory: 64Mi}
          - name: dind
            image: harbor.webgrip.dev/dockerhub/library/docker:29.5.3-dind@sha256:ad68e89b675740867a3bb96488a93fea9209ad36c6305bfba2664912d6dcf11a
            restartPolicy: Always
            securityContext:
              privileged: true
            env:
              - name: DOCKER_TLS_CERTDIR
                value: /certs
            volumeMounts:
              - name: docker-certs
                mountPath: /certs
              - name: docker-storage
                mountPath: /var/lib/docker
              # Same path as in the runner container: `docker run -v` bind-mounts resolve on THIS
              # daemon's fs, so a workspace the runner writes under /mnt/ci-shared is only visible
              # to containers if dind mounts the same volume at the same absolute path. The e2e
              # validators (flux-local, kyverno CLI, chainsaw) all `docker run -v $(mktemp -d)…`;
              # the workflow sets TMPDIR=/mnt/ci-shared to land those workspaces here.
              - name: ci-shared
                mountPath: /mnt/ci-shared
            startupProbe:
              exec:
                command:
                  - sh
                  - -c
                  - docker --tlsverify --tlscacert=/certs/client/ca.pem --tlscert=/certs/client/cert.pem --tlskey=/certs/client/key.pem -H tcp://localhost:2376 info
              initialDelaySeconds: 3
              periodSeconds: 2
              failureThreshold: 30
              # 5s, not the 1s default: under disk-IO saturation (fringe pegs at 40-90% IO-stall
              # during container-heavy CI) `docker info` answers slowly but the daemon is healthy.
              # With the default the probe timed out 12+ times in a row (2026-07-18), leaving fresh
              # warm pods stuck in Init for minutes -- shrinking runner capacity exactly when the
              # job queue was deepest, and eventually killing a healthy dind into a restart.
              timeoutSeconds: 5
            resources:
              # No CPU limit: let a lone build burst into the idle node (observed ~0.8 core peak).
              # 3Gi limit: the e2e chainsaw step runs a KinD cluster + 4 Kyverno controllers
              # INSIDE dind (~1.2-1.5Gi) — at the old 1536Mi ceiling `kind create --wait 2m`
              # timed out on fringe-workstation (e2e runs 17/23, 2026-07-13) while fitting on
              # worker-1. Requests stay low; the burst is short-lived and Burstable-class.
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 3Gi
        containers:
          - name: runner
            # Host-mode toolchain image (webgrip/infrastructure ops/docker/ci-runner): docker CLI +
            # buildx, git, php, dotnet, AND node 24 / python3+PyYAML / the Claude Code CLI. Runs as
            # the image's non-root `runner` user; the forgejo-runner agent is injected at /dist by
            # the runner-bin init container. Steps execute IN this container.
            #
            # Named ci-runner, not github-runner: the same image is BOTH a real GitHub Actions
            # runner under ARC and this Forgejo host-mode toolchain, so the old name only described
            # half its job.
            #
            # Because host-mode steps run here, workflows do not need their own `container:` — which
            # matters a lot: a job-level container is re-pulled and re-EXTRACTED into the ephemeral
            # DinD on every job, costing ~4min of "Set up job" on a node whose disk saturates at
            # ~12MB/s. This image is pulled once per node by the kubelet and containerd-caches it.
            #
            # Pulled from the in-cluster Harbor (not ghcr): LAN-local, survives a WAN outage, and
            # sidesteps ghcr package visibility. Verification is unchanged -- image-verify-harbor-audit
            # targets harbor.${SECRET_DOMAIN}/webgrip/*. Needs the harbor-pull imagePullSecret above.
            image: harbor.webgrip.dev/webgrip/ci-runner@sha256:dee7dee69c750cd41311a38ce5c6f73a848fe42545caba0ec80198b4ad06e1dd
            command:
              - bash
              - -ec
            args:
              - |
                # Host mode runs steps in THIS toolchain container. JS actions need `node`, which the
                # image bundles under externals/ but not on PATH — without this forgejo-runner dies
                # "Cannot find: node in PATH". node20 (glibc, v20.x) matches actions/checkout@v4's
                # declared runtime; node24 is also bundled at externals/node24/bin if needed.
                export PATH="/home/runner/externals/node20/bin:$PATH"
                # --wait blocks until Forgejo assigns a task. Required for the warm pool
                # (minReplicaCount): these pods start with no pending job, so without --wait they'd
                # exit immediately and KEDA would hot-loop respawning them. Harmless for burst pods
                # (a task is already pending, so it returns at once).
                exec /dist/forgejo-runner --config /config/config.yaml one-job \
                  --wait \
                  --url "http://forgejo-http.forgejo.svc.cluster.local:3000" \
                  --uuid "$(cat /run/forgejo-runner/uuid)" \
                  --token-url "file:///run/forgejo-runner/token"
            env:
              # Job-container pulls (`container:` in workflows) are made by THIS process's docker
              # client against the dind daemon — the kubelet imagePullSecret does not apply to
              # them. Point the client at the harbor-pull dockerconfigjson so private
              # harbor.webgrip.dev/webgrip/* images work as job containers; docker.io stays
              # anonymous (no creds for it in the config).
              # This is the WRITABLE emptyDir seeded by the runner-bin init container, NOT the
              # secret mount — buildx and docker/login-action both write inside DOCKER_CONFIG.
              - name: DOCKER_CONFIG
                value: /docker-config
              - name: DOCKER_HOST
                value: tcp://localhost:2376
              - name: DOCKER_CERT_PATH
                value: /certs/client
              - name: DOCKER_TLS_VERIFY
                value: "1"
            volumeMounts:
              - name: runner-bin
                mountPath: /dist
                readOnly: true
              - name: config
                mountPath: /config
              - name: registration
                mountPath: /run/forgejo-runner
                readOnly: true
              - name: docker-certs
                mountPath: /certs
                readOnly: true
              # Shared with the dind sidecar (see there) so dockerized validators can bind-mount
              # workspaces. Writable by the runner user via fsGroup 1000.
              - name: ci-shared
                mountPath: /mnt/ci-shared
              - name: docker-config
                mountPath: /docker-config
            resources:
              # No CPU limit: steps run host-mode here and burst to ~1 core on an idle node.
              # Mem peak ~796Mi/1Gi (78%, tight) over 7d, so raise the ceiling to 1.25Gi.
              # 3Gi (was 1280Mi): the ci-runner v1.0.3 Sign & Attest job was silently SIGKILLed
              # mid-syft at 22:50Z 2026-07-18 — syft catalogs the ~5GB toolchain image (CodeQL
              # bundle, PHP, .NET, Node) in-process and blows past 1.25Gi. The pod vanished
              # without reporting (task zombied at "running"), which is the OOM signature.
              # Requests unchanged — the burst is short-lived and Burstable-class.
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 3Gi
        volumes:
          - name: config
            configMap:
              name: forgejo-runner-config
          - name: registration
            secret:
              secretName: forgejo-runner-secret
          - name: docker-certs
            emptyDir: {}
          - name: docker-storage
            emptyDir: {}
          - name: runner-bin
            emptyDir: {}
          # Same harbor-pull dockerconfigjson the kubelet uses, re-shaped as a docker CLI config
          # file. Read-only (a secret volume always is), so it is only the SEED: the runner-bin
          # init container copies it into the writable `docker-config` emptyDir below, which is
          # what DOCKER_CONFIG actually points at.
          - name: harbor-docker-config
            secret:
              secretName: harbor-pull
              # 0440: the secret volume is owned root:1000 (fsGroup), and the init container that
              # reads it runs as uid 1000 — group read, not owner read, is the operative bit.
              defaultMode: 0440
              items:
                - key: .dockerconfigjson
                  path: config.json
          # The real DOCKER_CONFIG dir: writable so `docker buildx create` can mkdir buildx/certs
          # and docker/login-action can append registry creds for the verifyRelease build cache.
          - name: docker-config
            emptyDir: {}
          # tmpfs (RAM), not disk. This is where the e2e validators land their mktemp
          # workspaces (TMPDIR=/mnt/ci-shared). flux-local's render renames every
          # kustomization.yaml in its tree to .original and back per build -- metadata/IOPS-heavy
          # churn that pinned fringe-workstation's single disk at 57-91% busy for the whole
          # render (measured 2026-07-15). On disk that made flux-local slow AND starved the
          # concurrently-scheduled chainsaw job's KinD etcd of fsync IOPS ("etcdserver: request
          # timed out"). In RAM the churn is free and the physical disk stays idle for etcd.
          # sizeLimit caps RAM use (charged to the writing container's cgroup); the e2e
          # workspaces are ~100 MiB, well under it.
          - name: ci-shared
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
  triggers:
    - type: forgejo-runner
      metadata:
        name: forgejo-runner-k8s
        address: "http://forgejo-http.forgejo.svc.cluster.local:3000"
        global: "true"
        labels: "docker"
      authenticationRef:
        name: forgejo-runner-scaler
