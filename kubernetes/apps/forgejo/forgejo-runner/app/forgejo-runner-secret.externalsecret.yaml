---
# forgejo-runner-secret now sourced from OpenBao. Replaces forgejo-runner-secret.sops.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-runner-secret
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: forgejo-runner-secret, creationPolicy: Owner}
  data:
    - secretKey: token
      remoteRef: {key: forgejo/runner, property: token}
    - secretKey: uuid
      remoteRef: {key: forgejo/runner, property: uuid}
