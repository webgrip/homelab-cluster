# TEMPLATE — the ephemeral runner's registration identity (uuid + token).
#
# Generate it once by registering a runner against Forgejo. Easiest:
#   1. In Forgejo: Site Admin -> Actions -> Runners -> "Create new runner" -> copy the REGISTRATION TOKEN.
#   2. Produce a .runner identity (uuid + token) with the runner CLI, e.g. a throwaway pod:
#        kubectl -n forgejo run fjreg --rm -it --restart=Never \
#          --image=code.forgejo.org/forgejo/runner:12.10.2 -- \
#          forgejo-runner register --no-interactive \
#            --instance http://forgejo-http.forgejo.svc.cluster.local:3000 \
#            --token <REGISTRATION_TOKEN> --name forgejo-runner-k8s --labels docker
#      then read the produced .runner JSON and copy its "uuid" and "token" fields below.
#
# Then:
#   cp forgejo-runner-secret.template.yaml forgejo-runner-secret.sops.yaml
#   sops --encrypt --in-place forgejo-runner-secret.sops.yaml
#   # uncomment the resource in ./kustomization.yaml and commit.
---
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-runner-secret
  namespace: forgejo
type: Opaque
stringData:
  uuid: "REPLACE_WITH_RUNNER_UUID"
  token: "REPLACE_WITH_RUNNER_TOKEN"
