# TEMPLATE — a Forgejo API token for the KEDA Forgejo scaler to read pending jobs.
#
#   1. In Forgejo, as an admin: Settings -> Applications -> Generate New Token
#      (scopes: read:admin or read:repository — enough to query the actions job queue).
#   2. cp forgejo-runner-scaler-token.template.yaml forgejo-runner-scaler-token.sops.yaml
#      put the token in `token` below, then:
#      sops --encrypt --in-place forgejo-runner-scaler-token.sops.yaml
#   3. uncomment the resource in ./kustomization.yaml and commit.
---
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-runner-scaler-token
  namespace: forgejo
type: Opaque
stringData:
  token: "REPLACE_WITH_FORGEJO_API_TOKEN"
