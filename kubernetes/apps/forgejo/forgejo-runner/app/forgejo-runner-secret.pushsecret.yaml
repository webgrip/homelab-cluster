---
# Migration phase 1 (seed): forgejo-runner-secret -> OpenBao secret/forgejo/runner.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: forgejo-runner-secret
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: forgejo-runner-secret
  data:
    - match: {secretKey: token, remoteRef: {remoteKey: forgejo/runner, property: token}}
    - match: {secretKey: uuid, remoteRef: {remoteKey: forgejo/runner, property: uuid}}
