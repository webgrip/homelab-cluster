---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-mirror-env
  namespace: forgejo
data:
  NODE_ENV: "production"
  HOST: "0.0.0.0"
  PORT: "4321"
  BASE_URL: "/"
  DATABASE_URL: "file:data/gitea-mirror.db"
  BETTER_AUTH_URL: "https://gitea-mirror.${SECRET_DOMAIN}"
  PUBLIC_BETTER_AUTH_URL: "https://gitea-mirror.${SECRET_DOMAIN}"
  BETTER_AUTH_TRUSTED_ORIGINS: "https://gitea-mirror.${SECRET_DOMAIN}"
  MIRROR_ISSUE_CONCURRENCY: "3"
  MIRROR_PULL_REQUEST_CONCURRENCY: "5"
