---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea-mirror
spec:
  chartRef:
    kind: OCIRepository
    name: gitea-mirror
  interval: 1h
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: uninstall
  values:
    serviceAccount:
      gitea-mirror: {}
    controllers:
      gitea-mirror:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        pod:
          # Pin off the soyos onto the worker pool (ADR-0002); native nodeSelector
          # + Recreate (RWO longhorn-general volume → avoids Multi-Attach on the
          # move). Lands on fringe (WFFC-era volume predates worker-1).
          nodeSelector:
            node.webgrip.io/pool: worker
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            image:
              repository: harbor.webgrip.dev/ghcr/raylabshq/gitea-mirror
              tag: v3.21.0@sha256:ef101da58f0e8d4e1eab96e37ef8f90cf756a8c6d68ab977f8ce7e4b69cb1318
            envFrom:
              - configMapRef:
                  name: gitea-mirror-env
              - secretRef:
                  name: gitea-mirror-secret
            ports:
              - name: http
                containerPort: 4321
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                # Mirroring large repos (homelab-cluster) + issues/PRs/LFS spikes hard;
                # 512Mi was OOMKilled, so give it real headroom.
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - "ALL"
    service:
      app:
        ports:
          http:
            port: 4321
            targetPort: http
    persistence:
      data:
        existingClaim: gitea-mirror
        advancedMounts:
          gitea-mirror:
            app:
              - path: /app/data
