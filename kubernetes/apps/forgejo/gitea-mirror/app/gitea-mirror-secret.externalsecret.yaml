---
# gitea-mirror-secret now sourced from OpenBao (all keys via dataFrom.extract). Replaces SOPS.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: gitea-mirror-secret, namespace: forgejo}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: gitea-mirror-secret, creationPolicy: Owner}
  dataFrom:
    - extract: {key: gitea-mirror/app}
