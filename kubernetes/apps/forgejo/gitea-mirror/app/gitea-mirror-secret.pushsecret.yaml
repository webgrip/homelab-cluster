---
# Migration phase 5 (seed): gitea-mirror-secret (at-rest ENCRYPTION_SECRET) -> OpenBao.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: gitea-mirror-secret, namespace: forgejo}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: gitea-mirror-secret}}
  data:
    - match: {secretKey: BETTER_AUTH_SECRET, remoteRef: {remoteKey: gitea-mirror/app, property: BETTER_AUTH_SECRET}}
    - match: {secretKey: ENCRYPTION_SECRET, remoteRef: {remoteKey: gitea-mirror/app, property: ENCRYPTION_SECRET}}
