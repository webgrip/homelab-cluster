---
# TEMPLATE — session + token-encryption secrets for gitea-mirror.
# The app needs these to start; GitHub + Forgejo connections are configured in the
# web UI afterwards (gitea-mirror stores those encrypted in its SQLite using ENCRYPTION_SECRET).
#
#   # generate two independent random secrets:
#   echo "BETTER_AUTH_SECRET: $(openssl rand -hex 32)"
#   echo "ENCRYPTION_SECRET:  $(openssl rand -hex 32)"
#
#   cd kubernetes/apps/forgejo/gitea-mirror/app
#   cp gitea-mirror-secret.template.yaml gitea-mirror-secret.sops.yaml
#   # paste the two values, then:
#   sops --encrypt --in-place gitea-mirror-secret.sops.yaml
#   # add `- ./gitea-mirror-secret.sops.yaml` to ./kustomization.yaml and commit.
