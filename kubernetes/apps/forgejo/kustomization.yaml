---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: forgejo

components:
  - ../../components/sops
  - ../../components/resource-quota
  - ../../components/cnpg-backup
  # server-side OIDC discovery to authentik hairpins through envoy-internal;
  # default-deny requires an identity-based egress allow to ns network (ADR-0005)
  - ../../components/gateway-egress

resources:
  - ./namespace.yaml
  - ./networkpolicy.yaml
  - ./forgejo/database/ks.yaml
  - ./forgejo/ks.yaml
  - ./forgejo-runner/ks.yaml
  - ./forgejo-actions-secrets/ks.yaml
  - ./gitea-mirror/ks.yaml
