---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: forgejo

components:
  - ../../components/sops
  - ../../components/resource-quota
  - ../../components/cnpg-backup
  # gateway-egress lives in the forgejo APP layer (forgejo/app/kustomization.yaml),
  # matching the harbor convention and scripts/check-gateway-egress.sh, which
  # expects the component next to the OIDC-consuming app.

resources:
  - ./namespace.yaml
  - ./networkpolicy.yaml
  - ./forgejo/database/ks.yaml
  - ./forgejo/ks.yaml
  - ./forgejo-runner/ks.yaml
  - ./forgejo-agent-runner/ks.yaml
  - ./forgejo-actions-secrets/ks.yaml
  - ./gitea-mirror/ks.yaml
