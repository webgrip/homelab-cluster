---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: preview-host
spec:
  dependsOn:
    - name: forgejo
    # agent-builder-token (git-sync credential) is minted by the actions-secrets app.
    - name: forgejo-actions-secrets
  interval: 1h
  retryInterval: 5m
  path: ./kubernetes/apps/forgejo/preview-host/app
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: forgejo
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
