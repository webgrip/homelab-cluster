# Static file server for the dark-factory per-branch previews (git-synced tree).
# The SPA uses a hash router, so no SPA-fallback rewrite is needed — deep links are
# always index.html#/... . Plain files only.
server {
    listen 8080;
    server_name _;
    root /data/current;

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        autoindex off;
        try_files $uri $uri/index.html =404;
    }
}
