---
# preview-host: serves the dark-factory per-branch SPA previews (ADR-0048 iterate loop).
# CI publishes each branch's dist to the webgrip/previews repo under /<branch-slug>/;
# a git-sync sidecar pulls that repo every 30s into a shared emptyDir and nginx serves
# it at preview.${SECRET_DOMAIN}/<slug>/. Git history doubles as the retention story.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: preview-host
  namespace: forgejo
  labels:
    app.kubernetes.io/name: preview-host
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: preview-host
  template:
    metadata:
      labels:
        app.kubernetes.io/name: preview-host
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        node.webgrip.io/pool: worker
      securityContext:
        fsGroup: 65533
      containers:
        - name: git-sync
          # Sync-only sidecar; reads the previews repo as agent-builder (org team `agents`
          # grants read; the token Secret already exists for the runner pool).
          image: registry.k8s.io/git-sync/git-sync:v4.7.1@sha256:c5e1976da735bf0b53979f079a07475d77174c51863cd084e928ff6074480717
          env:
            - name: GITSYNC_REPO
              value: http://forgejo-http.forgejo.svc.cluster.local:3000/webgrip/previews.git
            - name: GITSYNC_REF
              value: main
            - name: GITSYNC_PERIOD
              value: 30s
            - name: GITSYNC_ROOT
              value: /data
            - name: GITSYNC_LINK
              value: current
            - name: GITSYNC_DEPTH
              value: "1"
            # Never give up: the repo may be briefly unreachable during forgejo restarts.
            - name: GITSYNC_MAX_FAILURES
              value: "-1"
            - name: GITSYNC_USERNAME
              value: agent-builder
            - name: GITSYNC_PASSWORD
              valueFrom:
                secretKeyRef: {name: agent-builder-token, key: FORGEJO_TOKEN}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65533
            runAsGroup: 65533
            readOnlyRootFilesystem: true
            seccompProfile: {type: RuntimeDefault}
            capabilities: {drop: ["ALL"]}
          volumeMounts:
            - name: data
              mountPath: /data
            # git-sync writes its gitconfig under HOME=/tmp; with readOnlyRootFilesystem
            # that MUST be a mount (crash-looped 11x without it: "can't create gitconfig").
            - name: tmp
              mountPath: /tmp
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits: {memory: 128Mi}
        - name: nginx
          image: harbor.webgrip.dev/dockerhub/nginxinc/nginx-unprivileged:1.31.1-alpine@sha256:cc300bd2e8776708a8c2c8686a74f06eadf221c5ce01e85d0e821955d7a730ab
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            readOnlyRootFilesystem: true
            seccompProfile: {type: RuntimeDefault}
            capabilities: {drop: ["ALL"]}
          resources:
            requests: {cpu: 5m, memory: 16Mi}
            limits: {memory: 64Mi}
      volumes:
        - name: data
          emptyDir:
            sizeLimit: 1Gi
        - name: nginx-conf
          configMap:
            name: preview-host-nginx
        - name: tmp
          emptyDir: {}
