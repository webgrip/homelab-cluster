---
# LAN-only preview host on the internal gateway; covered by the existing single-label
# wildcard cert. Deliberately not on envoy-external — previews are for manual testing.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: preview-host
  namespace: forgejo
  annotations:
    external-dns.alpha.kubernetes.io/exclude: "true"
spec:
  hostnames:
    - "preview.${SECRET_DOMAIN}"
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - name: preview-host
          port: 8080
