---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./pvc.yaml
  - ./deployment.yaml
  - ./service.yaml
configMapGenerator:
  - name: forgejo-cache-server-config
    files:
      - ./config.yaml
generatorOptions:
  disableNameSuffixHash: false
