---
# forgejo-runner cache-server config.
# Passed with `-c` rather than CLI flags because the only secret flag is `--secret`,
# which takes the literal value and would expose the shared HMAC secret in the process
# list. secret_url reads it from the mounted file instead.
cache:
  enabled: true
  dir: /data
  host: 0.0.0.0
  port: 8088
  secret_url: file:/run/forgejo-runner/cache-secret
