---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/v1/persistentvolumeclaim_v1.json
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-cache-server-data
  labels:
    app.kubernetes.io/name: forgejo-cache-server
    app.kubernetes.io/part-of: forgejo
spec:
  # RWO + a single replica: the bbolt index cannot be shared between writers.
  accessModes:
    - ReadWriteOnce
  # longhorn-general: an approved class (the storage-cnpg-governance Kyverno policy
  # allowlists only `longhorn | longhorn-general`). longhorn-cache would fit the workload
  # better — this data is regenerable and does not need replication — but adding it to the
  # policy allowlist is a governance change for its own PR, not a side effect of this one.
  storageClassName: longhorn-general
  resources:
    requests:
      storage: 20Gi
