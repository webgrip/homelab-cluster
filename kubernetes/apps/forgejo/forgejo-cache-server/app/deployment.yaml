---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/apps/v1/deployment_v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-cache-server
  labels:
    app.kubernetes.io/name: forgejo-cache-server
    # Required, not decorative: the forgejo-allow-ingress / forgejo-allow-egress
    # CiliumNetworkPolicies select on this label, so without it the runner pods cannot
    # reach this Service at all.
    app.kubernetes.io/part-of: forgejo
spec:
  replicas: 1
  strategy:
    # Recreate, never RollingUpdate: the cache index is bolthold/bbolt, which mmaps and
    # file-locks its database. Two replicas — even briefly during a rollout — either block
    # or corrupt. This is also why the PVC is RWO and replicas is pinned at 1.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo-cache-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo-cache-server
        app.kubernetes.io/part-of: forgejo
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: cache-server
          # Same pinned runner image the ScaledJob injects its binary from. The cache
          # server is a subcommand of that binary, so it is v1-protocol and MAC-protocol
          # correct by construction — third-party cache servers implementing GitHub's v2
          # twirp API do NOT work with this runner (it speaks only /_apis/artifactcache).
          image: harbor.webgrip.dev/forgejo/forgejo/runner:12.10.2@sha256:379b324d6942824b7487706c0a06be4d63e546c17b62bece4ae18c74364a8fae
          command:
            - forgejo-runner
          # -c, not flags: the only secret flag is `--secret`, which takes the literal
          # value and would publish the shared HMAC secret in the process list. The
          # secret itself is minted once by forgejo-runner-provisioner and shared with
          # every runner — a mismatch is a silent 403 on every cache call, because an
          # empty secret makes each runner process generate its own.
          args:
            - cache-server
            - -c
            - /config/config.yaml
          ports:
            - {name: http, containerPort: 8088}
          volumeMounts:
            - {name: data, mountPath: /data}
            - {name: runner-secret, mountPath: /run/forgejo-runner, readOnly: true}
            - {name: config, mountPath: /config, readOnly: true}
          resources:
            requests: {cpu: 25m, memory: 128Mi}
            limits: {memory: 1Gi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          livenessProbe:
            tcpSocket: {port: http}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket: {port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-cache-server-data
        - name: config
          configMap:
            name: forgejo-cache-server-config
        - name: runner-secret
          secret:
            secretName: forgejo-runner-secret
            items:
              - {key: cache-secret, path: cache-secret}
