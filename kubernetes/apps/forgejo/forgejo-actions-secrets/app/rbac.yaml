---
# Identity for the CI-bot provisioner Job: it reads its inputs (admin + bot-password Secrets) and
# writes the minted token Secret (forgejo-ci-token) it owns. No other authority.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-ci-provisioner
  namespace: forgejo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-ci-provisioner
  namespace: forgejo
rules:
  - apiGroups:
      - ""
    resources:
      - "secrets"
    verbs:
      - "get"
      - "create"
      - "update"
      - "patch"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-ci-provisioner
  namespace: forgejo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: forgejo-ci-provisioner
subjects:
  - kind: ServiceAccount
    name: forgejo-ci-provisioner
    namespace: forgejo
