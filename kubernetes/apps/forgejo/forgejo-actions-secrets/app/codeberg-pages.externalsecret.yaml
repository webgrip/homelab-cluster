---
# Codeberg Pages publish token, surfaced from OpenBao so the forgejo-actions-secrets CronJob can
# publish it as the `webgrip` org Actions secret CODEBERG_TOKEN. Consumed by the .forgejo reusable
# techdocs-deploy-codeberg (ADR-0022) to force-push the built TechDocs site to Codeberg's pages
# branch. Seed once: a Codeberg PAT (scope write:repository) at OpenBao secret/codeberg/pages key `token`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-codeberg
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: forgejo-codeberg, creationPolicy: Owner}
  data:
    - {secretKey: CODEBERG_TOKEN, remoteRef: {key: codeberg/pages, property: token}}
