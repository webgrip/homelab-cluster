---
# Dependency-Track API key, replicated from OpenBao into the forgejo namespace so the
# provisioner can publish it as a Forgejo org Actions secret (DT_API_KEY). The Forgejo
# CI supply-chain step uploads each image's CycloneDX SBOM to Dependency-Track.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-dependency-track
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: forgejo-dependency-track, creationPolicy: Owner}
  data:
    - {secretKey: DT_API_KEY, remoteRef: {key: dependency-track/api-key, property: api-key}}
