---
# Replicate the webgrip Harbor CI robot credential from OpenBao into the forgejo
# namespace so the forgejo-actions-secrets provisioner can publish it as Forgejo
# org-level Actions secrets. Source of truth is secret/harbor/robot-webgrip, which
# the harbor app generates in-cluster (generate-once + Retain) and mirrors to
# OpenBao — so nothing here is ever human-typed.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-harbor-robot
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: forgejo-harbor-robot, creationPolicy: Owner}
  data:
    - {secretKey: CI_USER, remoteRef: {key: harbor/robot-webgrip, property: CI_USER}}
    - {secretKey: CI_TOKEN, remoteRef: {key: harbor/robot-webgrip, property: CI_TOKEN}}
