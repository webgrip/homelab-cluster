---
# Stable, in-cluster-generated password for the Forgejo `webgrip-ci` CI bot. Never human-typed; it
# exists only so the provisioner can create the user and basic-auth as the bot to mint the scoped
# FORGEJO_TOKEN. generate-once + Retain keeps basic-auth working; deleting it regenerates (the
# provisioner resyncs the bot password on its next run).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-ci-bot-password
  namespace: forgejo
spec:
  refreshInterval: "0" # generate once
  target:
    name: forgejo-ci-bot-password
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator
      rewrite:
        - regexp: {source: "password", target: "password"}
