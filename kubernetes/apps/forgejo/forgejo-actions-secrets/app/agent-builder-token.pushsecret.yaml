---
# Seed the provisioner-minted agent-builder token into OpenBao KV
# (secret/forgejo/agent-builder) so the ploeg namespace can read the SAME
# credential for its OpenHands worker Jobs (clone/push/PR as agent-builder).
# push.hcl already grants write on secret/data/* + secret/metadata/*.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: agent-builder-token
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: agent-builder-token}}
  data:
    - match: {secretKey: FORGEJO_TOKEN, remoteRef: {remoteKey: forgejo/agent-builder, property: FORGEJO_TOKEN}}
