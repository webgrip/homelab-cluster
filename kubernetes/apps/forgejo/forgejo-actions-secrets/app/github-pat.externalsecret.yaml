---
# GitHub PAT, surfaced from OpenBao so the forgejo-actions-secrets CronJob can publish it as the
# `webgrip` org Actions secrets:
#   GHCR_USERNAME / GHCR_TOKEN   Forgejo -> GHCR push (release-distribute-ghcr) + GHCR cosign sign
#   GH_RELEASE_TOKEN             mirror the Release object onto the github.com mirror's Releases tab
# Forgejo is the sole release authority; these just let it fan out to GHCR + GitHub Releases.
# GHCR_/GH_ are NOT reserved Forgejo prefixes (only GITHUB_/GITEA_/FORGEJO_ are), so they publish fine.
# Seed once: a GitHub PAT (classic: write:packages + repo) at OpenBao secret/github/ci-pat with keys
# `username` (the PAT owner / a machine user with write:packages on the webgrip org) and `token`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-github-pat
  namespace: forgejo
spec:
  refreshInterval: 15m
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: forgejo-github-pat, creationPolicy: Owner}
  data:
    - {secretKey: GHCR_USERNAME, remoteRef: {key: github/ci-pat, property: username}}
    - {secretKey: GHCR_TOKEN, remoteRef: {key: github/ci-pat, property: token}}
    # Same PAT (it needs both write:packages and repo scope); a separate release-only token can be
    # split out later by pointing this at a different OpenBao property.
    - {secretKey: GH_RELEASE_TOKEN, remoteRef: {key: github/ci-pat, property: token}}
