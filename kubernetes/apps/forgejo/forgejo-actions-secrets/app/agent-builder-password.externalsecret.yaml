---
# Stable, in-cluster-generated password for the Forgejo `agent-builder` dark-factory bot
# (ADR-0048). Never human-typed; it exists only so the provisioner can create the user and
# basic-auth as the bot to mint its scoped token. generate-once + Retain keeps basic-auth
# working; deleting it regenerates (the provisioner resyncs on its next run).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-builder-password
  namespace: forgejo
spec:
  refreshInterval: "0" # generate once
  target:
    name: agent-builder-password
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator
      rewrite:
        - regexp: {source: "password", target: "password"}
