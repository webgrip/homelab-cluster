---
# Tier-1 "do-once, gated, idempotent" bootstrap Job (ADR-0003), mirroring
# renovate-forgejo-provisioner. Ensures the `webgrip-ci` CI bot exists, gives it org-wide write in
# `webgrip`, and mints a scoped token into Secret forgejo-ci-token. The forgejo-actions-secrets
# CronJob then publishes that token as the org Actions secret WEBGRIP_CI_TOKEN (consumed by
# semantic-release + techdocs). Re-runs only on spec change (Flux force: true). All Forgejo calls go
# to the in-cluster Service. This app's Kustomization has NO postBuild.substituteFrom, so braced
# ${VARS} are left for the shell (BOT_EMAIL is a literal to avoid needing SECRET_DOMAIN).
apiVersion: batch/v1
kind: Job
metadata:
  name: forgejo-ci-provisioner
  namespace: forgejo
  labels:
    # If this Job exhausts its backoff (terminal Failed), the Kyverno
    # cleanup-opt-in-failed-jobs policy deletes it hourly and Flux recreates it =
    # automatic retry. Complete runs are never touched (do-once marker, ADR-0003).
    cleanup.webgrip.io/retry-failed: "true"
spec:
  backoffLimit: 4
  template:
    spec:
      serviceAccountName: forgejo-ci-provisioner
      restartPolicy: Never
      # Keep this stateless bootstrap Job off the soyo control-planes (ADR-0002);
      # no reason to spill onto etcd nodes (AppsTierWorkloadSpilledToControlPlane).
      nodeSelector:
        node.webgrip.io/pool: worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: provision
          image: harbor.webgrip.dev/dockerhub/alpine/k8s:1.36.2@sha256:44ef4942e171939b9c665a4a84beb80e2dcdb9a24330d4651cfdfd2e9deecc47
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /tmp
            - name: FORGEJO_URL
              value: http://forgejo-http.forgejo.svc.cluster.local:3000
            - name: NAMESPACE
              value: forgejo
            - name: ORG
              value: webgrip
            - name: TOKEN_SECRET
              value: forgejo-ci-token
            - name: TOKEN_NAME
              value: webgrip-ci-actions
            - name: BOT_USERNAME
              value: webgrip-ci
            - name: BOT_EMAIL
              value: webgrip-ci@webgrip.dev
            - name: ADMIN_USERNAME
              valueFrom: {secretKeyRef: {name: forgejo-admin-secret, key: username}}
            - name: ADMIN_PASSWORD
              valueFrom: {secretKeyRef: {name: forgejo-admin-secret, key: password}}
            - name: BOT_PASSWORD
              valueFrom: {secretKeyRef: {name: forgejo-ci-bot-password, key: password}}
          command:
            - /bin/sh
            - -ceu
            - |
              api="${FORGEJO_URL}/api/v1"
              admin="${ADMIN_USERNAME}:${ADMIN_PASSWORD}"
              bot="${BOT_USERNAME}:${BOT_PASSWORD}"

              # 1) Ensure the bot user exists.
              code="$(curl -sS -o /dev/null -w '%{http_code}' -u "$admin" "$api/users/${BOT_USERNAME}")"
              if [ "$code" = "404" ]; then
                echo "creating bot user ${BOT_USERNAME}"
                curl -fsS -u "$admin" -H 'Content-Type: application/json' -X POST "$api/admin/users" \
                  -d "{\"username\":\"${BOT_USERNAME}\",\"email\":\"${BOT_EMAIL}\",\"password\":\"${BOT_PASSWORD}\",\"must_change_password\":false}" >/dev/null
              elif [ "$code" != "200" ]; then
                echo "unexpected status probing bot user: $code" >&2; exit 1
              fi

              # 2) Reuse the stored token if it still authenticates AND can reach the package
              #    API (a token minted before write:package was added authenticates fine but
              #    401s package uploads — reqPackageAccess); else (re)mint with current scopes.
              tok="$(kubectl -n "$NAMESPACE" get secret "$TOKEN_SECRET" -o jsonpath='{.data.FORGEJO_TOKEN}' 2>/dev/null | base64 -d 2>/dev/null || true)"
              if [ -n "$tok" ] && curl -fsS -o /dev/null -H "Authorization: token $tok" "$api/user" \
                 && curl -fsS -o /dev/null -H "Authorization: token $tok" "$api/packages/${ORG}?limit=1"; then
                echo "existing token still valid — no change"
              else
                echo "minting a fresh token"
                curl -fsS -u "$admin" -H 'Content-Type: application/json' -X PATCH "$api/admin/users/${BOT_USERNAME}" \
                  -d "{\"login_name\":\"${BOT_USERNAME}\",\"source_id\":0,\"password\":\"${BOT_PASSWORD}\",\"must_change_password\":false}" >/dev/null
                curl -sS -o /dev/null -u "$bot" -X DELETE "$api/users/${BOT_USERNAME}/tokens/${TOKEN_NAME}" || true
                tok="$(curl -fsS -u "$bot" -H 'Content-Type: application/json' -X POST "$api/users/${BOT_USERNAME}/tokens" \
                  -d "{\"name\":\"${TOKEN_NAME}\",\"scopes\":[\"write:repository\",\"write:package\",\"read:user\",\"write:issue\",\"read:organization\"]}" | jq -r '.sha1')"
                [ -n "$tok" ] && [ "$tok" != "null" ] || { echo "token mint failed" >&2; exit 1; }
                kubectl -n "$NAMESPACE" create secret generic "$TOKEN_SECRET" \
                  --from-literal="FORGEJO_TOKEN=$tok" \
                  --dry-run=client -o yaml | kubectl apply -f - >/dev/null
                echo "wrote Secret $TOKEN_SECRET"
              fi

              # 3) Give the bot org-wide write in webgrip (team 'ci', write, all repos) so
              #    semantic-release can create releases/tags, publish org packages, and
              #    techdocs can push. Idempotent. Forgejo authorizes per-UNIT: without
              #    repo.releases the bot could git-push (repo.code) while POST /releases
              #    403'd at reqRepoWriter (2026-07-12, webgrip-ai-skills run 15) — so the
              #    units are PATCHed on every run; a create-time list can't fix a live team.
              units='["repo.code","repo.issues","repo.pulls","repo.releases"]'
              tid="$(curl -fsS -u "$admin" "$api/orgs/${ORG}/teams" 2>/dev/null | jq -r '.[] | select(.name=="ci") | .id' | head -1)"
              if [ -z "$tid" ]; then
                tid="$(curl -fsS -u "$admin" -H 'Content-Type: application/json' -X POST "$api/orgs/${ORG}/teams" \
                  -d "{\"name\":\"ci\",\"description\":\"webgrip CI bot — write, all repos\",\"permission\":\"write\",\"includes_all_repositories\":true,\"can_create_org_repo\":false,\"units\":${units}}" | jq -r '.id // empty')"
              else
                curl -fsS -o /dev/null -u "$admin" -H 'Content-Type: application/json' -X PATCH "$api/teams/$tid" \
                  -d "{\"name\":\"ci\",\"permission\":\"write\",\"includes_all_repositories\":true,\"can_create_org_repo\":false,\"units\":${units}}"
              fi
              if [ -n "$tid" ]; then
                # Member add lives at /teams/{id}/members — there is no /orgs/{org}/teams/{id}/...
                # route (the old unchecked curl against it 404'd silently, so the bot was never in
                # the team and semantic-release failed its push-permission check). -f + a read-back
                # so a regression can't report success again.
                curl -fsS -o /dev/null -u "$admin" -X PUT "$api/teams/$tid/members/${BOT_USERNAME}"
                curl -fsS -o /dev/null -u "$admin" "$api/teams/$tid/members/${BOT_USERNAME}" \
                  && echo "bot in ${ORG}/ci (id $tid)"
              else
                echo "WARN: could not ensure ${ORG}/ci membership" >&2
              fi
              echo "ci provisioner converged"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          resources:
            requests: {cpu: 10m, memory: 64Mi}
            limits: {memory: 256Mi}
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: tmp
          emptyDir: {}
