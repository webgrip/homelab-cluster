---
# Publishes webgrip's CI credentials + config as Forgejo ORG-LEVEL Actions secrets/variables for
# the `webgrip` org, so workflows on the in-cluster Forgejo runner can publish + release:
#   secret  HARBOR_ROBOT_USER / HARBOR_ROBOT_TOKEN     push to the private `webgrip` project
#   secret  DT_API_KEY                                 Dependency-Track SBOM upload
#   secret  WEBGRIP_CI_TOKEN                           CI bot token (minted by forgejo-ci-provisioner)
#   var     WEBGRIP_FORGEJO_URL / WEBGRIP_CI_BOT_NAME  consumed by semantic-release + techdocs
# NB: names are WEBGRIP_-prefixed, NOT FORGEJO_/GITHUB_/GITEA_ — Forgejo Actions reserves those
# prefixes for built-ins and rejects them (secret PUT 400, var POST/PUT 400/404).
# Harbor is LAN-only, so only the in-cluster runner can reach it — hence these live in Forgejo, not
# GitHub. Harbor creds are required; the rest are best-effort. Cosign signing does NOT go through
# here — the runner signs via OpenBao Transit (OIDC), so the signing key is never a Forgejo secret.
#
# There is no ESO push-provider for Forgejo Actions secrets, so this mirrors the
# established "in-cluster Job hits the Forgejo admin API" pattern
# (renovate-forgejo-provisioner). A CronJob (not a one-shot Job) keeps it zero-touch
# and self-healing: it re-converges hourly after a Forgejo DB restore or a robot
# token rotation, with no human in the loop. Idempotent + fail-soft — a missing
# credential or a restarting Forgejo never crashloops or alerts.
#
# Forgejo secret values are write-only over the API (can't be read back), so the
# PUT runs every tick; that is harmless (create-or-update). The token is never
# logged — only secret NAMES are. The robot username's literal `$` (robot$webgrip+ci)
# is carried in the Secret value and JSON-encoded via jq, so no shell re-expansion.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: forgejo-actions-secrets
  namespace: forgejo
spec:
  schedule: "23 * * * *" # hourly, off the top of the hour
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 21600 # GC finished jobs after 6h
      template:
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false # only talks to the Forgejo HTTP API, never the k8s API
          # Keep this hourly Job off the soyo control-planes (ADR-0028)
          # (AppsTierWorkloadSpilledToControlPlane).
          nodeSelector:
            node.webgrip.io/pool: worker
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile: {type: RuntimeDefault}
          containers:
            - name: provision
              # alpine/k8s ships curl + jq + a shell (same image family as the other API provisioners).
              image: docker.io/alpine/k8s:1.36.1@sha256:692239d739589247c4a791205ed9619c28ae85a21286e19a6211c04a62c56668
              imagePullPolicy: IfNotPresent
              env:
                - name: HOME
                  value: /tmp
                - name: FORGEJO_URL
                  value: http://forgejo-http.forgejo.svc.cluster.local:3000
                - name: ORG
                  value: webgrip
                # Site-admin credentials — the only identity allowed to manage org Actions secrets.
                - name: ADMIN_USERNAME
                  valueFrom:
                    secretKeyRef: {name: forgejo-admin-secret, key: username, optional: true}
                - name: ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef: {name: forgejo-admin-secret, key: password, optional: true}
                # Harbor robot credential, replicated from OpenBao into this namespace.
                - name: HARBOR_ROBOT_USER
                  valueFrom:
                    secretKeyRef: {name: forgejo-harbor-robot, key: CI_USER, optional: true}
                - name: HARBOR_ROBOT_TOKEN
                  valueFrom:
                    secretKeyRef: {name: forgejo-harbor-robot, key: CI_TOKEN, optional: true}
                # Dependency-Track API key (SBOM upload sink), from OpenBao dependency-track/api-key.
                - name: DT_API_KEY
                  valueFrom:
                    secretKeyRef: {name: forgejo-dependency-track, key: DT_API_KEY, optional: true}
                # CI bot token, minted in-cluster by the forgejo-ci-provisioner Job.
                - name: FORGEJO_TOKEN
                  valueFrom:
                    secretKeyRef: {name: forgejo-ci-token, key: FORGEJO_TOKEN, optional: true}
                # Codeberg Pages publish token (techdocs-deploy-codeberg), from OpenBao codeberg/pages.
                - name: CODEBERG_TOKEN
                  valueFrom:
                    secretKeyRef: {name: forgejo-codeberg, key: CODEBERG_TOKEN, optional: true}
                # GitHub PAT for Forgejo's GHCR fan-out (push + cosign sign) and the GitHub Release mirror.
                - name: GHCR_USERNAME
                  valueFrom:
                    secretKeyRef: {name: forgejo-github-pat, key: GHCR_USERNAME, optional: true}
                - name: GHCR_TOKEN
                  valueFrom:
                    secretKeyRef: {name: forgejo-github-pat, key: GHCR_TOKEN, optional: true}
                - name: GH_RELEASE_TOKEN
                  valueFrom:
                    secretKeyRef: {name: forgejo-github-pat, key: GH_RELEASE_TOKEN, optional: true}
                # Org VARIABLES (non-secret) the .forgejo reusable workflows read.
                - name: FORGEJO_INSTANCE_URL
                  value: https://forgejo.webgrip.dev
                - name: WEBGRIP_CI_BOT_NAME
                  value: webgrip-ci
              command:
                - /bin/sh
                - -ceu
                - |
                  api="${FORGEJO_URL}/api/v1"

                  # Fail-soft: if any input is missing, exit 0 and retry next tick.
                  if [ -z "${ADMIN_USERNAME:-}" ] || [ -z "${ADMIN_PASSWORD:-}" ]; then
                    echo "[forgejo-actions-secrets] forgejo admin creds not present yet; exiting 0 (will retry)"; exit 0
                  fi
                  if [ -z "${HARBOR_ROBOT_USER:-}" ] || [ -z "${HARBOR_ROBOT_TOKEN:-}" ]; then
                    echo "[forgejo-actions-secrets] harbor robot creds not present yet; exiting 0 (will retry)"; exit 0
                  fi
                  admin="${ADMIN_USERNAME}:${ADMIN_PASSWORD}"

                  # Wait for the Forgejo API; fail-soft (exit 0) if it never comes up this tick.
                  i=0
                  until curl -fsS -o /dev/null "${api}/version"; do
                    i=$((i+1))
                    [ "$i" -ge 30 ] && { echo "[forgejo-actions-secrets] forgejo API unreachable after 30 tries; exiting 0"; exit 0; }
                    echo "[forgejo-actions-secrets] waiting for forgejo API ($i/30)..."; sleep 10
                  done

                  # put_secret NAME VALUE -> create-or-update an org Actions secret.
                  # jq builds the JSON body so the value (incl. the literal `$` in the
                  # robot username) is encoded safely; only the NAME is ever logged.
                  put_secret() {
                    _name="$1"; _val="$2"
                    _body="$(jq -nc --arg v "$_val" '{data:$v}')"
                    _code="$(curl -sS -o /dev/null -w '%{http_code}' -u "$admin" \
                      -X PUT -H 'Content-Type: application/json' \
                      -d "$_body" "${api}/orgs/${ORG}/actions/secrets/${_name}")"
                    case "$_code" in
                      201) echo "[forgejo-actions-secrets] created org secret ${ORG}/${_name}" ;;
                      204) echo "[forgejo-actions-secrets] updated org secret ${ORG}/${_name}" ;;
                      *)   echo "[forgejo-actions-secrets] WARN: PUT ${ORG}/${_name} returned HTTP ${_code}"; return 1 ;;
                    esac
                  }

                  # put_var NAME VALUE -> create-or-update an org Actions VARIABLE (non-secret).
                  put_var() {
                    _name="$1"; _val="$2"
                    _body="$(jq -nc --arg v "$_val" '{value:$v}')"
                    _code="$(curl -sS -o /dev/null -w '%{http_code}' -u "$admin" \
                      -X POST -H 'Content-Type: application/json' -d "$_body" "${api}/orgs/${ORG}/actions/variables/${_name}")"
                    case "$_code" in
                      201|204) echo "[forgejo-actions-secrets] set org var ${ORG}/${_name}" ;;
                      *) _code="$(curl -sS -o /dev/null -w '%{http_code}' -u "$admin" \
                           -X PUT -H 'Content-Type: application/json' -d "$_body" "${api}/orgs/${ORG}/actions/variables/${_name}")"
                         case "$_code" in
                           201|204) echo "[forgejo-actions-secrets] updated org var ${ORG}/${_name}" ;;
                           *) echo "[forgejo-actions-secrets] WARN: var ${ORG}/${_name} returned HTTP ${_code}"; return 1 ;;
                         esac ;;
                    esac
                  }

                  rc=0
                  put_secret HARBOR_ROBOT_USER  "$HARBOR_ROBOT_USER"  || rc=1
                  put_secret HARBOR_ROBOT_TOKEN "$HARBOR_ROBOT_TOKEN" || rc=1

                  # DT key is best-effort: a missing one must not block the required Harbor creds.
                  if [ -n "${DT_API_KEY:-}" ]; then
                    put_secret DT_API_KEY "$DT_API_KEY" || rc=1
                  else
                    echo "[forgejo-actions-secrets] dependency-track api key not present yet; skipping (will retry)"
                  fi

                  # Org variables (config) consumed by the .forgejo reusable workflows. Published
                  # names are WEBGRIP_-prefixed: Forgejo rejects the reserved FORGEJO_/GITHUB_/GITEA_
                  # prefixes (the value still comes from the FORGEJO_INSTANCE_URL env below).
                  put_var WEBGRIP_FORGEJO_URL "$FORGEJO_INSTANCE_URL" || rc=1
                  put_var WEBGRIP_CI_BOT_NAME "$WEBGRIP_CI_BOT_NAME"  || rc=1

                  # CI bot token (minted by forgejo-ci-provisioner) — best-effort until present.
                  # Published as WEBGRIP_CI_TOKEN: a FORGEJO_-prefixed secret name is rejected, and
                  # secrets.FORGEJO_TOKEN is anyway the built-in per-job token, not this org bot token.
                  if [ -n "${FORGEJO_TOKEN:-}" ]; then
                    put_secret WEBGRIP_CI_TOKEN "$FORGEJO_TOKEN" || rc=1
                  else
                    echo "[forgejo-actions-secrets] CI bot token not minted yet; skipping (will retry)"
                  fi

                  # Codeberg Pages token (techdocs-deploy-codeberg) — best-effort until seeded.
                  # CODEBERG_ is not a reserved prefix, so the secret name needs no remapping.
                  if [ -n "${CODEBERG_TOKEN:-}" ]; then
                    put_secret CODEBERG_TOKEN "$CODEBERG_TOKEN" || rc=1
                  else
                    echo "[forgejo-actions-secrets] codeberg pages token not present yet; skipping (will retry)"
                  fi

                  # GitHub PAT -> GHCR push/sign creds + the GitHub Release mirror token. Forgejo is the
                  # sole release authority; these fan out to GHCR + the github.com Releases tab. GHCR_/GH_
                  # are not reserved prefixes. Best-effort until the PAT is seeded in OpenBao.
                  if [ -n "${GHCR_TOKEN:-}" ]; then
                    put_secret GHCR_USERNAME    "${GHCR_USERNAME:-webgrip}"        || rc=1
                    put_secret GHCR_TOKEN       "$GHCR_TOKEN"                      || rc=1
                    put_secret GH_RELEASE_TOKEN "${GH_RELEASE_TOKEN:-$GHCR_TOKEN}" || rc=1
                  else
                    echo "[forgejo-actions-secrets] github PAT not present yet; skipping GHCR/release secrets (will retry)"
                  fi

                  [ "$rc" -eq 0 ] && echo "[forgejo-actions-secrets] reconcile complete" \
                    || echo "[forgejo-actions-secrets] reconcile incomplete; will retry next tick"
                  exit "$rc"
              resources:
                requests: {cpu: 25m, memory: 64Mi}
                limits: {cpu: 200m, memory: 128Mi}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
              volumeMounts:
                - {name: tmp, mountPath: /tmp}
          volumes:
            - name: tmp
              emptyDir: {}
