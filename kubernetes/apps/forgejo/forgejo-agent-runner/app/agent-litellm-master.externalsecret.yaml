---
# The LiteLLM master key, replicated from OpenBao into the forgejo namespace for the agent pool.
#
# Deliberately NOT published as an org-level Forgejo Actions secret: Actions secrets are org-wide,
# so that would hand EVERY workflow unlimited inference spend (RFC HAZ-02). Injected only into the
# forgejo-agent-runner pods, where the agent-runner entrypoint uses it to mint a per-run,
# budget-capped, model-scoped key and revoke it on exit (ADR-0044, ADR-0048).
#
# Longer term this should be a budget-capped *minter* key rather than the true master key (#282).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-litellm-master
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target:
    name: agent-litellm-master
    creationPolicy: Owner
  data:
    - {secretKey: LITELLM_MASTER_KEY, remoteRef: {key: litellm, property: LITELLM_MASTER_KEY}}
