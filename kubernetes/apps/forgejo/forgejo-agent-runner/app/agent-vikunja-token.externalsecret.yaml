---
# Vikunja API token for the agent pool — the board identity the agent uses to claim its ticket,
# post progress/completion comments and move buckets (the board contract's claim protocol).
# Same OpenBao credential the mcp-vikunja gateway uses; this is the pool-side copy.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-vikunja-token
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target:
    name: agent-vikunja-token
    creationPolicy: Owner
  data:
    - {secretKey: VIKUNJA_API_TOKEN, remoteRef: {key: vikunja/mcp, property: api_token}}
