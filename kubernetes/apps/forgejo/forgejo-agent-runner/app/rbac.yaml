---
# Identity for the forgejo-agent-runner registration provisioner Job. Mirrors
# forgejo-runner-provisioner: the admin Secret it consumes is injected as env vars by the
# kubelet (secretKeyRef, which does NOT use this Role), so the only k8s API access it needs is
# over the ONE Secret it owns, forgejo-agent-runner-secret.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-agent-runner-provisioner
  namespace: forgejo
---
# Identity for the KEDA-scaled agent runner Job/Pod itself (scaledjob.yaml). It carries no RBAC
# and the pod sets automountServiceAccountToken: false — this exists only so the pod runs under
# a named identity rather than `default`. Deliberate: an LLM-driven process runs in this pod, so
# it gets zero k8s API authority.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-agent-runner
  namespace: forgejo
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-agent-runner-provisioner
  namespace: forgejo
rules:
  # Read-back + update of the registration Secret this Job owns (kubectl get; kubectl apply patch).
  - apiGroups:
      - ""
    resources:
      - "secrets"
    resourceNames:
      - "forgejo-agent-runner-secret"
    verbs:
      - "get"
      - "update"
      - "patch"
  # First-run creation only. RBAC cannot scope `create` by resourceName, so this is
  # namespace-wide on the type — the narrowest grant the API allows.
  - apiGroups:
      - ""
    resources:
      - "secrets"
    verbs:
      - "create"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-agent-runner-provisioner
  namespace: forgejo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: forgejo-agent-runner-provisioner
subjects:
  - kind: ServiceAccount
    name: forgejo-agent-runner-provisioner
    namespace: forgejo
