---
# Tier-1 "do-once, gated, idempotent" bootstrap Job (ADR-0003), mirroring
# forgejo-runner-provisioner. Registers ONE persistent global Actions runner named
# keda-global-agent and writes its server-issued (uuid, token) into forgejo-agent-runner-secret.
#
# A SEPARATE registration from the CI pool's keda-global-docker is required, not cosmetic: the
# label set a runner advertises is recorded server-side at REGISTRATION time, so the `agent`
# label only exists if this pool registers under its own name. Reusing the CI runner's identity
# would make both pools answer for the same label.
#
# ephemeral:false — the KEDA one-job pods all reuse this single static identity (the documented
# Forgejo autoscaling pattern); an ephemeral:true runner is deleted after one job, which would
# invalidate the shared identity.
#
# This app's Kustomization has NO postBuild.substituteFrom, so braced ${VARS} are left for the shell.
apiVersion: batch/v1
kind: Job
metadata:
  name: forgejo-agent-runner-provisioner
  namespace: forgejo
  labels:
    # Terminal Failed => Kyverno cleanup-opt-in-failed-jobs deletes it hourly and Flux recreates
    # it = automatic retry. Complete runs are never touched (do-once marker, ADR-0003).
    cleanup.webgrip.io/retry-failed: "true"
spec:
  backoffLimit: 4
  template:
    spec:
      serviceAccountName: forgejo-agent-runner-provisioner
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: provision
          image: harbor.webgrip.dev/dockerhub/alpine/k8s:1.36.2@sha256:44ef4942e171939b9c665a4a84beb80e2dcdb9a24330d4651cfdfd2e9deecc47
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /tmp
            - name: FORGEJO_URL
              value: http://forgejo-http.forgejo.svc.cluster.local:3000
            - name: NAMESPACE
              value: forgejo
            - name: SECRET_NAME
              value: forgejo-agent-runner-secret
            - name: RUNNER_NAME
              value: keda-global-agent
            - name: ADMIN_USERNAME
              valueFrom: {secretKeyRef: {name: forgejo-admin-secret, key: username}}
            - name: ADMIN_PASSWORD
              valueFrom: {secretKeyRef: {name: forgejo-admin-secret, key: password}}
          command:
            - /bin/sh
            - -ceu
            - |
              api="${FORGEJO_URL}/api/v1"
              admin="${ADMIN_USERNAME}:${ADMIN_PASSWORD}"
              uuid_re='^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'

              # 1) Idempotent: skip if the stored uuid is already a well-formed runner UUID.
              cur="$(kubectl -n "$NAMESPACE" get secret "$SECRET_NAME" \
                -o jsonpath='{.data.uuid}' 2>/dev/null | base64 -d 2>/dev/null || true)"
              if printf '%s' "$cur" | grep -qiE "$uuid_re"; then
                echo "stored runner uuid is well-formed ($cur) — no change"
                exit 0
              fi
              echo "stored uuid missing/malformed ('${cur}') — (re)registering global agent runner"

              # 2) Drop any prior registration with our name so we don't accumulate dead runners.
              ids="$(curl -fsS -u "$admin" "$api/admin/actions/runners?limit=50" 2>/dev/null \
                | jq -r --arg n "$RUNNER_NAME" '(.runners // .)[]? | select(.name==$n) | .id' 2>/dev/null || true)"
              for id in $ids; do
                curl -sS -o /dev/null -u "$admin" -X DELETE "$api/admin/actions/runners/$id" \
                  && echo "deleted stale runner id=$id" || true
              done

              # 3) Register a fresh persistent global runner; capture server-issued uuid + token.
              resp="$(curl -fsS -u "$admin" -H 'Content-Type: application/json' -X POST \
                "$api/admin/actions/runners" \
                -d "{\"name\":\"${RUNNER_NAME}\",\"ephemeral\":false}")"
              uuid="$(printf '%s' "$resp" | jq -r '.uuid // empty')"
              token="$(printf '%s' "$resp" | jq -r '.token // empty')"
              printf '%s' "$uuid" | grep -qiE "$uuid_re" || { echo "register returned bad uuid: '${uuid}'" >&2; exit 1; }
              [ -n "$token" ] || { echo "register returned empty token" >&2; exit 1; }

              # 4) Write the identity the ScaledJob's one-job pods consume (keys: uuid, token).
              kubectl -n "$NAMESPACE" create secret generic "$SECRET_NAME" \
                --from-literal="uuid=$uuid" \
                --from-literal="token=$token" \
                --dry-run=client -o yaml | kubectl apply -f - >/dev/null
              echo "registered global runner ${RUNNER_NAME} (uuid ${uuid}) and wrote $SECRET_NAME"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          resources:
            requests: {cpu: 10m, memory: 64Mi}
            limits: {memory: 256Mi}
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: tmp
          emptyDir: {}
