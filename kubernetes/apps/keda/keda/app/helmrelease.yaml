---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd/helm-controller/main/docs/api/v2/helmrelease.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
spec:
  interval: 1h
  chart:
    spec:
      chart: keda
      version: 2.20.0
      sourceRef:
        kind: HelmRepository
        name: keda
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    # KEDA bundles its CRDs in the chart.
    crds:
      install: true
    operator:
      replicaCount: 1
    metricsServer:
      replicaCount: 1
    resources:
      operator:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
      metricServer:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    prometheus:
      operator:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
      metricServer:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
