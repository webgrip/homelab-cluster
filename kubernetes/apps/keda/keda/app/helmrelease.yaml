---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd/helm-controller/main/docs/api/v2/helmrelease.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
spec:
  interval: 1h
  chart:
    spec:
      chart: keda
      version: 2.20.0
      sourceRef:
        kind: HelmRepository
        name: keda
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    # KEDA bundles its CRDs in the chart.
    crds:
      install: true
    # Scaler HTTP timeout 3s -> 30s (chart templates this into KEDA_HTTP_DEFAULT_TIMEOUT — do
    # NOT also add it via `env:`, that renders a duplicate env key and the upgrade fails SSA).
    # Forgejo's /api/v1/admin/runners/jobs (the forgejo-runner scaler's metric) answers slower
    # than KEDA's 3s default once the Actions queue is deep, so every poll timed out, the scaler
    # read "0 pending", and the runner pool NEVER burst past the warm floor — a vicious cycle
    # observed 2026-07-18 (30+ queued jobs, 2 runners, releases waiting 60+ min; keda-operator
    # log: "Client.Timeout exceeded" every 15s). Applies to all KEDA scalers; this cluster's
    # only latency-sensitive one is forgejo-runner.
    http:
      timeout: 30000
    # Route the chart's default ghcr.io/kedacore/* images through the Harbor
    # pull-through proxy-cache (ADR-0025) instead of ghcr.io direct. The chart
    # has no dedicated digest field, so digests are appended inline onto tag
    # (repo:tag@digest) -- same pattern as gitea-mirror. Digests verified live
    # (running pod imageIDs) and via `docker manifest inspect` against Harbor
    # before landing. VIK-241/242.
    image:
      keda:
        registry: harbor.webgrip.dev/ghcr
        tag: "2.20.0@sha256:f9b156ce154d2557a284c4a11c258ccf8a4a02d7cfde339592b09267131c7df1"
      metricsApiServer:
        registry: harbor.webgrip.dev/ghcr
        tag: "2.20.0@sha256:adbcb6f77a8e2a63f80723fe4cf9031dd204498f0d985d8856aaed15be03b0e6"
      webhooks:
        registry: harbor.webgrip.dev/ghcr
        tag: "2.20.0@sha256:acb89f0fa76adf6cd2fb6f88c395619bd21b225ab0ef1bf4b9d2d50d537372a5"
    operator:
      replicaCount: 1
    metricsServer:
      replicaCount: 1
    resources:
      operator:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
      metricServer:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    prometheus:
      operator:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
      metricServer:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
