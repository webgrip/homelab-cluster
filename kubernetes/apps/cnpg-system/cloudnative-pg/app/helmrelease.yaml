---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: cloudnative-pg
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: cnpg-system
  values:
    # Single replica (replicaCount: 1) → leader election only causes restarts: a missed lease
    # renewal during transient API latency makes the manager exit ("leader election lost").
    # Disable it (chart additionalArgs appends; last pflag value wins). Same fix as the plugin.
    additionalArgs:
      - --leader-elect=false
    config:
      clusterWide: true
    monitoring:
      podMonitorEnabled: true
      grafanaDashboard:
        create: true
        configMapName: cnpg-grafana-dashboard
        sidecarLabel: grafana_dashboard
        sidecarLabelValue: "1"
        # 'labels.grafana_dashboard' removed — use sidecarLabel/sidecarLabelValue instead
        annotations:
          grafana_folder: Data
