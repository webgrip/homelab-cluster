---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plugin-barman-cloud
spec:
  interval: 1h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: plugin-barman-cloud
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: cnpg-system
  values:
    # Single replica (replicaCount: 1) → leader election is pure downside: a missed lease
    # renewal during transient API-server latency makes the controller-runtime manager exit
    # ("leader election lost") and restart, which can interrupt an in-progress backup. The
    # chart hardcodes --leader-elect; appending --leader-elect=false wins (pflag: last value).
    additionalArgs:
      - --leader-elect=false
    # Off the soyo control-planes (2026-07-11 placement audit); backup plugin
    # only acts when DBs (worker-pinned) are alive anyway.
    nodeSelector:
      node.webgrip.io/pool: worker
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
