---
# Vikunja's OIDC client secret, generated in-cluster — no bao-kv-put ceremony.
# Flow: this generator Secret → Authentik consumes it via !Env in blueprint
# 37-oidc-vikunja (env wired in helmrelease global.env) → the PushSecret mirrors
# it to OpenBao secret/vikunja/oidc → vikunja-oidc ExternalSecret (vikunja ns)
# templates it into VIKUNJA_AUTH_OPENID_PROVIDERS_AUTHENTIK_CLIENTSECRET.
# generate-once + Retain: rotation desyncs Authentik and Vikunja until both
# reconcile; to rotate deliberately, delete the vikunja-oidc-client Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vikunja-oidc-client
  namespace: authentik
spec:
  refreshInterval: "0" # generate once
  target:
    name: vikunja-oidc-client
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator
      rewrite:
        - regexp: {source: "password", target: "VIKUNJA_OIDC_CLIENT_SECRET"}
