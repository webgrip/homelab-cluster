---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: authentik-db-daily
  namespace: authentik
spec:
  schedule: "0 5 2 * * *"
  immediate: true # never backed up before — take one now, then daily
  backupOwnerReference: cluster
  cluster:
    name: authentik-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
