---
# Migration (swap): authentik-secret <- OpenBao secret/authentik/app.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: authentik-secret, namespace: authentik}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: authentik-secret, creationPolicy: Owner}
  dataFrom:
    - extract: {key: authentik/app}
