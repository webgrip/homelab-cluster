---
# Mirror the generated LiteLLM OIDC client secret into OpenBao (secret/litellm/oidc)
# for the litellm-oidc ExternalSecret in the ai namespace. client_id is not secret
# ("litellm", pinned in blueprint 38) and is set directly in the app's HelmRelease.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: litellm-oidc-client
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: litellm-oidc-client
  data:
    - match: {secretKey: LITELLM_OIDC_CLIENT_SECRET, remoteRef: {remoteKey: litellm/oidc, property: client_secret}}
