---
# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Homelab - Harbor OIDC
  labels:
    blueprints.goauthentik.io/description: Harbor OIDC provider and application.
    blueprints.goauthentik.io/instantiate: "true"
context:
  domain: webgrip.dev
  app_host: harbor
  redirect_path: /c/oidc/callback
entries:
  # --- Dependencies: ensure prerequisite blueprints are applied first ---
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Homelab - Core groups and users
      required: true

  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Homelab - Policies
      required: true

  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Homelab - Authentication and MFA flows
      required: true

  # --- groups scope mapping (emits `groups` for Harbor's oidc_groups_claim) ---
  - model: authentik_providers_oauth2.scopemapping
    id: harbor-oidc-groups-scope
    identifiers:
      name: harbor-groups
    attrs:
      name: harbor-groups
      scope_name: groups
      expression: |
        return {
            "groups": [group.name for group in request.user.ak_groups.all()],
        }

  # --- OIDC provider and application ---
  - model: authentik_providers_oauth2.oauth2provider
    id: harbor-oidc-provider
    identifiers:
      name: harbor-oidc
    attrs:
      name: Harbor OIDC
      client_type: confidential
      client_id: harbor
      # Generated in-cluster (harbor-oidc-client ExternalSecret) and injected via
      # global.env in the authentik HelmRelease; mirrored to OpenBao secret/harbor/oidc
      # by the matching PushSecret for Harbor's side. No CLI ceremony.
      client_secret: !Env HARBOR_OIDC_CLIENT_SECRET
      # Harbor only accepts RS256-signed id_tokens ("oidc: malformed jwt: unexpected
      # signature algorithm HS256"). Without a signing_key Authentik falls back to
      # HS256 (HMAC w/ client_secret). Pin the default RSA keypair — same fix as OpenBao.
      signing_key: !Find
        - authentik_crypto.certificatekeypair
        - - name
          - authentik Self-signed Certificate
      grant_types:
        - authorization_code
        - refresh_token
      redirect_uris:
        - matching_mode: strict
          url: !Format
            - "https://%s.%s%s"
            - !Context app_host
            - !Context domain
            - !Context redirect_path
      authentication_flow: !Find
        - authentik_flows.flow
        - - slug
          - homelab-authentication
      authorization_flow: !Find
        - authentik_flows.flow
        - - slug
          - default-provider-authorization-explicit-consent
      invalidation_flow: !Find
        - authentik_flows.flow
        - - slug
          - default-provider-invalidation-flow
      property_mappings:
        - !Find
          - authentik_providers_oauth2.scopemapping
          - - scope_name
            - "openid"
        - !Find
          - authentik_providers_oauth2.scopemapping
          - - scope_name
            - "profile"
        - !Find
          - authentik_providers_oauth2.scopemapping
          - - scope_name
            - "email"
        - !KeyOf harbor-oidc-groups-scope

  - model: authentik_core.application
    id: harbor-oidc-app
    identifiers:
      slug: harbor
    attrs:
      name: Harbor
      provider: !KeyOf harbor-oidc-provider
      meta_launch_url: !Format
        - "https://%s.%s"
        - !Context app_host
        - !Context domain
      meta_description: Harbor container registry login via Authentik OIDC.
      open_in_new_tab: true
      policy_engine_mode: all

  - model: authentik_policies.policybinding
    identifiers:
      order: 0
      policy: !Find
        - authentik_policies_expression.expressionpolicy
        - - name
          - homelab-users-only
      target: !KeyOf harbor-oidc-app
    attrs:
      enabled: true

  - model: authentik_policies.policybinding
    identifiers:
      order: 10
      policy: !Find
        - authentik_policies_expression.expressionpolicy
        - - name
          - homelab-mfa-required
      target: !KeyOf harbor-oidc-app
    attrs:
      enabled: true
