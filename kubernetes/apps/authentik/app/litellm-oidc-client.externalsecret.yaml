---
# LiteLLM's OIDC client secret, generated in-cluster — no bao-kv-put ceremony.
# Flow: this generator Secret → Authentik consumes it via !Env in blueprint
# 38-oidc-litellm (env wired in helmrelease global.env) → the PushSecret mirrors
# it to OpenBao secret/litellm/oidc → litellm-oidc ExternalSecret (ai ns) exposes
# it to the proxy as GENERIC_CLIENT_SECRET.
# generate-once + Retain: rotation desyncs Authentik and LiteLLM until both
# reconcile; to rotate deliberately, delete the litellm-oidc-client Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-oidc-client
  namespace: authentik
spec:
  refreshInterval: "0" # generate once
  target:
    name: litellm-oidc-client
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator
      rewrite:
        - regexp: {source: "password", target: "LITELLM_OIDC_CLIENT_SECRET"}
