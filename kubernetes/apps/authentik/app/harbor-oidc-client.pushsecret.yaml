---
# Mirror the generated Harbor OIDC client secret into OpenBao (secret/harbor/oidc)
# for the harbor-oidc-values ExternalSecret in the harbor namespace. client_id is
# not secret ("harbor", pinned in blueprint 36) and lives in that template.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: harbor-oidc-client
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: harbor-oidc-client
  data:
    - match: {secretKey: HARBOR_OIDC_CLIENT_SECRET, remoteRef: {remoteKey: harbor/oidc, property: client_secret}}
