---
# Mirror the generated Vikunja OIDC client secret into OpenBao (secret/vikunja/oidc)
# for the vikunja-oidc ExternalSecret in the vikunja namespace. client_id is not
# secret ("vikunja", pinned in blueprint 37) and lives in the app's HelmRelease env.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: vikunja-oidc-client
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: vikunja-oidc-client
  data:
    - match: {secretKey: VIKUNJA_OIDC_CLIENT_SECRET, remoteRef: {remoteKey: vikunja/oidc, property: client_secret}}
