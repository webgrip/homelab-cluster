---
# Harbor's OIDC client secret, generated in-cluster — no bao-kv-put ceremony.
# Flow: this generator Secret → Authentik consumes it via !Env in blueprint
# 36-oidc-harbor (env wired in helmrelease global.env) → the PushSecret mirrors
# it to OpenBao secret/harbor/oidc → harbor-oidc-values ExternalSecret (harbor
# ns) templates Harbor's core.configureUserSettings from it.
# generate-once + Retain: rotation desyncs Authentik and Harbor until both
# reconcile; to rotate deliberately, delete the harbor-oidc-client Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-oidc-client
  namespace: authentik
spec:
  refreshInterval: "0" # generate once
  target:
    name: harbor-oidc-client
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator
      rewrite:
        - regexp: {source: "password", target: "HARBOR_OIDC_CLIENT_SECRET"}
