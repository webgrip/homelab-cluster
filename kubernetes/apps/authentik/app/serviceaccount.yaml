---
# Dedicated ServiceAccount for the authentik server + worker Deployments.
# NOTE: the chart's own `serviceAccount.create` value (see helmrelease.yaml) is
# unrelated to this -- it creates a SEPARATE ServiceAccount for the "managed
# outposts" (remote-cluster) subchart feature, which server/worker never consume
# unless server.serviceAccountName/worker.serviceAccountName is explicitly set.
# Neither pod needs k8s API access.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authentik-app
  namespace: authentik
automountServiceAccountToken: false
