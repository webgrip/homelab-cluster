---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  chart:
    spec:
      chart: authentik
      version: 2026.5.2
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: authentik
  interval: 1h
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  rollback:
    timeout: 15m
  values:
    global:
      # Route the chart's default ghcr.io/goauthentik/server image through the
      # Harbor pull-through proxy-cache (ADR-0025) instead of ghcr.io direct.
      # Digest verified live (running pod imageID) and via `docker buildx
      # imagetools inspect` against the Harbor proxy before landing. VIK-242.
      image:
        repository: harbor.webgrip.dev/ghcr/goauthentik/server
        digest: sha256:3ddf09bbf69ded6a9634ecd753a01608d477f811e99bb5ffe9fc2ef7ad1c6581
      # Pod-level hardening for all authentik components. The goauthentik image
      # already runs as uid 1000 (verified live), so runAsNonRoot formalizes it.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      podAnnotations:
        reloader.stakater.com/auto: "true"
      # Single-node by design (RWO /data shared by server+worker; the cluster
      # disallows RWX). Pin to the high-CPU node via the capability label
      # node.webgrip.io/cpu=high — which resolves to fringe (the only high-CPU
      # node), replacing the legacy nodegroup=fringe. Keeps authentik exactly
      # where it is (no risky move) while dropping the legacy-label dependency.
      # Node-level HA needs media on S3 first (follow-up). ADR-0002.
      nodeSelector:
        node.webgrip.io/cpu: high
      affinity:
        podAntiAffinity: soft
        nodeAffinity:
          type: hard
          matchExpressions:
            - key: node.webgrip.io/cpu
              operator: In
              values:
                - high
      volumes:
        - name: authentik-media
          persistentVolumeClaim:
            claimName: authentik-media
      volumeMounts:
        - name: authentik-media
          mountPath: /data
      env:
        - name: AUTHENTIK_LOG_LEVEL
          value: info
        - name: AUTHENTIK_ERROR_REPORTING__ENABLED
          value: "false"
        - name: AUTHENTIK_DISABLE_UPDATE_CHECK
          value: "true"
        - name: AUTHENTIK_POSTGRESQL__HOST
          value: authentik-db-rw.authentik.svc.cluster.local
        - name: AUTHENTIK_POSTGRESQL__PORT
          value: "5432"
        - name: AUTHENTIK_POSTGRESQL__NAME
          value: authentik
        - name: AUTHENTIK_POSTGRESQL__USER
          valueFrom:
            secretKeyRef:
              name: authentik-db-app
              key: username
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-db-app
              key: password
        - name: AUTHENTIK_POSTGRESQL__SSLMODE
          value: require
        - name: AUTHENTIK_STORAGE__BACKEND
          value: file
        - name: AUTHENTIK_STORAGE__FILE__PATH
          value: /data
        # Consumed by blueprint 36-oidc-harbor via !Env; sourced from the
        # generated harbor-oidc-client Secret (see its ExternalSecret).
        # optional: pods must not wedge on ESO lag — the blueprint apply
        # simply errors until the env exists, then reloader restarts us.
        - name: HARBOR_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: harbor-oidc-client
              key: HARBOR_OIDC_CLIENT_SECRET
              optional: true
        # Consumed by blueprint 37-oidc-vikunja via !Env; same generated-secret
        # pattern as Harbor above.
        - name: VIKUNJA_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: vikunja-oidc-client
              key: VIKUNJA_OIDC_CLIENT_SECRET
              optional: true
        # Consumed by blueprint 38-oidc-litellm via !Env; same generated-secret
        # pattern as Harbor above.
        - name: LITELLM_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: litellm-oidc-client
              key: LITELLM_OIDC_CLIENT_SECRET
              optional: true

    authentik:
      existingSecret:
        secretName: authentik-secret

    blueprints:
      configMaps:
        - authentik-blueprints

    server:
      # 2 replicas → no SSO/OIDC blip on rollouts/reloads and survives a single
      # server-pod crash. NOTE: authentik is pinned to the single `fringe` node
      # (global nodeAffinity) with an RWO file-backed media PVC, so both pods
      # share one node — this is pod-level HA + zero-downtime rollout, NOT
      # node-level HA. Node-level HA needs media on Garage S3 first, then
      # unpinning from fringe (tracked as a follow-up).
      replicas: 2
      # NOTE: serviceAccount.create below only creates a SA for the "managed outposts"
      # (remote-cluster) subchart feature -- server/worker never consume it unless
      # this field is set explicitly (verified live: pods ran under `default` despite
      # serviceAccount.create: true). See serviceaccount.yaml.
      serviceAccountName: authentik-app
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          namespace: observability
          labels:
            release: kube-prometheus-stack
      route:
        main:
          enabled: true
          annotations:
            external-dns.alpha.kubernetes.io/exclude: "true"
            monitoring.webgrip.io/synthetic-check: k6-ingress-canary
          hostnames:
            - authentik.${SECRET_DOMAIN}
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https

    worker:
      replicas: 1
      serviceAccountName: authentik-app
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 100m
          memory: 384Mi
        limits:
          cpu: "1"
          memory: 768Mi
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          namespace: observability
          labels:
            release: kube-prometheus-stack

    serviceAccount:
      create: true

    geoip:
      enabled: false

    prometheus:
      rules:
        enabled: true
        namespace: observability
        labels:
          release: kube-prometheus-stack

    postgresql:
      enabled: false
