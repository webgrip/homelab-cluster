---
# Migration (seed): authentik-secret -> OpenBao secret/authentik/app.
# AUTHENTIK_SECRET_KEY is an at-rest encryption key: value-preserving, never regenerated.
# AUTHENTIK_BOOTSTRAP_TOKEN also feeds the openbao-config job (keep value intact).
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: authentik-secret, namespace: authentik}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: authentik-secret}}
  data:
    - match: {secretKey: AUTHENTIK_SECRET_KEY, remoteRef: {remoteKey: authentik/app, property: AUTHENTIK_SECRET_KEY}}
    - match: {secretKey: AUTHENTIK_BOOTSTRAP_PASSWORD_HASH, remoteRef: {remoteKey: authentik/app, property: AUTHENTIK_BOOTSTRAP_PASSWORD_HASH}}
    - match: {secretKey: AUTHENTIK_BOOTSTRAP_TOKEN, remoteRef: {remoteKey: authentik/app, property: AUTHENTIK_BOOTSTRAP_TOKEN}}
    - match: {secretKey: AUTHENTIK_BOOTSTRAP_EMAIL, remoteRef: {remoteKey: authentik/app, property: AUTHENTIK_BOOTSTRAP_EMAIL}}
