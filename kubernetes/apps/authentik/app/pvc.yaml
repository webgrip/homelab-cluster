---
# authentik media — RWO. authentik's server+worker pods share /data, so they must
# co-locate on ONE node. The cluster disallows RWX (Kyverno storage-cnpg-governance),
# so authentik stays single-node: pinned to the high-CPU node (fringe) via the
# capability label node.webgrip.io/cpu=high (see the HR), NOT the legacy nodegroup.
# Node-level HA would need media on Garage S3 (AUTHENTIK_STORAGE__MEDIA__S3) so the
# pods can spread — tracked as a follow-up; the media is currently empty.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authentik-media
  namespace: authentik
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
