---
# cert-manager-secret now sourced from OpenBao (seeded by the PushSecret). Replaces secret.sops.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cert-manager-secret
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: cert-manager-secret, creationPolicy: Owner}
  data:
    - secretKey: api-token
      remoteRef: {key: cert-manager/cloudflare, property: api-token}
