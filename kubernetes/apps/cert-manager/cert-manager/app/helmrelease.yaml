---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
spec:
  chartRef:
    kind: OCIRepository
    name: cert-manager
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    # Protect the TLS control plane from OOM eviction order (built-in class,
    # always present so no admission-ordering risk). Applies to controller,
    # webhook and cainjector.
    global:
      priorityClassName: system-cluster-critical
    crds:
      enabled: true
    replicaCount: 1
    securityContext:
      runAsGroup: 65532
      runAsNonRoot: true
      runAsUser: 65532
    dns01RecursiveNameservers: https://1.1.1.1:443/dns-query,https://1.0.0.1:443/dns-query
    dns01RecursiveNameserversOnly: true
    webhook:
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
    cainjector:
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
    startupapicheck:
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
