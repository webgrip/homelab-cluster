---
# Migration phase 1 (seed): cert-manager-secret -> OpenBao secret/cert-manager/cloudflare.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: cert-manager-secret
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: cert-manager-secret
  data:
    - match: {secretKey: api-token, remoteRef: {remoteKey: cert-manager/cloudflare, property: api-token}}
