---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy-agent
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: alloy
      version: 1.10.1
      sourceRef:
        kind: HelmRepository
        name: grafana-charts-alloy
        namespace: observability
  values:
    controller:
      type: daemonset
      # hostNetwork gives alloy-agent pods a foothold in the host network namespace
      # so Talos OS (pre-pod) can reach the syslog listener at 127.0.0.1:6514.
      hostNetwork: true
      # hostNetwork silently downgrades dnsPolicy: ClusterFirst to the host resolver,
      # which can't resolve *.svc.cluster.local -> loki.write to VictoriaLogs fails
      # ("no such host") and ALL pod stdout is dropped before reaching the backend.
      # Force CoreDNS for these hostNetwork pods so the log push resolves.
      dnsPolicy: ClusterFirstWithHostNet

    alloy:
      podAnnotations:
        reloader.stakater.com/auto: "true"

      resources:
        requests:
          cpu: 50m
          memory: 448Mi
        limits:
          cpu: 500m
          memory: 1024Mi
      extraEnv:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
      mounts:
        varlog: true
        dockercontainers: false
      configMap:
        create: true
        content: |-
          discovery.kubernetes "pod" {
            role = "pod"
            selectors {
              role  = "pod"
              field = "spec.nodeName=" + sys.env("NODE_NAME")
            }
          }

          discovery.relabel "pod_logs" {
            targets = discovery.kubernetes.pod.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              action        = "replace"
              target_label  = "namespace"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              action        = "replace"
              target_label  = "pod"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              action        = "replace"
              target_label  = "container"
            }

            rule {
              source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
              action        = "replace"
              target_label  = "job"
              separator     = "/"
              replacement   = "$1"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
              action        = "replace"
              target_label  = "__path__"
              separator     = "/"
              replacement   = "/var/log/pods/*$1/*.log"
            }
          }

          loki.source.kubernetes "pod_logs" {
            targets    = discovery.relabel.pod_logs.output
            forward_to = [loki.process.pod_logs.receiver]
          }

          loki.source.kubernetes_events "events" {
            forward_to = [loki.process.kubernetes_events.receiver]
          }

          // Talos kernel/service logs forwarded over TCP syslog from each node's machined.
          // Receives Talos json_lines format; syslog parse is best-effort — raw JSON lines
          // are stored as-is and can be parsed at query time (LogsQL: | unpack_json).
          // Requires machine.logging.destinations configured via talosctl apply-config.
          loki.source.syslog "talos" {
            listener {
              address  = "0.0.0.0:6514"
              protocol = "tcp"
              labels   = {
                job     = "talos/kernel",
                cluster = "homelab-cluster",
                node    = sys.env("NODE_NAME"),
              }
            }
            forward_to = [loki.write.local.receiver]
          }

          loki.process "pod_logs" {
            stage.static_labels {
              values = {
                cluster = "homelab-cluster",
              }
            }

            // Dark factory: promote ploegd/worker logfmt payload keys to first-class
            // VictoriaLogs fields (structured metadata -> ordinary VL fields, NOT
            // labels — per-line values like trace_id must stay out of _stream_fields).
            // logfmt parse is lenient: lines without these keys (postgres JSON, dind)
            // simply contribute nothing. Scoped to ns ploeg — other namespaces untouched.
            stage.match {
              selector = "{namespace=\"ploeg\"}"

              stage.logfmt {
                mapping = {
                  outcome  = "",
                  team     = "",
                  title    = "",
                  links    = "",
                  budget   = "",
                  trace_id = "trace-id",
                  wi_id    = "id",
                }
              }

              stage.structured_metadata {
                values = {
                  outcome  = "",
                  team     = "",
                  title    = "",
                  links    = "",
                  budget   = "",
                  trace_id = "",
                  wi_id    = "",
                }
              }
            }

            forward_to = [loki.write.local.receiver]
          }

          loki.process "kubernetes_events" {
            stage.static_labels {
              values = {
                cluster = "homelab-cluster",
                job     = "kubernetes/events",
              }
            }

            forward_to = [loki.write.local.receiver]
          }

          // VictoriaLogs speaks the Loki push protocol natively; _stream_fields pins
          // today's Loki stream shape explicitly (fields absent on an entry are
          // ignored, so one list serves pod logs + events + Talos syslog).
          loki.write "local" {
            endpoint {
              url = "http://vlsingle-victorialogs.observability.svc.cluster.local:9428/insert/loki/api/v1/push?_stream_fields=cluster,namespace,pod,container,job,node,instance"
            }
          }
