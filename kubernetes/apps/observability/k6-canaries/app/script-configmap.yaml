---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-canary-script
  namespace: observability
data:
  script.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    export const options = {
      insecureSkipTLSVerify: true,
      vus: 1,
      duration: '30s',
      thresholds: {
        http_req_failed: ['rate<0.01'],
        http_req_duration: ['p(95)<1000'],
      },
    };

    const endpoints = [
      { name: 'grafana', path: '/api/health' },
      { name: 'prometheus', path: '/-/ready' },
      { name: 'alertmanager', path: '/-/ready' },
    ];

    export default function () {
      for (const endpoint of endpoints) {
        const res = http.get('https://envoy-internal.network.svc.cluster.local' + endpoint.path, {
          headers: { Host: endpoint.name + '.' + __ENV.SECRET_DOMAIN },
          tags: { endpoint: endpoint.name },
        });
        check(res, {
          'status is OK/redirect': (r) => r.status >= 200 && r.status < 400,
        });
      }
      sleep(1);
    }
