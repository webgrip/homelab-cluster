---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: node-exporter
spec:
  dependsOn:
    # ServiceMonitor CRD must exist before the chart can create its monitor.
    - name: prometheus-operator-crds
      namespace: observability
  interval: 1h
  path: ./kubernetes/apps/observability/node-exporter/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
