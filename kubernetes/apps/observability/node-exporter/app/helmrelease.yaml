---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-exporter
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  chartRef:
    kind: OCIRepository
    name: node-exporter
  # Standalone replacement for the node-exporter subchart kube-prometheus-stack
  # used to bundle. Provides node_* (node memory/disk/cpu rules + talos-nodes
  # dashboard).
  values:
    fullnameOverride: node-exporter
    podAnnotations:
      reloader.stakater.com/auto: "true"
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 50m
        memory: 128Mi
    # DaemonSet must run on EVERY node, including control-plane / tainted nodes,
    # or those nodes' metrics silently vanish. Tolerate all taints.
    tolerations:
      - operator: Exists
    # Emit a ServiceMonitor; the VM operator converts it to a VMServiceScrape.
    prometheus:
      monitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
