---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: opencost
      version: 2.5.25
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: observability
  values:
    opencost:
      exporter:
        # Explicit requests keep the pod Burstable (never BestEffort — this
        # cluster OOM-kills BestEffort pods). No CPU limit (throttling antipattern).
        resources:
          requests:
            cpu: 50m
            memory: 200Mi
          limits:
            memory: 512Mi
        # OpenCost reads its pricing ConfigMap ONLY at startup, and the chart does
        # not roll the pod when that ConfigMap changes. Bump pricingRev on every
        # customPricing.costModel edit: it changes the pod template -> rolling
        # restart -> OpenCost re-reads the corrected pricing. (rev2 = monthly-rate fix)
        extraEnv:
          pricingRev: "3"
      # UI off: we consume cost data via Grafana (the FinOps dashboard). Enable
      # + add an HTTPRoute later if the cost-explorer UI is wanted.
      ui:
        enabled: false
      # Query the EXISTING in-cluster Prometheus rather than deploying our own.
      # serviceName/port verified live: kube-prometheus-stack-prometheus:9090.
      prometheus:
        internal:
          enabled: true
          serviceName: kube-prometheus-stack-prometheus
          namespaceName: observability
          port: 9090
        external:
          enabled: false
      # Let kube-prometheus-stack scrape OpenCost's own /metrics (:9003).
      # additionalLabels must satisfy the Prometheus serviceMonitorSelector.
      metrics:
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
          scrapeInterval: 30s
          honorLabels: true
      # On-prem custom pricing — no cloud bill exists, so cost is modelled.
      # OpenCost is currency-agnostic; these numbers are EUR by our convention.
      #
      # IMPORTANT — the chart costModel CPU/RAM/storage are MONTHLY rates
      # (EUR/core-month, EUR/GB-month, EUR/GB-month). OpenCost divides them by
      # 730 h to emit the hourly node_*_hourly_cost metrics. Verified live: an
      # earlier CPU "0.003" surfaced as node_cpu_hourly_cost 0.000004 (= 0.003/730),
      # i.e. ~700x too low. So set MONTHLY = intended-hourly x 730.
      #
      # Baseline targets ~EUR 1,000/yr cluster TCO (power ~EUR 3/W·yr + hardware
      # amortisation) over the live 23.75 cores + 70 GiB RAM:
      #   CPU 2.19/core-mo -> 0.003/core-hr ; RAM 0.44/GB-mo -> 0.0006/GB-hr.
      # TUNE costModel.{CPU,RAM,storage} to your real power rate + hardware cost.
      customPricing:
        enabled: true
        createConfigmap: true
        configmapName: opencost-custom-pricing
        configPath: /tmp/custom-config
        provider: custom
        costModel:
          description: "webgrip homelab on-prem pricing (EUR; MONTHLY rates: per core-month / GB-month)"
          CPU: "2.19"
          RAM: "0.44"
          storage: "0.0146"
          GPU: "0"
          zoneNetworkEgress: "0"
          regionNetworkEgress: "0"
          internetNetworkEgress: "0"
          # LoadBalancer pricing (strings) — silences the recurring
          # "Error getting LoadBalancer cost: ParseFloat ''" warning when costing
          # LB-type Services with no LB price set (opencost issue #3010). 0 = no LB cost.
          LBIngressDataCost: "0.0"
          FirstFiveForwardingRulesCost: "0.0"
          AdditionalForwardingRuleCost: "0.0"
