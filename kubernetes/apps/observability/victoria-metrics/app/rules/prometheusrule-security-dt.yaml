---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: security-dependency-track
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    # NOTE: the DependencyTrack{CriticalVulnerabilities,PolicyViolationsFail,HighRiskScore}
    # and MetricsExporterDown ALERTS were removed 2026-06-22 — they duplicated the
    # Grafana SLO rules (slo-dt-critical-cves, slo-dt-policy-fail, slo-dt-risk-score,
    # slo-dt-exporter-stale) on the same metrics+thresholds (ADR-0035 alerting layer is
    # the single source). The recording rules below are NOT duplicated and stay here.
    - name: dependency-track.recording
      interval: 5m
      rules:
        - record: job:dt_portfolio_vuln_ratio:ratio
          expr: dt_portfolio_projects{state="vulnerable"} / dt_portfolio_projects{state="total"}

        - record: job:dt_portfolio_findings_audit_ratio:ratio
          expr: dt_portfolio_findings{state="audited"} / dt_portfolio_findings{state="total"}
