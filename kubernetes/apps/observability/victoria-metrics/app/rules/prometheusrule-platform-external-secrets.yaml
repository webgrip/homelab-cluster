---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-external-secrets-rules
  namespace: observability
  labels:
    app.kubernetes.io/name: external-secrets
    release: kube-prometheus-stack
spec:
  groups:
    - name: platform.external-secrets
      rules:
        - alert: ExternalSecretNotReady
          expr: |
            max by (namespace, name) (
              externalsecret_status_condition{condition="Ready", status="False"}
            ) == 1
          for: 15m
          labels:
            severity: warning
            owner: platform
            service: external-secrets
          annotations:
            summary: "ExternalSecret not Ready ({{ $labels.namespace }}/{{ $labels.name }})"
            description: |
              What's happening:
              - ExternalSecret {{ $labels.namespace }}/{{ $labels.name }} has reported
                Ready=False for 15m, so its target Secret is missing or stale.

              Impact/risk:
              - Workloads consuming this Secret may fail to start, run with stale
                credentials, or lose access to their backend (DB, S3, OIDC).

              Likely causes:
              - The OpenBao KV path is unpopulated, or OpenBao is sealed/unreachable.
              - ClusterSecretStore auth (token/role) expired or was revoked.
              - A typo in the remoteRef key/property.

              First actions:
              - kubectl -n {{ $labels.namespace }} get externalsecret {{ $labels.name }} -o yaml | yq '.status'
              - Check ClusterSecretStore health (see ClusterSecretStoreNotReady) and OpenBao seal state.
              - Populate/repair the OpenBao path, then let ESO refresh (or force a sync).
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/#external-secrets"

        - alert: ClusterSecretStoreNotReady
          expr: |
            max by (name) (
              clustersecretstore_status_condition{condition="Ready", status="False"}
            ) == 1
          for: 10m
          labels:
            severity: critical
            owner: platform
            service: external-secrets
          annotations:
            summary: "ClusterSecretStore not Ready ({{ $labels.name }})"
            description: |
              What's happening:
              - ClusterSecretStore {{ $labels.name }} has reported Ready=False for 10m.

              Impact/risk:
              - Every ExternalSecret backed by this store stops syncing cluster-wide;
                new/rotated secrets will not materialise.

              Likely causes:
              - OpenBao is sealed, down, or unreachable from the ESO controller.
              - The store's auth (Kubernetes auth role / token) is invalid or expired.

              First actions:
              - Check OpenBao pods and seal state (namespace=security).
              - kubectl get clustersecretstore {{ $labels.name }} -o yaml | yq '.status'
              - Restore the backend/auth; confirm dependent ExternalSecrets recover.
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/#external-secrets"

        - alert: ExternalSecretSyncErrors
          expr: |
            sum by (namespace, name) (
              increase(externalsecret_sync_calls_error[15m])
            ) > 0
          for: 15m
          labels:
            severity: warning
            owner: platform
            service: external-secrets
          annotations:
            summary: "ExternalSecret sync errors ({{ $labels.namespace }}/{{ $labels.name }})"
            description: |
              What's happening:
              - ExternalSecret {{ $labels.namespace }}/{{ $labels.name }} has logged sync
                errors over the last 15m (the Secret may still be serving a stale value).

              Impact/risk:
              - Rotation/refresh is failing; the Secret drifts from the source of truth.

              Likely causes:
              - Transient OpenBao connectivity, a permissions change, or a malformed remoteRef.

              First actions:
              - Inspect external-secrets controller logs (namespace=security) for this object.
              - Verify the OpenBao path/permissions; confirm errors stop after the fix.
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/#external-secrets"
