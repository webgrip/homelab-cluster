---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-kubernetes-rules
  namespace: observability
  labels:
    app.kubernetes.io/name: observability
    release: kube-prometheus-stack
spec:
  groups:
    - name: platform.kubernetes.rules
      rules:
        # Curated replacements for the kube-prometheus-stack default rule pack
        # that did not survive the VM swap (ADR-0034 re-evaluation, 2026-07-02).
        # Only the measured gaps — generic workload alerts (crashloop, replicas
        # mismatch, PV fill) are already covered by apps-rules/platform-*.
        - alert: Watchdog
          expr: vector(1)
          labels:
            severity: none
            owner: platform
            service: observability
          annotations:
            summary: "Alerting pipeline deadman — always firing (observability)"
            description: |
              What's happening:
              - This alert is DESIGNED to fire at all times. It proves the whole
                pipeline works: VMAlert evaluates rules and delivers to
                VMAlertmanager, which routes alertname="Watchdog" to the deadman
                webhook receiver — a healthchecks.io heartbeat pinged every ~2m.

              Impact/risk:
              - None while firing — that is the healthy state.
              - If this alert STOPS firing, rule evaluation or alert delivery is
                broken and every other alert is silently dead. healthchecks.io
                notices the missing pings (period 5m + grace 5m) and pages —
                the ABSENCE is the alarm.

              Likely causes:
              - (when absent) VMAlert down, not evaluating VMRules, or unable to
                reach VMAlertmanager
              - (when absent) rule conversion broken (PrometheusRule -> VMRule)

              First actions:
              - Check vmalert/vmalertmanager pods and the vm-operator logs
              - Follow the VictoriaMetrics runbook fast-triage section
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/#victoriametrics"

        - alert: KubeNodeNotReady
          expr: |
            kube_node_status_condition{condition="Ready", status="true"} == 0
          for: 10m
          labels:
            severity: critical
            owner: platform
            service: kubernetes
          annotations:
            summary: "Node {{ $labels.node }} not Ready ({{ $labels.node }})"
            description: |
              What's happening:
              - Node {{ $labels.node }} has reported NotReady for 10m.

              Impact/risk:
              - Workloads on the node may be evicted or unreachable; scheduling
                capacity is reduced. On a soyo node this also risks etcd quorum.

              Likely causes:
              - Node powered off, crashed, or lost network
              - kubelet stopped posting status (resource exhaustion, disk full)
              - Talos upgrade/reboot in progress that did not complete

              First actions:
              - talosctl -n <node-ip> dmesg / talosctl health to check the node
              - Check kubectl describe node {{ $labels.node }} conditions/events
              - See the cluster-health and Talos runbooks before draining
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/#cluster-health"

        - alert: KubeJobFailed
          expr: |
            kube_job_status_failed > 0
          for: 15m
          labels:
            severity: warning
            owner: platform
            service: kubernetes
          annotations:
            summary: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed ({{ $labels.namespace }})"
            description: |
              What's happening:
              - Job {{ $labels.namespace }}/{{ $labels.job_name }} has failed pods
                and has not succeeded for 15m.

              Impact/risk:
              - Whatever the Job does (backup, provisioning, migration, seed) did
                not happen — e.g. a missed CNPG backup or a provisioner that never
                converged.

              Likely causes:
              - Application error in the Job pod (check its logs)
              - Missing Secret/ConfigMap or RBAC for the Job's ServiceAccount
              - Node pressure evicting the pod repeatedly

              First actions:
              - kubectl -n {{ $labels.namespace }} logs job/{{ $labels.job_name }}
              - kubectl -n {{ $labels.namespace }} describe job {{ $labels.job_name }}
              - If it is a CronJob child, check whether later runs succeeded
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/#apps-baseline"
