---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# GrafanaDashboard CRs that ship with the metrics backend. They query the
# `prometheus` datasource UID (now backed by VMSingle) — no edits needed.
resources:
  - ./grafana-dashboard-alertmanager.yaml
  - ./grafana-dashboard-prometheus.yaml
  - ./grafana-dashboard-etcd.yaml
  - ./grafana-dashboard-talos-nodes.yaml
