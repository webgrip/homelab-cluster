---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: coredns
spec:
  # The default kube-dns Service doesn't expose the 9153 metrics port, so scrape
  # the CoreDNS pods directly. This cluster's CoreDNS names the port `tcp-9153`
  # (not the upstream `metrics`), so target that name.
  namespaceSelector:
    matchNames:
      - kube-system
  selector:
    matchLabels:
      k8s-app: kube-dns
  podMetricsEndpoints:
    - port: tcp-9153
      scheme: http
      interval: 60s
