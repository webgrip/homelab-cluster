---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Control-plane / node scrape targets that kube-prometheus-stack used to create
# internally (kubelet, cAdvisor, kube-apiserver, CoreDNS, etcd). Re-created here
# as VM scrape CRs since the modular VM stack has no umbrella chart to ship them.
resources:
  - ./vmnodescrape-kubelet.yaml
  - ./vmnodescrape-cadvisor.yaml
  - ./vmservicescrape-apiserver.yaml
  - ./vmpodscrape-coredns.yaml
  - ./vmstaticscrape-etcd.yaml
