---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanager
metadata:
  name: vmalertmanager
spec:
  replicaCount: 1
  externalURL: https://alertmanager.${SECRET_DOMAIN}
  # Phase-2 flip (2026-07-11): routing now lives in the git-owned template of
  # vmalertmanager-config.externalsecret.yaml (ntfy + Telegram legs), rendered
  # by ESO once the OpenBao credentials exist. configRawYaml would take
  # precedence over configSecret and must stay deleted.
  configSecret: vmalertmanager-config
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: longhorn
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
  podMetadata:
    annotations:
      reloader.stakater.com/auto: "true"
  # The Longhorn data volume mounts root-owned (0:0, 755) with no fsGroup, so
  # alertmanager (nobody) couldn't persist silences/nflog — "permission denied"
  # maintenance errors; silences were lost on every restart.
  securityContext:
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
  nodeSelector:
    node.webgrip.io/pool: worker
  tolerations:
    - key: dedicated
      operator: Equal
      value: fringe
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
