---
# The FULL Alertmanager routing config, git-owned, rendered by ESO into Secret
# vmalertmanager-config (key alertmanager.yaml) with only credentials injected
# from OpenBao. VMAlertmanager consumes it via spec.configSecret (see
# vmalertmanager.yaml — configRawYaml would take precedence and must stay deleted).
#
# Delivery legs (RFC alert-delivery / roadmap #64-66):
#   ntfy (in-cluster URL: publishing survives tunnel outages; messages queue in
#   ntfy's 72h cache) · Telegram (external leg, critical only) · healthchecks.io
#   deadman fed by the always-firing Watchdog — its SILENCE pages.
# Grafana forwards its alerts here too (grafana/app/alerting/), so this tree is
# the single routing decision for both alerting planes.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vmalertmanager-config
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target:
    name: vmalertmanager-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          route:
            # Fallback: alerts with no/unknown severity still reach a human.
            receiver: ntfy-warning
            group_by:
              - alertname
              - namespace
              - severity
              - service
              - owner
              - project
              - pod
              - job
              - instance
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h
            routes:
              # Deadman: hc-ping expects a beat every ~2m (check period 5m, grace 5m).
              - receiver: deadman
                matchers:
                  - alertname="Watchdog"
                group_wait: 0s
                group_interval: 1m
                repeat_interval: 2m
              # Day-1 noise quarantine: standing security-hygiene backlog (DT CVEs,
              # Kyverno violations) — ALL severities, else the two standing criticals
              # dual-page every 12h. Re-tighten once the backlog is triaged (ADR).
              - receiver: ntfy-digest
                matchers:
                  - team="security"
                  - slo=~"supply-chain|admission-control"
                repeat_interval: 24h
              - receiver: critical
                matchers:
                  - severity="critical"
              - receiver: ntfy-warning
                matchers:
                  - severity="warning"
              - receiver: "null"
                matchers:
                  - severity=~"info|none"
          receivers:
            - name: "null"
            - name: critical
              webhook_configs:
                - url: "http://ntfy.observability.svc.cluster.local:8080/alerts-critical?template=alertmanager&priority=urgent"
                  http_config:
                    authorization:
                      type: Bearer
                      credentials: "{{ .ntfy_token }}"
              telegram_configs:
                - bot_token: "{{ .telegram_bot_token }}"
                  chat_id: {{ .telegram_chat_id }}
                  parse_mode: HTML
            - name: ntfy-warning
              webhook_configs:
                - url: "http://ntfy.observability.svc.cluster.local:8080/alerts-warning?template=alertmanager"
                  http_config:
                    authorization:
                      type: Bearer
                      credentials: "{{ .ntfy_token }}"
            - name: ntfy-digest
              webhook_configs:
                - url: "http://ntfy.observability.svc.cluster.local:8080/alerts-digest?template=alertmanager&priority=low"
                  http_config:
                    authorization:
                      type: Bearer
                      credentials: "{{ .ntfy_token }}"
            - name: deadman
              webhook_configs:
                - url: "{{ .healthchecks_ping_url }}"
                  send_resolved: false
                  max_alerts: 1
          inhibit_rules:
            - source_matchers:
                - severity="critical"
              target_matchers:
                - severity="warning"
              equal:
                - namespace
                - alertname
  data:
    - {secretKey: ntfy_token, remoteRef: {key: ntfy/auth, property: alertmanager_token}}
    - {secretKey: telegram_bot_token, remoteRef: {key: alertmanager/telegram, property: bot_token}}
    - {secretKey: telegram_chat_id, remoteRef: {key: alertmanager/telegram, property: chat_id}}
    - {secretKey: healthchecks_ping_url, remoteRef: {key: alertmanager/healthchecks, property: ping_url}}
