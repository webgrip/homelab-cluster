---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMSingle
metadata:
  name: vmsingle
spec:
  # 15d local retention — matches the Prometheus this replaces (Mimir long-term
  # store is disabled). Query + ingest endpoint: vmsingle-vmsingle:8429.
  retentionPeriod: "15d"
  replicaCount: 1
  removePvcAfterDelete: false
  storage:
    accessModes:
      - ReadWriteOnce
    storageClassName: longhorn
    resources:
      requests:
        storage: 50Gi
  podMetadata:
    annotations:
      reloader.stakater.com/auto: "true"
  # ram: high = worker-1. The metrics DB was running on the memory-saturated fringe
  # workstation (1.2GB RSS, PSI-stall epicenter) — meaning observability degraded
  # exactly when the node misbehaved. Move is a Longhorn RWO reattach; vmagent's
  # persistent queue buffers scrapes across the gap (VIK-331 slice 1).
  # (Old dedicated=fringe toleration removed — that taint was retired 2026-06-19,
  # ADR-0002; it was dead config.)
  nodeSelector:
    node.webgrip.io/pool: worker
    node.webgrip.io/ram: high
  # Right-sized down from Prometheus's mirrored 400m/3Gi after measuring steady
  # state: VMSingle uses ~1Gi RAM / ~120m CPU for this workload (~390k active
  # series, ~8.7k samples/s). Request 1.5Gi (~50% headroom); 4Gi limit absorbs
  # query spikes. Frees ~1.5Gi of reservation on worker-1.
  # (Storage stays 50Gi — Longhorn can't shrink a PVC online; ~6x oversized for
  # 15d but harmless.)
  resources:
    requests:
      cpu: 200m
      memory: 1536Mi
    limits:
      cpu: "2"
      memory: 4Gi
