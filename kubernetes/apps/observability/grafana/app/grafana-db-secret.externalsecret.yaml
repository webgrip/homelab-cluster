---
# grafana-db-secret now sourced from OpenBao. Replaces SOPS. Value-preserving (CNPG bootstrap secret).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: grafana-db-secret, namespace: observability}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: grafana-db-secret, creationPolicy: Owner}
  dataFrom:
    - extract: {key: grafana/db}
