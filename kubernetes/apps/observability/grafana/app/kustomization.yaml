---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrepository.yaml
  - ./admin-secret.sops.yaml
  - ./grafana-oauth.sops.yaml
  - ./grafana-github-api.sops.yaml
  - ./grafana-db-secret.sops.yaml
  - ./grafana-instance.yaml
  - ./httproute.yaml
  - ./servicemonitor.yaml
  # Folders (explicit GrafanaFolder CRDs — one per Grafana folder)
  - ./folders/apps.yaml
  - ./folders/claude-code.yaml
  - ./folders/data.yaml
  - ./folders/kubernetes.yaml
  - ./folders/networking.yaml
  - ./folders/observability.yaml
  - ./folders/platform.yaml
  - ./folders/security.yaml
  - ./folders/storage.yaml
  - ./folders/synthetics.yaml
  # Service accounts (GrafanaServiceAccount CRDs — one per consumer)
  - ./service-accounts/mcp-grafana.yaml
  # Datasources (GrafanaDatasource CRDs — one per data source)
  - ./datasources/prometheus.yaml
  - ./datasources/loki.yaml
  - ./datasources/tempo.yaml
  - ./datasources/pyroscope.yaml
  - ./datasources/alertmanager.yaml
  - ./datasources/github-api.yaml
  # Cross-cutting dashboards (GrafanaDashboard CRDs — fleet-wide, no single owning service)
  - ./dashboards/cluster-ops-overview.yaml
  - ./dashboards/kubernetes-cluster-health.yaml
  - ./dashboards/kubernetes-workloads-capacity.yaml
  - ./dashboards/observability-lgtm-health.yaml
  - ./dashboards/storage-pvc-longhorn.yaml
  - ./dashboards/claude-code-command-center.yaml
  - ./dashboards/claude-code-cost-tokens.yaml
  - ./dashboards/claude-code-activity-tools.yaml
  - ./dashboards/claude-code-events-traces.yaml
  - ./dashboards/claude-code-provider-comparison.yaml
  - ./dashboards/claude-code-exec-summary.yaml
  - ./dashboards/claude-code-model-economics.yaml
  - ./dashboards/claude-code-cache-economics.yaml
  - ./dashboards/claude-code-errors-reliability.yaml
  - ./dashboards/claude-code-session-explorer.yaml
  - ./dashboards/arc-fleet-command-center.yaml
  - ./dashboards/apps-arc-systems.yaml
  - ./dashboards/apps-backstage.yaml
  - ./dashboards/apps-freshrss.yaml
  - ./dashboards/apps-invoiceninja.yaml
  - ./dashboards/apps-searxng.yaml
  - ./dashboards/apps-sparkyfitness.yaml
  - ./dashboards/apps-zomboid.yaml
  - ./dashboards/cert-manager-certificates.yaml
  - ./dashboards/cilium-networking.yaml
  - ./dashboards/cnpg-backups-dr.yaml
  - ./dashboards/envoy-gateway-traffic.yaml
  - ./dashboards/flux-gitops-health.yaml
  - ./dashboards/kyverno-policy-insights.yaml
  - ./dashboards/kyverno-rbac-least-privilege.yaml
  - ./dashboards/kyverno-violations.yaml
  - ./dashboards/longhorn-storage-health.yaml
  - ./dashboards/platform-renovate-operator.yaml
  - ./dashboards/security-cosign-github-oidc.yaml
  - ./dashboards/security-falco-runtime.yaml
  - ./dashboards/security-tetragon-runtime.yaml
  - ./dashboards/security-overview.yaml
  - ./dashboards/security-trivy-compliance.yaml
  - ./dashboards/security-trivy-sbom.yaml
  - ./dashboards/security-dependency-track.yaml
  - ./dashboards/security-authentik.yaml
  # Grafana Alert Rule Groups (SLOs — evaluated by Grafana Alerting)
  - ./alerting
