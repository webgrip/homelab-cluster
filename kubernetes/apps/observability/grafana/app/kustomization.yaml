---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrepository.yaml
  - ./admin-secret.sops.yaml
  - ./grafana-github-oauth.sops.yaml
  - ./grafana-github-api.sops.yaml
  - ./grafana-db-secret.sops.yaml
  - ./grafana-instance.yaml
  - ./httproute.yaml
  - ./servicemonitor.yaml
  # Folders (explicit GrafanaFolder CRDs — one per Grafana folder)
  - ./folders/apps.yaml
  - ./folders/data.yaml
  - ./folders/github-copilot.yaml
  - ./folders/kubernetes.yaml
  - ./folders/networking.yaml
  - ./folders/observability.yaml
  - ./folders/platform.yaml
  - ./folders/security.yaml
  - ./folders/storage.yaml
  - ./folders/synthetics.yaml
  # Service accounts (GrafanaServiceAccount CRDs — one per consumer)
  - ./service-accounts/mcp-grafana.yaml
  # Datasources (GrafanaDatasource CRDs — one per data source)
  - ./datasources/prometheus.yaml
  - ./datasources/loki.yaml
  - ./datasources/tempo.yaml
  - ./datasources/pyroscope.yaml
  - ./datasources/alertmanager.yaml
  - ./datasources/github-api.yaml
  # Cross-cutting dashboards (GrafanaDashboard CRDs — fleet-wide, no single owning service)
  - ./dashboards/cluster-ops-overview.yaml
  - ./dashboards/kubernetes-cluster-health.yaml
  - ./dashboards/kubernetes-workloads-capacity.yaml
  - ./dashboards/observability-lgtm-health.yaml
  - ./dashboards/storage-pvc-longhorn.yaml
  - ./dashboards/copilot-command-center.yaml
  - ./dashboards/copilot-activity-overview.yaml
  - ./dashboards/copilot-agent-performance.yaml
  - ./dashboards/copilot-code-impact.yaml
  - ./dashboards/github-usage-billing.yaml
  - ./dashboards/github-cost-executive.yaml

