---
# grafana-github-api now sourced from OpenBao (seeded by the PushSecret). Replaces
# grafana-github-api.sops.yaml. Same Secret name + key, so the GitHub datasource is unchanged.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-github-api
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: grafana-github-api
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: grafana/github-api
        property: token
