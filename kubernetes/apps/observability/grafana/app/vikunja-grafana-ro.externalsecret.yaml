---
# grafana_ro password for the vikunja-db datasource — the SAME value CNPG set on the role
# in the vikunja namespace (generated + pushed to OpenBao KV secret/vikunja/grafana-ro there).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vikunja-grafana-ro
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: vikunja-grafana-ro
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: vikunja/grafana-ro
