---
# grafana-oauth now sourced from OpenBao. Replaces grafana-oauth.sops.yaml. Authentik-minted
# client secret preserved (not rotated) — verify SSO login after swap.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oauth
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: grafana-oauth, creationPolicy: Owner}
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
      remoteRef: {key: grafana/oauth, property: GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef: {key: grafana/oauth, property: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
