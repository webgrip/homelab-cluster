---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: infra-harbor
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "Infrastructure"
  json: |-
    {
      "schemaVersion": 39,
      "title": "Harbor / Runtime Health",
      "uid": "infra-harbor",
      "timezone": "browser",
      "tags": [
        "infrastructure",
        "harbor",
        "registry",
        "oci"
      ],
      "editable": false,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Health overview",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "stat",
          "title": "Pods Running",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{namespace=\"harbor\",phase=\"Running\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 2,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 0,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Pods Not Running",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{namespace=\"harbor\",phase=~\"Pending|Failed|Unknown\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 3,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 3,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Restarts (1h)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"harbor\"}[1h])) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 4,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 6,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "OOM kills (24h)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(container_oom_events_total{namespace=\"harbor\"}[24h])) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 5,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 9,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Waiting containers",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_status_waiting{namespace=\"harbor\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 6,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 12,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "CPU (cores)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"harbor\",image!=\"\"}[$$__rate_interval])) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "cores"
            },
            "overrides": []
          },
          "id": 7,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 15,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Memory",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(container_memory_working_set_bytes{namespace=\"harbor\",image!=\"\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "unit": "bytes"
            },
            "overrides": []
          },
          "id": 8,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 18,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Max PVC used",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max((kubelet_volume_stats_used_bytes{namespace=\"harbor\"} / kubelet_volume_stats_capacity_bytes{namespace=\"harbor\"}) * 100) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 75
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 9,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 21,
            "y": 1
          }
        },
        {
          "id": 10,
          "type": "row",
          "title": "Harbor \u2014 registry",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          }
        },
        {
          "type": "stat",
          "title": "Harbor up",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max(harbor_up{namespace=\"harbor\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "Down",
                      "color": "red"
                    },
                    "1": {
                      "text": "Up",
                      "color": "green"
                    }
                  }
                }
              ]
            },
            "overrides": []
          },
          "id": 11,
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 6
          }
        },
        {
          "type": "stat",
          "title": "Projects",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max(harbor_statistics_total_project_amount{namespace=\"harbor\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0
            },
            "overrides": []
          },
          "id": 12,
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 6
          }
        },
        {
          "type": "stat",
          "title": "Repositories",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max(harbor_statistics_total_repo_amount{namespace=\"harbor\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0
            },
            "overrides": []
          },
          "id": 13,
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 6
          }
        },
        {
          "type": "stat",
          "title": "Storage used",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max(harbor_statistics_total_storage_consumption{namespace=\"harbor\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "unit": "bytes"
            },
            "overrides": []
          },
          "id": 14,
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 6
          }
        },
        {
          "type": "stat",
          "title": "Core 5xx rate",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(harbor_core_http_request_total{namespace=\"harbor\",code=~\"5..\"}[$$__rate_interval])) / clamp_min(sum(rate(harbor_core_http_request_total{namespace=\"harbor\"}[$$__rate_interval])), 1) * 100 or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 15,
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 6
          }
        },
        {
          "type": "stat",
          "title": "Tasks queued",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(harbor_task_queue_size{namespace=\"harbor\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0
            },
            "overrides": []
          },
          "id": 16,
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 20,
            "y": 6
          }
        },
        {
          "type": "timeseries",
          "title": "Core HTTP request rate by code",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (code) (rate(harbor_core_http_request_total{namespace=\"harbor\"}[$$__rate_interval]))",
              "legendFormat": "{{code}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "id": 17,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 10
          }
        },
        {
          "type": "timeseries",
          "title": "Core request avg latency by operation",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (operation) (rate(harbor_core_http_request_duration_seconds_sum{namespace=\"harbor\"}[$$__rate_interval])) / clamp_min(sum by (operation) (rate(harbor_core_http_request_duration_seconds_count{namespace=\"harbor\"}[$$__rate_interval])), 1)",
              "legendFormat": "{{operation}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 4,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "description": "Mean handler latency (sum/count). Harbor does not expose le buckets, so a true p95 is not available.",
          "id": 18,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 10
          }
        },
        {
          "type": "timeseries",
          "title": "Artifact pulls /s",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(harbor_artifact_pulled{namespace=\"harbor\"}[$$__rate_interval]))",
              "legendFormat": "pulls"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "decimals": 3,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "id": 19,
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 0,
            "y": 18
          }
        },
        {
          "type": "timeseries",
          "title": "Jobservice tasks by status",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (status) (harbor_jobservice_task_total{namespace=\"harbor\"})",
              "legendFormat": "{{status}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "id": 20,
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 8,
            "y": 18
          }
        },
        {
          "type": "timeseries",
          "title": "Quota usage by project",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (project_name) (harbor_project_quota_usage_byte{namespace=\"harbor\"})",
              "legendFormat": "{{project_name}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "id": 21,
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 16,
            "y": 18
          }
        },
        {
          "type": "table",
          "title": "Component scrape status",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "up{namespace=\"harbor\"}",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            {
