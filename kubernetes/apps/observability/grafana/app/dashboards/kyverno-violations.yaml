---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kyverno-violations
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "Security"
  json: |-
    {
      "schemaVersion": 39,
      "title": "Kyverno / Policy Violations",
      "uid": "kyverno-violations",
      "timezone": "browser",
      "tags": [
        "kyverno",
        "policy",
        "security",
        "compliance",
        "violations"
      ],
      "description": "Violation triage — what is failing right now and what needs to be fixed? Powered by Kyverno and Policy Reporter.",
      "editable": true,
      "graphTooltip": 1,
      "refresh": "2m",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timepicker": {
        "refresh_intervals": [
          "30s",
          "1m",
          "2m",
          "5m",
          "15m",
          "30m",
          "1h"
        ],
        "time_options": [
          "3h",
          "6h",
          "12h",
          "24h",
          "2d",
          "7d",
          "30d"
        ]
      },
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "name": "namespace",
            "options": [],
            "label": "Namespace",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(policy_report_result, namespace)",
            "query": {
              "query": "label_values(policy_report_result, namespace)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          },
          {
            "current": {},
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "name": "policy",
            "options": [],
            "label": "Policy",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(policy_report_result{status=\"fail\"}, policy)",
            "query": {
              "query": "label_values(policy_report_result{status=\"fail\"}, policy)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          },
          {
            "current": {
              "selected": true,
              "text": [
                "All"
              ],
              "value": [
                "$__all"
              ]
            },
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "name": "severity",
            "label": "Severity",
            "allValue": ".*",
            "options": [
              {
                "selected": false,
                "text": "critical",
                "value": "critical"
              },
              {
                "selected": false,
                "text": "high",
                "value": "high"
              },
              {
                "selected": false,
                "text": "medium",
                "value": "medium"
              },
              {
                "selected": false,
                "text": "low",
                "value": "low"
              },
              {
                "selected": false,
                "text": "unknown",
                "value": "unknown"
              }
            ],
            "query": "critical,high,medium,low,unknown",
            "type": "custom"
          }
        ]
      },
      "annotations": {
        "list": []
      },
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "Open Violations",
          "description": "Total active policy violations across all namespaces from Policy Reporter",
          "type": "stat",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 50
                  }
                ]
              },
              "unit": "short",
              "noValue": "0"
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum((policy_report_result or cluster_policy_report_result){status=\"fail\"})",
              "refId": "A",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "id": 2,
          "title": "Critical Violations",
          "description": "Active violations with severity=critical — require immediate triage",
          "type": "stat",
          "gridPos": {
            "x": 4,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "unit": "short",
              "noValue": "0"
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum((policy_report_result or cluster_policy_report_result){status=\"fail\",severity=\"critical\"})",
              "refId": "A",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "id": 3,
          "title": "High Violations",
          "description": "Active violations with severity=high",
          "type": "stat",
          "gridPos": {
            "x": 8,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              },
              "unit": "short",
              "noValue": "0"
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum((policy_report_result or cluster_policy_report_result){status=\"fail\",severity=\"high\"})",
              "refId": "A",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "id": 4,
          "title": "New Violations (last 1 h)",
          "description": "Increase in policy failure results over the last hour",
          "type": "stat",
          "gridPos": {
            "x": 12,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 20
                  }
                ]
              },
              "unit": "short",
              "noValue": "0"
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(increase(kyverno_policy_results_total{rule_result=\"fail\"}[1h]))",
              "refId": "A",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "id": 5,
          "title": "Namespaces with Violations",
          "description": "Number of distinct namespaces that have at least one active Policy Reporter violation",
          "type": "stat",
          "gridPos": {
            "x": 16,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              },
              "unit": "short",
              "noValue": "0"
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "count(count by (namespace) ((policy_report_result or cluster_policy_report_result){status=\"fail\"} > 0))",
              "refId": "A",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "id": 6,
          "title": "Blocked Admissions",
          "description": "Enforce-mode policy failures that blocked admission operations in the selected time range",
          "type": "stat",
          "gridPos": {
            "x": 20,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              },
              "unit": "short",
              "noValue": "0"
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(increase(kyverno_policy_results_total{rule_result=\"fail\",policy_validation_mode=\"enforce\"}[$__range]))",
              "refId": "A",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "id": 7,
          "title": "Violations by Severity",
          "description": "Breakdown of active violations by severity level",
          "type": "barchart",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 6,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "options": {
            "orientation": "horizontal",
            "tooltip": {
              "mode": "single"
            },
            "legend": {
              "showLegend": false
            },
            "barWidth": 0.7
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byValue",
                  "options": {
                    "reducer": {
                      "id": "allIsNull"
                    }
                  }
                },
                "properties": []
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "critical"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "red",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "high"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "orange",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "medium"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "yellow",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "low"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "blue",
                      "mode": "fixed"
                    }
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (severity) (policy_report_result{status=\"fail\",namespace=~\"$namespace\"})",
              "refId": "A",
              "legendFormat": "{{severity}}",
              "instant": true
            }
          ]
        },
        {
          "id": 8,
          "title": "Violations by Namespace",
          "description": "Top 15 namespaces by violation count — sorted descending",
          "type": "barchart",
          "gridPos": {
            "x": 6,
            "y": 4,
            "w": 10,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "options": {
            "orientation": "horizontal",
            "tooltip": {
              "mode": "single"
            },
            "legend": {
              "showLegend": false
            },
            "barWidth": 0.7
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "topk(15, sum by (namespace) ((policy_report_result or cluster_policy_report_result){status=\"fail\"}))",
              "refId": "A",
              "legendFormat": "{{namespace}}",
              "instant": true
            }
          ]
        },
        {
          "id": 9,
          "title": "Violation Trend",
          "description": "New violations over time broken down by severity — use $__interval for trending",
          "type": "timeseries",
          "gridPos": {
            "x": 16,
            "y": 4,
            "w": 8,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "fillOpacity": 15,
                "stacking": {
                  "mode": "normal",
                  "group": "A"
                },
                "gradientMode": "opacity"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "critical"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "red",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "high"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "orange",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "medium"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "yellow",
                      "mode": "fixed"
                    }
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (severity) (increase(kyverno_policy_results_total{rule_result=\"fail\"}[$__interval]))",
              "refId": "A",
              "legendFormat": "{{severity}}"
            }
          ]
        },
        {
          "id": 10,
          "title": "Violation Details",
          "description": "Full triage table — every active violation with namespace, resource, kind, policy, rule, severity, and category",
          "type": "table",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 24,
            "h": 16
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "options": {
            "footer": {
              "show": false,
              "reducer": [
                "sum"
              ],
              "fields": ""
            },
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "severity",
                "desc": false
              }
            ]
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "align": "left",
                "displayMode": "auto",
                "inspect": false
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "severity"
                },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-text"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "critical": {
                            "color": "red",
                            "index": 0,
                            "text": "critical"
                          },
                          "high": {
                            "color": "orange",
                            "index": 1,
                            "text": "high"
                          },
                          "medium": {
                            "color": "yellow",
                            "index": 2,
                            "text": "medium"
                          },
                          "low": {
                            "color": "blue",
                            "index": 3,
                            "text": "low"
                          },
                          "unknown": {
                            "color": "grey",
                            "index": 4,
                            "text": "unknown"
                          }
                        }
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "namespace"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 160
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "name"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Resource"
                  },
                  {
                    "id": "custom.width",
                    "value": 200
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "kind"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 110
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "policy"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 220
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "rule"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 180
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "severity"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 90
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "category"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 130
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "source"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 130
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Value"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Count"
                  },
                  {
                    "id": "custom.width",
                    "value": 70
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (namespace, policy, rule, kind, name, status, severity, category, source) (policy_report_result{namespace=~\"$namespace\",policy=~\"$policy\",status=\"fail\"})",
              "refId": "A",
              "legendFormat": "",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "status": true
                },
                "indexByName": {
                  "severity": 0,
                  "namespace": 1,
                  "name": 2,
                  "kind": 3,
                  "policy": 4,
                  "rule": 5,
                  "category": 6,
                  "source": 7,
                  "Value": 8
                },
                "renameByName": {
                  "Value": "Count"
                }
              }
            }
          ]
        },
        {
          "id": 11,
          "title": "Violations by Policy",
          "description": "Top 20 policies by violation count across filtered namespaces",
          "type": "barchart",
          "gridPos": {
            "x": 0,
            "y": 28,
            "w": 8,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "options": {
            "orientation": "horizontal",
            "tooltip": {
              "mode": "single"
            },
            "legend": {
              "showLegend": false
            },
            "barWidth": 0.7
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
