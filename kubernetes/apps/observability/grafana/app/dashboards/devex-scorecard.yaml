---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: devex-scorecard
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: engineering-experience
  json: |-
    {
      "schemaVersion": 39,
      "title": "DevEx — Engineering Experience Scorecard",
      "uid": "devex-scorecard",
      "tags": ["devex", "space", "engineering-experience", "scorecard"],
      "editable": true,
      "timezone": "browser",
      "refresh": "",
      "time": {"from": "now-13M", "to": "now"},
      "links": [
        {"title": "Dimensions & themes", "url": "/d/devex-dimensions", "type": "link", "icon": "external link"},
        {"title": "Survey ↔ Telemetry", "url": "/d/devex-telemetry-correlation", "type": "link", "icon": "external link"},
        {"title": "Executive scorecard", "url": "/d/exec-kpi-scorecard", "type": "link", "icon": "dashboard"}
      ],
      "templating": {"list": []},
      "annotations": {"list": [{"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "name": "Annotations & Alerts", "type": "dashboard"}]},
      "panels": [
        {
          "id": 1, "type": "text", "gridPos": {"h": 3, "w": 24, "x": 0, "y": 0},
          "options": {"mode": "markdown", "content": "## DevEx — Engineering Experience Scorecard\nMonthly anonymous pulse (SPACE + DevEx), scored 0–100. **DevEx index** = 0.25·Satisfaction + 0.30·Feedback loops + 0.20·Cognitive load + 0.15·Flow + 0.10·Collaboration. Bands: 🟥 <55 · 🟧 55–69 · 🟩 ≥70. Team rows with fewer than 5 responses are suppressed. Teams prefixed `demo-` are synthetic seed data — run the teardown Job to remove."}
        },

        {"id": 10, "type": "row", "title": "Latest month — DevEx index & dimensions", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 3}},
        {
          "id": 11, "type": "stat", "title": "DevEx index", "description": "Composite weighted index across all teams, most recent month.", "gridPos": {"h": 4, "w": 6, "x": 0, "y": 4},
          "datasource": {"type": "postgres", "uid": "postgres-devex"},
          "targets": [{"refId": "A", "format": "table", "rawSql": "SELECT normalized_score FROM grafana_devex_org WHERE dimension='devex_index' ORDER BY month DESC LIMIT 1"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": ""}, "colorMode": "background", "graphMode": "none", "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "none", "decimals": 0, "min": 0, "max": 100, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 55}, {"color": "green", "value": 70}]}}}
        },
        {
          "id": 12, "type": "stat", "title": "Satisfaction", "gridPos": {"h": 4, "w": 6, "x": 6, "y": 4},
          "datasource": {"type": "postgres", "uid": "postgres-devex"},
          "targets": [{"refId": "A", "format": "table", "rawSql": "SELECT normalized_score FROM grafana_devex_org WHERE dimension='satisfaction' ORDER BY month DESC LIMIT 1"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": ""}, "colorMode": "background", "graphMode": "none", "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "none", "decimals": 0, "min": 0, "max": 100, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 55}, {"color": "green", "value": 70}]}}}
        },
        {
          "id": 13, "type": "stat", "title": "Feedback loops", "gridPos": {"h": 4, "w": 6, "x": 12, "y": 4},
          "datasource": {"type": "postgres", "uid": "postgres-devex"},
          "targets": [{"refId": "A", "format": "table", "rawSql": "SELECT normalized_score FROM grafana_devex_org WHERE dimension='feedback_loops' ORDER BY month DESC LIMIT 1"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": ""}, "colorMode": "background", "graphMode": "none", "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "none", "decimals": 0, "min": 0, "max": 100, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 55}, {"color": "green", "value": 70}]}}}
        },
        {
          "id": 14, "type": "stat", "title": "Cognitive load (clarity)", "description": "Higher = lower friction / clearer paths.", "gridPos": {"h": 4, "w": 6, "x": 18, "y": 4},
          "datasource": {"type": "postgres", "uid": "postgres-devex"},
          "targets": [{"refId": "A", "format": "table", "rawSql": "SELECT normalized_score FROM grafana_devex_org WHERE dimension='cognitive_load' ORDER BY month DESC LIMIT 1"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": ""}, "colorMode": "background", "graphMode": "none", "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "none", "decimals": 0, "min": 0, "max": 100, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 55}, {"color": "green", "value": 70}]}}}
        },
        {
          "id": 15, "type": "stat", "title": "Flow state", "gridPos": {"h": 4, "w": 6, "x": 0, "y": 8},
          "datasource": {"type": "postgres", "uid": "postgres-devex"},
          "targets": [{"refId": "A", "format": "table", "rawSql": "SELECT normalized_score FROM grafana_devex_org WHERE dimension='flow' ORDER BY month DESC LIMIT 1"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": ""}, "colorMode": "background", "graphMode": "none", "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "none", "decimals": 0, "min": 0, "max": 100, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 55}, {"color": "green", "value": 70}]}}}
        },
        {
          "id": 16, "type": "stat", "title": "Collaboration", "gridPos": {"h": 4, "w": 6, "x": 6, "y": 8},
          "datasource": {"type": "postgres", "uid": "postgres-devex"},
          "targets": [{"refId": "A", "format": "table", "rawSql": "SELECT normalized_score FROM grafana_devex_org WHERE dimension='collaboration' ORDER BY month DESC LIMIT 1"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": ""}, "colorMode": "background", "graphMode": "none", "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "none", "decimals": 0, "min": 0, "max": 100, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 55}, {"color": "green", "value": 70}]}}}
        },
        {
          "id": 17, "type": "stat", "title": "Responses (latest month)", "description": "Total respondents across teams in the most recent surveyed month.", "gridPos": {"h": 4, "w": 12, "x": 12, "y": 8},
          "datasource": {"type": "postgres", "uid": "postgres-devex"},
          "targets": [{"refId": "A", "format": "table", "rawSql": "SELECT response_count FROM grafana_devex_org WHERE dimension='devex_index' ORDER BY month DESC LIMIT 1"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": ""}, "colorMode": "background", "graphMode": "none", "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 5}, {"color": "green", "value": 8}]}}}
        },

        {"id": 20, "type": "row", "title": "Trends", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 12}},
        {
          "id": 21, "type": "timeseries", "title": "DevEx index over time", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 13},
          "datasource": {"type": "postgres", "uid": "postgres-devex"},
          "targets": [{"refId": "A", "format": "time_series", "rawSql": "SELECT month AS time, normalized_score AS value FROM grafana_devex_org WHERE dimension='devex_index' ORDER BY 1"}],
          "fieldConfig": {"defaults": {"unit": "none", "min": 0, "max": 100, "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 8, "showPoints": "always", "spanNulls": true}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 55}, {"color": "green", "value": 70}]}, "color": {"mode": "thresholds"}}},
          "options": {"legend": {"showLegend": false}, "tooltip": {"mode": "single"}}
        },
        {
          "id": 22, "type": "timeseries", "title": "Dimensions over time", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 13},
          "datasource": {"type": "postgres", "uid": "postgres-devex"},
          "targets": [{"refId": "A", "format": "time_series", "rawSql": "SELECT month AS time, normalized_score AS value, dimension AS metric FROM grafana_devex_org WHERE dimension <> 'devex_index' ORDER BY 1"}],
          "fieldConfig": {"defaults": {"unit": "none", "min": 0, "max": 100, "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 0, "showPoints": "auto", "spanNulls": true}}},
          "options": {"legend": {"showLegend": true, "placement": "bottom", "displayMode": "list"}, "tooltip": {"mode": "multi"}}
        },

        {"id": 30, "type": "row", "title": "Teams — latest month (n≥5 suppressed)", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 21}},
        {
          "id": 31, "type": "table", "title": "Per-team dimension scores (latest month)", "gridPos": {"h": 9, "w": 24, "x": 0, "y": 22},
          "datasource": {"type": "postgres", "uid": "postgres-devex"},
          "targets": [{"refId": "A", "format": "table", "rawSql": "SELECT team, satisfaction, feedback_loops, cognitive_load, flow, collaboration, devex_index, response_count FROM grafana_survey_dim_wide WHERE month=(SELECT max(month) FROM grafana_survey_dim_wide) AND response_count >= 5 ORDER BY devex_index DESC NULLS LAST"}],
          "fieldConfig": {
            "defaults": {"unit": "none", "decimals": 0, "custom": {"cellOptions": {"type": "color-background", "mode": "gradient"}, "align": "center"}, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 55}, {"color": "green", "value": 70}]}},
            "overrides": [
              {"matcher": {"id": "byName", "options": "team"}, "properties": [{"id": "custom.cellOptions", "value": {"type": "auto"}}, {"id": "custom.align", "value": "left"}]},
              {"matcher": {"id": "byName", "options": "response_count"}, "properties": [{"id": "custom.cellOptions", "value": {"type": "auto"}}, {"id": "thresholds", "value": {"mode": "absolute", "steps": [{"color": "text", "value": null}]}}]}
            ]
          },
          "options": {"showHeader": true, "cellHeight": "sm"}
        }
      ]
    }
