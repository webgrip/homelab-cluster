        {
          "id": 20,
          "type": "row",
          "title": "Nodes \u2014 capacity, commitment & headroom",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 10
          },
          "panels": []
        },
        {
          "id": 21,
          "type": "bargauge",
          "title": "Node CPU used (% of allocatable)",
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 0,
            "y": 11
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "",
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (node) (rate(container_cpu_usage_seconds_total{node=~\"$$node\",container!=\"\"}[$$__rate_interval])) / sum by (node) (kube_node_status_allocatable{node=~\"$$node\",resource=\"cpu\"})",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{node}}"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "displayMode": "gradient",
            "orientation": "horizontal",
            "showUnfilled": true,
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1.0,
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
