          "description": "",
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (node) (container_memory_working_set_bytes{node=~\"$$node\",container!=\"\"}) / sum by (node) (kube_node_status_allocatable{node=~\"$$node\",resource=\"memory\"})",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{node}}"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "displayMode": "gradient",
            "orientation": "horizontal",
            "showUnfilled": true,
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
