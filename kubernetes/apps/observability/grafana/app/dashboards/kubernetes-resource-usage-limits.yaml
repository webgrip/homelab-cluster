          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1.0,
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.75
                  },
                  {
                    "color": "red",
                    "value": 0.9
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 14,
          "type": "gauge",
          "title": "Memory requested",
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 16,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Sum of memory requests vs allocatable. >100% = no schedulable headroom.",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_resource_requests{node=~\"$$node\",resource=\"memory\"}) / sum(kube_node_status_allocatable{node=~\"$$node\",resource=\"memory\"}) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1.25,
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.85
                  },
                  {
                    "color": "red",
                    "value": 1.0
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 15,
          "type": "gauge",
          "title": "Memory limits",
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 20,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Sum of memory limits vs allocatable. >100% = overcommitted (risky for memory).",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_resource_limits{node=~\"$$node\",resource=\"memory\"}) / sum(kube_node_status_allocatable{node=~\"$$node\",resource=\"memory\"}) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 2.0,
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1.0
                  },
                  {
                    "color": "orange",
                    "value": 1.5
                  },
                  {
