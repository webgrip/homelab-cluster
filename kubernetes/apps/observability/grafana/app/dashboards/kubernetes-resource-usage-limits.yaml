---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kubernetes-resource-usage-limits
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: kubernetes
  json: |-
    {
      "schemaVersion": 39,
      "title": "Kubernetes / Capacity, Limits & Right-Sizing",
      "uid": "k8s-resource-usage-limits",
      "description": "Top-down cluster capacity: node allocatable vs requests/limits/usage, namespace and per-workload right-sizing (usage vs requests & limits), live throttling/OOM/restart/pending signals, and PVC fill. Source: kube-state-metrics, cAdvisor, kubelet and node-exporter via kube-prometheus-stack.",
      "timezone": "browser",
      "tags": [
        "kubernetes",
        "capacity",
        "resources"
      ],
      "editable": false,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "name": "node",
            "label": "Node",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": {
              "query": "label_values(kube_node_status_allocatable, node)",
              "refId": "A"
            },
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$$__all"
            }
          },
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": {
              "query": "label_values(kube_namespace_status_phase, namespace)",
              "refId": "A"
            },
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$$__all"
            }
          },
          {
            "name": "workload",
            "label": "Workload",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": {
              "query": "label_values(namespace_workload_pod:kube_pod_owner:relabel{namespace=~\"$$namespace\"}, workload)",
              "refId": "A"
            },
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Nodes Ready",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\",node=~\"$$node\"}) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "graphMode": "none",
            "colorMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0
            },
            "overrides": []
          },
          "description": "Nodes reporting Ready (respects the Node filter)."
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Pods Running",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{namespace=~\"$$namespace\",phase=\"Running\"} == 1) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "graphMode": "none",
            "colorMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Pods Pending",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{namespace=~\"$$namespace\",phase=\"Pending\"} == 1) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "graphMode": "none",
            "colorMode": "background",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "description": "Pods stuck Pending \u2014 usually unschedulable (insufficient CPU/mem requests fit no node)."
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Restarts (1h)",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"$$namespace\"}[1h])) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "graphMode": "none",
            "colorMode": "value",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "OOMKilled (current)",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_status_last_terminated_reason{namespace=~\"$$namespace\",reason=\"OOMKilled\"} == 1) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "graphMode": "none",
            "colorMode": "background",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "description": "Containers whose last termination reason was OOMKilled \u2014 raise the memory limit."
        },
        {
          "id": 6,
          "type": "stat",
          "title": "PVCs > 80% full",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 20,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count((kubelet_volume_stats_used_bytes{namespace=~\"$$namespace\"} / kubelet_volume_stats_capacity_bytes{namespace=~\"$$namespace\"}) > 0.8) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "graphMode": "none",
            "colorMode": "background",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 10,
          "type": "gauge",
          "title": "CPU used",
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 0,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Actual CPU usage as a share of node allocatable CPU.",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{node=~\"$$node\",container!=\"\"}[$$__rate_interval])) / sum(kube_node_status_allocatable{node=~\"$$node\",resource=\"cpu\"}) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1.0,
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.75
                  },
                  {
                    "color": "red",
                    "value": 0.9
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 11,
          "type": "gauge",
          "title": "CPU requested",
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 4,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Sum of CPU requests vs allocatable \u2014 the scheduler's view. >100% = no schedulable headroom.",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_resource_requests{node=~\"$$node\",resource=\"cpu\"}) / sum(kube_node_status_allocatable{node=~\"$$node\",resource=\"cpu\"}) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1.25,
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.85
                  },
                  {
                    "color": "red",
                    "value": 1.0
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 12,
          "type": "gauge",
          "title": "CPU limits",
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 8,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Sum of CPU limits vs allocatable. >100% = overcommitted (normal for CPU).",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_resource_limits{node=~\"$$node\",resource=\"cpu\"}) / sum(kube_node_status_allocatable{node=~\"$$node\",resource=\"cpu\"}) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 2.0,
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1.0
                  },
                  {
                    "color": "orange",
                    "value": 1.5
                  },
                  {
                    "color": "red",
                    "value": 2.0
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 13,
          "type": "gauge",
          "title": "Memory used",
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 12,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Actual working-set memory as a share of node allocatable memory.",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(container_memory_working_set_bytes{node=~\"$$node\",container!=\"\"}) / sum(kube_node_status_allocatable{node=~\"$$node\",resource=\"memory\"}) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
