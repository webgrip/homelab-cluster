---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kyverno-policy-insights
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "Security"
  json: |-
    {
      "schemaVersion": 39,
      "title": "Kyverno / Policy Insights",
      "uid": "kyverno-policy-insights",
      "timezone": "browser",
      "tags": ["kyverno", "policy", "security", "compliance"],
      "description": "Enterprise Kyverno observability: admission control, policy results, webhook latency, controller health, and compliance posture.",
      "editable": false,
      "graphTooltip": 1,
      "refresh": "1m",
      "time": {"from": "now-6h", "to": "now"},
      "timepicker": {
        "refresh_intervals": ["10s", "30s", "1m", "5m", "15m", "30m", "1h"],
        "time_options": ["1h", "3h", "6h", "12h", "24h", "2d", "7d", "30d"]
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "pluginId": "prometheus",
            "label": "Datasource",
            "hide": 0,
            "current": {}
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "label": "Namespace",
            "hide": 0,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "query": "label_values(kyverno_admission_requests_total{job=~\"kyverno.*\"}, resource_namespace)",
            "refresh": 2,
            "sort": 1,
            "current": {}
          },
          {
            "name": "policy",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "label": "Policy",
            "hide": 0,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "query": "label_values(kyverno_admission_requests_total{job=~\"kyverno.*\"}, resource_kind)",
            "refresh": 2,
            "sort": 1,
            "current": {}
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "name": "Flux Deployments",
            "datasource": {"type": "prometheus", "uid": "${datasource}"},
            "expr": "changes(kyverno_info[2m]) > 0",
            "step": "60s",
            "titleFormat": "Kyverno Restarted",
            "textFormat": "Kyverno process restarted",
            "iconColor": "orange",
            "hide": false,
            "enable": true
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "title": "🛡️  Compliance Posture",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "collapsed": false,
          "id": 100
        },
        {
          "type": "stat",
          "title": "Total Admission Requests (5m rate)",
          "id": 1,
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 1},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "area",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 100}, {"color": "red", "value": 500}]},
              "unit": "reqps",
              "decimals": 2
            }
          },
          "targets": [
            {
              "expr": "sum(rate(kyverno_admission_requests_total{job=~\"kyverno.*\"}[5m]))",
              "legendFormat": "req/s",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Denied Requests (5m rate)",
          "id": 2,
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 1},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "area",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.01}, {"color": "red", "value": 0.1}]},
              "unit": "reqps",
              "decimals": 3
            }
          },
          "targets": [
            {
              "expr": "sum(rate(kyverno_admission_requests_total{job=~\"kyverno.*\", request_allowed=\"false\"}[5m]))",
              "legendFormat": "denied/s",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Admission Allow Rate",
          "id": 3,
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 1},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 95}, {"color": "green", "value": 99}]},
              "unit": "percent",
              "decimals": 2,
              "min": 0,
              "max": 100
            }
          },
          "targets": [
            {
              "expr": "100 * sum(rate(kyverno_admission_requests_total{job=~\"kyverno.*\", request_allowed=\"true\"}[5m])) / sum(rate(kyverno_admission_requests_total{job=~\"kyverno.*\"}[5m]))",
              "legendFormat": "allow %",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Webhook P99 Latency",
          "id": 4,
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 1},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "area",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.5}, {"color": "red", "value": 2}]},
              "unit": "s",
              "decimals": 3
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(kyverno_admission_review_duration_seconds_bucket{job=~\"kyverno.*\"}[5m])) by (le))",
              "legendFormat": "p99",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Webhook P50 Latency",
          "id": 5,
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 1},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "area",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.1}, {"color": "red", "value": 0.5}]},
              "unit": "s",
              "decimals": 3
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(kyverno_admission_review_duration_seconds_bucket{job=~\"kyverno.*\"}[5m])) by (le))",
              "legendFormat": "p50",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Kyverno Version",
          "id": 6,
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 1},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "value",
            "graphMode": "none",
            "orientation": "auto",
            "textMode": "value"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "fixed", "fixedColor": "blue"},
              "mappings": []
            }
          },
          "targets": [
            {
              "expr": "kyverno_info{job=~\"kyverno.*\"}",
              "legendFormat": "{{version}}",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "type": "row",
          "title": "📊  Admission Control",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5},
          "collapsed": false,
          "id": 101
        },
        {
          "type": "timeseries",
          "title": "Admission Requests — Allow vs Deny (rate 2m)",
          "id": 10,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]},
            "tooltip": {"mode": "multi"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {"lineWidth": 2, "fillOpacity": 10}
            },
            "overrides": [
              {"matcher": {"id": "byName", "options": "denied"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]},
              {"matcher": {"id": "byName", "options": "allowed"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]}
            ]
          },
          "targets": [
            {
              "expr": "sum(rate(kyverno_admission_requests_total{job=~\"kyverno.*\", request_allowed=\"true\"}[2m]))",
              "legendFormat": "allowed",
              "refId": "A"
            },
            {
              "expr": "sum(rate(kyverno_admission_requests_total{job=~\"kyverno.*\", request_allowed=\"false\"}[2m]))",
              "legendFormat": "denied",
              "refId": "B"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Admission Requests by Resource Kind (rate 2m)",
          "id": 11,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 6},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]},
            "tooltip": {"mode": "multi"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {"lineWidth": 2, "fillOpacity": 5}
            }
          },
          "targets": [
            {
              "expr": "sum by (resource_kind) (rate(kyverno_admission_requests_total{job=~\"kyverno.*\"}[2m]))",
              "legendFormat": "{{resource_kind}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Admission Requests by Operation (rate 2m)",
          "id": 12,
          "gridPos": {"h": 7, "w": 8, "x": 0, "y": 14},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "calcs": ["lastNotNull"]},
            "tooltip": {"mode": "multi"}
          },
          "fieldConfig": {
            "defaults": {"unit": "reqps", "custom": {"lineWidth": 2, "fillOpacity": 8}}
          },
          "targets": [
            {
              "expr": "sum by (resource_request_operation) (rate(kyverno_admission_requests_total{job=~\"kyverno.*\"}[2m]))",
              "legendFormat": "{{resource_request_operation}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Admission Requests by Namespace (rate 2m)",
          "id": 13,
          "gridPos": {"h": 7, "w": 8, "x": 8, "y": 14},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]},
            "tooltip": {"mode": "multi"}
          },
          "fieldConfig": {
            "defaults": {"unit": "reqps", "custom": {"lineWidth": 2, "fillOpacity": 5}}
          },
          "targets": [
            {
              "expr": "sum by (resource_namespace) (rate(kyverno_admission_requests_total{job=~\"kyverno.*\", resource_namespace=~\"$namespace\"}[2m]))",
              "legendFormat": "{{resource_namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Mutating vs Validating Webhook (rate 2m)",
          "id": 14,
          "gridPos": {"h": 7, "w": 8, "x": 16, "y": 14},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "calcs": ["lastNotNull"]},
            "tooltip": {"mode": "multi"}
          },
          "fieldConfig": {
            "defaults": {"unit": "reqps", "custom": {"lineWidth": 2, "fillOpacity": 8}}
          },
          "targets": [
            {
              "expr": "sum by (request_webhook) (rate(kyverno_admission_requests_total{job=~\"kyverno.*\"}[2m]))",
              "legendFormat": "{{request_webhook}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "row",
          "title": "⚡  Webhook Latency",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 21},
          "collapsed": false,
          "id": 102
        },
        {
          "type": "timeseries",
          "title": "Admission Review Latency Percentiles (all webhooks)",
          "id": 20,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 22},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]},
            "tooltip": {"mode": "multi"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {"lineWidth": 2, "fillOpacity": 5},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.5}, {"color": "red", "value": 2}]}
            },
            "overrides": [
              {"matcher": {"id": "byName", "options": "p99"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]},
              {"matcher": {"id": "byName", "options": "p95"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "orange"}}]},
              {"matcher": {"id": "byName", "options": "p50"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]}
            ]
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(kyverno_admission_review_duration_seconds_bucket{job=~\"kyverno.*\"}[5m])) by (le))",
              "legendFormat": "p99",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(kyverno_admission_review_duration_seconds_bucket{job=~\"kyverno.*\"}[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(kyverno_admission_review_duration_seconds_bucket{job=~\"kyverno.*\"}[5m])) by (le))",
              "legendFormat": "p50",
              "refId": "C"
            }
          ]
        },
        {
          "type": "heatmap",
          "title": "Admission Review Latency Heatmap",
          "id": 21,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 22},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "calculate": false,
            "yAxis": {"unit": "s", "decimals": 3},
            "color": {"scheme": "Oranges", "fill": "dark-orange", "scale": "exponential"},
            "cellGap": 1,
            "filterValues": {"le": 1e-9}
          },
          "fieldConfig": {
            "defaults": {"custom": {"hideFrom": {"legend": false, "tooltip": false, "viz": false}}}
          },
          "targets": [
            {
              "expr": "sum(rate(kyverno_admission_review_duration_seconds_bucket{job=~\"kyverno.*\"}[5m])) by (le)",
              "legendFormat": "{{le}}",
              "format": "heatmap",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Latency p99 by Webhook Type",
          "id": 22,
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 30},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]},
            "tooltip": {"mode": "multi"}
          },
          "fieldConfig": {
            "defaults": {"unit": "s", "custom": {"lineWidth": 2, "fillOpacity": 5}}
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (request_webhook, le) (rate(kyverno_admission_review_duration_seconds_bucket{job=~\"kyverno.*\"}[5m])))",
              "legendFormat": "p99 {{request_webhook}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Latency p99 by Resource Kind",
          "id": 23,
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 30},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]},
            "tooltip": {"mode": "multi"}
          },
          "fieldConfig": {
            "defaults": {"unit": "s", "custom": {"lineWidth": 2, "fillOpacity": 5}}
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (resource_kind, le) (rate(kyverno_admission_review_duration_seconds_bucket{job=~\"kyverno.*\"}[5m])))",
              "legendFormat": "p99 {{resource_kind}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "row",
          "title": "🔁  Controller Health",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 37},
          "collapsed": false,
          "id": 103
        },
        {
          "type": "timeseries",
          "title": "Controller Reconcile Rate (all controllers)",
          "id": 30,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 38},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]},
            "tooltip": {"mode": "multi"}
          },
          "fieldConfig": {
            "defaults": {"unit": "ops", "custom": {"lineWidth": 2, "fillOpacity": 5}}
          },
          "targets": [
            {
              "expr": "sum by (controller_name, job) (rate(kyverno_controller_reconcile_total{job=~\"kyverno.*\"}[2m]))",
              "legendFormat": "{{job}} / {{controller_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Kyverno API Server Queries (rate 2m)",
          "id": 31,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 38},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]},
            "tooltip": {"mode": "multi"}
          },
          "fieldConfig": {
            "defaults": {"unit": "ops", "custom": {"lineWidth": 2, "fillOpacity": 5}}
          },
          "targets": [
            {
              "expr": "sum by (client_type, operation) (rate(kyverno_client_queries_total{job=~\"kyverno.*\"}[2m]))",
              "legendFormat": "{{client_type}}/{{operation}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Kyverno HTTP Endpoint Requests (rate 2m)",
          "id": 32,
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 46},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]},
            "tooltip": {"mode": "multi"}
          },
          "fieldConfig": {
            "defaults": {"unit": "reqps", "custom": {"lineWidth": 2, "fillOpacity": 5}}
          },
          "targets": [
            {
              "expr": "sum by (http_method, http_url) (rate(kyverno_http_requests_total{job=~\"kyverno.*\"}[2m]))",
              "legendFormat": "{{http_method}} {{http_url}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Kyverno HTTP Endpoint Latency p99 (5m)",
          "id": 33,
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 46},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]},
            "tooltip": {"mode": "multi"}
          },
          "fieldConfig": {
            "defaults": {"unit": "s", "custom": {"lineWidth": 2, "fillOpacity": 5}}
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (http_method, http_url, le) (rate(kyverno_http_requests_duration_seconds_bucket{job=~\"kyverno.*\"}[5m])))",
              "legendFormat": "p99 {{http_method}} {{http_url}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "row",
          "title": "🔍  Policy Reports & Audit Findings",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 53},
          "collapsed": false,
          "id": 104
        },
        {
          "type": "stat",
          "title": "Policy Reports — PASS",
          "id": 40,
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 54},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "fixed", "fixedColor": "green"},
              "unit": "short"
            }
          },
          "targets": [
            {
              "expr": "sum(policyreport_result{status=\"pass\"}) or vector(0)",
              "legendFormat": "pass",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Policy Reports — FAIL",
          "id": 41,
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 54},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 10}]},
              "unit": "short"
            }
          },
          "targets": [
            {
              "expr": "sum(policyreport_result{status=\"fail\"}) or vector(0)",
              "legendFormat": "fail",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
