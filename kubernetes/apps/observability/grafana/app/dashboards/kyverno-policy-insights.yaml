---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kyverno-policy-insights
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "Security"
  json: |-
    {
      "schemaVersion": 39,
      "title": "Kyverno / Policy Insights",
      "uid": "kyverno-policy-insights",
      "timezone": "browser",
      "tags": [
        "kyverno",
        "policy",
        "security",
        "compliance"
      ],
      "description": "Compliance posture and admission control health — are the guardrails working? Covers enforce vs audit coverage, webhook latency, policy result rates, controller health, and background scan telemetry.",
      "editable": true,
      "graphTooltip": 1,
      "refresh": "1m",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {
        "refresh_intervals": [
          "10s",
          "30s",
          "1m",
          "5m",
          "15m",
          "30m",
          "1h"
        ],
        "time_options": [
          "1h",
          "3h",
          "6h",
          "12h",
          "24h",
          "2d",
          "7d",
          "30d"
        ]
      },
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource",
            "label": "Datasource"
          },
          {
            "current": {},
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "name": "namespace",
            "options": [],
            "label": "Namespace",
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "definition": "label_values(kyverno_admission_requests_total, resource_namespace)",
            "query": {
              "query": "label_values(kyverno_admission_requests_total, resource_namespace)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          },
          {
            "current": {},
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "name": "policy",
            "options": [],
            "label": "Policy",
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "definition": "label_values(kyverno_policy_results_total, policy_name)",
            "query": {
              "query": "label_values(kyverno_policy_results_total, policy_name)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          },
          {
            "current": {
              "selected": true,
              "text": [
                "All"
              ],
              "value": [
                "$__all"
              ]
            },
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "name": "validation_mode",
            "label": "Validation Mode",
            "options": [
              {
                "selected": false,
                "text": "enforce",
                "value": "enforce"
              },
              {
                "selected": false,
                "text": "audit",
                "value": "audit"
              }
            ],
            "query": "enforce,audit",
            "type": "custom"
          }
        ]
      },
      "annotations": {
        "list": []
      },
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "Policies Enforcing",
          "description": "Count of enforce-mode policies that block non-compliant resources on admission",
          "type": "stat",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "orange",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "unit": "short",
              "noValue": "0"
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "count(count by (policy_name) (kyverno_policy_rule_info_total{policy_validation_mode=\"enforce\"}))",
              "refId": "A",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "id": 2,
          "title": "Audit Policies",
          "description": "Count of audit-mode policies — violations logged but resources not blocked",
          "type": "stat",
          "gridPos": {
            "x": 4,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "yellow",
                    "value": null
                  }
                ]
              },
              "unit": "short",
              "noValue": "0"
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "count(count by (policy_name) (kyverno_policy_rule_info_total{policy_validation_mode=\"audit\"}))",
              "refId": "A",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "id": 3,
          "title": "Admission Blocks",
          "description": "Enforce-mode policy failures that blocked admission operations in the selected time range",
          "type": "stat",
          "gridPos": {
            "x": 8,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 20
                  }
                ]
              },
              "unit": "short",
              "noValue": "0"
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(increase(kyverno_policy_results_total{rule_result=\"fail\",policy_validation_mode=\"enforce\"}[$__range]))",
              "refId": "A",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "id": 4,
          "title": "Policy Errors",
          "description": "Policy evaluation errors — indicates misconfigured or broken policy rules. Red if any.",
          "type": "stat",
          "gridPos": {
            "x": 12,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "unit": "short",
              "noValue": "0"
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(increase(kyverno_policy_results_total{rule_result=\"error\"}[$__range]))",
              "refId": "A",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "id": 5,
          "title": "Webhook P99 Latency",
          "description": "99th-percentile admission webhook response time (last 5 m). Orange ≥200 ms, red ≥500 ms.",
          "type": "stat",
          "gridPos": {
            "x": 16,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 200
                  },
                  {
                    "color": "red",
                    "value": 500
                  }
                ]
              },
              "unit": "ms",
              "noValue": "N/A"
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "histogram_quantile(0.99, sum by (le) (rate(kyverno_admission_review_duration_seconds_bucket[5m]))) * 1000",
              "refId": "A",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "id": 6,
          "title": "Reports Controller Restarts",
          "description": "Kyverno reports-controller restart count. Was recently OOM-crashing. Orange ≥3, red ≥5.",
          "type": "stat",
          "gridPos": {
            "x": 20,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 3
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              },
              "unit": "short",
              "noValue": "0"
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"security\",container=\"controller\",pod=~\"kyverno-reports.*\"})",
              "refId": "A",
              "legendFormat": "",
              "instant": true
            }
          ]
        },
        {
          "id": 7,
          "title": "Admission Request Rate",
          "description": "Rate of admission requests handled by Kyverno broken down by operation — stacked area",
          "type": "timeseries",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 8,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "fillOpacity": 20,
                "stacking": {
                  "mode": "normal",
                  "group": "A"
                },
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (resource_request_operation) (rate(kyverno_admission_requests_total[$__interval]))",
              "refId": "A",
              "legendFormat": "{{resource_request_operation}}"
            }
          ]
        },
        {
          "id": 8,
          "title": "Webhook Latency Percentiles",
          "description": "P50 / P95 / P99 admission webhook response times",
          "type": "timeseries",
          "gridPos": {
            "x": 8,
            "y": 4,
            "w": 8,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": {
                "fillOpacity": 5
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "histogram_quantile(0.50, sum by (le) (rate(kyverno_admission_review_duration_seconds_bucket[$__interval]))) * 1000",
              "refId": "A",
              "legendFormat": "P50"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "histogram_quantile(0.95, sum by (le) (rate(kyverno_admission_review_duration_seconds_bucket[$__interval]))) * 1000",
              "refId": "B",
              "legendFormat": "P95"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "histogram_quantile(0.99, sum by (le) (rate(kyverno_admission_review_duration_seconds_bucket[$__interval]))) * 1000",
              "refId": "C",
              "legendFormat": "P99"
            }
          ]
        },
        {
          "id": 9,
          "title": "Policy Results by Outcome",
          "description": "Rate of policy evaluation results — Pass / Fail / Warn / Error / Skip — stacked",
          "type": "timeseries",
          "gridPos": {
            "x": 16,
            "y": 4,
            "w": 8,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "fillOpacity": 20,
                "stacking": {
                  "mode": "normal",
                  "group": "A"
                },
                "gradientMode": "opacity"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "fail"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "red",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "error"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "dark-red",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "pass"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "green",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "warn"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "orange",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "skip"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "blue",
                      "mode": "fixed"
                    }
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (rule_result) (rate(kyverno_policy_results_total[$__interval]))",
              "refId": "A",
              "legendFormat": "{{result}}"
            }
          ]
        },
        {
          "id": 10,
          "title": "Top Blocking Policies",
          "description": "Top 15 enforce-mode policies by admission blocks in the selected range",
          "type": "barchart",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 8,
            "h": 10
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "options": {
            "orientation": "horizontal",
            "tooltip": {
              "mode": "single"
            },
            "legend": {
              "showLegend": false
            },
            "barWidth": 0.7
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "topk(15, sum by (policy_name) (increase(kyverno_policy_results_total{rule_result=\"fail\",policy_validation_mode=\"enforce\"}[$__range])))",
              "refId": "A",
              "legendFormat": "{{policy_name}}",
              "instant": true
            }
          ]
        },
        {
          "id": 11,
          "title": "Top Audit Violations by Namespace",
          "description": "Top 10 namespaces by Policy Reporter audit-violation count",
          "type": "barchart",
          "gridPos": {
            "x": 8,
            "y": 12,
            "w": 8,
            "h": 10
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "options": {
            "orientation": "horizontal",
            "tooltip": {
              "mode": "single"
            },
            "legend": {
              "showLegend": false
            },
            "barWidth": 0.7
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "topk(10, sum by (namespace) (policy_report_result{status=\"fail\"}))",
              "refId": "A",
              "legendFormat": "{{namespace}}",
              "instant": true
            }
          ]
        },
        {
          "id": 12,
          "title": "Policy Inventory",
          "description": "All active policies: validation mode (enforce/audit), background scanning, and rule count",
          "type": "table",
          "gridPos": {
            "x": 16,
            "y": 12,
            "w": 8,
            "h": 10
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "options": {
            "footer": {
              "show": false,
              "reducer": [
                "sum"
              ],
              "fields": ""
            },
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Policy",
                "desc": false
              }
            ]
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "align": "left",
                "displayMode": "auto",
                "inspect": false
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "policy_validation_mode"
                },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-text"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "enforce": {
                            "color": "red",
                            "index": 0,
                            "text": "enforce"
                          },
                          "audit": {
                            "color": "yellow",
                            "index": 1,
                            "text": "audit"
                          }
                        }
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "policy_background_mode"
                },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "true": {
                            "color": "green",
                            "index": 0,
                            "text": "enabled"
                          },
                          "false": {
                            "color": "grey",
                            "index": 1,
                            "text": "disabled"
                          }
                        }
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Value"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Rules"
                  },
                  {
                    "id": "custom.width",
                    "value": 60
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "policy_name"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Policy"
                  },
                  {
                    "id": "custom.width",
                    "value": 240
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "policy_validation_mode"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Mode"
                  },
                  {
                    "id": "custom.width",
                    "value": 80
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "policy_background_mode"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Background"
                  },
                  {
                    "id": "custom.width",
                    "value": 90
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (policy_name, policy_validation_mode, policy_background_mode) (kyverno_policy_rule_info_total)",
              "refId": "A",
