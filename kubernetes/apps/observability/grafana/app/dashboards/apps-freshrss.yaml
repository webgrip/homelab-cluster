---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: apps-freshrss
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: apps
  json: |-
    {
      "schemaVersion": 39,
      "title": "FreshRSS / Runtime Health",
      "uid": "apps-freshrss",
      "timezone": "browser",
      "tags": [
        "apps",
        "freshrss"
      ],
      "editable": false,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Health overview",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "stat",
          "title": "Pods Running",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{namespace=\"freshrss\",phase=\"Running\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 2,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 0,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Pods Not Running",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{namespace=\"freshrss\",phase=~\"Pending|Failed|Unknown\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 3,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 3,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Restarts (1h)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"freshrss\"}[1h])) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 4,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 6,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "OOM kills (24h)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(container_oom_events_total{namespace=\"freshrss\"}[24h])) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 5,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 9,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Waiting containers",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_status_waiting{namespace=\"freshrss\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 6,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 12,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "CPU (cores)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"freshrss\",image!=\"\"}[$$__rate_interval])) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "cores"
            },
            "overrides": []
          },
          "id": 7,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 15,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Memory",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(container_memory_working_set_bytes{namespace=\"freshrss\",image!=\"\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "unit": "bytes"
            },
            "overrides": []
          },
          "id": 8,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 18,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Max PVC used",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max((kubelet_volume_stats_used_bytes{namespace=\"freshrss\"} / kubelet_volume_stats_capacity_bytes{namespace=\"freshrss\"}) * 100) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 75
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 9,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 21,
            "y": 1
          }
        },
        {
          "id": 10,
          "type": "row",
          "title": "Workload & pods",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          }
        },
        {
          "type": "timeseries",
          "title": "Pod phase over time",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (phase) (kube_pod_status_phase{namespace=\"freshrss\"})",
              "legendFormat": "{{phase}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "custom": {
                "fillOpacity": 30,
                "showPoints": "never",
                "lineWidth": 1,
                "stacking": {
                  "mode": "normal"
                }
              }
            },
            "overrides": []
          },
          "id": 11,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 6
          }
        },
        {
          "type": "timeseries",
          "title": "Pod restarts (top 10, 30m)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(10, sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"freshrss\"}[30m])))",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "id": 12,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 6
          }
        },
        {
          "type": "timeseries",
          "title": "Container waiting reasons",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (reason) (kube_pod_container_status_waiting_reason{namespace=\"freshrss\"})",
              "legendFormat": "{{reason}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "description": "CrashLoopBackOff, ImagePullBackOff, etc. Empty when all containers are running.",
          "id": 13,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 14
          }
        },
        {
          "type": "timeseries",
          "title": "Replicas: desired vs ready",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_deployment_spec_replicas{namespace=\"freshrss\"})",
              "legendFormat": "deploy desired"
            },
            {
              "refId": "B",
              "expr": "sum(kube_deployment_status_replicas_available{namespace=\"freshrss\"})",
              "legendFormat": "deploy ready"
            },
            {
              "refId": "C",
              "expr": "sum(kube_statefulset_replicas{namespace=\"freshrss\"})",
              "legendFormat": "sts desired"
            },
            {
              "refId": "D",
              "expr": "sum(kube_statefulset_status_replicas_ready{namespace=\"freshrss\"})",
              "legendFormat": "sts ready"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "id": 14,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 14
          }
        },
        {
          "id": 15,
          "type": "row",
          "title": "CPU",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 22
          }
        },
        {
          "type": "timeseries",
          "title": "CPU \u2014 usage vs requests vs limits",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"freshrss\",image!=\"\"}[$$__rate_interval]))",
              "legendFormat": "usage"
            },
            {
              "refId": "B",
              "expr": "sum(kube_pod_container_resource_requests{namespace=\"freshrss\",resource=\"cpu\"})",
              "legendFormat": "requests"
            },
            {
              "refId": "C",
              "expr": "sum(kube_pod_container_resource_limits{namespace=\"freshrss\",resource=\"cpu\"})",
              "legendFormat": "limits"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "decimals": 3,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "id": 16,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 23
          }
        },
        {
          "type": "timeseries",
          "title": "CPU usage by pod",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"freshrss\",image!=\"\"}[$$__rate_interval]))",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "decimals": 3,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "id": 17,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 23
          }
        },
        {
          "type": "timeseries",
          "title": "CPU throttling % by pod",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (rate(container_cpu_cfs_throttled_periods_total{namespace=\"freshrss\"}[$$__rate_interval])) / clamp_min(sum by (pod) (rate(container_cpu_cfs_periods_total{namespace=\"freshrss\"}[$$__rate_interval])), 1) * 100",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 1,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "description": "Share of CFS periods the container was throttled. Sustained >25% means the CPU limit is too low.",
          "id": 18,
          "gridPos": {
            "h": 7,
            "w": 24,
            "x": 0,
            "y": 31
          }
        },
        {
          "id": 19,
          "type": "row",
          "title": "Memory",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 38
          }
        },
        {
          "type": "timeseries",
          "title": "Memory \u2014 usage vs requests vs limits",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(container_memory_working_set_bytes{namespace=\"freshrss\",image!=\"\"})",
              "legendFormat": "working set"
            },
            {
              "refId": "B",
              "expr": "sum(kube_pod_container_resource_requests{namespace=\"freshrss\",resource=\"memory\"})",
              "legendFormat": "requests"
            },
            {
              "refId": "C",
              "expr": "sum(kube_pod_container_resource_limits{namespace=\"freshrss\",resource=\"memory\"})",
              "legendFormat": "limits"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "id": 20,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 39
          }
        },
        {
          "type": "timeseries",
          "title": "Memory by pod",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"freshrss\",image!=\"\"})",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "id": 21,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 39
          }
        },
        {
          "type": "timeseries",
          "title": "Memory % of limit by pod (OOM risk)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"freshrss\",image!=\"\"}) / sum by (pod) (kube_pod_container_resource_limits{namespace=\"freshrss\",resource=\"memory\"}) * 100",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
