---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: dark-factory-llm-traffic
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: ai
  # Dark Factory LLM traffic: the inference-plane view centered on litellm.
  # Live rates and latency come from the spanmetrics/servicegraph connectors,
  # trailing-24h aggregates from the litellm exporter, request shape and
  # forensics from the spend ledger (litellm-db SQL), plus raw logs and traces.
  json: |-
    {
      "schemaVersion": 39,
      "title": "Dark Factory — LLM Traffic & Traces",
      "uid": "dark-factory-llm-traffic",
      "timezone": "browser",
      "tags": ["dark-factory", "ai", "litellm", "traces"],
      "editable": false,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {"from": "now-6h", "to": "now"},
      "templating": {"list": []},
      "annotations": {"list": []},
      "links": [
        {"type": "dashboards", "title": "Dark Factory", "tags": ["dark-factory"], "asDropdown": true, "includeVars": false, "keepTime": true},
        {"type": "link", "title": "LiteLLM Spend & Budgets", "url": "/d/litellm-spend", "icon": "dollar"},
        {"type": "link", "title": "LiteLLM Reliability", "url": "/d/litellm-reliability", "icon": "bolt"},
        {"type": "link", "title": "Forgejo CI Command Center", "url": "/d/infra-forgejo-ci", "icon": "external link"},
        {"type": "link", "title": "Claude Code Command Center", "url": "/d/claude-code-command-center", "icon": "external link"}
      ],
      "panels": [
        {"id": 1, "type": "row", "title": "At a glance", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}},
        {
          "id": 2, "type": "stat", "title": "Req/min (litellm spans)",
          "description": "litellm server-span call rate per minute from the spanmetrics connector (traces_spanmetrics_calls_total).",
          "gridPos": {"h": 4, "w": 3, "x": 0, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "area", "textMode": "value"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(rate(traces_spanmetrics_calls_total{service_name=\"litellm\",span_kind=\"SPAN_KIND_SERVER\"}[$$__rate_interval])) * 60 or vector(0)", "instant": false}]
        },
        {
          "id": 3, "type": "stat", "title": "Span error ratio",
          "description": "Share of litellm spans ending STATUS_CODE_ERROR (traces_spanmetrics_calls_total); reads 0 when there is no traffic.",
          "gridPos": {"h": 4, "w": 3, "x": 3, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1, "min": 0, "max": 100, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 5}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "area", "textMode": "value"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "(100 * sum(rate(traces_spanmetrics_calls_total{service_name=\"litellm\",status_code=\"STATUS_CODE_ERROR\"}[$$__rate_interval])) / sum(rate(traces_spanmetrics_calls_total{service_name=\"litellm\"}[$$__rate_interval]))) or vector(0)", "instant": false}]
        },
        {
          "id": 4, "type": "stat", "title": "p95 span duration",
          "description": "p95 of litellm server-span duration from the traces_spanmetrics_duration_seconds histogram.",
          "gridPos": {"h": 4, "w": 3, "x": 6, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 30}, {"color": "red", "value": 60}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "area", "textMode": "value"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "histogram_quantile(0.95, sum by (le) (rate(traces_spanmetrics_duration_seconds_bucket{service_name=\"litellm\",span_kind=\"SPAN_KIND_SERVER\"}[$$__rate_interval]))) or vector(0)", "instant": false}]
        },
        {
          "id": 5, "type": "stat", "title": "Requests 24h",
          "description": "Trailing-24h requests summed over models from the litellm exporter (litellm_recent_requests) — a window aggregate, not a per-interval rate.",
          "gridPos": {"h": 4, "w": 3, "x": 9, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "area", "textMode": "value"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(litellm_recent_requests) or vector(0)", "instant": false}]
        },
        {
          "id": 6, "type": "stat", "title": "Failures 24h",
          "description": "Trailing-24h failed requests from litellm_recent_failures — anything above zero deserves a look at the Forensics row.",
          "gridPos": {"h": 4, "w": 3, "x": 12, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "area", "textMode": "value"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(litellm_recent_failures) or vector(0)", "instant": false}]
        },
        {
          "id": 7, "type": "stat", "title": "Retries 24h",
          "description": "Trailing-24h provider retries from litellm_recent_retried; sustained retries usually precede failures.",
          "gridPos": {"h": 4, "w": 3, "x": 15, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "area", "textMode": "value"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(litellm_recent_retried) or vector(0)", "instant": false}]
        },
        {
          "id": 8, "type": "stat", "title": "Active run keys 1h",
          "description": "Distinct run keys that made a request in the last hour (litellm_runs_active_last_1h).",
          "gridPos": {"h": 4, "w": 3, "x": 18, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "area", "textMode": "value"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(litellm_runs_active_last_1h) or vector(0)", "instant": false}]
        },
        {
          "id": 9, "type": "stat", "title": "Active run keys 24h",
          "description": "Distinct run keys that made a request in the last 24 hours (litellm_runs_active_last_24h).",
          "gridPos": {"h": 4, "w": 3, "x": 21, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "area", "textMode": "value"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(litellm_runs_active_last_24h) or vector(0)", "instant": false}]
        },

        {"id": 10, "type": "row", "title": "Latency & traffic (spanmetrics)", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5}},
        {
          "id": 11, "type": "heatmap", "title": "litellm latency heatmap",
          "description": "Distribution of litellm span durations over time (traces_spanmetrics_duration_seconds_bucket) — bands drifting upward mean slower answers.",
          "gridPos": {"h": 9, "w": 14, "x": 0, "y": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "options": {"calculate": false, "cellGap": 1, "yAxis": {"unit": "s"}, "color": {"scheme": "Turbo"}, "legend": {"show": true}, "tooltip": {"mode": "single"}},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum by (le) (increase(traces_spanmetrics_duration_seconds_bucket{service_name=\"litellm\"}[$$__rate_interval]))", "format": "heatmap", "legendFormat": "{{le}}"}]
        },
        {
          "id": 12, "type": "timeseries", "title": "litellm span duration p50/p95/p99",
          "description": "Latency quantiles for litellm server spans from spanmetrics; the connector exports no span_name dimension, so this is service-wide.",
          "gridPos": {"h": 9, "w": 10, "x": 14, "y": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 12, "showPoints": "never", "spanNulls": false}}, "overrides": []},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"]}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "histogram_quantile(0.5, sum by (le) (rate(traces_spanmetrics_duration_seconds_bucket{service_name=\"litellm\",span_kind=\"SPAN_KIND_SERVER\"}[$$__rate_interval])))", "legendFormat": "p50"},
            {"refId": "B", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "histogram_quantile(0.95, sum by (le) (rate(traces_spanmetrics_duration_seconds_bucket{service_name=\"litellm\",span_kind=\"SPAN_KIND_SERVER\"}[$$__rate_interval])))", "legendFormat": "p95"},
            {"refId": "C", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "histogram_quantile(0.99, sum by (le) (rate(traces_spanmetrics_duration_seconds_bucket{service_name=\"litellm\",span_kind=\"SPAN_KIND_SERVER\"}[$$__rate_interval])))", "legendFormat": "p99"}
          ]
        },
        {
          "id": 13, "type": "timeseries", "title": "litellm calls by status",
          "description": "litellm span call rate split by status code (traces_spanmetrics_calls_total, service_name=litellm) — other services live in the context panel to the right.",
          "gridPos": {"h": 8, "w": 14, "x": 0, "y": 15},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 12, "showPoints": "never", "spanNulls": false}}, "overrides": [
            {"matcher": {"id": "byRegexp", "options": ".*ERROR.*"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]},
            {"matcher": {"id": "byRegexp", "options": ".*(UNSET|OK).*"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]}
          ]},
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum by (status_code) (rate(traces_spanmetrics_calls_total{service_name=\"litellm\"}[$$__rate_interval])) * 60", "legendFormat": "{{status_code}}"}]
        },
        {
          "id": 14, "type": "timeseries", "title": "Other OTLP services",
          "description": "Call rate for every OTLP-instrumented service except litellm (claude-code dominates) — split out so its volume cannot drown litellm traffic.",
          "gridPos": {"h": 8, "w": 10, "x": 14, "y": 15},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 12, "showPoints": "never", "spanNulls": false}}, "overrides": [
            {"matcher": {"id": "byRegexp", "options": ".*ERROR.*"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]}
          ]},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"]}, "tooltip": {"mode": "multi"}},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum by (service_name, status_code) (rate(traces_spanmetrics_calls_total{service_name!=\"litellm\"}[$$__rate_interval])) * 60", "legendFormat": "{{service_name}} {{status_code}}"}]
        },

        {"id": 15, "type": "row", "title": "Model latency (exporter, trailing 24h)", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 23}},
        {
          "id": 16, "type": "timeseries", "title": "Latency percentiles by model (24h window)",
          "description": "Trailing-24h latency p50/p95/avg per model from the litellm exporter (litellm_latency_p50/p95/avg_seconds) — window aggregates, not per-interval quantiles.",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 12, "showPoints": "never", "spanNulls": false}}, "overrides": []},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"]}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "max by (model) (litellm_latency_p50_seconds)", "legendFormat": "{{model}} p50"},
            {"refId": "B", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "max by (model) (litellm_latency_p95_seconds)", "legendFormat": "{{model}} p95"},
            {"refId": "C", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "max by (model) (litellm_latency_avg_seconds)", "legendFormat": "{{model}} avg"}
          ]
        },
        {
          "id": 17, "type": "timeseries", "title": "TTFT p95 by model (streaming, 24h window)",
          "description": "Trailing-24h p95 time-to-first-token for streaming calls per model from the litellm exporter (litellm_ttft_p95_seconds).",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 12, "showPoints": "never", "spanNulls": false}}, "overrides": []},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"]}, "tooltip": {"mode": "multi"}},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "max by (model) (litellm_ttft_p95_seconds)", "legendFormat": "{{model}}"}]
        },

        {"id": 18, "type": "row", "title": "Request shape (spend ledger)", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 32}},
        {
          "id": 19, "type": "timeseries", "title": "Requests per 5m by model",
          "description": "Per-interval request volume by model from the LiteLLM_SpendLogs ledger (litellm-db); empty model is shown as unknown.",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 33},
          "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "custom": {"drawStyle": "bars", "lineWidth": 2, "fillOpacity": 80, "showPoints": "never", "spanNulls": false, "stacking": {"mode": "normal", "group": "A"}}}, "overrides": []},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"]}, "tooltip": {"mode": "multi"}},
          "targets": [{"refId": "A", "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"}, "rawQuery": true, "format": "time_series", "rawSql": "SELECT $$__timeGroup(\"startTime\",'5m') AS time, COALESCE(NULLIF(model,''),'unknown') AS metric, count(*) FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\") GROUP BY 1,2 ORDER BY 1"}]
        },
        {
          "id": 20, "type": "bargauge", "title": "Requests by call_type (range)",
          "description": "Request count by call_type over the dashboard range from LiteLLM_SpendLogs; empty call_type is shown as unknown.",
          "gridPos": {"h": 8, "w": 6, "x": 12, "y": 33},
          "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "options": {"orientation": "horizontal", "displayMode": "gradient", "reduceOptions": {"values": true, "calcs": ["lastNotNull"], "fields": ""}},
          "targets": [{"refId": "A", "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"}, "rawQuery": true, "format": "table", "rawSql": "SELECT COALESCE(NULLIF(call_type,''),'unknown') AS call_type, count(*) AS requests FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\") GROUP BY 1 ORDER BY 2 DESC"}]
        },
        {
          "id": 21, "type": "timeseries", "title": "Retries per hour",
          "description": "Provider retries recorded in spend-log metadata (attempted_retries), per hour, from litellm-db.",
          "gridPos": {"h": 8, "w": 6, "x": 18, "y": 33},
          "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "orange"}, "custom": {"drawStyle": "bars", "lineWidth": 2, "fillOpacity": 80, "showPoints": "never", "spanNulls": false}}, "overrides": []},
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [{"refId": "A", "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"}, "rawQuery": true, "format": "time_series", "rawSql": "SELECT $$__timeGroup(\"startTime\",'1h') AS time, sum(coalesce(nullif(metadata->>'attempted_retries','')::int,0)) AS retries FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\") GROUP BY 1 ORDER BY 1"}]
        },
        {
          "id": 22, "type": "timeseries", "title": "e2e p95 by model (15m buckets)",
          "description": "End-to-end request duration p95 per 15m bucket by model, from the LiteLLM_SpendLogs ledger (endTime minus startTime); empty model is shown as unknown.",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 41},
          "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 1, "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 12, "showPoints": "never", "spanNulls": false}}, "overrides": []},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"]}, "tooltip": {"mode": "multi"}},
          "targets": [{"refId": "A", "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"}, "rawQuery": true, "format": "time_series", "rawSql": "SELECT $$__timeGroup(\"startTime\",'15m') AS time, COALESCE(NULLIF(model,''),'unknown') AS metric, percentile_cont(0.95) WITHIN GROUP (ORDER BY EXTRACT(EPOCH FROM (\"endTime\" - \"startTime\"))) AS p95 FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\") GROUP BY 1,2 ORDER BY 1"}]
        },
        {
          "id": 23, "type": "timeseries", "title": "TTFT p95 streaming (15m buckets)",
          "description": "Time to first token p95 (streaming calls only) per 15m bucket by model, from completionStartTime in LiteLLM_SpendLogs; empty model is shown as unknown.",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 41},
          "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 1, "custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 12, "showPoints": "never", "spanNulls": false}}, "overrides": []},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"]}, "tooltip": {"mode": "multi"}},
          "targets": [{"refId": "A", "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"}, "rawQuery": true, "format": "time_series", "rawSql": "SELECT $$__timeGroup(\"startTime\",'15m') AS time, COALESCE(NULLIF(model,''),'unknown') AS metric, percentile_cont(0.95) WITHIN GROUP (ORDER BY EXTRACT(EPOCH FROM (\"completionStartTime\" - \"startTime\"))) AS p95 FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\") AND \"completionStartTime\" IS NOT NULL GROUP BY 1,2 ORDER BY 1"}]
        },

        {"id": 24, "type": "row", "title": "Cache economics", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 49}},
        {
          "id": 25, "type": "bargauge", "title": "Cache token mix by model (24h window)",
          "description": "Trailing-24h cache token mix per model from the litellm exporter (litellm_cache_read/creation/prompt_tokens) — cache reads are the discount: they bill at a fraction of base input price.",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 50},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "options": {"orientation": "horizontal", "displayMode": "gradient", "reduceOptions": {"values": false, "calcs": ["lastNotNull"], "fields": ""}},
          "targets": [
            {"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum by (model) (litellm_cache_read_tokens)", "legendFormat": "{{model}} cache read", "instant": true},
            {"refId": "B", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum by (model) (litellm_cache_creation_tokens)", "legendFormat": "{{model}} cache creation", "instant": true},
            {"refId": "C", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum by (model) (litellm_cache_prompt_tokens)", "legendFormat": "{{model}} prompt", "instant": true}
          ]
        },
        {
          "id": 26, "type": "timeseries", "title": "Cache token trend (24h window totals)",
          "description": "Trailing-24h totals of cache read, cache creation and prompt tokens summed over models (litellm_cache_*_tokens) — window aggregates, not per-interval rates.",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 50},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
