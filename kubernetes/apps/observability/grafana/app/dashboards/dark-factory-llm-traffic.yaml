        {"id": 34, "type": "row", "title": "Forensics", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 75}},
        {
          "id": 35, "type": "table", "title": "Slowest requests (top 25)",
          "description": "Slowest individual requests in the range from LiteLLM_SpendLogs (litellm-db); the run column links to the Run Explorer.",
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 76},
          "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"align": "auto", "filterable": true}}, "overrides": [
            {"matcher": {"id": "byName", "options": "duration"}, "properties": [{"id": "unit", "value": "s"}, {"id": "decimals", "value": 1}, {"id": "thresholds", "value": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 30}, {"color": "red", "value": 60}]}}, {"id": "custom.cellOptions", "value": {"type": "color-background"}}]},
            {"matcher": {"id": "byName", "options": "spend"}, "properties": [{"id": "unit", "value": "currencyUSD"}, {"id": "decimals", "value": 4}]},
            {"matcher": {"id": "byName", "options": "status"}, "properties": [{"id": "mappings", "value": [{"type": "value", "options": {"failure": {"color": "red", "index": 0}, "success": {"color": "green", "index": 1}}}]}, {"id": "custom.cellOptions", "value": {"type": "color-text"}}]},
            {"matcher": {"id": "byName", "options": "run"}, "properties": [{"id": "links", "value": [{"title": "Open in Run Explorer", "url": "/d/dark-factory-run-explorer?var-run=$${__data.fields.run}&$${__url_time_range}", "targetBlank": true}]}]}
          ]},
          "transformations": [{"id": "organize", "options": {"excludeByName": {}, "indexByName": {}, "renameByName": {"duration_s": "duration"}}}],
          "options": {"showHeader": true, "sortBy": [{"displayName": "duration", "desc": true}]},
          "targets": [{"refId": "A", "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"}, "rawQuery": true, "format": "table", "rawSql": "SELECT \"startTime\" AS time, metadata->>'user_api_key_alias' AS run, COALESCE(NULLIF(model,''),'unknown') AS model, custom_llm_provider AS provider, EXTRACT(EPOCH FROM (\"endTime\" - \"startTime\")) AS duration_s, spend, total_tokens AS tokens, COALESCE(metadata->>'status','success') AS status, COALESCE(metadata->>'attempted_retries','0') AS retries FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\") ORDER BY duration_s DESC NULLS LAST LIMIT 25"}]
        },
        {
          "id": 36, "type": "table", "title": "Failed requests (latest 50)",
          "description": "Non-success requests from spend-log metadata (litellm-db) — upgrade to LiteLLM_ErrorLogs columns once that table is confirmed; the run column links to the Run Explorer.",
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 86},
          "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"align": "auto", "filterable": true}}, "overrides": [
            {"matcher": {"id": "byName", "options": "status"}, "properties": [{"id": "mappings", "value": [{"type": "value", "options": {"failure": {"color": "red", "index": 0}, "success": {"color": "green", "index": 1}}}]}, {"id": "custom.cellOptions", "value": {"type": "color-text"}}]},
            {"matcher": {"id": "byName", "options": "run"}, "properties": [{"id": "links", "value": [{"title": "Open in Run Explorer", "url": "/d/dark-factory-run-explorer?var-run=$${__data.fields.run}&$${__url_time_range}", "targetBlank": true}]}]}
          ]},
          "options": {"showHeader": true, "sortBy": [{"displayName": "time", "desc": true}]},
          "targets": [{"refId": "A", "datasource": {"type": "grafana-postgresql-datasource", "uid": "litellm-db"}, "rawQuery": true, "format": "table", "rawSql": "SELECT \"startTime\" AS time, metadata->>'user_api_key_alias' AS run, COALESCE(NULLIF(model,''),'unknown') AS model, COALESCE(NULLIF(call_type,''),'unknown') AS call_type, COALESCE(metadata->>'status','success') AS status, COALESCE(metadata->>'attempted_retries','0') AS retries FROM \"LiteLLM_SpendLogs\" WHERE COALESCE(metadata->>'status','success') <> 'success' AND $$__timeFilter(\"startTime\") ORDER BY \"startTime\" DESC LIMIT 50"}]
        },
        {
          "id": 37, "type": "logs", "title": "LLM error log tail",
          "description": "Error-level lines from the litellm proxy (namespace ai, container app) in VictoriaLogs.",
