---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: dark-factory-llm-traffic
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: ai
  # Dark Factory LLM traffic: per-interval truth vs litellm-reliability's
  # trailing-24h aggregates; no panel duplication. Live rates come from the
  # spanmetrics connector, request shape and forensics from the spend ledger
  # (SQL), plus raw logs and traces.
  json: |-
    {
      "schemaVersion": 39,
      "title": "Dark Factory — LLM Traffic & Traces",
      "uid": "dark-factory-llm-traffic",
      "timezone": "browser",
      "tags": ["dark-factory", "ai", "litellm", "traces"],
      "editable": false,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {"from": "now-6h", "to": "now"},
      "templating": {"list": []},
      "annotations": {"list": []},
      "links": [
        {"type": "dashboards", "title": "Dark Factory", "tags": ["dark-factory"], "asDropdown": true, "includeVars": false, "keepTime": true},
        {"type": "link", "title": "LiteLLM Spend & Budgets", "url": "/d/litellm-spend", "icon": "dollar"},
        {"type": "link", "title": "LiteLLM Reliability", "url": "/d/litellm-reliability", "icon": "bolt"},
        {"type": "link", "title": "Forgejo CI Command Center", "url": "/d/infra-forgejo-ci", "icon": "external link"},
        {"type": "link", "title": "Claude Code Command Center", "url": "/d/claude-code-command-center", "icon": "external link"}
      ],
      "panels": [
        {"id": 1, "type": "row", "title": "Live rates (spanmetrics)", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}},
        {
          "id": 2, "type": "stat", "title": "Req/min (litellm spans)",
          "gridPos": {"h": 4, "w": 8, "x": 0, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 1, "color": {"mode": "fixed", "fixedColor": "text"}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "area", "textMode": "value"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(rate(traces_spanmetrics_calls_total{service_name=\"litellm\",span_kind=\"SPAN_KIND_SERVER\"}[$$__rate_interval])) * 60 or vector(0)", "instant": true}]
        },
        {
          "id": 3, "type": "stat", "title": "Span error ratio",
          "gridPos": {"h": 4, "w": 8, "x": 8, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 5}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none", "textMode": "value"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "(100 * sum(rate(traces_spanmetrics_calls_total{service_name=\"litellm\",status_code=\"STATUS_CODE_ERROR\"}[$$__rate_interval])) / sum(rate(traces_spanmetrics_calls_total{service_name=\"litellm\"}[$$__rate_interval]))) or vector(0)", "instant": true}]
        },
        {
          "id": 4, "type": "stat", "title": "p95 span duration",
          "gridPos": {"h": 4, "w": 8, "x": 16, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 30}, {"color": "red", "value": 60}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "none", "textMode": "value"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "histogram_quantile(0.95, sum by (le) (rate(traces_spanmetrics_duration_seconds_bucket{service_name=\"litellm\",span_kind=\"SPAN_KIND_SERVER\"}[$$__rate_interval]))) or vector(0)", "instant": true}]
        },
        {
          "id": 5, "type": "timeseries", "title": "Calls by service & status",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "fillOpacity": 10, "showPoints": "never"}}, "overrides": [{"matcher": {"id": "byRegexp", "options": ".*ERROR.*"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]}]},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull"]}, "tooltip": {"mode": "multi"}},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum by (service_name, status_code) (rate(traces_spanmetrics_calls_total{service_name=~\"litellm|claude-code\"}[$$__rate_interval])) * 60", "legendFormat": "{{service_name}} {{status_code}}"}]
        },
        {
          "id": 6, "type": "timeseries", "title": "litellm span duration p50/p95/p99",
          "description": "spanmetrics has no span_name dimension",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "fillOpacity": 10, "showPoints": "never"}}, "overrides": []},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull"]}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "histogram_quantile(0.5, sum by (le) (rate(traces_spanmetrics_duration_seconds_bucket{service_name=\"litellm\",span_kind=\"SPAN_KIND_SERVER\"}[$$__rate_interval])))", "legendFormat": "p50"},
            {"refId": "B", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "histogram_quantile(0.95, sum by (le) (rate(traces_spanmetrics_duration_seconds_bucket{service_name=\"litellm\",span_kind=\"SPAN_KIND_SERVER\"}[$$__rate_interval])))", "legendFormat": "p95"},
            {"refId": "C", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "histogram_quantile(0.99, sum by (le) (rate(traces_spanmetrics_duration_seconds_bucket{service_name=\"litellm\",span_kind=\"SPAN_KIND_SERVER\"}[$$__rate_interval])))", "legendFormat": "p99"}
          ]
        },
        {
          "id": 7, "type": "timeseries", "title": "Service graph edges",
          "description": "Requests/min between services from the servicegraph connector; log y-axis because kyverno traffic dwarfs litellm.",
          "gridPos": {"h": 7, "w": 24, "x": 0, "y": 13},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "fillOpacity": 10, "showPoints": "never", "scaleDistribution": {"type": "log", "log": 10}}}, "overrides": []},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull"]}, "tooltip": {"mode": "multi"}},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum by (client, server) (rate(traces_service_graph_request_total[$$__rate_interval])) * 60", "legendFormat": "{{client}} -> {{server}}"}]
        },

        {"id": 8, "type": "row", "title": "Request shape (SQL)", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 20}},
        {
          "id": 9, "type": "timeseries", "title": "Requests per 5m by model",
          "description": "Per-interval request volume from the spend ledger; requires litellm-db datasource.",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 21},
          "datasource": {"type": "postgres", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "custom": {"drawStyle": "bars", "fillOpacity": 80, "showPoints": "never", "stacking": {"mode": "normal", "group": "A"}}}, "overrides": []},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["sum"]}, "tooltip": {"mode": "multi"}},
          "targets": [{"refId": "A", "datasource": {"type": "postgres", "uid": "litellm-db"}, "rawQuery": true, "format": "time_series", "rawSql": "SELECT $$__timeGroup(\"startTime\",'5m') AS time, model AS metric, count(*) FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\") GROUP BY 1,2 ORDER BY 1"}]
        },
        {
          "id": 10, "type": "bargauge", "title": "Requests by call_type (range)",
          "description": "requires litellm-db datasource.",
          "gridPos": {"h": 8, "w": 6, "x": 12, "y": 21},
          "datasource": {"type": "postgres", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "options": {"orientation": "horizontal", "displayMode": "gradient", "reduceOptions": {"values": true, "calcs": ["lastNotNull"], "fields": ""}},
          "targets": [{"refId": "A", "datasource": {"type": "postgres", "uid": "litellm-db"}, "rawQuery": true, "format": "table", "rawSql": "SELECT call_type, count(*) FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\") GROUP BY 1 ORDER BY 2 DESC"}]
        },
        {
          "id": 11, "type": "timeseries", "title": "Retries per hour",
          "description": "Provider retries recorded in spend-log metadata; requires litellm-db datasource.",
          "gridPos": {"h": 8, "w": 6, "x": 18, "y": 21},
          "datasource": {"type": "postgres", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "orange"}, "custom": {"drawStyle": "bars", "fillOpacity": 80, "showPoints": "never"}}, "overrides": []},
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [{"refId": "A", "datasource": {"type": "postgres", "uid": "litellm-db"}, "rawQuery": true, "format": "time_series", "rawSql": "SELECT $$__timeGroup(\"startTime\",'1h') AS time, sum(coalesce(nullif(metadata->>'attempted_retries','')::int,0)) AS retries FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\") GROUP BY 1 ORDER BY 1"}]
        },
        {
          "id": 12, "type": "timeseries", "title": "e2e p95 by model (15m buckets)",
          "description": "End-to-end request duration p95 per 15m bucket; requires litellm-db datasource.",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 29},
          "datasource": {"type": "postgres", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 1, "custom": {"drawStyle": "line", "fillOpacity": 10, "showPoints": "never"}}, "overrides": []},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull"]}, "tooltip": {"mode": "multi"}},
          "targets": [{"refId": "A", "datasource": {"type": "postgres", "uid": "litellm-db"}, "rawQuery": true, "format": "time_series", "rawSql": "SELECT $$__timeGroup(\"startTime\",'15m') AS time, model AS metric, percentile_cont(0.95) WITHIN GROUP (ORDER BY EXTRACT(EPOCH FROM (\"endTime\" - \"startTime\"))) AS p95 FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\") GROUP BY 1,2 ORDER BY 1"}]
        },
        {
          "id": 13, "type": "timeseries", "title": "TTFT p95 streaming (15m buckets)",
          "description": "Time to first token (streaming calls only) p95 per 15m bucket; requires litellm-db datasource.",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 29},
          "datasource": {"type": "postgres", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 1, "custom": {"drawStyle": "line", "fillOpacity": 10, "showPoints": "never"}}, "overrides": []},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull"]}, "tooltip": {"mode": "multi"}},
          "targets": [{"refId": "A", "datasource": {"type": "postgres", "uid": "litellm-db"}, "rawQuery": true, "format": "time_series", "rawSql": "SELECT $$__timeGroup(\"startTime\",'15m') AS time, model AS metric, percentile_cont(0.95) WITHIN GROUP (ORDER BY EXTRACT(EPOCH FROM (\"completionStartTime\" - \"startTime\"))) AS p95 FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\") AND \"completionStartTime\" IS NOT NULL GROUP BY 1,2 ORDER BY 1"}]
        },

        {"id": 14, "type": "row", "title": "Forensics", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 37}},
        {
          "id": 15, "type": "table", "title": "Slowest requests (top 25)",
          "description": "Slowest individual requests in the range; requires litellm-db datasource.",
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 38},
          "datasource": {"type": "postgres", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"custom": {"align": "auto", "filterable": true}}, "overrides": [
            {"matcher": {"id": "byName", "options": "duration_s"}, "properties": [{"id": "unit", "value": "s"}, {"id": "decimals", "value": 1}, {"id": "thresholds", "value": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 30}, {"color": "red", "value": 60}]}}, {"id": "custom.cellOptions", "value": {"type": "color-background"}}]},
            {"matcher": {"id": "byName", "options": "spend"}, "properties": [{"id": "unit", "value": "currencyUSD"}, {"id": "decimals", "value": 4}]},
            {"matcher": {"id": "byName", "options": "run_key"}, "properties": [{"id": "links", "value": [{"title": "Open in Run Explorer", "url": "/d/dark-factory-run-explorer?var-run=$${__data.fields[\"run_key\"]}&from=$${__from}&to=$${__to}"}]}]}
          ]},
          "options": {"showHeader": true},
          "targets": [{"refId": "A", "datasource": {"type": "postgres", "uid": "litellm-db"}, "rawQuery": true, "format": "table", "rawSql": "SELECT \"startTime\" AS time, metadata->>'user_api_key_alias' AS run_key, model, custom_llm_provider AS provider, EXTRACT(EPOCH FROM (\"endTime\" - \"startTime\")) AS duration_s, spend, total_tokens, metadata->>'status' AS status FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\") ORDER BY duration_s DESC NULLS LAST LIMIT 25"}]
        },
        {
          "id": 16, "type": "table", "title": "Failed requests (latest 50)",
          "description": "Non-success requests from spend-log metadata — upgrade to LiteLLM_ErrorLogs columns once table confirmed; requires litellm-db datasource.",
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 47},
          "datasource": {"type": "postgres", "uid": "litellm-db"},
          "fieldConfig": {"defaults": {"custom": {"align": "auto", "filterable": true}}, "overrides": [
            {"matcher": {"id": "byName", "options": "run_key"}, "properties": [{"id": "links", "value": [{"title": "Open in Run Explorer", "url": "/d/dark-factory-run-explorer?var-run=$${__data.fields[\"run_key\"]}&from=$${__from}&to=$${__to}"}]}]}
          ]},
          "options": {"showHeader": true},
          "targets": [{"refId": "A", "datasource": {"type": "postgres", "uid": "litellm-db"}, "rawQuery": true, "format": "table", "rawSql": "SELECT \"startTime\" AS time, metadata->>'user_api_key_alias' AS run_key, model, call_type, metadata->>'status' AS status, metadata->>'attempted_retries' AS retries FROM \"LiteLLM_SpendLogs\" WHERE coalesce(metadata->>'status','success') <> 'success' AND $$__timeFilter(\"startTime\") ORDER BY \"startTime\" DESC LIMIT 50"}]
        },
        {
          "id": 17, "type": "logs", "title": "LiteLLM error logs",
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 47},
          "datasource": {"type": "victoriametrics-logs-datasource", "uid": "victorialogs"},
          "options": {"showTime": true, "showLabels": false, "showCommonLabels": false, "wrapLogMessage": true, "prettifyLogMessage": false, "enableLogDetails": true, "dedupStrategy": "none", "sortOrder": "Descending"},
          "targets": [{"refId": "A", "datasource": {"type": "victoriametrics-logs-datasource", "uid": "victorialogs"}, "expr": "{namespace=\"ai\", container=\"app\"} level:~\"ERROR|error\"", "queryType": "instant", "direction": "backward", "maxLines": 200}]
        },
        {
          "id": 18, "type": "traces", "title": "Recent litellm traces",
          "description": "zoom the time range first — traces are window-scoped",
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 56},
          "datasource": {"type": "jaeger", "uid": "victoriatraces"},
          "targets": [{"refId": "A", "datasource": {"type": "jaeger", "uid": "victoriatraces"}, "queryType": "search", "service": "litellm", "limit": 50}]
        }
      ]
    }
