---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: claude-code-model-economics
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "Claude Code"
  json: |-
    {
      "schemaVersion": 39,
      "title": "Claude Code / Model & Effort Economics",
      "uid": "claude-code-model-economics",
      "timezone": "browser",
      "tags": ["claude-code", "ai", "anthropic", "cost", "models"],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {"from": "now-7d", "to": "now"},
      "links": [
        {"title": "Command Center", "url": "/d/claude-code-command-center", "type": "link", "icon": "external link"},
        {"title": "Cost & Tokens", "url": "/d/claude-code-cost-tokens", "type": "link", "icon": "external link"},
        {"title": "Activity & Tools", "url": "/d/claude-code-activity-tools", "type": "link", "icon": "external link"},
        {"title": "Events, Logs & Traces", "url": "/d/claude-code-events-traces", "type": "link", "icon": "external link"},
        {"title": "Provider Comparison", "url": "/d/claude-code-provider-comparison", "type": "link", "icon": "external link"}
      ],
      "annotations": {
        "list": [
          {"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}
        ]
      },
      "templating": {
        "list": [
          {"name": "model", "label": "Model", "type": "query", "datasource": {"type": "prometheus", "uid": "prometheus"}, "query": {"query": "label_values(claude_code_token_usage_tokens_total, model)", "refId": "q-model"}, "refresh": 2, "sort": 1, "multi": true, "includeAll": true, "allValue": ".*", "current": {"selected": true, "text": "All", "value": "$__all"}},
          {"name": "query_source", "label": "Query source", "type": "query", "datasource": {"type": "prometheus", "uid": "prometheus"}, "query": {"query": "label_values(claude_code_token_usage_tokens_total, query_source)", "refId": "q-qs"}, "refresh": 2, "sort": 1, "multi": true, "includeAll": true, "allValue": ".*", "current": {"selected": true, "text": "All", "value": "$__all"}}
        ]
      },
      "panels": [
        {
          "id": 1, "type": "text", "title": "", "gridPos": {"h": 4, "w": 24, "x": 0, "y": 0},
          "options": {"mode": "markdown", "content": "## Model & Effort Economics\nCost and token usage sliced by **model**, **effort level**, **speed**, **query_source**, **skill** and **agent**. All cost figures are an **API-equivalent estimate** (token volume × published list price), **not** real spend against a flat subscription. Use the **Model** and **Query source** variables to focus."}
        },

        {"id": 2, "type": "row", "title": "By model", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 4}, "panels": []},
        {
          "id": 3, "type": "bargauge", "title": "Cost by model", "description": "Estimated API-equivalent cost over the dashboard range, top 15 models. Filtered by query_source.", "gridPos": {"h": 9, "w": 8, "x": 0, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "topk(15, sum by (model)(increase(claude_code_cost_usage_USD_total{query_source=~\"$$query_source\"}[$$__range])))", "instant": true, "legendFormat": "{{model}}"}
          ],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "continuous-GrYlRd"}}, "overrides": []}
        },
        {
          "id": 4, "type": "timeseries", "title": "Cost over time by model", "description": "Estimated API-equivalent cost per scrape interval, stacked by model. Filtered by query_source.", "gridPos": {"h": 9, "w": 16, "x": 8, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum by (model)(increase(claude_code_cost_usage_USD_total{query_source=~\"$$query_source\"}[$$__rate_interval]))", "legendFormat": "{{model}}"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 4, "custom": {"lineWidth": 1, "fillOpacity": 25, "showPoints": "never", "stacking": {"mode": "normal", "group": "A"}}}, "overrides": []}
        },
        {
          "id": 5, "type": "bargauge", "title": "Tokens by model", "description": "Total tokens (all types) over the dashboard range, top 15 models. Filtered by query_source.", "gridPos": {"h": 8, "w": 24, "x": 0, "y": 14},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "topk(15, sum by (model)(increase(claude_code_token_usage_tokens_total{query_source=~\"$$query_source\"}[$$__range])))", "instant": true, "legendFormat": "{{model}}"}
          ],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "continuous-BlPu"}}, "overrides": []}
        },

        {"id": 6, "type": "row", "title": "By effort", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 22}, "panels": []},
        {
          "id": 7, "type": "timeseries", "title": "Cost by effort level", "description": "Estimated API-equivalent cost per scrape interval, stacked by effort (low/medium/high/xhigh/max). Filtered by model.", "gridPos": {"h": 9, "w": 16, "x": 0, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum by (effort)(increase(claude_code_cost_usage_USD_total{model=~\"$$model\"}[$$__rate_interval]))", "legendFormat": "{{effort}}"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 4, "custom": {"lineWidth": 1, "fillOpacity": 25, "showPoints": "never", "stacking": {"mode": "normal", "group": "A"}}}, "overrides": []}
        },
        {
          "id": 8, "type": "stat", "title": "xhigh share of cost", "description": "Fraction of estimated cost attributed to the xhigh effort tier over the dashboard range. Filtered by model.", "gridPos": {"h": 9, "w": 8, "x": 16, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum(increase(claude_code_cost_usage_USD_total{model=~\"$$model\", effort=\"xhigh\"}[$$__range])) / clamp_min(sum(increase(claude_code_cost_usage_USD_total{model=~\"$$model\"}[$$__range])), 1)", "instant": true}
          ],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "area", "textMode": "auto"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "decimals": 1, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.25}, {"color": "red", "value": 0.5}]}}, "overrides": []}
        },
        {
          "id": 9, "type": "bargauge", "title": "Cost by effort (range)", "description": "Estimated API-equivalent cost over the dashboard range, ranked by effort tier. Filtered by model.", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 32},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sort_desc(sum by (effort)(increase(claude_code_cost_usage_USD_total{model=~\"$$model\"}[$$__range])))", "instant": true, "legendFormat": "{{effort}}"}
          ],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "continuous-GrYlRd"}}, "overrides": []}
        },
        {
          "id": 10, "type": "timeseries", "title": "Output-token latency p90 by model", "description": "p90 api_request latency (ms) from Loki, grouped by model. Explicit duration_ms extraction; no clamp.", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 32},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {"refId": "A", "expr": "quantile_over_time(0.9, {service_name=\"claude-code\"} | json duration_ms=\"attributes.duration_ms\", model=\"attributes.model\" | duration_ms != \"\" | unwrap duration_ms [$$__interval]) by (model)", "legendFormat": "{{model}}"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "ms", "decimals": 0, "custom": {"lineWidth": 2, "fillOpacity": 5, "showPoints": "never"}}, "overrides": []}
        },

        {"id": 11, "type": "row", "title": "By query source & speed", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 40}, "panels": []},
        {
          "id": 12, "type": "bargauge", "title": "Cost by query_source", "description": "Estimated API-equivalent cost over the range, split by query_source (main/subagent/auxiliary). Filtered by model.", "gridPos": {"h": 8, "w": 6, "x": 0, "y": 41},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sort_desc(sum by (query_source)(increase(claude_code_cost_usage_USD_total{model=~\"$$model\"}[$$__range])))", "instant": true, "legendFormat": "{{query_source}}"}
          ],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "continuous-GrYlRd"}}, "overrides": []}
        },
        {
          "id": 13, "type": "timeseries", "title": "Cost: fast vs normal speed", "description": "Estimated API-equivalent cost per scrape interval, stacked by speed. Filtered by model and query_source.", "gridPos": {"h": 8, "w": 6, "x": 6, "y": 41},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum by (speed)(increase(claude_code_cost_usage_USD_total{model=~\"$$model\", query_source=~\"$$query_source\"}[$$__rate_interval]))", "legendFormat": "{{speed}}"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 4, "custom": {"lineWidth": 1, "fillOpacity": 25, "showPoints": "never", "stacking": {"mode": "normal", "group": "A"}}}, "overrides": []}
        },
        {
          "id": 14, "type": "bargauge", "title": "Cost by skill_name", "description": "Estimated API-equivalent cost over the range attributed to named skills (blank skill excluded), top 10. Filtered by model.", "gridPos": {"h": 8, "w": 6, "x": 12, "y": 41},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "topk(10, sum by (skill_name)(increase(claude_code_cost_usage_USD_total{model=~\"$$model\", skill_name!=\"\"}[$$__range])))", "instant": true, "legendFormat": "{{skill_name}}"}
          ],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "continuous-GrYlRd"}}, "overrides": []}
        },
        {
          "id": 15, "type": "bargauge", "title": "Cost by agent_name", "description": "Estimated API-equivalent cost over the range attributed to named agents/subagents (blank agent excluded), top 10. Filtered by model.", "gridPos": {"h": 8, "w": 6, "x": 18, "y": 41},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "topk(10, sum by (agent_name)(increase(claude_code_cost_usage_USD_total{model=~\"$$model\", agent_name!=\"\"}[$$__range])))", "instant": true, "legendFormat": "{{agent_name}}"}
          ],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "continuous-GrYlRd"}}, "overrides": []}
        },

        {"id": 16, "type": "row", "title": "Token efficiency", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 49}, "panels": []},
        {
          "id": 17, "type": "timeseries", "title": "Token mix by type", "description": "Tokens per scrape interval, stacked by type (input/output/cacheRead/cacheCreation). Filtered by model and query_source.", "gridPos": {"h": 9, "w": 12, "x": 0, "y": 50},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum by (type)(increase(claude_code_token_usage_tokens_total{model=~\"$$model\", query_source=~\"$$query_source\"}[$$__rate_interval]))", "legendFormat": "{{type}}"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "custom": {"lineWidth": 1, "fillOpacity": 25, "showPoints": "never", "stacking": {"mode": "normal", "group": "A"}}}, "overrides": []}
        },
        {
          "id": 18, "type": "timeseries", "title": "Cache-write vs cache-read tokens", "description": "Cache-write (cacheCreation) vs cache-read tokens per scrape interval. High read relative to write indicates good cache reuse. Filtered by model and query_source.", "gridPos": {"h": 9, "w": 12, "x": 12, "y": 50},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum(increase(claude_code_token_usage_tokens_total{model=~\"$$model\", query_source=~\"$$query_source\", type=\"cacheCreation\"}[$$__rate_interval]))", "legendFormat": "cache-write"},
            {"refId": "B", "expr": "sum(increase(claude_code_token_usage_tokens_total{model=~\"$$model\", query_source=~\"$$query_source\", type=\"cacheRead\"}[$$__rate_interval]))", "legendFormat": "cache-read"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never"}}, "overrides": []}
        }
      ]
    }
