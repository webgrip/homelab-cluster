---
# Dark Factory — Runner Fleet & KEDA.
# The CAPACITY/EXECUTION dashboard for the ploeg substrate: the agent pool is the KEDA
# ScaledJob ploeg-worker-bronze (ns ploeg, bronze maxReplicaCount = 1); the CI pool
# forgejo-runner (ns forgejo) is kept as a clearly-labeled comparison section.
# Run history comes from ploeg-db agent_runs (the authoritative record) — KSM Job series
# are GC-limited and no longer used for agent history.
# KSM caveat (live-verified): kube-state-metrics series here carry namespace="observability"
# (the scrape namespace) and the workload's REAL namespace in `exported_namespace`. For
# kube_pod_status_phase the workload pod is in the regular `pod` label (keep that shape);
# for kube_pod_container_resource_limits the workload pod is ONLY in `exported_pod` — join
# via label_replace(exported_pod -> pod). cAdvisor container_* metrics carry real labels.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: dark-factory-runner-fleet
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: ai
  json: |-
    {
      "schemaVersion": 39,
      "title": "Dark Factory — Runner Fleet & KEDA",
      "uid": "dark-factory-runner-fleet",
      "timezone": "browser",
      "tags": [
        "dark-factory",
        "forgejo",
        "keda",
        "runners"
      ],
      "editable": false,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "links": [
        {
          "type": "dashboards",
          "title": "Dark Factory",
          "tags": [
            "dark-factory"
          ],
          "asDropdown": true,
          "includeVars": false,
          "keepTime": true
        },
        {
          "type": "link",
          "title": "LiteLLM Spend & Budgets",
          "url": "/d/litellm-spend",
          "icon": "dollar"
        },
        {
          "type": "link",
          "title": "LiteLLM Reliability",
          "url": "/d/litellm-reliability",
          "icon": "bolt"
        },
        {
          "type": "link",
          "title": "Forgejo CI Command Center",
          "url": "/d/infra-forgejo-ci",
          "icon": "external link"
        },
        {
          "type": "link",
          "title": "Claude Code Command Center",
          "url": "/d/claude-code-command-center",
          "icon": "external link"
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "At a glance",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Agent queue",
          "description": "Pending agent jobs from the KEDA ploeg-worker-bronze scaler metric (keda_scaler_metrics_value) — work waiting for a pod.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 2
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": false,
              "expr": "max(keda_scaler_metrics_value{scaledObject=\"ploeg-worker-bronze\"}) or vector(0)"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Agent pods running",
          "description": "Live ploeg-worker-bronze pods in Running phase (bronze maxReplicaCount = 1); kube_pod_status_phase with exported_namespace (KSM caveat, file header).",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 4,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 2
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": false,
              "expr": "sum(kube_pod_status_phase{exported_namespace=\"ploeg\",pod=~\"ploeg-worker-bronze-[a-z0-9]{5}-[a-z0-9]{5}\",phase=\"Running\"}) or vector(0)"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Runs today",
          "description": "Agent runs started since midnight (UTC), counted from ploeg-db agent_runs — the authoritative run record.",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ploeg-db"
          },
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 7,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ploeg-db"
              },
              "rawQuery": true,
              "format": "table",
              "rawSql": "SELECT count(*) AS runs FROM agent_runs WHERE started_at >= date_trunc('day', now())"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "ScaledJob errors (1h)",
          "description": "KEDA ScaledJob errors (keda_scaled_job_errors_total) across both runner pools in the last hour — non-zero means KEDA failed to create runner Jobs.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 10,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": false,
              "expr": "sum(increase(keda_scaled_job_errors_total{scaledJob=~\"ploeg-worker-bronze|forgejo-runner\"}[1h])) or vector(0)"
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Scaler fetch latency",
          "description": "Worst-case time KEDA takes to fetch the pending-jobs metric from Forgejo (keda_scaler_metrics_latency_seconds), across both pools.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 13,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": false,
              "expr": "max(keda_scaler_metrics_latency_seconds{scaledObject=~\"ploeg-worker-bronze|forgejo-runner\"}) or vector(0)"
            }
          ]
        },
        {
          "id": 7,
          "type": "stat",
          "title": "OOM kills (24h, both pools)",
          "description": "OOM-killed containers in agent and CI runner pods over the last 24h (cAdvisor container_oom_events_total, real namespace labels). Should be 0.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": false,
              "expr": "sum(increase(container_oom_events_total{namespace=~\"ploeg|forgejo\",pod=~\"ploeg-worker-bronze-.*|forgejo-runner-.*\"}[24h])) or vector(0)"
            }
          ]
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Pods Pending/Failed (both pools)",
          "description": "Runner pods (either pool) stuck Pending, Failed, or Unknown; kube_pod_status_phase with exported_namespace (KSM caveat, file header). Should be 0.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 20,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": false,
              "expr": "sum(kube_pod_status_phase{exported_namespace=~\"ploeg|forgejo\",pod=~\"ploeg-worker-bronze-[a-z0-9]{5}-[a-z0-9]{5}|forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\",phase=~\"Pending|Failed|Unknown\"}) or vector(0)"
            }
          ]
        },
        {
          "id": 9,
          "type": "row",
          "title": "Agent pool (ploeg-worker-bronze — bronze max=1)",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Agent queue vs pods vs ceiling",
          "description": "Pending agent jobs (KEDA scaler value) vs running agent pods vs the ScaledJob ceiling (bronze maxReplicaCount = 1); 'actively building' = pods burning over 0.05 CPU core.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "lineInterpolation": "stepAfter",
                "fillOpacity": 12,
                "showPoints": "never",
                "spanNulls": false
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "ceiling (bronze max=1)"
                },
                "properties": [
                  {
                    "id": "custom.fillOpacity",
                    "value": 0
                  },
                  {
                    "id": "custom.lineStyle",
                    "value": {
                      "fill": "dash",
                      "dash": [
                        8,
                        8
                      ]
                    }
                  },
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "red"
                    }
                  }
                ]
              }
            ]
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "queue",
              "expr": "max(keda_scaler_metrics_value{scaledObject=\"ploeg-worker-bronze\"})"
            },
            {
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "running pods",
              "expr": "sum(kube_pod_status_phase{exported_namespace=\"ploeg\",pod=~\"ploeg-worker-bronze-[a-z0-9]{5}-[a-z0-9]{5}\",phase=\"Running\"})"
            },
            {
              "refId": "C",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "actively building",
              "expr": "count(sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"ploeg\",pod=~\"ploeg-worker-bronze-[a-z0-9]{5}-[a-z0-9]{5}\",image!=\"\"}[$$__rate_interval])) > 0.05)"
            },
            {
              "refId": "D",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "ceiling (bronze max=1)",
              "expr": "vector(1)"
            }
          ]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Cold start / dispatch lag",
          "description": "Oldest queued work-item age (ploeg_work_items_oldest_age_seconds) — the red line marks the 900s lease TTL; queued age past it means dispatch is stalled.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 12,
                "showPoints": "never",
                "spanNulls": false,
                "thresholdsStyle": {
                  "mode": "line"
                }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 900
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{team}} oldest queued",
              "expr": "max by (team) (ploeg_work_items_oldest_age_seconds{state=\"queued\"})"
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Run duration by outcome",
          "description": "Longest agent run currently exported per outcome (ploeg_run_duration_seconds, one series per run) — series age out with the exporter window.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 12,
                "showPoints": "never",
                "spanNulls": false
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "pr_opened"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "green"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "failed"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "red"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "running"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "blue"
                    }
                  }
                ]
              }
            ]
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "{{outcome}}",
              "expr": "max by (outcome) (ploeg_run_duration_seconds)"
            }
          ]
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Runs per hour by outcome",
          "description": "Agent runs started per hour, split by outcome, from ploeg-db agent_runs — the authoritative record, unaffected by KSM Job GC.",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ploeg-db"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "bars",
                "lineWidth": 1,
                "fillOpacity": 80,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "mode": "normal",
                  "group": "A"
                }
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "pr_opened"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "green"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "failed"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "red"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "running"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "blue"
                    }
                  }
                ]
              }
            ]
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ploeg-db"
              },
              "rawQuery": true,
              "format": "time_series",
              "rawSql": "SELECT $$__timeGroup(started_at,'1h') AS time, coalesce(nullif(outcome,''),'running') AS metric, count(*) FROM agent_runs WHERE $$__timeFilter(started_at) GROUP BY 1,2 ORDER BY 1"
            }
          ]
        },
        {
          "id": 14,
          "type": "table",
          "title": "Agent run history",
          "description": "Every agent run in the selected range from ploeg-db agent_runs (the authoritative record — no KSM GC limit); open runs show as 'running', duration in minutes.",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ploeg-db"
          },
          "gridPos": {
            "h": 10,
            "w": 18,
            "x": 0,
            "y": 22
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
