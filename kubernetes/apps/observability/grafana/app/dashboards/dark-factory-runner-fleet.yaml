                "type": "grafana-postgresql-datasource",
                "uid": "ploeg-db"
              },
              "rawQuery": true,
              "format": "table",
              "rawSql": "SELECT started_at, 'ploeg-' || left(run_token,12) AS run, team, coalesce(nullif(outcome,''),'running') AS outcome, round(EXTRACT(EPOCH FROM (coalesce(finished_at, now()) - started_at))/60.0,1) AS duration_min, coalesce(links[1],'') AS pr, stuck_reason FROM agent_runs WHERE $$__timeFilter(started_at) ORDER BY started_at DESC LIMIT 100"
