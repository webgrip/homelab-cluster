---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: security-authentik
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "Security"
  json: |-
    {
      "schemaVersion": 39,
      "title": "Authentik / Identity Provider",
      "uid": "security-authentik",
      "timezone": "browser",
      "tags": ["security", "authentik", "identity"],
      "editable": false,
      "refresh": "30s",
      "time": {"from": "now-6h", "to": "now"},
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Server replicas",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(kube_deployment_status_replicas_available{namespace=\"authentik\", deployment=\"authentik-server\"}) or vector(0)", "legendFormat": "available"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}, "overrides": []}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Worker replicas",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(kube_deployment_status_replicas_available{namespace=\"authentik\", deployment=\"authentik-worker\"}) or vector(0)", "legendFormat": "available"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}, "overrides": []}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "HTTP 5xx rate",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(rate(authentik_http_requests_total{namespace=\"authentik\", status=~\"5..\"}[5m])) or vector(0)", "legendFormat": "5xx/s"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"unit": "reqps", "decimals": 3, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.05}, {"color": "red", "value": 0.2}]}}, "overrides": []}
        },
        {
          "id": 4,
          "type": "gauge",
          "title": "Media PVC used",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "(100 * kubelet_volume_stats_used_bytes{namespace=\"authentik\", persistentvolumeclaim=\"authentik-media\"} / clamp_min(kubelet_volume_stats_capacity_bytes{namespace=\"authentik\", persistentvolumeclaim=\"authentik-media\"}, 1)) or vector(0)", "legendFormat": "used"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": false, "showThresholdMarkers": true},
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1, "min": 0, "max": 100, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 85}]}}, "overrides": []}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Request rate",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (status) (rate(authentik_http_requests_total{namespace=\"authentik\"}[5m]))", "legendFormat": "{{status}}"}],
          "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []},
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "none"}}
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "CPU usage",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (container) (rate(container_cpu_usage_seconds_total{namespace=\"authentik\", pod=~\"authentik-(server|worker)-.*\", container=~\"server|worker\"}[5m]))", "legendFormat": "{{container}}"}],
          "fieldConfig": {"defaults": {"unit": "cores"}, "overrides": []},
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "none"}}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Memory working set",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (container) (container_memory_working_set_bytes{namespace=\"authentik\", pod=~\"authentik-(server|worker)-.*\", container=~\"server|worker\"})", "legendFormat": "{{container}}"}],
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "none"}}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Container restarts",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (container) (increase(kube_pod_container_status_restarts_total{namespace=\"authentik\", pod=~\"authentik-(server|worker)-.*\", container=~\"server|worker\"}[30m]))", "legendFormat": "{{container}}"}],
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "none"}}
        }
      ]
    }
