          "options": {
            "mode": "markdown",
            "content": "## Provider Cost Comparison \u2014 comprehensive\nYour **actual Claude Code token mix** (input / output / cacheRead / cacheCreation) priced on **18 models across 15+ providers** at current list rates (Jun 2026), cache-aware, vs your flat subscription and GitHub Copilot's metered billing. Option labels show the per-1M rates as **in/out/cacheRead/cacheWrite**.\n\n**Basis = month-to-date** (time range is set to *this month*): the **MTD so far** column is what you've incurred this month (LOW / floor); **Projected month** extrapolates your current daily run-rate to the full month (HIGH). Tune **Sub USD/mo** (100 = Max 5\u00d7, 200 = Max 20\u00d7) and **Days in month**.\n\n_Cost is API-EQUIVALENT (token \u00d7 list price) \u2014 on a Max subscription it is not real spend. Providers without published prompt-cache pricing are charged full input rate for cached tokens (upper bound). GitHub Copilot (post Jun 2026) meters tokens at the model's API rate minus a monthly credit allotment (shown metered on Claude Opus); for heavy agentic use it tracks raw API cost, not the sub fee._"
          }
        },
