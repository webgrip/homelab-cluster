---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: claude-code-activity-tools
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "Claude Code"
  json: |-
    {
      "schemaVersion": 39,
      "title": "Claude Code / Activity & Tools",
      "uid": "claude-code-activity-tools",
      "timezone": "browser",
      "tags": ["claude-code", "ai", "anthropic", "tools", "activity", "behavior"],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {"from": "now-7d", "to": "now"},
      "links": [
        {"title": "Command Center", "url": "/d/claude-code-command-center", "type": "link", "icon": "external link"},
        {"title": "Cost & Tokens", "url": "/d/claude-code-cost-tokens", "type": "link", "icon": "dollar"},
        {"title": "Activity & Tools", "url": "/d/claude-code-activity-tools", "type": "link", "icon": "bolt"},
        {"title": "Events, Logs & Traces", "url": "/d/claude-code-events-traces", "type": "link", "icon": "doc"}
      ],
      "annotations": {
        "list": [
          {"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}
        ]
      },
      "templating": {
        "list": [
          {"name": "query_source", "label": "Query source", "type": "query", "datasource": {"type": "prometheus", "uid": "prometheus"}, "query": {"query": "label_values(query_source)", "refId": "q-qs"}, "refresh": 2, "sort": 1, "multi": true, "includeAll": true, "current": {"selected": true, "text": "All", "value": "$$__all"}}
        ]
      },
      "panels": [
        {
          "id": 1, "type": "text", "title": "", "gridPos": {"h": 3, "w": 24, "x": 0, "y": 0},
          "options": {"mode": "markdown", "content": "## Claude Code Activity & Tools\nBehavioral view: session start types, active time (user vs CLI), tool usage and reliability, code-edit decisions by tool and language, MCP and subagent usage, and — with full content capture — **top bash commands** and **top files edited**. Tool panels read Loki `tool_result` events; edit-decision panels read Prometheus."}
        },
        {"id": 2, "type": "row", "title": "1. Sessions & active time", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 3}, "panels": []},
        {
          "id": 3, "type": "timeseries", "title": "Sessions by start type", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "count by (start_type) (max_over_time(claude_code_session_count_total[$$__rate_interval]))", "legendFormat": "{{start_type}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 20, "showPoints": "never", "stacking": {"mode": "normal", "group": "A"}}}, "overrides": []}
        },
        {
          "id": 4, "type": "timeseries", "title": "Active time: user vs CLI", "description": "user = typing/reading; cli = tool execution + response generation.", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (type) (increase(claude_code_active_time_seconds_total[$$__rate_interval]))", "legendFormat": "{{type}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"lineWidth": 2, "fillOpacity": 20, "showPoints": "never", "stacking": {"mode": "normal", "group": "A"}}}, "overrides": []}
        },
        {
          "id": 5, "type": "stat", "title": "User prompts (range)", "gridPos": {"h": 4, "w": 4, "x": 16, "y": 4},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum(count_over_time({service_name=\"claude-code\", event_name=\"user_prompt\"}[$$__range]))", "queryType": "instant"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "blue"}}, "overrides": []}
        },
        {
          "id": 6, "type": "stat", "title": "Tools per prompt", "description": "tool_result ÷ user_prompt over the range.", "gridPos": {"h": 4, "w": 4, "x": 20, "y": 4},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum(count_over_time({service_name=\"claude-code\", event_name=\"tool_result\"}[$$__range])) / sum(count_over_time({service_name=\"claude-code\", event_name=\"user_prompt\"}[$$__range]))", "queryType": "instant"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 1, "color": {"mode": "fixed", "fixedColor": "purple"}}, "overrides": []}
        },
        {
          "id": 7, "type": "stat", "title": "Sessions (range)", "gridPos": {"h": 4, "w": 4, "x": 16, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "count(count by (session_id) (max_over_time(claude_code_session_count_total[$$__range]))) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "green"}}, "overrides": []}
        },
        {
          "id": 8, "type": "stat", "title": "Avg active min / session", "gridPos": {"h": 4, "w": 4, "x": 20, "y": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "((sum(increase(claude_code_active_time_seconds_total[$$__range])) or vector(0)) / 60) / clamp_min(count(count by (session_id) (max_over_time(claude_code_session_count_total[$$__range]))), 1)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "m", "decimals": 1, "color": {"mode": "fixed", "fixedColor": "yellow"}}, "overrides": []}
        },
        {"id": 9, "type": "row", "title": "2. Tool usage & reliability", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 12}, "panels": []},
        {
          "id": 10, "type": "bargauge", "title": "Tool calls by tool", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 13},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "topk(15, sum by (tool_name) (count_over_time({service_name=\"claude-code\", event_name=\"tool_result\"} | json tool_name=\"attributes.tool_name\" [$$__range])))", "queryType": "instant", "legendFormat": "{{tool_name}}"}],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "continuous-BlYlRd"}}, "overrides": []}
        },
        {
          "id": 11, "type": "bargauge", "title": "Tool success ratio", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 13},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum by (tool_name) (count_over_time({service_name=\"claude-code\", event_name=\"tool_result\"} | json tool_name=\"attributes.tool_name\", success=\"attributes.success\" | success=\"true\" [$$__range])) / sum by (tool_name) (count_over_time({service_name=\"claude-code\", event_name=\"tool_result\"} | json tool_name=\"attributes.tool_name\" [$$__range]))", "queryType": "instant", "legendFormat": "{{tool_name}}"}],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "basic", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "decimals": 2, "min": 0, "max": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "red"}, {"color": "yellow", "value": 0.9}, {"color": "green", "value": 0.98}]}, "color": {"mode": "thresholds"}}, "overrides": []}
        },
        {
          "id": 12, "type": "bargauge", "title": "Tool p90 duration", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 13},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "topk(15, sort_desc(quantile_over_time(0.9, {service_name=\"claude-code\", event_name=\"tool_result\"} | json tool_name=\"attributes.tool_name\", duration_ms=\"attributes.duration_ms\" | unwrap duration_ms [$$__range]) by (tool_name)))", "queryType": "instant", "legendFormat": "{{tool_name}}"}],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "ms", "decimals": 0, "color": {"mode": "continuous-BlYlRd"}}, "overrides": []}
        },
        {"id": 13, "type": "row", "title": "3. Edit decisions, MCP & subagents", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 21}, "panels": []},
        {
          "id": 14, "type": "timeseries", "title": "Edit decisions by tool", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 22},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (tool_name, decision) (increase(claude_code_code_edit_tool_decision_total[$$__rate_interval]))", "legendFormat": "{{tool_name}} / {{decision}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never"}}, "overrides": []}
        },
        {
          "id": 15, "type": "bargauge", "title": "Accept rate by language", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 22},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (language) (increase(claude_code_code_edit_tool_decision_total{decision=\"accept\"}[$$__range])) / clamp_min(sum by (language) (increase(claude_code_code_edit_tool_decision_total[$$__range])), 1)", "instant": true, "legendFormat": "{{language}}"}],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "basic", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "decimals": 1, "min": 0, "max": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "red"}, {"color": "yellow", "value": 0.5}, {"color": "green", "value": 0.8}]}, "color": {"mode": "thresholds"}}, "overrides": []}
        },
        {
          "id": 16, "type": "bargauge", "title": "MCP tool usage", "description": "tool_result events where tool_name matches mcp__<server>__<tool>.", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 22},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "topk(15, sum by (mcp_tool_name) (count_over_time({service_name=\"claude-code\", event_name=\"tool_result\"} | json tool_name=\"attributes.tool_name\" | tool_name=\"mcp_tool\" | json tp=\"attributes.tool_parameters\" | line_format \"{{.tp}}\" | json mcp_tool_name=\"mcp_tool_name\" [$$__range])))", "queryType": "instant", "legendFormat": "{{mcp_tool_name}}"}],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "continuous-GrYlRd"}}, "overrides": []}
        },
        {"id": 17, "type": "row", "title": "4. Content & subagents (top commands/files need full content capture)", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 30}, "panels": []},
        {
          "id": 18, "type": "table", "title": "Top bash commands", "description": "Requires OTEL_LOG_TOOL_DETAILS=1.", "gridPos": {"h": 9, "w": 8, "x": 0, "y": 31},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "topk(20, sum by (full_command) (count_over_time({service_name=\"claude-code\", event_name=\"tool_result\"} | json tool_name=\"attributes.tool_name\" | tool_name=\"Bash\" | json tp=\"attributes.tool_parameters\" | line_format \"{{.tp}}\" | json full_command=\"full_command\" | full_command!=\"\" [$$__range])))", "queryType": "instant", "legendFormat": "{{full_command}}"}],
          "transformations": [{"id": "organize", "options": {"excludeByName": {"Time": true}, "renameByName": {"full_command": "Command", "Value": "Count"}}}],
          "options": {"showHeader": true, "sortBy": [{"displayName": "Count", "desc": true}]},
          "fieldConfig": {"defaults": {"custom": {"align": "auto", "filterable": true}}, "overrides": [{"matcher": {"id": "byName", "options": "Count"}, "properties": [{"id": "custom.width", "value": 80}]}]}
        },
        {
          "id": 19, "type": "table", "title": "Top files edited", "description": "Requires OTEL_LOG_TOOL_DETAILS=1.", "gridPos": {"h": 9, "w": 8, "x": 8, "y": 31},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "topk(20, sum by (file_path) (count_over_time({service_name=\"claude-code\", event_name=\"tool_result\"} | json tool_name=\"attributes.tool_name\" | tool_name=~\"Edit|Write|NotebookEdit\" | json ti=\"attributes.tool_input\" | line_format \"{{.ti}}\" | json file_path=\"file_path\" | file_path!=\"\" [$$__range])))", "queryType": "instant", "legendFormat": "{{file_path}}"}],
          "transformations": [{"id": "organize", "options": {"excludeByName": {"Time": true}, "renameByName": {"file_path": "File", "Value": "Edits"}}}],
          "options": {"showHeader": true, "sortBy": [{"displayName": "Edits", "desc": true}]},
          "fieldConfig": {"defaults": {"custom": {"align": "auto", "filterable": true}}, "overrides": [{"matcher": {"id": "byName", "options": "Edits"}, "properties": [{"id": "custom.width", "value": 80}]}]}
        },
        {
          "id": 20, "type": "bargauge", "title": "Subagent token usage", "description": "Tokens attributed to each subagent (agent.name).", "gridPos": {"h": 9, "w": 8, "x": 16, "y": 31},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "topk(15, sort_desc(sum by (agent_name) (increase(claude_code_token_usage_tokens_total{agent_name!=\"\"}[$$__range])) or sum by (agent_name) (increase(claude_code_token_usage_total{agent_name!=\"\"}[$$__range]))))", "instant": true, "legendFormat": "{{agent_name}}"}],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "continuous-BlYlRd"}}, "overrides": []}
        }
      ]
    }
