---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: exec-value-flow-delivery
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: executive
  json: |-
    {
      "schemaVersion": 39,
      "title": "Executive / Value Flow & Delivery (DORA)",
      "uid": "exec-value-flow-delivery",
      "timezone": "browser",
      "tags": ["executive", "dora", "delivery", "flux", "ci"],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "1m",
      "time": {"from": "now-7d", "to": "now"},
      "links": [
        {"title": "◀ Scorecard", "url": "/d/exec-kpi-scorecard", "type": "link", "icon": "dashboard"},
        {"title": "Reliability & SRE", "url": "/d/exec-reliability-sre", "type": "link", "icon": "external link"},
        {"title": "Security & Supply Chain", "url": "/d/exec-security-supply-chain", "type": "link", "icon": "external link"},
        {"title": "Platform & Efficiency", "url": "/d/exec-platform-efficiency", "type": "link", "icon": "external link"},
        {"title": "FinOps & Cost", "url": "/d/exec-finops", "type": "link", "icon": "external link"}
      ],
      "annotations": {"list": [{"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}]},
      "templating": {"list": []},
      "panels": [
        {
          "id": 1, "type": "text", "title": "", "gridPos": {"h": 3, "w": 24, "x": 0, "y": 0},
          "options": {"mode": "markdown", "content": "## Value Flow & Delivery — DORA\nHow fast and how safely we ship, measured from GitOps systems of record (Flux + Forgejo + Renovate). Speed is always paired with safety: deployment frequency sits next to change-failure rate and recovery. Lead time shown here is the **cluster-side apply tail** — full commit→prod is on the 30-day instrumentation roadmap."}
        },

        {"id": 10, "type": "row", "title": "Headline (window)", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 3}, "panels": []},
        {
          "id": 11, "type": "stat", "title": "Deployment frequency", "description": "Distinct git revisions Flux applied to a non-suspended Kustomization in the window (deduped per commit).", "gridPos": {"h": 4, "w": 6, "x": 0, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "count(count by (revision) (max_over_time(flux_resource_info{kind=\"Kustomization\", suspended=\"False\"}[$$__range])))", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 5}, {"color": "green", "value": 14}]}}, "overrides": []}
        },
        {
          "id": 12, "type": "stat", "title": "Lead time — Flux apply p95", "description": "p95 reconcile/apply duration for Kustomizations (cluster-side tail of lead time).", "gridPos": {"h": 4, "w": 6, "x": 6, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "histogram_quantile(0.95, sum by (le) (rate(gotk_reconcile_duration_seconds_bucket{kind=\"Kustomization\"}[$$__rate_interval])))", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 1, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 30}, {"color": "red", "value": 120}]}}, "overrides": []}
        },
        {
          "id": 13, "type": "stat", "title": "Change failure rate", "description": "Share of Flux resources currently not Ready=True (point-in-time release-safety proxy).", "gridPos": {"h": 4, "w": 6, "x": 12, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "100 * (count(flux_resource_info{ready!=\"True\"}) or vector(0)) / count(flux_resource_info)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 5}]}}, "overrides": []}
        },
        {
          "id": 14, "type": "stat", "title": "Release cadence (7d)", "description": "New Forgejo releases cut in the last 7 days (gauge delta, floored at 0).", "gridPos": {"h": 4, "w": 6, "x": 18, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "clamp_min(sum(gitea_releases) - sum(gitea_releases offset 7d), 0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 1}, {"color": "green", "value": 5}]}}, "overrides": []}
        },

        {"id": 20, "type": "row", "title": "Delivery health over time", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 8}, "panels": []},
        {
          "id": 21, "type": "timeseries", "title": "Flux apply latency p95 by kind", "description": "p95 reconcile duration per Flux resource kind — the convergence speed of the GitOps engine.", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "histogram_quantile(0.95, sum by (le, kind) (rate(gotk_reconcile_duration_seconds_bucket[$$__rate_interval])))", "legendFormat": "{{kind}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 2, "custom": {"lineWidth": 1, "fillOpacity": 10, "showPoints": "never"}}, "overrides": []}
        },
        {
          "id": 22, "type": "timeseries", "title": "GitOps readiness — managed vs ready", "description": "Total Flux-managed resources vs how many are Ready. A gap = an in-flight or failing rollout; the width of the gap over time is the recovery-time signal.", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "count(flux_resource_info)", "legendFormat": "managed"},
            {"refId": "B", "expr": "sum(flux_resource_info{ready=\"True\"})", "legendFormat": "ready"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "custom": {"lineWidth": 2, "fillOpacity": 5, "showPoints": "never"}}, "overrides": [{"matcher": {"id": "byName", "options": "ready"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]}, {"matcher": {"id": "byName", "options": "managed"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "blue"}}]}]}
        },

        {"id": 30, "type": "row", "title": "CI capacity — GitHub ARC fleet (scaled to zero; live CI path is Forgejo)", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 17}, "panels": []},
        {
          "id": 31, "type": "stat", "title": "Registered runners", "description": "GitHub Actions Runner Controller fleet size. This fleet is scale-to-zero — 0 when idle is expected.", "gridPos": {"h": 4, "w": 8, "x": 0, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(gha_registered_runners{namespace=\"arc-systems\"}) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "value", "graphMode": "area"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "blue"}}, "overrides": []}
        },
        {
          "id": 32, "type": "stat", "title": "Running jobs", "description": "Jobs currently executing on ARC runners.", "gridPos": {"h": 4, "w": 8, "x": 8, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(gha_running_jobs{namespace=\"arc-systems\"}) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "value", "graphMode": "area"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "purple"}}, "overrides": []}
        },
        {
          "id": 33, "type": "stat", "title": "Runner utilization", "description": "Busy ÷ (busy + idle) runners. Guarded against divide-by-zero when the pool is empty.", "gridPos": {"h": 4, "w": 8, "x": 16, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "100 * sum(gha_busy_runners{namespace=\"arc-systems\"}) / clamp_min(sum(gha_busy_runners{namespace=\"arc-systems\"}) + sum(gha_idle_runners{namespace=\"arc-systems\"}), 1)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 0, "min": 0, "max": 100, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 80}, {"color": "red", "value": 95}]}}, "overrides": []}
        },

        {"id": 40, "type": "row", "title": "Dependency automation (Renovate)", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 22}, "panels": []},
        {
          "id": 41, "type": "stat", "title": "Project executions (window)", "description": "Renovate operator project executions over the window — dependency-scan throughput.", "gridPos": {"h": 4, "w": 6, "x": 0, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(increase(renovate_operator_project_executions_total[$$__range])) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "value", "graphMode": "area"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "blue"}}, "overrides": []}
        },
        {
          "id": 42, "type": "stat", "title": "Run success rate", "description": "Completed ÷ all Renovate executions over the window.", "gridPos": {"h": 4, "w": 6, "x": 6, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(increase(renovate_operator_project_executions_total{status=\"completed\"}[$$__range])) / clamp_min(sum(increase(renovate_operator_project_executions_total[$$__range])), 1) * 100", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1, "min": 0, "max": 100, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 95}, {"color": "green", "value": 99}]}}, "overrides": []}
        },
        {
          "id": 43, "type": "stat", "title": "Approvals waiting", "description": "Dependency updates awaiting a human approval (work blocked on a person).", "gridPos": {"h": 4, "w": 6, "x": 12, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(renovate_operator_approvals_needed) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 5}, {"color": "red", "value": 20}]}}, "overrides": []}
        },
        {
          "id": 44, "type": "stat", "title": "Open dependency issues", "description": "Open dependency-update issues tracked by the Renovate operator.", "gridPos": {"h": 4, "w": 6, "x": 18, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(renovate_operator_dependency_issues) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 10}, {"color": "red", "value": 40}]}}, "overrides": []}
        },
        {
          "id": 45, "type": "timeseries", "title": "Renovate executions by status over time", "description": "Renovate operator project executions over time, split by status.", "gridPos": {"h": 7, "w": 24, "x": 0, "y": 27},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (status) (increase(renovate_operator_project_executions_total[$$__rate_interval]))", "legendFormat": "{{status}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "custom": {"lineWidth": 1, "fillOpacity": 20, "showPoints": "never", "stacking": {"mode": "normal", "group": "A"}}}, "overrides": []}
        }
      ]
    }
