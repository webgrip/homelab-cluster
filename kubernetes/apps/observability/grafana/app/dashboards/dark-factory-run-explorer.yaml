                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max by (job_name) (last_over_time(kube_job_status_start_time{exported_namespace=\"ploeg\",job_name=~\"ploeg-worker-bronze-[a-z0-9]{5}\"}[$$__range]))",
              "instant": true,
              "format": "table"
            },
            {
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max by (job_name) (last_over_time(kube_job_status_completion_time{exported_namespace=\"ploeg\",job_name=~\"ploeg-worker-bronze-[a-z0-9]{5}\"}[$$__range]))",
              "instant": true,
              "format": "table"
            },
            {
              "refId": "C",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max by (job_name) (last_over_time(kube_job_status_completion_time{exported_namespace=\"ploeg\",job_name=~\"ploeg-worker-bronze-[a-z0-9]{5}\"}[$$__range]) - last_over_time(kube_job_status_start_time{exported_namespace=\"ploeg\",job_name=~\"ploeg-worker-bronze-[a-z0-9]{5}\"}[$$__range]))",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "pod": true,
                  "container": true,
                  "endpoint": true,
                  "service": true,
                  "prometheus": true,
                  "cluster": true,
                  "server": true,
                  "exported_namespace": true
                },
                "renameByName": {
                  "job_name": "Job",
                  "Value #A": "Started",
                  "Value #B": "Completed",
                  "Value #C": "Duration"
                }
              }
            }
          ],
