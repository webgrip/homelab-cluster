---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: security-dependency-track
  namespace: observability
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  folderRef: security
  json: |-
    {
      "title": "Security / Dependency-Track Supply Chain",
      "uid": "dt-supply-chain-001",
      "tags": ["security", "dependency-track", "supply-chain", "sbom"],
      "schemaVersion": 38,
      "refresh": "5m",
      "time": { "from": "now-24h", "to": "now" },
      "links": [
        { "title": "Dependency Track", "url": "https://dependency-track.webgrip.dev", "type": "link", "targetBlank": true }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1, "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts", "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "id": 1, "type": "stat", "gridPos": { "x": 0, "y": 0, "w": 3, "h": 4 },
          "title": "Critical CVEs",
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] },
              "unit": "short", "noValue": "0"
            }
          },
          "targets": [{ "expr": "dt_portfolio_vulnerabilities{severity=\"critical\"}", "legendFormat": "" }]
        },
        {
          "id": 2, "type": "stat", "gridPos": { "x": 3, "y": 0, "w": 3, "h": 4 },
          "title": "High CVEs",
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1 }] },
              "unit": "short", "noValue": "0"
            }
          },
          "targets": [{ "expr": "dt_portfolio_vulnerabilities{severity=\"high\"}", "legendFormat": "" }]
        },
        {
          "id": 3, "type": "stat", "gridPos": { "x": 6, "y": 0, "w": 3, "h": 4 },
          "title": "Policy FAIL Violations",
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] },
              "unit": "short", "noValue": "0"
            }
          },
          "targets": [{ "expr": "dt_portfolio_policy_violations{state=\"fail\"}", "legendFormat": "" }]
        },
        {
          "id": 4, "type": "stat", "gridPos": { "x": 9, "y": 0, "w": 3, "h": 4 },
          "title": "Policy WARN Violations",
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }] },
              "unit": "short", "noValue": "0"
            }
          },
          "targets": [{ "expr": "dt_portfolio_policy_violations{state=\"warn\"}", "legendFormat": "" }]
        },
        {
          "id": 5, "type": "stat", "gridPos": { "x": 12, "y": 0, "w": 3, "h": 4 },
          "title": "Vulnerable Projects",
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1 }] },
              "unit": "short", "noValue": "0"
            }
          },
          "targets": [{ "expr": "dt_portfolio_projects{state=\"vulnerable\"}", "legendFormat": "" }]
        },
        {
          "id": 6, "type": "stat", "gridPos": { "x": 15, "y": 0, "w": 3, "h": 4 },
          "title": "Total Projects",
          "options": { "colorMode": "none", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }, "unit": "short", "noValue": "0" }
          },
          "targets": [{ "expr": "dt_portfolio_projects{state=\"total\"}", "legendFormat": "" }]
        },
        {
          "id": 7, "type": "stat", "gridPos": { "x": 18, "y": 0, "w": 3, "h": 4 },
          "title": "Portfolio Risk Score",
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 500 }, { "color": "orange", "value": 1000 }, { "color": "red", "value": 2000 }] },
              "unit": "short", "noValue": "0"
            }
          },
          "targets": [{ "expr": "dt_portfolio_risk_score", "legendFormat": "" }]
        },
        {
          "id": 8, "type": "stat", "gridPos": { "x": 21, "y": 0, "w": 3, "h": 4 },
          "title": "Audit Coverage",
          "options": { "colorMode": "none", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 0.1 }, { "color": "green", "value": 0.5 }] },
              "unit": "percentunit", "noValue": "0", "min": 0, "max": 1
            }
          },
          "targets": [{ "expr": "job:dt_portfolio_findings_audit_ratio:ratio", "legendFormat": "" }]
        },
        {
          "id": 9, "type": "timeseries", "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "title": "Vulnerability Trend by Severity",
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2, "fillOpacity": 10 } }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "dt_portfolio_vulnerabilities{severity=\"critical\"}", "legendFormat": "Critical" },
            { "expr": "dt_portfolio_vulnerabilities{severity=\"high\"}", "legendFormat": "High" },
            { "expr": "dt_portfolio_vulnerabilities{severity=\"medium\"}", "legendFormat": "Medium" },
            { "expr": "dt_portfolio_vulnerabilities{severity=\"low\"}", "legendFormat": "Low" }
          ]
        },
        {
          "id": 10, "type": "timeseries", "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "title": "Policy Violations Trend",
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2, "fillOpacity": 10 } }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "dt_portfolio_policy_violations{state=\"fail\"}", "legendFormat": "FAIL" },
            { "expr": "dt_portfolio_policy_violations{state=\"warn\"}", "legendFormat": "WARN" },
            { "expr": "dt_portfolio_policy_violations{state=\"info\"}", "legendFormat": "INFO" }
          ]
        },
        {
          "id": 11, "type": "piechart", "gridPos": { "x": 0, "y": 12, "w": 8, "h": 7 },
          "title": "Policy Violations by Category",
          "options": { "pieType": "pie", "legend": { "displayMode": "list", "placement": "right" } },
          "targets": [
            { "expr": "dt_portfolio_policy_violations_by_category{category=\"security\",state=\"total\"}", "legendFormat": "Security" },
            { "expr": "dt_portfolio_policy_violations_by_category{category=\"license\",state=\"total\"}", "legendFormat": "License" },
            { "expr": "dt_portfolio_policy_violations_by_category{category=\"operational\",state=\"total\"}", "legendFormat": "Operational" }
          ]
        },
        {
          "id": 12, "type": "bargauge", "gridPos": { "x": 8, "y": 12, "w": 8, "h": 7 },
          "title": "Components: Vulnerable vs Suppressed",
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "horizontal", "displayMode": "gradient" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }, "unit": "short" }
          },
          "targets": [
            { "expr": "dt_portfolio_components{state=\"total\"}", "legendFormat": "Total" },
            { "expr": "dt_portfolio_components{state=\"vulnerable\"}", "legendFormat": "Vulnerable" },
            { "expr": "dt_portfolio_components{state=\"suppressed\"}", "legendFormat": "Suppressed" }
          ]
        },
        {
          "id": 13, "type": "timeseries", "gridPos": { "x": 16, "y": 12, "w": 8, "h": 7 },
          "title": "Findings Audit Coverage Over Time",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 0.5 }] }
            }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single" } },
          "targets": [{ "expr": "job:dt_portfolio_findings_audit_ratio:ratio", "legendFormat": "Audit Ratio" }]
        },
        {
          "id": 14, "type": "text", "gridPos": { "x": 0, "y": 19, "w": 24, "h": 3 },
          "title": "",
          "options": {
            "mode": "markdown",
            "content": "## Pipeline\n**SBOM source:** Trivy scans all cluster images daily (02:00 UTC) → CycloneDX SBOMs uploaded to Dependency-Track → Policy engine evaluates 10 policies → Violations reported here.\n\n**Discord alerts:** New critical CVEs, policy FAIL violations, BOM processing failures, new vulnerable dependencies.\n\n**Links:** [Projects](https://dependency-track.webgrip.dev/projects) · [Dashboard](https://dependency-track.webgrip.dev/dashboard) · [Policies](https://dependency-track.webgrip.dev/policy)"
          }
        }
      ]
    }
