---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: claude-code-cache-economics
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: claude-code
  json: |-
    {
      "schemaVersion": 39,
      "title": "Claude Code / Cache Economics",
      "uid": "claude-code-cache-economics",
      "timezone": "browser",
      "tags": ["claude-code", "ai", "anthropic", "cache", "cost"],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {"from": "now-7d", "to": "now"},
      "links": [
        {"title": "Command Center", "url": "/d/claude-code-command-center", "type": "link", "icon": "external link"},
        {"title": "Cost & Tokens", "url": "/d/claude-code-cost-tokens", "type": "link", "icon": "dollar"},
        {"title": "Activity & Tools", "url": "/d/claude-code-activity-tools", "type": "link", "icon": "bolt"},
        {"title": "Events, Logs & Traces", "url": "/d/claude-code-events-traces", "type": "link", "icon": "doc"},
        {"title": "Provider Comparison", "url": "/d/claude-code-provider-comparison", "type": "link", "icon": "percentage"}
      ],
      "annotations": {
        "list": [
          {"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}
        ]
      },
      "templating": {
        "list": [
          {"name": "model", "label": "Model", "type": "query", "datasource": {"type": "prometheus", "uid": "prometheus"}, "query": "label_values(claude_code_token_usage_tokens_total, model)", "refresh": 2, "sort": 1, "multi": true, "includeAll": true, "allValue": ".*", "current": {"selected": true, "text": ["All"], "value": ["$$__all"]}}
        ]
      },
      "panels": [
        {
          "id": 1, "type": "text", "title": "", "gridPos": {"h": 5, "w": 24, "x": 0, "y": 0},
          "options": {"mode": "markdown", "content": "## Cache Economics\nThis Claude Code workload is **~99% cache reads** — most tokens billed at the cheap cacheRead rate (0.1x input). Every **cost** figure here is an **API-equivalent ESTIMATE** at **Opus 4.8 list rates** (USD per 1M tokens: input 5, output 25, cacheRead 0.50, cacheCreation 6.25), **not real spend** on a flat subscription. Cache savings = cacheRead tokens priced at (input - cacheRead) = 4.5/1M USD avoided vs paying full input rate."}
        },
        {"id": 2, "type": "row", "title": "Cache efficiency", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5}, "panels": []},
        {
          "id": 3, "type": "stat", "title": "Cache-hit ratio", "description": "cacheRead tokens / (input + cacheRead) tokens over the selected range. High = most context is served from cache instead of being re-read at full input price.", "gridPos": {"h": 6, "w": 6, "x": 0, "y": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "instant": true, "expr": "sum(increase(claude_code_token_usage_tokens_total{type=\"cacheRead\", model=~\"$$model\"}[$$__range])) / clamp_min(sum(increase(claude_code_token_usage_tokens_total{type=~\"input|cacheRead\", model=~\"$$model\"}[$$__range])), 1)"}
          ],
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "decimals": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 0.5}, {"color": "green", "value": 0.8}]}}, "overrides": []}
        },
        {
          "id": 4, "type": "stat", "title": "Cache savings (API-equiv)", "description": "cacheRead tokens priced at the per-token saving vs full input rate (input 5 - cacheRead 0.50 = 4.5 per 1M = 0.0000045 USD/token). API-equivalent estimate, not real spend.", "gridPos": {"h": 6, "w": 6, "x": 6, "y": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "instant": true, "expr": "(sum(increase(claude_code_token_usage_tokens_total{type=\"cacheRead\", model=~\"$$model\"}[$$__range])) or vector(0)) * 0.0000045"}
          ],
          "options": {"colorMode": "value", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "fixed", "fixedColor": "green"}}, "overrides": []}
        },
        {
          "id": 5, "type": "stat", "title": "Cache-write cost (API-equiv)", "description": "cacheCreation tokens priced at the Opus 4.8 cache-write rate (6.25 per 1M = 0.00000625 USD/token). The one-time price of putting context into the cache. API-equivalent estimate.", "gridPos": {"h": 6, "w": 6, "x": 12, "y": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "instant": true, "expr": "(sum(increase(claude_code_token_usage_tokens_total{type=\"cacheCreation\", model=~\"$$model\"}[$$__range])) or vector(0)) * 0.00000625"}
          ],
          "options": {"colorMode": "value", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "fixed", "fixedColor": "orange"}}, "overrides": []}
        },
        {
          "id": 6, "type": "stat", "title": "Effective blended cost / 1M tokens", "description": "Total API-equivalent cost (cache-aware Opus 4.8 formula) divided by total tokens, scaled to 1M tokens. Shows how cheap each token is on average thanks to caching.", "gridPos": {"h": 6, "w": 6, "x": 18, "y": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "instant": true, "expr": "(sum(increase(claude_code_token_usage_tokens_total{type=\"input\", model=~\"$$model\"}[$$__range]))*5 + sum(increase(claude_code_token_usage_tokens_total{type=\"output\", model=~\"$$model\"}[$$__range]))*25 + sum(increase(claude_code_token_usage_tokens_total{type=\"cacheRead\", model=~\"$$model\"}[$$__range]))*0.5 + sum(increase(claude_code_token_usage_tokens_total{type=\"cacheCreation\", model=~\"$$model\"}[$$__range]))*6.25) / clamp_min(sum(increase(claude_code_token_usage_tokens_total{model=~\"$$model\"}[$$__range])), 1)"}
          ],
          "options": {"colorMode": "value", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 3, "color": {"mode": "fixed", "fixedColor": "blue"}}, "overrides": []}
        },
        {"id": 7, "type": "row", "title": "Cache-hit ratio & token mix over time", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 12}, "panels": []},
        {
          "id": 8, "type": "timeseries", "title": "Cache-hit ratio over time", "description": "cacheRead / (input + cacheRead) per scrape window. Stays high when sessions reuse cached context.", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 13},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum(increase(claude_code_token_usage_tokens_total{type=\"cacheRead\", model=~\"$$model\"}[$$__rate_interval])) / clamp_min(sum(increase(claude_code_token_usage_tokens_total{type=~\"input|cacheRead\", model=~\"$$model\"}[$$__rate_interval])), 1)", "legendFormat": "cache-hit ratio"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single", "sort": "none"}},
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1, "decimals": 2, "custom": {"lineWidth": 2, "fillOpacity": 15, "showPoints": "never", "spanNulls": true}, "color": {"mode": "fixed", "fixedColor": "green"}}, "overrides": []}
        },
        {
          "id": 9, "type": "timeseries", "title": "Token mix by type (stacked)", "description": "Tokens per scrape window, stacked by type. Dominated by cacheRead for this workload.", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 13},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum by (type) (increase(claude_code_token_usage_tokens_total{model=~\"$$model\"}[$$__rate_interval]))", "legendFormat": "{{type}}"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 1, "fillOpacity": 40, "showPoints": "never", "stacking": {"mode": "normal", "group": "A"}, "spanNulls": true}}, "overrides": []}
        },
        {
          "id": 10, "type": "timeseries", "title": "Cache-read vs cache-creation tokens", "description": "cacheRead (served from cache) vs cacheCreation (written into cache) tokens per window. Reads should dwarf writes.", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 21},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum(increase(claude_code_token_usage_tokens_total{type=\"cacheRead\", model=~\"$$model\"}[$$__rate_interval]))", "legendFormat": "cacheRead"},
            {"refId": "B", "expr": "sum(increase(claude_code_token_usage_tokens_total{type=\"cacheCreation\", model=~\"$$model\"}[$$__rate_interval]))", "legendFormat": "cacheCreation"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never", "spanNulls": true}}, "overrides": [{"matcher": {"id": "byName", "options": "cacheRead"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]}, {"matcher": {"id": "byName", "options": "cacheCreation"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "orange"}}]}]}
        },
        {
          "id": 11, "type": "timeseries", "title": "What you'd pay WITHOUT cache vs WITH cache (API-equiv, over time)", "description": "WITH = cache-aware Opus 4.8 pricing (cacheRead at 0.5/1M). WITHOUT = every non-output token billed at full input rate (5/1M). The gap is what caching saves. API-equivalent estimate, not real spend.", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 21},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "(sum(increase(claude_code_token_usage_tokens_total{type=\"input\", model=~\"$$model\"}[$$__rate_interval]))*5 + sum(increase(claude_code_token_usage_tokens_total{type=\"output\", model=~\"$$model\"}[$$__rate_interval]))*25 + sum(increase(claude_code_token_usage_tokens_total{type=\"cacheRead\", model=~\"$$model\"}[$$__rate_interval]))*0.5 + sum(increase(claude_code_token_usage_tokens_total{type=\"cacheCreation\", model=~\"$$model\"}[$$__rate_interval]))*6.25) / 1e6", "legendFormat": "WITH cache"},
            {"refId": "B", "expr": "(sum(increase(claude_code_token_usage_tokens_total{type=~\"input|cacheRead|cacheCreation\", model=~\"$$model\"}[$$__rate_interval]))*5 + sum(increase(claude_code_token_usage_tokens_total{type=\"output\", model=~\"$$model\"}[$$__rate_interval]))*25) / 1e6", "legendFormat": "WITHOUT cache"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 4, "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never", "spanNulls": true}}, "overrides": [{"matcher": {"id": "byName", "options": "WITH cache"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]}, {"matcher": {"id": "byName", "options": "WITHOUT cache"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]}]}
        },
        {"id": 12, "type": "row", "title": "Breakdowns", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 29}, "panels": []},
        {
          "id": 13, "type": "bargauge", "title": "Cache-hit ratio by model", "description": "cacheRead / (input + cacheRead) per model over the selected range.", "gridPos": {"h": 9, "w": 12, "x": 0, "y": 30},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "instant": true, "expr": "sum by (model) (increase(claude_code_token_usage_tokens_total{type=\"cacheRead\", model=~\"$$model\"}[$$__range])) / sum by (model) (increase(claude_code_token_usage_tokens_total{type=~\"input|cacheRead\", model=~\"$$model\"}[$$__range]))", "legendFormat": "{{model}}"}
          ],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1, "decimals": 1, "color": {"mode": "continuous-RdYlGr"}}, "overrides": []}
        },
        {
          "id": 14, "type": "bargauge", "title": "Cache-read tokens by query_source", "description": "Top sources of cacheRead tokens over the selected range (main session, subagents, etc.).", "gridPos": {"h": 9, "w": 12, "x": 12, "y": 30},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "instant": true, "expr": "topk(10, sum by (query_source) (increase(claude_code_token_usage_tokens_total{type=\"cacheRead\", model=~\"$$model\"}[$$__range])))", "legendFormat": "{{query_source}}"}
          ],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "continuous-GrYlRd"}}, "overrides": []}
        }
      ]
    }
