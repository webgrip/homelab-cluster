---
# Dark Factory — Command Center: fleet hero view of the autonomous agent pipeline.
# "Is the factory healthy right now, what did it produce, what did it cost."
# Sources: ploeg-db (authoritative agent_runs/checkpoints SQL), the ploeg_* exporter
# gauges, the LiteLLM ledger (litellm_*), KEDA scaler metrics, span metrics, and
# ploegd logs. Spend→ticket/team/outcome attribution uses the verified graft:
# litellm_run_spend joined to ploeg_run_started_epoch's labels on key_alias
# (litellm team_id is "none" for ploeg — never show it).
# NOTE: kube_* (kube-state-metrics) queries filter on exported_namespace="ploeg"
# because our KSM scrape wraps the real namespace label; cAdvisor container_* and
# log streams use the real namespace="ploeg".
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: dark-factory-command-center
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: ai
  json: |-
    {
      "schemaVersion": 39,
      "title": "Dark Factory — Command Center",
      "uid": "dark-factory-command-center",
      "timezone": "browser",
      "tags": [
        "dark-factory",
        "ai",
        "agents",
        "overview"
      ],
      "editable": false,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "links": [
        {
          "type": "dashboards",
          "title": "Dark Factory",
          "tags": [
            "dark-factory"
          ],
          "asDropdown": true,
          "includeVars": false,
          "keepTime": true
        },
        {
          "type": "link",
          "title": "LiteLLM Spend & Budgets",
          "url": "/d/litellm-spend",
          "icon": "dollar"
        },
        {
          "type": "link",
          "title": "LiteLLM Reliability",
          "url": "/d/litellm-reliability",
          "icon": "bolt"
        },
        {
          "type": "link",
          "title": "Forgejo CI Command Center",
          "url": "/d/infra-forgejo-ci",
          "icon": "external link"
        },
        {
          "type": "link",
          "title": "Claude Code Command Center",
          "url": "/d/claude-code-command-center",
          "icon": "external link"
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Factory at a glance",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Runs (range)",
          "description": "Agent runs started in the dashboard range, counted from the authoritative ploeg-db agent_runs table.",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 0,
            "y": 1
          },
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ploeg-db"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ploeg-db"
              },
              "rawQuery": true,
              "format": "table",
              "rawSql": "SELECT count(*) AS runs FROM agent_runs WHERE $$__timeFilter(started_at)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "PR success rate",
          "description": "Share of finished agent runs that opened a PR — pr_opened / (pr_opened + failed) from ploeg_agent_runs_count; running runs excluded.",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 3,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "(100 * sum(ploeg_agent_runs_count{outcome=\"pr_opened\"}) / sum(ploeg_agent_runs_count{outcome=~\"pr_opened|failed\"})) or vector(0)",
              "instant": false,
              "legendFormat": "PR success"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 0,
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 40
                  },
                  {
                    "color": "green",
                    "value": 75
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "PRs opened (30d)",
          "description": "Agent runs that ended in an opened PR, from the ploeg exporter's agent-runs gauge.",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 6,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(ploeg_agent_runs_count{outcome=\"pr_opened\"}) or vector(0)",
              "instant": false,
              "legendFormat": "PRs opened"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Agent LLM spend (range)",
          "description": "Total LLM spend of every ploeg run key alive at any point in the range (litellm_key_spend ledger).",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 9,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(max_over_time(litellm_key_spend{key_alias=~\"ploeg-.*\"}[$$__range])) or vector(0)",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 5
                  },
                  {
                    "color": "red",
                    "value": 15
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Tickets touched (range)",
          "description": "Distinct Vikunja tickets with at least one agent run in range (ticket label on ploeg_run_started_epoch).",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 12,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "count(count by (ticket) (last_over_time(ploeg_run_started_epoch{ticket!=\"none\"}[$$__range]))) or vector(0)",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Oldest queued age",
          "description": "Age of the oldest work item still queued (ploeg_work_items_oldest_age_seconds); sustained growth means the factory is not draining.",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 15,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max(ploeg_work_items_oldest_age_seconds{state=\"queued\"}) or vector(0)",
              "instant": false,
              "legendFormat": "oldest queued"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 300
                  },
                  {
                    "color": "red",
                    "value": 900
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Blocked agent keys (now)",
          "description": "Run keys LiteLLM is currently refusing (litellm_key_blocked) — usually budget exhaustion.",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 18,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(litellm_key_blocked{key_alias=~\"ploeg-.*\"}) or vector(0)",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 9,
          "type": "stat",
          "title": "LLM failed requests (range)",
          "description": "Failed LLM requests across all models in range (litellm_model_failed).",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 21,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(increase(litellm_model_failed[$$__range])) or vector(0)",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 10,
          "type": "row",
          "title": "Pipeline heartbeat",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "panels": []
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Agent queue depth",
          "description": "KEDA scaler value for the ploeg-worker-bronze ScaledObject (queued work items) next to pods actually Running (KSM, exported_namespace wrap); the bronze pool caps at 1 runner.",
          "gridPos": {
            "h": 8,
            "w": 7,
            "x": 0,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max(keda_scaler_metrics_value{scaledObject=\"ploeg-worker-bronze\"})",
              "legendFormat": "queued work items"
            },
            {
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(kube_pod_status_phase{exported_namespace=\"ploeg\",pod=~\"ploeg-worker-bronze-[a-z0-9]{5}-[a-z0-9]{5}\",phase=\"Running\"})",
              "legendFormat": "runners running"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "stepAfter",
                "lineWidth": 2,
                "fillOpacity": 12,
                "showPoints": "never",
                "spanNulls": false
              }
            },
            "overrides": []
          }
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "LLM request rate",
          "description": "LiteLLM request throughput per minute, from span metrics (traces_spanmetrics_calls_total).",
          "gridPos": {
            "h": 8,
            "w": 7,
            "x": 7,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(rate(traces_spanmetrics_calls_total{service_name=\"litellm\"}[$$__rate_interval])) * 60",
              "legendFormat": "LLM req/min"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 12,
                "showPoints": "never",
                "spanNulls": false
              }
            },
            "overrides": []
          }
        },
        {
          "id": 13,
          "type": "bargauge",
          "title": "Factory funnel (30d)",
          "description": "Pipeline conversion — work-item intake (all states) vs runs that reached the branch_created and pr_opened checkpoints (ploeg_work_items_count / ploeg_checkpoints_count gauges).",
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 14,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(ploeg_work_items_count) or vector(0)",
              "instant": true,
              "legendFormat": "Work items (intake)"
            },
            {
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(ploeg_checkpoints_count{phase=\"branch_created\"}) or vector(0)",
              "instant": true,
              "legendFormat": "Branch created"
            },
            {
              "refId": "C",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(ploeg_checkpoints_count{phase=\"pr_opened\"}) or vector(0)",
              "instant": true,
              "legendFormat": "PR opened"
            }
          ],
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true,
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "continuous-BlPu"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 14,
          "type": "stat",
          "title": "CI pool queue",
          "description": "KEDA scaler value for the forgejo-runner ScaledObject — the regular CI pool, not the agent pool.",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 20,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "links": [
            {
              "title": "Forgejo CI Command Center",
              "url": "/d/infra-forgejo-ci"
            }
          ],
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max(keda_scaler_metrics_value{scaledObject=\"forgejo-runner\"}) or vector(0)",
              "instant": false,
              "legendFormat": "CI pool"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 2
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 15,
          "type": "stat",
          "title": "LiteLLM exporter",
          "description": "postgres-exporter feeding the litellm_* ledger metrics; DOWN means every spend panel here goes stale.",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 20,
            "y": 10
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max(pg_up{namespace=\"ai\"}) or vector(0)",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": {
                      "text": "UP",
                      "color": "green"
                    },
                    "0": {
                      "text": "DOWN",
                      "color": "red"
                    }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Agent runs per hour",
          "description": "Runs started per hour, stacked by outcome, from the authoritative ploeg-db agent_runs table (empty outcome = still running).",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ploeg-db"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ploeg-db"
              },
              "rawQuery": true,
              "format": "time_series",
