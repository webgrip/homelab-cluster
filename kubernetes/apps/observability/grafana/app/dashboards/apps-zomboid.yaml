---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: apps-zomboid
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: apps
  json: |-
    {
      "schemaVersion": 39,
      "title": "Zomboid / Game Server Health",
      "uid": "apps-zomboid",
      "timezone": "browser",
      "tags": [
        "apps",
        "zomboid"
      ],
      "editable": false,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Health overview",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "stat",
          "title": "Pods Running",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{namespace=\"zomboid\",phase=\"Running\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 2,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 0,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Pods Not Running",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{namespace=\"zomboid\",phase=~\"Pending|Failed|Unknown\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 3,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 3,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Restarts (1h)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"zomboid\"}[1h])) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 4,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 6,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "OOM kills (24h)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(container_oom_events_total{namespace=\"zomboid\"}[24h])) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 5,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 9,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Waiting containers",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_status_waiting{namespace=\"zomboid\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 6,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 12,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "CPU (cores)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"zomboid\",image!=\"\"}[$$__rate_interval])) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "cores"
            },
            "overrides": []
          },
          "id": 7,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 15,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Memory",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(container_memory_working_set_bytes{namespace=\"zomboid\",image!=\"\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "unit": "bytes"
            },
            "overrides": []
          },
          "id": 8,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 18,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Max PVC used",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max((kubelet_volume_stats_used_bytes{namespace=\"zomboid\"} / kubelet_volume_stats_capacity_bytes{namespace=\"zomboid\"}) * 100) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 75
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 9,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 21,
            "y": 1
          }
        },
        {
          "id": 10,
          "type": "row",
          "title": "Zomboid \u2014 game server",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          }
        },
        {
          "type": "stat",
          "title": "A2S up",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max(a2s_server_up{namespace=\"zomboid\"}) or max(a2s_up{namespace=\"zomboid\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "Down",
                      "color": "red"
                    },
                    "1": {
                      "text": "Up",
                      "color": "green"
                    }
                  }
                }
              ]
            },
            "overrides": []
          },
          "id": 11,
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 6
          }
        },
        {
          "type": "stat",
          "title": "Players",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max(a2s_server_players{namespace=\"zomboid\"}) or max(a2s_players{namespace=\"zomboid\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0
            },
            "overrides": []
          },
          "id": 12,
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 6
          }
        },
        {
          "type": "stat",
          "title": "Max players",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max(a2s_server_max_players{namespace=\"zomboid\"}) or max(a2s_max_players{namespace=\"zomboid\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0
            },
            "overrides": []
          },
          "id": 13,
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 6
          }
        },
        {
          "type": "stat",
          "title": "Bots",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max(a2s_server_bots{namespace=\"zomboid\"}) or max(a2s_bots{namespace=\"zomboid\"}) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0
            },
            "overrides": []
          },
          "id": 14,
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 6
          }
        },
        {
          "type": "timeseries",
          "title": "Players over time",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max(a2s_server_players{namespace=\"zomboid\"}) or max(a2s_players{namespace=\"zomboid\"})",
              "legendFormat": "players"
            },
            {
              "refId": "B",
              "expr": "max(a2s_server_max_players{namespace=\"zomboid\"}) or max(a2s_max_players{namespace=\"zomboid\"})",
              "legendFormat": "max"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "description": "Sourced from the A2S exporter. No data while the server is scaled down.",
          "id": 15,
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 10
          }
        },
        {
          "id": 16,
          "type": "row",
          "title": "Workload & pods",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 18
          }
        },
        {
          "type": "timeseries",
          "title": "Pod phase over time",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (phase) (kube_pod_status_phase{namespace=\"zomboid\"})",
              "legendFormat": "{{phase}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "custom": {
                "fillOpacity": 30,
                "showPoints": "never",
                "lineWidth": 1,
                "stacking": {
                  "mode": "normal"
                }
              }
            },
            "overrides": []
          },
          "id": 17,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 19
          }
        },
        {
          "type": "timeseries",
          "title": "Pod restarts (top 10, 30m)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(10, sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"zomboid\"}[30m])))",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "id": 18,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 19
          }
        },
        {
          "type": "timeseries",
          "title": "Container waiting reasons",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (reason) (kube_pod_container_status_waiting_reason{namespace=\"zomboid\"})",
              "legendFormat": "{{reason}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "description": "CrashLoopBackOff, ImagePullBackOff, etc. Empty when all containers are running.",
          "id": 19,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 27
          }
        },
        {
          "type": "timeseries",
          "title": "Replicas: desired vs ready",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_deployment_spec_replicas{namespace=\"zomboid\"})",
              "legendFormat": "deploy desired"
            },
            {
              "refId": "B",
              "expr": "sum(kube_deployment_status_replicas_available{namespace=\"zomboid\"})",
              "legendFormat": "deploy ready"
            },
            {
              "refId": "C",
              "expr": "sum(kube_statefulset_replicas{namespace=\"zomboid\"})",
              "legendFormat": "sts desired"
            },
            {
              "refId": "D",
              "expr": "sum(kube_statefulset_status_replicas_ready{namespace=\"zomboid\"})",
              "legendFormat": "sts ready"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "id": 20,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 27
          }
        },
        {
          "id": 21,
          "type": "row",
          "title": "CPU",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 35
          }
        },
        {
          "type": "timeseries",
          "title": "CPU \u2014 usage vs requests vs limits",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"zomboid\",image!=\"\"}[$$__rate_interval]))",
              "legendFormat": "usage"
            },
            {
              "refId": "B",
              "expr": "sum(kube_pod_container_resource_requests{namespace=\"zomboid\",resource=\"cpu\"})",
              "legendFormat": "requests"
            },
            {
              "refId": "C",
              "expr": "sum(kube_pod_container_resource_limits{namespace=\"zomboid\",resource=\"cpu\"})",
              "legendFormat": "limits"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "last",
                "max"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "decimals": 3,
              "custom": {
                "fillOpacity": 8,
                "showPoints": "never",
                "lineWidth": 1
              }
            },
            "overrides": []
