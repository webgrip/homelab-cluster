---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: dark-factory-spend-attribution
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: ai
  # Dark Factory spend attribution: who/what is burning inference money — by
  # ticket, run, team, model and provider. Exact numbers from SQL, trends from
  # PromQL; does not repeat /d/litellm-spend panels (live budget gauges and
  # per-key/per-user budget tables live there).
  json: |-
    {
      "schemaVersion": 39,
      "title": "Dark Factory — Spend & Attribution",
      "uid": "dark-factory-spend-attribution",
      "timezone": "browser",
      "tags": [
        "dark-factory",
        "ai",
        "finops",
        "litellm"
      ],
      "editable": false,
      "graphTooltip": 1,
      "refresh": "1m",
      "time": {
        "from": "now-7d",
        "to": "now"
      },
      "templating": {
        "list": []
      },
      "annotations": {
        "list": []
      },
      "links": [
        {
          "type": "dashboards",
          "title": "Dark Factory",
          "tags": [
            "dark-factory"
          ],
          "asDropdown": true,
          "includeVars": false,
          "keepTime": true
        },
        {
          "type": "link",
          "title": "LiteLLM Spend & Budgets",
          "url": "/d/litellm-spend",
          "icon": "dollar"
        },
        {
          "type": "link",
          "title": "LiteLLM Reliability",
          "url": "/d/litellm-reliability",
          "icon": "bolt"
        },
        {
          "type": "link",
          "title": "Forgejo CI Command Center",
          "url": "/d/infra-forgejo-ci",
          "icon": "external link"
        },
        {
          "type": "link",
          "title": "Claude Code Command Center",
          "url": "/d/claude-code-command-center",
          "icon": "external link"
        }
      ],
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Range totals",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Agent spend (range)",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "color": {
                "mode": "fixed",
                "fixedColor": "text"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(max_over_time(litellm_key_spend{key_alias=~\"ploeg-.*\"}[$$__range])) or vector(0)",
              "instant": true
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "All-key spend delta (range)",
          "description": "approximation — exact number in the SQL panel",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "color": {
                "mode": "fixed",
                "fixedColor": "text"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(max_over_time(litellm_key_spend[$$__range]) - min_over_time(litellm_key_spend[$$__range])) or vector(0)",
              "instant": true
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Spend (SQL, exact)",
          "description": "Exact spend from the LiteLLM spend ledger; requires litellm-db datasource.",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 1
          },
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "litellm-db"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "color": {
                "mode": "fixed",
                "fixedColor": "text"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "litellm-db"
              },
              "rawQuery": true,
              "format": "table",
              "rawSql": "SELECT coalesce(sum(spend),0) FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\")"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Requests (SQL)",
          "description": "Request count from the spend ledger; requires litellm-db datasource.",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 1
          },
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "litellm-db"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "fixed",
                "fixedColor": "text"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "litellm-db"
              },
              "rawQuery": true,
              "format": "table",
              "rawSql": "SELECT count(*) FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\")"
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Avg cost per run",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "color": {
                "mode": "fixed",
                "fixedColor": "text"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "(sum(max_over_time(litellm_key_spend{key_alias=~\"ploeg-.*\"}[$$__range])) / count(max_over_time(litellm_key_spend{key_alias=~\"ploeg-.*\"}[$$__range]))) or vector(0)",
              "instant": true
            }
          ]
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Live keys over 80 pct budget",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 20,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "count(100 * litellm_key_spend / litellm_key_max_budget > 80) or vector(0)",
              "instant": true
            }
          ]
        },
        {
          "id": 8,
          "type": "row",
          "title": "By run (ticket-grained view on the Dispatch Plane dashboard)",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          }
        },
        {
          "id": 9,
          "type": "table",
          "title": "Ticket leaderboard (SQL)",
          "description": "Spend rolled up to the Vikunja ticket behind each agent run key; requires litellm-db datasource.",
          "gridPos": {
            "h": 10,
            "w": 14,
            "x": 0,
            "y": 6
          },
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "litellm-db"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "spend"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "currencyUSD"
                  },
                  {
                    "id": "decimals",
                    "value": 2
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "last_activity"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "dateTimeAsIso"
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "spend",
                "desc": true
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "litellm-db"
              },
              "rawQuery": true,
              "format": "table",
              "rawSql": "SELECT metadata->>'user_api_key_alias' AS run, count(*) AS requests, sum(total_tokens) AS tokens, sum(spend) AS spend, max(\"startTime\") AS last_activity FROM \"LiteLLM_SpendLogs\" WHERE metadata->>'user_api_key_alias' ~ '^ploeg-' AND $$__timeFilter(\"startTime\") GROUP BY 1 ORDER BY spend DESC"
            }
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Spend per day per run",
          "description": "Daily spend stacked per ploeg run key; requires litellm-db datasource. Ticket-grained spend lives on the Dispatch Plane dashboard (ploeg_run ticket graft).",
          "gridPos": {
            "h": 10,
            "w": 10,
            "x": 14,
            "y": 6
          },
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "litellm-db"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 80,
                "showPoints": "never",
                "stacking": {
                  "mode": "normal",
                  "group": "A"
                }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "sum"
              ]
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "litellm-db"
              },
              "rawQuery": true,
              "format": "time_series",
              "rawSql": "SELECT $$__timeGroup(\"startTime\",'1d') AS time, metadata->>'user_api_key_alias' AS metric, sum(spend) AS spend FROM \"LiteLLM_SpendLogs\" WHERE metadata->>'user_api_key_alias' ~ '^ploeg-' AND $$__timeFilter(\"startTime\") GROUP BY 1,2 ORDER BY 1"
            }
          ]
        },
        {
          "id": 11,
          "type": "row",
          "title": "By run",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 16
          }
        },
        {
          "id": 12,
          "type": "table",
          "title": "Run leaderboard (range)",
          "description": "Peak spend vs budget per agent run key over the dashboard range. Click a run to open it in the Run Explorer.",
          "gridPos": {
            "h": 11,
            "w": 24,
            "x": 0,
            "y": 17
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Spend"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "currencyUSD"
                  },
                  {
                    "id": "decimals",
                    "value": 2
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Budget"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "currencyUSD"
                  },
                  {
                    "id": "decimals",
                    "value": 2
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Burn %"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "percent"
                  },
                  {
                    "id": "decimals",
                    "value": 0
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "green",
                          "value": null
                        },
                        {
                          "color": "yellow",
                          "value": 70
                        },
                        {
                          "color": "red",
                          "value": 90
                        }
                      ]
                    }
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Blocked"
                },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "0": {
                            "text": "—",
                            "color": "green"
                          },
                          "1": {
                            "text": "BLOCKED",
                            "color": "red"
                          }
                        }
                      }
                    ]
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Run"
                },
                "properties": [
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "Open in Run Explorer",
                        "url": "/d/dark-factory-run-explorer?var-run=$${__data.fields[\"Run\"]}&from=$${__from}&to=$${__to}"
                      }
                    ]
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Spend",
                "desc": true
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max by (key_alias, team_id) (max_over_time(litellm_key_spend{key_alias=~\"ploeg-.*\"}[$$__range]))",
              "instant": true,
              "format": "table"
            },
            {
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max by (key_alias, team_id) (max_over_time(litellm_key_max_budget{key_alias=~\"ploeg-.*\"}[$$__range]))",
              "instant": true,
              "format": "table"
            },
            {
              "refId": "C",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max by (key_alias, team_id) (max_over_time(litellm_key_blocked{key_alias=~\"ploeg-.*\"}[$$__range]))",
              "instant": true,
              "format": "table"
            },
            {
              "refId": "D",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "100 * sum by (key_alias,team_id) (max_over_time(litellm_key_spend{key_alias=~\"ploeg-.*\"}[$$__range])) / sum by (key_alias,team_id) (max_over_time(litellm_key_max_budget{key_alias=~\"ploeg-.*\"}[$$__range]))",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "pod": true,
                  "container": true,
                  "endpoint": true,
                  "service": true,
                  "prometheus": true,
                  "cluster": true,
                  "server": true
                },
                "renameByName": {
                  "key_alias": "Run",
                  "team_id": "Team",
                  "Value #A": "Spend",
                  "Value #B": "Budget",
                  "Value #C": "Blocked",
                  "Value #D": "Burn %"
                }
              }
            }
          ]
        },
        {
          "id": 13,
          "type": "row",
          "title": "By team & role bots",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 28
          }
        },
        {
          "id": 14,
          "type": "table",
          "title": "Team budgets",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 29
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Spend"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "currencyUSD"
                  },
                  {
                    "id": "decimals",
                    "value": 2
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Budget"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "currencyUSD"
                  },
                  {
                    "id": "decimals",
                    "value": 2
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Blocked"
                },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "0": {
                            "text": "—",
                            "color": "green"
                          },
                          "1": {
                            "text": "BLOCKED",
                            "color": "red"
                          }
                        }
                      }
                    ]
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background"
                    }
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Spend",
                "desc": true
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max by (team_alias) (litellm_team_spend)",
              "instant": true,
              "format": "table"
            },
            {
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max by (team_alias) (litellm_team_max_budget)",
              "instant": true,
              "format": "table"
            },
            {
              "refId": "C",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max by (team_alias) (litellm_team_blocked)",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "pod": true,
                  "container": true,
                  "endpoint": true,
                  "service": true,
                  "prometheus": true,
                  "cluster": true,
                  "server": true,
                  "team_id": true
                },
                "renameByName": {
                  "team_alias": "Team",
                  "Value #A": "Spend",
                  "Value #B": "Budget",
                  "Value #C": "Blocked"
                }
              }
            }
          ]
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "Agent run spend over time (live keys)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 29
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
