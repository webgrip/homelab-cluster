---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: dark-factory-spend-attribution
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: ai
  # Dark Factory spend attribution: every LLM cent attributed — per run, per
  # ticket, per team, per model/provider — with budget and provider-cap
  # guardrails. Exact numbers from the litellm-db spend ledger, trends from
  # PromQL, ticket/team/outcome attribution via the ploeg_run graft. Does not
  # repeat /d/litellm-spend panels (live budget gauges and per-key/per-user
  # budget tables live there).
  json: |-
    {
      "schemaVersion": 39,
      "title": "Dark Factory — Spend & Attribution",
      "uid": "dark-factory-spend-attribution",
      "timezone": "browser",
      "tags": [
        "dark-factory",
        "ai",
        "finops",
        "litellm"
      ],
      "editable": false,
      "graphTooltip": 1,
      "refresh": "1m",
      "time": {
        "from": "now-7d",
        "to": "now"
      },
      "templating": {
        "list": []
      },
      "annotations": {
        "list": []
      },
      "links": [
        {
          "type": "dashboards",
          "title": "Dark Factory",
          "tags": [
            "dark-factory"
          ],
          "asDropdown": true,
          "includeVars": false,
          "keepTime": true
        },
        {
          "type": "link",
          "title": "LiteLLM Spend & Budgets",
          "url": "/d/litellm-spend",
          "icon": "dollar"
        },
        {
          "type": "link",
          "title": "LiteLLM Reliability",
          "url": "/d/litellm-reliability",
          "icon": "bolt"
        },
        {
          "type": "link",
          "title": "Forgejo CI Command Center",
          "url": "/d/infra-forgejo-ci",
          "icon": "external link"
        },
        {
          "type": "link",
          "title": "Claude Code Command Center",
          "url": "/d/claude-code-command-center",
          "icon": "external link"
        }
      ],
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "At a glance",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Agent spend (range)",
          "description": "Sum of per-run key spend gauges (litellm_key_spend, live keys only) peaked over the range; exact ledger number is the SQL tile.",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 0,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(max_over_time(litellm_key_spend{key_alias=~\"ploeg-.*\"}[$$__range])) or vector(0)",
              "instant": true
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Spend (SQL, exact)",
          "description": "Exact all-key spend over the range from the LiteLLM spend ledger (litellm-db LiteLLM_SpendLogs).",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 3,
            "y": 1
          },
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "litellm-db"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "litellm-db"
              },
              "rawQuery": true,
              "format": "table",
              "rawSql": "SELECT coalesce(sum(spend),0) FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\")"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Requests (SQL)",
          "description": "Request count over the range from the LiteLLM spend ledger (litellm-db LiteLLM_SpendLogs).",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 6,
            "y": 1
          },
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "litellm-db"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "litellm-db"
              },
              "rawQuery": true,
              "format": "table",
              "rawSql": "SELECT count(*) FROM \"LiteLLM_SpendLogs\" WHERE $$__timeFilter(\"startTime\")"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Avg cost per run",
          "description": "Range peak of litellm_key_spend summed over live ploeg keys divided by keys seen — approximation; revoked keys age out.",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 9,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "(sum(max_over_time(litellm_key_spend{key_alias=~\"ploeg-.*\"}[$$__range])) / count(max_over_time(litellm_key_spend{key_alias=~\"ploeg-.*\"}[$$__range]))) or vector(0)",
              "instant": true
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Cost per PR",
          "description": "Total agent LLM spend (litellm_run_spend, 30d retention) divided by PRs opened (ploeg_agent_runs_count outcome pr_opened), clamped to avoid divide-by-zero.",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 12,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(litellm_run_spend{key_alias=~\"ploeg-.*\"}) / clamp_min(sum(ploeg_agent_runs_count{outcome=\"pr_opened\"}),1) or vector(0)",
              "instant": false
            }
          ]
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Failed-run spend (waste)",
          "description": "Spend attributed to runs whose outcome is failed — litellm_run_spend grafted on key_alias to ploeg_run_started_epoch (30d retention).",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 15,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.01
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(litellm_run_spend{key_alias=~\"ploeg-.*\"} * on(key_alias) group_left(ticket,team,outcome) (ploeg_run_started_epoch{outcome=\"failed\"} >= bool 0)) or vector(0)",
              "instant": false
            }
          ]
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Live keys over 80 pct budget",
          "description": "Count of live LiteLLM keys (all aliases) whose litellm_key_spend exceeds 80 percent of litellm_key_max_budget.",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 18,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "count(100 * litellm_key_spend / litellm_key_max_budget > 80) or vector(0)",
              "instant": true
            }
          ]
        },
        {
          "id": 9,
          "type": "stat",
          "title": "All-key spend delta (range)",
          "description": "Delta of litellm_key_spend across ALL live keys over the range — approximation; the exact number is the Spend (SQL, exact) tile.",
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 21,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "value"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(max_over_time(litellm_key_spend[$$__range]) - min_over_time(litellm_key_spend[$$__range])) or vector(0)",
              "instant": true
            }
          ]
        },
        {
          "id": 10,
          "type": "row",
          "title": "Where the money goes — ticket & team",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          }
        },
        {
          "id": 11,
          "type": "bargauge",
          "title": "Spend by ticket",
          "description": "Agent LLM spend rolled up to the Vikunja ticket — litellm_run_spend joined on key_alias to ploeg_run_started_epoch (30d run-metric retention).",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color",
            "showUnfilled": true
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (ticket) (litellm_run_spend{key_alias=~\"ploeg-.*\"} * on(key_alias) group_left(ticket,team,outcome) (ploeg_run_started_epoch >= bool 0))",
              "legendFormat": "ticket {{ticket}}",
              "instant": true
            }
          ]
        },
        {
          "id": 12,
          "type": "bargauge",
          "title": "Spend by team",
          "description": "Agent LLM spend rolled up to the ploeg team — litellm_run_spend joined on key_alias to ploeg_run_started_epoch (30d run-metric retention).",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color",
            "showUnfilled": true
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (team) (litellm_run_spend{key_alias=~\"ploeg-.*\"} * on(key_alias) group_left(ticket,team,outcome) (ploeg_run_started_epoch >= bool 0))",
              "legendFormat": "{{team}}",
              "instant": true
            }
          ]
        },
        {
          "id": 13,
          "type": "row",
          "title": "By run",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 14
          }
        },
        {
          "id": 14,
          "type": "table",
          "title": "Run ledger (SQL, exact)",
          "description": "One row per agent run key from the LiteLLM spend ledger (litellm-db LiteLLM_SpendLogs) — exact spend, request and token counts including cache reads. Click a run to open the Run Explorer.",
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 15
          },
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "litellm-db"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Spend"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "currencyUSD"
                  },
                  {
                    "id": "decimals",
                    "value": 2
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Last activity"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "dateTimeAsIso"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Run"
                },
                "properties": [
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "Open in Run Explorer",
                        "url": "/d/dark-factory-run-explorer?var-run=$${__data.fields.Run}&$${__url_time_range}",
                        "targetBlank": true
                      }
                    ]
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Spend",
                "desc": true
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "litellm-db"
              },
              "rawQuery": true,
              "format": "table",
              "rawSql": "SELECT metadata->>'user_api_key_alias' AS run, count(*) AS requests, sum(total_tokens) AS tokens, sum(prompt_tokens) AS prompt_tokens, sum(completion_tokens) AS completion_tokens, count(*) FILTER (WHERE cache_hit = 'True') AS cache_hits, sum(spend) AS spend, max(\"startTime\") AS last_activity FROM \"LiteLLM_SpendLogs\" WHERE metadata->>'user_api_key_alias' ~ '^ploeg-' AND $$__timeFilter(\"startTime\") GROUP BY 1 ORDER BY spend DESC"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {},
                "renameByName": {
                  "run": "Run",
                  "requests": "Requests",
                  "tokens": "Tokens",
                  "prompt_tokens": "Prompt tokens",
                  "completion_tokens": "Completion tokens",
                  "cache_hits": "Cache hits",
                  "spend": "Spend",
                  "last_activity": "Last activity"
                }
              }
            }
          ]
        },
        {
          "id": 15,
          "type": "table",
          "title": "Run leaderboard (range)",
          "description": "litellm_run_spend (30d retention) per run with Ticket, Team and Outcome grafted from ploeg_run_started_epoch; Budget, Blocked and Burn come from live litellm_key_* gauges and go blank once a run's key is revoked. Click a run to open the Run Explorer.",
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 25
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Spend"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "currencyUSD"
                  },
                  {
                    "id": "decimals",
                    "value": 2
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Budget"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "currencyUSD"
                  },
                  {
                    "id": "decimals",
                    "value": 2
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Burn %"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "percent"
                  },
                  {
                    "id": "decimals",
                    "value": 0
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "green",
                          "value": null
                        },
                        {
                          "color": "yellow",
                          "value": 50
                        },
                        {
                          "color": "red",
                          "value": 80
                        }
                      ]
                    }
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Blocked"
                },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "0": {
                            "text": "—",
                            "color": "green"
                          },
                          "1": {
                            "text": "BLOCKED",
                            "color": "red"
                          }
                        }
                      }
                    ]
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Outcome"
                },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "pr_opened": {
                            "text": "PR opened",
                            "color": "green"
                          },
                          "failed": {
                            "text": "Failed",
                            "color": "red"
                          },
                          "running": {
                            "text": "Running",
                            "color": "blue"
                          }
                        }
                      }
                    ]
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Run"
                },
                "properties": [
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "Open in Run Explorer",
