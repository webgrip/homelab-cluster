---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: github-cost-executive
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: github-copilot
  json: |-
    {
      "schemaVersion": 39,
      "title": "GitHub & Copilot / Cost Overview",
      "uid": "github-cost-executive",
      "timezone": "browser",
      "tags": ["github", "billing", "copilot", "executive", "alerts"],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "15m",
      "time": {"from": "now-30d", "to": "now"},
      "links": [
        {"title": "Billing drill-down", "url": "/d/github-usage-billing/github-usage-billing-and-forecasts", "type": "link", "icon": "external link"},
        {"title": "Copilot Activity", "url": "/d/copilot-activity-overview/github-copilot-activity-overview", "type": "link", "icon": "external link"},
        {"title": "Copilot Performance", "url": "/d/copilot-agent-performance/github-copilot-agent-performance", "type": "link", "icon": "external link"}
      ],
      "templating": {
        "list": [
          {
            "name": "org",
            "label": "GitHub org",
            "type": "custom",
            "query": "webgrip",
            "current": {"selected": true, "text": "webgrip", "value": "webgrip"}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "",
          "gridPos": {"h": 5, "w": 24, "x": 0, "y": 0},
          "options": {
            "mode": "markdown",
            "content": "## Start here\n\nThis dashboard answers three questions: **Are we spending too much? Is Copilot healthy? What should I look at next?**\n\nRead it top to bottom. If the first row is green, nothing urgent is happening. Yellow means investigate soon. Red means act now. The detailed/raw GitHub API tables live in the linked **Billing drill-down** dashboard."
          }
        },
        {"id": 2, "type": "row", "title": "1. Status at a glance", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5}, "panels": []},
        {
          "id": 3,
          "type": "stat",
          "title": "Open GitHub/Copilot alerts",
          "description": "0 is good. Any non-zero value means Alertmanager has an active GitHub, Copilot, or ARC alert.",
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(ALERTS{alertstate=\"firing\",alertname=~\"GitHub.*|Copilot.*|Arc.*\"}) or vector(0)", "legendFormat": "firing alerts"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "value_and_name", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "red", "value": 1}]}}, "overrides": []}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "MTD GitHub spend",
          "description": "Total net GitHub spend so far this month.",
          "gridPos": {"h": 6, "w": 6, "x": 6, "y": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(github_billing_mtd_net_amount_usd{org=\"$${org}\",product=\"all\",sku=\"all\"})", "legendFormat": "MTD spend"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "value_and_name", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 50}, {"color": "red", "value": 100}]}}, "overrides": []}
        },
        {
          "id": 5,
          "type": "gauge",
          "title": "Premium request budget used",
          "description": "Copilot premium request spend divided by the GitHub budget cap.",
          "gridPos": {"h": 6, "w": 6, "x": 12, "y": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(github_budget_usage_ratio{org=\"$${org}\",budget_product_sku=\"premium_requests\"})", "legendFormat": "budget used"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "showThresholdLabels": true, "showThresholdMarkers": true},
          "fieldConfig": {"defaults": {"unit": "percentunit", "decimals": 0, "min": 0, "max": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 0.7}, {"color": "red", "value": 0.9}]}}, "overrides": []}
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Likely month-end spend",
          "description": "Forecast from current MTD pace. Uses daily seasonality only when GitHub returns enough real daily buckets.",
          "gridPos": {"h": 6, "w": 6, "x": 18, "y": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(github_billing_forecast_amount_usd{org=\"$${org}\",product=\"all\",sku=\"all\",scenario=\"likely\"})", "legendFormat": "likely"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "value_and_name", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 50}, {"color": "red", "value": 100}]}}, "overrides": []}
        },
        {
          "id": 7,
          "type": "text",
          "title": "What to do next",
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 12},
          "options": {
            "mode": "markdown",
            "content": "### Decision guide\n\n| If you see... | Do this |\n|---|---|\n| **Open alerts > 0** | Open Alertmanager or scroll to the problem section below. |\n| **Budget used is yellow/red** | Check **Premium request spend by model** in the billing drill-down. Reduce expensive model/agent usage or raise the cap intentionally. |\n| **Forecast is unexpectedly high** | Check **MTD spend by product** and **Top Actions repos** below. |\n| **Inactive seats > 0** | Review the seat table in the drill-down dashboard and reclaim seats if appropriate. |\n| **Latency/tool failure panels are red or rising** | Open **Copilot Performance** from the top links. |"
          }
        },
        {"id": 8, "type": "row", "title": "2. Why is the money moving?", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 18}, "panels": []},
        {
          "id": 9,
          "type": "bargauge",
          "title": "MTD spend by product",
          "description": "This is the fastest way to see whether Copilot, Actions, Models, or another GitHub product is driving spend.",
          "gridPos": {"h": 9, "w": 8, "x": 0, "y": 19},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sort_desc(max by (product) (github_billing_mtd_net_amount_usd{org=\"$${org}\",sku=\"all\",product!=\"all\"}))", "legendFormat": "{{product}}"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2}, "overrides": []}
        },
        {
          "id": 10,
          "type": "bargauge",
          "title": "Forecast range",
          "description": "Best / likely / worst month-end scenarios.",
          "gridPos": {"h": 9, "w": 8, "x": 8, "y": 19},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max by (scenario) (github_billing_forecast_amount_usd{org=\"$${org}\",product=\"all\",sku=\"all\"})", "legendFormat": "{{scenario}}"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 0}, "overrides": []}
        },
        {
          "id": 11,
          "type": "bargauge",
          "title": "Top Actions repos (latest cost)",
          "description": "Shows the repositories currently driving GitHub-hosted Actions spend.",
          "gridPos": {"h": 9, "w": 8, "x": 16, "y": 19},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "topk(8, max by (repository) (github_billing_daily_latest_net_amount_usd{org=\"$${org}\",product=\"actions\",window=\"7d\"}))", "legendFormat": "{{repository}}"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 4}, "overrides": []}
        },
        {
          "id": 12,
          "type": "bargauge",
          "title": "Biggest spend anomalies",
          "description": "Ratio versus trailing 7-day baseline. Anything over 2x deserves a quick look.",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 28},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "topk(8, github_billing_anomaly_ratio{org=\"$${org}\",window=\"7d\"})", "legendFormat": "{{product}} / {{repository}}"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 2}, {"color": "red", "value": 5}]}}, "overrides": []}
        },
        {
          "id": 13,
          "type": "bargauge",
          "title": "Premium request spend by model",
          "description": "Which premium models/SKUs are costing money this month.",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 28},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sort_desc(max by (model, sku) (github_premium_request_mtd_net_amount_usd{org=\"$${org}\",model!=\"all\"}))", "legendFormat": "{{model}}"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 4}, "overrides": []}
        },
        {"id": 14, "type": "row", "title": "3. Is Copilot healthy?", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 36}, "panels": []},
        {
          "id": 15,
          "type": "stat",
          "title": "Chat latency P90",
          "description": "User-facing Copilot chat latency.",
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 37},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "copilot:chat_p90_latency_seconds:5m", "legendFormat": "chat p90"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "value_and_name", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 10}, {"color": "red", "value": 30}]}}, "overrides": []}
        },
        {
          "id": 16,
          "type": "stat",
          "title": "Time to first token P90",
          "description": "How long Copilot takes to start responding.",
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 37},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "copilot:ttft_p90_seconds:5m", "legendFormat": "ttft p90"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "value_and_name", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 5}, {"color": "red", "value": 10}]}}, "overrides": []}
        },
        {
          "id": 17,
          "type": "stat",
          "title": "Tool failure ratio",
          "description": "Failing Copilot tool calls. High values mean agent/chat workflows are unreliable.",
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 37},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "copilot:tool_failure_ratio:15m", "legendFormat": "tool failures"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "value_and_name", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "decimals": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 0.05}, {"color": "red", "value": 0.1}]}}, "overrides": []}
        },
        {
          "id": 18,
          "type": "stat",
          "title": "Tool calls per chat",
          "description": "High values can indicate useful automation, or a tool loop if paired with failures/latency.",
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 37},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "copilot:tool_calls_per_chat:30m", "legendFormat": "tools/chat"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "value_and_name", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 2, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 20}, {"color": "red", "value": 50}]}}, "overrides": []}
        },
        {
          "id": 19,
          "type": "timeseries",
          "title": "Copilot volume and latency trend",
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 42},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum(increase(gen_ai_client_operation_duration_seconds_count{gen_ai_operation_name=\"chat\"}[$$__rate_interval])) or sum(increase(gen_ai_client_operation_duration_count{gen_ai_operation_name=\"chat\"}[$$__rate_interval]))", "legendFormat": "chat requests"},
            {"refId": "B", "expr": "sum(increase(gen_ai_client_operation_duration_seconds_count{gen_ai_operation_name=\"invoke_agent\"}[$$__rate_interval])) or vector(0)", "legendFormat": "agent requests"},
            {"refId": "C", "expr": "copilot:chat_p90_latency_seconds:5m", "legendFormat": "chat p90 seconds"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "right"}},
          "fieldConfig": {"defaults": {"decimals": 2}, "overrides": []}
        },
        {
          "id": 20,
          "type": "bargauge",
          "title": "Request mix by model",
          "description": "Useful for understanding whether usage is shifting into more expensive/slower models.",
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 42},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sort_desc(sum by (gen_ai_request_model) (increase(gen_ai_client_operation_duration_seconds_count[$$__range])) or sum by (gen_ai_request_model) (increase(gen_ai_client_operation_duration_count[$$__range])))", "legendFormat": "{{gen_ai_request_model}}"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}, "overrides": []}
        },
        {"id": 21, "type": "row", "title": "4. Drill-down details", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 51}, "panels": []},
        {
          "id": 22,
          "type": "timeseries",
          "title": "ARC running vs pending pods",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 52},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum(kube_pod_status_phase{namespace=\"arc-systems\", phase=\"Running\"} == 1) or vector(0)", "legendFormat": "running"},
            {"refId": "B", "expr": "sum(kube_pod_status_phase{namespace=\"arc-systems\", phase=\"Pending\"} == 1) or vector(0)", "legendFormat": "pending"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "right"}},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}, "overrides": []}
        },
        {
          "id": 23,
          "type": "table",
          "title": "Seat inactivity days",
          "description": "Sort descending. Anything over 45 days is a reclaim candidate.",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 52},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sort_desc(github_copilot_seat_inactive_days{org=\"$${org}\"})", "format": "table", "instant": true}],
          "options": {"showHeader": true},
          "fieldConfig": {"defaults": {"unit": "d", "decimals": 1}, "overrides": []}
        },
        {
          "id": 24,
          "type": "table",
          "title": "GitHub API endpoint status",
          "description": "200 is healthy. 403/404 can be expected for optional APIs; core billing endpoints should stay 200.",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 52},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "github_billing_exporter_api_response_status_code{org=\"$${org}\"}", "format": "table", "instant": true}],
          "options": {"showHeader": true},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        }
      ]
    }
