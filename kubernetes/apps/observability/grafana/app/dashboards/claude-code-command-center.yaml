---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: claude-code-command-center
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: claude-code
  json: |-
    {
      "schemaVersion": 39,
      "title": "Claude Code / Command Center",
      "uid": "claude-code-command-center",
      "timezone": "browser",
      "tags": ["claude-code", "ai", "anthropic", "opentelemetry", "genai", "cost"],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {"from": "now-24h", "to": "now"},
      "links": [
        {"title": "Command Center", "url": "/d/claude-code-command-center", "type": "link", "icon": "external link"},
        {"title": "Cost & Tokens", "url": "/d/claude-code-cost-tokens", "type": "link", "icon": "dollar"},
        {"title": "Activity & Tools", "url": "/d/claude-code-activity-tools", "type": "link", "icon": "bolt"},
        {"title": "Events, Logs & Traces", "url": "/d/claude-code-events-traces", "type": "link", "icon": "doc"}
      ],
      "annotations": {
        "list": [
          {"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}
        ]
      },
      "templating": {
        "list": [
          {"name": "model", "label": "Model", "type": "query", "datasource": {"type": "prometheus", "uid": "prometheus"}, "query": {"query": "label_values(claude_code_token_usage_tokens_total, model)", "refId": "q-model"}, "refresh": 2, "sort": 1, "multi": true, "includeAll": true, "current": {"selected": true, "text": "All", "value": "$$__all"}},
          {"name": "query_source", "label": "Query source", "type": "query", "datasource": {"type": "prometheus", "uid": "prometheus"}, "query": {"query": "label_values(claude_code_token_usage_tokens_total, query_source)", "refId": "q-qs"}, "refresh": 2, "sort": 1, "multi": true, "includeAll": true, "current": {"selected": true, "text": "All", "value": "$$__all"}}
        ]
      },
      "panels": [
        {
          "id": 1, "type": "text", "title": "", "gridPos": {"h": 4, "w": 24, "x": 0, "y": 0},
          "options": {"mode": "markdown", "content": "## Claude Code Command Center\nOperational overview for Claude Code agent telemetry: **Claude Code → OTLP/HTTP → Alloy → Prometheus / Loki / Tempo → Grafana** (`service.name=claude-code`). Pivot by **model**, **query source** (main / subagent / auxiliary), effort, tool, session and cost. Use the links above to drill into Cost & Tokens, Activity & Tools, and Events/Logs/Traces.\n\n_If panels are empty, telemetry isn't flowing yet — enable it in `.claude/settings.json` and restart Claude Code._"}
        },
        {"id": 2, "type": "row", "title": "1. Health & spend right now", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 4}, "panels": []},
        {
          "id": 3, "type": "stat", "title": "Cost (24h)", "description": "Estimated USD cost of Claude Code API usage in the last 24h.", "gridPos": {"h": 4, "w": 3, "x": 0, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(increase(claude_code_cost_usage_USD_total{model=~\"$$model\",query_source=~\"$$query_source\"}[24h])) or sum(increase(claude_code_cost_usage_USD_total{model=~\"$$model\",query_source=~\"$$query_source\"}[24h])) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "area"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 10}, {"color": "red", "value": 25}]}}, "overrides": []}
        },
        {
          "id": 4, "type": "stat", "title": "Cost (MTD ~31d)", "description": "Rolling 31-day spend. For calendar-exact MTD add a recording rule.", "gridPos": {"h": 4, "w": 3, "x": 3, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(increase(claude_code_cost_usage_USD_total{model=~\"$$model\"}[31d])) or sum(increase(claude_code_cost_usage_USD_total{model=~\"$$model\"}[31d])) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "fixed", "fixedColor": "orange"}}, "overrides": []}
        },
        {
          "id": 5, "type": "stat", "title": "Tokens (24h)", "description": "Total tokens (input + output + cache) in the last 24h.", "gridPos": {"h": 4, "w": 3, "x": 6, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(increase(claude_code_token_usage_tokens_total{model=~\"$$model\",query_source=~\"$$query_source\"}[24h])) or sum(increase(claude_code_token_usage_tokens_total{model=~\"$$model\",query_source=~\"$$query_source\"}[24h])) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "area"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "blue"}}, "overrides": []}
        },
        {
          "id": 6, "type": "stat", "title": "Sessions (24h)", "description": "Claude Code CLI/VS Code sessions started in the last 24h.", "gridPos": {"h": 4, "w": 3, "x": 9, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "count(count by (session_id) (max_over_time(claude_code_session_count_total[24h]))) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "area"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "purple"}}, "overrides": []}
        },
        {
          "id": 7, "type": "stat", "title": "Active time (24h)", "description": "Active engagement time (user + CLI) in the last 24h.", "gridPos": {"h": 4, "w": 3, "x": 12, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(increase(claude_code_active_time_seconds_total[24h])) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "green"}}, "overrides": []}
        },
        {
          "id": 8, "type": "stat", "title": "Edit accept-rate", "description": "Accepted ÷ all code-edit (Edit/Write/NotebookEdit) permission decisions over the dashboard range.", "gridPos": {"h": 4, "w": 3, "x": 15, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "(sum(increase(claude_code_code_edit_tool_decision_total{decision=\"accept\"}[$$__range])) or vector(0)) / clamp_min(sum(increase(claude_code_code_edit_tool_decision_total[$$__range])) or vector(0), 1)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "decimals": 1, "min": 0, "max": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "red"}, {"color": "yellow", "value": 0.5}, {"color": "green", "value": 0.8}]}}, "overrides": []}
        },
        {
          "id": 9, "type": "stat", "title": "API errors (range)", "description": "Count of api_error events over the range (0 = healthy).", "gridPos": {"h": 4, "w": 3, "x": 18, "y": 5},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum(count_over_time({service_name=\"claude-code\", event_name=\"api_error\"}[$$__range])) or vector(0)", "queryType": "instant"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 1}, {"color": "red", "value": 5}]}}, "overrides": []}
        },
        {
          "id": 10, "type": "stat", "title": "Request latency p90", "description": "p90 of api_request duration_ms over the range.", "gridPos": {"h": 4, "w": 3, "x": 21, "y": 5},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "quantile_over_time(0.9, {service_name=\"claude-code\", event_name=\"api_request\"} | json duration_ms=\"attributes.duration_ms\" | unwrap duration_ms [$$__range])", "queryType": "instant"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "ms", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 8000}, {"color": "red", "value": 20000}]}}, "overrides": []}
        },
        {"id": 11, "type": "row", "title": "2. Trends", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 9}, "panels": []},
        {
          "id": 12, "type": "timeseries", "title": "Cost over time by model", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 10},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (model) (increase(claude_code_cost_usage_USD_total{model=~\"$$model\",query_source=~\"$$query_source\"}[$$__rate_interval])) or sum by (model) (increase(claude_code_cost_usage_USD_total{model=~\"$$model\",query_source=~\"$$query_source\"}[$$__rate_interval]))", "legendFormat": "{{model}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "custom": {"lineWidth": 2, "fillOpacity": 20, "showPoints": "never", "stacking": {"mode": "normal", "group": "A"}}}, "overrides": []}
        },
        {
          "id": 13, "type": "timeseries", "title": "Token consumption by type", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 10},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (type) (increase(claude_code_token_usage_tokens_total{model=~\"$$model\",query_source=~\"$$query_source\"}[$$__rate_interval])) or sum by (type) (increase(claude_code_token_usage_tokens_total{model=~\"$$model\",query_source=~\"$$query_source\"}[$$__rate_interval]))", "legendFormat": "{{type}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 20, "showPoints": "never", "stacking": {"mode": "normal", "group": "A"}}}, "overrides": []}
        },
        {
          "id": 14, "type": "timeseries", "title": "Sessions by start type", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 10},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "count by (start_type) (max_over_time(claude_code_session_count_total[$$__rate_interval]))", "legendFormat": "{{start_type}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never"}}, "overrides": []}
        },
        {
          "id": 15, "type": "timeseries", "title": "Lines of code added / removed", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (type) (increase(claude_code_lines_of_code_count_total[$$__rate_interval]))", "legendFormat": "{{type}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never"}}, "overrides": [{"matcher": {"id": "byName", "options": "removed"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]}, {"matcher": {"id": "byName", "options": "added"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]}]}
        },
        {
          "id": 16, "type": "timeseries", "title": "Commits & pull requests", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum(increase(claude_code_commit_count_total[$$__rate_interval]))", "legendFormat": "commits"},
            {"refId": "B", "expr": "sum(increase(claude_code_pull_request_count_total[$$__rate_interval]))", "legendFormat": "pull requests"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 15, "showPoints": "auto", "drawStyle": "bars"}}, "overrides": []}
        },
        {
          "id": 17, "type": "timeseries", "title": "Request volume + error overlay", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 18},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {"refId": "A", "expr": "sum(count_over_time({service_name=\"claude-code\", event_name=\"api_request\"}[$$__interval]))", "queryType": "range", "legendFormat": "api_request"},
            {"refId": "B", "expr": "sum(count_over_time({service_name=\"claude-code\", event_name=\"api_error\"}[$$__interval]))", "queryType": "range", "legendFormat": "api_error"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never"}}, "overrides": [{"matcher": {"id": "byName", "options": "api_error"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]}]}
        },
        {
          "id": 18, "type": "timeseries", "title": "Request latency p50 / p90 / p99", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 26},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {"refId": "A", "expr": "quantile_over_time(0.5, {service_name=\"claude-code\", event_name=\"api_request\"} | json duration_ms=\"attributes.duration_ms\" | unwrap duration_ms [$$__interval])", "queryType": "range", "legendFormat": "p50"},
            {"refId": "B", "expr": "quantile_over_time(0.9, {service_name=\"claude-code\", event_name=\"api_request\"} | json duration_ms=\"attributes.duration_ms\" | unwrap duration_ms [$$__interval])", "queryType": "range", "legendFormat": "p90"},
            {"refId": "C", "expr": "quantile_over_time(0.99, {service_name=\"claude-code\", event_name=\"api_request\"} | json duration_ms=\"attributes.duration_ms\" | unwrap duration_ms [$$__interval])", "queryType": "range", "legendFormat": "p99"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "ms", "custom": {"lineWidth": 2, "fillOpacity": 5, "showPoints": "never"}}, "overrides": []}
        },
        {
          "id": 19, "type": "bargauge", "title": "Top models by cost", "gridPos": {"h": 8, "w": 6, "x": 12, "y": 26},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "topk(10, sort_desc(sum by (model) (increase(claude_code_cost_usage_USD_total[$$__range])) or sum by (model) (increase(claude_code_cost_usage_USD_total[$$__range]))))", "instant": true, "legendFormat": "{{model}}"}],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "continuous-BlYlRd"}}, "overrides": []}
        },
        {
          "id": 20, "type": "timeseries", "title": "Edit decisions: accept vs reject", "gridPos": {"h": 8, "w": 6, "x": 18, "y": 26},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (decision) (increase(claude_code_code_edit_tool_decision_total[$$__rate_interval]))", "legendFormat": "{{decision}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 15, "showPoints": "never", "stacking": {"mode": "normal", "group": "A"}}}, "overrides": [{"matcher": {"id": "byName", "options": "accept"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]}, {"matcher": {"id": "byName", "options": "reject"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]}]}
        }
      ]
    }
