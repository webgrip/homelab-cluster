          ]
        },
        {
          "id": 29,
          "type": "bargauge",
          "title": "Runs by repo (dashboard range)",
          "description": "Which repos drove CI over the selected time range — parsed from the runner `repo is <owner/repo>` lines.",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 82 },
          "fieldConfig": {
            "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [ { "color": "blue", "value": null } ] } },
            "overrides": []
          },
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "showUnfilled": true,
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "instant",
              "legendFormat": "{{repo}}",
              "expr": "sum by (repo) (count_over_time({namespace=\"forgejo\", container=\"runner\"} |= \"repo is\" | regexp `repo is (?P<repo>\\S+)` | repo != \"\" [$$__range]))" }
          ]
        }
      ]
