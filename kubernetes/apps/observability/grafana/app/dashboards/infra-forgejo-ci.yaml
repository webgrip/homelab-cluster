            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(keda_scaler_detail_errors_total{scaledObject=\"forgejo-runner\"}[1h])) or vector(0)" }
