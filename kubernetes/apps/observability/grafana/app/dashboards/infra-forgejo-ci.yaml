---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: infra-forgejo-ci
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: infrastructure
  json: |-
    {
      "schemaVersion": 39,
      "title": "Forgejo CI — Command Center",
      "uid": "infra-forgejo-ci",
      "timezone": "browser",
      "tags": ["infrastructure", "forgejo", "ci", "actions", "keda"],
      "editable": false,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": { "list": [] },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "CI at a glance",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Pending CI jobs (queue)",
          "description": "KEDA forgejo-runner scaler metric: pending Actions jobs for the `docker` label, globally. This is the backlog driving runner scale-up.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 3 },
                { "color": "red", "value": 6 }
              ] }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(keda_scaler_metrics_value{scaledObject=\"forgejo-runner\"}) or vector(0)" }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "KEDA scaling active",
          "description": "1 = the forgejo-runner scaler is actively requesting runners above the warm-pool floor.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                { "type": "value", "options": { "0": { "text": "Idle", "color": "green" } } },
                { "type": "value", "options": { "1": { "text": "Scaling", "color": "blue" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(keda_scaler_active{scaledObject=\"forgejo-runner\"}) or vector(0)" }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Runners running",
          "description": "Live forgejo-runner pods in Running phase. Warm-pool floor = 2 (min), burst ceiling = 6 (max). Above 6 is anomalous.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 7 }
              ] }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(kube_pod_status_phase{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\",phase=\"Running\"}) or vector(0)" }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Actively building",
          "description": "Runner pods burning CPU > 0.05 core (runner steps or DinD build). A proxy for runners actually executing a job, vs warm-idle ones blocked on `one-job --wait`.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [ { "color": "blue", "value": null } ] }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\",image!=\"\"}[$$__rate_interval])) > 0.05) or vector(0)" }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Warm-idle runners",
          "description": "Running runners minus actively-building ones = warm pool blocked on `one-job --wait` (and race-losers that fetched no task). High idle under a non-empty queue hints at over-provisioning.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "(sum(kube_pod_status_phase{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\",phase=\"Running\"}) or vector(0)) - (count(sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\",image!=\"\"}[$$__rate_interval])) > 0.05) or vector(0))" }
          ]
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Runners Pending / Failed",
          "description": "Runner pods stuck Pending (e.g. 'Insufficient memory' on the worker pool) or Failed. Should be 0.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "red", "value": 1 }
              ] }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(kube_pod_status_phase{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\",phase=~\"Pending|Failed|Unknown\"}) or vector(0)" }
          ]
        },
        {
          "id": 8,
          "type": "row",
          "title": "Scaling & queue",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Queue vs runners vs active builds",
          "description": "The core view: pending jobs (queue) drive runner pods to spin up. 'Runners running' should track between the warm floor (2) and burst ceiling (6). Gap between 'running' and 'actively building' = warm/idle capacity.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 6 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "stepAfter",
                "fillOpacity": 12,
                "showPoints": "never",
                "spanNulls": true
              }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "warm floor (min=2)" },
                "properties": [
                  { "id": "custom.fillOpacity", "value": 0 },
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [8, 8] } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ] },
              { "matcher": { "id": "byName", "options": "burst ceiling (max=6)" },
                "properties": [
                  { "id": "custom.fillOpacity", "value": 0 },
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [8, 8] } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ] }
            ]
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "pending jobs (queue)",
              "expr": "max(keda_scaler_metrics_value{scaledObject=\"forgejo-runner\"}) or vector(0)" },
            { "refId": "B", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "runners running",
              "expr": "sum(kube_pod_status_phase{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\",phase=\"Running\"}) or vector(0)" },
            { "refId": "C", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "actively building",
              "expr": "count(sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\",image!=\"\"}[$$__rate_interval])) > 0.05) or vector(0)" },
            { "refId": "D", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "warm floor (min=2)", "expr": "vector(2)" },
            { "refId": "E", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "burst ceiling (max=6)", "expr": "vector(6)" }
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Running runners by node",
          "description": "Which node the runner pods land on (worker pool: worker-1 + fringe-workstation).",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "lineInterpolation": "stepAfter", "fillOpacity": 25, "stacking": { "mode": "normal" }, "showPoints": "never" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{node}}",
              "expr": "count by (node) (kube_pod_info{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\"} and on (namespace, pod) (kube_pod_status_phase{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\",phase=\"Running\"} == 1))" }
          ]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Runner pod phase over time",
          "description": "Pending spikes here = scheduling pressure (e.g. Insufficient memory). Failed = crashed runners.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "lineInterpolation": "stepAfter", "fillOpacity": 25, "stacking": { "mode": "normal" }, "showPoints": "never" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{phase}}",
              "expr": "sum by (phase) (kube_pod_status_phase{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\"})" }
          ]
        },
        {
          "id": 12,
          "type": "row",
          "title": "Throughput & lifecycle",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 }
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Runner spawns (created in last 5m)",
          "description": "Count of runner pods whose creation timestamp falls within the trailing 5 minutes — the spin-up waves you see on the namespace dashboard. Includes warm-pool backfills.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "bars", "fillOpacity": 60, "showPoints": "never" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "runner spawns",
              "expr": "count(kube_pod_created{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\"} > (time() - 300)) or vector(0)" }
          ]
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Runner k8s Jobs (active vs succeeded)",
          "description": "Active = runner Jobs in-flight. Succeeded is GC-limited (successfulJobsHistoryLimit=3, failedJobsHistoryLimit=0) so it is NOT a reliable throughput counter — accurate run counts come from the run-mapping (Loki) panels once log shipping is fixed.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "lineInterpolation": "stepAfter", "fillOpacity": 15, "showPoints": "never" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "active jobs",
              "expr": "sum(kube_job_status_active{namespace=\"forgejo\",job_name=~\"forgejo-runner-[a-z0-9]{5}\"}) or vector(0)" },
            { "refId": "B", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "succeeded (retained)",
              "expr": "sum(kube_job_status_succeeded{namespace=\"forgejo\",job_name=~\"forgejo-runner-[a-z0-9]{5}\"}) or vector(0)" }
          ]
        },
        {
          "id": 15,
          "type": "table",
          "title": "Recent runner Job durations",
          "description": "Wall-clock duration of retained completed runner Jobs (completion − start). Only the last few survive GC; treat as a recent sample, not a full history.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 32 },
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "align": "auto", "filterable": true } },
            "overrides": []
          },
          "options": { "showHeader": true, "sortBy": [ { "displayName": "Value", "desc": true } ] },
          "targets": [
            { "refId": "A", "format": "table", "instant": true,
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "(kube_job_status_completion_time{namespace=\"forgejo\",job_name=~\"forgejo-runner-[a-z0-9]{5}\"} - kube_job_status_start_time{namespace=\"forgejo\",job_name=~\"forgejo-runner-[a-z0-9]{5}\"})" }
          ],
          "transformations": [
            { "id": "organize", "options": {
              "excludeByName": { "Time": true, "__name__": true, "container": true, "endpoint": true, "instance": true, "job": true, "namespace": true, "service": true, "uid": true, "prometheus": true },
              "renameByName": { "job_name": "Runner Job", "Value": "Duration" }
            } }
          ]
        },
        {
          "id": 16,
          "type": "row",
          "title": "Runner resources (DinD builds)",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 39 }
        },
        {
          "id": 17,
          "type": "timeseries",
          "title": "CPU by runner pod",
          "description": "Per-pod CPU (runner steps + DinD sidecar). Runner pods have no CPU limit — they burst into idle node headroom.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 40 },
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "drawStyle": "line", "fillOpacity": 10, "showPoints": "never" } },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{pod}}",
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\",image!=\"\"}[$$__rate_interval]))" }
          ]
        },
        {
          "id": 18,
          "type": "timeseries",
          "title": "Memory by runner pod",
          "description": "Working set per runner pod. DinD limit 1.5Gi, runner limit 1.25Gi.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 40 },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "drawStyle": "line", "fillOpacity": 10, "showPoints": "never" } },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{pod}}",
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\",image!=\"\"})" }
          ]
        },
        {
          "id": 19,
          "type": "timeseries",
          "title": "Memory % of limit (OOM risk)",
          "description": "Per-pod working set as a share of its memory limit. Approaching 100% risks an OOM kill mid-build.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 48 },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "custom": { "drawStyle": "line", "fillOpacity": 10, "showPoints": "never", "thresholdsStyle": { "mode": "line" } },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 80 }, { "color": "red", "value": 95 } ] }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{pod}}",
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\",image!=\"\"}) / sum by (pod) (kube_pod_container_resource_limits{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\",resource=\"memory\"}) * 100" }
          ]
        },
        {
          "id": 20,
          "type": "timeseries",
          "title": "CPU throttling % by pod",
          "description": "Share of CFS periods throttled. Runner/DinD containers have no CPU limit, so sustained throttling points at node-level CPU pressure.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 48 },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "showPoints": "never" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
              "legendFormat": "{{pod}}",
              "expr": "sum by (pod) (rate(container_cpu_cfs_throttled_periods_total{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\"}[$$__rate_interval])) / clamp_min(sum by (pod) (rate(container_cpu_cfs_periods_total{namespace=\"forgejo\",pod=~\"forgejo-runner-[a-z0-9]{5}-[a-z0-9]{5}\"}[$$__rate_interval])), 1) * 100" }
          ]
        },
        {
          "id": 21,
          "type": "timeseries",
          "title": "Runner network RX (image pulls)",
          "description": "Receive throughput across runner pods — dominated by DinD image pulls. Useful for sizing the Harbor pull-through mirror.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 56 },
