---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: apps-harbor
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  folder: "Apps"
  json: |-
    {
      "uid": "harbor",
      "title": "Harbor",
      "tags": ["harbor", "registry", "oci"],
      "timezone": "browser",
      "schemaVersion": 39,
      "editable": false,
      "time": {"from": "now-6h", "to": "now"},
      "refresh": "30s",
      "annotations": {"list": [{"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}]},
      "panels": [
        {"id": 1, "type": "stat", "title": "Up targets (harbor)", "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum(up{namespace=\"harbor\"} == 1) or vector(0)", "legendFormat": "up"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "none"}, "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}},
        {"id": 2, "type": "stat", "title": "Core Up", "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "max(up{job=\"harbor-core\", namespace=\"harbor\"}) or vector(0)"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none"}, "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "Down", "color": "red"}, "1": {"text": "Up", "color": "green"}}}], "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}},
        {"id": 3, "type": "stat", "title": "DB Up", "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "max(up{job=\"cnpg-system/cnpg-clusters\", namespace=\"harbor\"}) or vector(0)"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none"}, "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "Down", "color": "red"}, "1": {"text": "Up", "color": "green"}}}], "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}},
        {"id": 4, "type": "stat", "title": "Pods not Running", "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum(kube_pod_status_phase{namespace=\"harbor\", phase=~\"Pending|Failed|Unknown\"} == 1) or vector(0)"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "none"}, "fieldConfig": {"defaults": {"decimals": 0, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}, "color": {"mode": "thresholds"}}, "overrides": []}},
        {"id": 5, "type": "stat", "title": "Core 5xx rate", "gridPos": {"h": 4, "w": 4, "x": 16, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "(sum(rate(harbor_core_http_request_total{namespace=\"harbor\", code=~\"5..\"}[5m])) / clamp_min(sum(rate(harbor_core_http_request_total{namespace=\"harbor\"}[5m])), 1)) * 100 or vector(0)"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "area"}, "fieldConfig": {"defaults": {"unit": "percent", "decimals": 2, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "red", "value": 5}]}, "color": {"mode": "thresholds"}}, "overrides": []}},
        {"id": 6, "type": "stat", "title": "Projects", "gridPos": {"h": 4, "w": 4, "x": 20, "y": 0}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "max(harbor_project_total{namespace=\"harbor\"}) or vector(0)"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "none"}, "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}},
        {"id": 7, "type": "table", "title": "Component scrape status", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 4}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "up{namespace=\"harbor\"}", "format": "table", "instant": true}], "transformations": [{"id": "organize", "options": {"excludeByName": {"Time": true, "__name__": true, "instance": true, "container": true, "endpoint": true, "pod": true, "service": true, "prometheus": true}, "renameByName": {"job": "Component", "Value": "Up"}}}], "fieldConfig": {"defaults": {}, "overrides": [{"matcher": {"id": "byName", "options": "Up"}, "properties": [{"id": "mappings", "value": [{"type": "value", "options": {"0": {"text": "Down", "color": "red"}, "1": {"text": "Up", "color": "green"}}}]}, {"id": "custom.cellOptions", "value": {"type": "color-background"}}]}]}},
        {"id": 8, "type": "timeseries", "title": "Core HTTP request rate by code", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 4}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum by (code) (rate(harbor_core_http_request_total{namespace=\"harbor\"}[5m]))", "legendFormat": "{{code}}"}], "options": {"legend": {"displayMode": "list", "placement": "right"}}, "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []}},
        {"id": 9, "type": "timeseries", "title": "Core request latency p95", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 4}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "histogram_quantile(0.95, sum by (le, operation) (rate(harbor_core_http_request_duration_seconds_bucket{namespace=\"harbor\"}[5m])))", "legendFormat": "{{operation}}"}], "options": {"legend": {"displayMode": "list", "placement": "right"}}, "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}},
        {"id": 10, "type": "timeseries", "title": "CPU usage (cores)", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 12}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"harbor\", image!=\"\"}[5m]))", "legendFormat": "{{pod}}"}], "options": {"legend": {"displayMode": "list", "placement": "right"}}, "fieldConfig": {"defaults": {"unit": "cores"}, "overrides": []}},
        {"id": 11, "type": "timeseries", "title": "Memory working set", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 12}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"harbor\", image!=\"\"})", "legendFormat": "{{pod}}"}], "options": {"legend": {"displayMode": "list", "placement": "right"}}, "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []}},
        {"id": 12, "type": "timeseries", "title": "PVC usage % (jobservice/trivy/redis)", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 12}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "(kubelet_volume_stats_used_bytes{namespace=\"harbor\"} / kubelet_volume_stats_capacity_bytes{namespace=\"harbor\"}) * 100", "legendFormat": "{{persistentvolumeclaim}}"}], "options": {"legend": {"displayMode": "list", "placement": "right"}}, "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1}, "overrides": []}},
        {"id": 13, "type": "timeseries", "title": "Registry quota usage (all projects)", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum(harbor_quota_usage_byte{namespace=\"harbor\"})", "legendFormat": "used"}], "options": {"legend": {"displayMode": "list", "placement": "bottom"}}, "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []}},
        {"id": 14, "type": "timeseries", "title": "Pod restarts (top 10, 30m)", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "topk(10, sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"harbor\"}[30m])))", "legendFormat": "{{pod}}"}], "options": {"legend": {"displayMode": "list", "placement": "right"}}, "fieldConfig": {"defaults": {}, "overrides": []}}
      ]
    }
