              "parser": "uql",
              "uql": "parse-json\n| scope \"usageItems\"\n| extend \"product_lc\"=tolower(\"product\")\n| where \"product_lc\" in ('actions','codespaces','packages','lfs','git_lfs')\n| project \"date\", \"product\", \"sku\", \"repositoryName\", \"quantity\", \"unitType\", \"netAmount\"\n| order by \"date\" desc"
