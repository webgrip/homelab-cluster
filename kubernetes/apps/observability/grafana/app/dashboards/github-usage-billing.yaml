              "type": "json",
              "source": "url",
              "url": "https://api.github.com/organizations/$${org}/settings/billing/premium_request/usage",
              "parser": "uql",
              "uql": "parse-json\n| scope \"usageItems\"\n| summarize \"net_amount\"=sum(\"netAmount\")"
