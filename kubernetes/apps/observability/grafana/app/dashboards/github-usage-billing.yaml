        "list": [
          {
            "name": "org",
            "label": "GitHub org",
            "type": "custom",
            "query": "webgrip",
            "current": {
              "selected": true,
              "text": "webgrip",
              "value": "webgrip"
            }
          },
          {
            "name": "username",
            "label": "GitHub user",
            "type": "textbox",
            "query": "ryangr0",
            "current": {
              "selected": true,
              "text": "ryangr0",
              "value": "ryangr0"
            },
            "options": [
              {
                "selected": true,
                "text": "ryangr0",
                "value": "ryangr0"
              }
            ]
          },
          {
            "name": "team",
            "label": "GitHub team",
            "type": "custom",
            "query": "application,backstage,grafana,infrastructure",
            "current": {
              "selected": true,
              "text": "application",
              "value": "application"
            },
            "options": [
              {"selected": true,  "text": "application",    "value": "application"},
              {"selected": false, "text": "backstage",      "value": "backstage"},
              {"selected": false, "text": "grafana",        "value": "grafana"},
              {"selected": false, "text": "infrastructure", "value": "infrastructure"}
            ]
