              "refId": "A",
              "type": "json",
              "source": "url",
              "url": "https://api.github.com/organizations/$${org}/settings/billing/usage/summary",
              "parser": "uql",
              "uql": "parse-json\n| scope \"usageItems\"\n| summarize \"current_mtd\"=sum(\"netAmount\")\n| extend \"best_case\"=\"current_mtd\", \"likeliest\"=mul(\"current_mtd\",1.5), \"worst_case\"=mul(\"current_mtd\",2)"
            }
          ],
          "options": {
            "showHeader": true
