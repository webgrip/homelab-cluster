---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: github-usage-billing
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "GitHub   folderRef: github-copilot Copilot"
  json: |-
    {
      "schemaVersion": 39,
      "title": "GitHub / Billing, Usage & Forecasts",
      "uid": "github-usage-billing",
      "timezone": "browser",
      "tags": [
        "github",
        "billing",
        "budgets",
        "copilot",
        "actions",
        "codespaces",
        "packages",
        "lfs"
      ],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "15m",
      "time": {
        "from": "now-30d",
        "to": "now"
      },
      "links": [
        {
          "title": "Executive Overview",
          "url": "/d/github-cost-executive/github-cost-and-copilot-executive-overview",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        },
        {
          "title": "Copilot Activity Overview",
          "url": "/d/copilot-activity-overview",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        },
        {
          "title": "Copilot Agent Performance",
          "url": "/d/copilot-agent-performance",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        },
        {
          "title": "Copilot Events & Traces",
          "url": "/d/copilot-code-impact",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
