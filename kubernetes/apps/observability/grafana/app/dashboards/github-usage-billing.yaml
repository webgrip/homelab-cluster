    {
      "schemaVersion": 39,
      "title": "GitHub / Usage, Billing & Forecasts",
      "uid": "github-usage-billing",
      "timezone": "browser",
      "tags": [
        "github",
        "billing",
        "budgets",
        "copilot",
        "actions",
        "codespaces",
        "packages",
        "lfs"
      ],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "15m",
      "time": {
        "from": "now-30d",
