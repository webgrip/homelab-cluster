apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-github-usage-billing
  namespace: observability
  annotations:
    grafana_folder: Copilot
  labels:
    grafana_dashboard: "1"
data:
  github-usage-billing.json: |-
    {
      "schemaVersion": 39,
      "title": "GitHub / Usage, Billing & Forecasts",
      "uid": "github-usage-billing",
      "timezone": "browser",
      "tags": [
        "github",
        "billing",
        "budgets",
        "copilot",
        "actions",
        "codespaces",
        "packages",
        "lfs"
      ],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "15m",
      "time": {
        "from": "now-30d",
        "to": "now"
      },
      "links": [
        {
          "title": "Copilot Activity Overview",
          "url": "/d/copilot-activity-overview",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        },
        {
          "title": "Copilot Agent Performance",
          "url": "/d/copilot-agent-performance",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        },
        {
          "title": "Copilot Events & Traces",
          "url": "/d/copilot-code-impact",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "name": "org",
            "label": "GitHub org",
            "type": "custom",
            "query": "webgrip",
            "current": {
              "selected": true,
              "text": "webgrip",
              "value": "webgrip"
            }
          },
          {
            "name": "username",
            "label": "GitHub user",
            "type": "query",
            "datasource": {
              "type": "yesoreyeram-infinity-datasource",
              "uid": "github-api"
            },
            "query": {
              "type": "json",
              "source": "url",
              "url": "https://api.github.com/orgs/$${org}/copilot/billing/seats?per_page=100",
              "parser": "backend",
              "root_selector": "seats",
              "columns": [
                { "selector": "assignee.login", "text": "login", "type": "string" }
              ]
            },
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false,
            "current": {
              "selected": false,
              "text": "$${__user.login}",
              "value": "$${__user.login}"
            }
          },
          {
            "name": "team",
            "label": "GitHub team",
            "type": "query",
            "datasource": {
              "type": "yesoreyeram-infinity-datasource",
              "uid": "github-api"
            },
            "query": {
              "type": "json",
              "source": "url",
              "url": "https://api.github.com/orgs/$${org}/teams?per_page=100",
              "parser": "backend",
              "root_selector": "",
              "columns": [
                { "selector": "slug", "text": "slug", "type": "string" },
                { "selector": "name", "text": "name", "type": "string" }
              ]
            },
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false,
            "current": {
              "selected": false,
              "text": "",
              "value": ""
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "",
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "## GitHub usage, billing, budgets & forecasts\nThis dashboard uses the provisioned **GitHub API** Infinity datasource. Use the **GitHub user** picker to scope user-level panels to yourself or any other Copilot seat holder in `$$org`. Use the **GitHub team** picker to scope the team-only panel to a specific team.\n\nThe **GitHub user** dropdown is pre-populated from the org's Copilot seats list and defaults to your own Grafana login (`$${__user.login}`). The **GitHub team** dropdown loads org teams and leaves team scope unselected until you pick one. Org owners can select any seat holder. The forecast projections are: **best case** = current MTD spend, **likeliest** = 1.5×, **worst case** = 2×."
          }
        },
        {
          "id": 2,
          "type": "row",
          "title": "Month-to-date spend",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 4
          },
          "panels": []
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Org MTD Net Spend",
          "description": "GET /organizations/{org}/settings/billing/usage/summary",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 5
          },
          "datasource": {
            "type": "yesoreyeram-infinity-datasource",
            "uid": "github-api"
          },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "url": "https://api.github.com/organizations/$${org}/settings/billing/usage/summary",
              "parser": "uql",
              "uql": "parse-json\n| scope \"usageItems\"\n| summarize \"net_amount\"=sum(\"netAmount\")"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "color": {
                "mode": "fixed",
                "fixedColor": "green"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Personal MTD Net Spend",
          "description": "GET /users/{username}/settings/billing/usage/summary. This only includes usage billed directly to the personal account; org-managed usage appears in the org panels.",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 5
          },
          "datasource": {
            "type": "yesoreyeram-infinity-datasource",
            "uid": "github-api"
          },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "url": "https://api.github.com/users/$${username}/settings/billing/usage/summary",
              "parser": "uql",
              "uql": "parse-json\n| scope \"usageItems\"\n| summarize \"net_amount\"=sum(\"netAmount\")"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
