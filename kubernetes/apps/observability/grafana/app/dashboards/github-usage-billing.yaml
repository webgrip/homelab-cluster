          "options": {
            "mode": "markdown",
            "content": "### Implemented as live source panels\n\n- Premium request burn-down inputs: premium budget cap + current premium spend.\n- Daily billing rows: source data for trailing 7-day/30-day anomaly review and seasonality-aware forecasts.\n- ARC utilization proxy: running vs pending pods in `arc-systems`.\n- Copilot behavior proxies: chat requests, agent requests, tool calls/chat, and edit-survival acceptance proxies.\n\n### Not directly exposed by current APIs/plan\n\n- Premium requests per repository: GitHub premium-request billing rows expose model/SKU but not repository.\n- Cost per active/engaged user: `/orgs/{org}/copilot/metrics` returns 404 for this org, so active/engaged users are not available.\n- Acceptance by language/editor: local telemetry exposes model and edit source, not language/editor.\n- GitHub queue depth for ARC: no queue metrics are currently scraped; pending pods are used as the cluster-side proxy.\n\nUse the daily billing source table for true seasonality/forecast work once Grafana transformations or a small scheduled exporter is added."
