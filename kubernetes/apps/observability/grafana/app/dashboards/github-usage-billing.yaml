      "templating": {
        "list": [
          {
            "name": "org",
            "label": "GitHub org",
            "type": "custom",
            "query": "webgrip",
            "current": {
              "selected": true,
              "text": "webgrip",
              "value": "webgrip"
            }
          },
          {
            "name": "username",
            "label": "GitHub user",
            "type": "textbox",
            "query": "ryangr0",
            "current": {
              "selected": true,
              "text": "ryangr0",
              "value": "ryangr0"
            },
            "options": [
              {
                "selected": true,
                "text": "ryangr0",
                "value": "ryangr0"
              }
            ]
          },
          {
            "name": "team",
            "label": "GitHub team",
            "type": "custom",
            "query": "application,backstage,grafana,infrastructure",
            "current": {
              "selected": true,
              "text": "application",
              "value": "application"
            },
            "options": [
              {"selected": true,  "text": "application",    "value": "application"},
              {"selected": false, "text": "backstage",      "value": "backstage"},
              {"selected": false, "text": "grafana",        "value": "grafana"},
              {"selected": false, "text": "infrastructure", "value": "infrastructure"}
            ]
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "",
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "## GitHub usage, billing, budgets & forecasts\nThis dashboard uses the provisioned **GitHub API** Infinity datasource. Use the **GitHub user** picker to scope user-level panels to yourself or any other Copilot seat holder in `$$org`. Use the **GitHub team** picker to scope the team-only panel to a specific team.\n\nThe **GitHub user** dropdown is pre-populated from the org's Copilot seats list and defaults to your own Grafana login (`$${__user.login}`). The **GitHub team** dropdown loads org teams and leaves team scope unselected until you pick one. Org owners can select any seat holder. The forecast projections are: **best case** = current MTD spend, **likeliest** = 1.5×, **worst case** = 2×."
          }
        },
        {
          "id": 2,
          "type": "row",
          "title": "Month-to-date spend",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 4
          },
          "panels": []
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Org MTD Net Spend",
          "description": "GET /organizations/{org}/settings/billing/usage/summary",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 5
          },
          "datasource": {
            "type": "yesoreyeram-infinity-datasource",
            "uid": "github-api"
          },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "url": "https://api.github.com/organizations/$${org}/settings/billing/usage/summary",
              "parser": "backend",
              "root_selector": "usageItems",
              "url_options": {"method": "GET", "data": ""}
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": ["sum"],
              "fields": "/^netAmount$/",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "color": {
                "mode": "fixed",
                "fixedColor": "green"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Copilot Seat Cost MTD",
          "description": "GET /organizations/{org}/settings/billing/usage/summary filtered to Copilot products.",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 5
          },
          "datasource": {
            "type": "yesoreyeram-infinity-datasource",
            "uid": "github-api"
          },
          "targets": [
            {
              "refId": "A",
              "type": "json",
