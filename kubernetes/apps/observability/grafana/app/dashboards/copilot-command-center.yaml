---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: copilot-command-center
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: github-copilot
  json: |-
    {
      "schemaVersion": 39,
      "title": "GitHub Copilot / Command Center",
      "uid": "copilot-command-center",
      "timezone": "browser",
      "tags": ["copilot", "ai", "opentelemetry", "genai", "github", "cost", "traces"],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {"from": "now-24h", "to": "now"},
      "links": [
        {"title": "Activity drill-down", "url": "/d/copilot-activity-overview", "type": "link", "icon": "external link"},
        {"title": "Performance drill-down", "url": "/d/copilot-agent-performance", "type": "link", "icon": "external link"},
        {"title": "Events, logs & traces", "url": "/d/copilot-code-impact", "type": "link", "icon": "external link"},
        {"title": "GitHub cost overview", "url": "/d/github-cost-executive", "type": "link", "icon": "external link"}
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "name": "org",
            "label": "GitHub org",
            "type": "custom",
            "query": "webgrip",
            "current": {"selected": true, "text": "webgrip", "value": "webgrip"}
          },
          {
            "name": "model",
            "label": "Model",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": {"query": "label_values(gen_ai_client_token_usage_count, gen_ai_request_model)", "refId": "Prometheus-model-Variable-Query"},
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "current": {"selected": true, "text": "All", "value": "$$__all"}
          },
          {
            "name": "service",
            "label": "Telemetry service",
            "type": "custom",
            "query": "copilot-chat,github-copilot,claude-code",
            "multi": true,
            "includeAll": true,
            "current": {"selected": true, "text": "All", "value": "$$__all"}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "",
          "gridPos": {"h": 4, "w": 24, "x": 0, "y": 0},
          "options": {
            "mode": "markdown",
            "content": "## Copilot Command Center\nOne operational view for VS Code/Copilot CLI agent telemetry, GitHub Copilot billing, and pivots into logs/traces. The repo already has the important VS Code OTel path: **Copilot -> OTLP/HTTP -> Alloy Gateway -> Tempo/Loki/Prometheus -> Grafana**.\n\nBest pivots: **model, service.name, agent name, operation, tool name, success/error, token type, edit source, trace ID, session ID, org, SKU, repository, and budget**. Keep content capture disabled unless you explicitly need prompt/tool payload inspection in a trusted environment."
          }
        },
        {"id": 2, "type": "row", "title": "1. Is Copilot healthy right now?", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 4}, "panels": []},
        {
          "id": 3,
          "type": "stat",
          "title": "Open Copilot/GitHub alerts",
          "description": "Any non-zero value means Alertmanager has an active GitHub, Copilot, or ARC alert.",
          "gridPos": {"h": 4, "w": 3, "x": 0, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(ALERTS{alertstate=\"firing\",alertname=~\"GitHub.*|Copilot.*|Arc.*\"}) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "value_and_name", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "red", "value": 1}]}}, "overrides": []}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Chat operations",
          "gridPos": {"h": 4, "w": 3, "x": 3, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(increase(gen_ai_client_operation_duration_seconds_count{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$$model\"}[$$__range])) or sum(increase(gen_ai_client_operation_duration_count{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$$model\"}[$$__range])) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "blue"}}, "overrides": []}
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Agent invocations",
          "gridPos": {"h": 4, "w": 3, "x": 6, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(increase(gen_ai_client_operation_duration_seconds_count{gen_ai_operation_name=\"invoke_agent\",gen_ai_request_model=~\"$$model\"}[$$__range])) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "purple"}}, "overrides": []}
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Chat latency P90",
          "gridPos": {"h": 4, "w": 3, "x": 9, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "histogram_quantile(0.9, sum by (le) (rate(gen_ai_client_operation_duration_seconds_bucket{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$$model\"}[$$__rate_interval]))) or histogram_quantile(0.9, sum by (le) (rate(gen_ai_client_operation_duration_bucket{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$$model\"}[$$__rate_interval]))) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 2, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 10}, {"color": "red", "value": 30}]}}, "overrides": []}
        },
        {
          "id": 7,
          "type": "stat",
          "title": "TTFT P90",
          "gridPos": {"h": 4, "w": 3, "x": 12, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "histogram_quantile(0.9, sum by (le) (rate(gen_ai_client_operation_time_to_first_chunk_seconds_bucket{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$$model\"}[$$__rate_interval]))) or histogram_quantile(0.9, sum by (le) (rate(copilot_chat_time_to_first_token_bucket[$$__rate_interval]))) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 2, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 5}, {"color": "red", "value": 10}]}}, "overrides": []}
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Tool failure ratio",
          "gridPos": {"h": 4, "w": 3, "x": 15, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "copilot:tool_failure_ratio:15m or (((sum(rate(github_copilot_tool_call_count_total{success!=\"true\"}[15m])) or vector(0)) + (sum(rate(copilot_chat_tool_call_count_total{success!=\"true\"}[15m])) or vector(0))) / clamp_min((sum(rate(github_copilot_tool_call_count_total[15m])) or vector(0)) + (sum(rate(copilot_chat_tool_call_count_total[15m])) or vector(0)), 1))", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "decimals": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 0.05}, {"color": "red", "value": 0.1}]}}, "overrides": []}
        },
        {
          "id": 9,
          "type": "stat",
          "title": "Premium budget used",
          "gridPos": {"h": 4, "w": 3, "x": 18, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(github_budget_usage_ratio{org=\"$${org}\",budget_product_sku=\"premium_requests\"}) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 0.7}, {"color": "red", "value": 0.9}]}}, "overrides": []}
        },
        {
          "id": 10,
          "type": "stat",
          "title": "MTD premium spend",
          "gridPos": {"h": 4, "w": 3, "x": 21, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(github_premium_request_mtd_net_amount_usd{org=\"$${org}\",model=\"all\",sku=\"all\"}) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2, "color": {"mode": "fixed", "fixedColor": "orange"}}, "overrides": []}
        },
        {"id": 11, "type": "row", "title": "2. Usage, latency, tokens and tools", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 9}, "panels": []},
        {
          "id": 12,
          "type": "timeseries",
          "title": "Copilot volume",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 10},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum(increase(gen_ai_client_operation_duration_seconds_count{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$$model\"}[$$__rate_interval])) or sum(increase(gen_ai_client_operation_duration_count{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$$model\"}[$$__rate_interval])) or vector(0)", "legendFormat": "chat operations"},
            {"refId": "B", "expr": "sum(increase(gen_ai_client_operation_duration_seconds_count{gen_ai_operation_name=\"invoke_agent\",gen_ai_request_model=~\"$$model\"}[$$__rate_interval])) or vector(0)", "legendFormat": "agent invocations"},
            {"refId": "C", "expr": "sum(increase(copilot_chat_session_count_total[$$__rate_interval])) or vector(0)", "legendFormat": "sessions"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never"}}, "overrides": []}
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Latency and response start",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 10},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "histogram_quantile(0.5, sum by (le) (rate(gen_ai_client_operation_duration_seconds_bucket{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$$model\"}[$$__rate_interval]))) or vector(0)", "legendFormat": "chat p50"},
            {"refId": "B", "expr": "histogram_quantile(0.9, sum by (le) (rate(gen_ai_client_operation_duration_seconds_bucket{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$$model\"}[$$__rate_interval]))) or vector(0)", "legendFormat": "chat p90"},
            {"refId": "C", "expr": "histogram_quantile(0.9, sum by (le) (rate(gen_ai_client_operation_time_to_first_chunk_seconds_bucket{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$$model\"}[$$__rate_interval]))) or histogram_quantile(0.9, sum by (le) (rate(copilot_chat_time_to_first_token_bucket[$$__rate_interval]))) or vector(0)", "legendFormat": "TTFT p90"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never"}}, "overrides": []}
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Token consumption",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 10},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum by (gen_ai_request_model, gen_ai_token_type) (rate(gen_ai_client_token_usage_sum{gen_ai_request_model=~\"$$model\"}[$$__rate_interval]))", "legendFormat": "{{gen_ai_request_model}} / {{gen_ai_token_type}}"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 20, "showPoints": "never", "stacking": {"mode": "normal", "group": "A"}}}, "overrides": []}
        },
        {
          "id": 15,
          "type": "bargauge",
          "title": "Top tools by call volume",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "topk(12, sort_desc((sum by (gen_ai_tool_name) (increase(github_copilot_tool_call_count_total[$$__range])) or vector(0)) + (sum by (gen_ai_tool_name) (increase(copilot_chat_tool_call_count_total[$$__range])) or vector(0))))", "instant": true}],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "continuous-BlYlRd"}}, "overrides": []}
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Tool calls by success",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum by (success) (rate(github_copilot_tool_call_count_total[$$__rate_interval])) or vector(0)", "legendFormat": "CLI {{success}}"},
            {"refId": "B", "expr": "sum by (success) (rate(copilot_chat_tool_call_count_total[$$__rate_interval])) or vector(0)", "legendFormat": "Chat {{success}}"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "ops", "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never"}}, "overrides": []}
        },
        {
          "id": 17,
          "type": "bargauge",
          "title": "Slowest CLI tools P90",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "topk(12, sort_desc(histogram_quantile(0.9, sum by (le, gen_ai_tool_name) (rate(github_copilot_tool_call_duration_seconds_bucket[$$__rate_interval]))))) or vector(0)", "instant": true}],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 2, "color": {"mode": "continuous-BlYlRd"}}, "overrides": []}
        },
        {"id": 18, "type": "row", "title": "3. Cost, adoption and seat hygiene", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 26}, "panels": []},
        {
          "id": 19,
          "type": "timeseries",
          "title": "Premium request spend by model",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 27},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max by (model, sku) (github_premium_request_mtd_net_amount_usd{org=\"$${org}\",model!=\"all\"})", "legendFormat": "{{model}} / {{sku}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 4, "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never"}}, "overrides": []}
        },
        {
          "id": 20,
          "type": "bargauge",
          "title": "Forecast and budget",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 27},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "max by (scenario) (github_billing_forecast_amount_usd{org=\"$${org}\",product=\"all\",sku=\"all\"})", "legendFormat": "forecast {{scenario}}"},
            {"refId": "B", "expr": "max by (budget_product_sku) (github_budget_remaining_usd{org=\"$${org}\",budget_product_sku=\"premium_requests\"})", "legendFormat": "premium budget remaining"}
          ],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "currencyUSD", "decimals": 2}, "overrides": []}
        },
        {
          "id": 21,
          "type": "stat",
          "title": "Inactive Copilot seats >30d",
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 27},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "count(github_copilot_seat_inactive_days{org=\"$${org}\"} > 30) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 1}, {"color": "red", "value": 3}]}}, "overrides": []}
        },
        {
          "id": 22,
          "type": "stat",
          "title": "Copilot active users",
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 27},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(github_copilot_metrics_total_active_users{org=\"$${org}\"}) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "blue"}}, "overrides": []}
        },
        {
          "id": 23,
          "type": "stat",
          "title": "Copilot engaged users",
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 31},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(github_copilot_metrics_total_engaged_users{org=\"$${org}\"}) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "green"}}, "overrides": []}
        },
        {
          "id": 24,
          "type": "stat",
          "title": "Assigned seats",
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 31},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(github_copilot_seats_total{org=\"$${org}\"}) or vector(0)", "instant": true}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "purple"}}, "overrides": []}
        },
        {"id": 25, "type": "row", "title": "4. Code impact and human feedback", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 35}, "panels": []},
        {
          "id": 26,
          "type": "timeseries",
          "title": "Edit acceptance decisions",
          "description": "Shows accepted/rejected agent edit decisions when VS Code emits edit acceptance telemetry.",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 36},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (copilot_chat_edit_source, decision) (increase(copilot_chat_edit_acceptance_count_total[$$__rate_interval])) or vector(0)", "legendFormat": "{{copilot_chat_edit_source}} / {{decision}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never"}}, "overrides": []}
        },
        {
          "id": 27,
          "type": "timeseries",
          "title": "Accepted lines of code",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 36},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (copilot_chat_edit_source, operation) (increase(copilot_chat_lines_of_code_count_total[$$__rate_interval])) or vector(0)", "legendFormat": "{{copilot_chat_edit_source}} / {{operation}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never"}}, "overrides": []}
        },
        {
          "id": 28,
          "type": "timeseries",
          "title": "Edit survival score",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 36},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "sum by (copilot_chat_edit_source) (increase(copilot_chat_edit_survival_no_revert_sum[$$__rate_interval])) / clamp_min(sum by (copilot_chat_edit_source) (increase(copilot_chat_edit_survival_no_revert_count[$$__rate_interval])), 1)", "legendFormat": "no revert / {{copilot_chat_edit_source}}"},
