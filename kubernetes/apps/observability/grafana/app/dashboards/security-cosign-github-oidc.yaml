---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: security-cosign-github-oidc
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "Security"
  json: |-
    {
      "schemaVersion": 39,
      "title": "Supply Chain / Cosign & GitHub OIDC",
      "uid": "security-cosign-github-oidc",
      "timezone": "browser",
      "tags": [
        "security",
        "cosign",
        "sigstore",
        "github-oidc",
        "slsa",
        "cyclonedx",
        "kyverno"
      ],
      "description": "Supply chain signing posture: image signature verification, attestation coverage, policy failures, and admission path health.",
      "editable": false,
      "graphTooltip": 1,
      "refresh": "5m",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timepicker": {
        "refresh_intervals": [
          "1m",
          "5m",
          "15m"
        ],
        "time_options": [
          "1h",
          "6h",
          "12h",
          "24h",
          "2d",
          "7d"
        ]
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "pluginId": "prometheus",
            "label": "Datasource",
            "hide": 0,
            "current": {}
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "label": "Namespace",
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "query": "label_values(policy_report_result{policy=~\"image-verify-audit|image-attestations-audit\"}, namespace)",
            "refresh": 2,
            "sort": 1,
            "current": {}
          },
          {
            "name": "policy",
            "type": "custom",
            "label": "Policy",
            "multi": true,
            "includeAll": true,
            "allValue": "image-verify-audit|image-attestations-audit",
            "query": "image-verify-audit,image-attestations-audit",
            "current": {}
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Supply Chain Health",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Images with Valid Signatures",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(policy_report_result{policy=~\"image-verify-audit|image-attestations-audit\",status=\"pass\"}) or on() vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Images Failing Signature Verification",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(policy_report_result{policy=~\"image-verify-audit|image-attestations-audit\",status=\"fail\"}) or on() vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Attestation Failures",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(policy_report_result{policy=~\"image-attestations-audit\",status=\"fail\"}) or on() vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Image Verify Evaluations / min",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(kyverno_policy_results_total{policy_name=~\"image-verify-audit|image-attestations-audit\"}[5m])) * 60 or on() vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "row",
          "title": "Signing Coverage",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "collapsed": false
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Signature Verification — Pass vs Fail Rate",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (status) (policy_report_result{policy=~\"image-verify-audit|image-attestations-audit\",namespace=~\"$namespace\"})",
              "legendFormat": "{{status}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "pass"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#73BF69"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "fail"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#F2495C"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "warn"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#FF9830"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 8,
          "type": "barchart",
          "title": "Unsigned Images by Namespace",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "instant": true,
              "format": "table",
              "expr": "sort_desc(sum by (namespace) (policy_report_result{policy=~\"image-verify-audit|image-attestations-audit\",status=\"fail\",namespace=~\"$namespace\"}))",
              "legendFormat": "{{namespace}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "xTickLabelRotation": -30
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "fail"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#F2495C"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 9,
          "type": "table",
          "title": "Unsigned or Unattested Resources",
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "policy_report_result{policy=~\"image-verify-audit|image-attestations-audit\",status=~\"fail|warn\",namespace=~\"$namespace\"}",
              "instant": true,
              "format": "table"
            }
          ],
          "options": {
            "showHeader": true
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "namespace": "Namespace",
                  "policy": "Policy",
                  "rule": "Rule",
                  "kind": "Kind",
                  "name": "Resource",
                  "status": "Status",
                  "Value": ""
                },
                "excludeByName": {
                  "Time": true,
                  "Value": true,
                  "__name__": true
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Status"
                },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-text"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "fail": {
                            "text": "❌ fail",
                            "color": "#F2495C",
                            "index": 0
                          },
                          "warn": {
                            "text": "⚠ warn",
                            "color": "#FF9830",
                            "index": 1
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 10,
          "type": "row",
          "title": "Policy Enforcement",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 24
          },
          "collapsed": false
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Image Hygiene & Supply-Chain Policy Results",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 25
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (status) (policy_report_result{policy=~\"image-hygiene-audit|image-supply-chain-audit\",namespace=~\"$namespace\"})",
              "legendFormat": "hygiene {{status}}"
            },
            {
              "refId": "B",
              "expr": "sum by (status) (policy_report_result{policy=~\"image-verify-audit|image-attestations-audit\",namespace=~\"$namespace\"})",
              "legendFormat": "verify {{status}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byRegexp",
                  "options": ".*fail.*"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#F2495C"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byRegexp",
                  "options": ".*pass.*"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#73BF69"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Kyverno Image Policy Results Total (rate)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 25
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (rule_result) (rate(kyverno_policy_results_total{policy_name=~\"image-verify-audit|image-attestations-audit|image-hygiene-audit|image-supply-chain-audit\"}[5m]))",
              "legendFormat": "{{result}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "pass"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#73BF69"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "fail"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#F2495C"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "warn"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#FF9830"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "error"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#808080"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 13,
          "type": "table",
          "title": "All Image-Related Policy Violations",
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 33
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "policy_report_result{policy=~\"image-verify-audit|image-attestations-audit|image-hygiene-audit|image-supply-chain-audit\",status=~\"fail|warn\",namespace=~\"$namespace\"}",
              "instant": true,
              "format": "table"
            }
          ],
          "options": {
            "showHeader": true
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "namespace": "Namespace",
                  "policy": "Policy",
                  "rule": "Rule",
                  "kind": "Kind",
                  "name": "Resource",
                  "status": "Status",
                  "category": "Category",
                  "severity": "Severity",
                  "Value": ""
                },
                "excludeByName": {
                  "Time": true,
                  "Value": true,
                  "__name__": true
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Status"
                },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-text"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "fail": {
                            "text": "❌ fail",
                            "color": "#F2495C",
                            "index": 0
                          },
                          "warn": {
                            "text": "⚠ warn",
                            "color": "#FF9830",
                            "index": 1
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 14,
          "type": "row",
          "title": "Admission Path Health",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 43
          },
          "collapsed": false
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "Kyverno Image Verification Admission Volume",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 44
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (resource_namespace, resource_kind) (rate(kyverno_admission_requests_total{resource_namespace=~\"$namespace\",resource_kind=~\"Pod|Deployment|StatefulSet|DaemonSet|Job|CronJob\"}[5m]))",
              "legendFormat": "{{resource_namespace}} {{resource_kind}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never"
              },
              "unit": "ops"
            },
            "overrides": []
          }
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Kyverno Admission Review Latency",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 44
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(kyverno_admission_review_duration_seconds_bucket[5m])))",
              "legendFormat": "p95"
            },
            {
              "refId": "B",
              "expr": "histogram_quantile(0.99, sum by (le) (rate(kyverno_admission_review_duration_seconds_bucket[5m])))",
              "legendFormat": "p99"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never"
              },
              "unit": "s"
            },
            "overrides": []
          }
        },
        {
          "id": 17,
          "type": "text",
          "title": "CI/CD Signing Requirements",
          "gridPos": {
            "h": 7,
            "w": 24,
            "x": 0,
            "y": 52
          },
          "options": {
            "mode": "markdown",
            "content": "Images under `ghcr.io/webgrip/*` are expected to be released by `webgrip/infrastructure` from `.github/workflows/on_release_published.yml`, signed keylessly with Cosign, and published with SLSA provenance plus a CycloneDX SBOM attestation against the immutable image digest.\n\nTrivy SARIF is uploaded to GitHub Security for vulnerability review. Admission remains audit-only until every internal image publishes the required evidence."
          }
        },
        {
          "id": 18,
          "type": "row",
          "title": "Container Evidence Matrix",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 59
          },
          "collapsed": false
        },
        {
          "id": 19,
          "type": "table",
          "title": "All Running Containers - OIDC, Attestation & SBOM Evidence",
          "description": "Live container inventory from kube-state-metrics joined with Kyverno PolicyReport results. Empty evidence columns mean the pod has no current report for that control, usually because the image is outside the audited policy scope or has not been admitted since reporting began.",
          "gridPos": {
            "h": 14,
            "w": 24,
            "x": 0,
            "y": 60
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max by (namespace, pod, container, image) (kube_pod_container_info{namespace=~\"$namespace\"})",
              "instant": true,
              "format": "table"
            },
            {
              "refId": "B",
