apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-copilot-agent-performance
  namespace: observability
  annotations:
    grafana_folder: Copilot
  labels:
    grafana_dashboard: "1"
data:
  copilot-agent-performance.json: |-
    {
      "schemaVersion": 39,
      "title": "GitHub Copilot / Agent Performance",
      "uid": "copilot-agent-performance",
      "timezone": "browser",
      "tags": [
        "copilot",
        "ai",
        "opentelemetry",
        "genai",
        "latency"
      ],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "1m",
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "links": [
        {
          "title": "Copilot Activity Overview",
          "url": "/d/copilot-activity-overview",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        },
        {
          "title": "Copilot Code Impact",
          "url": "/d/copilot-code-impact",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "name": "model",
            "label": "Model",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": "label_values(gen_ai_client_operation_duration_count, gen_ai_request_model)",
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            }
          },
          {
            "name": "quantile",
            "label": "Quantile",
            "type": "custom",
            "options": [
              {
                "selected": false,
                "text": "P50",
                "value": "0.5"
              },
              {
                "selected": true,
                "text": "P90",
                "value": "0.9"
              },
              {
                "selected": false,
                "text": "P99",
                "value": "0.99"
              }
            ],
            "current": {
              "selected": true,
              "text": "P90",
              "value": "0.9"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "",
          "gridPos": {
            "h": 3,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "## GitHub Copilot \u00b7 Agent Performance\nLatency, TTFT, tool call analysis, and errors. Uses **OTel metrics** (Prometheus) + **span metrics** (Tempo \u2192 Prometheus) + **raw traces** (Tempo TraceQL).\n\n\u26a0\ufe0f **Span metric prefix**: Tempo generates `traces_spanmetrics_*`. If missing, ensure Tempo span metrics pipeline is enabled (check `tempo` HelmRelease values for `metricsGenerator`). OTel metric names: `gen_ai_client_operation_duration` may have `_seconds` suffix depending on Alloy version."
          }
        },
        {
          "id": 2,
          "type": "row",
          "title": "Latency Summary",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 3
          },
          "panels": []
        },
        {
          "id": 3,
          "type": "stat",
          "title": "P90 LLM Latency",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.9, sum by (le) (rate(gen_ai_client_operation_duration_bucket{gen_ai_request_model=~\"$model\"}[$__rate_interval]))) or histogram_quantile(0.9, sum by (le) (rate(gen_ai_client_operation_duration_seconds_bucket{gen_ai_request_model=~\"$model\"}[$__rate_interval])))",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "s",
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
