    {
      "schemaVersion": 39,
      "title": "GitHub Copilot / Agent Latency & Performance",
      "uid": "copilot-agent-performance",
      "timezone": "browser",
      "tags": [
        "copilot",
        "ai",
        "opentelemetry",
        "genai",
        "latency"
      ],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "links": [
        {
          "title": "Copilot Activity Overview",
          "url": "/d/copilot-activity-overview",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        },
        {
          "title": "Copilot Events & Traces",
          "url": "/d/copilot-code-impact",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "name": "model",
            "label": "Model",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": {
              "query": "label_values(gen_ai_client_token_usage_count, gen_ai_request_model)",
              "refId": "Prometheus-model-Variable-Query"
            },
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "",
          "gridPos": {
            "h": 3,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "## GitHub Copilot \u00b7 Agent Performance\nAligned to the live schema: `gen_ai_client_operation_duration_seconds_*` for latency, `gen_ai_client_operation_time_to_first_chunk_seconds_*` for TTFT, `github_copilot_agent_turn_count_*` for agent turns, and `github_copilot_tool_call_*` for CLI-agent tools.\n\nTempo trace search is kept live for `service.name=\"copilot-chat\"`."
          }
        },
        {
          "id": 2,
          "type": "row",
          "title": "Latency Summary",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 3
          },
          "panels": []
        },
        {
          "id": 3,
          "type": "stat",
          "title": "P90 Chat Latency",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.9, sum by (le) (rate(gen_ai_client_operation_duration_seconds_bucket{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$model\"}[$__rate_interval]))) or histogram_quantile(0.9, sum by (le) (rate(gen_ai_client_operation_duration_bucket{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$model\"}[$__rate_interval])))",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 2,
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              }
            },
            "overrides": []
          }
        },
