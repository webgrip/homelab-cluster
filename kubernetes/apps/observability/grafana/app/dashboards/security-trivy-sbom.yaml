---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: security-trivy-sbom
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "Security"
  json: |-
    {
      "schemaVersion": 39,
      "title": "Trivy / Vulnerabilities & SBOM Posture",
      "uid": "security-trivy-sbom",
      "timezone": "browser",
      "tags": [
        "security",
        "trivy",
        "sbom",
        "cyclonedx",
        "supply-chain"
      ],
      "description": "SOC triage view: CVE counts, fixable criticals, EOSL images, config/RBAC findings, and scan coverage.",
      "editable": false,
      "graphTooltip": 1,
      "refresh": "5m",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timepicker": {
        "refresh_intervals": [
          "30s",
          "1m",
          "2m",
          "5m",
          "15m"
        ],
        "time_options": [
          "1h",
          "6h",
          "12h",
          "24h",
          "2d",
          "7d",
          "30d"
        ]
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "label": "Namespace",
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "query": "label_values(trivy_image_vulnerabilities, namespace)",
            "refresh": 2,
            "sort": 1,
            "current": {}
          },
          {
            "name": "severity",
            "type": "custom",
            "label": "Severity",
            "multi": true,
            "includeAll": true,
            "allValue": "Critical|High|Medium|Low|Unknown",
            "query": "Critical,High,Medium,Low,Unknown",
            "current": {}
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Risk Snapshot",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Critical Vulnerabilities",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(trivy_image_vulnerabilities{namespace=~\"$namespace\",severity=\"Critical\"}) or on() vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "High Vulnerabilities",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(trivy_image_vulnerabilities{namespace=~\"$namespace\",severity=\"High\"}) or on() vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Exposed Secrets in Images",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(trivy_image_exposedsecrets{namespace=~\"$namespace\"}) or on() vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "End-of-Life OS Images",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(trivy_image_info{namespace=~\"$namespace\",image_os_eosl=\"true\"}) or on() vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Images Scanned",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(count by (image_repository, image_tag) (trivy_image_info{namespace=~\"$namespace\"})) or on() vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "row",
          "title": "Vulnerability Breakdown",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "collapsed": false
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Vulnerabilities by Severity — Stacked Area",
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(trivy_image_vulnerabilities{namespace=~\"$namespace\",severity=\"Critical\"})",
              "legendFormat": "Critical"
            },
            {
              "refId": "B",
              "expr": "sum(trivy_image_vulnerabilities{namespace=~\"$namespace\",severity=\"High\"})",
              "legendFormat": "High"
            },
            {
              "refId": "C",
              "expr": "sum(trivy_image_vulnerabilities{namespace=~\"$namespace\",severity=\"Medium\"})",
              "legendFormat": "Medium"
            },
            {
              "refId": "D",
              "expr": "sum(trivy_image_vulnerabilities{namespace=~\"$namespace\",severity=\"Low\"})",
              "legendFormat": "Low"
            },
            {
              "refId": "E",
              "expr": "sum(trivy_image_vulnerabilities{namespace=~\"$namespace\",severity=\"Unknown\"})",
              "legendFormat": "Unknown"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never",
                "stacking": {
                  "mode": "normal",
                  "group": "A"
                }
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Critical"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#F2495C"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "High"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#FF9830"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Medium"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#FADE2A"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Low"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#5794F2"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Unknown"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#808080"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 10,
          "type": "barchart",
          "title": "Top 15 Most Vulnerable Workloads (Critical+High)",
          "gridPos": {
            "h": 9,
            "w": 6,
            "x": 12,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "instant": true,
              "format": "table",
              "expr": "topk(15, sum by (namespace, resource_name) (trivy_image_vulnerabilities{namespace=~\"$namespace\",severity=~\"Critical|High\"}))",
              "legendFormat": "{{namespace}}/{{resource_name}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "xTickLabelRotation": -30
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          }
        },
        {
          "id": 11,
          "type": "barchart",
          "title": "Critical+High Vulnerabilities by Namespace",
          "gridPos": {
            "h": 9,
            "w": 6,
            "x": 18,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "instant": true,
              "format": "table",
              "expr": "sort_desc(sum by (namespace) (trivy_image_vulnerabilities{namespace=~\"$namespace\",severity=~\"Critical|High\"}))",
              "legendFormat": "{{namespace}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "xTickLabelRotation": -30
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          }
        },
        {
          "id": 12,
          "type": "row",
          "title": "CVE Triage Table",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 15
          },
          "collapsed": false
        },
        {
          "id": 13,
          "type": "table",
          "title": "Critical & High CVEs — Triage View",
          "gridPos": {
            "h": 12,
            "w": 24,
            "x": 0,
            "y": 16
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace, resource_name, container_name, image_repository, image_tag, severity) (trivy_image_vulnerabilities{namespace=~\"$namespace\",severity=~\"Critical|High\"})",
              "instant": true,
              "format": "table"
            }
          ],
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Count",
                "desc": true
              }
            ]
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "namespace": "Namespace",
                  "resource_name": "Workload",
                  "container_name": "Container",
                  "image_repository": "Image Repository",
                  "image_tag": "Tag",
                  "severity": "Severity",
                  "Value": "Count"
                },
                "excludeByName": {
                  "Time": true
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Severity"
                },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-text"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "Critical": {
                            "text": "🔴 Critical",
                            "color": "#F2495C",
                            "index": 0
                          },
                          "High": {
                            "text": "🟠 High",
                            "color": "#FF9830",
                            "index": 1
                          },
                          "Medium": {
                            "text": "🟡 Medium",
                            "color": "#FADE2A",
                            "index": 2
                          },
                          "Low": {
                            "text": "🔵 Low",
                            "color": "#5794F2",
                            "index": 3
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 14,
          "type": "row",
          "title": "SBOM & Image Inventory",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 28
          },
          "collapsed": false
        },
        {
          "id": 15,
          "type": "stat",
          "title": "Total Unique Images",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 29
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(count by (image_repository, image_tag) (trivy_image_info{namespace=~\"$namespace\"})) or on() vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 16,
          "type": "stat",
          "title": "Images with EOSL OS",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 29
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(count by (image_repository, image_tag) (trivy_image_info{namespace=~\"$namespace\",image_os_eosl=\"true\"})) or on() vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 17,
          "type": "stat",
          "title": "Images from Non-Standard Registries",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 29
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(count by (image_registry, image_repository, image_tag) (trivy_image_info{namespace=~\"$namespace\",image_registry!~\"ghcr.io|docker.io|quay.io|registry.k8s.io|gcr.io|cr.l5d.io|lscr.io\"})) or on() vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 18,
          "type": "stat",
          "title": "Images with Critical/High CVEs",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 29
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(count by (image_repository, image_tag) (trivy_image_vulnerabilities{namespace=~\"$namespace\",severity=~\"Critical|High\"})) or on() vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 19,
          "type": "table",
          "title": "Image Inventory with OS Lifecycle",
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 33
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace, resource_kind, resource_name, image_registry, image_repository, image_tag, image_os_family, image_os_name, image_os_eosl) (trivy_image_info{namespace=~\"$namespace\"})",
              "instant": true,
              "format": "table"
            }
          ],
          "options": {
            "showHeader": true
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "namespace": "Namespace",
                  "resource_kind": "Kind",
                  "resource_name": "Workload",
                  "image_registry": "Registry",
                  "image_repository": "Repository",
                  "image_tag": "Tag",
                  "image_os_family": "OS Family",
                  "image_os_name": "OS Version",
                  "image_os_eosl": "EOSL",
                  "Value": ""
                },
                "excludeByName": {
                  "Time": true,
                  "Value": true
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "EOSL"
                },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-text"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "true": {
                            "text": "⚠ EOSL",
                            "color": "#F2495C",
                            "index": 0
                          },
                          "false": {
                            "text": "✅ OK",
                            "color": "#73BF69",
                            "index": 1
