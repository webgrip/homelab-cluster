---
# Imported from grafana.com (Sloth project) via the operator's grafanaCom source,
# so no third-party JSON is vendored/escaped. Maps the dashboard's DS_PROMETHEUS
# input to our Prometheus datasource. Reads Sloth-generated slo:sli_error:* rules.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: sloth-slo-high-level
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: observability
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "Prometheus"
  grafanaCom:
    id: 14643
    revision: 2
