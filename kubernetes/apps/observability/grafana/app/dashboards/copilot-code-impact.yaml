apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-copilot-code-impact
  namespace: observability
  annotations:
    grafana_folder: Copilot
  labels:
    grafana_dashboard: "1"
data:
  copilot-code-impact.json: |-
    {
      "schemaVersion": 39,
      "title": "GitHub Copilot / Code Impact & Quality",
      "uid": "copilot-code-impact",
      "timezone": "browser",
      "tags": [
        "copilot",
        "ai",
        "opentelemetry",
        "genai",
        "quality"
      ],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "5m",
      "time": {
        "from": "now-7d",
        "to": "now"
      },
      "links": [
        {
          "title": "Copilot Activity Overview",
          "url": "/d/copilot-activity-overview",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        },
        {
          "title": "Copilot Agent Performance",
          "url": "/d/copilot-agent-performance",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "",
          "gridPos": {
            "h": 3,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "## GitHub Copilot \u00b7 Code Impact & Quality\nMeasures the real-world impact of Copilot edits: acceptance rates, code survival (how much AI code persists after editing), lines contributed, and user satisfaction.\n\n**Survival scores** (0\u20131): `four_gram` = 4-gram text similarity after 5 min; `no_revert` = code not reverted within the session. Higher scores \u2192 AI-generated code is accepted and kept. **Attribute names may vary**: `action` vs `outcome` for acceptance, `direction` for added/removed LOC."
          }
        },
        {
          "id": 2,
          "type": "row",
          "title": "Quality Summary \u2014 Last $__range",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 3
          },
          "panels": []
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Edit Acceptance Rate",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(copilot_chat_edit_acceptance_count_total{action=\"accepted\"}[$__range])) / sum(increase(copilot_chat_edit_acceptance_count_total[$__range]))",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "unit": "percentunit",
              "color": {
                "mode": "fixed",
                "fixedColor": "green"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.3
                  },
                  {
                    "color": "green",
                    "value": 0.6
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Code Survival \u2014 4-gram P50",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.5, sum by (le) (rate(copilot_chat_edit_survival_four_gram_bucket[$__range])))",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "percentunit",
              "color": {
                "mode": "fixed",
                "fixedColor": "purple"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.5
                  },
                  {
                    "color": "green",
                    "value": 0.75
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Code Survival \u2014 No-Revert P50",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.5, sum by (le) (rate(copilot_chat_edit_survival_no_revert_bucket[$__range])))",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "percentunit",
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.5
                  },
                  {
                    "color": "green",
                    "value": 0.75
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Lines of Code Added",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(copilot_chat_lines_of_code_count_total{direction=\"added\"}[$__range])) or sum(increase(copilot_chat_lines_of_code_count_total[$__range]))",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "teal"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "teal",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "row",
          "title": "Edit Acceptance Over Time",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 8
          },
          "panels": []
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Edit Acceptance Rate Over Time",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 9
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(copilot_chat_edit_acceptance_count_total{action=\"accepted\"}[$__rate_interval])) / sum(rate(copilot_chat_edit_acceptance_count_total[$__rate_interval]))",
              "legendFormat": "Acceptance rate (action label)"
            },
            {
              "refId": "B",
              "expr": "sum(rate(copilot_chat_edit_acceptance_count_total{outcome=\"accepted\"}[$__rate_interval])) / sum(rate(copilot_chat_edit_acceptance_count_total[$__rate_interval]))",
              "legendFormat": "Acceptance rate (outcome label)"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never",
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byRegexp",
                  "options": "Acceptance rate.*"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "green"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Edit Decisions \u2014 Accepted vs Rejected",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 9
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(copilot_chat_edit_acceptance_count_total{action=~\"accepted|accepted.*\"}[$__rate_interval])) or sum(increase(copilot_chat_edit_acceptance_count_total{outcome=\"accepted\"}[$__rate_interval]))",
              "legendFormat": "Accepted"
            },
            {
              "refId": "B",
              "expr": "sum(increase(copilot_chat_edit_acceptance_count_total{action=~\"rejected.*\"}[$__rate_interval])) or sum(increase(copilot_chat_edit_acceptance_count_total{outcome=\"rejected\"}[$__rate_interval]))",
              "legendFormat": "Rejected"
            },
            {
              "refId": "C",
              "expr": "sum by (copilot_chat_edit_source) (increase(copilot_chat_edit_acceptance_count_total[$__rate_interval]))",
              "legendFormat": "By source: {{copilot_chat_edit_source}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Accepted"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "green"
                    }
                  },
                  {
                    "id": "custom.fillOpacity",
                    "value": 20
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Rejected"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "red"
                    }
                  },
                  {
                    "id": "custom.fillOpacity",
                    "value": 20
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "File-level Chat Edit Outcomes",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 17
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (outcome) (increase(copilot_chat_chat_edit_outcome_count_total[$__rate_interval])) or sum by (outcome) (increase(copilot_chat_chat_edit_outcome_count[$__rate_interval]))",
              "legendFormat": "{{outcome}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              }
            },
            "overrides": []
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Hunk-level Accept vs Reject (inline chat)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 17
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (action) (increase(copilot_chat_edit_acceptance_count_total{copilot_chat_edit_source=~\".*inline.*|.*hunk.*\"}[$__rate_interval])) or sum by (action) (increase(copilot_chat_edit_acceptance_count_total[$__rate_interval]))",
              "legendFormat": "{{action}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              }
            },
            "overrides": []
          }
        },
        {
          "id": 12,
          "type": "row",
          "title": "Code Survival Scores Over Time",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 25
          },
          "panels": []
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "4-gram Survival Score \u2014 P25 / P50 / P75",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 26
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.25, sum by (le) (rate(copilot_chat_edit_survival_four_gram_bucket[$__rate_interval])))",
              "legendFormat": "P25"
            },
            {
              "refId": "B",
              "expr": "histogram_quantile(0.5, sum by (le) (rate(copilot_chat_edit_survival_four_gram_bucket[$__rate_interval])))",
              "legendFormat": "P50 (median)"
            },
            {
              "refId": "C",
              "expr": "histogram_quantile(0.75, sum by (le) (rate(copilot_chat_edit_survival_four_gram_bucket[$__rate_interval])))",
              "legendFormat": "P75"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "P25"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "red"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "P50 (median)"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "yellow"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "P75"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "green"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "No-Revert Survival Score \u2014 P25 / P50 / P75",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 26
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.25, sum by (le) (rate(copilot_chat_edit_survival_no_revert_bucket[$__rate_interval])))",
              "legendFormat": "P25"
            },
            {
              "refId": "B",
              "expr": "histogram_quantile(0.5, sum by (le) (rate(copilot_chat_edit_survival_no_revert_bucket[$__rate_interval])))",
              "legendFormat": "P50 (median)"
            },
            {
              "refId": "C",
              "expr": "histogram_quantile(0.75, sum by (le) (rate(copilot_chat_edit_survival_no_revert_bucket[$__rate_interval])))",
              "legendFormat": "P75"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "P25"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "red"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "P50 (median)"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "yellow"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "P75"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "green"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 15,
          "type": "row",
          "title": "Code Volume",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 34
          },
          "panels": []
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Lines of Code Added / Removed Over Time",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 35
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(copilot_chat_lines_of_code_count_total{direction=\"added\"}[$__rate_interval])) or sum(increase(copilot_chat_lines_of_code_count_total[$__rate_interval]))",
              "legendFormat": "Added"
            },
            {
              "refId": "B",
              "expr": "sum(increase(copilot_chat_lines_of_code_count_total{direction=\"removed\"}[$__rate_interval]))",
              "legendFormat": "Removed"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "showPoints": "never",
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Added"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "green"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Removed"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "red"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 17,
          "type": "bargauge",
          "title": "Lines Added by Edit Source (Last $__range)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 35
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sort_desc(sum by (copilot_chat_edit_source) (increase(copilot_chat_lines_of_code_count_total[$__range])))",
              "legendFormat": "{{copilot_chat_edit_source}}",
              "instant": true
            }
          ],
          "options": {
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "blue",
                    "value": 100
                  },
                  {
                    "color": "purple",
                    "value": 1000
                  }
                ]
              },
              "color": {
                "mode": "continuous-GrYlRd"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 18,
          "type": "row",
          "title": "User Feedback & Satisfaction",
          "collapsed": false,
