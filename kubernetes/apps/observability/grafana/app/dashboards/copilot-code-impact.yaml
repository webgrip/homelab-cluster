---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: copilot-code-impact
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "GitHub & Copilot"
  json: |-
    {
      "schemaVersion": 39,
      "title": "GitHub Copilot / Events, Logs & Traces",
      "uid": "copilot-code-impact",
      "timezone": "browser",
      "tags": [
        "copilot",
        "ai",
        "opentelemetry",
        "genai",
        "logs",
        "traces"
      ],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "links": [
        {
          "title": "Copilot Activity Overview",
          "url": "/d/copilot-activity-overview",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        },
        {
          "title": "Copilot Agent Performance",
          "url": "/d/copilot-agent-performance",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "",
          "gridPos": {
            "h": 3,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "## GitHub Copilot \u00b7 Events, Logs & Traces\nVS Code currently emits rich **logs and traces**, but not the code-impact metrics the original dashboard assumed. This dashboard replaces the blank quality panels with live Loki and Tempo views: event volume, recent logs, inference details, and trace search.\n\nEvent labels confirmed live in Loki: `event_name in {copilot_chat.tool.call, gen_ai.client.inference.operation.details}` and `service_name=\"copilot-chat\"`."
          }
        },
        {
          "id": 2,
          "type": "row",
          "title": "Loki Event Summary",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 3
          },
          "panels": []
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Tool Call Events",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 4
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(count_over_time({service_name=\"copilot-chat\", event_name=\"copilot_chat.tool.call\"}[$__range]))",
              "queryType": "instant"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Inference Events",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 4
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(count_over_time({service_name=\"copilot-chat\", event_name=\"gen_ai.client.inference.operation.details\"}[$__range]))",
              "queryType": "instant"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "fixed",
                "fixedColor": "purple"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Tempo Span Calls",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(traces_spanmetrics_calls_total{service=\"copilot-chat\"}[$__range])) or vector(0)",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "fixed",
                "fixedColor": "green"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Alloy Exported Spans",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(otelcol_exporter_sent_spans_total[$__range])) or vector(0)",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "fixed",
                "fixedColor": "orange"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "row",
          "title": "Event Volume Over Time",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 8
          },
          "panels": []
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Loki Event Volume by Event Name",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 9
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (event_name) (count_over_time({service_name=\"copilot-chat\"}[$__interval]))",
              "queryType": "range",
              "legendFormat": "{{event_name}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 12,
                "showPoints": "never"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Tokens by Model Over Time",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 9
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (gen_ai_request_model, gen_ai_token_type) (rate(gen_ai_client_token_usage_sum[$__rate_interval]))",
              "legendFormat": "{{gen_ai_request_model}} / {{gen_ai_token_type}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              }
            },
            "overrides": []
          }
        },
        {
          "id": 10,
          "type": "bargauge",
          "title": "Inference Operations by Model",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 17
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sort_desc(sum by (gen_ai_request_model) (increase(gen_ai_client_token_usage_count[$__range])))",
              "instant": true
            }
          ],
          "options": {
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "continuous-BlYlRd"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 11,
          "type": "bargauge",
          "title": "CLI Tool Calls by Tool",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 17
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sort_desc(sum by (gen_ai_tool_name) (increase(github_copilot_tool_call_count_total[$__range])))",
              "instant": true
            }
          ],
          "options": {
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "continuous-BlYlRd"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 12,
          "type": "row",
          "title": "Recent Logs",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 25
          },
          "panels": []
        },
        {
          "id": 13,
          "type": "logs",
          "title": "Recent Copilot Logs",
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 26
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "{service_name=\"copilot-chat\"}",
              "queryType": "range",
              "direction": "backward",
              "maxLines": 200
            }
          ],
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending"
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          }
        },
        {
          "id": 14,
          "type": "logs",
          "title": "Recent Inference Detail Events",
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 36
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "{service_name=\"copilot-chat\", event_name=\"gen_ai.client.inference.operation.details\"}",
              "queryType": "range",
              "direction": "backward",
              "maxLines": 200
            }
          ],
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending"
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          }
        },
        {
          "id": 15,
          "type": "row",
          "title": "Tempo Traces",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 46
          },
          "panels": []
        },
        {
          "id": 16,
          "type": "traces",
          "title": "Recent Copilot Traces",
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 47
          },
          "datasource": {
            "type": "tempo",
            "uid": "tempo"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "tempo",
                "uid": "tempo"
              },
              "queryType": "traceql",
              "query": "{resource.service.name=\"copilot-chat\"}",
              "limit": 20,
              "tableType": "traces"
            }
          ],
          "options": {},
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          }
        },
        {
          "id": 17,
          "type": "timeseries",
          "title": "Span Calls by Kind / Status",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 57
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (span_kind, status_code) (rate(traces_spanmetrics_calls_total{service=\"copilot-chat\"}[$__rate_interval]))",
              "legendFormat": "{{span_kind}} / {{status_code}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              }
            },
            "overrides": []
          }
        },
        {
          "id": 18,
          "type": "timeseries",
          "title": "Tool Success by Tool Name",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 57
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (gen_ai_tool_name, success) (increase(github_copilot_tool_call_count_total[$__rate_interval]))",
              "legendFormat": "{{gen_ai_tool_name}} / success={{success}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "stacking": {
                  "mode": "none",
                  "group": "A"
                }
              }
            },
            "overrides": []
          }
        }
      ]
    }
