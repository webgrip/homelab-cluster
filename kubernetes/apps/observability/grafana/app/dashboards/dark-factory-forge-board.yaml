---
# Dark Factory — Forge & Board Activity.
# The OUTPUT dashboard: what lands on the forge (Forgejo) and the board (Vikunja) —
# issues, releases, webhook fan-out, agent-produced PRs, ticket states.
# Forge-native panels (gitea_*, ns-forgejo runner logs) legitimately stay on forgejo
# sources and are labeled "CI pool"; agent-side intake reads ns ploeg (ploegd logfmt)
# and the authoritative ploeg-db record.
# CNPG caveat (live-verified 2026-07-24): cnpg_* series are duplicated under 4 scrape
# `job` values — always aggregate with max, never sum, or rates over-count ~8x.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: dark-factory-forge-board
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: ai
  json: |-
    {
      "schemaVersion": 39,
      "title": "Dark Factory — Forge & Board Activity",
      "uid": "dark-factory-forge-board",
      "timezone": "browser",
      "tags": [
        "dark-factory",
        "forgejo",
        "vikunja"
      ],
      "editable": false,
      "graphTooltip": 1,
      "refresh": "1m",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "links": [
        {
          "type": "dashboards",
          "title": "Dark Factory",
          "tags": [
            "dark-factory"
          ],
          "asDropdown": true,
          "includeVars": false,
          "keepTime": true
        },
        {
          "type": "link",
          "title": "LiteLLM Spend & Budgets",
          "url": "/d/litellm-spend",
          "icon": "dollar"
        },
        {
          "type": "link",
          "title": "LiteLLM Reliability",
          "url": "/d/litellm-reliability",
          "icon": "bolt"
        },
        {
          "type": "link",
          "title": "Forgejo CI Command Center",
          "url": "/d/infra-forgejo-ci",
          "icon": "external link"
        },
        {
          "type": "link",
          "title": "Claude Code Command Center",
          "url": "/d/claude-code-command-center",
          "icon": "external link"
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "At a glance",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Open issues now",
          "description": "Current open issues across all repos on the forge (gitea_issues_open gauge).",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 0,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(gitea_issues_open)",
              "instant": false
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Issues closed (range)",
          "description": "Net change in the gitea_issues_closed gauge over the range; a reopened issue subtracts.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 3,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(delta(gitea_issues_closed[$$__range])) or vector(0)",
              "instant": false
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Releases cut (range)",
          "description": "Net new releases across all repos over the range (gitea_releases gauge delta).",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 6,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(delta(gitea_releases[$$__range])) or vector(0)",
              "instant": false
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Webhook deliveries (range)",
          "description": "Net new webhook delivery tasks over the range (gitea_hooktasks delta) — the forge fan-out to CI, Renovate, and friends; hook-task pruning can dip it negative.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 9,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(delta(gitea_hooktasks[$$__range])) or vector(0)",
              "instant": false
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Repos Δ (range)",
          "description": "Net change in forge repository count over the range (gitea_repositories gauge delta); negative = deletions outpaced creations.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 12,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(delta(gitea_repositories[$$__range])) or vector(0)",
              "instant": false
            }
          ]
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Tickets worked by agents",
          "description": "Distinct Vikunja tickets with at least one ploeg agent run, via the ticket label on ploeg_run_started_epoch (exporter-retained runs only).",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 15,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "count(count by (ticket) (ploeg_run_started_epoch{ticket!=\"none\"})) or vector(0)",
              "instant": false
            }
          ]
        },
        {
          "id": 8,
          "type": "stat",
          "title": "PRs opened (ploeg record)",
          "description": "Distinct work items with a pr_opened checkpoint in range, from the authoritative ploeg-db checkpoints table.",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ploeg-db"
          },
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 18,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ploeg-db"
              },
              "rawQuery": true,
              "format": "table",
              "rawSql": "SELECT count(DISTINCT work_item_id) AS prs_opened FROM checkpoints WHERE phase = 'pr_opened' AND $$__timeFilter(created_at)"
            }
          ]
        },
        {
          "id": 9,
          "type": "stat",
          "title": "Ploeg Test tasks still open",
          "description": "Vikunja tasks not done on the Ploeg Test board (project 11, vikunja-db) — current state, range-independent.",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "vikunja-db"
          },
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 21,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "vikunja-db"
              },
              "rawQuery": true,
              "format": "table",
              "rawSql": "SELECT count(*) AS open_tasks FROM tasks WHERE project_id = 11 AND NOT done"
            }
          ]
        },
        {
          "id": 10,
          "type": "row",
          "title": "Forge activity",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Open issues (trend)",
          "description": "Absolute open-issue count across the forge (gitea_issues_open); split from closed issues because closed runs about 9x larger.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 12,
                "showPoints": "never",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "open",
              "expr": "sum(gitea_issues_open)"
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Closed issues (trend)",
          "description": "Absolute closed-issue count across the forge (gitea_issues_closed); adjacent to the open trend on its own axis — same unit, very different magnitude.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 12,
                "showPoints": "never",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "closed",
              "expr": "sum(gitea_issues_closed)"
            }
          ]
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Webhook fan-out rate",
          "description": "Per-interval net new webhook delivery tasks (gitea_hooktasks delta) — the forge-to-factory trigger signal; pruning can dip it negative.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 80,
                "lineWidth": 1,
                "showPoints": "never",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "legendFormat": "webhook deliveries",
              "expr": "sum(delta(gitea_hooktasks[$$__rate_interval]))"
            }
          ]
        },
        {
          "id": 14,
          "type": "row",
          "title": "Run pickups & work intake",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 14
          }
        },
        {
          "id": 15,
          "type": "table",
          "title": "CI runs by repo (range)",
          "description": "CI pool only — run pickups per repo parsed from the ns-forgejo runner 'repo is owner/repo' lines. Agent work never flows through this pool.",
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "victorialogs"
          },
          "gridPos": {
            "h": 9,
            "w": 8,
            "x": 0,
            "y": 15
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "CI runs",
                "desc": true
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "victoriametrics-logs-datasource",
                "uid": "victorialogs"
              },
              "queryType": "instant",
              "expr": "{namespace=\"forgejo\", container=\"runner\"} pod:~\"forgejo-runner-.*\" ~\"repo is\" | extract_regexp \"repo is (?P<repo>\\\\S+)\" | filter -repo:\"\" | stats by (repo) count() ci_runs"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true
                },
                "renameByName": {
                  "repo": "Repo",
                  "ci_runs": "CI runs"
                }
              }
            },
            {
              "id": "convertFieldType",
              "options": {
                "conversions": [
                  {
                    "targetField": "CI runs",
                    "destinationType": "number"
                  }
                ]
              }
            }
          ]
        },
        {
          "id": 16,
          "type": "logs",
          "title": "CI run pickups (forgejo)",
          "description": "Raw 'repo is' pickup lines from the CI pool runners in ns forgejo. Agent-side intake is the Work intake panel to the right.",
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "victorialogs"
          },
          "gridPos": {
            "h": 9,
            "w": 8,
            "x": 8,
            "y": 15
          },
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "victoriametrics-logs-datasource",
                "uid": "victorialogs"
              },
              "queryType": "instant",
              "maxLines": 100,
              "expr": "{namespace=\"forgejo\", container=\"runner\"} ~\"repo is\" | unpack_logfmt"
            }
          ]
        },
        {
          "id": 17,
          "type": "table",
          "title": "Work intake (ploeg)",
          "description": "Every 'work item queued' intake line from ploegd (logfmt-unpacked): work-item id, team, and ticket title — the agent-side twin of the CI pickups feed.",
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "victorialogs"
          },
          "gridPos": {
            "h": 9,
            "w": 8,
            "x": 16,
            "y": 15
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "sortBy": []
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "victoriametrics-logs-datasource",
                "uid": "victorialogs"
              },
              "queryType": "instant",
              "maxLines": 100,
              "expr": "{namespace=\"ploeg\", container=\"ploegd\"} \"work item queued\" | unpack_logfmt | fields _time, id, team, title | sort by (_time desc)"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {},
                "renameByName": {
                  "_time": "Time",
                  "id": "Work item",
                  "team": "Team",
                  "title": "Title"
                }
              }
            }
          ]
        },
        {
          "id": 18,
          "type": "row",
          "title": "Factory record (ploeg)",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 24
          }
        },
        {
          "id": 19,
          "type": "table",
          "title": "Factory record",
          "description": "Authoritative ploeg-db record: one row per work item with run and PR counts plus the latest PR link. State done means the run finished — NOT that the PR merged; merging stays with a human.",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ploeg-db"
          },
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 25
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "State"
                },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "queued": {
                            "text": "Queued",
                            "color": "yellow"
                          },
                          "done": {
                            "text": "Done",
                            "color": "green"
                          },
                          "running": {
                            "text": "Running",
                            "color": "blue"
                          },
                          "failed": {
                            "text": "Failed",
                            "color": "red"
                          },
                          "stuck": {
                            "text": "Stuck",
                            "color": "orange"
                          }
                        }
                      }
                    ]
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Latest PR"
                },
                "properties": [
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "Open PR",
                        "url": "$${__value.text}",
                        "targetBlank": true
                      }
                    ]
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Ticket",
                "desc": true
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ploeg-db"
              },
              "rawQuery": true,
              "format": "table",
              "rawSql": "SELECT w.external_id AS ticket, left(w.title,60) AS title, w.state, w.attempts, count(DISTINCT r.id) AS runs, count(DISTINCT r.id) FILTER (WHERE r.outcome = 'pr_opened') AS prs, coalesce(max(c.pr_url) FILTER (WHERE c.pr_url <> ''), '') AS latest_pr FROM work_items w LEFT JOIN agent_runs r ON r.work_item_id = w.id LEFT JOIN checkpoints c ON c.work_item_id = w.id GROUP BY 1, 2, 3, 4 ORDER BY ticket DESC"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {},
                "renameByName": {
                  "ticket": "Ticket",
                  "title": "Title",
                  "state": "State",
                  "attempts": "Attempts",
                  "runs": "Runs",
                  "prs": "PRs opened",
                  "latest_pr": "Latest PR"
                }
              }
            }
          ]
        },
