---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: claude-code-errors-reliability
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: claude-code
  json: |-
    {
      "schemaVersion": 39,
      "title": "Claude Code / Errors & Reliability",
      "uid": "claude-code-errors-reliability",
      "timezone": "browser",
      "tags": ["claude-code", "ai", "anthropic", "errors", "reliability"],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {"from": "now-24h", "to": "now"},
      "links": [
        {"title": "Command Center", "url": "/d/claude-code-command-center", "type": "link", "icon": "external link"},
        {"title": "Cost & Tokens", "url": "/d/claude-code-cost-tokens", "type": "link", "icon": "dollar"},
        {"title": "Activity & Tools", "url": "/d/claude-code-activity-tools", "type": "link", "icon": "bolt"},
        {"title": "Events, Logs & Traces", "url": "/d/claude-code-events-traces", "type": "link", "icon": "doc"},
        {"title": "Provider Comparison", "url": "/d/claude-code-provider-comparison", "type": "link", "icon": "percentage"}
      ],
      "annotations": {
        "list": [
          {"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}
        ]
      },
      "templating": {"list": []},
      "panels": [
        {
          "id": 1, "type": "text", "title": "", "gridPos": {"h": 3, "w": 24, "x": 0, "y": 0},
          "options": {"mode": "markdown", "content": "## Claude Code Errors & Reliability\nFailure-focused view sourced from Loki `claude-code` events. Top stats count `api_error`, `api_refusal`, `internal_error` and failed `tool_result` over the dashboard range. Breakdowns split errors by `status_code` and `model`, classify internal errors, and rank tool failures and per-tool success ratio. The forensics row tracks API **retry attempts** (`attempt` greater than 1) and streams recent `api_error` / `internal_error` log lines — expand any line for the full `| json` field set."}
        },
        {"id": 2, "type": "row", "title": "1. API errors", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 3}, "panels": []},
        {
          "id": 3, "type": "stat", "title": "API errors (range)", "description": "Count of api_error events over the dashboard range.", "gridPos": {"h": 4, "w": 4, "x": 0, "y": 4},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum(count_over_time({service_name=\"claude-code\", event_name=\"api_error\"}[$$__range])) or vector(0)", "queryType": "instant"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 1}, {"color": "red", "value": 10}]}}, "overrides": []}
        },
        {
          "id": 4, "type": "stat", "title": "API refusals (range)", "description": "Responses with stop_reason=refusal.", "gridPos": {"h": 4, "w": 4, "x": 4, "y": 4},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum(count_over_time({service_name=\"claude-code\", event_name=\"api_refusal\"}[$$__range])) or vector(0)", "queryType": "instant"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "red", "value": 1}]}}, "overrides": []}
        },
        {
          "id": 5, "type": "stat", "title": "Internal errors (range)", "description": "Count of internal_error events over the range.", "gridPos": {"h": 4, "w": 4, "x": 8, "y": 4},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum(count_over_time({service_name=\"claude-code\", event_name=\"internal_error\"}[$$__range])) or vector(0)", "queryType": "instant"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 1}, {"color": "red", "value": 5}]}}, "overrides": []}
        },
        {
          "id": 6, "type": "stat", "title": "Tool failures (range)", "description": "tool_result events with success=false over the range.", "gridPos": {"h": 4, "w": 4, "x": 12, "y": 4},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum(count_over_time({service_name=\"claude-code\", event_name=\"tool_result\"} | json success=\"attributes.success\" | success=\"false\" [$$__range])) or vector(0)", "queryType": "instant"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "yellow", "value": 1}, {"color": "red", "value": 10}]}}, "overrides": []}
        },
        {
          "id": 7, "type": "timeseries", "title": "Errors over time by event_name", "description": "api_error, api_refusal and internal_error volume bucketed over time.", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 4},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum by (event_name) (count_over_time({service_name=\"claude-code\", event_name=~\"api_error|api_refusal|internal_error\"}[$$__interval]))", "queryType": "range", "legendFormat": "{{event_name}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 12, "showPoints": "auto", "drawStyle": "bars"}}, "overrides": []}
        },
        {"id": 8, "type": "row", "title": "2. Error breakdown", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 12}, "panels": []},
        {
          "id": 9, "type": "timeseries", "title": "API errors by status & model", "description": "api_error volume split by status_code and model.", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 13},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum by (status_code, model) (count_over_time({service_name=\"claude-code\", event_name=\"api_error\"} | json status_code=\"attributes.status_code\", model=\"attributes.model\" [$$__interval]))", "queryType": "range", "legendFormat": "{{model}} / {{status_code}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "auto", "drawStyle": "bars"}, "color": {"mode": "palette-classic"}}, "overrides": []}
        },
        {
          "id": 10, "type": "bargauge", "title": "Errors by status_code", "description": "api_error count grouped by HTTP status_code over the range.", "gridPos": {"h": 8, "w": 4, "x": 12, "y": 13},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum by (status_code) (count_over_time({service_name=\"claude-code\", event_name=\"api_error\"} | json status_code=\"attributes.status_code\" [$$__range]))", "queryType": "instant", "legendFormat": "{{status_code}}"}],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "continuous-BlYlRd"}}, "overrides": []}
        },
        {
          "id": 11, "type": "bargauge", "title": "Errors by model", "description": "api_error count grouped by model over the range.", "gridPos": {"h": 8, "w": 4, "x": 16, "y": 13},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum by (model) (count_over_time({service_name=\"claude-code\", event_name=\"api_error\"} | json model=\"attributes.model\" [$$__range]))", "queryType": "instant", "legendFormat": "{{model}}"}],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "continuous-GrYlRd"}}, "overrides": []}
        },
        {
          "id": 12, "type": "table", "title": "Internal errors by class", "description": "internal_error count grouped by error_name over the range.", "gridPos": {"h": 8, "w": 4, "x": 20, "y": 13},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum by (error_name) (count_over_time({service_name=\"claude-code\", event_name=\"internal_error\"} | json error_name=\"attributes.error_name\" [$$__range]))", "queryType": "instant", "legendFormat": "{{error_name}}"}],
          "transformations": [{"id": "organize", "options": {"excludeByName": {"Time": true}, "renameByName": {"error_name": "Error class", "Value": "Count"}}}],
          "options": {"showHeader": true, "sortBy": [{"displayName": "Count", "desc": true}]},
          "fieldConfig": {"defaults": {"decimals": 0, "custom": {"align": "auto", "filterable": true}}, "overrides": [{"matcher": {"id": "byName", "options": "Count"}, "properties": [{"id": "custom.width", "value": 70}]}]}
        },
        {"id": 13, "type": "row", "title": "3. Tool reliability", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 21}, "panels": []},
        {
          "id": 14, "type": "bargauge", "title": "Tool failure count by tool", "description": "Top 15 tools by failed (success=false) tool_result events over the range.", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 22},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "topk(15, sum by (tool_name) (count_over_time({service_name=\"claude-code\", event_name=\"tool_result\"} | json tool_name=\"attributes.tool_name\", success=\"attributes.success\" | success=\"false\" [$$__range])))", "queryType": "instant", "legendFormat": "{{tool_name}}"}],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "gradient", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "continuous-BlYlRd"}}, "overrides": []}
        },
        {
          "id": 15, "type": "bargauge", "title": "Tool success ratio by tool", "description": "Per-tool success=true tool_result count divided by all tool_result count over the range.", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 22},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum by (tool_name) (count_over_time({service_name=\"claude-code\", event_name=\"tool_result\"} | json tool_name=\"attributes.tool_name\", success=\"attributes.success\" | success=\"true\" [$$__range])) / sum by (tool_name) (count_over_time({service_name=\"claude-code\", event_name=\"tool_result\"} | json tool_name=\"attributes.tool_name\" [$$__range]))", "queryType": "instant", "legendFormat": "{{tool_name}}"}],
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "displayMode": "basic", "valueMode": "color"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "decimals": 2, "min": 0, "max": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "red"}, {"color": "yellow", "value": 0.9}, {"color": "green", "value": 0.98}]}, "color": {"mode": "thresholds"}}, "overrides": []}
        },
        {"id": 16, "type": "row", "title": "4. Retries & forensics", "collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 30}, "panels": []},
        {
          "id": 17, "type": "timeseries", "title": "Retry attempts (api_error attempt>1)", "description": "api_error events where the retry attempt is not the first try.", "gridPos": {"h": 9, "w": 8, "x": 0, "y": 31},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "sum(count_over_time({service_name=\"claude-code\", event_name=\"api_error\"} | json attempt=\"attributes.attempt\" | attempt!=\"1\" [$$__interval]))", "queryType": "range", "legendFormat": "retries"}],
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2, "fillOpacity": 12, "showPoints": "auto", "drawStyle": "bars"}, "color": {"mode": "fixed", "fixedColor": "orange"}}, "overrides": []}
        },
        {
          "id": 18, "type": "logs", "title": "Recent errors", "description": "Recent api_error and internal_error log lines. Expand a line for the full json field set.", "gridPos": {"h": 9, "w": 16, "x": 8, "y": 31},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [{"refId": "A", "expr": "{service_name=\"claude-code\", event_name=~\"api_error|internal_error\"} | json", "queryType": "range", "direction": "backward", "maxLines": 200}],
          "options": {"dedupStrategy": "none", "enableLogDetails": true, "prettifyLogMessage": true, "showCommonLabels": false, "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true},
          "fieldConfig": {"defaults": {}, "overrides": []}
        }
      ]
    }
