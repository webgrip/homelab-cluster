            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "unit": "bytes"
            },
            "overrides": []
