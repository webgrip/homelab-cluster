            "h": 4,
            "w": 3,
            "x": 3,
            "y": 1
          }
        },
        {
          "type": "stat",
          "title": "Restarts (1h)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"arc-systems\"}[1h])) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
