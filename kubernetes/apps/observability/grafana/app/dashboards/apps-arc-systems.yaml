          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(container_oom_events_total{namespace=\"arc-systems\"}[24h])) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
