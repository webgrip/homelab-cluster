          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 75
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 9,
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 21,
            "y": 1
          }
        },
        {
          "id": 10,
          "type": "row",
          "title": "GitHub Actions runners (ARC)",
          "collapsed": false,
          "gridPos": {
