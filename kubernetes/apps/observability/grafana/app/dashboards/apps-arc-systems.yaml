              "refId": "A",
              "expr": "(100 * sum(gha_busy_runners{namespace=\"arc-systems\"}) / clamp_min(sum(gha_registered_runners{namespace=\"arc-systems\"}), 1)) or vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
