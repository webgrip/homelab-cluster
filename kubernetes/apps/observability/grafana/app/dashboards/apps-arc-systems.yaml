          "title": "Max PVC used",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max((kubelet_volume_stats_used_bytes{namespace=\"arc-systems\"} / kubelet_volume_stats_capacity_bytes{namespace=\"arc-systems\"}) * 100) or vector(0)",
              "legendFormat": ""
