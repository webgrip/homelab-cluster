        "from": "now/M",
        "to": "now"
      },
      "tags": [
        "claude-code",
        "ai",
        "anthropic",
        "energy",
        "sustainability",
        "co2"
      ],
      "links": [
        {
          "title": "Command Center",
          "url": "/d/claude-code-command-center",
          "type": "link",
          "icon": "external link"
        },
        {
          "title": "Cost & Tokens",
          "url": "/d/claude-code-cost-tokens",
          "type": "link",
          "icon": "dollar"
