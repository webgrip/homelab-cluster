        {
          "id": 1,
          "type": "text",
          "title": "",
          "gridPos": {
            "h": 5,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "## Energy & Environmental Footprint\nRough **estimates** of the energy, carbon and water behind your Claude Code usage, derived from **token volume \u00d7 tunable coefficients** (top of dashboard). Anthropic publishes no official per-token figure, so treat these as order-of-magnitude, not measurements.\n\n**Model:** facility energy = tokens \u00d7 **Wh per 1k tokens** \u00f7 1000 \u00d7 **PUE** (data-centre overhead). CO\u2082e = energy \u00d7 **grid gCO\u2082e/kWh**. Water = energy \u00d7 **L/kWh** (cooling + generation). Equivalents: car \u2248 120 gCO\u2082e/km; phone charge \u2248 0.012 kWh.\n\n_This workload is ~99% cache reads, which are cheaper to serve than fresh generation \u2014 so the default Wh/1k is conservative; tune it if you have a better figure. Time range = this month; the Projected row extrapolates the month-to-date run-rate to the full month._"
          }
        },
        {
          "id": 2,
          "type": "row",
          "title": "This month so far",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "panels": []
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Energy",
          "description": "Estimated facility electricity (kWh) for this month's tokens.",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "(sum(increase(claude_code_token_usage_tokens_total[$$__range])) * $$wh_per_ktok / 1e6) * $$pue or vector(0)",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "kwatth",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "text"
                  }
                ]
              }
            },
            "overrides": []
          }
        },
