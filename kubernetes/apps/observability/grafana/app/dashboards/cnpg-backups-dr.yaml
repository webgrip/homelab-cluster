---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cnpg-backups-dr
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "Data"
  json: |-
    {
      "schemaVersion": 39,
      "title": "CloudNativePG / Backup & Recovery",
      "uid": "db-cnpg-backups-dr",
      "timezone": "browser",
      "tags": ["databases", "cnpg"],
      "editable": false,
      "graphTooltip": 0,
      "refresh": "30s",
      "time": {"from": "now-30d", "to": "now"},
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "CNPG operator up",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(kube_pod_status_ready{namespace=\"cnpg-system\", condition=\"true\"} * on (namespace, pod) group_left() kube_pod_labels{namespace=\"cnpg-system\", label_app_kubernetes_io_name=\"cloudnative-pg\"})", "legendFormat": "ready"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "DBs with failing backups",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "count(barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp > 0 and barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp >= barman_cloud_cloudnative_pg_io_last_available_backup_timestamp) or on() vector(0)", "legendFormat": "failing"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "WAL archive failures (10m)",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(increase(cnpg_pg_stat_archiver_failed_count[10m])) or on() vector(0)", "legendFormat": "failures"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Backup age (seconds since last backup)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "time() - (barman_cloud_cloudnative_pg_io_last_available_backup_timestamp > 0)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "options": {"legend": {"displayMode": "list", "placement": "right"}},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "DBs with stale backup (>24h)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "count((time() - barman_cloud_cloudnative_pg_io_last_available_backup_timestamp) > 86400) or on() vector(0)", "legendFormat": "stale (>24h)"}
          ],
          "options": {"legend": {"displayMode": "list", "placement": "right"}},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 6,
          "type": "stat",
          "title": "DR: in recovery",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(cnpg_pg_replication_in_recovery) or on() vector(0)", "legendFormat": "in_recovery"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 7,
          "type": "stat",
          "title": "DR: wal receiver up",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max(cnpg_pg_replication_is_wal_receiver_up) or on() vector(0)", "legendFormat": "wal_receiver"}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "DR: replay lag (seconds)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "max by (namespace) (cnpg_pg_replication_lag) or on() vector(0)", "legendFormat": "{{namespace}}"}],
          "options": {"legend": {"displayMode": "list", "placement": "right"}},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Restore test failures (last 24h)",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 20},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "max by (namespace) (kube_job_status_failed{job_name=~\"cnpg-restore-test-.*\"} == 1 and on (namespace, job_name) (time() - kube_job_created{job_name=~\"cnpg-restore-test-.*\"} < 86400)) or on() vector(0)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "options": {"legend": {"displayMode": "list", "placement": "right"}},
          "fieldConfig": {"defaults": {"decimals": 0}, "overrides": []}
        }
      ]
    }
