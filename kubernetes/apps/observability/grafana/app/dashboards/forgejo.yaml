---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: forgejo
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  folder: "Apps"
  json: |-
    {
      "uid": "forgejo",
      "title": "Forgejo",
      "tags": ["forgejo", "git"],
      "timezone": "browser",
      "schemaVersion": 39,
      "time": {"from": "now-6h", "to": "now"},
      "refresh": "30s",
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Forgejo Up",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "up{job=\"forgejo-http\", namespace=\"forgejo\"}", "datasource": {"type": "prometheus", "uid": "prometheus"}}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "Down", "color": "red"}, "1": {"text": "Up", "color": "green"}}}], "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 2, "type": "stat", "title": "Version",
          "gridPos": {"h": 4, "w": 5, "x": 4, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "gitea_build_info{namespace=\"forgejo\"}", "legendFormat": "{{version}}", "datasource": {"type": "prometheus", "uid": "prometheus"}}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "/^version$/"}, "textMode": "name", "colorMode": "none", "graphMode": "none"}
        },
        {
          "id": 3, "type": "stat", "title": "Repositories",
          "gridPos": {"h": 4, "w": 3, "x": 9, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "gitea_repositories{namespace=\"forgejo\"}", "datasource": {"type": "prometheus", "uid": "prometheus"}}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "area"}
        },
        {
          "id": 4, "type": "stat", "title": "Users",
          "gridPos": {"h": 4, "w": 3, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "gitea_users{namespace=\"forgejo\"}", "datasource": {"type": "prometheus", "uid": "prometheus"}}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "area"}
        },
        {
          "id": 5, "type": "stat", "title": "Organizations",
          "gridPos": {"h": 4, "w": 3, "x": 15, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "gitea_organizations{namespace=\"forgejo\"}", "datasource": {"type": "prometheus", "uid": "prometheus"}}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "area"}
        },
        {
          "id": 6, "type": "stat", "title": "Mirrors",
          "gridPos": {"h": 4, "w": 3, "x": 18, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "gitea_mirrors{namespace=\"forgejo\"}", "datasource": {"type": "prometheus", "uid": "prometheus"}}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "area"}
        },
        {
          "id": 7, "type": "stat", "title": "DB Up",
          "gridPos": {"h": 4, "w": 3, "x": 21, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "up{job=\"cnpg-system/cnpg-clusters\", namespace=\"forgejo\"}", "datasource": {"type": "prometheus", "uid": "prometheus"}}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "Down", "color": "red"}, "1": {"text": "Up", "color": "green"}}}], "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 8, "type": "timeseries", "title": "Issues (open vs closed)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "gitea_issues_open{namespace=\"forgejo\"}", "legendFormat": "open", "datasource": {"type": "prometheus", "uid": "prometheus"}},
            {"refId": "B", "expr": "gitea_issues_closed{namespace=\"forgejo\"}", "legendFormat": "closed", "datasource": {"type": "prometheus", "uid": "prometheus"}}
          ]
        },
        {
          "id": 9, "type": "timeseries", "title": "Repos / Mirrors / Releases",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"refId": "A", "expr": "gitea_repositories{namespace=\"forgejo\"}", "legendFormat": "repositories", "datasource": {"type": "prometheus", "uid": "prometheus"}},
            {"refId": "B", "expr": "gitea_mirrors{namespace=\"forgejo\"}", "legendFormat": "mirrors", "datasource": {"type": "prometheus", "uid": "prometheus"}},
            {"refId": "C", "expr": "gitea_releases{namespace=\"forgejo\"}", "legendFormat": "releases", "datasource": {"type": "prometheus", "uid": "prometheus"}}
          ]
        },
        {
          "id": 10, "type": "timeseries", "title": "Memory (RSS)",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "targets": [{"refId": "A", "expr": "process_resident_memory_bytes{job=\"forgejo-http\", namespace=\"forgejo\"}", "legendFormat": "rss", "datasource": {"type": "prometheus", "uid": "prometheus"}}]
        },
        {
          "id": 11, "type": "timeseries", "title": "CPU (cores)",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "rate(process_cpu_seconds_total{job=\"forgejo-http\", namespace=\"forgejo\"}[$$__rate_interval])", "legendFormat": "cpu", "datasource": {"type": "prometheus", "uid": "prometheus"}}]
        },
        {
          "id": 12, "type": "timeseries", "title": "Goroutines",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 12},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "go_goroutines{job=\"forgejo-http\", namespace=\"forgejo\"}", "legendFormat": "goroutines", "datasource": {"type": "prometheus", "uid": "prometheus"}}]
        }
      ]
    }
