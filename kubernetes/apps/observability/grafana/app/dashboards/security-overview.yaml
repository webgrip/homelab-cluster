---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: security-overview
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "Security"
  json: |-
    {
      "schemaVersion": 39,
      "title": "Security / SOC Command Center",
      "uid": "security-overview",
      "timezone": "browser",
      "tags": [
        "security",
        "soc",
        "overview",
        "falco",
        "tetragon",
        "kyverno",
        "trivy"
      ],
      "description": "Cross-concern SOC overview: runtime threats, policy enforcement, compliance posture, supply chain integrity, and sensor health.",
      "editable": false,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {
        "refresh_intervals": [
          "30s",
          "1m",
          "2m",
          "5m",
          "15m"
        ],
        "time_options": [
          "1h",
          "3h",
          "6h",
          "12h",
          "24h",
          "2d",
          "7d"
        ]
      },
      "templating": {
        "list": [

        ]
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "\ud83d\udea8 Threat Activity \u2014 Real-time",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "id": 2,
          "type": "stat",
          "title": "\ud83d\udea8 Critical Runtime Threats",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(falcosecurity_falco_rules_matches_total{priority=\"2\"}[$$__range])) or vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "\u26a0\ufe0f Falco Alerts (all)",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(falcosecurity_falco_rules_matches_total[$$__range])) or vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "\ud83d\udd0c eBPF Blind Spots",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(tetragon_observer_ringbuf_events_lost_total[$$__range])) or vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "\u274c Admission Blocks",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(kyverno_policy_results_total{rule_result=\"fail\",policy_validation_mode=\"enforce\"}[$$__range])) or vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "\ud83d\udd13 Open Violations",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "(sum((policy_report_result{status=\"fail\"}) or (cluster_policy_report_result{status=\"fail\"}))) or vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "stat",
          "title": "\ud83d\udd34 Critical CVEs",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 20,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(trivy_image_vulnerabilities{severity=\"Critical\"}) or vector(0)"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "row",
          "title": "\ud83d\udcc8 Threat Timeline",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "collapsed": false
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Runtime Threat Activity \u2014 Falco Detections by Priority",
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (priority) (rate(falcosecurity_falco_rules_matches_total[$$__interval]))",
              "legendFormat": "Priority {{priority}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 2,
                "showPoints": "never",
                "stacking": {
                  "mode": "normal",
                  "group": "A"
                }
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "2"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#F2495C"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "3"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#FF9830"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "4"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#FADE2A"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "5"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#5794F2"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Policy Enforcement Activity",
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 12,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(kyverno_policy_results_total{rule_result=\"fail\",policy_validation_mode=\"enforce\"}[$$__interval]))",
              "legendFormat": "enforce blocks"
            },
            {
              "refId": "B",
              "expr": "sum(rate(kyverno_policy_results_total{rule_result=\"fail\",policy_validation_mode=\"audit\"}[$$__interval]))",
              "legendFormat": "audit failures"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2,
                "showPoints": "never"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "enforce blocks"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#F2495C"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "audit failures"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#FF9830"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 11,
          "type": "row",
          "title": "\ud83d\udd0d Top Threats \u2014 Triage",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 15
          },
          "collapsed": false
        },
        {
          "id": 12,
          "type": "table",
          "title": "Top Falco Rules Firing",
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(10, sum by (rule_name, priority, source) (increase(falcosecurity_falco_rules_matches_total[$$__range])))",
              "instant": true,
              "format": "table"
            }
          ],
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Count",
                "desc": true
              }
            ]
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "rule_name": "Rule",
                  "priority": "Priority",
                  "source": "Source",
                  "Value": "Count"
                },
                "excludeByName": {
                  "Time": true
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Priority"
                },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-text"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "2": {
                            "text": "\ud83d\udd34 Critical",
                            "color": "#F2495C",
                            "index": 0
                          },
                          "3": {
                            "text": "\ud83d\udfe0 Error",
                            "color": "#FF9830",
                            "index": 1
                          },
                          "4": {
                            "text": "\ud83d\udfe1 Warning",
                            "color": "#FADE2A",
                            "index": 2
                          },
                          "5": {
                            "text": "\ud83d\udd35 Notice",
                            "color": "#5794F2",
                            "index": 3
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 13,
          "type": "table",
          "title": "Open Policy Violations by Severity",
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(15, sum by (namespace, policy, severity, kind) ((policy_report_result{status=\"fail\"}) or (cluster_policy_report_result{status=\"fail\"})))",
              "instant": true,
              "format": "table"
            }
          ],
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Severity",
                "desc": false
              }
            ]
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "namespace": "Namespace",
                  "policy": "Policy",
                  "severity": "Severity",
                  "kind": "Kind",
                  "Value": "Count"
                },
                "excludeByName": {
                  "Time": true
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Severity"
                },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-text"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "critical": {
                            "text": "\ud83d\udd34 Critical",
                            "color": "#F2495C",
                            "index": 0
                          },
                          "high": {
                            "text": "\ud83d\udfe0 High",
                            "color": "#FF9830",
                            "index": 1
                          },
                          "medium": {
                            "text": "\ud83d\udfe1 Medium",
                            "color": "#FADE2A",
                            "index": 2
                          },
                          "low": {
                            "text": "\ud83d\udd35 Low",
                            "color": "#5794F2",
                            "index": 3
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 14,
          "type": "row",
          "title": "\ud83d\udcca Compliance & Vulnerability Posture",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 26
          },
          "collapsed": false
        },
        {
          "id": 15,
          "type": "gauge",
          "title": "CIS Compliance Score",
          "gridPos": {
            "h": 9,
            "w": 6,
            "x": 0,
            "y": 27
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(trivy_cluster_compliance{status=\"Pass\"}) / (sum(trivy_cluster_compliance{status=\"Pass\"}) + sum(trivy_cluster_compliance{status=\"Fail\"})) * 100"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 100,
              "unit": "percent",
              "decimals": 1,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 60
                  },
                  {
                    "color": "green",
                    "value": 80
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 16,
          "type": "gauge",
          "title": "Policy Compliance Rate",
          "gridPos": {
            "h": 9,
            "w": 6,
            "x": 6,
            "y": 27
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum((policy_report_result{status=\"pass\"}) or (cluster_policy_report_result{status=\"pass\"})) / (sum((policy_report_result{status=~\"pass|fail\"}) or (cluster_policy_report_result{status=~\"pass|fail\"}))) * 100"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 100,
              "unit": "percent",
              "decimals": 1,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 60
                  },
                  {
                    "color": "green",
                    "value": 80
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 17,
          "type": "barchart",
          "title": "Critical+High CVEs by Namespace (Top 10)",
          "gridPos": {
            "h": 9,
            "w": 6,
            "x": 12,
            "y": 27
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(10, sum by (namespace) (trivy_image_vulnerabilities{severity=~\"Critical|High\"}))",
              "instant": true,
              "format": "table",
              "legendFormat": "{{namespace}}"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "xTickLabelRotation": -30
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          }
        },
        {
          "id": 18,
          "type": "table",
          "title": "Compliance Controls Failing",
          "gridPos": {
            "h": 9,
            "w": 6,
            "x": 18,
            "y": 27
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (title, status) (trivy_cluster_compliance{status=\"Fail\"})",
              "instant": true,
              "format": "table"
            }
          ],
          "options": {
            "showHeader": true
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "title": "Control",
                  "status": "Status",
                  "Value": "Count"
                },
                "excludeByName": {
                  "Time": true,
                  "Value": true
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 19,
          "type": "row",
          "title": "\ud83d\udd10 Supply Chain Integrity",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 36
          },
          "collapsed": false
        },
        {
