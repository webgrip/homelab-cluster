---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: security-tetragon-runtime
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folder: "Security"
  json: |-
    {
      "schemaVersion": 39,
      "title": "Tetragon / Runtime Enforcement",
      "uid": "security-tetragon-runtime",
      "timezone": "browser",
      "tags": [
        "security",
        "tetragon",
        "ebpf",
        "process",
        "runtime",
        "soc"
      ],
      "description": "SOC-grade Tetragon dashboard: suspicious exec detection, interactive shell alerts, BPF ring buffer health, process cache intelligence, kprobe activity, resource overhead, and full event stream.",
      "editable": true,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "node",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "label": "Node",
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "query": "label_values(tetragon_events_exported_total, node)",
            "refresh": 2,
            "sort": 1,
            "current": {}
          },
          {
            "name": "event_type",
            "type": "custom",
            "label": "Event Type",
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "query": "process_exec,process_exit,process_kprobe,process_tracepoint",
            "current": {
              "text": [
                "All"
              ],
              "value": [
                "$__all"
              ]
            },
            "options": [
              {
                "text": "All",
                "value": "$__all",
                "selected": true
              },
              {
                "text": "process_exec",
                "value": "process_exec",
                "selected": false
              },
              {
                "text": "process_exit",
                "value": "process_exit",
                "selected": false
              },
              {
                "text": "process_kprobe",
                "value": "process_kprobe",
                "selected": false
              },
              {
                "text": "process_tracepoint",
                "value": "process_tracepoint",
                "selected": false
              }
            ],
            "hide": 0
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Sensor Status",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Tetragon Agents Up",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(up{namespace=\"security\", pod=~\"tetragon.*\"} == 1) or on() vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 3
                  },
                  {
                    "color": "green",
                    "value": 4
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Events Exported / s",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(tetragon_events_exported_total{node=~\"$node\"}[5m])) or on() vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "ops",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Ring Buffer Lost (Range)",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(tetragon_observer_ringbuf_events_lost_total[$__range])) or on() vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "BPF Missed Events (Range)",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(tetragon_bpf_missed_events_total[$__range])) or on() vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Tracing Policy Errors",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(tetragon_tracingpolicy_loaded{state=~\"error|load_error\"}) or on() vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Cache Evictions / s",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 20,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(tetragon_process_cache_evictions_total[5m])) or on() vector(0)",
              "legendFormat": ""
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "ops",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.1
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "row",
          "title": "Suspicious Process Execution",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "collapsed": false
        },
        {
          "id": 9,
          "type": "logs",
          "title": "All Process Executions",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 6
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"security\", container=~\"export-stdout\"} |~ \"process_exec\" | json binary=\"process_exec.process.binary\", ns=\"process_exec.process.pod.namespace\", pod=\"process_exec.process.pod.name\", args=\"process_exec.process.arguments\" | line_format \"{{.ns}}/{{.pod}} -> {{.binary}} {{.args}}\"",
              "queryType": "range"
            }
          ],
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "id": 10,
          "type": "logs",
          "title": "Interactive Shell / Suspicious Binary Detections",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 6
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"security\", container=~\"export-stdout\"} |~ \"process_exec\" |~ \"/bin/bash|/bin/sh|/usr/bin/python|/usr/bin/perl|/bin/python3|/usr/bin/python3|\\bnc\\b|ncat|netcat|curl|wget\" | json binary=\"process_exec.process.binary\", ns=\"process_exec.process.pod.namespace\", pod=\"process_exec.process.pod.name\", args=\"process_exec.process.arguments\" | line_format \"[ALERT] {{.ns}}/{{.pod}} -> {{.binary}} {{.args}}\"",
              "queryType": "range"
            }
          ],
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "id": 11,
          "type": "row",
          "title": "Event Stream Analysis",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "collapsed": false
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Events Exported by Namespace / Workload",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 15
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(20, sum by (node) (rate(tetragon_events_exported_total{node=~\"$node\"}[5m])))",
              "legendFormat": "{{node}}"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "fillOpacity": 5,
              "gradientMode": "none"
            },
            "overrides": []
          }
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "BPF Ring Buffer Health \u2014 Received vs Lost vs Missed",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 15
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(tetragon_observer_ringbuf_events_received_total[5m]))",
              "legendFormat": "ringbuf received/s"
            },
            {
              "refId": "B",
              "expr": "sum(rate(tetragon_observer_ringbuf_events_lost_total[5m])) or on() vector(0)",
              "legendFormat": "ringbuf lost/s"
            },
            {
              "refId": "C",
              "expr": "sum(rate(tetragon_bpf_missed_events_total[5m])) or on() vector(0)",
              "legendFormat": "bpf missed/s"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "fillOpacity": 5,
              "gradientMode": "none"
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "ringbuf lost/s"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "red"
                    }
                  },
                  {
                    "id": "custom.lineWidth",
                    "value": 2
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "bpf missed/s"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "orange"
                    }
                  },
                  {
                    "id": "custom.lineWidth",
                    "value": 2
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "ringbuf received/s"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "green"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 14,
          "type": "row",
          "title": "Process Intelligence",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 23
          },
          "collapsed": false
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "Process Cache Size vs Capacity",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 24
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "tetragon_process_cache_size",
              "legendFormat": "size"
            },
            {
              "refId": "B",
              "expr": "tetragon_process_cache_capacity",
              "legendFormat": "capacity"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "fillOpacity": 5,
              "gradientMode": "none"
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "capacity"
                },
                "properties": [
                  {
                    "id": "custom.lineStyle",
                    "value": {
                      "fill": "dash",
                      "dash": [
                        10,
                        5
                      ]
                    }
                  },
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "gray"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Process Cache Eviction Rate",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 24
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(tetragon_process_cache_evictions_total[5m])) or on() vector(0)",
              "legendFormat": "evictions/s"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull",
                "max"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "fillOpacity": 5,
              "gradientMode": "none"
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "evictions/s"
                },
                "properties": [
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "green",
                          "value": null
                        },
                        {
                          "color": "red",
                          "value": 0.1
                        }
                      ]
                    }
                  },
                  {
                    "id": "custom.thresholdsStyle",
                    "value": {
                      "mode": "line"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 17,
          "type": "table",
          "title": "Tracing Policy Load State",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 24
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (node, state) (tetragon_tracingpolicy_loaded)",
              "format": "table",
              "instant": true
            }
          ],
          "options": {
            "showHeader": true,
            "cellHeight": "sm",
            "footer": {
              "show": false
            }
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "state"
                },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "enabled": {
                            "text": "enabled",
                            "color": "green",
                            "index": 0
                          },
                          "error": {
                            "text": "error",
                            "color": "red",
                            "index": 1
                          },
                          "load_error": {
                            "text": "load_error",
                            "color": "red",
                            "index": 2
                          },
                          "disabled": {
                            "text": "disabled",
                            "color": "yellow",
                            "index": 3
                          }
                        }
                      }
                    ]
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Time"
                },
                "properties": [
                  {
                    "id": "custom.hidden",
                    "value": true
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Value"
                },
                "properties": [
                  {
                    "id": "custom.hidden",
                    "value": true
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 18,
          "type": "row",
          "title": "Network & Kprobe Activity",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 32
          },
          "collapsed": false
        },
        {
          "id": 19,
          "type": "logs",
          "title": "Kprobe / Network Events",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 33
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"security\", container=~\"export-stdout\"} |~ \"process_kprobe\" | json fn=\"process_kprobe.function_name\", ns=\"process_kprobe.process.pod.namespace\", pod=\"process_kprobe.process.pod.name\", binary=\"process_kprobe.process.binary\" | line_format \"{{.ns}}/{{.pod}} -> {{.fn}} [{{.binary}}]\"",
              "queryType": "range"
            }
          ],
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "id": 20,
          "type": "timeseries",
          "title": "Policy Filter Operations / s",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 33
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (operation, error) (rate(tetragon_policyfilter_operations_total[5m]))",
