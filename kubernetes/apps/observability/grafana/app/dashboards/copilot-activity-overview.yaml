                "matcher": {
                  "id": "byName",
                  "options": "current_requests"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "short"
                  },
                  {
                    "id": "decimals",
                    "value": 0
                  }
                ]
              }
            ]
