          "title": "Premium Request Projection",
          "description": "MTD scenarios: best = current spend, likeliest = 1.5x, worst = 2x.",
          "gridPos": {
            "h": 4,
            "w": 12,
            "x": 12,
            "y": 55
          },
          "datasource": {
            "type": "yesoreyeram-infinity-datasource",
            "uid": "github-api"
          },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "url": "https://api.github.com/organizations/${org}/settings/billing/premium_request/usage",
              "parser": "uql",
              "uql": "parse-json\n| scope \"usageItems\"\n| summarize \"current_mtd\"=sum(\"netAmount\"), \"current_requests\"=sum(\"netQuantity\")\n| extend \"best_case\"=\"current_mtd\", \"likeliest\"=mul(\"current_mtd\",1.5), \"worst_case\"=mul(\"current_mtd\",2)"
            }
          ],
          "options": {
            "showHeader": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2
            },
            "overrides": [
