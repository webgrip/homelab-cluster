      "timezone": "browser",
      "tags": [
        "copilot",
        "ai",
        "opentelemetry",
        "genai"
      ],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "5m",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "links": [
        {
          "title": "Copilot Agent Performance",
          "url": "/d/copilot-agent-performance",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        },
        {
          "title": "Copilot Code Impact",
          "url": "/d/copilot-code-impact",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "name": "model",
            "label": "Model",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": "label_values(gen_ai_client_operation_duration_count, gen_ai_request_model)",
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            }
          }
        ]
