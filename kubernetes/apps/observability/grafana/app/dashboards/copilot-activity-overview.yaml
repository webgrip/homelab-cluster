apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-copilot-activity-overview
  namespace: observability
  annotations:
    grafana_folder: Copilot
  labels:
    grafana_dashboard: "1"
data:
  copilot-activity-overview.json: |-
    {
      "schemaVersion": 39,
      "title": "GitHub Copilot / Activity Overview",
      "uid": "copilot-activity-overview",
      "timezone": "browser",
      "tags": [
        "copilot",
        "ai",
        "opentelemetry",
        "genai"
      ],
      "editable": true,
      "graphTooltip": 1,
      "refresh": "1m",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "links": [
        {
          "title": "Copilot Agent Performance",
          "url": "/d/copilot-agent-performance",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        },
        {
          "title": "Copilot Events & Traces",
          "url": "/d/copilot-code-impact",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        },
        {
          "title": "GitHub Usage, Billing & Forecasts",
          "url": "/d/github-usage-billing",
          "type": "link",
          "icon": "external link",
          "targetBlank": false
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "name": "model",
            "label": "Model",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": {
              "query": "label_values(gen_ai_client_token_usage_count, gen_ai_request_model)",
              "refId": "Prometheus-model-Variable-Query"
            },
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            }
          },
          {
            "name": "org",
            "label": "GitHub org",
            "type": "custom",
            "query": "webgrip",
            "current": {
              "selected": true,
              "text": "webgrip",
              "value": "webgrip"
            }
          },
          {
            "name": "user",
            "label": "GitHub user",
            "type": "query",
            "datasource": {
              "type": "yesoreyeram-infinity-datasource",
              "uid": "github-api"
            },
            "query": {
              "type": "json",
              "source": "url",
              "url": "https://api.github.com/orgs/${org}/copilot/billing/seats?per_page=100",
              "parser": "backend",
              "root_selector": "seats",
              "columns": [
                { "selector": "assignee.login", "text": "login", "type": "string" }
              ]
            },
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false,
            "current": {
              "selected": false,
              "text": "${__user.login}",
              "value": "${__user.login}"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "",
          "gridPos": {
            "h": 3,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "## GitHub Copilot \u00b7 Activity Overview\nLive VS Code Copilot telemetry collected through Alloy. Use this dashboard to understand request volume, model mix, token usage, tool activity, and efficiency signals.\n\nThe panels below favor human-readable names and derived ratios over raw telemetry labels."
          }
        },
        {
          "id": 2,
          "type": "row",
          "title": "Key Metrics \u2014 Last $__range",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 3
          },
          "panels": []
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Chat Operations",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(gen_ai_client_operation_duration_seconds_count{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$model\"}[$__range])) or sum(increase(gen_ai_client_operation_duration_count{gen_ai_operation_name=\"chat\",gen_ai_request_model=~\"$model\"}[$__range]))",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Agent Invocations",
          "gridPos": {
            "h": 4,
