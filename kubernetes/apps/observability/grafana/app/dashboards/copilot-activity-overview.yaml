          "type": "stat",
          "title": "Chat Sessions",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(copilot_chat_session_count_total[$__range])) or sum(increase(copilot_chat_session_count[$__range]))",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              },
              "thresholds": {
