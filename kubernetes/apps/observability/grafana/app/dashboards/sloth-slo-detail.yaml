---
# Imported from grafana.com (Sloth project) via the operator's grafanaCom source.
# Per-SLO multi-window multi-burn-rate detail; maps DS_PROMETHEUS to Prometheus.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: sloth-slo-detail
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: observability
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "Prometheus"
  grafanaCom:
    id: 14348
    revision: 5
