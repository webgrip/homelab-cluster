---
# Migration phase 2 (seed): grafana-oauth -> OpenBao secret/grafana/oauth.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: grafana-oauth
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: grafana-oauth
  data:
    - match: {secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_ID, remoteRef: {remoteKey: grafana/oauth, property: GF_AUTH_GENERIC_OAUTH_CLIENT_ID}}
    - match: {secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET, remoteRef: {remoteKey: grafana/oauth, property: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}}
