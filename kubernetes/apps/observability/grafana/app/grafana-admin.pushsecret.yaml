---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: grafana-admin
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: grafana-admin}}
  data:
    - match: {secretKey: admin-user, remoteRef: {remoteKey: grafana/admin, property: admin-user}}
    - match: {secretKey: admin-password, remoteRef: {remoteKey: grafana/admin, property: admin-password}}
