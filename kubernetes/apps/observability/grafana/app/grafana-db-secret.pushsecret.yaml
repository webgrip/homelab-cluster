---
# Migration phase 6 (seed): grafana-db-secret (CNPG bootstrap.initdb) -> OpenBao secret/grafana/db.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: grafana-db-secret, namespace: observability}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: grafana-db-secret}}
  data:
    - match: {secretKey: username, remoteRef: {remoteKey: grafana/db, property: username}}
    - match: {secretKey: password, remoteRef: {remoteKey: grafana/db, property: password}}
