---
# grafana_ro password for the litellm-db datasource — the SAME value CNPG set on the role
# in the ai namespace (generated + pushed to OpenBao KV secret/litellm/grafana-ro there).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-grafana-ro
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: litellm-grafana-ro
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: litellm/grafana-ro
