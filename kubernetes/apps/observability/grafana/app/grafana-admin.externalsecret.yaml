---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: grafana-admin, creationPolicy: Owner}
  data:
    - {secretKey: admin-user, remoteRef: {key: grafana/admin, property: admin-user}}
    - {secretKey: admin-password, remoteRef: {key: grafana/admin, property: admin-password}}
