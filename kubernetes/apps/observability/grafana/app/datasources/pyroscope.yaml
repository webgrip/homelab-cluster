---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: pyroscope
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    name: Pyroscope
    type: pyroscope
    uid: pyroscope
    access: proxy
    url: http://pyroscope.observability.svc.cluster.local:4040
