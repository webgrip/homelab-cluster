---
# VictoriaTraces exposes the Jaeger query API under /select/jaeger, so Grafana
# talks to it with the built-in jaeger datasource type (no TraceQL).
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: victoriatraces
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    name: VictoriaTraces
    type: jaeger
    uid: victoriatraces
    editable: true
    access: proxy
    url: http://vtsingle-victoriatraces.observability.svc.cluster.local:10428/select/jaeger
    jsonData:
      tracesToLogsV2:
        datasourceUid: victorialogs
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        tags:
          - "job"
          - "namespace"
          - "pod"
          - "service.name"
          - "service.namespace"
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false
      nodeGraph:
        enabled: true
      tracesToMetrics:
        datasourceUid: prometheus
        # Tags must exist on the span/resource; the resulting labels must match
        # the names produced by the Alloy spanmetrics connector (dots become
        # underscores; service.name becomes service_name).
        tags:
          - key: service.name
            value: service_name
          - key: http.method
            value: http_method
          - key: http.status_code
            value: http_status_code
          - key: rpc.system
            value: rpc_system
          - key: rpc.service
            value: rpc_service
          - key: rpc.method
            value: rpc_method
        queries:
          - name: Span metrics
            query: "sum(rate(traces_spanmetrics_duration_seconds_bucket{$$__tags}[5m]))"
