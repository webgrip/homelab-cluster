---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    name: Prometheus
    type: prometheus
    uid: prometheus
    editable: true
    access: proxy
    url: http://vmsingle-vmsingle.observability.svc.cluster.local:8429
    isDefault: true
    jsonData:
      exemplarTraceIdDestinations:
        - datasourceUid: tempo
          name: trace_id
        - datasourceUid: tempo
          name: traceID
