---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    # Display name says what it is (VMSingle); uid stays `prometheus` — every
    # dashboard/alert/MCP call hardcodes the uid, and the prometheus *type* is
    # what makes Metrics Drilldown (and PromQL) work against VictoriaMetrics.
    name: VictoriaMetrics
    type: prometheus
    uid: prometheus
    editable: true
    access: proxy
    url: http://vmsingle-vmsingle.observability.svc.cluster.local:8429
    isDefault: true
    jsonData:
      # Exemplars open in the tempo-type datasource: richer trace view than the
      # jaeger one and it feeds the Traces Drilldown app (same VT backend).
      exemplarTraceIdDestinations:
        - datasourceUid: victoriatraces-tempo
          name: trace_id
        - datasourceUid: victoriatraces-tempo
          name: traceID
