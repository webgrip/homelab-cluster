---
# grafana_ro password for the ploeg-db datasource — the SAME value CNPG set on the role
# in the ploeg namespace (generated + pushed to OpenBao KV secret/ploeg/grafana-ro there).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ploeg-grafana-ro
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: ploeg-grafana-ro
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: ploeg/grafana-ro
