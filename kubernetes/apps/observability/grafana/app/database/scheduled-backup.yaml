---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: grafana-db-daily
  namespace: observability
spec:
  schedule: "0 20 2 * * *"
  backupOwnerReference: cluster
  cluster:
    name: grafana-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
