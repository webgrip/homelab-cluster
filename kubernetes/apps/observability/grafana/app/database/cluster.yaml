---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: grafana-db
  namespace: observability
spec:
  instances: 1
  # Burstable, not BestEffort: the Talos PSI OOM controller kills the largest
  # BestEffort cgroups first — every CNPG DB was SIGKILLed at once on
  # fringe-workstation (2026-07-11 01:27). Limits ~3x observed peak; no CPU
  # limit (avoid throttling checkpoints/vacuum).
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      memory: 768Mi
  # Pin the DB off the soyo control-planes onto the worker pool (ADR-0002).
  affinity:
    nodeSelector:
      node.webgrip.io/pool: worker
  inheritedMetadata:
    annotations:
      reloader.stakater.com/auto: "true"
  storage:
    size: 20Gi
    storageClass: longhorn
  walStorage:
    size: 10Gi
    storageClass: longhorn
  postgresql:
    parameters:
      # Backup-tier policy: compress WAL full-page images to shrink the S3 archive
      # and local WAL. See docs/techdocs/docs/database-backup-tiers.md
      wal_compression: "zstd"
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: grafana-db-store
        serverName: grafana-db
  bootstrap:
    initdb:
      database: grafana
      owner: grafana
      secret:
        name: grafana-db-secret
