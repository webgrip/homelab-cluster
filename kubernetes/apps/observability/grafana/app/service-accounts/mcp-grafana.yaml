---
# yaml-language-server: $schema=https://raw.githubusercontent.com/grafana/grafana-operator/v5.23.0/deploy/kustomize/base/crds/grafana.integreatly.org_grafanaserviceaccounts.yaml
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaServiceAccount
metadata:
  name: mcp-grafana
spec:
  instanceName: grafana
  name: mcp-grafana
  role: Editor
  isDisabled: false
  tokens:
    - name: mcp-grafana-token
      secretName: mcp-grafana-token
