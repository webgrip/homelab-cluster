---
# ServiceMonitor for the operator-managed Grafana instance.
# The operator does not create a ServiceMonitor automatically; we manage it here.
# The service name follows the operator's convention: <grafana-cr-name>-service.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: grafana
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana
    # Prometheus (kube-prometheus-stack) only selects ServiceMonitors carrying this
    # release label; without it this SM is never loaded and Grafana /metrics (incl.
    # grafana_alerting_*) is silently unscraped — which is how the 3-week alert-rule
    # outage went unnoticed. See ADR-0031.
    release: kube-prometheus-stack
spec:
  endpoints:
    - interval: 1m
      path: /metrics
      port: grafana
      scheme: http
  namespaceSelector:
    matchNames:
      - observability
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: grafana-operator
      grafana.internal/instance: grafana
