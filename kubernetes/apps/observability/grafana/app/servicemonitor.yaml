---
# ServiceMonitor for the operator-managed Grafana instance.
# The operator does not create a ServiceMonitor automatically; we manage it here.
# The service name follows the operator's convention: <grafana-cr-name>-service.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: grafana
  namespace: observability
spec:
  endpoints:
    - interval: 1m
      path: /metrics
      port: grafana
      scheme: http
  namespaceSelector:
    matchNames:
      - observability
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/managed-by: grafana-operator
