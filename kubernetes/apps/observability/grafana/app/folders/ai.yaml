---
# All AI dashboards live here: the claude-code family, the LiteLLM pair
# (cross-namespace from ai, bound by folderUID), and the coming
# openhands/openspec/dark-factory-floor families.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: ai
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: true
  uid: ai
  title: "AI"
