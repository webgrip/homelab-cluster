---
# Migration phase 1: seed the existing (SOPS-owned) grafana-github-api Secret into OpenBao
# at secret/grafana/github-api. Once the ExternalSecret owns the Secret, this keeps the
# value in sync; deletionPolicy is the default (None) so the value persists in OpenBao.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: grafana-github-api
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: grafana-github-api
  data:
    - match:
        secretKey: token
        remoteRef:
          remoteKey: grafana/github-api
          property: token
