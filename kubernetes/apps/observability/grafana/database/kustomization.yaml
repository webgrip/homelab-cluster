---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
resources:
  # grafana-db-secret.sops.yaml must be SOPS-encrypted and committed before
  # this Kustomization reconciles. Required keys: username, password.
  # See: kubernetes/apps/observability/grafana/DATABASE-SECRET.md
  - ../app/grafana-db-secret.sops.yaml
  - ../app/database
