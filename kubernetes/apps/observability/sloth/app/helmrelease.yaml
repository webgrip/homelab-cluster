---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sloth
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: sloth
      version: 0.16.0
      sourceRef:
        kind: HelmRepository
        name: slok-sloth
        namespace: observability
  values:
    nodeSelector:
      nodegroup: fringe
    tolerations:
      - key: dedicated
        operator: Equal
        value: fringe
        effect: NoSchedule

    resources:
      requests:
        cpu: 10m
        memory: 96Mi
      limits:
        cpu: 100m
        memory: 256Mi
