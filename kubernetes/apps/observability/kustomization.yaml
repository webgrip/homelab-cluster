---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability

components:
  - ../../components/sops
  - ../../components/cnpg-backup

resources:
  - ./namespace.yaml
  # Metrics backend: modular VictoriaMetrics (replaced kube-prometheus-stack).
  # prometheus-operator-crds keeps the monitoring.coreos.com CRDs so the VM
  # operator can convert the cluster's existing ServiceMonitor/PrometheusRule CRs.
  - ./prometheus-operator-crds/ks.yaml
  - ./vm-operator/ks.yaml
  - ./victoria-metrics/ks.yaml
  - ./kube-state-metrics/ks.yaml
  - ./node-exporter/ks.yaml
  - ./grafana/database/ks.yaml
  - ./grafana-operator/ks.yaml
  - ./grafana/ks.yaml
  - ./mcp-grafana/ks.yaml
  # Logs backend: VictoriaLogs (VLSingle via vm-operator). Loki removed
  # 2026-07-11 — grace period cut short after a full parity verification
  # (26/26 namespaces, zero functional consumers, Loki write-idle); the
  # ~29d pre-cutover archive was forfeited deliberately. See ADR-0041.
  - ./victorialogs/ks.yaml
  - ./mcp-victorialogs/ks.yaml
  # Alert delivery: self-hosted push notifications (ADR pending; roadmap #64).
  - ./ntfy/ks.yaml
  # Traces backend: VictoriaTraces (VTSingle via vm-operator). Replaced Tempo,
  # which had been suspended since 2026-06-19 (~1Gi on the fringe node); VT is
  # far lighter and restores tracing. Span metrics/service graphs now come from
  # the alloy-gateway spanmetrics/servicegraph connectors. See ADR-0042.
  - ./victoriatraces/ks.yaml
  - ./pyroscope/ks.yaml
  - ./alloy-agent/ks.yaml
  - ./alloy-gateway/ks.yaml
  # Beyla disabled temporarily for stability.
  # Re-enable by uncommenting the line below.
  # - ./beyla/ks.yaml
  # k6 (load/synthetic testing) suspended 2026-06-19 to free fringe resources.
  # Both the operator and the canary tests are removed; re-enable by uncommenting
  # both lines (k6-canaries dependsOn k6-operator). Synthetic-check annotations on
  # ingress routes become no-ops until restored.
  # - ./k6-operator/ks.yaml
  - ./sloth/ks.yaml
  - ./sloth/slos/ks.yaml
  - ./blackbox-exporter/ks.yaml
  # - ./k6-canaries/ks.yaml
  - ./k8s-mcp/ks.yaml
  - ./opencost/ks.yaml
  # DevEx / SPACE / DORA measurement warehouse (survey + telemetry rollups).
  - ./devex/database/ks.yaml
  - ./devex/ks.yaml
