---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability

components:
  - ../../components/sops
  - ../../components/observability-s3
  - ../../components/cnpg-backup

resources:
  - ./namespace.yaml
  - ./kube-prometheus-stack/ks.yaml
  - ./grafana/database/ks.yaml
  - ./grafana-operator/ks.yaml
  - ./grafana/ks.yaml
  - ./mcp-grafana/ks.yaml
  # Mimir disabled.
  # Re-enable by uncommenting the line below.
  # - ./mimir-distributed/ks.yaml
  - ./loki/ks.yaml
  # Tempo (tracing) suspended 2026-06-19 to free ~1Gi on the overcommitted fringe
  # node. Flux (cluster-apps, prune:true) garbage-collects it and Helm-uninstalls
  # the StatefulSet. Grafana's tempo datasource will show no-data until restored.
  # Re-enable by uncommenting the line below.
  # - ./tempo/ks.yaml
  - ./pyroscope/ks.yaml
  - ./alloy-agent/ks.yaml
  - ./alloy-gateway/ks.yaml
  # Beyla disabled temporarily for stability.
  # Re-enable by uncommenting the line below.
  # - ./beyla/ks.yaml
  # k6 (load/synthetic testing) suspended 2026-06-19 to free fringe resources.
  # Both the operator and the canary tests are removed; re-enable by uncommenting
  # both lines (k6-canaries dependsOn k6-operator). Synthetic-check annotations on
  # ingress routes become no-ops until restored.
  # - ./k6-operator/ks.yaml
  - ./sloth/ks.yaml
  - ./sloth/slos/ks.yaml
  - ./blackbox-exporter/ks.yaml
  # - ./k6-canaries/ks.yaml
  - ./k8s-mcp/ks.yaml
  - ./opencost/ks.yaml
