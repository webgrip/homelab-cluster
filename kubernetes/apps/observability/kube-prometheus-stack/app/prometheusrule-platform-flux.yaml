---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-flux-rules
  namespace: observability
  labels:
    app.kubernetes.io/name: flux
    release: kube-prometheus-stack
spec:
  groups:
    - name: platform.flux
      rules:
        - alert: FluxKustomizationNotReady
          expr: |
            max by (namespace, name) (
              gotk_reconcile_condition{kind="Kustomization", status="False"}
            ) > 0
          for: 15m
          labels:
            severity: warning
            owner: platform
            service: flux
          annotations:
            summary: "Flux Kustomization not Ready ({{$labels.exported_namespace}}/{{$labels.name}})"
            description: |
              What's happening:
              - Flux reports Kustomization status=False for 15m.

              Impact/risk:
              - Cluster state may drift because GitOps changes are not applying.

              Likely causes:
              - Invalid manifest (Kustomize build/apply error)
              - Missing dependency (CRDs/namespaces/secrets) or ordering issue
              - Source/OCI/Git auth or connectivity issue

              First actions:
              - Run: flux get kustomizations -A
              - Inspect: flux logs -n flux-system --all-namespaces
              - Check events for the affected Kustomization namespace
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/#flux"
            dashboard_url: "https://grafana.${SECRET_DOMAIN}/d/gitops-flux-health/flux-gitops-health"

        - alert: FluxHelmReleaseNotReady
          expr: |
            max by (namespace, name) (
              gotk_reconcile_condition{kind="HelmRelease", status="False"}
            ) > 0
          for: 15m
          labels:
            severity: warning
            owner: platform
            service: flux
          annotations:
            summary: "Flux HelmRelease not Ready ({{$labels.exported_namespace}}/{{$labels.name}})"
            description: |
              What's happening:
              - Flux reports HelmRelease status=False for 15m.

              Impact/risk:
              - Helm-managed workloads may be degraded or stuck mid-upgrade.

              Likely causes:
              - Chart render/apply failure (values/schema/template error)
              - Dependency missing (CRDs/namespaces/secrets/PVCs)
              - Image pulls or workload rollout failing after apply

              First actions:
              - Run: flux get helmreleases -A
              - Inspect: flux logs -n flux-system --all-namespaces
              - Check the HelmRelease events/status for the failing reason
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/#flux"
            dashboard_url: "https://grafana.${SECRET_DOMAIN}/d/gitops-flux-health/flux-gitops-health"

        - alert: FluxResourceDriftDetected
          expr: |
            max by (namespace, name, kind) (
              gotk_reconcile_condition{type=~"DriftDetected|Drifted", status="True"}
            ) > 0
          for: 10m
          labels:
            severity: warning
            owner: platform
            service: flux
          annotations:
            summary: "Flux detected runtime drift ({{$labels.kind}} {{$labels.exported_namespace}}/{{$labels.name}})"
            description: |
              What's happening:
              - Flux reports that live cluster state has drifted from the reconciled GitOps state.

              Impact/risk:
              - Manual cluster changes, failed reconciliation, or controller-side mutations may be hiding differences from Git.
              - Future reconciliations may revert the live state unexpectedly.

              Likely causes:
              - Manual kubectl/helm edits against GitOps-managed resources
              - Controller mutation outside the declared manifest
              - A GitOps resource with drift detection enabled found live-state differences

              First actions:
              - Run: flux get all -A
              - Inspect the affected resource conditions and events
              - Reconcile or revert the live change through Git
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/#flux"
            dashboard_url: "https://grafana.${SECRET_DOMAIN}/d/gitops-flux-health/flux-gitops-health"

        - alert: FluxKustomizationSuspendedTooLong
          # Excludes the 3 intentionally-parked Kustomizations (pyroscope/beyla
          # documented; drawio unused) so this fires only on *forgotten* suspends.
          expr: |
            max by (name, exported_namespace) (
              flux_resource_info{kind="Kustomization", suspended="True", name!~"pyroscope|beyla|drawio"}
            ) == 1
          for: 24h
          labels:
            severity: info
            owner: platform
            service: flux
          annotations:
            summary: "Flux Kustomization suspended > 24h ({{$labels.exported_namespace}}/{{$labels.name}})"
            description: |
              What's happening:
              - Kustomization {{$labels.exported_namespace}}/{{$labels.name}} has been suspended for over 24h.

              Impact/risk:
              - A suspended Kustomization stops reconciling, so its GitOps changes silently
                never apply — easy to forget and let rot.

              Likely causes:
              - A debugging/maintenance suspend that was never lifted.
              - An intentional park that should be documented and excluded from this alert.

              First actions:
              - Run: flux get kustomizations -A | grep -i suspend
              - Resume it (flux resume ks NAME -n NS), or if intentional add it to the
                exclusion list in this rule and note why.
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/#flux"
            dashboard_url: "https://grafana.${SECRET_DOMAIN}/d/gitops-flux-health/flux-gitops-health"
