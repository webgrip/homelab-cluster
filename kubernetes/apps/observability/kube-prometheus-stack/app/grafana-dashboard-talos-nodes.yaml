---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: talos-node-health
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: false
  folderRef: platform
  json: |-
    {"schemaVersion": 39, "title": "Talos / Node Health", "uid": "talos-node-health", "timezone": "browser", "tags": ["talos", "kubernetes", "platform", "node"], "editable": false, "graphTooltip": 1, "refresh": "30s", "time": {"from": "now-3h", "to": "now"}, "links": [{"title": "Platform / etcd", "type": "link", "url": "/d/platform-etcd/platform-etcd", "targetBlank": false}], "templating": {"list": [{"name": "node", "type": "query", "label": "Node", "datasource": {"type": "prometheus", "uid": "prometheus"}, "query": {"query": "label_values(node_uname_info, nodename)", "refId": "A"}, "refresh": 2, "includeAll": true, "multi": true, "allValue": ".*", "current": {"selected": true, "text": "All", "value": "$__all"}, "sort": 1}, {"name": "device", "type": "query", "label": "Disk Device", "datasource": {"type": "prometheus", "uid": "prometheus"}, "query": {"query": "label_values(node_disk_io_time_seconds_total{device!~\"loop.*|ram.*|dm-.*\"}, device)", "refId": "A"}, "refresh": 2, "includeAll": true, "multi": true, "allValue": ".+", "current": {"selected": true, "text": "All", "value": "$__all"}, "sort": 1}]}, "panels": [{"id": 1, "type": "row", "title": "Overview", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}, "collapsed": false}, {"id": 2, "type": "stat", "title": "Nodes Ready", "gridPos": {"h": 4, "w": 4, "x": 0, "y": 1}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"} == 1)", "legendFormat": "ready"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background"}, "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 1}, {"color": "green", "value": 4}]}}, "overrides": []}}, {"id": 3, "type": "stat", "title": "Node Uptime", "gridPos": {"h": 4, "w": 10, "x": 4, "y": 1}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "(time() - node_boot_time_seconds) * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"}", "legendFormat": "{{nodename}}"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background"}, "fieldConfig": {"defaults": {"unit": "dtdurations", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []}}, {"id": 4, "type": "table", "title": "Kernel / Talos Version", "gridPos": {"h": 4, "w": 10, "x": 14, "y": 1}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "node_uname_info{nodename=~\"$node\"}", "legendFormat": "", "instant": true, "format": "table"}], "options": {"sortBy": [{"displayName": "nodename", "desc": false}], "footer": {"show": false}}, "fieldConfig": {"defaults": {}, "overrides": [{"matcher": {"id": "byName", "options": "Time"}, "properties": [{"id": "custom.hidden", "value": true}]}, {"matcher": {"id": "byName", "options": "Value"}, "properties": [{"id": "custom.hidden", "value": true}]}, {"matcher": {"id": "byName", "options": "__name__"}, "properties": [{"id": "custom.hidden", "value": true}]}, {"matcher": {"id": "byName", "options": "instance"}, "properties": [{"id": "custom.hidden", "value": true}]}, {"matcher": {"id": "byName", "options": "job"}, "properties": [{"id": "custom.hidden", "value": true}]}, {"matcher": {"id": "byName", "options": "domainname"}, "properties": [{"id": "custom.hidden", "value": true}]}, {"matcher": {"id": "byName", "options": "sysname"}, "properties": [{"id": "custom.hidden", "value": true}]}, {"matcher": {"id": "byName", "options": "machine"}, "properties": [{"id": "custom.hidden", "value": true}]}]}}, {"id": 5, "type": "row", "title": "CPU & Load", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5}, "collapsed": false}, {"id": 6, "type": "timeseries", "title": "CPU Utilization", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "1 - avg by (nodename) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]) * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"})", "legendFormat": "{{nodename}}"}], "fieldConfig": {"defaults": {"unit": "percentunit", "custom": {"lineWidth": 1, "fillOpacity": 10, "spanNulls": true}}, "overrides": []}, "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}}}, {"id": 7, "type": "timeseries", "title": "CPU I/O Wait + Load Average", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 6}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "avg by (nodename) (rate(node_cpu_seconds_total{mode=\"iowait\"}[5m]) * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"})", "legendFormat": "iowait {{nodename}}"}, {"refId": "B", "expr": "node_load1 * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"}", "legendFormat": "load1m {{nodename}}"}, {"refId": "C", "expr": "node_load5 * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"}", "legendFormat": "load5m {{nodename}}"}], "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 1, "fillOpacity": 10, "spanNulls": true}}, "overrides": []}, "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}}}, {"id": 8, "type": "row", "title": "Memory", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 14}, "collapsed": false}, {"id": 9, "type": "timeseries", "title": "Memory Used vs Total", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 15}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"}", "legendFormat": "used {{nodename}}"}, {"refId": "B", "expr": "node_memory_MemTotal_bytes * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"}", "legendFormat": "total {{nodename}}"}], "fieldConfig": {"defaults": {"unit": "bytes", "custom": {"lineWidth": 1, "fillOpacity": 10, "spanNulls": true}}, "overrides": []}, "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}}}, {"id": 10, "type": "timeseries", "title": "Memory Available %", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 15}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "100 * node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"}", "legendFormat": "{{nodename}}"}], "fieldConfig": {"defaults": {"unit": "percent", "custom": {"lineWidth": 1, "fillOpacity": 10, "spanNulls": true}}, "overrides": []}, "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}}}, {"id": 11, "type": "row", "title": "Disk I/O", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 23}, "collapsed": false}, {"id": 12, "type": "timeseries", "title": "Disk Throughput (Read / Write)", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum by (nodename, device) (rate(node_disk_read_bytes_total{device=~\"$device\"}[5m]) * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"})", "legendFormat": "read {{nodename}}:{{device}}"}, {"refId": "B", "expr": "sum by (nodename, device) (rate(node_disk_written_bytes_total{device=~\"$device\"}[5m]) * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"})", "legendFormat": "write {{nodename}}:{{device}}"}], "fieldConfig": {"defaults": {"unit": "Bps", "custom": {"lineWidth": 1, "fillOpacity": 10, "spanNulls": true}}, "overrides": []}, "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}}}, {"id": 13, "type": "timeseries", "title": "Disk I/O Utilization (% time busy)", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum by (nodename, device) (rate(node_disk_io_time_seconds_total{device=~\"$device\"}[5m]) * 100 * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"})", "legendFormat": "{{nodename}}:{{device}}"}], "fieldConfig": {"defaults": {"unit": "percent", "custom": {"lineWidth": 1, "fillOpacity": 10, "spanNulls": true}}, "overrides": []}, "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}}}, {"id": 14, "type": "timeseries", "title": "Disk I/O Saturation (Weighted Queue Time)", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 32}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum by (nodename, device) (rate(node_disk_io_time_weighted_seconds_total{device=~\"$device\"}[5m]) * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"})", "legendFormat": "{{nodename}}:{{device}}"}], "fieldConfig": {"defaults": {"unit": "s", "custom": {"lineWidth": 1, "fillOpacity": 10, "spanNulls": true}}, "overrides": []}, "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}}}, {"id": 15, "type": "timeseries", "title": "Filesystem /var Available (OS partition)", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 32}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "node_filesystem_avail_bytes{mountpoint=\"/var\"} * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"}", "legendFormat": "{{nodename}}"}], "fieldConfig": {"defaults": {"unit": "bytes", "custom": {"lineWidth": 1, "fillOpacity": 10, "spanNulls": true}}, "overrides": []}, "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}}}, {"id": 16, "type": "row", "title": "Hardware Temperature", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 40}, "collapsed": false}, {"id": 17, "type": "stat", "title": "CPU Package Temperature", "gridPos": {"h": 4, "w": 12, "x": 0, "y": 41}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "node_hwmon_temp_celsius{chip_name=\"coretemp\",sensor=\"temp1\"} * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"}", "legendFormat": "{{nodename}}"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background"}, "fieldConfig": {"defaults": {"unit": "celsius", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 75}, {"color": "red", "value": 90}]}}, "overrides": []}}, {"id": 18, "type": "stat", "title": "Drive Temperature", "gridPos": {"h": 4, "w": 12, "x": 12, "y": 41}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "node_hwmon_temp_celsius{chip_name=\"drivetemp\"} * on(instance) group_left(nodename) node_uname_info{nodename=~\"$node\"}", "legendFormat": "{{nodename}}"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background"}, "fieldConfig": {"defaults": {"unit": "celsius", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 45}, {"color": "red", "value": 55}]}}, "overrides": []}}, {"id": 19, "type": "row", "title": "etcd (Talos)", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 45}, "collapsed": false}, {"id": 20, "type": "stat", "title": "etcd Leaders", "gridPos": {"h": 4, "w": 4, "x": 0, "y": 46}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "sum(etcd_server_is_leader{job=\"talos-etcd\"})", "legendFormat": "leaders"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "background"}, "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 1}, {"color": "green", "value": 1}]}}, "overrides": []}}, {"id": 21, "type": "timeseries", "title": "etcd WAL fsync p99 + Proposal Failures", "gridPos": {"h": 4, "w": 20, "x": 4, "y": 46}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"refId": "A", "expr": "histogram_quantile(0.99, sum by (le, instance) (rate(etcd_disk_wal_fsync_duration_seconds_bucket{job=\"talos-etcd\"}[5m])))", "legendFormat": "wal-fsync p99 {{instance}}"}, {"refId": "B", "expr": "sum by (instance) (rate(etcd_server_proposals_failed_total{job=\"talos-etcd\"}[5m]))", "legendFormat": "proposals failed/s {{instance}}"}], "fieldConfig": {"defaults": {"unit": "s", "custom": {"lineWidth": 1, "fillOpacity": 10, "spanNulls": true}}, "overrides": []}, "options": {"tooltip": {"mode": "multi", "sort": "desc"}, "legend": {"displayMode": "list", "placement": "bottom"}}}, {"id": 22, "type": "row", "title": "I/O Error & OOM Logs", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 50}, "collapsed": false}, {"id": 23, "type": "logs", "title": "Disk / I/O Error Logs (pod logs \u2014 kube-system, longhorn)", "gridPos": {"h": 8, "w": 24, "x": 0, "y": 51}, "datasource": {"type": "loki", "uid": "loki"}, "targets": [{"refId": "A", "expr": "{namespace=~\"kube-system|longhorn-system\"} |~ \"(?i)(i\\\\/o error|buffer i\\\\/o|ext4|jbd2|oom.kill|killed process|disk.*error|health check failed|deadline exceeded|read.*error|write.*error)\""}], "options": {"showTime": true, "showLabels": true, "showCommonLabels": false, "wrapLogMessage": true, "prettifyLogMessage": false, "enableLogDetails": true, "dedupStrategy": "none", "sortOrder": "Descending"}}, {"id": 24, "type": "logs", "title": "Kubernetes Events (Node / Disk)", "gridPos": {"h": 8, "w": 24, "x": 0, "y": 59}, "datasource": {"type": "loki", "uid": "loki"}, "targets": [{"refId": "A", "expr": "{job=\"kubernetes/events\"} |~ \"(?i)(node|disk|i\\\\/o|oom|evict|pressure|not ready|failed)\""}], "options": {"showTime": true, "showLabels": true, "showCommonLabels": false, "wrapLogMessage": true, "prettifyLogMessage": false, "enableLogDetails": true, "dedupStrategy": "none", "sortOrder": "Descending"}}]}
