---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    grafana:
      enabled: false

    # This cluster is kube-proxy-free (Cilium).
    kubeProxy:
      enabled: false

    # Avoid scraping control-plane components that are often not exposed by default.
    kubeEtcd:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false

    prometheus:
      prometheusSpec:
        image:
          registry: quay.io
          repository: prometheus/prometheus
          tag: v3.11.3
          sha: c0b857aead0d5793aa566adb8f49a9983d6f6031652098759d521a330cfa050f
        retention: 15d
        externalUrl: https://prometheus.${SECRET_DOMAIN}
        externalLabels:
          cluster: homelab-cluster
        podMetadata:
          annotations:
            reloader.stakater.com/auto: "true"
        # Accept remote_write in-cluster (used by Tempo metrics-generator).
        enableRemoteWriteReceiver: true
        # Remote write to Mimir is disabled (Mimir turned off).
        remoteWrite: []
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        podMonitorSelector: {}
        probeSelector: {}
        ruleSelector: {}
        serviceMonitorNamespaceSelector: {}
        podMonitorNamespaceSelector: {}
        probeNamespaceSelector: {}
        ruleNamespaceSelector: {}
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi
        resources:
          requests:
            cpu: 400m
            memory: 1500Mi
          limits:
            cpu: "2"
            memory: 3Gi

    prometheusOperator:
      image:
        registry: quay.io
        repository: prometheus-operator/prometheus-operator
        tag: v0.91.0
        sha: 9e53e13139218aca79ee000172de73355e9174ef2904585bfad9497fc71aae2d
      prometheusConfigReloader:
        image:
          registry: quay.io
          repository: prometheus-operator/prometheus-config-reloader
          tag: v0.91.0
          sha: 7d9e4eea5f1139e602508871f422b0116c60e87c662f3dcd234d5ab60cd0d8c1
      podAnnotations:
        reloader.stakater.com/auto: "true"
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    kube-state-metrics:
      podAnnotations:
        reloader.stakater.com/auto: "true"
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
      # Reduce restarts caused by transient API connectivity during /livez checks.
      livenessProbe:
        httpGet:
          path: /livez
          port: http
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 10
        failureThreshold: 6
        successThreshold: 1
      readinessProbe:
        httpGet:
          path: /readyz
          port: metrics
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 10
        failureThreshold: 6
        successThreshold: 1

    nodeExporter:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 50m
          memory: 128Mi

    prometheus-node-exporter:
      podAnnotations:
        reloader.stakater.com/auto: "true"

    alertmanager:
      config:
        global:
          resolve_timeout: 5m

        route:
          receiver: "null"
          group_by: [alertname, namespace, severity, service, owner, project, pod, job, instance]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            # Keep the always-firing Watchdog out of your inbox.
            - receiver: "null"
              matchers:
                - alertname="Watchdog"

            - receiver: discord
              matchers:
                - severity=~"warning|critical"
                - alertname!="InfoInhibitor"

        receivers:
          - name: "null"

          - name: discord
            slack_configs:
              - api_url_file: "/etc/alertmanager/secrets/alertmanager-discord/webhook_url"
                send_resolved: true
                title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }} ({{ .CommonLabels.namespace }})"
                title_link: "{{ .ExternalURL }}/#/alerts?receiver={{ .Receiver }}"
                text: |-
                  Cluster: {{ .CommonLabels.cluster }}
                  Namespace: {{ .CommonLabels.namespace }}
                  Severity: {{ .CommonLabels.severity }}
                  {{ if .CommonLabels.owner }}Owner: {{ .CommonLabels.owner }}{{ end }}
                  {{ if .CommonLabels.service }}Service: {{ .CommonLabels.service }}{{ end }}
                  {{ if .CommonLabels.project }}Project: {{ .CommonLabels.project }}{{ end }}
                  {{ if .CommonLabels.pod }}Pod: {{ .CommonLabels.pod }}{{ end }}
                  {{ if .CommonLabels.job }}Job: {{ .CommonLabels.job }}{{ end }}
                  {{ if .CommonLabels.instance }}Instance: {{ .CommonLabels.instance }}{{ end }}
                  {{ if .CommonLabels.remote_name }}Remote: {{ .CommonLabels.remote_name }}{{ end }}

                  {{ range .Alerts }}
                  ---
                  {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ else }}{{ .Labels.alertname }}{{ end }}
                  {{ if .Annotations.runbook_url }}Runbook: {{ .Annotations.runbook_url }}{{ end }}
                  {{ end }}

                  Full details: {{ .ExternalURL }}/#/alerts?receiver={{ .Receiver }}
                  Alertmanager: {{ .ExternalURL }}
                  {{ if .CommonLabels.alertname }}Silence: {{ .ExternalURL }}/#/silences/new?filter=%7Balertname%3D%22{{ .CommonLabels.alertname }}%22{{ if .CommonLabels.namespace }}%2Cnamespace%3D%22{{ .CommonLabels.namespace }}%22{{ end }}{{ if .CommonLabels.service }}%2Cservice%3D%22{{ .CommonLabels.service }}%22{{ end }}{{ if .CommonLabels.owner }}%2Cowner%3D%22{{ .CommonLabels.owner }}%22{{ end }}%7D{{ end }}

        inhibit_rules:
          - source_matchers:
              - severity="critical"
            target_matchers:
              - severity="warning"
            equal: [namespace, alertname]

      alertmanagerSpec:
        image:
          registry: quay.io
          repository: prometheus/alertmanager
          tag: v0.32.1
          sha: 51a825c2a40acc3e338fdd00d622e01ec090f72be2b3ea46be0839cd47a4d286
        externalUrl: https://alertmanager.${SECRET_DOMAIN}
        podMetadata:
          annotations:
            reloader.stakater.com/auto: "true"
        secrets:
          - alertmanager-discord
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 5Gi
