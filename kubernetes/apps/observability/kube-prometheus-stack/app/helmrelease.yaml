---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    grafana:
      enabled: false

    # This cluster is kube-proxy-free (Cilium).
    kubeProxy:
      enabled: false

    # Talos exposes etcd metrics on port 2381 (HTTP) on each control-plane node IP.
    # kubeControllerManager and kubeScheduler bind to 127.0.0.1 only on Talos and cannot be scraped.
    kubeEtcd:
      enabled: true
      endpoints:
        - 10.0.0.20
        - 10.0.0.21
        - 10.0.0.22
      service:
        enabled: true
        port: 2381
        targetPort: 2381
      serviceMonitor:
        scheme: http
        insecureSkipVerify: true
        interval: 30s
        metricRelabelings:
          - action: replace
            targetLabel: job
            replacement: talos-etcd
          # Drop the etcd request-latency histogram + per-method gRPC handled counters
          # (~16k series total, unused by any dashboard/rule here — the etcd job is also
          # renamed, so chart rules don't match).
          - action: drop
            sourceLabels:
              - __name__
            regex: "etcd_request_duration_seconds_bucket|grpc_server_handled_total"
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false

    # Drop high-cardinality series nothing here consumes (~74k active series, ~23% of
    # the head — see the observability runbook cardinality audit):
    #  - apiserver write/watch histograms (original set)
    #  - etcd_request_duration_seconds_bucket (~30k): the apiserver re-exposes its
    #    etcd-client latency histogram; the talos-etcd copy is dropped separately, but
    #    that rule is job-scoped so this path slipped through. Nothing graphs/alerts it.
    #  - kubernetes_feature_enabled (feature-gate gauges) + apiserver workqueue histograms
    # Kept: apiserver_request_duration_seconds_bucket + apiserver_request_sli_duration_seconds_bucket
    # — the built-in API-server SLO/burn-rate rules depend on those (verified: still in use).
    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            sourceLabels:
              - __name__
            regex: "apiserver_request_body_size_bytes_bucket|apiserver_response_sizes_bucket|apiserver_watch_list_duration_seconds_bucket|apiserver_watch_cache_read_wait_seconds_bucket|apiserver_watch_events_sizes_bucket|etcd_request_duration_seconds_bucket|kubernetes_feature_enabled|workqueue_work_duration_seconds_bucket|workqueue_queue_duration_seconds_bucket"

    prometheus:
      prometheusSpec:
        image:
          registry: quay.io
          repository: prometheus/prometheus
          tag: v3.11.3
          sha: c0b857aead0d5793aa566adb8f49a9983d6f6031652098759d521a330cfa050f
        retention: 15d
        # 60s scrape halves ingest (~11k -> ~5.5k samples/s) — a CPU/WAL win, fine for
        # homelab graph resolution. Per-ServiceMonitor overrides (e.g. kubeEtcd 30s) win.
        scrapeInterval: 60s
        externalUrl: https://prometheus.${SECRET_DOMAIN}
        externalLabels:
          cluster: homelab-cluster
        priorityClassName: system-cluster-critical
        nodeSelector:
          node.webgrip.io/pool: worker
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        podMetadata:
          annotations:
            reloader.stakater.com/auto: "true"
        # Accept remote_write in-cluster (used by Tempo metrics-generator).
        enableRemoteWriteReceiver: true
        # Remote write to Mimir is disabled (Mimir turned off).
        remoteWrite: []
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        podMonitorSelector: {}
        probeSelector: {}
        ruleSelector: {}
        serviceMonitorNamespaceSelector: {}
        podMonitorNamespaceSelector: {}
        probeNamespaceSelector: {}
        ruleNamespaceSelector: {}
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - "ReadWriteOnce"
              resources:
                requests:
                  storage: 50Gi
        # Cap the Go heap so GC reclaims aggressively and RSS tracks the ~3Gi request
        # instead of ballooning toward 2x live heap (GOGC=100 default). Set below the
        # 6Gi limit, which stays as headroom for the WAL-replay spike on restart.
        containers:
          - name: prometheus
            env:
              - name: GOMEMLIMIT
                value: "3GiB"
        resources:
          requests:
            cpu: 400m
            memory: 3Gi
          limits:
            cpu: "2"
            memory: 6Gi

    prometheusOperator:
      image:
        registry: quay.io
        repository: prometheus-operator/prometheus-operator
        tag: v0.91.0
        sha: 9e53e13139218aca79ee000172de73355e9174ef2904585bfad9497fc71aae2d
      prometheusConfigReloader:
        image:
          registry: quay.io
          repository: prometheus-operator/prometheus-config-reloader
          tag: v0.91.0
          sha: 7d9e4eea5f1139e602508871f422b0116c60e87c662f3dcd234d5ab60cd0d8c1
      podAnnotations:
        reloader.stakater.com/auto: "true"
      resources:
        requests:
          cpu: 100m
          memory: 96Mi
        limits:
          cpu: 500m
          memory: 256Mi
      nodeSelector:
        node.webgrip.io/pool: worker
      tolerations:
        - key: dedicated
          operator: Equal
          value: fringe
          effect: NoSchedule

    kube-state-metrics:
      # kube_pod_status_reason (~1.6k series) is unused by any dashboard/rule here.
      metricDenylist:
        - kube_pod_status_reason
      podAnnotations:
        reloader.stakater.com/auto: "true"
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
      nodeSelector:
        node.webgrip.io/pool: worker
      tolerations:
        - key: dedicated
          operator: Equal
          value: fringe
          effect: NoSchedule
      # Reduce restarts caused by transient API connectivity during /livez checks.
      livenessProbe:
        httpGet:
          path: /livez
          port: http
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 10
        failureThreshold: 6
        successThreshold: 1
      readinessProbe:
        httpGet:
          path: /readyz
          port: metrics
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 10
        failureThreshold: 6
        successThreshold: 1

    nodeExporter:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 50m
          memory: 128Mi

    prometheus-node-exporter:
      podAnnotations:
        reloader.stakater.com/auto: "true"

    alertmanager:
      config:
        global:
          resolve_timeout: 5m

        route:
          receiver: "null"
          group_by:
            - alertname
            - namespace
            - severity
            - service
            - owner
            - project
            - pod
            - job
            - instance
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - receiver: "null"
              matchers:
                - alertname="Watchdog"

        receivers:
          - name: "null"

        inhibit_rules:
          - source_matchers:
              - severity="critical"
            target_matchers:
              - severity="warning"
            equal:
              - namespace
              - alertname

      alertmanagerSpec:
        image:
          registry: quay.io
          repository: prometheus/alertmanager
          tag: v0.32.1
          sha: 51a825c2a40acc3e338fdd00d622e01ec090f72be2b3ea46be0839cd47a4d286
        externalUrl: https://alertmanager.${SECRET_DOMAIN}
        podMetadata:
          annotations:
            reloader.stakater.com/auto: "true"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - "ReadWriteOnce"
              resources:
                requests:
                  storage: 5Gi
