---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-victorialogs
  labels:
    app.kubernetes.io/name: mcp-victorialogs
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-victorialogs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-victorialogs
    spec:
      nodeSelector:
        node.webgrip.io/pool: worker
      tolerations:
        - key: dedicated
          operator: Equal
          value: fringe
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: mcp-victorialogs
          image: harbor.webgrip.dev/ghcr/victoriametrics/mcp-victorialogs:v1.9.0@sha256:753bb4fbe402ca1a782842f44636830f9895736f11d7fe783b924f8a0daf083d
          env:
            - name: VL_INSTANCE_ENTRYPOINT
              value: "http://vlsingle-victorialogs.observability.svc.cluster.local:9428"
            # Streamable HTTP mode; MCP endpoint is served at /mcp.
            - name: MCP_SERVER_MODE
              value: "http"
            - name: MCP_LISTEN_ADDR
              value: "0.0.0.0:8081"
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
