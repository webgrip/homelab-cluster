---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pyroscope
spec:
  chartRef:
    kind: OCIRepository
    name: pyroscope
  interval: 1h
  install:
    remediation:
      retries: 3
  # Longhorn RWO volume migration between nodes can take several minutes;
  # increase timeout so the upgrade doesn't fail while waiting for reattach.
  timeout: 15m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    serviceMonitor:
      enabled: true

    # Keep the initial install simple/reliable: use local persistent storage.
    # (Pyroscope object storage can be enabled later, once you pick bucket policy + format.)
    pyroscope:
      podAnnotations:
        reloader.stakater.com/auto: "true"

      podSecurityContext:
        # Keep chart defaults and skip recursive chown on restarts if root dir
        # ownership already matches. Without this, the 20 GB volume can trigger
        # a multi-minute write storm over tens-of-thousands of files.
        fsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        fsGroupChangePolicy: OnRootMismatch

      # The chart only renders readinessProbe.initialDelaySeconds.
      readinessProbe:
        # Pyroscope readiness can be slow during compaction/startup.
        initialDelaySeconds: 10

      # Keep pyroscope off the persistent etcd leader (soyo-3/10.0.0.22).
      # Pyroscope does sustained high-throughput disk writes; co-locating it with
      # the etcd leader saturates the shared disk and pushes etcd WAL fsync p99
      # above the 5 s lease timeout, causing cluster-wide context deadline errors.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - soyo-3

      # When MinIO is disabled, the chart would otherwise render an empty config.
      # Make the local filesystem object store explicit so the single-binary pod can boot reliably.
      structuredConfig:
        storage:
          backend: filesystem
          filesystem:
            dir: /data/v2/shared
      extraArgs:
        log.level: info
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 20Gi
