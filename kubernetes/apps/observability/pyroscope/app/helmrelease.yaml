---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pyroscope
spec:
  chartRef:
    kind: OCIRepository
    name: pyroscope
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    podAnnotations:
      reloader.stakater.com/auto: "true"

    podSecurityContext:
      # Skip recursive chown on restarts if root dir ownership already matches.
      # Without this, a 20 GB volume with tens-of-thousands of files causes a
      # multi-minute write storm that saturates disk I/O and causes etcd WAL
      # fsync latency spikes across the whole cluster.
      fsGroupChangePolicy: OnRootMismatch

    serviceMonitor:
      enabled: true

    # Pyroscope readiness can be slow during compaction/startup.
    readinessProbe:
      httpGet:
        path: /ready
        port: 4040
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1

    # Keep the initial install simple/reliable: use local persistent storage.
    # (Pyroscope object storage can be enabled later, once you pick bucket policy + format.)
    pyroscope:
      # When MinIO is disabled, the chart would otherwise render an empty config.
      # Make the local filesystem object store explicit so the single-binary pod can boot reliably.
      structuredConfig:
        storage:
          backend: filesystem
          filesystem:
            dir: /data/v2/shared
      extraArgs:
        log.level: info
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 20Gi
