---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pyroscope
spec:
  interval: 1h
  chart:
    spec:
      chart: pyroscope
      version: 2.0.1
      sourceRef:
        kind: HelmRepository
        name: grafana-charts-pyroscope
        namespace: observability
  values:
    podAnnotations:
      reloader.stakater.com/auto: "true"

    serviceMonitor:
      enabled: true

    # Keep the initial install simple/reliable: use local persistent storage.
    # (Pyroscope object storage can be enabled later, once you pick bucket policy + format.)
    # v2.0: keep v1 storage path; v2 requires object-storage backend which is not yet configured.
    architecture:
      storage:
        v1: true
        v2: false

    pyroscope:
      extraArgs:
        log.level: info
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      persistence:
        enabled: true
        size: 20Gi
