---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pyroscope
spec:
  chartRef:
    kind: OCIRepository
    name: pyroscope
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    podAnnotations:
      reloader.stakater.com/auto: "true"

    serviceMonitor:
      enabled: true

    # Pyroscope readiness can be slow during compaction/startup.
    readinessProbe:
      httpGet:
        path: /ready
        port: 4040
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1

    # Keep the initial install simple/reliable: use local persistent storage.
    # (Pyroscope object storage can be enabled later, once you pick bucket policy + format.)
    pyroscope:
      extraArgs:
        log.level: info
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      persistence:
        enabled: true
        size: 20Gi
