---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-state-metrics
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  chartRef:
    kind: OCIRepository
    name: kube-state-metrics
  # Standalone replacement for the kube-state-metrics subchart that
  # kube-prometheus-stack used to bundle. Provides kube_* (consumed by half the
  # platform/security rules, OpenCost and the dashboards). Values ported from the
  # old subchart config.
  values:
    # kube_pod_status_reason (~1.6k series) is unused by any dashboard/rule here.
    metricDenylist:
      - kube_pod_status_reason
    podAnnotations:
      reloader.stakater.com/auto: "true"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    nodeSelector:
      node.webgrip.io/pool: worker
    tolerations:
      - key: dedicated
        operator: Equal
        value: fringe
        effect: NoSchedule
    # Emit a ServiceMonitor; the VM operator converts it to a VMServiceScrape and
    # VMAgent (selectAllByDefault) scrapes it. The release label is a no-op now.
    prometheus:
      monitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
