---
apiVersion: v1
kind: ConfigMap
metadata:
  name: github-billing-exporter
  namespace: observability
data:
  exporter.py: |-
    #!/usr/bin/env python3
    import calendar
    import json
    import os
    import time
    import urllib.error
    import urllib.parse
    import urllib.request
    from collections import defaultdict
    from datetime import datetime, timezone
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    ORG = os.environ.get("GITHUB_ORG", "webgrip")
    TOKEN = os.environ["GITHUB_API_TOKEN"]
    PORT = int(os.environ.get("PORT", "8080"))
    CACHE_TTL = int(os.environ.get("SCRAPE_INTERVAL_SECONDS", "900"))
    API = "https://api.github.com"

    cache = {"ts": 0, "body": "", "success": False}

    def label_value(value):
        value = "" if value is None else str(value)
        return value.replace("\\", "\\\\").replace("\n", "\\n").replace('"', '\\"')

    def labels(items):
        if not items:
            return ""
        return "{" + ",".join(f'{k}="{label_value(v)}"' for k, v in sorted(items.items())) + "}"

    def metric(lines, name, value, label_items=None):
        try:
            value = float(value)
        except (TypeError, ValueError):
            return
        lines.append(f"{name}{labels(label_items or {})} {value}")

    def parse_ts(value):
        if not value:
            return None
        try:
            return datetime.fromisoformat(value.replace("Z", "+00:00")).timestamp()
        except ValueError:
            return None

    def parse_day(value):
        if not value:
            return None
        try:
            return datetime.fromisoformat(value.replace("Z", "+00:00")).date()
        except ValueError:
            return None

    def github(path, endpoint, lines):
        url = API + path
        req = urllib.request.Request(
            url,
            headers={
                "Authorization": f"Bearer {TOKEN}",
                "Accept": "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
                "User-Agent": "homelab-github-billing-exporter",
            },
        )
        status = 0
        try:
            with urllib.request.urlopen(req, timeout=30) as resp:
                status = resp.status
                body = resp.read().decode("utf-8")
                data = json.loads(body) if body else {}
        except urllib.error.HTTPError as exc:
            status = exc.code
            try:
                data = json.loads(exc.read().decode("utf-8"))
            except Exception:
                data = {"message": str(exc)}
        except Exception as exc:
            data = {"message": str(exc)}

        ok = 1 if 200 <= status < 300 else 0
        metric(lines, "github_billing_exporter_api_request_success", ok, {"org": ORG, "endpoint": endpoint})
        metric(lines, "github_billing_exporter_api_response_status_code", status, {"org": ORG, "endpoint": endpoint})
        return data, ok == 1

    def sum_by(items, key_fn, amount_key="netAmount"):
        out = defaultdict(float)
        for item in items:
            out[key_fn(item)] += float(item.get(amount_key) or 0)
        return out

    def emit_forecasts(lines, summary_items, daily_items):
        now = datetime.now(timezone.utc)
        groups = defaultdict(float)
        for item in summary_items:
            product = (item.get("product") or "unknown").lower()
            amount = float(item.get("netAmount") or 0)
            groups[(product, item.get("sku") or "unknown")] += amount
            groups[(product, "all")] += amount
            groups[("all", "all")] += amount

        daily_by_group = defaultdict(lambda: defaultdict(float))
        for item in daily_items:
            day = parse_day(item.get("date"))
            if day is None or day.year != now.year or day.month != now.month:
                continue
            amount = float(item.get("netAmount") or 0)
            product = (item.get("product") or "unknown").lower()
            sku = item.get("sku") or "unknown"
            daily_by_group[(product, sku)][day.isoformat()] += amount
            daily_by_group[(product, "all")][day.isoformat()] += amount
            daily_by_group[("all", "all")][day.isoformat()] += amount

        days_in_month = calendar.monthrange(now.year, now.month)[1]
        remaining = max(days_in_month - now.day, 0)
        for (product, sku), mtd in groups.items():
            days = daily_by_group.get((product, sku), {})
            values = list(days.values())
            daily_avg = sum(values) / len(values) if values else mtd / max(now.day, 1)
            max_daily = max(values) if values else daily_avg
            min_daily = min(values) if values else 0
            scenarios = {
                "best": mtd + min_daily * remaining,
                "likely": mtd + daily_avg * remaining,
                "worst": mtd + max_daily * remaining,
            }
            for scenario, value in scenarios.items():
                metric(lines, "github_billing_forecast_amount_usd", value, {"org": ORG, "product": product, "sku": sku, "scenario": scenario})

    def emit_anomalies(lines, daily_items):
        totals = defaultdict(lambda: defaultdict(float))
        for item in daily_items:
            day = parse_day(item.get("date"))
            if day is None:
                continue
            key = (
                item.get("product") or "unknown",
                item.get("sku") or "unknown",
                item.get("repositoryName") or "none",
            )
            totals[key][day.isoformat()] += float(item.get("netAmount") or 0)

        for (product, sku, repo), by_day in totals.items():
            ordered = sorted(by_day.items())
            if not ordered:
                continue
            latest_day, latest_amount = ordered[-1]
            for window in (7, 30):
                baseline_values = [amount for _, amount in ordered[-(window + 1):-1]]
                baseline = sum(baseline_values) / len(baseline_values) if baseline_values else 0
                ratio = latest_amount / baseline if baseline > 0 else (0 if latest_amount == 0 else 999)
                label_items = {"org": ORG, "product": product, "sku": sku, "repository": repo, "date": latest_day, "window": f"{window}d"}
                metric(lines, "github_billing_daily_latest_net_amount_usd", latest_amount, label_items)
                metric(lines, "github_billing_daily_baseline_net_amount_usd", baseline, label_items)
                metric(lines, "github_billing_anomaly_ratio", ratio, label_items)

    def collect():
        lines = [
            "# HELP github_billing_exporter_last_scrape_success Whether the latest GitHub billing scrape completed successfully.",
            "# TYPE github_billing_exporter_last_scrape_success gauge",
            "# HELP github_billing_mtd_net_amount_usd Month-to-date GitHub net billing amount.",
            "# TYPE github_billing_mtd_net_amount_usd gauge",
            "# HELP github_billing_daily_net_amount_usd Daily GitHub billing amount by product, SKU and repository.",
            "# TYPE github_billing_daily_net_amount_usd gauge",
        ]

        summary, ok_summary = github(f"/organizations/{ORG}/settings/billing/usage/summary", "billing_usage_summary", lines)
        usage, ok_usage = github(f"/organizations/{ORG}/settings/billing/usage", "billing_usage_daily", lines)
        premium, ok_premium = github(f"/organizations/{ORG}/settings/billing/premium_request/usage", "premium_request_usage", lines)
        budgets, ok_budgets = github(f"/organizations/{ORG}/settings/billing/budgets?per_page=100", "billing_budgets", lines)
        seats, ok_seats = github(f"/orgs/{ORG}/copilot/billing/seats?per_page=100", "copilot_seats", lines)
        runners, ok_runners = github(f"/orgs/{ORG}/actions/runners?per_page=100", "actions_runners", lines)
        copilot_metrics, ok_copilot_metrics = github(f"/orgs/{ORG}/copilot/metrics", "copilot_metrics", lines)

        summary_items = summary.get("usageItems", []) if isinstance(summary, dict) else []
        daily_items = usage.get("usageItems", []) if isinstance(usage, dict) else []
        premium_items = premium.get("usageItems", []) if isinstance(premium, dict) else []

        for item in summary_items:
            product = item.get("product") or "unknown"
            sku = item.get("sku") or "unknown"
            unit = item.get("unitType") or "unknown"
            label_items = {"org": ORG, "product": product, "sku": sku, "unit": unit}
            metric(lines, "github_billing_mtd_gross_amount_usd", item.get("grossAmount"), label_items)
            metric(lines, "github_billing_mtd_net_amount_usd", item.get("netAmount"), label_items)
            metric(lines, "github_billing_mtd_gross_quantity", item.get("grossQuantity"), label_items)
            metric(lines, "github_billing_mtd_net_quantity", item.get("netQuantity"), label_items)

        for product, amount in sum_by(summary_items, lambda i: i.get("product") or "unknown").items():
            metric(lines, "github_billing_mtd_net_amount_usd", amount, {"org": ORG, "product": product, "sku": "all", "unit": "usd"})
        metric(lines, "github_billing_mtd_net_amount_usd", sum(float(i.get("netAmount") or 0) for i in summary_items), {"org": ORG, "product": "all", "sku": "all", "unit": "usd"})

        for item in daily_items:
            label_items = {
                "org": ORG,
                "date": (parse_day(item.get("date")).isoformat() if parse_day(item.get("date")) else "unknown"),
                "product": item.get("product") or "unknown",
                "sku": item.get("sku") or "unknown",
                "repository": item.get("repositoryName") or "none",
                "unit": item.get("unitType") or "unknown",
            }
            metric(lines, "github_billing_daily_net_amount_usd", item.get("netAmount"), label_items)
            metric(lines, "github_billing_daily_gross_amount_usd", item.get("grossAmount"), label_items)
            metric(lines, "github_billing_daily_quantity", item.get("quantity"), label_items)

        for item in premium_items:
            label_items = {
                "org": ORG,
                "model": item.get("model") or "unknown",
                "sku": item.get("sku") or "unknown",
                "unit": item.get("unitType") or "unknown",
            }
            metric(lines, "github_premium_request_mtd_net_amount_usd", item.get("netAmount"), label_items)
            metric(lines, "github_premium_request_mtd_gross_amount_usd", item.get("grossAmount"), label_items)
            metric(lines, "github_premium_request_mtd_net_quantity", item.get("netQuantity"), label_items)
            metric(lines, "github_premium_request_mtd_gross_quantity", item.get("grossQuantity"), label_items)

        premium_total = sum(float(i.get("netAmount") or 0) for i in premium_items)
        metric(lines, "github_premium_request_mtd_net_amount_usd", premium_total, {"org": ORG, "model": "all", "sku": "all", "unit": "usd"})

        for budget in budgets.get("budgets", []) if isinstance(budgets, dict) else []:
            budget_id = budget.get("id") or "unknown"
            sku = budget.get("budget_product_sku") or "unknown"
            label_items = {
                "org": ORG,
                "budget_id": budget_id,
                "budget_scope": budget.get("budget_scope") or "unknown",
                "budget_entity": budget.get("budget_entity_name") or "unknown",
                "budget_product_sku": sku,
            }
            amount = float(budget.get("budget_amount") or 0)
            metric(lines, "github_budget_amount_usd", amount, label_items)
            metric(lines, "github_budget_prevent_further_usage", 1 if budget.get("prevent_further_usage") else 0, label_items)
            alerting = budget.get("budget_alerting") or {}
            recipients = alerting.get("alert_recipients") or []
            metric(lines, "github_budget_will_alert", 1 if alerting.get("will_alert") else 0, label_items)
            metric(lines, "github_budget_alert_recipient_count", len(recipients), label_items)
            if sku == "premium_requests" and amount > 0:
                metric(lines, "github_budget_usage_ratio", premium_total / amount, label_items)
                metric(lines, "github_budget_remaining_usd", max(amount - premium_total, 0), label_items)

        now = time.time()
        seat_list = seats.get("seats", []) if isinstance(seats, dict) else []
        metric(lines, "github_copilot_seats_total", seats.get("total_seats", len(seat_list)) if isinstance(seats, dict) else 0, {"org": ORG})
        for seat in seat_list:
            assignee = seat.get("assignee") or {}
            login = assignee.get("login") or "unknown"
            label_items = {"org": ORG, "login": login, "plan_type": seat.get("plan_type") or "unknown"}
            metric(lines, "github_copilot_seat_assigned", 1, label_items)
            for field, metric_name in (
                ("created_at", "github_copilot_seat_created_timestamp_seconds"),
                ("last_activity_at", "github_copilot_seat_last_activity_timestamp_seconds"),
                ("last_authenticated_at", "github_copilot_seat_last_authenticated_timestamp_seconds"),
            ):
                ts = parse_ts(seat.get(field))
                if ts is not None:
                    metric(lines, metric_name, ts, label_items)
            last_activity = parse_ts(seat.get("last_activity_at")) or parse_ts(seat.get("last_authenticated_at"))
            metric(lines, "github_copilot_seat_inactive_days", (now - last_activity) / 86400 if last_activity else 9999, label_items)

        runner_list = runners.get("runners", []) if isinstance(runners, dict) else []
        runner_totals = defaultdict(int)
        for runner in runner_list:
            status = runner.get("status") or "unknown"
            busy = str(bool(runner.get("busy"))).lower()
            os_name = runner.get("os") or "unknown"
            runner_totals[(status, busy, os_name)] += 1
            metric(lines, "github_actions_runner_info", 1, {"org": ORG, "name": runner.get("name") or "unknown", "status": status, "busy": busy, "os": os_name})
        for (status, busy, os_name), count in runner_totals.items():
            metric(lines, "github_actions_runners_total", count, {"org": ORG, "status": status, "busy": busy, "os": os_name})

        metric(lines, "github_copilot_metrics_api_available", 1 if ok_copilot_metrics else 0, {"org": ORG})
        if ok_copilot_metrics and isinstance(copilot_metrics, list):
            for day in copilot_metrics:
                label_items = {"org": ORG, "date": day.get("date") or "unknown"}
                metric(lines, "github_copilot_metrics_total_active_users", day.get("total_active_users"), label_items)
                metric(lines, "github_copilot_metrics_total_engaged_users", day.get("total_engaged_users"), label_items)

        emit_forecasts(lines, summary_items, daily_items)
        emit_anomalies(lines, daily_items)

        success = all([ok_summary, ok_usage, ok_premium, ok_budgets, ok_seats])
        metric(lines, "github_billing_exporter_last_scrape_success", 1 if success else 0, {"org": ORG})
        metric(lines, "github_billing_exporter_last_scrape_timestamp_seconds", time.time(), {"org": ORG})
        return "\n".join(lines) + "\n"

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/healthz":
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"ok\n")
                return
            if self.path != "/metrics":
                self.send_response(404)
                self.end_headers()
                return

            now = time.time()
            if now - cache["ts"] > CACHE_TTL:
                try:
                    cache["body"] = collect()
                    cache["success"] = True
                except Exception as exc:
                    cache["body"] = (
                        '# HELP github_billing_exporter_last_scrape_success Whether the latest GitHub billing scrape completed successfully.\n'
                        '# TYPE github_billing_exporter_last_scrape_success gauge\n'
                        f'github_billing_exporter_last_scrape_success{{org="{label_value(ORG)}"}} 0\n'
                        f'github_billing_exporter_error{{org="{label_value(ORG)}",message="{label_value(exc)}"}} 1\n'
                    )
                    cache["success"] = False
                cache["ts"] = now

            body = cache["body"].encode("utf-8")
            self.send_response(200)
            self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, fmt, *args):
            return

    if __name__ == "__main__":
        server = ThreadingHTTPServer(("0.0.0.0", PORT), Handler)
        server.serve_forever()
