---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-billing-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: github-billing-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: github-billing-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: github-billing-exporter
      annotations:
        reloader.stakater.com/auto: "true"
        configmap.reloader.stakater.com/reload: github-billing-exporter
    spec:
      containers:
        - name: exporter
          image: python:3.13-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/exporter.py
          env:
            - name: GITHUB_ORG
              value: webgrip
            - name: PORT
              value: "8080"
            - name: SCRAPE_INTERVAL_SECONDS
              value: "900"
            - name: GITHUB_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: grafana-github-api
                  key: token
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: github-billing-exporter
