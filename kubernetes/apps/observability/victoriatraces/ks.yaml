---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoriatraces
spec:
  dependsOn:
    - name: vm-operator
      namespace: observability
    # The service-graphs dashboard is a GrafanaDashboard CR.
    - name: grafana-operator
      namespace: observability
  interval: 1h
  path: ./kubernetes/apps/observability/victoriatraces/app
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  # wait:false for the same reason as victorialogs: dependents gate on the
  # CRs being applied, not on kstatus reading the operator-managed VTSingle.
  wait: false
