---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-operator
spec:
  interval: 1h
  install:
    timeout: 15m
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  rollback:
    timeout: 15m
  chart:
    spec:
      chart: grafana-operator
      version: 5.23.0
      sourceRef:
        kind: HelmRepository
        name: grafana-operator
        namespace: observability
  values:
    # Empty string means all namespaces. Do not use [] here; the chart renders
    # that as WATCH_NAMESPACE=[] and the operator ignores every real namespace.
    watchNamespaces: ""

    # Use mutable CRDs so Flux handles upgrades without a manual kubectl apply.
    crds:
      immutable: false

    logging:
      level: info
      encoder: console

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    livenessProbe:
      httpGet:
        path: /healthz
        port: 8081
      timeoutSeconds: 5
      failureThreshold: 6
    readinessProbe:
      httpGet:
        path: /readyz
        port: 8081
      timeoutSeconds: 5
      failureThreshold: 6

    nodeSelector:
      nodegroup: fringe
    tolerations:
      - key: dedicated
        operator: Equal
        value: fringe
        effect: NoSchedule

    # Expose operator metrics for Prometheus scraping.
    metrics:
      enabled: true

    serviceMonitor:
      enabled: true
      labels:
        release: kube-prometheus-stack
