---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy-gateway
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: alloy
      version: 1.10.1
      sourceRef:
        kind: HelmRepository
        name: grafana-charts-alloy-gateway
        namespace: observability
  values:
    controller:
      type: deployment
      replicas: 1
      nodeSelector:
        node.webgrip.io/pool: worker
      tolerations:
        - key: dedicated
          operator: Equal
          value: fringe
          effect: NoSchedule

    topologySpreadConstraints: []

    alloy:
      podAnnotations:
        reloader.stakater.com/auto: "true"

      resources:
        requests:
          cpu: 100m
          memory: 192Mi
        limits:
          cpu: 500m
          # Headroom for the spanmetrics/servicegraph connector state
          # (in-memory series + unpaired-span store) added for VictoriaTraces.
          memory: 512Mi
      configMap:
        create: true
        content: |
          faro.receiver "main" {
            server {
              // Address only — the port is a separate attribute (defaults to 12347).
              // "0.0.0.0:12347" made the listener fail with "too many colons".
              listen_address = "0.0.0.0"
              listen_port    = 12347
            }

            output {
              logs   = [loki.write.main.receiver]
              traces = [otelcol.processor.batch.main.input]
            }
          }

          // VictoriaLogs Loki-protocol ingest; _stream_fields pins the stream shape
          // for the OTLP->loki label set + Faro's app/kind labels (absent fields
          // on an entry are ignored).
          loki.write "main" {
            endpoint {
              url = "http://vlsingle-victorialogs.observability.svc.cluster.local:9428/insert/loki/api/v1/push?_stream_fields=service_name,service_namespace,deployment_environment,event_name,event_domain,job,app,kind"
            }
          }

          otelcol.receiver.otlp "main" {
            grpc {
              endpoint = "0.0.0.0:4317"
            }

            http {
              endpoint = "0.0.0.0:4318"
            }

            output {
              traces = [otelcol.processor.batch.main.input]
              logs   = [otelcol.processor.attributes.loki_labels.input]
              metrics = [otelcol.processor.batch.metrics.input]
            }
          }

          otelcol.processor.batch "metrics" {
            output {
              metrics = [otelcol.exporter.prometheus.prometheus.input]
            }
          }

          otelcol.exporter.prometheus "prometheus" {
            forward_to = [prometheus.remote_write.prometheus.receiver]
          }

          prometheus.remote_write "prometheus" {
            endpoint {
              url = "http://vmsingle-vmsingle.observability.svc.cluster.local:8429/api/v1/write"
            }
          }

          otelcol.processor.attributes "loki_labels" {
            action {
              key = "loki.resource.labels"
              action = "insert"
              value = "service.name, service.namespace, deployment.environment"
            }

            action {
              key = "loki.attribute.labels"
              action = "insert"
              value = "event.domain, event.name"
            }

            output {
              logs = [otelcol.exporter.loki.main.input]
            }
          }

          otelcol.exporter.loki "main" {
            forward_to = [loki.write.main.receiver]
          }

          otelcol.processor.batch "main" {
            output {
              traces = [
                otelcol.exporter.otlphttp.victoriatraces.input,
                otelcol.connector.spanmetrics.main.input,
                otelcol.connector.servicegraph.main.input,
              ]
            }
          }

          // VictoriaTraces OTLP/HTTP ingest; the otlphttp exporter appends
          // /v1/traces to this base, giving /insert/opentelemetry/v1/traces.
          otelcol.exporter.otlphttp "victoriatraces" {
            client {
              endpoint = "http://vtsingle-victoriatraces.observability.svc.cluster.local:10428/insert/opentelemetry"
            }
          }

          // Span metrics + service graphs used to come from Tempo's
          // metrics-generator; VictoriaTraces has none, so generate them here.
          // Metric names match Tempo's except the latency histogram:
          // traces_spanmetrics_latency_bucket -> traces_spanmetrics_duration_seconds_bucket,
          // and the service label is service_name (OTel) instead of service (Tempo).
          otelcol.connector.spanmetrics "main" {
            namespace = "traces.spanmetrics"

            histogram {
              unit = "s"
              explicit { }
            }

            // Mirror the old Tempo intrinsic_dimensions (span_name: false) and
            // keep cardinality sane: no http.target/url, pod names, user ids.
            exclude_dimensions = ["span.name"]

            dimension { name = "k8s.namespace.name" }
            dimension { name = "http.method" }
            dimension { name = "http.status_code" }
            dimension { name = "rpc.system" }
            dimension { name = "rpc.service" }
            dimension { name = "rpc.method" }

            output {
              metrics = [otelcol.processor.batch.metrics.input]
            }
          }

          // Keep service graphs low-cardinality: only client/server edges
          // (same as the old Tempo service_graphs dimensions: []).
          otelcol.connector.servicegraph "main" {
            output {
              metrics = [otelcol.processor.batch.metrics.input]
            }
          }

      extraPorts:
        - name: otlp-grpc
          port: 4317
          targetPort: 4317
          protocol: TCP
          # Envoy Gateway backend protocol selection: gRPC needs HTTP/2 to the backend
          appProtocol: kubernetes.io/h2c
        - name: otlp-http
          port: 4318
          targetPort: 4318
          protocol: TCP
        - name: faro
          port: 12347
          targetPort: 12347
          protocol: TCP
