---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alloy-gateway-otlp
  labels:
    monitoring.webgrip.io/synthetic-check: "true"
spec:
  hostnames:
    - otlp.${SECRET_DOMAIN}
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    # OTLP/gRPC — gRPC method paths are /<service>/<method>, so PathPrefix on the
    # service name routes them to the 4317 receiver (h2c via appProtocol on the Service)
    - matches:
        - path:
            type: PathPrefix
            value: /opentelemetry.proto.collector.trace.v1.TraceService
        - path:
            type: PathPrefix
            value: /opentelemetry.proto.collector.metrics.v1.MetricsService
        - path:
            type: PathPrefix
            value: /opentelemetry.proto.collector.logs.v1.LogsService
      backendRefs:
        - name: alloy-gateway
          namespace: observability
          port: 4317
    # OTLP/HTTP — used by VS Code Copilot, Claude Code, and any OTLP-HTTP agent
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: alloy-gateway
          namespace: observability
          port: 4318
