---
# Loads the synthetic demo dataset. Runs on apply (retries until the schema Job has created
# the tables + refresh function). To RE-SEED after editing demo-seed.configmap.yaml, bump the
# seed-rev annotation (recreates the Job). To DISABLE demo data, remove `- demo` from
# app/kustomization.yaml. To WIPE without disabling, use demo-teardown.job.yaml.
apiVersion: batch/v1
kind: Job
metadata:
  name: devex-db-demo-seed
  namespace: observability
  annotations:
    seed-rev: "1"
    # Job spec.template is immutable; without this, any template change (e.g. a
    # Renovate image-digest bump) wedges the devex Kustomization on a dry-run
    # "field is immutable" error until someone hand-deletes the Job (2026-07-15).
    # With it, Flux deletes+recreates the Job instead (which re-runs it — same
    # effect as the manual fix).
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  backoffLimit: 20 # retries until devex-db-migrate has applied the schema
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      annotations:
        seed-rev: "1"
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: psql
          image: docker.io/library/postgres:18.4-alpine3.23@sha256:996d0920e4ff9df1fc19dacb904492f3c1ec0ec1cc338f0ad7123be7731c5f5e
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          resources:
            requests: {cpu: 25m, memory: 64Mi}
            limits: {memory: 128Mi}
          env:
            - name: HOME
              value: /tmp
            - name: PGHOST
              value: devex-db-rw
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: devex
            - name: PGUSER
              valueFrom:
                secretKeyRef: {name: devex-db-superuser, key: username}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef: {name: devex-db-superuser, key: password}
          command:
            - "/bin/sh"
            - "-ceu"
          args:
            - psql -v ON_ERROR_STOP=1 -f /seed/seed.sql
          volumeMounts:
            - {name: seed, mountPath: /seed, readOnly: true}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: seed
          configMap: {name: devex-demo-seed}
        - name: tmp
          emptyDir: {}
