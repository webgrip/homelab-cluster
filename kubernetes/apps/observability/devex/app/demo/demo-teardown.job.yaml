---
# Wipes the synthetic demo dataset (everything WHERE synthetic) and recomputes scores.
# Dormant by default (spec.suspend: true). To run: set suspend:false and commit; Flux runs
# it once. Real responses (synthetic=false) are untouched.
apiVersion: batch/v1
kind: Job
metadata:
  name: devex-db-demo-teardown
  namespace: observability
  annotations:
    # Job spec.template is immutable, and this Job sits suspended (never finishes)
    # so ttlSecondsAfterFinished can never clean it up — a template change (e.g. a
    # Renovate digest bump) wedges the devex Kustomization forever (2026-07-15/17).
    # With force, Flux deletes+recreates it; recreated with suspend:true = stays dormant.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  suspend: true
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: psql
          image: docker.io/library/postgres:18.4-alpine3.23@sha256:996d0920e4ff9df1fc19dacb904492f3c1ec0ec1cc338f0ad7123be7731c5f5e
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          resources:
            requests: {cpu: 25m, memory: 64Mi}
            limits: {memory: 128Mi}
          env:
            - name: HOME
              value: /tmp
            - name: PGHOST
              value: devex-db-rw
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: devex
            - name: PGUSER
              valueFrom:
                secretKeyRef: {name: devex-db-superuser, key: username}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef: {name: devex-db-superuser, key: password}
          command:
            - "/bin/sh"
            - "-ceu"
          args:
            - |
              psql -v ON_ERROR_STOP=1 <<'SQL'
              BEGIN;
              DELETE FROM survey WHERE synthetic;
              DELETE FROM monthly_ci_metrics          WHERE synthetic;
              DELETE FROM monthly_pr_metrics          WHERE synthetic;
              DELETE FROM monthly_delivery_metrics    WHERE synthetic;
              DELETE FROM monthly_reliability_metrics WHERE synthetic;
              DELETE FROM monthly_cost_metrics        WHERE synthetic;
              DELETE FROM incidents                   WHERE synthetic;
              COMMIT;
              SELECT refresh_dimension_scores();
              SQL
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: tmp
          emptyDir: {}
