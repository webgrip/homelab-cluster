---
# Owner/writer credential for the devex warehouse. Generated in-cluster (never typed),
# generate-once + Retain so it is stable forever. Basic-auth shape (username + password)
# because CNPG consumes it as both the initdb bootstrap secret AND the `devex` managed-role
# passwordSecret. Used by the migration Job and by n8n's Postgres credential.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: devex-db-secret
  namespace: observability
spec:
  refreshInterval: "0" # generate once, never rotate
  target:
    name: devex-db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        username: "devex"
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
