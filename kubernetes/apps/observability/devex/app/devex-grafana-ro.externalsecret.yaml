---
# Read-only credential Grafana uses for the postgres-devex datasource. Generated in-cluster,
# generate-once + Retain. The migration Job reads `password` to (re)set the grafana_ro role's
# password; the GrafanaDatasource injects the same `password` via valuesFrom. username is
# included for parity/clarity (the datasource hardcodes user grafana_ro).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: devex-grafana-ro
  namespace: observability
spec:
  refreshInterval: "0" # generate once, never rotate
  target:
    name: devex-grafana-ro
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        username: "grafana_ro"
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
