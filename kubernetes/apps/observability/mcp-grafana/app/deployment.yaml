---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-grafana
  labels:
    app.kubernetes.io/name: mcp-grafana
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-grafana
    spec:
      nodeSelector:
        node.webgrip.io/pool: worker
      tolerations:
        - key: dedicated
          operator: Equal
          value: fringe
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: mcp-grafana
          image: docker.io/grafana/mcp-grafana:0.14.0@sha256:42f541f2206359ce7a40c8e19d96253cef4771bf00e707a760d3a7035c40e8f8
          args:
            - --transport=streamable-http
            - --address=0.0.0.0:8000
            # Trimmed to the read/query tools used from Claude Code. Dropped:
            # admin (privileged), rendering (needs image-renderer plugin),
            # annotations/navigation/runpanelquery/examples (niche).
            # OnCall/Incident/Sift/Asserts are Grafana Cloud features — omitted.
            - --enabled-tools=search,datasource,dashboard,prometheus,alerting,pyroscope
          env:
            - name: GRAFANA_URL
              value: "http://grafana-service.observability.svc.cluster.local:3000"
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-grafana-token
                  key: token
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
