---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox-exporter
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: prometheus-blackbox-exporter
      version: 11.10.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: observability
  values:
    fullnameOverride: blackbox-exporter
    nodeSelector:
      node.webgrip.io/pool: worker

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # Keep default module, but make it explicit for readability.
    config:
      modules:
        http_2xx:
          prober: http
          timeout: 5s
          http:
            valid_http_versions:
              - "HTTP/1.1"
              - "HTTP/2.0"
            follow_redirects: true
            preferred_ip_protocol: "ip4"
        http_grafana_gateway:
          prober: http
          timeout: 5s
          http:
            valid_http_versions:
              - "HTTP/1.1"
              - "HTTP/2.0"
            follow_redirects: true
            preferred_ip_protocol: "ip4"
            tls_config:
              insecure_skip_verify: true
            headers:
              Host: grafana.${SECRET_DOMAIN}
        http_prometheus_gateway:
          prober: http
          timeout: 5s
          http:
            valid_http_versions:
              - "HTTP/1.1"
              - "HTTP/2.0"
            follow_redirects: true
            preferred_ip_protocol: "ip4"
            tls_config:
              insecure_skip_verify: true
            headers:
              Host: prometheus.${SECRET_DOMAIN}
        http_alertmanager_gateway:
          prober: http
          timeout: 5s
          http:
            valid_http_versions:
              - "HTTP/1.1"
              - "HTTP/2.0"
            follow_redirects: true
            preferred_ip_protocol: "ip4"
            tls_config:
              insecure_skip_verify: true
            headers:
              Host: alertmanager.${SECRET_DOMAIN}
        # Garage S3 (CNPG backup/WAL target). An unsigned GET / returns 403
        # AccessDenied when Garage is healthy, so treat 200/403 as "up".
        http_garage_s3:
          prober: http
          timeout: 5s
          http:
            valid_http_versions:
              - "HTTP/1.1"
              - "HTTP/2.0"
            valid_status_codes:
              - 200
              - 403
            follow_redirects: false
            preferred_ip_protocol: "ip4"

    # We use Prometheus Operator Probes (Probe CRs) for targets.
    serviceMonitor:
      enabled: false
      selfMonitor:
        enabled: false
