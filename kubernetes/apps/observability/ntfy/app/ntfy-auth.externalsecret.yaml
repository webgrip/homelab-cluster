---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntfy-auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: ntfy-auth
    creationPolicy: Owner
  data:
    # users:  "<name>:<bcrypt-hash>:<role>[,...]"  — bcrypt hashes are secrets-adjacent
    # tokens: "<name>:tk_<29 lowercase alnum>[:label][,...]"
    - secretKey: NTFY_AUTH_USERS
      remoteRef:
        key: ntfy/auth
        property: users
    - secretKey: NTFY_AUTH_TOKENS
      remoteRef:
        key: ntfy/auth
        property: tokens
