---
# yaml-language-server: $schema=../../../../../schemas/cnpg-cluster.schema.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: harbor-db
  namespace: harbor
  labels:
    monitoring.webgrip.io/enabled: "true"
spec:
  instances: 1
  # Burstable, not BestEffort: the Talos PSI OOM controller kills the largest
  # BestEffort cgroups first — every CNPG DB was SIGKILLed at once on
  # fringe-workstation (2026-07-11 01:27). Limits ~3x observed peak; no CPU
  # limit (avoid throttling checkpoints/vacuum).
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      memory: 768Mi
  inheritedMetadata:
    annotations:
      reloader.stakater.com/auto: "true"
  storage:
    size: 20Gi
    storageClass: longhorn
  walStorage:
    size: 10Gi
    storageClass: longhorn
  postgresql:
    parameters:
      # Backup-tier policy: compress WAL full-page images to shrink the S3 archive
      # and local WAL. See docs/techdocs/docs/database-backup-tiers.md
      wal_compression: "zstd"
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: harbor-db-store
        # Bumped after a clean DB re-init (the prior cluster left WALs at the old
        # serverName path, tripping barman's "Expected empty archive" check). A fresh
        # serverName gives the recreated cluster a clean archive lineage.
        serverName: harbor-db-r2
  bootstrap:
    initdb:
      # Harbor's core database (chart default `database.external.coreDatabase`).
      # No bootstrap secret: CNPG generates the `harbor-db-app` Secret for owner
      # `harbor`, which the HelmRelease consumes via `database.external.existingSecret`.
      database: registry
      owner: harbor
