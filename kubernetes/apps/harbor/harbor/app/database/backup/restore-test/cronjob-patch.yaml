---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cnpg-restore-test
spec:
  # Disabled by default (matches the cluster default — reduces control-plane/storage
  # pressure). Flip suspend to false to enable automated restore drills for harbor-db.
  suspend: true
  schedule: "*/10 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: restore-test
              env:
                - name: SOURCE_CLUSTER
                  value: harbor-db
                - name: RESTORE_CLUSTER
                  value: harbor-db-restore
                - name: EXPECTED_DATABASE
                  value: registry
                - name: EXPECTED_ROLE
                  value: harbor
                - name: BARMAN_OBJECT_NAME
                  value: harbor-db-store
