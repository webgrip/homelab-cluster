# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/monitoring.coreos.com/prometheusrule_v1.json
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: harbor
  namespace: harbor
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: harbor.rules
      rules:
        - alert: HarborCoreDown
          expr: up{job="harbor-core", namespace="harbor"} == 0
          for: 5m
          labels:
            severity: critical
            owner: platform
            service: harbor
          annotations:
            summary: "Harbor core is down (harbor)"
            description: |
              What's happening:
              - The Harbor core target has been unscrapable/down for at least 5m.

              Impact/risk:
              - The registry API, portal, login, push/pull and OCI chart operations are unavailable.

              Likely causes:
              - core pod crashlooping or unschedulable
              - external Postgres (harbor-db) unreachable
              - a missing/!Synced ExternalSecret (harbor-core / harbor-s3)

              First actions:
              - kubectl -n harbor get pods; kubectl -n harbor describe deploy harbor-core
              - kubectl -n harbor get externalsecret; verify harbor-db is Ready
              - See the Harbor runbook.
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/harbor"
            dashboard_url: "https://grafana.${SECRET_DOMAIN}/d/harbor/harbor"

        - alert: HarborComponentDown
          expr: up{namespace="harbor", job=~"harbor-(registry|jobservice|trivy|exporter)"} == 0
          for: 10m
          labels:
            severity: warning
            owner: platform
            service: harbor
          annotations:
            summary: "A Harbor component is down ({{ $$labels.job }})"
            description: |
              What's happening:
              - {{ $$labels.job }} has been down/unscrapable for at least 10m.

              Impact/risk:
              - registry → blob push/pull fails; jobservice → scans/GC/replication stall;
                trivy → vulnerability scans fail; exporter → metrics gaps only.

              Likely causes:
              - Component pod crashlooping/unschedulable, or its backend (Postgres/Garage S3) degraded.

              First actions:
              - kubectl -n harbor get pods -l 'app=harbor'
              - kubectl -n harbor logs deploy/{{ $$labels.job }} --tail=200
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/harbor"
            dashboard_url: "https://grafana.${SECRET_DOMAIN}/d/harbor/harbor"

        - alert: HarborHighHTTP5xxRate
          expr: |
            sum(rate(harbor_core_http_request_total{namespace="harbor", code=~"5.."}[5m]))
              / clamp_min(sum(rate(harbor_core_http_request_total{namespace="harbor"}[5m])), 1) > 0.05
          for: 15m
          labels:
            severity: warning
            owner: platform
            service: harbor
          annotations:
            summary: "Harbor core 5xx rate above 5% (harbor)"
            description: |
              What's happening:
              - More than 5% of Harbor core HTTP responses have been 5xx for 15m.

              Impact/risk:
              - Registry push/pull and portal operations are failing or degraded for clients.

              Likely causes:
              - Postgres pressure/errors, Garage S3 (blob backend) unavailable, or core overload.

              First actions:
              - Check harbor-db health and Garage (10.0.0.110:3900) reachability.
              - kubectl -n harbor logs deploy/harbor-core --tail=200 | grep -iE 'error|s3|panic'
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/harbor"
            dashboard_url: "https://grafana.${SECRET_DOMAIN}/d/harbor/harbor"

        - alert: HarborExternalSecretNotSynced
          expr: |
            externalsecret_status_condition{namespace="harbor", condition="Ready", status="False"} == 1
          for: 15m
          labels:
            severity: warning
            owner: platform
            service: harbor
          annotations:
            summary: "Harbor ExternalSecret not synced ({{ $$labels.name }})"
            description: |
              What's happening:
              - ExternalSecret {{ $$labels.name }} has not been Ready for 15m, so its Secret is missing/stale.

              Impact/risk:
              - harbor-s3 → registry cannot reach Garage (blob I/O fails); harbor-core → core won't start.

              Likely causes:
              - The OpenBao path (e.g. secret/harbor/s3) is not populated, or OpenBao is sealed/unreachable.

              First actions:
              - kubectl -n harbor get externalsecret {{ $$labels.name }} -o yaml | yq '.status'
              - Populate the value: `just harbor-s3-cred` (S3); see the Harbor runbook.
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/harbor"
            dashboard_url: "https://grafana.${SECRET_DOMAIN}/d/harbor/harbor"

        - alert: HarborProxyReconcileStale
          # The reconcile CronJob exits non-zero (ADR-0046) when a credentialed upstream
          # (docker-hub / ghcr) fails its Harbor health check, so a stale last-success
          # timestamp is the alertable signal for an expired/revoked pull-through token —
          # the exact condition that broke CI cold-pulls on 2026-07-15. Threshold > 2h
          # spans two hourly cycles, so a single transient ping blip self-clears.
          expr: |
            time() - kube_cronjob_status_last_successful_time{namespace="harbor", cronjob="harbor-proxy-config"} > 7800
          for: 15m
          labels:
            severity: warning
            owner: platform
            service: harbor
          annotations:
            summary: "Harbor proxy-cache reconcile stale >2h — upstream token likely expired (harbor)"
            description: |
              What's happening:
              - The hourly harbor-proxy-config CronJob has not completed successfully for >2h.
                Since ADR-0046 the job fails when a credentialed upstream (docker-hub / ghcr)
                can't authenticate, so this most often means an EXPIRED or REVOKED token — not
                a crashed job.

              Impact/risk:
              - Cold (un-cached) pulls of docker.io / ghcr.io images return 404/401 at pull time —
                CI kind nodes, charts, base images. This is the failure that broke CI on 2026-07-15.

              Likely causes:
              - Docker Hub PAT or GHCR PAT expired/revoked.
              - A stale token value in the Secret (reconcile now PUTs creds onto existing
                registries, but a wrong value still fails upstream auth).
              - CronJob not scheduling (suspended, or nodes unschedulable).

              First actions:
              - kubectl -n harbor logs job/$(kubectl -n harbor get job -l job-name -o name --sort-by=.metadata.creationTimestamp | tail -1 | cut -d/ -f2)
                # look for "failed health check", "secret is expired", or "denied"
              - Rotate the token in OpenBao (secret/harbor/registry-proxy: DOCKERHUB_TOKEN / GHCR_TOKEN),
                let ESO sync, then force a run:
                kubectl -n harbor create job --from=cronjob/harbor-proxy-config harbor-proxy-config-manual
              - See the Harbor runbook (proxy-cache credential rotation).
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/runbooks/harbor"
            dashboard_url: "https://grafana.${SECRET_DOMAIN}/d/harbor/harbor"
