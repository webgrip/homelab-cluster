---
# Dedicated ServiceAccounts for the goharbor chart's 8 components (VIK-253).
# The chart itself never creates these -- serviceAccountName is only ever
# templated in if non-empty (e.g. templates/core/core-dpl.yaml), so leaving it
# unset means every component actually runs under the namespace's implicit
# `default` SA today. automountServiceAccountToken: false on each, matching the
# chart's own pod-level setting (defense in depth, not load-bearing on its own).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-core
  namespace: harbor
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-jobservice
  namespace: harbor
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-registry
  namespace: harbor
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-portal
  namespace: harbor
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-nginx
  namespace: harbor
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-redis
  namespace: harbor
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-trivy
  namespace: harbor
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-exporter
  namespace: harbor
automountServiceAccountToken: false
