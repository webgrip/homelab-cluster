---
# Garage S3 credentials for registry blob storage, sourced from OpenBao.
# Create the bucket + key on Garage, then populate (see the harbor runbook):
#   garage bucket create harbor
#   garage key create harbor-registry
#   garage bucket allow --read --write harbor --key harbor-registry
#   garage key info --show-secret harbor-registry
#   bao kv put secret/harbor/s3 \
#     REGISTRY_STORAGE_S3_ACCESSKEY=<key id> \
#     REGISTRY_STORAGE_S3_SECRETKEY=<secret>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-s3
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: harbor-s3, creationPolicy: Owner}
  data:
    - {secretKey: REGISTRY_STORAGE_S3_ACCESSKEY, remoteRef: {key: harbor/s3, property: REGISTRY_STORAGE_S3_ACCESSKEY}}
    - {secretKey: REGISTRY_STORAGE_S3_SECRETKEY, remoteRef: {key: harbor/s3, property: REGISTRY_STORAGE_S3_SECRETKEY}}
