---
# Upstream pull credentials for Harbor's pull-through proxy-cache endpoints
# (RFC: Harbor Pull-Through Proxy Cache / ADR-0023). These ONLY lift the upstream
# anonymous rate limit — the Harbor proxy projects themselves are public for
# anonymous in-cluster pulls. Until these keys exist in OpenBao the proxy-config
# CronJob no-ops (fail-soft), so landing this manifest is inert.
#
# Populate (one-time human entry — the tokens are external):
#   bao kv put secret/harbor/registry-proxy \
#     DOCKERHUB_USERNAME=<dockerhub user> \
#     DOCKERHUB_TOKEN=<dockerhub read-only access token> \
#     GHCR_USERNAME=<github user> \
#     GHCR_TOKEN=<github PAT with read:packages>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-registry-proxy
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: harbor-registry-proxy, creationPolicy: Owner}
  data:
    - {secretKey: DOCKERHUB_USERNAME, remoteRef: {key: harbor/registry-proxy, property: DOCKERHUB_USERNAME}}
    - {secretKey: DOCKERHUB_TOKEN, remoteRef: {key: harbor/registry-proxy, property: DOCKERHUB_TOKEN}}
    - {secretKey: GHCR_USERNAME, remoteRef: {key: harbor/registry-proxy, property: GHCR_USERNAME}}
    - {secretKey: GHCR_TOKEN, remoteRef: {key: harbor/registry-proxy, property: GHCR_TOKEN}}
