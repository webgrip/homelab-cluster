---
# Mirror the generated webgrip robot credential to OpenBao so CI (webgrip/workflows) can read it.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: harbor-robot-webgrip, namespace: harbor}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: harbor-robot-webgrip}}
  data:
    - match: {secretKey: CI_USER, remoteRef: {remoteKey: harbor/robot-webgrip, property: CI_USER}}
    - match: {secretKey: CI_TOKEN, remoteRef: {remoteKey: harbor/robot-webgrip, property: CI_TOKEN}}
