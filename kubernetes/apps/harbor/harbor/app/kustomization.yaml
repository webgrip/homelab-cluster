---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrepository.yaml
  - ./helmrelease.yaml
  - ./httproute.yaml
  - ./networkpolicy.yaml
  - ./prometheusrule.yaml
  - ./harbor-admin.externalsecret.yaml
  - ./harbor-s3.externalsecret.yaml
  - ./harbor-oidc-values.externalsecret.yaml
  - ./harbor-registry-proxy.externalsecret.yaml
  - ./harbor-robot-webgrip.externalsecret.yaml
  - ./harbor-robot-webgrip.pushsecret.yaml
  - ./harbor-proxy-config.configmap.yaml
  - ./harbor-proxy-config.serviceaccount.yaml
  - ./harbor-proxy-config.cronjob.yaml
components:
  # server-side OIDC discovery to authentik hairpins through envoy-internal;
  # default-deny requires an identity-based egress allow to ns network (ADR-0005)
  - ../../../../components/gateway-egress
