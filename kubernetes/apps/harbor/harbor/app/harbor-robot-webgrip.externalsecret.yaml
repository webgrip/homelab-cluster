---
# Push/pull credential for webgrip's OWN images in the private `webgrip` Harbor project
# (RFC own-images / webgrip/{infrastructure,workflows} handoffs). The token is GENERATED
# in-cluster (ESO, generate-once + Retain — never typed by a human), and the provisioner
# CronJob sets it as the secret of the Harbor robot `robot$webgrip+ci`. The PushSecret
# mirrors it to OpenBao secret/harbor/robot-webgrip so CI (webgrip/workflows, on an
# in-cluster Forgejo runner — Harbor is LAN-only) can consume it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-robot-webgrip
  namespace: harbor
spec:
  refreshInterval: "0" # generate-once, never rotate on its own
  target:
    name: harbor-robot-webgrip
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        # Literal Harbor robot login name ($$ -> $ after Flux substitution).
        CI_USER: "robot$$webgrip+ci"
        CI_TOKEN: "{{ .token }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
      rewrite:
        - regexp: {source: "password", target: "token"}
