---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd/helm-controller/main/docs/api/v2/helmrelease.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
spec:
  chart:
    spec:
      chart: harbor
      version: 1.19.1
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: harbor
  interval: 1h
  timeout: 20m
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  # The goharbor chart hardcodes core's probes at timeoutSeconds:1 / failureThreshold:2 —
  # 2 slow pings 10s apart and the kubelet kills core. On this shared node a CI burst
  # (post-KEDA-fix: 4-6 concurrent runner pods hammering the proxy cache) pushed /api/v2.0/ping
  # past 1s and core was probe-killed MID-PUSH, failing the ci-runner v1.0.1 Harbor distribute
  # (2026-07-18 16:06:50Z, exit 0 "Completed" = graceful probe kill; nginx logged upstream
  # connection-refused for the push's HEAD /v2/webgrip/ci-runner/manifests/1.0.1). Same failure
  # class as the dind startup-probe 5s fix (2c99ac05). The chart exposes no probe knobs, so
  # patch the rendered Deployment: tolerate ~60s of slow pings before a liveness kill.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: harbor-core
            patch: |
              - op: replace
                path: /spec/template/spec/containers/0/livenessProbe/timeoutSeconds
                value: 5
              - op: replace
                path: /spec/template/spec/containers/0/livenessProbe/failureThreshold
                value: 6
              - op: replace
                path: /spec/template/spec/containers/0/readinessProbe/timeoutSeconds
                value: 5
              - op: replace
                path: /spec/template/spec/containers/0/readinessProbe/failureThreshold
                value: 4
  valuesFrom:
    # Phase 2 (Authentik OIDC): a `core.configureUserSettings` fragment lives at
    # OpenBao `secret/harbor/oidc` (key values.yaml) and is surfaced by the
    # harbor-oidc-values ExternalSecret. `optional: true` lets Harbor boot in
    # local `db_auth` until that secret exists.
    - kind: Secret
      name: harbor-oidc-values
      valuesKey: values.yaml
      optional: true
  values:
    externalURL: https://harbor.${SECRET_DOMAIN}
    logLevel: info

    # NOTE on update strategy: jobservice and registry mount ReadWriteOnce Longhorn
    # PVCs, so a RollingUpdate can briefly deadlock on Longhorn's Multi-Attach guard
    # (a new pod surges before the old releases the volume) — this self-heals within
    # ~10min once Longhorn force-detaches. We do NOT set updateStrategy: Recreate:
    # the goharbor chart always renders a rollingUpdate block, which Kubernetes
    # rejects alongside type: Recreate ("may not be specified"), stalling the HR.
    # To force Recreate properly, use a postRenderer that also deletes
    # spec.strategy.rollingUpdate on the jobservice/registry Deployments.

    # TLS terminates at the envoy gateway (wildcard cert); Harbor is fronted by an
    # explicit HTTPRoute (httproute.yaml) on the `harbor` ClusterIP service.
    expose:
      type: clusterIP
      tls:
        enabled: false
      clusterIP:
        name: harbor
        ports:
          httpPort: 80

    # Pin ONLY the admin password and the at-rest secretKey (both generated in-cluster —
    # see harbor-admin.externalsecret.yaml). Harbor's other internal secrets (CORE_SECRET,
    # CSRF_KEY, registry/jobservice) AND the token-signing cert are generated and owned by
    # the chart in its own `harbor-core` secret. Do NOT override core/registry/jobservice
    # existingSecret with a partial secret — it displaces the token cert and 500s
    # /service/token (docker login fails).
    existingSecretAdminPassword: harbor-admin
    existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
    existingSecretSecretKey: harbor-admin # key: secretKey (16 chars)

    persistence:
      enabled: true
      resourcePolicy: keep
      imageChartStorage:
        # Registry blobs live in Garage S3 (ADR-0018). disableredirect is REQUIRED
        # for path-style S3 backends (Garage/MinIO) or clients hit redirect loops.
        type: s3
        disableredirect: true
        s3:
          existingSecret: harbor-s3 # keys REGISTRY_STORAGE_S3_ACCESSKEY / SECRETKEY
          region: garage
          bucket: harbor
          regionendpoint: http://10.0.0.110:3900
          secure: false
          v4auth: true
      # No cluster default StorageClass exists — every PVC sets storageClass and
      # ReadWriteOnce explicitly (registry + database PVCs are ignored here since
      # blobs are on S3 and Postgres is external, but kept valid for safety).
      persistentVolumeClaim:
        registry:
          storageClass: longhorn-general
          accessMode: ReadWriteOnce
          size: 5Gi
        jobservice:
          jobLog:
            storageClass: longhorn-general
            accessMode: ReadWriteOnce
            size: 2Gi
        database:
          storageClass: longhorn-general
          accessMode: ReadWriteOnce
          size: 1Gi
        redis:
          storageClass: longhorn-general
          accessMode: ReadWriteOnce
          size: 2Gi
        trivy:
          storageClass: longhorn-general
          accessMode: ReadWriteOnce
          size: 5Gi

    database:
      type: external
      external:
        host: harbor-db-rw.harbor.svc.cluster.local
        port: "5432"
        username: harbor
        coreDatabase: registry
        existingSecret: harbor-db-app # CNPG-generated; key: password
        sslmode: require

    redis:
      type: internal
      internal:
        nodeSelector:
          node.webgrip.io/pool: worker
        # Dedicated SA (chart never creates one -- serviceAccountName is only
        # templated in if non-empty) + digest-pin, direct against docker.io (no
        # Harbor-proxy dependency -- that circularity is a separate, genuinely
        # structural concern tracked under VIK-241). Verified live before
        # landing. VIK-253.
        serviceAccountName: harbor-redis
        image:
          repository: docker.io/goharbor/redis-photon
          tag: v2.15.1@sha256:5669d4828805d9ed0bbfc18c101c6ec82d26a13cb9242b48f6348a3e3b2e4cca
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi

    # Per-component resource requests/limits (the chart ships none for these, which
    # tripped workload-hardening-audit/validate-resources). requests.cpu +
    # requests.memory + limits.memory match the policy; cpu limit omitted to avoid
    # throttling the registry under image push/pull. Memory limits sized generously.
    core:
      nodeSelector:
        node.webgrip.io/pool: worker
      # Dedicated SA + digest-pin, direct against docker.io. VIK-253.
      serviceAccountName: harbor-core
      image:
        repository: docker.io/goharbor/harbor-core
        tag: v2.15.1@sha256:887a85b8ea98b76bfc9f715f1a0785bb99f9a1034241513902dd6e95be922a83
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 768Mi

    jobservice:
      # Pinned to the worker pool. Its WFFC longhorn-general PVC lists fringe (a
      # worker), so it schedules there. The goharbor chart hardcodes RollingUpdate,
      # so the soyo-3->fringe move deadlocks on Multi-Attach until the old pod is
      # deleted by hand (done at migration time) — the new pod then attaches.
      nodeSelector:
        node.webgrip.io/pool: worker
      # The CNPG outage left this Deployment deleted; Helm's no-op upgrade won't
      # recreate a resource that's unchanged in the chart manifest. This stable
      # annotation gives the Deployment a real (secret-free) diff so the next upgrade
      # re-creates it. Safe to remove once Harbor is confirmed whole.
      podAnnotations:
        harbor.webgrip.io/restored-at: "2026-06-16"
      # Dedicated SA + digest-pin, direct against docker.io. VIK-253.
      serviceAccountName: harbor-jobservice
      image:
        repository: docker.io/goharbor/harbor-jobservice
        tag: v2.15.1@sha256:0de4fd2ce3a02d3e6591b439e4674ea085885ddf43652b44004cc67eb19dba12
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi

    registry:
      # Pinned to the worker pool (same Multi-Attach-move handling as jobservice;
      # its PVC is config/cache only — blobs are in Garage S3).
      nodeSelector:
        node.webgrip.io/pool: worker
      # Same as jobservice above — force re-creation of the deleted registry Deployment.
      podAnnotations:
        harbor.webgrip.io/restored-at: "2026-06-16"
      # Dedicated SA (shared by both containers in this Pod) + digest-pin both
      # images, direct against docker.io. VIK-253.
      serviceAccountName: harbor-registry
      registry:
        image:
          repository: docker.io/goharbor/registry-photon
          tag: v2.15.2@sha256:c4ebef61ceb50a3d8bc21d149bc280422db20a1e69df317b64b74098c3615855
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi
      controller:
        image:
          repository: docker.io/goharbor/harbor-registryctl
          tag: v2.15.2@sha256:223d5cb49d5dbf0ba4ae022e7dd9775fa459904112dc12084d3aaa36c1408362
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 128Mi

    portal:
      nodeSelector:
        node.webgrip.io/pool: worker
      # Dedicated SA + digest-pin, direct against docker.io. VIK-253.
      serviceAccountName: harbor-portal
      image:
        repository: docker.io/goharbor/harbor-portal
        tag: v2.15.1@sha256:ac55161c57a8351807adf8f8def264bdd52667c371d0436beefebdac4341c9e2
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi

    nginx:
      nodeSelector:
        node.webgrip.io/pool: worker
      # Dedicated SA + digest-pin, direct against docker.io. VIK-253.
      serviceAccountName: harbor-nginx
      image:
        repository: docker.io/goharbor/nginx-photon
        tag: v2.15.2@sha256:0ccc1eca228ecea120d7ad9e4386b8e86ced200212f00060a9abc753dbe7f17f
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi

    exporter:
      nodeSelector:
        node.webgrip.io/pool: worker
      # Dedicated SA + digest-pin, direct against docker.io. VIK-253.
      serviceAccountName: harbor-exporter
      image:
        repository: docker.io/goharbor/harbor-exporter
        tag: v2.15.1@sha256:372275b6b6abeb571fa7bd5de458e3d75f1a1636503b3c0abe02938f2b285d75
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi

    trivy:
      nodeSelector:
        node.webgrip.io/pool: worker
      enabled: true
      # Dedicated SA + digest-pin, direct against docker.io. VIK-253.
      serviceAccountName: harbor-trivy
      image:
        repository: docker.io/goharbor/trivy-adapter-photon
        tag: v2.15.2@sha256:215c07b71c37fc7fc16e02d9185d936dcb8884a80e810817c2cd058bbd7c4e98
      # Right-sized: the adapter idles ~6Mi; chart default reserved 512Mi. Limit
      # kept generous (1Gi) for scan bursts (DB load happens here).
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: "1"
          memory: 1Gi

    metrics:
      enabled: true
      serviceMonitor:
        # The Harbor chart already stamps `release: harbor` on its ServiceMonitor;
        # adding `additionalLabels.release` here produced a duplicate YAML key that
        # crashed the kustomize post-renderer. The cluster Prometheus uses an empty
        # serviceMonitorSelector (scrapes ALL ServiceMonitors), so no release label
        # is needed for discovery.
        enabled: true
