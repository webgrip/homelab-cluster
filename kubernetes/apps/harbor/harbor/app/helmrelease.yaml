---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd/helm-controller/main/docs/api/v2/helmrelease.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
spec:
  chart:
    spec:
      chart: harbor
      version: 1.19.1
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: harbor
  interval: 1h
  timeout: 20m
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  valuesFrom:
    # Phase 2 (Authentik OIDC): a `core.configureUserSettings` fragment lives at
    # OpenBao `secret/harbor/oidc` (key values.yaml) and is surfaced by the
    # harbor-oidc-values ExternalSecret. `optional: true` lets Harbor boot in
    # local `db_auth` until that secret exists.
    - kind: Secret
      name: harbor-oidc-values
      valuesKey: values.yaml
      optional: true
  values:
    externalURL: https://harbor.${SECRET_DOMAIN}
    logLevel: info

    # Recreate, not RollingUpdate: jobservice and registry mount ReadWriteOnce
    # Longhorn PVCs. RollingUpdate surges a new pod before the old releases the
    # volume, which deadlocks on Longhorn's Multi-Attach guard (maxUnavailable
    # rounds to 0 for single-replica components). Recreate terminates the old pod
    # first, releasing the PVC, so the new pod can attach. Brief per-component
    # downtime on chart upgrades is acceptable for a homelab registry.
    updateStrategy:
      type: Recreate

    # TLS terminates at the envoy gateway (wildcard cert); Harbor is fronted by an
    # explicit HTTPRoute (httproute.yaml) on the `harbor` ClusterIP service.
    expose:
      type: clusterIP
      tls:
        enabled: false
      clusterIP:
        name: harbor
        ports:
          httpPort: 80

    # Pin ONLY the admin password and the at-rest secretKey (both generated in-cluster —
    # see harbor-admin.externalsecret.yaml). Harbor's other internal secrets (CORE_SECRET,
    # CSRF_KEY, registry/jobservice) AND the token-signing cert are generated and owned by
    # the chart in its own `harbor-core` secret. Do NOT override core/registry/jobservice
    # existingSecret with a partial secret — it displaces the token cert and 500s
    # /service/token (docker login fails).
    existingSecretAdminPassword: harbor-admin
    existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
    existingSecretSecretKey: harbor-admin # key: secretKey (16 chars)

    persistence:
      enabled: true
      resourcePolicy: keep
      imageChartStorage:
        # Registry blobs live in Garage S3 (ADR-0002). disableredirect is REQUIRED
        # for path-style S3 backends (Garage/MinIO) or clients hit redirect loops.
        type: s3
        disableredirect: true
        s3:
          existingSecret: harbor-s3 # keys REGISTRY_STORAGE_S3_ACCESSKEY / SECRETKEY
          region: garage
          bucket: harbor
          regionendpoint: http://10.0.0.110:3900
          secure: false
          v4auth: true
      # No cluster default StorageClass exists — every PVC sets storageClass and
      # ReadWriteOnce explicitly (registry + database PVCs are ignored here since
      # blobs are on S3 and Postgres is external, but kept valid for safety).
      persistentVolumeClaim:
        registry:
          storageClass: longhorn-general
          accessMode: ReadWriteOnce
          size: 5Gi
        jobservice:
          jobLog:
            storageClass: longhorn-general
            accessMode: ReadWriteOnce
            size: 2Gi
        database:
          storageClass: longhorn-general
          accessMode: ReadWriteOnce
          size: 1Gi
        redis:
          storageClass: longhorn-general
          accessMode: ReadWriteOnce
          size: 2Gi
        trivy:
          storageClass: longhorn-general
          accessMode: ReadWriteOnce
          size: 5Gi

    database:
      type: external
      external:
        host: harbor-db-rw.harbor.svc.cluster.local
        port: "5432"
        username: harbor
        coreDatabase: registry
        existingSecret: harbor-db-app # CNPG-generated; key: password
        sslmode: require

    redis:
      type: internal
      internal:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi

    # Per-component resource requests/limits (the chart ships none for these, which
    # tripped workload-hardening-audit/validate-resources). requests.cpu +
    # requests.memory + limits.memory match the policy; cpu limit omitted to avoid
    # throttling the registry under image push/pull. Memory limits sized generously.
    core:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 768Mi

    jobservice:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi

    registry:
      registry:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi
      controller:
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 128Mi

    portal:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi

    nginx:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi

    exporter:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi

    trivy:
      enabled: true
      # Right-sized: the adapter idles ~6Mi; chart default reserved 512Mi. Limit
      # kept generous (1Gi) for scan bursts (DB load happens here).
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: "1"
          memory: 1Gi

    metrics:
      enabled: true
      serviceMonitor:
        # The Harbor chart already stamps `release: harbor` on its ServiceMonitor;
        # adding `additionalLabels.release` here produced a duplicate YAML key that
        # crashed the kustomize post-renderer. The cluster Prometheus uses an empty
        # serviceMonitorSelector (scrapes ALL ServiceMonitors), so no release label
        # is needed for discovery.
        enabled: true
