---
# Idempotent provisioner for Harbor pull-through proxy-cache (ADR-0018). Ensures the
# upstream registry endpoints + proxy projects exist via the Harbor v2 API. Re-running
# converges; fail-soft when Harbor is unreachable or upstream creds aren't populated yet.
#
# NOTE: shell `$` is doubled to `$$` so Flux's post-build substitution leaves the script intact
# (un-doubled `$`-expansions get evaluated/blanked at apply time); Flux restores `$$` to `$`.
# Auth is held in the AUTH variable so the curl `-u` line isn't misread as a hardcoded secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-proxy-config
  namespace: harbor
data:
  configure.sh: |-
    #!/bin/sh
    set -eu

    HARBOR="$${HARBOR_API:-http://harbor-core/api/v2.0}"
    ADMIN_USER="admin"
    AUTH="$$ADMIN_USER:$$HARBOR_ADMIN_PASSWORD"
    # log to stderr: ensure_registry is called via $(...), so logging to stdout would be
    # captured into the returned registry id and corrupt it (the project-create bug).
    log() { echo "[harbor-proxy-config] $$*" >&2; }

    if [ -z "$${HARBOR_ADMIN_PASSWORD:-}" ]; then
      log "harbor-admin password not present; exiting 0 (will retry)"; exit 0
    fi

    # curl wrapper: hc METHOD PATH [JSON_BODY]
    hc() {
      _m="$$1"; _p="$$2"; _b="$${3:-}"
      if [ -n "$$_b" ]; then
        curl -fsS -u "$$AUTH" -X "$$_m" \
          -H 'Content-Type: application/json' -d "$$_b" "$$HARBOR$$_p"
      else
        curl -fsS -u "$$AUTH" -X "$$_m" "$$HARBOR$$_p"
      fi
    }

    # Wait for Harbor core; fail-soft (exit 0) if it never comes up this tick.
    _i=0
    until curl -fsS "$$HARBOR/health" >/dev/null 2>&1; do
      _i=$$((_i+1))
      [ "$$_i" -ge 30 ] && { log "harbor-core unreachable after 30 tries; exiting 0"; exit 0; }
      log "waiting for harbor-core ($$_i/30)..."; sleep 10
    done

    # registry_id NAME -> stdout (empty if absent)
    registry_id() {
      hc GET "/registries?q=name%3D$$1" 2>/dev/null \
        | jq -r ".[] | select(.name==\"$$1\") | .id" 2>/dev/null | head -n1
    }

    # ensure_registry NAME TYPE URL [USER] [PASS] -> registry id on stdout (or empty)
    # Credentials are optional: anonymous pull-through (quay/gcr/k8s/forgejo) creates the
    # endpoint without a credential block; dockerhub/ghcr include creds to lift rate limits.
    ensure_registry() {
      _name="$$1"; _type="$$2"; _url="$$3"; _user="$${4:-}"; _pass="$${5:-}"
      _id="$$(registry_id "$$_name")"
      if [ -n "$$_id" ] && [ "$$_id" != "null" ]; then
        log "registry '$$_name' already exists (id=$$_id)"; echo "$$_id"; return 0
      fi
      if [ -n "$$_user" ] && [ -n "$$_pass" ]; then
        _body="{\"name\":\"$$_name\",\"type\":\"$$_type\",\"url\":\"$$_url\",\"insecure\":false,\"credential\":{\"type\":\"basic\",\"access_key\":\"$$_user\",\"access_secret\":\"$$_pass\"}}"
      else
        log "registry '$$_name': no upstream credentials — creating anonymous endpoint"
        _body="{\"name\":\"$$_name\",\"type\":\"$$_type\",\"url\":\"$$_url\",\"insecure\":false}"
      fi
      if _out="$$(hc POST "/registries" "$$_body" 2>&1)"; then
        log "created registry endpoint '$$_name' -> $$_url"
      else
        log "WARN: failed to create registry endpoint '$$_name': $$_out"; return 0
      fi
      registry_id "$$_name"
    }

    # ensure_proxy_project NAME REGISTRY_ID
    ensure_proxy_project() {
      _name="$$1"; _rid="$$2"
      if hc GET "/projects?name=$$_name" 2>/dev/null \
          | jq -e ".[] | select(.name==\"$$_name\")" >/dev/null 2>&1; then
        log "proxy project '$$_name' already exists"; return 0
      fi
      _body="{\"project_name\":\"$$_name\",\"public\":true,\"registry_id\":$$_rid,\"storage_limit\":-1,\"metadata\":{\"public\":\"true\"}}"
      if _out="$$(hc POST "/projects" "$$_body" 2>&1)"; then
        log "created proxy project '$$_name' -> registry id $$_rid"
      else
        log "WARN: failed to create proxy project '$$_name' (id=$$_rid): $$_out"
      fi
    }

    # ensure_private_project NAME (private project for our own images)
    ensure_private_project() {
      _name="$$1"
      if hc GET "/projects?name=$$_name" 2>/dev/null \
          | jq -e ".[] | select(.name==\"$$_name\")" >/dev/null 2>&1; then
        log "project '$$_name' already exists"; return 0
      fi
      _body="{\"project_name\":\"$$_name\",\"public\":false,\"storage_limit\":-1,\"metadata\":{\"public\":\"false\"}}"
      if _out="$$(hc POST "/projects" "$$_body" 2>&1)"; then
        log "created private project '$$_name'"
      else
        log "WARN: failed to create project '$$_name': $$_out"
      fi
    }

    # Ensure the webgrip CI robot exists, and that its access list + secret converge to the
    # desired spec. GET /robots lists only SYSTEM robots, so PROJECT robots must be queried
    # with q=Level=project,ProjectID=<id>; re-resolve after POST so a 409 still leads to PATCH.
    #
    # Access list = repository push/pull (CI image push) PLUS sbom:create, so the release
    # pipeline can trigger Harbor's native SBOM generation
    # (POST .../artifacts/{digest}/scan {"scan_type":"sbom"}). Harbor >= 2.11 gates SBOM
    # generation behind the dedicated `sbom` resource, NOT `repository` — without it that call
    # returns 403 FORBIDDEN and Harbor's SBOM column stays empty (the cosign SBOM attestation +
    # Dependency-Track upload from the pipeline are signed/unaffected; this is the registry-UI copy).
    ensure_webgrip_robot() {
      [ -n "$${WEBGRIP_CI_TOKEN:-}" ] || {
        log "no webgrip robot token (secret/harbor/robot-webgrip) — skipping robot"; return 0; }
      _pid="$$(hc GET "/projects?name=webgrip" 2>/dev/null | jq -r '.[] | select(.name=="webgrip") | .project_id' 2>/dev/null | head -n1)"
      [ -n "$$_pid" ] && [ "$$_pid" != "null" ] || { log "WARN: webgrip project id not found; skipping robot"; return 0; }
      # Single source of truth for the robot's project-scoped access (no shell '$' inside, so
      # Flux post-build substitution leaves it untouched and it interpolates cleanly below).
      _perms='[{"kind":"project","namespace":"webgrip","access":[{"resource":"repository","action":"push"},{"resource":"repository","action":"pull"},{"resource":"sbom","action":"create"}]}]'
      _q="Level%3Dproject%2CProjectID%3D$$_pid"
      _rid="$$(hc GET "/robots?q=$$_q&page_size=100" 2>/dev/null | jq -r '.[0].id' 2>/dev/null)"
      if [ -z "$$_rid" ] || [ "$$_rid" = "null" ]; then
        _body="{\"name\":\"ci\",\"description\":\"webgrip CI push/pull (managed)\",\"duration\":-1,\"level\":\"project\",\"disable\":false,\"permissions\":$$_perms}"
        hc POST "/robots" "$$_body" >/dev/null 2>&1 || true
        _rid="$$(hc GET "/robots?q=$$_q&page_size=100" 2>/dev/null | jq -r '.[0].id' 2>/dev/null)"
      fi
      if [ -z "$$_rid" ] || [ "$$_rid" = "null" ]; then
        log "WARN: webgrip robot not resolvable (pid=$$_pid); robots seen: $$(hc GET "/robots?q=$$_q&page_size=100" 2>/dev/null | jq -rc '[.[].name]' 2>/dev/null)"
        return 0
      fi
      # Converge the access list on the EXISTING robot too: the POST above runs only on first
      # creation, so a robot provisioned before sbom:create was added keeps 403ing without this.
      # UpdateRobot rejects a changed name/level, so reuse the exact stored name (robot$webgrip+ci)
      # from the GET and resend the desired spec with the (possibly new) permissions.
      _rname="$$(hc GET "/robots/$$_rid" 2>/dev/null | jq -r '.name // empty' 2>/dev/null)"
      if [ -n "$$_rname" ]; then
        _upd="{\"name\":\"$$_rname\",\"description\":\"webgrip CI push/pull (managed)\",\"duration\":-1,\"level\":\"project\",\"disable\":false,\"permissions\":$$_perms}"
        if _out="$$(hc PUT "/robots/$$_rid" "$$_upd" 2>&1)"; then
          log "webgrip robot (id=$$_rid) access converged (repository push/pull + sbom:create)"
        else
          log "WARN: failed to update webgrip robot permissions (id=$$_rid): $$_out"
        fi
      fi
      if _out="$$(hc PATCH "/robots/$$_rid" "{\"secret\":\"$${WEBGRIP_CI_TOKEN}\"}" 2>&1)"; then
        log "webgrip robot (id=$$_rid) secret ensured"
      else
        log "WARN: failed to set webgrip robot secret (id=$$_rid): $$_out"
      fi
    }

    # ensure_gc_schedule -> registry-wide garbage collection, weekly, deleting UNTAGGED manifests.
    # This is what reclaims the orphaned buildx `:cache` manifests (each cache-to push overwrites the
    # `cache` tag and leaves the previous manifest untagged) plus anything retention has untagged.
    # The live `cache` tag is kept (it's tagged). Idempotent: GET decides create (POST) vs update (PUT).
    ensure_gc_schedule() {
      _body='{"schedule":{"type":"Custom","cron":"0 30 3 * * 0"},"parameters":{"delete_untagged":true,"workers":1}}'
      _cur="$$(hc GET "/system/gc/schedule" 2>/dev/null | jq -r '.schedule.cron // empty' 2>/dev/null)"
      if [ -z "$$_cur" ]; then
        hc POST "/system/gc/schedule" "$$_body" >/dev/null 2>&1 && log "GC schedule created (Sun 03:30, delete_untagged)" || log "WARN: GC schedule create failed"
      else
        hc PUT "/system/gc/schedule" "$$_body" >/dev/null 2>&1 && log "GC schedule updated (Sun 03:30, delete_untagged)" || log "WARN: GC schedule update failed"
      fi
    }

    # ensure_retention PROJECT -> keep the latest 10 pushed tags per repo; older versions become
    # untagged and the weekly GC reclaims them. The `cache` tag is excluded so retention never
    # targets it. Skips if a retention policy already exists on the project (metadata.retention_id).
    ensure_retention() {
      _proj="$$1"
      _pid="$$(hc GET "/projects?name=$$_proj" 2>/dev/null | jq -r ".[] | select(.name==\"$$_proj\") | .project_id" 2>/dev/null | head -n1)"
      [ -n "$$_pid" ] && [ "$$_pid" != "null" ] || { log "WARN: $$_proj project id not found; skipping retention"; return 0; }
      if [ -n "$$(hc GET "/projects/$$_pid" 2>/dev/null | jq -r '.metadata.retention_id // empty' 2>/dev/null)" ]; then
        log "retention policy already set on $$_proj"; return 0
      fi
      _body="{\"algorithm\":\"or\",\"rules\":[{\"action\":\"retain\",\"template\":\"latestPushedK\",\"params\":{\"latestPushedK\":10},\"scope_selectors\":{\"repository\":[{\"kind\":\"doublestar\",\"decoration\":\"repoMatches\",\"pattern\":\"**\"}]},\"tag_selectors\":[{\"kind\":\"doublestar\",\"decoration\":\"matches\",\"pattern\":\"**\"},{\"kind\":\"doublestar\",\"decoration\":\"excludes\",\"pattern\":\"cache\"}]}],\"scope\":{\"level\":\"project\",\"ref\":$$_pid},\"trigger\":{\"kind\":\"Schedule\",\"settings\":{\"cron\":\"0 0 4 * * *\"}}}"
      if _out="$$(hc POST "/retentions" "$$_body" 2>&1)"; then
        log "retention policy created on $$_proj (keep latest 10 pushed, excl. cache)"
      else
        log "WARN: failed to create retention on $$_proj: $$_out"
      fi
    }

    # ensure_project_scanning PROJECT -> Trivy scan-on-push + native SBOM-on-push so every pushed
    # artifact is scanned and gets a Harbor SBOM with no manual click. Set as two PUTs: scan-on-push
    # works on any Harbor; auto_sbom_generation needs Harbor >= 2.11, so it's best-effort/fail-soft.
    ensure_project_scanning() {
      _proj="$$1"
      _pid="$$(hc GET "/projects?name=$$_proj" 2>/dev/null | jq -r ".[] | select(.name==\"$$_proj\") | .project_id" 2>/dev/null | head -n1)"
      [ -n "$$_pid" ] && [ "$$_pid" != "null" ] || { log "WARN: $$_proj project id not found; skipping scan config"; return 0; }
      hc PUT "/projects/$$_pid" '{"metadata":{"auto_scan":"true"}}' >/dev/null 2>&1 \
        && log "scan-on-push enabled on $$_proj" || log "WARN: scan-on-push enable failed on $$_proj"
      hc PUT "/projects/$$_pid" '{"metadata":{"auto_sbom_generation":"true"}}' >/dev/null 2>&1 \
        && log "sbom-on-push enabled on $$_proj" || log "WARN: sbom-on-push enable failed on $$_proj (needs Harbor >= 2.11)"
    }

    # docker.io -> proxy project "dockerhub"
    DH_ID="$$(ensure_registry docker-hub docker-hub https://hub.docker.com \
      "$${DOCKERHUB_USERNAME:-}" "$${DOCKERHUB_TOKEN:-}")"
    [ -n "$$DH_ID" ] && [ "$$DH_ID" != "null" ] && ensure_proxy_project dockerhub "$$DH_ID"

    # ghcr.io -> proxy project "ghcr" (generic docker-registry provider; robust for pull-through)
    GH_ID="$$(ensure_registry ghcr docker-registry https://ghcr.io \
      "$${GHCR_USERNAME:-}" "$${GHCR_TOKEN:-}")"
    [ -n "$$GH_ID" ] && [ "$$GH_ID" != "null" ] && ensure_proxy_project ghcr "$$GH_ID"

    # Anonymous upstreams (no creds needed); each maps to a Talos machine.registries mirror.
    # quay.io -> proxy project "quay" (prometheus, jetstack/cert-manager)
    QUAY_ID="$$(ensure_registry quay docker-registry https://quay.io)"
    [ -n "$$QUAY_ID" ] && [ "$$QUAY_ID" != "null" ] && ensure_proxy_project quay "$$QUAY_ID"

    # mirror.gcr.io -> proxy project "gcrmirror" (coredns)
    GCRM_ID="$$(ensure_registry gcrmirror docker-registry https://mirror.gcr.io)"
    [ -n "$$GCRM_ID" ] && [ "$$GCRM_ID" != "null" ] && ensure_proxy_project gcrmirror "$$GCRM_ID"

    # registry.k8s.io -> proxy project "k8s" (forward-looking: kube system images)
    K8S_ID="$$(ensure_registry k8s docker-registry https://registry.k8s.io)"
    [ -n "$$K8S_ID" ] && [ "$$K8S_ID" != "null" ] && ensure_proxy_project k8s "$$K8S_ID"

    # code.forgejo.org -> proxy project "forgejo" (forgejo-runner)
    FORGEJO_ID="$$(ensure_registry forgejo docker-registry https://code.forgejo.org)"
    [ -n "$$FORGEJO_ID" ] && [ "$$FORGEJO_ID" != "null" ] && ensure_proxy_project forgejo "$$FORGEJO_ID"

    # mcr.microsoft.com -> proxy project "mcr" (playwright-runner base: mcr.microsoft.com/playwright)
    MCR_ID="$$(ensure_registry mcr docker-registry https://mcr.microsoft.com)"
    [ -n "$$MCR_ID" ] && [ "$$MCR_ID" != "null" ] && ensure_proxy_project mcr "$$MCR_ID"

    # Own-image hosting: private project + CI robot (webgrip/{infrastructure,workflows} handoffs)
    ensure_private_project webgrip
    ensure_webgrip_robot

    # Storage hygiene: weekly registry GC (reaps untagged incl. orphaned build cache) + a webgrip
    # tag-retention policy (keep latest 10 versions; the rest get untagged for GC to reclaim).
    ensure_gc_schedule
    ensure_retention webgrip
    ensure_project_scanning webgrip

    log "reconcile complete"
