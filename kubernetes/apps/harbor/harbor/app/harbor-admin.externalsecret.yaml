---
# Only the two values that genuinely need to be pinned externally, generated in-cluster:
#   - HARBOR_ADMIN_PASSWORD: the initial local-admin password (so it's known/stable).
#   - secretKey: Harbor's 16-char at-rest encryption key. The chart reads this straight
#     from .Values.secretKey (NO lookup, default "not-a-secure-key"), so it MUST be pinned
#     to a secure, STABLE value — regenerating it corrupts data at rest.
# Everything else Harbor needs (CORE_SECRET, CSRF_KEY, registry/jobservice secrets, the
# token-signing cert) is generated and managed by the chart itself in its own `harbor-core`
# secret — do NOT supply those via existingSecret (a partial secret displaces the chart's
# token cert and breaks /service/token → docker login 500s).
#
# generate-once + Retain = stable forever. Retrieve the admin password with:
#   kubectl -n harbor get secret harbor-admin -o jsonpath='{.data.HARBOR_ADMIN_PASSWORD}' | base64 -d
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-admin
  namespace: harbor
spec:
  refreshInterval: "0" # generate once, never rotate (secretKey is an at-rest key)
  target:
    name: harbor-admin
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
      rewrite:
        - regexp: {source: "password", target: "HARBOR_ADMIN_PASSWORD"}
    # secretKey MUST be exactly 16 chars.
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-16
      rewrite:
        - regexp: {source: "password", target: "secretKey"}
