---
# Harbor's admin password + internal secrets, sourced from OpenBao.
# Populate once (values the human provides — see the harbor runbook):
#   bao kv put secret/harbor/core \
#     HARBOR_ADMIN_PASSWORD=<chosen> \
#     secretKey="$(openssl rand -hex 8)"        # MUST be exactly 16 chars \
#     CSRF_KEY="$(openssl rand -hex 16)"        # MUST be exactly 32 chars \
#     REGISTRY_HTTP_SECRET="$(openssl rand -hex 16)" \
#     JOBSERVICE_SECRET="$(openssl rand -hex 16)"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-core
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: harbor-core, creationPolicy: Owner}
  dataFrom:
    - extract: {key: harbor/core}
