---
# Harbor's admin password + internal secrets are pure in-cluster entropy (the
# "random / internal" class) — NO human value, NO OpenBao path. They are generated
# once by ESO ClusterGenerators and never rotated.
#
# refreshInterval "0" + deletionPolicy Retain = generate-once, stable forever.
# IMPORTANT: `secretKey` is Harbor's data-at-rest encryption key — regenerating it
# corrupts already-encrypted data (robot tokens, etc.). Generate-once + Retain keeps
# it stable; it is preserved by cluster Secret backups. Never delete this Secret on a
# populated Harbor expecting ESO to recreate it — that mints a NEW key.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-core
  namespace: harbor
spec:
  refreshInterval: "0" # generate once, never rotate
  target:
    name: harbor-core
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    # secretKey MUST be exactly 16 chars (Harbor at-rest encryption key).
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-16
      rewrite:
        - regexp: {source: "password", target: "secretKey"}
    # CSRF_KEY MUST be exactly 32 chars.
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
      rewrite:
        - regexp: {source: "password", target: "CSRF_KEY"}
    # CORE_SECRET — the chart's `core.existingSecret` key, distinct from secretKey.
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
      rewrite:
        - regexp: {source: "password", target: "secret"}
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
      rewrite:
        - regexp: {source: "password", target: "REGISTRY_HTTP_SECRET"}
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
      rewrite:
        - regexp: {source: "password", target: "JOBSERVICE_SECRET"}
    # Initial local-admin password. Retrieve for break-glass with:
    #   kubectl -n harbor get secret harbor-core -o jsonpath='{.data.HARBOR_ADMIN_PASSWORD}' | base64 -d
    # (day-to-day login is via Authentik OIDC once Phase 2 is enabled.)
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
      rewrite:
        - regexp: {source: "password", target: "HARBOR_ADMIN_PASSWORD"}
