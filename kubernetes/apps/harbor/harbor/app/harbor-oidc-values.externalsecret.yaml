---
# Phase 2 (Authentik OIDC): a Helm values fragment (key `values.yaml`) holding
# Harbor's `core.configureUserSettings` JSON, sourced from OpenBao and merged into
# the HelmRelease via `valuesFrom` (optional). Until secret/harbor/oidc exists this
# ExternalSecret stays NotReady and Harbor runs local db_auth — harmless.
#
# After the Authentik blueprint (36-oidc-harbor) reconciles, read the provider's
# client id/secret from Authentik and store the fragment (literal domain, NOT
# ${SECRET_DOMAIN} — ESO does no build-time substitution):
#   bao kv put secret/harbor/oidc values.yaml=@harbor-oidc.values.yaml
# where harbor-oidc.values.yaml is, e.g.:
#   core:
#     configureUserSettings: |
#       {"auth_mode":"oidc_auth","oidc_name":"authentik",
#        "oidc_endpoint":"https://authentik.<DOMAIN>/application/o/harbor/",
#        "oidc_client_id":"...","oidc_client_secret":"...",
#        "oidc_scope":"openid,profile,email","oidc_groups_claim":"groups",
#        "oidc_admin_group":"harbor-admins","oidc_auto_onboard":true,
#        "oidc_user_claim":"preferred_username","oidc_verify_cert":true}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-oidc-values
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: harbor-oidc-values, creationPolicy: Owner}
  data:
    - {secretKey: values.yaml, remoteRef: {key: harbor/oidc, property: values.yaml}}
