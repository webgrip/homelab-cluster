---
# Phase 2 (Authentik OIDC): Harbor's `core.configureUserSettings` Helm values
# fragment (key `values.yaml`), merged into the HelmRelease via `valuesFrom`
# (optional — Harbor boots local db_auth until the chain converges).
#
# Fully GitOps, no CLI ceremony: the client secret is generated in-cluster
# (authentik/app/harbor-oidc-client.externalsecret.yaml), consumed by Authentik
# via !Env in blueprint 36-oidc-harbor, mirrored to OpenBao secret/harbor/oidc
# by the matching PushSecret, and templated into the fragment here.
# ${SECRET_DOMAIN} is substituted by Flux postBuild; {{ .client_secret }} by ESO.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-oidc-values
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target:
    name: harbor-oidc-values
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        values.yaml: |
          core:
            configureUserSettings: |
              {"auth_mode":"oidc_auth","oidc_name":"authentik",
               "oidc_endpoint":"https://authentik.${SECRET_DOMAIN}/application/o/harbor/",
               "oidc_client_id":"harbor","oidc_client_secret":"{{ .client_secret }}",
               "oidc_scope":"openid,profile,email,groups","oidc_groups_claim":"groups",
               "oidc_admin_group":"harbor-admins","oidc_auto_onboard":true,
               "oidc_user_claim":"preferred_username","oidc_verify_cert":true}
  data:
    - {secretKey: client_secret, remoteRef: {key: harbor/oidc, property: client_secret}}
