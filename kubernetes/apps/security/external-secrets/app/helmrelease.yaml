---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  chartRef:
    kind: OCIRepository
    name: external-secrets
  interval: 1h
  values:
    installCRDs: true
    replicaCount: 1
    # Protect the secret-delivery control plane from OOM eviction order
    # (built-in class, always present so no admission-ordering risk).
    priorityClassName: system-cluster-critical
    webhook:
      replicaCount: 1
      priorityClassName: system-cluster-critical
    certController:
      replicaCount: 1
      priorityClassName: system-cluster-critical
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
