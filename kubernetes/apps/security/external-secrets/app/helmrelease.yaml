---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  chartRef:
    kind: OCIRepository
    name: external-secrets
  interval: 1h
  values:
    installCRDs: true
    replicaCount: 1
    webhook:
      replicaCount: 1
    certController:
      replicaCount: 1
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
