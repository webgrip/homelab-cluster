---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: security-tetragon-rules
  labels:
    app.kubernetes.io/name: tetragon
    release: kube-prometheus-stack
spec:
  groups:
    - name: security.tetragon
      rules:
        - alert: TetragonEventsLost
          expr: |
            sum by (pod) (
              increase(tetragon_observer_ringbuf_events_lost_total[10m])
            ) > 0
          labels:
            severity: warning
            owner: platform
            service: tetragon
          annotations:
            summary: "Tetragon lost runtime events ({{$labels.pod}})"
            description: |
              What's happening:
              - Tetragon reports lost ring-buffer events on pod {{$labels.pod}} over 10m.

              Impact/risk:
              - Process/exec telemetry is incomplete; investigations may miss activity.

              Likely causes:
              - Tetragon CPU/memory pressure, ring-buffer too small, or excessive event volume.

              First actions:
              - Check Tetragon agent resource usage/restarts (namespace=security).
              - Increase resources / buffer or reduce exported event volume; verify loss returns to 0.
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/security-supply-chain/#tetragon"

        - alert: TetragonPolicyLoadErrors
          expr: |
            sum by (state) (
              tetragon_tracingpolicy_loaded{state=~"error|load_error"}
            ) > 0
          for: 10m
          labels:
            severity: warning
            owner: platform
            service: tetragon
          annotations:
            summary: "Tetragon tracing policy load errors (state={{$labels.state}})"
            description: |
              What's happening:
              - One or more Tetragon tracing policies are in state {{$labels.state}} for 10m.

              Impact/risk:
              - The affected policy is not enforcing/observing; runtime coverage has a gap.

              Likely causes:
              - Invalid TracingPolicy spec, kernel/BTF incompatibility, or operator error.

              First actions:
              - Inspect Tetragon operator logs and `kubectl get tracingpolicies` status.
              - Fix or roll back the offending policy; confirm it loads cleanly.
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/security-supply-chain/#tetragon"
