---
# ESO reads the external/provider secret class FROM Infisical via a Universal-Auth
# machine identity. NotReady until the human seeds the eso-auth secret (Wave 4 step B).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical
spec:
  provider:
    infisical:
      hostAPI: http://infisical.security.svc.cluster.local:8080
      auth:
        universalAuthCredentials:
          clientId:
            name: eso-auth
            namespace: security
            key: clientId
          clientSecret:
            name: eso-auth
            namespace: security
            key: clientSecret
      secretsScope:
        projectSlug: homelab-dfy-g
        environmentSlug: prod
        secretsPath: "/"
        recursive: true
