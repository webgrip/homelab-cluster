---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: infisical-db
  namespace: security
spec:
  instances: 1
  inheritedMetadata:
    annotations:
      reloader.stakater.com/auto: "true"
  storage:
    size: 10Gi
    storageClass: longhorn
  walStorage:
    size: 5Gi
    storageClass: longhorn
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: infisical-db-store
        serverName: infisical-db
  bootstrap:
    initdb:
      database: infisical
      owner: infisical
