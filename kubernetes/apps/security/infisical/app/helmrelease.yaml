---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: infisical
spec:
  chartRef:
    kind: OCIRepository
    name: infisical
  interval: 1h
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    controllers:
      infisical:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/infisical/infisical
              # Renovate-managed; pin a digest at implementation time.
              tag: v0.151.0
            env:
              NODE_ENV: production
              TELEMETRY_ENABLED: "false"
              # SITE_URL must equal the public URL (used for invite/reset links).
              SITE_URL: https://infisical.${SECRET_DOMAIN}
              # Internal cache/queue; no auth on the in-namespace valkey.
              REDIS_URL: redis://infisical-redis.security.svc.cluster.local:6379
              # Full connection string straight from the CNPG-generated secret.
              # NOTE: if Infisical rejects the TLS mode, append ?sslmode=no-verify
              # (see the Wave 4 runbook) — the CNPG uri key has no sslmode.
              DB_CONNECTION_URI:
                valueFrom:
                  secretKeyRef:
                    name: infisical-db-app
                    key: uri
            # ENCRYPTION_KEY + AUTH_SECRET come from the SOPS-managed secret a human
            # creates (infisical-app-secret.sops.yaml). The app CrashLoops without it,
            # which is why this whole app stays UNWIRED until that secret exists.
            envFrom:
              - secretRef:
                  name: infisical-app-secret
            ports:
              - name: http
                containerPort: 8080
            probes:
              # Infisical runs DB migrations BEFORE it binds :8080, which can take
              # minutes on first boot. A startup probe holds liveness/readiness off
              # until the port is actually open (up to ~10 min) so the kubelet does
              # not kill it mid-migration.
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8080
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 60
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8080
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 4
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8080
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 4
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - "ALL"
    service:
      app:
        controller: infisical
        ports:
          http:
            port: 8080
            targetPort: http
