---
# TEMPLATE — Infisical server's own crypto secrets (the SOPS floor for the backend).
# These protect EVERYTHING stored in Infisical's DB; losing them loses the contents.
# A human must create the encrypted version — this plain template is never applied.
#
#   cd kubernetes/apps/security/infisical/app
#   cp infisical-app-secret.template.yaml infisical-app-secret.sops.yaml
#   # fill the two values:
#   #   AUTH_SECRET:    $(openssl rand -base64 32)
#   #   ENCRYPTION_KEY: $(openssl rand -hex 16)
#   sops --encrypt --in-place infisical-app-secret.sops.yaml
#   # then add `- ./infisical-app-secret.sops.yaml` to ./kustomization.yaml
#
# This must exist BEFORE wiring infisical into security/kustomization.yaml,
# or the Infisical pod CrashLoops on the missing envFrom secret.
apiVersion: v1
kind: Secret
metadata:
  name: infisical-app-secret
  namespace: security
type: Opaque
stringData:
  AUTH_SECRET: "REPLACE_ME__openssl_rand_base64_32"
  ENCRYPTION_KEY: "REPLACE_ME__openssl_rand_hex_16"
