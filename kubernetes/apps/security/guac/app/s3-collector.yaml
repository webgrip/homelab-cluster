---
# Scans the GUAC S3 bucket for CycloneDX SBOMs written by the trivy-sbom-uploader
# CronJob and ingests them into the GUAC dependency graph.
# Runs at 05:00 UTC daily — 3 hours after the SBOM uploader (02:00 UTC).
# guaccollect s3 without an event bus does a one-shot full scan of sboms/ and exits.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: guac-s3-collector
  namespace: security
spec:
  schedule: "20 5 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      activeDeadlineSeconds: 7200 # 2h max
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: s3-collector
              image: ghcr.io/guacsec/guac:v1.0.1
              command:
                - "/opt/guac/guaccollect"
              args:
                - s3
                - --s3-url=$(S3_ENDPOINT)
                - --s3-bucket=$(S3_GUAC_BUCKET)
                - --s3-path=sboms/
                - --s3-region=$(S3_REGION)
                - --service-poll=false
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: security-s3
                      key: S3_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: security-s3
                      key: S3_SECRET_ACCESS_KEY
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: security-s3
                      key: S3_ENDPOINT
                - name: S3_GUAC_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: security-s3
                      key: S3_GUAC_BUCKET
                - name: S3_REGION
                  valueFrom:
                    secretKeyRef:
                      name: security-s3
                      key: S3_REGION
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              volumeMounts:
                - name: guac-config
                  mountPath: /guac
                  readOnly: true
          volumes:
            - name: guac-config
              configMap:
                name: guac-cm
