---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: guac
  namespace: security
  annotations:
    external-dns.alpha.kubernetes.io/exclude: "true"
spec:
  hostnames:
    - guac.${SECRET_DOMAIN}
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: visualizer
          namespace: security
          port: 3000
