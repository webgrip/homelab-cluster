---
# guac-secrets now sourced from OpenBao (all keys incl values.yaml via dataFrom.extract). Replaces SOPS.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: guac-secrets, namespace: security}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: guac-secrets, creationPolicy: Owner}
  dataFrom:
    - extract: {key: guac/db}
