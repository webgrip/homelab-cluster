---
# Migration phase 6 (seed): guac-secrets (CNPG bootstrap + app values.yaml) -> OpenBao secret/guac/db.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: guac-secrets, namespace: security}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: guac-secrets}}
  data:
    - match: {secretKey: username, remoteRef: {remoteKey: guac/db, property: username}}
    - match: {secretKey: password, remoteRef: {remoteKey: guac/db, property: password}}
    - match: {secretKey: values.yaml, remoteRef: {remoteKey: guac/db, property: values.yaml}}
