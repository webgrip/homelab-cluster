---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: guac-db-store
  namespace: security
spec:
  retentionPolicy: 2d # TEMP force-prune: age out the Jun-12 anchor to GC ~32 GiB orphaned pre-first-backup WAL; restore to 3d (Tier 4) after
  configuration:
    endpointURL: http://10.0.0.110:3900
    destinationPath: s3://cnpg-backups-bucket/homelab-cluster/guac-db/
    s3Credentials:
      accessKeyId:
        name: cnpg-backup-s3
        key: S3_ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-backup-s3
        key: S3_SECRET_ACCESS_KEY
      region:
        name: cnpg-backup-s3
        key: S3_REGION
    wal:
      compression: gzip
      maxParallel: 1
    data:
      compression: gzip
