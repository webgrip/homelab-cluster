---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: guac-db
  namespace: security
spec:
  instances: 1
  # Burstable, not BestEffort: the Talos PSI OOM controller kills the largest
  # BestEffort cgroups first — every CNPG DB was SIGKILLed at once on
  # fringe-workstation (2026-07-11 01:27). Limits ~3x observed peak. No CPU
  # request/limit: worker-1 is CPU-request-saturated (98%) — a 100m request
  # left 7 DBs Pending (fringe is memory-request-full); memory request alone
  # keeps Burstable QoS, and no limit avoids throttling checkpoints/vacuum.
  resources:
    requests:
      memory: 384Mi
    limits:
      memory: 768Mi
  # Pin the DB off the soyo control-planes onto the worker pool (ADR-0002).
  # This was the missing pin that let guac-db reschedule onto soyo-3 when
  # the 2026-07-11 resources rollout recreated the pod (guac-db is a separate
  # Flux Kustomization and never inherited guac/app's worker-pool component).
  affinity:
    nodeSelector:
      node.webgrip.io/pool: worker
  inheritedMetadata:
    annotations:
      reloader.stakater.com/auto: "true"
  storage:
    size: 20Gi
    storageClass: longhorn
  walStorage:
    size: 5Gi
    storageClass: longhorn
  postgresql:
    parameters:
      # Tier 4 (no WAL archiving — nightly pg_dump instead; the graph rebuilds
      # from re-ingested SBOMs). Compress WAL + widen checkpoints to keep the
      # LOCAL WAL volume small. See docs/techdocs/docs/database-backup-tiers.md
      wal_compression: "zstd"
      max_wal_size: "2GB"
      checkpoint_timeout: "15min"
  bootstrap:
    initdb:
      database: guac
      owner: guac
      secret:
        name: guac-secrets
