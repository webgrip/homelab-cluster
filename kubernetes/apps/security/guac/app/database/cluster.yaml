---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: guac-db
  namespace: security
spec:
  instances: 1
  # Burstable, not BestEffort: the Talos PSI OOM controller kills the largest
  # BestEffort cgroups first — every CNPG DB was SIGKILLed at once on
  # fringe-workstation (2026-07-11 01:27). Limits ~3x observed peak; no CPU
  # limit (avoid throttling checkpoints/vacuum).
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      memory: 768Mi
  inheritedMetadata:
    annotations:
      reloader.stakater.com/auto: "true"
  storage:
    size: 20Gi
    storageClass: longhorn
  walStorage:
    size: 5Gi
    storageClass: longhorn
  postgresql:
    parameters:
      # Tier 4 (no WAL archiving — nightly pg_dump instead; the graph rebuilds
      # from re-ingested SBOMs). Compress WAL + widen checkpoints to keep the
      # LOCAL WAL volume small. See docs/techdocs/docs/database-backup-tiers.md
      wal_compression: "zstd"
      max_wal_size: "2GB"
      checkpoint_timeout: "15min"
  bootstrap:
    initdb:
      database: guac
      owner: guac
      secret:
        name: guac-secrets
