---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: guac-db
  namespace: security
spec:
  instances: 1
  inheritedMetadata:
    annotations:
      reloader.stakater.com/auto: "true"
  storage:
    size: 20Gi
    storageClass: longhorn
  walStorage:
    size: 5Gi
    storageClass: longhorn
  postgresql:
    parameters:
      # Tier 4, heaviest WAL writer (~3.5 GiB/day, graph fully rebuilt from
      # re-ingested SBOMs). Compress WAL FPIs and widen checkpoints to cut FPI
      # frequency; max_wal_size kept modest for the 5Gi WAL PVC.
      # See docs/techdocs/docs/database-backup-tiers.md
      wal_compression: "zstd"
      max_wal_size: "2GB"
      checkpoint_timeout: "15min"
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: guac-db-store
        serverName: guac-db
  bootstrap:
    initdb:
      database: guac
      owner: guac
      secret:
        name: guac-secrets
