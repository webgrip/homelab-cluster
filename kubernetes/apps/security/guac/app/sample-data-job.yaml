---
apiVersion: batch/v1
kind: Job
metadata:
  name: guac-sample-data
  annotations:
    # Job spec.template is immutable; without force, any template change (e.g. a
    # Renovate image-digest bump) wedges the owning Kustomization until the Job
    # is hand-deleted (the 2026-07-15 devex failure mode). force = delete+recreate.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  activeDeadlineSeconds: 900
  backoffLimit: 2
  template:
    spec:
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: Never
      initContainers:
        - name: clone-sample-data
          image: docker.io/alpine/git:v2.54.0@sha256:77418e6e7c7f434c4a98eaff04ef16840cf03649c881c03948e3e213923e3136
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - clone
            - --depth=1
            - https://github.com/guacsec/guac-data.git
            - /shared-data/guac-data
          volumeMounts:
            - name: shared-data
              mountPath: /shared-data
      containers:
        - name: ingest-sample-data
          image: ghcr.io/guacsec/guac:v1.1.0@sha256:1d138a384016bd599e4add5fcd2d86a4ca98c1d859a98b31326a403aa47fcf9f
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -ec
            - |
              /opt/guac/guacone collect files \
                --gql-addr http://graphql-server.security.svc.cluster.local:8080/query \
                /shared-data/guac-data/docs
              /opt/guac/guacone collect files \
                --gql-addr http://graphql-server.security.svc.cluster.local:8080/query \
                /shared-data/guac-data/top-dh-sboms/zookeeper.json
          volumeMounts:
            - name: shared-data
              mountPath: /shared-data
      volumes:
        - name: shared-data
          emptyDir: {}
