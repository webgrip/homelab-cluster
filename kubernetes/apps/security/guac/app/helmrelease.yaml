---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: guac
spec:
  chart:
    spec:
      chart: guac
      version: 0.8.0
      sourceRef:
        kind: HelmRepository
        name: guacsec
        namespace: security
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  valuesFrom:
    - kind: Secret
      name: guac-secrets
      valuesKey: values.yaml

  values:
    imagePullSecrets: []

    guac:
      graphqlServer:
        backend: ent
        debug: false
        nodeSelector:
          nodegroup: fringe
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
      restApi:
        nodeSelector:
          nodegroup: fringe
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      visualizer:
        nodeSelector:
          nodegroup: fringe
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      observability:
        deployServiceMonitor: true
      sampleData:
        ingest: false
      backend:
        ent:
          db-driver: postgres
          db-migrate: true
          db-debug: false
      ociCollector:
        nodeSelector:
          nodegroup: fringe
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
      depsDevCollector:
        nodeSelector:
          nodegroup: fringe
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
      osvCertifier:
        nodeSelector:
          nodegroup: fringe
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
      cdCertifier:
        nodeSelector:
          nodegroup: fringe
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
      ingestor:
        nodeSelector:
          nodegroup: fringe
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
      collectSub:
        nodeSelector:
          nodegroup: fringe
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
      # gocloud blob-store URI — points at the cluster-wide Garage S3.
      # Credentials come from the security-s3 secret env vars below.
      blobAddr: "s3://guac?endpoint=http://10.0.0.110:3900&region=garage&disable_https=true&use_path_style=true"
      customLabels:
        release: kube-prometheus-stack
      common:
        env:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: security-s3
                key: S3_ACCESS_KEY_ID
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: security-s3
                key: S3_SECRET_ACCESS_KEY
          - name: AWS_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: security-s3
                key: S3_ENDPOINT
          - name: AWS_BUCKET
            valueFrom:
              secretKeyRef:
                name: security-s3
                key: S3_GUAC_BUCKET

    nats:
      exporter:
        enabled: true
        serviceMonitor:
          enabled: true
          namespace: observability
          labels:
            release: kube-prometheus-stack

    # Use the cluster-wide Garage S3 instead of a chart-bundled MinIO.
    minio:
      enabled: false
