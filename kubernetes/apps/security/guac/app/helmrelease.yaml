---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: guac
spec:
  chart:
    spec:
      chart: guac
      version: 0.8.0
      sourceRef:
        kind: HelmRepository
        name: guacsec
        namespace: security
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  valuesFrom:
    - kind: Secret
      name: guac-secrets
      valuesKey: values.yaml

  values:
    imagePullSecrets: []

    guac:
      graphqlServer:
        backend: ent
        debug: false
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        resources:
          requests:
            cpu: 200m
            # Right-sized: graphql server idles ~45Mi; was 512Mi. Limit kept 1Gi.
            memory: 160Mi
          limits:
            cpu: "1"
            memory: 1Gi
      restApi:
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        # Chart 0.8.0's rest-api template does not render this key at all — it's
        # dropped silently. Actual resources come from the postRenderer below.
        resources: {}
      visualizer:
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        # Chart 0.8.0's visualizer template does not render this key at all — it's
        # dropped silently. Actual resources come from the postRenderer below.
        resources: {}
      observability:
        deployServiceMonitor: true
      sampleData:
        ingest: false
      backend:
        ent:
          db-driver: postgres
          db-migrate: true
          db-debug: false
      ociCollector:
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
      depsDevCollector:
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
      osvCertifier:
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        resources:
          requests:
            cpu: 50m
            memory: 96Mi
          limits:
            cpu: 500m
            memory: 512Mi
      cdCertifier:
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        resources:
          requests:
            cpu: 50m
            memory: 96Mi
          limits:
            cpu: 500m
            memory: 512Mi
      ingestor:
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
      collectSub:
        tolerations:
          - key: dedicated
            operator: Equal
            value: fringe
            effect: NoSchedule
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 250m
            memory: 128Mi
      # gocloud blob-store URI — points at the cluster-wide Garage S3.
      # Credentials come from the security-s3 secret env vars below.
      blobAddr: "s3://guac?endpoint=http://10.0.0.110:3900&region=garage&disable_https=true&use_path_style=true"
      customLabels:
        release: kube-prometheus-stack
      common:
        env:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: security-s3
                key: S3_ACCESS_KEY_ID
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: security-s3
                key: S3_SECRET_ACCESS_KEY
          - name: AWS_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: security-s3
                key: S3_ENDPOINT
          - name: AWS_BUCKET
            valueFrom:
              secretKeyRef:
                name: security-s3
                key: S3_GUAC_BUCKET

    # guac-nats-0 ran BestEffort (chart sets no resources by default) and was
    # repeatedly OOM-killed by Talos's PSI OOMController despite using <15Mi per
    # container — BestEffort pods are first in line regardless of actual usage.
    # Guaranteed QoS (req==limit) on all 3 containers, same fix class as the
    # longhorn-manager OOM cascade:
    # docs/techdocs/docs/incidents/2026-06-09-longhorn-oom-cascade.md.
    nats:
      nats:
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 32Mi
      reloader:
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 10m
            memory: 16Mi
      exporter:
        enabled: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 10m
            memory: 32Mi
        serviceMonitor:
          enabled: true
          namespace: observability
          labels:
            release: kube-prometheus-stack

    # Use the cluster-wide Garage S3 instead of a chart-bundled MinIO.
    minio:
      enabled: false

  # rest-api and visualizer ran BestEffort: chart 0.8.0's guacrest-deployment.yaml
  # and visualizer-deployment.yaml templates never reference `.resources` at all
  # (confirmed against the pulled chart source — not a values-naming issue, values
  # set under guac.restApi.resources/guac.visualizer.resources are silently
  # dropped). Patch resources onto the rendered Deployments directly, Guaranteed
  # QoS (req==limit), same fix class as the longhorn-manager OOM cascade:
  # docs/techdocs/docs/incidents/2026-06-09-longhorn-oom-cascade.md.
  # ⚠️ This HR defines postRenderers, so it MUST NOT also include the
  # components/placement/worker-pool component — that component's strategic-merge
  # patch REPLACES spec.postRenderers wholesale (its own header warns about this).
  # That exact collision silently dropped the resource patches below between
  # 2026-07-15 and 2026-07-18 (rest-api/visualizer stayed BestEffort and kept
  # being OOM-killed). The worker-pool affinity is therefore carried INLINE here
  # (the last two patches), replacing the component include.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |
              - op: add
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: node.webgrip.io/pool
                              operator: In
                              values: ["worker"]
          - target:
              kind: StatefulSet
            patch: |
              - op: add
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: node.webgrip.io/pool
                              operator: In
                              values: ["worker"]
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: rest-api
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: rest-api
              spec:
                template:
                  spec:
                    containers:
                      - name: rest-api
                        resources:
                          requests:
                            cpu: 50m
                            memory: 128Mi
                          limits:
                            cpu: 50m
                            memory: 128Mi
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: visualizer
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: visualizer
              spec:
                template:
                  spec:
                    containers:
                      - name: nginx
                        resources:
                          requests:
                            cpu: 25m
                            memory: 32Mi
                          limits:
                            cpu: 25m
                            memory: 32Mi
                      - name: visualizer
                        resources:
                          requests:
                            cpu: 50m
                            memory: 128Mi
                          limits:
                            cpu: 50m
                            memory: 128Mi
