---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: security-trivy-rules
  labels:
    app.kubernetes.io/name: trivy-operator
    release: kube-prometheus-stack
spec:
  groups:
    - name: security.trivy
      rules:
        - alert: TrivyCriticalImageVulnerabilities
          expr: |
            sum by (namespace, resource_kind, resource_name) (
              trivy_image_vulnerabilities{severity="Critical"}
            ) > 0
          for: 30m
          labels:
            severity: critical
            owner: platform
            service: trivy-operator
          annotations:
            summary: "Critical image vulnerabilities detected ({{$labels.namespace}}/{{$labels.resource_name}})"
            description: |
              What's happening:
              - Trivy reports critical image vulnerabilities for {{$labels.namespace}}/{{$labels.resource_name}}.

              Impact/risk:
              - Known-exploitable CVEs in a running workload increase compromise risk.

              Likely causes:
              - Outdated base image or dependency with a published critical CVE.

              First actions:
              - Review the VulnerabilityReport CR for the workload.
              - Rebuild from a patched base, re-pin the image digest, and confirm the finding clears.
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/security-supply-chain/#trivy-operator"

        - alert: TrivyHighImageVulnerabilityBacklog
          expr: |
            sum(trivy_image_vulnerabilities{severity=~"Critical|High"}) > 20
          for: 2h
          labels:
            severity: warning
            owner: platform
            service: trivy-operator
          annotations:
            summary: "High vulnerability backlog is growing (cluster-wide)"
            description: |
              What's happening:
              - More than 20 high/critical image vulnerability findings exist cluster-wide for 2h.

              Impact/risk:
              - A growing backlog erodes supply-chain posture and slows incident response.

              Likely causes:
              - Accumulated unpatched images, or a base-image CVE affecting many workloads.

              First actions:
              - Triage findings, prioritizing internet-facing and privileged workloads.
              - Rebuild/patch the worst offenders; track the backlog trending back down.
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/security-supply-chain/#trivy-operator"

        - alert: TrivyExposedSecretsDetected
          expr: |
            sum by (namespace, resource_kind, resource_name) (
              trivy_image_exposedsecrets{severity=~"Critical|High|Medium"}
            ) > 0
          for: 15m
          labels:
            severity: critical
            owner: platform
            service: trivy-operator
          annotations:
            summary: "Potential exposed secret in image ({{$labels.namespace}}/{{$labels.resource_name}})"
            description: |
              What's happening:
              - Trivy detected a potential embedded secret in the image for {{$labels.namespace}}/{{$labels.resource_name}}.

              Impact/risk:
              - A baked-in credential is effectively published wherever the image is stored.

              Likely causes:
              - Secret committed into the build context or copied into an image layer.

              First actions:
              - Review the ExposedSecretReport CR; treat the credential as compromised.
              - Rotate the credential, rebuild without it, and re-pin the digest.
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/security-supply-chain/#trivy-operator"

        - alert: TrivyClusterComplianceFailures
          expr: |
            sum by (title) (
              trivy_cluster_compliance{status="Fail"}
            ) > 0
          for: 1h
          labels:
            severity: warning
            owner: platform
            service: trivy-operator
          annotations:
            summary: "Trivy compliance failures detected ({{$labels.title}})"
            description: |
              What's happening:
              - Trivy cluster compliance check "{{$labels.title}}" is failing for 1h.

              Impact/risk:
              - The cluster deviates from the named compliance baseline (e.g. CIS/NSA).

              Likely causes:
              - New non-compliant workload, or a control regressed after a change.

              First actions:
              - Review the ClusterComplianceReport detail rows for the failing control.
              - Remediate the offending resources before promoting audit policies to enforce.
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/security-supply-chain/#trivy-operator"
