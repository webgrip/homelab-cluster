---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
spec:
  chart:
    spec:
      chart: trivy-operator
      version: 0.32.1
      sourceRef:
        kind: HelmRepository
        name: aqua-security
        namespace: security
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    fullnameOverride: trivy-operator
    targetNamespaces: ""
    excludeNamespaces: "kube-node-lease,kube-public"
    targetWorkloads: "pod,replicaset,replicationcontroller,statefulset,daemonset,cronjob,job"

    operator:
      replicas: 1
      scanJobTTL: 30m
      scanSecretTTL: 15m
      scanJobTimeout: 10m
      scanJobsConcurrentLimit: 1
      scanNodeCollectorLimit: 1
      nodeCollector:
        # Talos nodes have an immutable rootfs — node-collector requires write access
        # to /etc/systemd which does not exist on Talos. Disable it; image/container/
        # SBOM scanning is unaffected. Re-enable if you add mutable Linux nodes.
        enabled: false
      vulnerabilityScannerEnabled: true
      sbomGenerationEnabled: true
      clusterSbomCacheEnabled: true
      scannerReportTTL: 24h
      cacheReportTTL: 168h
      configAuditScannerEnabled: true
      rbacAssessmentScannerEnabled: true
      infraAssessmentScannerEnabled: false
      # Talos nodes do not expose /etc/systemd — disable compliance scanner
      # which uses node-collector Jobs that fail on immutable rootfs nodes.
      clusterComplianceEnabled: false
      vulnerabilityScannerScanOnlyCurrentRevisions: true
      configAuditScannerScanOnlyCurrentRevisions: true
      accessGlobalSecretsAndServiceAccount: true
      builtInTrivyServer: true
      metricsFindingsEnabled: true
      metricsVulnIdEnabled: false
      exposedSecretScannerEnabled: true
      metricsExposedSecretInfo: false
      metricsConfigAuditInfo: false
      metricsRbacAssessmentInfo: false
      metricsInfraAssessmentInfo: true
      metricsImageInfo: true
      metricsClusterComplianceInfo: true

    serviceMonitor:
      enabled: true
      interval: 120s
      labels:
        release: kube-prometheus-stack
      endpointAdditionalProperties:
        metricRelabelings:
          - action: drop
            sourceLabels:
              - __name__
            regex: trivy_(configaudits|exposedsecrets|rbacassessments)_info

    trivyOperator:
      scanJobsInSameNamespace: false
      scanJobNodeSelector:
        nodegroup: fringe
      scanJobTolerations:
        - key: dedicated
          operator: Equal
          value: fringe
          effect: NoSchedule
      scanJobPodPriorityClassName: ""
      reportResourceLabels: "app.kubernetes.io/name,app.kubernetes.io/instance,app.kubernetes.io/component,app.kubernetes.io/part-of"
      reportRecordFailedChecksOnly: false
      additionalReportLabels: "cluster=homelab-cluster"
      scanJobPodTemplatePodSecurityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534

    trivy:
      # Avoid remote OCI SBOM referrer lookups; image vulnerability scanning still runs.
      # Docker Hub currently resolves those lookups to unreachable IPv6 in this cluster.
      sbomSources: ""
      storageClassEnabled: true
      storageClassName: longhorn
      storageSize: 10Gi
      priorityClassName: system-cluster-critical
      # Description/Links/CVSS are omitted — they bloat CRDs past the 3 MiB etcd object
      # limit for large images. Target/Class/PackagePath/PackageType are kept because
      # dashboards group by those labels.
      additionalVulnerabilityReportFields: "Target,Class,PackagePath,PackageType"
      # MEDIUM+ only — LOW/UNKNOWN are bulk noise that inflate scan JSON past the 2 MiB
      # gRPC message limit and the 3 MiB etcd CRD limit for complex images.
      severity: MEDIUM,HIGH,CRITICAL
      slow: true
      # Only report CVEs that have a published fix available. Unfixed CVEs represent
      # upstream vendor risk with no actionable remediation path; they balloon report
      # sizes and make dashboards unreadable. Re-enable if unfixed tracking is needed.
      ignoreUnfixed: true
      offlineScan: false
      timeout: 10m0s
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 750m
          memory: 1Gi
      server:
        replicas: 1
        # Right-sized: the server idles at ~30Mi and only holds the Trivy DB
        # cache while serving scans (scans run in separate job pods). The prior
        # 1Gi request reserved ~970Mi it never used, jamming the fringe node.
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi

    compliance:
      failEntriesLimit: 25
      reportType: all
      cron: "0 */6 * * *"
      specs:
        - k8s-cis-1.23
        - k8s-nsa-1.0
        - k8s-pss-baseline-0.1
        - k8s-pss-restricted-0.1

    podAnnotations:
      reloader.stakater.com/auto: "true"
    nodeSelector:
      nodegroup: fringe
    tolerations:
      - key: dedicated
        operator: Equal
        value: fringe
        effect: NoSchedule
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    priorityClassName: system-cluster-critical

    alternateReportStorage:
      enabled: false
