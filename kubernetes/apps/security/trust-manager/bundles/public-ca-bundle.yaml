---
apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: public-ca-bundle
spec:
  sources:
    - useDefaultCAs: true
  target:
    configMap:
      key: ca-certificates.crt
      metadata:
        labels:
          app.kubernetes.io/component: trust-bundle
          app.kubernetes.io/part-of: trust-manager
    namespaceSelector:
      matchLabels:
        trust.webgrip.io/enabled: "true"
