---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
spec:
  chartRef:
    kind: OCIRepository
    name: trust-manager
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    crds:
      enabled: true
      keep: true
    replicaCount: 1
    app:
      trust:
        namespace: security
      metrics:
        service:
          enabled: true
          servicemonitor:
            enabled: true
            labels:
              release: kube-prometheus-stack
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    nodeSelector:
      node.webgrip.io/pool: worker
    tolerations:
      - key: dedicated
        operator: Equal
        value: fringe
        effect: NoSchedule
