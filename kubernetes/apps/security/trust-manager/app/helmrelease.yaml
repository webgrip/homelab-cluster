---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
spec:
  chartRef:
    kind: OCIRepository
    name: trust-manager
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    crds:
      enabled: true
      keep: true
    replicaCount: 1
    app:
      trust:
        namespace: security
      metrics:
        service:
          enabled: true
          servicemonitor:
            enabled: true
            labels:
              release: kube-prometheus-stack
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    # ram: high = worker-1, not fringe. trust-manager's Bundle webhook is svc-fail;
    # on the memory-contended fringe workstation it timed out under pressure and
    # blocked the trust-manager-bundles Kustomization (2026-07-18, same failure
    # class as the kyverno-admission webhook the day before). Webhook-bearing
    # components don't belong on the contended node.
    # (The old `dedicated=fringe` toleration was dead config — that taint was
    # retired 2026-06-19, ADR-0002; see talos/patches/worker/fringe-dedicated.yaml.)
    nodeSelector:
      node.webgrip.io/pool: worker
      node.webgrip.io/ram: high
