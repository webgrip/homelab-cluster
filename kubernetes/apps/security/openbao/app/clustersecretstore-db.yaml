---
# ESO reads the DYNAMIC Postgres credentials from OpenBao's `database` secrets engine
# (ADR-0010). This is a SEPARATE store from `openbao` because the Vault provider `path`
# pins the mount: `openbao` is the KV-v2 mount (`secret`), this is the `database` mount.
# Each ExternalSecret refresh against `creds/<role>` mints a fresh lease (ESO re-reads, it
# does not renew) — so size refreshInterval < the role's default_ttl. Auth is the same ESO
# ServiceAccount + kubernetes-auth role `external-secrets` (external-secrets.hcl now also
# grants `database/creds/*` read).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao-db
spec:
  provider:
    vault:
      server: http://openbao.security.svc.cluster.local:8200
      path: database
      # v1 is REQUIRED for a non-KV engine: the Vault provider defaults to v2, which would
      # rewrite the read path to `database/data/creds/<role>` and break the dynamic read.
      # With v1 ESO reads `database/creds/<role>` directly (minting a fresh lease each refresh).
      version: v1
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: security
