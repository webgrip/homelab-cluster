---
# Auto-unseal sidecar-as-Deployment: keeps openbao-0 unsealed after restarts/reboots.
# OpenBao re-seals on every pod start; this watches the node (via its headless per-pod
# address, reachable even while NotReady/sealed) and unseals it with the SOPS-managed key.
# `bao status` exits 2 when sealed. Config + secrets persist in the raft PVC, so once
# unsealed the cluster is fully functional with zero manual steps.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao-unsealer
  labels:
    app.kubernetes.io/name: openbao-unsealer
    app.kubernetes.io/part-of: openbao
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao-unsealer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openbao-unsealer
        app.kubernetes.io/part-of: openbao
    spec:
      # Co-locate with openbao itself on the worker pool (2026-07-11 placement
      # audit) — the unsealer is useless when its target is down anyway.
      nodeSelector:
        node.webgrip.io/pool: worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: unsealer
          image: docker.io/openbao/openbao:2.5.4@sha256:436eaf9778cad75507ff70ea26ace30dcbe15606e619ac3823495663d7f7c115
          env:
            - name: HOME
              value: /tmp
            - name: BAO_ADDR
              value: http://openbao-0.openbao-internal.security.svc.cluster.local:8200
            - name: OPENBAO_UNSEAL_KEY
              valueFrom:
                secretKeyRef:
                  # Auto-generated by the openbao-init CronJob (not SOPS). The pod waits
                  # in CreateContainerConfigError until init produces it, then unseals.
                  name: openbao-keys
                  key: unseal-key
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                bao status >/dev/null 2>&1; rc=$?
                if [ "$rc" = "2" ]; then
                  echo "openbao is sealed -> unsealing"
                  bao operator unseal "$OPENBAO_UNSEAL_KEY" >/dev/null 2>&1 || echo "unseal attempt failed"
                fi
                sleep 15
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
