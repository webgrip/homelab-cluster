---
# TEMPLATE — OpenBao auto-unseal key. This becomes part of the bootstrap floor
# (alongside the age key): with it + a surviving raft PVC, reboots are zero-touch.
# A human creates the encrypted version; this plain template is never applied.
#
#   cd kubernetes/apps/security/openbao/app
#   cp openbao-unseal.template.yaml openbao-unseal.sops.yaml
#   # set unseal-key to:  jq -r '.unseal_keys_b64[0]' ~/openbao-init.json
#   sops --encrypt --in-place openbao-unseal.sops.yaml
#   # then uncomment BOTH ./openbao-unseal.sops.yaml and ./unsealer.yaml in ./kustomization.yaml
apiVersion: v1
kind: Secret
metadata:
  name: openbao-unseal
  namespace: security
type: Opaque
stringData:
  unseal-key: "REPLACE_ME__unseal_keys_b64[0]_from_bao_operator_init"
