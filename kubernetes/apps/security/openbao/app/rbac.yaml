---
# OpenBao's Kubernetes auth method validates ESO's ServiceAccount token via the
# TokenReview API using OpenBao's OWN pod ServiceAccount, which therefore needs the
# system:auth-delegator ClusterRole. The chart creates the `openbao` ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openbao-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: openbao
    namespace: security
