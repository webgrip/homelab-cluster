---
# Exposes ${SECRET_DOMAIN} (substituted by this app's Kustomization) to the
# openbao-config CronJob via envFrom, so its script can build the OIDC URLs
# without Flux substitution touching the script's shell variables.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-domain
  namespace: security
data:
  SECRET_DOMAIN: ${SECRET_DOMAIN}
