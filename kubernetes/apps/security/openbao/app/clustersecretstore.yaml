---
# ESO reads the external secret class FROM OpenBao (KV v2 mounted at secret/).
# Auth uses ESO's own ServiceAccount + the OpenBao kubernetes-auth role
# "external-secrets" (created during the init ceremony). The store stays NotReady
# until OpenBao is initialized, unsealed, and the auth role/policy exist.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: http://openbao.security.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: security
