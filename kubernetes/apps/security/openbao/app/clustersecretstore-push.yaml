---
# Write-capable store used ONLY by PushSecret during the SOPS->ESO migration (seeds
# existing Secrets into OpenBao KV). Remove once migration is complete; the read-only
# `openbao` store is what apps use ongoing.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao-push
spec:
  provider:
    vault:
      server: http://openbao.security.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets-push
          serviceAccountRef:
            name: external-secrets
            namespace: security
