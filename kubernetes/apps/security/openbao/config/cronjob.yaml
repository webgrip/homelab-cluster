---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: openbao-config
spec:
  schedule: "17 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: openbao-config
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 1000
          containers:
            - name: apply
              image: docker.io/openbao/openbao:2.5.4
              command:
                - "/bin/sh"
                - "/config/apply.sh"
              env:
                - name: HOME
                  value: /tmp
              volumeMounts:
                - name: config
                  mountPath: /config
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - "ALL"
          volumes:
            - name: config
              configMap:
                name: openbao-config
            - name: tmp
              emptyDir: {}
