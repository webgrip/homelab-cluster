---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openbao-config
spec:
  # No postBuild.substituteFrom: apply.sh contains shell ${vars} that must NOT be
  # substituted by Flux. The governance config needs no ${SECRET_DOMAIN}.
  dependsOn:
    - name: openbao
      namespace: security
  interval: 1h
  path: ./kubernetes/apps/security/openbao/config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: security
  timeout: 10m
