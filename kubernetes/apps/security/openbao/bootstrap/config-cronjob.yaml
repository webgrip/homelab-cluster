---
# Auto-config: reconciles policies, k8s auth roles, identity, and OIDC idempotently as the
# scoped config-admin role (k8s auth, NOT root). Self-heals drift. No human steps, no root.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: openbao-config
spec:
  schedule: "2-59/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: openbao-config
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 1000
          containers:
            - name: config
              image: docker.io/openbao/openbao:2.6.0@sha256:900bb64d0671cd1d82b693c56206f7263b582445f3a3bb6ba6e5213f524a6653
              command:
                - "/bin/sh"
                - "/scripts/config.sh"
              env:
                - name: HOME
                  value: /tmp
              envFrom:
                - configMapRef:
                    name: openbao-domain
                    optional: true
              volumeMounts:
                - {name: scripts, mountPath: /scripts}
                - {name: tmp, mountPath: /tmp}
                # vault_admin password for the freshrss-db database-engine connection (ADR-0016).
                # config-admin can't read KV, so config.sh reads it from this mounted file.
                - {name: db-admin-freshrss, mountPath: /db-admin/freshrss, readOnly: true}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
          volumes:
            - name: scripts
              configMap: {name: openbao-bootstrap}
            - name: tmp
              emptyDir: {}
            # optional:true so the job doesn't crashloop before ESO materialises the Secret.
            - name: db-admin-freshrss
              secret:
                secretName: freshrss-vault-admin
                optional: true
