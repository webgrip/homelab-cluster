---
# Auto-config: reconciles policies, k8s auth roles, identity, and OIDC idempotently as the
# scoped config-admin role (k8s auth, NOT root). Self-heals drift. No human steps, no root.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: openbao-config
spec:
  schedule: "2-59/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: openbao-config
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 1000
          containers:
            - name: config
              image: docker.io/openbao/openbao:2.5.4@sha256:436eaf9778cad75507ff70ea26ace30dcbe15606e619ac3823495663d7f7c115
              command:
                - "/bin/sh"
                - "/scripts/config.sh"
              env:
                - name: HOME
                  value: /tmp
              envFrom:
                - configMapRef:
                    name: openbao-domain
                    optional: true
              volumeMounts:
                - {name: scripts, mountPath: /scripts}
                - {name: tmp, mountPath: /tmp}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
          volumes:
            - name: scripts
              configMap: {name: openbao-bootstrap}
            - name: tmp
              emptyDir: {}
