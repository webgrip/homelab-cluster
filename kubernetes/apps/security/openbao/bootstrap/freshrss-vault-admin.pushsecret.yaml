---
# Seed the generated vault_admin credential into OpenBao KV (secret/db-admin/freshrss) so the
# freshrss namespace can read the SAME value for the CNPG managed role. push.hcl already grants
# write on secret/data/* + secret/metadata/*, so no policy change is needed.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: freshrss-vault-admin
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: freshrss-vault-admin}}
  data:
    - match: {secretKey: username, remoteRef: {remoteKey: db-admin/freshrss, property: username}}
    - match: {secretKey: password, remoteRef: {remoteKey: db-admin/freshrss, property: password}}
