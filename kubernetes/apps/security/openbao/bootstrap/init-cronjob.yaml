---
# Auto-init: initialises OpenBao on a fresh/wiped instance, does the one-time root-only
# setup, REVOKES root, and stores only the unseal key as the openbao-keys Secret.
# Idempotent (no-op once initialised), so it self-heals and re-bootstraps on recreation.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: openbao-init
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: openbao-bootstrap
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 1000
          initContainers:
            - name: init
              image: docker.io/openbao/openbao:2.5.4
              command:
                - "/bin/sh"
                - "/scripts/init.sh"
              env:
                - name: HOME
                  value: /tmp
              volumeMounts:
                - {name: scripts, mountPath: /scripts}
                - {name: shared, mountPath: /shared}
                - {name: tmp, mountPath: /tmp}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
          containers:
            - name: store
              # alpine/k8s has kubectl AND a shell (registry.k8s.io/kubectl is distroless).
              image: docker.io/alpine/k8s:1.33.1
              command:
                - "/bin/sh"
                - "/scripts/store.sh"
              env:
                - name: HOME
                  value: /tmp
              volumeMounts:
                - {name: scripts, mountPath: /scripts}
                - {name: shared, mountPath: /shared}
                - {name: tmp, mountPath: /tmp}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
          volumes:
            - name: scripts
              configMap: {name: openbao-bootstrap}
            - name: shared
              emptyDir: {}
            - name: tmp
              emptyDir: {}
