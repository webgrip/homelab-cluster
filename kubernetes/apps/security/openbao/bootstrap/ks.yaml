---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openbao-bootstrap
spec:
  # No postBuild.substituteFrom: the scripts contain shell ${vars} Flux must not touch.
  dependsOn:
    - name: openbao
      namespace: security
  interval: 1h
  path: ./kubernetes/apps/security/openbao/bootstrap
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: security
  timeout: 10m
