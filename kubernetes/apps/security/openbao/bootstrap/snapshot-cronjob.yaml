---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao-snapshot
  namespace: security
---
# Nightly raft snapshot -> Garage (S3). bao auths via k8s auth (snapshot policy); the
# uploader uses the existing cnpg-backup-s3 Garage credentials. DR for full storage loss.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: openbao-snapshot
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: openbao-snapshot
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 1000
            fsGroup: 1000
          initContainers:
            - name: snapshot
              image: docker.io/openbao/openbao:2.6.0@sha256:900bb64d0671cd1d82b693c56206f7263b582445f3a3bb6ba6e5213f524a6653
              command:
                - "/bin/sh"
                - "/scripts/snapshot.sh"
              env:
                - {name: HOME, value: /tmp}
              volumeMounts:
                - {name: scripts, mountPath: /scripts}
                - {name: shared, mountPath: /shared}
                - {name: tmp, mountPath: /tmp}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
          containers:
            - name: upload
              image: docker.io/amazon/aws-cli:2.36.5@sha256:9e583cf73c17d711a67507d172ae3f2a2cba4789c27f507d0920b854b738aba2
              command:
                - "/bin/sh"
                - "/scripts/upload.sh"
              env:
                - {name: HOME, value: /tmp}
                - {name: AWS_ACCESS_KEY_ID, valueFrom: {secretKeyRef: {name: cnpg-backup-s3, key: S3_ACCESS_KEY_ID}}}
                - {name: AWS_SECRET_ACCESS_KEY, valueFrom: {secretKeyRef: {name: cnpg-backup-s3, key: S3_SECRET_ACCESS_KEY}}}
                - {name: AWS_DEFAULT_REGION, valueFrom: {secretKeyRef: {name: cnpg-backup-s3, key: S3_REGION}}}
                - {name: S3_ENDPOINT, valueFrom: {secretKeyRef: {name: cnpg-backup-s3, key: S3_ENDPOINT}}}
                - {name: S3_BUCKET, valueFrom: {secretKeyRef: {name: cnpg-backup-s3, key: S3_BUCKET}}}
              volumeMounts:
                - {name: scripts, mountPath: /scripts}
                - {name: shared, mountPath: /shared}
                - {name: tmp, mountPath: /tmp}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
          volumes:
            - {name: scripts, configMap: {name: openbao-bootstrap}}
            - {name: shared, emptyDir: {}}
            - {name: tmp, emptyDir: {}}
