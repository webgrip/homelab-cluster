---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao-bootstrap
  namespace: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openbao-bootstrap
  namespace: security
rules:
  # Persist the generated unseal key + root token as the openbao-keys Secret.
  - apiGroups:
      - ""
    resources:
      - "secrets"
    verbs:
      - "get"
      - "create"
      - "update"
      - "patch"
      - "list"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openbao-bootstrap
  namespace: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openbao-bootstrap
subjects:
  - kind: ServiceAccount
    name: openbao-bootstrap
    namespace: security
