---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - rbac.yaml
  - init-cronjob.yaml
  - config-cronjob.yaml
configMapGenerator:
  - name: openbao-bootstrap
    files:
      - init.sh
      - store.sh
      - config.sh
      - admins.hcl
      - external-secrets.hcl
generatorOptions:
  disableNameSuffixHash: true
