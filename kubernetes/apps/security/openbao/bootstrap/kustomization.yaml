---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - rbac.yaml
  - init-cronjob.yaml
  - config-cronjob.yaml
  - snapshot-cronjob.yaml
  - breakglass-enable-database.job.yaml # one-shot; remove after it completes once
configMapGenerator:
  - name: openbao-bootstrap
    files:
      - init.sh
      - store.sh
      - config.sh
      - snapshot.sh
      - upload.sh
      - breakglass-enable-database.sh
      - admins.hcl
      - external-secrets.hcl
      - snapshot.hcl
      - push.hcl
      - config-admin.hcl
generatorOptions:
  disableNameSuffixHash: true
