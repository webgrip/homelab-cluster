---
# vault_admin password for OpenBao's `database` engine connection to freshrss-db (ADR-0016).
# Generated in-cluster (never typed), generate-once + Retain so it is STABLE: CNPG's
# managed.roles owns this password ongoing and OpenBao must NOT rotate it (no rotate-root).
# This Secret (security ns) is mounted into the openbao-config CronJob so config.sh can build
# the connection string; the SAME value is pushed to KV secret/db-admin/freshrss and read back
# into the freshrss namespace for the CNPG managed role (a generator yields independent values
# per ExternalSecret, so it cannot simply be generated twice).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: freshrss-vault-admin
spec:
  refreshInterval: "0" # generate once, never rotate (CNPG owns the value ongoing)
  target:
    name: freshrss-vault-admin
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        username: "vault_admin"
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
