---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
spec:
  chart:
    spec:
      chart: falco
      version: 8.0.5
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: security
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    podAnnotations:
      reloader.stakater.com/auto: "true"
    podPriorityClassName: system-node-critical
    tolerations:
      - operator: Exists
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

    controller:
      kind: daemonset
      daemonset:
        updateStrategy:
          type: RollingUpdate

    driver:
      enabled: true
      kind: modern_ebpf
      sysfsMountPath: /sys/kernel
      loader:
        enabled: false
      modernEbpf:
        leastPrivileged: false
        bufSizePreset: 4
        cpusForEachBuffer: 2
        sysfsMount: true

    collectors:
      enabled: true
      containerEngine:
        enabled: true
        engines:
          docker:
            enabled: false
          podman:
            enabled: false
          containerd:
            enabled: true
            sockets:
              - /run/host-containerd/containerd.sock
          cri:
            enabled: true
            sockets:
              - /run/host-containerd/containerd.sock
          lxc:
            enabled: false
          libvirt_lxc:
            enabled: false
          bpm:
            enabled: false
      kubernetes:
        enabled: true

    mounts:
      volumes:
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
      volumeMounts:
        - name: containerd-sock
          mountPath: /run/host-containerd/containerd.sock
          readOnly: true

    metrics:
      enabled: true
      interval: 1h
      outputRule: true
      rulesCountersEnabled: true
      resourceUtilizationEnabled: true
      stateCountersEnabled: true
      kernelEventCountersEnabled: true
      libbpfStatsEnabled: true
      pluginsMetricsEnabled: true

    serviceMonitor:
      create: true
      interval: 30s
      labels:
        release: kube-prometheus-stack

    falcoctl:
      artifact:
        follow:
          every: 168h

    customRules:
      homelab-exceptions.yaml: |-
        # Suppress K8s API contact alerts for legitimate cluster operators and system components.
        # These processes all have valid reasons to call the K8s API.
        - rule: Contact K8S API Server From Container
          exceptions:
            - name: cluster_operators
              fields: [proc.name]
              comps: [in]
              values:
                - - longhorn-manager
                  - manager
                  - trivy-operator
                  - operator
                  - kyverno
                  - prometheus
                  - reports-controller
                  - kube-state-metrics
                  - background-controller
                  - csi-provisioner
                  - csi-resizer
                  - csi-snapshotter
                  - csi-attacher
                  - notification-controller
                  - flux-operator
                  - trust-manager
                  - python
                  - controller
                  - source-controller
                  - helm-controller
                  - kustomize-controller
          append: true

        # Cilium CNI binary injection is expected behavior for eBPF CNI setup.
        - rule: Drop and execute new binary in container
          exceptions:
            - name: cilium_cni_install
              fields: [proc.name, container.image.repository]
              comps: [in, startswith]
              values:
                - - [cilium-cni]
                  - [quay.io/cilium]
          append: true

        # Cilium agent creates raw packet sockets for network policy/monitoring.
        - rule: Packet socket created in container
          exceptions:
            - name: cilium_agent_networking
              fields: [container.image.repository]
              comps: [startswith]
              values:
                - - quay.io/cilium/cilium
          append: true

    falco:
      time_format_iso_8601: true
      priority: notice
      json_output: true
      json_include_output_property: true
      json_include_output_fields_property: true
      json_include_tags_property: true
      buffered_outputs: false
      stdout_output:
        enabled: true
      syslog_output:
        enabled: false
      webserver:
        enabled: true
        listen_address: 0.0.0.0
        listen_port: 8765
        prometheus_metrics_enabled: true
