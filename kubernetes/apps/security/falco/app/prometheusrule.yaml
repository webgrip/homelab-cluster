---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: security-falco-rules
  labels:
    app.kubernetes.io/name: falco
    release: kube-prometheus-stack
spec:
  groups:
    - name: security.falco
      rules:
        - alert: FalcoRuntimeDetection
          expr: |
            sum by (rule_name, source) (
              increase(falcosecurity_falco_rules_matches_total{priority=~"0|1|2|3|4"}[15m])
            ) > 0
          labels:
            severity: warning
            owner: platform
            service: falco
          annotations:
            summary: "Falco runtime detection fired ({{$labels.rule_name}})"
            description: |
              What's happening:
              - Falco matched a high-severity runtime rule ({{$labels.rule_name}}, source {{$labels.source}}).

              Impact/risk:
              - Possible container/host compromise or policy-violating runtime behavior.

              Likely causes:
              - Genuine malicious or unexpected activity, or a noisy rule needing tuning.

              First actions:
              - Inspect Falco JSON logs in Loki (namespace=security, app.kubernetes.io/name=falco).
              - Correlate with the workload/namespace named in the event; contain if confirmed.
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/security-supply-chain/#falco"

        - alert: FalcoEventDrops
          expr: |
            max(falcosecurity_scap_n_drops_perc) > 0
          for: 10m
          labels:
            severity: warning
            owner: platform
            service: falco
          annotations:
            summary: "Falco is dropping kernel events (security/falco)"
            description: |
              What's happening:
              - Falco reports a non-zero kernel event drop percentage for 10m.

              Impact/risk:
              - Dropped syscalls mean detections can be missed; runtime visibility is incomplete.

              Likely causes:
              - Falco CPU/memory pressure, eBPF ring-buffer too small, or excessive rule/event volume.

              First actions:
              - Check Falco pod resource usage and restarts (namespace=security).
              - Increase Falco resources / buffer size or reduce rule volume; verify drops return to 0.
            runbook_url: "https://backstage.${SECRET_DOMAIN}/docs/default/component/homelab-cluster/security-supply-chain/#falco"
