---
# One-shot Job that idempotently creates DT security policies.
# Re-apply to pick up any new policies added to bootstrap.sh.
apiVersion: batch/v1
kind: Job
metadata:
  name: dt-policy-bootstrap
  namespace: security
  annotations:
    # Bump this value to re-run the job after updating policies
    policy-revision: "1"
    # Job spec.template is immutable; without force, any template change (e.g. a
    # Renovate image-digest bump) wedges the owning Kustomization until the Job
    # is hand-deleted (the 2026-07-15 devex failure mode). force = delete+recreate.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  ttlSecondsAfterFinished: 86400 # keep logs for 24h
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: docker.io/alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
          command:
            - "/bin/sh"
            - "-c"
            - "apk add --no-cache curl python3 && /bin/sh /scripts/bootstrap.sh"
          env:
            - name: DT_URL
              value: "http://dependency-track-api-server.security.svc.cluster.local:8080"
            - name: DT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dependency-track-api-key
                  key: api-key
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: dt-policy-bootstrap
            defaultMode: 0755
