---
# One-shot Job that idempotently creates DT security policies.
# Re-apply to pick up any new policies added to bootstrap.sh.
apiVersion: batch/v1
kind: Job
metadata:
  name: dt-policy-bootstrap
  namespace: security
  annotations:
    # Bump this value to re-run the job after updating policies
    policy-revision: "1"
spec:
  ttlSecondsAfterFinished: 86400 # keep logs for 24h
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: docker.io/alpine:3.21@sha256:48b0309ca019d89d40f670aa1bc06e426dc0931948452e8491e3d65087abc07d
          command:
            - "/bin/sh"
            - "-c"
            - "apk add --no-cache curl python3 && /bin/sh /scripts/bootstrap.sh"
          env:
            - name: DT_URL
              value: "http://dependency-track-api-server.security.svc.cluster.local:8080"
            - name: DT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dependency-track-api-key
                  key: api-key
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: dt-policy-bootstrap
            defaultMode: 0755
