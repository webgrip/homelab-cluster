---
# Migration phase 6 (seed): dependency-track-secret (CNPG bootstrap.initdb + app secret.key) -> OpenBao.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: dependency-track-secret, namespace: security}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: dependency-track-secret}}
  data:
    - match: {secretKey: username, remoteRef: {remoteKey: dependency-track/db, property: username}}
    - match: {secretKey: password, remoteRef: {remoteKey: dependency-track/db, property: password}}
    - match: {secretKey: secret.key, remoteRef: {remoteKey: dependency-track/db, property: secret.key}}
