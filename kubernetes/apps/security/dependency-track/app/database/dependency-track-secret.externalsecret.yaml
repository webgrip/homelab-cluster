---
# dependency-track-secret now sourced from OpenBao (all keys via dataFrom.extract). Replaces SOPS.
# Value-preserving: the CNPG bootstrap secret is used once at initdb, so the running DB is unaffected.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: dependency-track-secret, namespace: security}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: dependency-track-secret, creationPolicy: Owner}
  dataFrom:
    - extract: {key: dependency-track/db}
