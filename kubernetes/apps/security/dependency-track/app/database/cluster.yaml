---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: dependency-track-db
  namespace: security
spec:
  instances: 1
  inheritedMetadata:
    annotations:
      reloader.stakater.com/auto: "true"
  storage:
    size: 30Gi
    storageClass: longhorn
  walStorage:
    # Heavy WAL writer (SBOM ingestion). A past Garage outage left a >10Gi WAL
    # backlog in the data volume; CNPG could not migrate it into a 10Gi wal vol,
    # crashlooping before Postgres started. Sized to hold the full backlog so the
    # move completes, then archiving to Garage drains it and WAL recycles down.
    size: 30Gi
    storageClass: longhorn
  postgresql:
    parameters:
      # Tier 3, heavy WAL writer (SBOM ingestion). Compress WAL FPIs and widen
      # checkpoints; the 30Gi WAL PVC has headroom for a larger max_wal_size.
      # See docs/techdocs/docs/database-backup-tiers.md
      wal_compression: "zstd"
      max_wal_size: "4GB"
      checkpoint_timeout: "15min"
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: dependency-track-db-store
        serverName: dependency-track-db
  bootstrap:
    initdb:
      database: dependencytrack
      owner: dependencytrack
      secret:
        name: dependency-track-secret
