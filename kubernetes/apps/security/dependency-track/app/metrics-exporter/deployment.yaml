---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dependency-track-metrics-exporter
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dependency-track-metrics-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dependency-track-metrics-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      nodeSelector:
        node.webgrip.io/pool: worker
      tolerations:
        - key: dedicated
          operator: Equal
          value: fringe
          effect: NoSchedule
      containers:
        - name: exporter
          image: docker.io/python:3.14-slim@sha256:c845af9399020c7e562969a13689e929074a10fd057acd1b1fad06a2fb068e97
          command:
            - python3
            - /app/exporter.py
          env:
            - name: DT_API_URL
              value: "http://dependency-track-api-server.security.svc.cluster.local:8080"
            - name: SCRAPE_INTERVAL
              value: "300"
            - name: PORT
              value: "9090"
          ports:
            - containerPort: 9090
              name: metrics
          volumeMounts:
            - name: script
              mountPath: /app
            - name: api-key
              mountPath: /secrets
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: script
          configMap:
            name: dependency-track-metrics-exporter
            defaultMode: 0755
        - name: api-key
          secret:
            secretName: dependency-track-api-key
