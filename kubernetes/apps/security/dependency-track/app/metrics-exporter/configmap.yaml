---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dependency-track-metrics-exporter
  namespace: security
data:
  exporter.py: |-
    #!/usr/bin/env python3
    """Prometheus metrics exporter for Dependency-Track portfolio metrics."""
    import json
    import os
    import time
    import urllib.request
    import urllib.error
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from threading import Lock, Thread

    API_URL = os.environ["DT_API_URL"].rstrip("/")
    API_KEY = open("/secrets/api-key").read().strip()
    SCRAPE_INTERVAL = int(os.environ.get("SCRAPE_INTERVAL", "300"))
    PORT = int(os.environ.get("PORT", "9090"))

    _cache = {"data": None, "error": None, "timestamp": 0}
    _lock = Lock()

    def fetch_metrics():
        req = urllib.request.Request(
            f"{API_URL}/api/v1/metrics/portfolio/current",
            headers={"X-Api-Key": API_KEY},
        )
        with urllib.request.urlopen(req, timeout=30) as resp:
            return json.loads(resp.read())

    def refresh_loop():
        while True:
            try:
                data = fetch_metrics()
                with _lock:
                    _cache["data"] = data
                    _cache["error"] = None
                    _cache["timestamp"] = time.time()
            except Exception as e:
                with _lock:
                    _cache["error"] = str(e)
            time.sleep(SCRAPE_INTERVAL)

    def render_metrics(data):
        lines = [
            "# HELP dt_portfolio_vulnerabilities Total vulnerabilities in portfolio by severity",
            "# TYPE dt_portfolio_vulnerabilities gauge",
            f'dt_portfolio_vulnerabilities{{severity="critical"}} {data["critical"]}',
            f'dt_portfolio_vulnerabilities{{severity="high"}} {data["high"]}',
            f'dt_portfolio_vulnerabilities{{severity="medium"}} {data["medium"]}',
            f'dt_portfolio_vulnerabilities{{severity="low"}} {data["low"]}',
            f'dt_portfolio_vulnerabilities{{severity="unassigned"}} {data["unassigned"]}',
            "",
            "# HELP dt_portfolio_vulnerabilities_total Total unique vulnerability identifiers",
            "# TYPE dt_portfolio_vulnerabilities_total gauge",
            f'dt_portfolio_vulnerabilities_total {data["vulnerabilities"]}',
            "",
            "# HELP dt_portfolio_policy_violations Policy violations in portfolio",
            "# TYPE dt_portfolio_policy_violations gauge",
            f'dt_portfolio_policy_violations{{state="fail"}} {data["policyViolationsFail"]}',
            f'dt_portfolio_policy_violations{{state="warn"}} {data["policyViolationsWarn"]}',
            f'dt_portfolio_policy_violations{{state="info"}} {data["policyViolationsInfo"]}',
            f'dt_portfolio_policy_violations{{state="total"}} {data["policyViolationsTotal"]}',
            f'dt_portfolio_policy_violations{{state="audited"}} {data["policyViolationsAudited"]}',
            f'dt_portfolio_policy_violations{{state="unaudited"}} {data["policyViolationsUnaudited"]}',
            "",
            "# HELP dt_portfolio_policy_violations_by_category Policy violations broken down by category",
            "# TYPE dt_portfolio_policy_violations_by_category gauge",
            f'dt_portfolio_policy_violations_by_category{{category="security",state="total"}} {data["policyViolationsSecurityTotal"]}',
            f'dt_portfolio_policy_violations_by_category{{category="security",state="audited"}} {data["policyViolationsSecurityAudited"]}',
            f'dt_portfolio_policy_violations_by_category{{category="security",state="unaudited"}} {data["policyViolationsSecurityUnaudited"]}',
            f'dt_portfolio_policy_violations_by_category{{category="license",state="total"}} {data["policyViolationsLicenseTotal"]}',
            f'dt_portfolio_policy_violations_by_category{{category="license",state="audited"}} {data["policyViolationsLicenseAudited"]}',
            f'dt_portfolio_policy_violations_by_category{{category="license",state="unaudited"}} {data["policyViolationsLicenseUnaudited"]}',
            f'dt_portfolio_policy_violations_by_category{{category="operational",state="total"}} {data["policyViolationsOperationalTotal"]}',
            f'dt_portfolio_policy_violations_by_category{{category="operational",state="audited"}} {data["policyViolationsOperationalAudited"]}',
            f'dt_portfolio_policy_violations_by_category{{category="operational",state="unaudited"}} {data["policyViolationsOperationalUnaudited"]}',
            "",
            "# HELP dt_portfolio_projects Total projects in portfolio",
            "# TYPE dt_portfolio_projects gauge",
            f'dt_portfolio_projects{{state="total"}} {data["projects"]}',
            f'dt_portfolio_projects{{state="vulnerable"}} {data["vulnerableProjects"]}',
            "",
            "# HELP dt_portfolio_components Total components in portfolio",
            "# TYPE dt_portfolio_components gauge",
            f'dt_portfolio_components{{state="total"}} {data["components"]}',
            f'dt_portfolio_components{{state="vulnerable"}} {data["vulnerableComponents"]}',
            f'dt_portfolio_components{{state="suppressed"}} {data["suppressed"]}',
            "",
            "# HELP dt_portfolio_findings Findings in portfolio",
            "# TYPE dt_portfolio_findings gauge",
            f'dt_portfolio_findings{{state="total"}} {data["findingsTotal"]}',
            f'dt_portfolio_findings{{state="audited"}} {data["findingsAudited"]}',
            f'dt_portfolio_findings{{state="unaudited"}} {data["findingsUnaudited"]}',
            "",
            "# HELP dt_portfolio_risk_score Portfolio inherited risk score",
            "# TYPE dt_portfolio_risk_score gauge",
            f'dt_portfolio_risk_score {data["inheritedRiskScore"]}',
            "",
            "# HELP dt_exporter_last_scrape_timestamp Unix timestamp of last successful DT scrape",
            "# TYPE dt_exporter_last_scrape_timestamp gauge",
            f'dt_exporter_last_scrape_timestamp {_cache["timestamp"]}',
        ]
        return "\n".join(lines) + "\n"

    class Handler(BaseHTTPRequestHandler):
        def log_message(self, *args):
            pass

        def do_GET(self):
            if self.path not in ("/metrics", "/"):
                self.send_response(404)
                self.end_headers()
                return
            with _lock:
                data, error = _cache["data"], _cache["error"]
            if error and not data:
                body = f"# ERROR fetching DT metrics: {error}\n"
                self.send_response(503)
            elif not data:
                body = "# Waiting for first scrape...\n"
                self.send_response(200)
            else:
                try:
                    body = render_metrics(data)
                    self.send_response(200)
                except Exception as e:
                    body = f"# ERROR rendering metrics: {e}\n"
                    self.send_response(500)
            self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
            self.end_headers()
            self.wfile.write(body.encode())

    if __name__ == "__main__":
        Thread(target=refresh_loop, daemon=True).start()
        print(f"Listening on :{PORT}")
        HTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
