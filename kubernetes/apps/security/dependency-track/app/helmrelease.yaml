---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dependency-track
spec:
  chart:
    spec:
      chart: dependency-track
      version: 1.0.0
      sourceRef:
        kind: HelmRepository
        name: dependency-track
        namespace: security
  interval: 1h
  # Generous timeout: switching the api-server to a StatefulSet gives it a fresh
  # /data, so first boot re-mirrors the NVD/OSV vuln DB. Don't let a slow-but-fine
  # startup get rolled back by the root-injected remediateLastFailure.
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  # No postRenderers: api-server + frontend are pinned to the worker pool via the
  # chart's native nodeSelector (in values below). A post-render affinity patch was
  # the cause of the prior pin's rollback loop (helm-controller "context deadline
  # exceeded" on the slow soyo API) — reverted in 2db5b15. Native values apply
  # cleanly. ADR-0002.
  values:
    common:
      fullnameOverride: dependency-track
      secretKey:
        createSecret: false
        existingSecretName: dependency-track-secret

    apiServer:
      # StatefulSet (the chart default), NOT Deployment: an ordered recreate frees
      # the RWO /data volume cleanly when relocating to a worker — a Deployment's
      # RollingUpdate deadlocks on Multi-Attach. The StatefulSet uses a `data`
      # volumeClaimTemplate, so /data is recreated fresh (rebuildable NVD/OSV mirror
      # cache; the encryption secret.key lives in dependency-track-secret, not /data).
      deploymentType: StatefulSet
      # Hard-pin off the soyo etcd nodes (ADR-0002). On 2026-06-21 the co-located DB
      # starved etcd into a leader election; keep DT's compute off the control-plane.
      nodeSelector:
        node.webgrip.io/pool: worker
      resources:
        requests:
          # Measured 1m CPU at idle (2026-07-18) while booking 500m — that padding
          # took worker-1 to 99% CPU-requests and blocked the VIK-331 fringe
          # evacuation (vmsingle/litellm/valkey Pending on "Insufficient cpu").
          # The 2-CPU limit below still covers scan bursts; requests are the
          # reservation, not the ceiling.
          cpu: 100m
          # Idles ~420Mi; request trimmed from 1Gi. JVM heap capped below (-Xmx1g)
          # so actual stays ~1.2Gi under the 2Gi limit instead of creeping up.
          memory: 768Mi
        limits:
          cpu: "2"
          memory: 2Gi
      persistentVolume:
        enabled: true
        className: longhorn
        size: 10Gi
      serviceMonitor:
        enabled: true
        namespace: observability
        labels:
          release: kube-prometheus-stack
      extraEnv:
        # Cap the JVM heap so actual memory is bounded (it auto-sizes to ~50% of the
        # 2Gi limit otherwise). 1g is ~2.4x the idle footprint — ample for BOM analysis.
        - name: EXTRA_JAVA_OPTIONS
          value: "-Xmx1g"
        - name: ALPINE_DATABASE_MODE
          value: external
        - name: ALPINE_DATABASE_URL
          value: jdbc:postgresql://dependency-track-db-rw.security.svc.cluster.local:5432/dependencytrack
        - name: ALPINE_DATABASE_DRIVER
          value: org.postgresql.Driver
        - name: ALPINE_DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: dependency-track-secret
              key: username
        - name: ALPINE_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dependency-track-secret
              key: password

    frontend:
      apiBaseUrl: https://dependency-track.${SECRET_DOMAIN}
      nodeSelector:
        node.webgrip.io/pool: worker
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi

    httpRoute:
      enabled: true
      hostnames:
        - dependency-track.${SECRET_DOMAIN}
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: https
