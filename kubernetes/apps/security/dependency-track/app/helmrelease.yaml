---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dependency-track
spec:
  chart:
    spec:
      chart: dependency-track
      version: 1.0.0
      sourceRef:
        kind: HelmRepository
        name: dependency-track
        namespace: security
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  # The dependency-track@1.0.0 chart exposes nodeSelector/tolerations but NOT
  # affinity, so we inject the hard worker-pool nodeAffinity (ADR-0028) via a
  # post-render patch: runs only on workers, Pending if both workers are down.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: "dependency-track-(api-?server|frontend)"
            patch: |
              - op: add
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: node.webgrip.io/pool
                              operator: In
                              values:
                                - worker
          # api-server has a RWO Longhorn PVC; RollingUpdate deadlocks on
          # rollout (old pod holds the volume, new pod can't multi-attach).
          # Recreate = terminate-then-start, so the volume detaches first.
          - target:
              kind: Deployment
              name: "dependency-track-api-server"
            patch: |
              - op: add
                path: /spec/strategy
                value:
                  type: Recreate
  values:
    common:
      fullnameOverride: dependency-track
      secretKey:
        createSecret: false
        existingSecretName: dependency-track-secret

    apiServer:
      deploymentType: Deployment
      resources:
        requests:
          cpu: 500m
          # Idles ~420Mi; request trimmed from 1Gi. JVM heap capped below (-Xmx1g)
          # so actual stays ~1.2Gi under the 2Gi limit instead of creeping up.
          memory: 768Mi
        limits:
          cpu: "2"
          memory: 2Gi
      persistentVolume:
        enabled: true
        className: longhorn
        size: 10Gi
      serviceMonitor:
        enabled: true
        namespace: observability
        labels:
          release: kube-prometheus-stack
      extraEnv:
        # Cap the JVM heap so actual memory is bounded (it auto-sizes to ~50% of the
        # 2Gi limit otherwise). 1g is ~2.4x the idle footprint — ample for BOM analysis.
        - name: EXTRA_JAVA_OPTIONS
          value: "-Xmx1g"
        - name: ALPINE_DATABASE_MODE
          value: external
        - name: ALPINE_DATABASE_URL
          value: jdbc:postgresql://dependency-track-db-rw.security.svc.cluster.local:5432/dependencytrack
        - name: ALPINE_DATABASE_DRIVER
          value: org.postgresql.Driver
        - name: ALPINE_DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: dependency-track-secret
              key: username
        - name: ALPINE_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dependency-track-secret
              key: password

    frontend:
      apiBaseUrl: https://dependency-track.${SECRET_DOMAIN}
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi

    httpRoute:
      enabled: true
      hostnames:
        - dependency-track.${SECRET_DOMAIN}
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: https
