---
# Migration phase 1 (seed): dependency-track-api-key -> OpenBao secret/dependency-track/api-key.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: dependency-track-api-key
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: dependency-track-api-key
  data:
    - match: {secretKey: api-key, remoteRef: {remoteKey: dependency-track/api-key, property: api-key}}
