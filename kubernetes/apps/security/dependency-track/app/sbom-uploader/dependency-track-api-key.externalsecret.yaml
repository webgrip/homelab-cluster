---
# dependency-track-api-key now sourced from OpenBao. Replaces secret.sops.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dependency-track-api-key
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: dependency-track-api-key, creationPolicy: Owner}
  data:
    - secretKey: api-key
      remoteRef: {key: dependency-track/api-key, property: api-key}
