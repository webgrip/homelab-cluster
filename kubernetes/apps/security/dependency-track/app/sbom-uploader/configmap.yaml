---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-sbom-uploader-scripts
  namespace: security
data:
  get-images.sh: |
    #!/bin/sh
    set -e
    echo "[init] Listing all running container images across cluster..."

    kubectl get pods -A -o json 2>/tmp/kubectl-err.txt \
      | grep '"image":' \
      | sed 's/.*"image": *"//; s/".*//' \
      | sort -u \
      | grep -v '^$' > /work/images.txt

    if [ ! -s /work/images.txt ]; then
      ERR=$(cat /tmp/kubectl-err.txt 2>/dev/null | head -1)
      echo "[init] ERROR: images.txt is empty. kubectl stderr: $${ERR}"
      exit 1
    fi

    COUNT=$(wc -l < /work/images.txt | tr -d ' \t')
    echo "[init] Found $${COUNT} unique images"

  upload.sh: |-
    #!/bin/sh
    # No set -e: batch script must not abort on individual scan/upload failures

    if ! command -v curl >/dev/null 2>&1; then
      echo "[setup] Installing curl..."
      apk add --no-cache curl >/dev/null 2>&1
    fi

    if ! command -v mc >/dev/null 2>&1; then
      echo "[setup] Installing mc..."
      apk add --no-cache mc >/dev/null 2>&1
    fi

    GUAC_S3_ENABLED=0
    if [ -n "$${S3_ENDPOINT}" ] && [ -n "$${S3_ACCESS_KEY_ID}" ] && [ -n "$${S3_GUAC_BUCKET}" ]; then
      mc alias set guac-s3 "$${S3_ENDPOINT}" "$${S3_ACCESS_KEY_ID}" "$${S3_SECRET_ACCESS_KEY}" >/dev/null 2>&1
      GUAC_S3_ENABLED=1
      echo "[setup] GUAC S3 bridge enabled (bucket: $${S3_GUAC_BUCKET})"
    fi

    if [ ! -f /work/images.txt ] || [ ! -s /work/images.txt ]; then
      echo "ERROR: /work/images.txt not found or empty"
      exit 1
    fi

    UPLOADED=0
    FAILED=0
    SKIPPED=0
    TOTAL=$(wc -l < /work/images.txt | tr -d ' \t')

    echo "Starting SBOM upload for $${TOTAL} images to $${DT_URL}"
    echo ""

    while IFS= read -r image; do
      if [ -z "$image" ]; then
        continue
      fi

      # Parse name and version from image ref (busybox awk/sed, no grep -P)
      IMAGE_NO_DIGEST=$(echo "$image" | cut -d@ -f1)
      FIRST_SEG=$(echo "$${IMAGE_NO_DIGEST}" | cut -d/ -f1)
      if echo "$${FIRST_SEG}" | grep -qE '\.|:'; then
        IMAGE_PATH=$(echo "$${IMAGE_NO_DIGEST}" | cut -d/ -f2-)
      else
        IMAGE_PATH=$${IMAGE_NO_DIGEST}
      fi
      PROJECT_NAME=$(echo "$${IMAGE_PATH}" | cut -d: -f1)
      PROJECT_VERSION=$(echo "$${IMAGE_PATH}" | awk -F: '{if (NF>1) print $NF; else print "latest"}')
      if [ -z "$${PROJECT_VERSION}" ]; then
        PROJECT_VERSION="latest"
      fi

      echo "--- [$${PROJECT_NAME}:$${PROJECT_VERSION}]"

      # Generate CycloneDX SBOM via trivy
      trivy image \
        --format cyclonedx \
        --quiet \
        --no-progress \
        --timeout 3m \
        --output /work/sbom.json \
        "$image" 2>/tmp/trivy-err.txt
      TRIVY_RC=$?

      if [ $${TRIVY_RC} -ne 0 ]; then
        ERR=$(head -1 /tmp/trivy-err.txt 2>/dev/null)
        echo "    SCAN FAILED (rc=$${TRIVY_RC}): $${ERR}"
        FAILED=$$(($${FAILED} + 1))
        continue
      fi

      if [ ! -s /work/sbom.json ]; then
        echo "    SKIPPED: empty SBOM output"
        SKIPPED=$$(($${SKIPPED} + 1))
        continue
      fi

      # Upload to Dependency Track via multipart POST
      HTTP_CODE=$(curl -sf \
        -X POST "$${DT_URL}/api/v1/bom" \
        -H "X-Api-Key: $${DT_API_KEY}" \
        -F "autoCreate=true" \
        -F "projectName=$${PROJECT_NAME}" \
        -F "projectVersion=$${PROJECT_VERSION}" \
        -F "bom=@/work/sbom.json;type=application/json" \
        -w "%{http_code}" -o /tmp/dt-resp.txt 2>&1)
      CURL_RC=$?

      if [ $${CURL_RC} -ne 0 ] || [ -z "$${HTTP_CODE}" ]; then
        echo "    UPLOAD FAILED: curl error $${CURL_RC}"
        FAILED=$$(($${FAILED} + 1))
      else
        case "$${HTTP_CODE}" in
          20*)
            echo "    UPLOADED: HTTP $${HTTP_CODE}"
            UPLOADED=$$(($${UPLOADED} + 1))
            if [ $${GUAC_S3_ENABLED} -eq 1 ]; then
              SAFE_NAME=$(echo "$${PROJECT_NAME}" | tr '/' '-')
              S3_KEY="sboms/$${SAFE_NAME}-$${PROJECT_VERSION}.cdx.json"
              mc cp --quiet /work/sbom.json "guac-s3/$${S3_GUAC_BUCKET}/$${S3_KEY}" >/dev/null 2>&1 \
                && echo "    GUAC-S3: queued" \
                || echo "    GUAC-S3: upload failed (non-blocking)"
            fi
            ;;
          *)
            BODY=$(head -1 /tmp/dt-resp.txt 2>/dev/null)
            echo "    UPLOAD FAILED: HTTP $${HTTP_CODE} — $${BODY}"
            FAILED=$$(($${FAILED} + 1))
            ;;
        esac
      fi

    done < /work/images.txt

    echo ""
    echo "=== Done: $${UPLOADED} uploaded, $${FAILED} failed, $${SKIPPED} skipped (of $${TOTAL} total) ==="
