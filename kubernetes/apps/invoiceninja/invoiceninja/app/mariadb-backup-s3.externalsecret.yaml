---
# Garage S3 credentials for the MariaDB logical-backup CronJob.
# Reuses the existing OpenBao s3/cnpg-backup material (same Garage bucket); the
# dump is written under a dedicated invoiceninja-mariadb/ prefix.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: invoiceninja-backup-s3
  namespace: invoiceninja
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: invoiceninja-backup-s3, creationPolicy: Owner}
  data:
    - {secretKey: S3_ACCESS_KEY_ID, remoteRef: {key: s3/cnpg-backup, property: S3_ACCESS_KEY_ID}}
    - {secretKey: S3_SECRET_ACCESS_KEY, remoteRef: {key: s3/cnpg-backup, property: S3_SECRET_ACCESS_KEY}}
    - {secretKey: S3_REGION, remoteRef: {key: s3/cnpg-backup, property: S3_REGION}}
    - {secretKey: S3_ENDPOINT, remoteRef: {key: s3/cnpg-backup, property: S3_ENDPOINT}}
    - {secretKey: S3_BUCKET, remoteRef: {key: s3/cnpg-backup, property: S3_BUCKET}}
