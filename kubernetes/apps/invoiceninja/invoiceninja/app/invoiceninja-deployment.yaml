---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoiceninja
  namespace: invoiceninja
spec:
  replicas: 1
  selector:
    matchLabels:
      app: invoiceninja
  # Recreate: RWO longhorn-general volume → a RollingUpdate move/restart deadlocks
  # on Multi-Attach (ADR-0028). Terminate-then-start frees the volume first.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: invoiceninja
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      nodeSelector:
        node.webgrip.io/pool: worker
      tolerations:
        - key: dedicated
          operator: Equal
          value: fringe
          effect: NoSchedule
      volumes:
        - name: app-data
          emptyDir: {}
        - name: nginx-conf
          configMap:
            name: invoiceninja-nginx
            items:
              - key: default.conf
                path: default.conf
        - name: storage
          persistentVolumeClaim:
            claimName: invoiceninja-storage
        - name: supervisor-conf
          configMap:
            name: invoiceninja-supervisor
            items:
              - key: supervisord.conf
                path: supervisord.conf
      initContainers:
        - name: prepare-storage
          image: docker.io/library/busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command:
            - sh
            - -c
            - |
              mkdir -p \
                /storage/storage/app/public \
                /storage/logo;
              chown -R 1500:1500 /storage;
          volumeMounts:
            - name: storage
              mountPath: /storage
        - name: copy-app
          image: docker.io/invoiceninja/invoiceninja:5.13.22@sha256:219b0f2092aa4df1d2c6d428aa9c6ed1d772165ee604b5c6e4735fb9e59f805c
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -c
            - >
              set -eu;
              cp -a /var/www/app/. /mnt/app;
              rm -rf /mnt/app/public/storage;
              ln -s ../storage/app/public /mnt/app/public/storage;
              chown -R 1500:1500 /mnt/app;
          volumeMounts:
            - name: app-data
              mountPath: /mnt/app
            - name: storage
              mountPath: /var/www/app/storage
      containers:
        - name: app
          image: docker.io/invoiceninja/invoiceninja:5.13.22@sha256:219b0f2092aa4df1d2c6d428aa9c6ed1d772165ee604b5c6e4735fb9e59f805c
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: invoiceninja-config
            - secretRef:
                name: invoiceninja-secrets
          env:
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: invoiceninja-secrets
                  key: MARIADB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: invoiceninja-secrets
                  key: MARIADB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: invoiceninja-secrets
                  key: DB_PASSWORD
            - name: IN_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: invoiceninja-secrets
                  key: IN_USER_EMAIL
            - name: IN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: invoiceninja-secrets
                  key: IN_USER_PASSWORD
          ports:
            - name: fpm
              containerPort: 9000
          volumeMounts:
            - name: app-data
              mountPath: /var/www/app
            - name: storage
              mountPath: /var/www/app/storage
              subPath: storage
            - name: storage
              mountPath: /var/www/app/public/logo
              subPath: logo
            - name: supervisor-conf
              mountPath: /etc/supervisord.conf
              subPath: supervisord.conf
              readOnly: true
          resources:
            requests:
              cpu: 75m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi

        - name: scheduler
          image: docker.io/invoiceninja/invoiceninja:5.13.22@sha256:219b0f2092aa4df1d2c6d428aa9c6ed1d772165ee604b5c6e4735fb9e59f805c
          imagePullPolicy: IfNotPresent
          workingDir: /var/www/app
          command:
            - php
            - artisan
            - schedule:work
          envFrom:
            - configMapRef:
                name: invoiceninja-config
            - secretRef:
                name: invoiceninja-secrets
          env:
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: invoiceninja-secrets
                  key: MARIADB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: invoiceninja-secrets
                  key: MARIADB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: invoiceninja-secrets
                  key: DB_PASSWORD
            - name: IN_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: invoiceninja-secrets
                  key: IN_USER_EMAIL
            - name: IN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: invoiceninja-secrets
                  key: IN_USER_PASSWORD
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: app-data
              mountPath: /var/www/app
            - name: storage
              mountPath: /var/www/app/storage
              subPath: storage
          resources:
            requests:
              cpu: 40m
              memory: 256Mi
            limits:
              memory: 1Gi

        - name: web
          image: docker.io/nginxinc/nginx-unprivileged:1.31.1-alpine@sha256:8122337ed6c475bb486bc9340da453d4599f225e6b920ff0d92ca2267486b9b5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: app-data
              mountPath: /var/www/app
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: storage
              mountPath: /var/www/app/storage
              subPath: storage
              readOnly: true
            - name: storage
              mountPath: /var/www/app/public/logo
              subPath: logo
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
