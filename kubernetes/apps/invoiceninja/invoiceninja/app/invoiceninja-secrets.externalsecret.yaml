---
# invoiceninja-secrets now sourced from OpenBao (all keys via dataFrom.extract). Replaces SOPS.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: invoiceninja-secrets, namespace: invoiceninja}
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: invoiceninja-secrets, creationPolicy: Owner}
  dataFrom:
    - extract: {key: invoiceninja/app}
