---
# Migration phase 5 (seed): invoiceninja-secrets (at-rest APP_KEY + MariaDB creds) -> OpenBao.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata: {name: invoiceninja-secrets, namespace: invoiceninja}
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: invoiceninja-secrets}}
  data:
    - match: {secretKey: APP_KEY, remoteRef: {remoteKey: invoiceninja/app, property: APP_KEY}}
    - match: {secretKey: DB_PASSWORD, remoteRef: {remoteKey: invoiceninja/app, property: DB_PASSWORD}}
    - match: {secretKey: IN_USER_EMAIL, remoteRef: {remoteKey: invoiceninja/app, property: IN_USER_EMAIL}}
    - match: {secretKey: IN_USER_PASSWORD, remoteRef: {remoteKey: invoiceninja/app, property: IN_USER_PASSWORD}}
    - match: {secretKey: MAIL_ENCRYPTION, remoteRef: {remoteKey: invoiceninja/app, property: MAIL_ENCRYPTION}}
    - match: {secretKey: MAIL_FROM_ADDRESS, remoteRef: {remoteKey: invoiceninja/app, property: MAIL_FROM_ADDRESS}}
    - match: {secretKey: MAIL_FROM_NAME, remoteRef: {remoteKey: invoiceninja/app, property: MAIL_FROM_NAME}}
    - match: {secretKey: MAIL_HOST, remoteRef: {remoteKey: invoiceninja/app, property: MAIL_HOST}}
    - match: {secretKey: MAIL_MAILER, remoteRef: {remoteKey: invoiceninja/app, property: MAIL_MAILER}}
    - match: {secretKey: MAIL_PASSWORD, remoteRef: {remoteKey: invoiceninja/app, property: MAIL_PASSWORD}}
    - match: {secretKey: MAIL_PORT, remoteRef: {remoteKey: invoiceninja/app, property: MAIL_PORT}}
    - match: {secretKey: MAIL_USERNAME, remoteRef: {remoteKey: invoiceninja/app, property: MAIL_USERNAME}}
    - match: {secretKey: MARIADB_DATABASE, remoteRef: {remoteKey: invoiceninja/app, property: MARIADB_DATABASE}}
    - match: {secretKey: MARIADB_PASSWORD, remoteRef: {remoteKey: invoiceninja/app, property: MARIADB_PASSWORD}}
    - match: {secretKey: MARIADB_ROOT_PASSWORD, remoteRef: {remoteKey: invoiceninja/app, property: MARIADB_ROOT_PASSWORD}}
    - match: {secretKey: MARIADB_USER, remoteRef: {remoteKey: invoiceninja/app, property: MARIADB_USER}}
