---
# Zero-trust for invoiceninja (W7). default-deny + allow-dns generated.
# invoiceninja (app:8080 + mariadb:3306, externally exposed) needs intra-namespace
# (app -> mariadb), and internet egress for email/payment/license calls and the
# nightly mariadb-backup CronJob's upload to Garage S3. Not CNPG, so no
# kube-apiserver egress is needed. Cross-namespace cluster lateral stays blocked.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: invoiceninja-allow-ingress
  labels:
    app.kubernetes.io/part-of: invoiceninja
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: invoiceninja
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
        - ipBlock:
            cidr: 127.0.0.0/8
        - ipBlock:
            cidr: fd00::/8
        - ipBlock:
            cidr: ::1/128
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: invoiceninja-allow-egress
  labels:
    app.kubernetes.io/part-of: invoiceninja
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: invoiceninja
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.42.0.0/16
              - 10.43.0.0/16
