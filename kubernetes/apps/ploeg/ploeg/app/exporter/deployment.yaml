---
# postgres-exporter over ploegd's own dispatch DB — the Prometheus metrics path
# ploegd itself lacks (ADR-0048; :8080 exposes no /metrics). Standalone because
# ploegd is an external chart we cannot sidecar into (unlike the litellm sidecar).
# Reads via the existing read-only `ploeg_scaler` role (pg_read_all_data). Same
# quay image + digest the litellm exporter already runs (proven pullable). Fully
# hardened (non-root, read-only rootfs, drop-all) so it needs no PSA exception;
# the quay registry is waived audit-only in exception-third-party-images.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ploeg-work-items-exporter
  labels:
    app.kubernetes.io/name: ploeg-work-items-exporter
    app.kubernetes.io/part-of: ploeg
  annotations:
    # Roll the pod when ploeg-exporter-queries changes — postgres-exporter reads
    # queries.yaml only at startup, so a query edit needs a restart to take effect.
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ploeg-work-items-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ploeg-work-items-exporter
        app.kubernetes.io/part-of: ploeg
    spec:
      # Off the soyo control planes, onto the worker pool (ADR-0002).
      nodeSelector:
        node.webgrip.io/pool: worker
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.20.1@sha256:ac5ec343104fae0e2d84a27bb8d69b38430a11910c5382cad85d478d2bab713e
          args:
            # The app/scaler user lacks pg_monitor (pg_ls_waldir); we only want
            # the custom ploeg_* queries anyway. Silence the wal collector.
            - "--no-collector.wal"
          env:
            - name: DATA_SOURCE_URI
              value: ploeg-db-rw.ploeg.svc.cluster.local:5432/app?sslmode=require
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: ploeg-scaler
                  key: username
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: ploeg-scaler
                  key: password
            - name: PG_EXPORTER_EXTEND_QUERY_PATH
              value: /etc/pg-exporter/queries.yaml
            - name: PG_EXPORTER_DISABLE_DEFAULT_METRICS
              value: "true"
            - name: PG_EXPORTER_DISABLE_SETTINGS_METRICS
              value: "true"
          ports:
            - name: metrics
              containerPort: 9187
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 96Mi
          volumeMounts:
            - name: queries
              mountPath: /etc/pg-exporter
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 9187
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 9187
            initialDelaySeconds: 20
            periodSeconds: 30
      volumes:
        - name: queries
          configMap:
            name: ploeg-exporter-queries
