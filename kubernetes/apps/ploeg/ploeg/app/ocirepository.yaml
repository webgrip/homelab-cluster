---
# Ploeg's first-party chart from the PRIVATE harbor.webgrip.dev/webgrip project.
# Renovate maintains tag+digest (regex manager + update-oci-digests.sh); the
# digest is added on the first Renovate pass after the initial publish.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: ploeg
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  url: oci://harbor.webgrip.dev/webgrip/charts/ploeg
  secretRef:
    name: harbor-pull
  ref:
    tag: 0.1.0-rc.4
    digest: sha256:0f0fde072a68c93ae7daf626311b241344cdfb9feddef987b9ad9b1bbef919cb
