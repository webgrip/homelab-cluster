---
# The LiteLLM master key, replicated from OpenBao into the ploeg namespace for
# the OpenHands worker Jobs. Injected only into worker pods, where the
# agent-runner entrypoint mints a per-run, budget-capped, model-scoped key and
# revokes it on exit (ADR-0044/ADR-0048). Longer term this should be a
# budget-capped minter key rather than the true master key (tech-debt 282).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-litellm-master
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target:
    name: agent-litellm-master
    creationPolicy: Owner
  data:
    - {secretKey: LITELLM_MASTER_KEY, remoteRef: {key: litellm, property: LITELLM_MASTER_KEY}}
