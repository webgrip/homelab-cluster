---
# The agent-builder bot token (minted by forgejo-actions-secrets'
# agent-builder-provisioner, seeded to OpenBao by its PushSecret). The
# OpenHands worker clones, pushes branches, and opens PRs as this role
# identity; per-run attribution is the LiteLLM trace id in commit trailers.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-builder-token
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target:
    name: agent-builder-token
    creationPolicy: Owner
  data:
    - {secretKey: FORGEJO_TOKEN, remoteRef: {key: forgejo/agent-builder, property: FORGEJO_TOKEN}}
