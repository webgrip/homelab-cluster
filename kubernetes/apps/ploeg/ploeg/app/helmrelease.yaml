---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ploeg
spec:
  chartRef:
    kind: OCIRepository
    name: ploeg
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  # Image tag defaults to the chart's appVersion (semantic-release-helm3 keeps
  # both in lockstep), so the OCIRepository ref is the single version knob.
  values:
    imagePullSecrets:
      - name: harbor-pull
    env:
      PLOEG_DEFAULT_TEAM: bronze
      PLOEG_LEASE_TTL: 15m
      # Assignee-username -> team routing (ploegd parseTeamMap). One Vikunja
      # user per team: assign a ticket to user `silver` to dispatch the silver
      # team; unmapped assignees fall back to PLOEG_DEFAULT_TEAM.
      PLOEG_TEAM_MAP: "bronze=bronze,silver=silver"
    executor:
      enabled: true
      scaler:
        # The KEDA operator resolves this hostname from the keda namespace,
        # so the chart's short in-namespace default never resolves there.
        host: ploeg-db-rw.ploeg.svc.cluster.local
      teams:
        # bronze: cheapest model, $2/run budget. Target repo pinned per team
        # in v0 (repo-from-ticket mapping is a follow-up); erfbeeld is the
        # proven agent-run target (AGENTS.md + team-bronze skill in-repo) and
        # the worker only ever opens PRs, never merges.
        - name: bronze
          model: litellm_proxy/deepseek-chat
          budget: "2"
          repoOwner: webgrip
          repoName: erfbeeld
          maxReplicaCount: 1
        # silver: the ploeg-repo team — the factory working on its own
        # dispatch plane (first job: the per-run key leak, VIK ticket).
        # sonnet-5 at $4/run: real Go surgery, inside the anthropic
        # 5 USD/day router cap (falls back to deepseek-chat if it trips).
        - name: silver
          model: litellm_proxy/claude-sonnet-5
          budget: "4"
          repoOwner: webgrip
          repoName: ploeg
          maxReplicaCount: 1
