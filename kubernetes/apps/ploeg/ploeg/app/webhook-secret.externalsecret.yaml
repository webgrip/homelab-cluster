---
# The Vikunja webhook HMAC secret (raw-body HMAC-SHA256, X-Vikunja-Signature).
# Generated in-cluster, generate-once + Retain: the SAME value must be entered
# on the Vikunja project webhook (manual step, see the deploy PR) — rotating it
# means updating the webhook too, so rotation is deliberate (delete the Secret
# to re-generate).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ploeg-webhook-secret
spec:
  refreshInterval: "0" # generate once
  target:
    name: ploeg-webhook-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator
      rewrite:
        - regexp: {source: "password", target: "PLOEG_VIKUNJA_SECRET"}
