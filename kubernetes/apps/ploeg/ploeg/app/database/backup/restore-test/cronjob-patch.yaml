---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cnpg-restore-test
spec:
  # Disabled: matches the other tier-2 DBs (restore drills cause significant
  # storage/control-plane load). Flip suspend to false to re-enable.
  suspend: true
  schedule: "0 6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: restore-test
              env:
                - name: SOURCE_CLUSTER
                  value: ploeg-db
                - name: RESTORE_CLUSTER
                  value: ploeg-db-restore
                - name: EXPECTED_DATABASE
                  value: app
                - name: EXPECTED_ROLE
                  value: app
                - name: BARMAN_OBJECT_NAME
                  value: ploeg-db-store
