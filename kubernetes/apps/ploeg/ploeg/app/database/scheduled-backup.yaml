---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: ploeg-db-daily
  namespace: ploeg
spec:
  # 6-field cron, staggered across apps (02:50 is a free slot).
  schedule: "0 50 2 * * *"
  backupOwnerReference: cluster
  immediate: true
  cluster:
    name: ploeg-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
