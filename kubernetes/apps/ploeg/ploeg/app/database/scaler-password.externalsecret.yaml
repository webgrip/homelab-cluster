---
# Read-only credential for the KEDA postgresql scaler (ScaledJob triggers poll
# the claimable-items count). Generated in-cluster, generate-once + Retain —
# CNPG managed.roles owns the password ongoing. basic-auth shape (username +
# password keys) as CNPG documents for passwordSecret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ploeg-scaler
spec:
  refreshInterval: "0" # generate once, never rotate (CNPG owns the value ongoing)
  target:
    name: ploeg-scaler
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      data:
        username: "ploeg_scaler"
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator-32
