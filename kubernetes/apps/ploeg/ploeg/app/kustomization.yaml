---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./ocirepository.yaml
  - ./harbor-pull.externalsecret.yaml
  - ./webhook-secret.externalsecret.yaml
  - ./agent-builder-token.externalsecret.yaml
  - ./agent-litellm-master.externalsecret.yaml
  - ./helmrelease.yaml
  - ./networkpolicy.yaml
  # postgres-exporter over the dispatch DB — ploeg_* metrics for the dark-factory
  # dashboards + alerts (ploegd ships no /metrics of its own). Reads via the
  # existing read-only ploeg_scaler role; observability->:9187 and exporter->db
  # egress are both already covered by the namespace's netpol.
  - ./exporter/exporter-queries.configmap.yaml
  - ./exporter/deployment.yaml
  - ./exporter/service.yaml
  - ./exporter/vmservicescrape.yaml
  # ./database is reconciled by its own Kustomization (ploeg-db in ks.yaml)
  # so the app layer can depend on a HEALTHY database, not just applied CRs.
