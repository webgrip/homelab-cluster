---
# Harbor pull auth for ploeg's first-party artifacts in the PRIVATE
# harbor.webgrip.dev/webgrip project (Helm chart + ploegd/agent-runner images).
# Same OpenBao robot credential the CI runners use (secret/harbor/robot-webgrip),
# rendered as a dockerconfigjson: consumed by the OCIRepository (secretRef) for
# the chart pull and by the pods (imagePullSecrets) for the images.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pull
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target:
    name: harbor-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"harbor.webgrip.dev":{"username":"{{ .CI_USER }}","password":"{{ .CI_TOKEN }}","auth":"{{ printf "%s:%s" .CI_USER .CI_TOKEN | b64enc }}"}}}
  data:
    - {secretKey: CI_USER, remoteRef: {key: harbor/robot-webgrip, property: CI_USER}}
    - {secretKey: CI_TOKEN, remoteRef: {key: harbor/robot-webgrip, property: CI_TOKEN}}
