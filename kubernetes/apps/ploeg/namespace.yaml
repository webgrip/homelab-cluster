---
apiVersion: v1
kind: Namespace
metadata:
  name: ploeg
  labels:
    webgrip.io/owner: platform
    webgrip.io/tier: app
    webgrip.io/exposure: internal
    # The KEDA-scaled ploeg-worker needs a privileged docker:dind sidecar
    # (same pattern as forgejo-runner, ADR-0026). PSA can only be relaxed
    # per-namespace, so enforce must be `privileged`; Kyverno's
    # pod-security-baseline-enforce (with the worker-only
    # exception-ploeg-worker PolicyException) remains the real baseline gate
    # for every other pod here. warn/audit stay `restricted`.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    # Opt into kyverno-generated default-deny (ingress+egress) + allow-dns.
    # Re-opened selectively by networkpolicy.yaml.
    kyverno.io/default-network-policies: "true"
