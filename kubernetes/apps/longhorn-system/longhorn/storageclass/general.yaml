---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-general
provisioner: driver.longhorn.io
parameters:
  dataEngine: v1
  dataLocality: disabled
  numberOfReplicas: "2"
  replicaAutoBalance: best-effort
  staleReplicaTimeout: "30"
reclaimPolicy: Delete
allowVolumeExpansion: true
# Immediate, not WaitForFirstConsumer: with dataLocality=disabled, Longhorn
# volumes are network-attached (the engine attaches over the network regardless
# of where replicas live), so WFFC's topology-aware binding has NO benefit — it
# only bakes a node-restrictive PV nodeAffinity at first bind that permanently
# excludes nodes added later (this is what locked every longhorn-general volume
# off worker-1). Existing PVs keep their baked affinity until recreated (ADR-0010
# migration to `longhorn`); new volumes attach anywhere.
volumeBindingMode: Immediate
