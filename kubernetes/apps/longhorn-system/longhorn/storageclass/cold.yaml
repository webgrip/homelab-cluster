---
# ADR-0027 COLD tier: HDD-backed (fringe's 1 TB HDD, Longhorn disk tag "cold").
# For bulk, low-IOPS volumes (backups, archives) to relieve the 236 GiB SSD.
# Single replica — only fringe has an HDD. NEVER put Postgres/WAL or hot data
# here (synchronous replica writes would run at HDD speed). Replaces the removed
# `longhorn-hdd` class (ADR-0029).
# ⚠️ INERT until the fringe HDD is wiped (it currently holds NTFS — see the
# fringe Talos patch note), formatted, mounted and tagged `cold`. Deferred to
# the supervised disk step.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-cold
provisioner: driver.longhorn.io
parameters:
  dataEngine: v1
  dataLocality: disabled
  diskSelector: "cold"
  numberOfReplicas: "1"
  replicaAutoBalance: best-effort
  staleReplicaTimeout: "30"
reclaimPolicy: Delete
allowVolumeExpansion: true
# Immediate: dataLocality=disabled → network-attached → WFFC only bakes a
# node-restrictive PV nodeAffinity for no benefit (see general.yaml).
volumeBindingMode: Immediate
