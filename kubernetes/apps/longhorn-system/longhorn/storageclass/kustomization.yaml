---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # ADR-0029 consolidated StorageClass set. `general` is the canonical 2-replica
  # SSD/default tier (it IS the "hot" tier — no separate longhorn-hot class).
  - ./general.yaml
  - ./snapshot.yaml
  - ./rwx.yaml
  # ADR-0026/0027 tier classes (inert until the matching Longhorn disk tags exist;
  # disk-tagging + soyo eviction is a separate supervised step).
  - ./cold.yaml
  - ./gitops.yaml
