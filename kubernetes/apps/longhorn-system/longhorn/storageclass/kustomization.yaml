---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # ADR-0029 consolidated StorageClass set. `general` is the canonical 2-replica
  # SSD/default tier (it IS the "hot" tier — no separate longhorn-hot class).
  - ./general.yaml
  - ./snapshot.yaml
  - ./rwx.yaml
  # ADR-0027 cold tier (inert until the fringe HDD is wiped + tagged `cold`).
  # NOTE: longhorn-gitops was RETIRED 2026-06-21 — the soyo-replica design for
  # forgejo/openbao was dropped (soyos stay Longhorn-free; DR is via external
  # Garage S3 backups + a future GitHub fallback Flux source). See ADR-0026.
  - ./cold.yaml
