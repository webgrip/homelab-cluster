---
# Cold/bulk tier pinned to the spinning 1TB HDD on fringe-workstation.
# diskSelector "hdd" => volumes of this class ONLY schedule onto Longhorn disks
# tagged "hdd". The HDD is slow (SATA 7200rpm), so use this ONLY for large,
# latency-tolerant data (backups, long-retention metrics/logs, archives) — never
# databases or write-hot volumes. Keep replicas low: the HDD lives on a single
# node, so 2 replicas would both pin to the same node and node-down = unavailable.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-hdd
provisioner: driver.longhorn.io
parameters:
  dataEngine: v1
  dataLocality: disabled
  diskSelector: "hdd"
  numberOfReplicas: "1"
  replicaAutoBalance: best-effort
  staleReplicaTimeout: "30"
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
