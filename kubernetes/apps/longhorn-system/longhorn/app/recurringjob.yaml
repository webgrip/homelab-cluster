---
# Daily cleanup of system-generated snapshots (rebuild/expand leftovers) + purge.
# Applies to every volume in the "default" group — i.e. any volume that has no
# explicit recurring-job label. This is the fix for snapshots accumulating
# unbounded (there were 31 snapshots / ~164Gi single-copy with no cleanup job).
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: snapshot-cleanup
spec:
  cron: "0 3 * * *"
  task: snapshot-cleanup
  groups:
    - default
  retain: 0
  concurrency: 1
---
# Weekly online fstrim to release blocks freed by deleted files back to Longhorn.
# remove-snapshots-during-filesystem-trim is false cluster-wide, so this never
# touches snapshots — it only reclaims space the filesystem has already freed.
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: filesystem-trim
spec:
  cron: "0 4 * * 0"
  task: filesystem-trim
  groups:
    - default
  retain: 0
  concurrency: 1
---
# Daily off-cluster backup of the gitops-critical app volumes (forgejo-data,
# gitea-mirror) to the external Garage S3 backup target. These have no other
# off-cluster backup (forgejo-db uses CNPG barman; openbao uses raft snapshots),
# so a both-worker outage would otherwise lose them (ADR-0008 DR). A volume opts
# in by carrying the label `recurring-job-group.longhorn.io/gitops-backup=enabled`
# on its Volume CR (set once per volume — see the migration-status runbook).
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: gitops-backup
spec:
  cron: "0 2 * * *"
  task: backup
  groups:
    - gitops-backup
  retain: 7
  concurrency: 1
