---
# Longhorn S3 backup-target creds, sourced from OpenBao (same Garage creds as
# cnpg-backup, but mapped to Longhorn's expected AWS_* key names). Used by the
# backupTarget in the HelmRelease defaultSettings to back up volumes to the
# external Garage S3 (10.0.0.110) — survives a both-worker outage (ADR-0008).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: longhorn-backup-s3
  namespace: longhorn-system
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: longhorn-backup-s3, creationPolicy: Owner}
  data:
    - {secretKey: AWS_ACCESS_KEY_ID, remoteRef: {key: s3/cnpg-backup, property: S3_ACCESS_KEY_ID}}
    - {secretKey: AWS_SECRET_ACCESS_KEY, remoteRef: {key: s3/cnpg-backup, property: S3_SECRET_ACCESS_KEY}}
    - {secretKey: AWS_ENDPOINTS, remoteRef: {key: s3/cnpg-backup, property: S3_ENDPOINT}}
