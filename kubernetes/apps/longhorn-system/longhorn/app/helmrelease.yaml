---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: 1.11.2
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    defaultSettings:
      defaultDataPath: "/var/lib/longhorn"
      replicaDiskSoftAntiAffinity: false
      createDefaultDiskLabeledNodes: false
      defaultDataLocality: best-effort
      defaultLonghornStaticStorageClass: longhorn
      defaultReplicaCount: "3"
      defaultSharedVolumeType: nfs
      guaranteedEngineManagerCPU: "20"
      guaranteedReplicaManagerCPU: "20"
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      orphanAutoDeletion: true
      # Disabled 2026-06-09: best-effort auto-balance generated a rebuild storm
      # after the capacity cleanup that OOM-killed the (BestEffort-QoS)
      # longhorn-manager under memory spikes, cascading into FailedRebuilding +
      # a stuck WAL-PVC resize (dependency-track-db down). These nodes are RAM
      # -tight; keep replica placement static and rebalance manually if needed.
      replicaAutoBalance: disabled
      replicaReplenishmentWaitInterval: "120"
      concurrentReplicaRebuildPerNodeLimit: "1"
      rebuildConcurrentSyncLimit: "2"
      storageMinimalAvailablePercentage: "10"
      storageReservedPercentageForDefaultDisk: "10"
      # Allow system-managed components (like longhorn-csi-plugin) to run on the tainted fringe node.
      taintToleration: "dedicated=fringe:NoSchedule"
    ingress:
      enabled: false
    metrics:
      serviceMonitor:
        enabled: true
        interval: 60s
        scrapeTimeout: 30s
        metricRelabelings:
          - action: drop
            sourceLabels:
              - __name__
            regex: longhorn_rest_client_rate_limiter_latency_seconds_bucket

    # Allow the Longhorn manager DaemonSet to run on the tainted fringe node.
    longhornManager:
      tolerations:
        - key: dedicated
          operator: Equal
          value: fringe
          effect: NoSchedule
  # Give longhorn-manager Guaranteed QoS (requests==limits on BOTH containers) so
  # the kernel does not OOM-kill it first under node memory pressure — the root
  # cause of the 2026-06-09 incident (it ran BestEffort). Observed usage is
  # ~370Mi / 40m; limits are generous headroom to avoid self-OOM during storms.
  # The chart only exposes longhornManager.resources (the manager container), so
  # the sidecar must be patched too or the pod stays Burstable. See
  # docs/techdocs/docs/incidents/2026-06-09-longhorn-oom-cascade.md.
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: DaemonSet
              name: longhorn-manager
            patch: |-
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: longhorn-manager
              spec:
                template:
                  spec:
                    containers:
                      - name: longhorn-manager
                        resources:
                          requests:
                            cpu: 250m
                            memory: 1Gi
                          limits:
                            cpu: 250m
                            memory: 1Gi
                      - name: pre-pull-share-manager-image
                        resources:
                          requests:
                            cpu: 10m
                            memory: 64Mi
                          limits:
                            cpu: 10m
                            memory: 64Mi
