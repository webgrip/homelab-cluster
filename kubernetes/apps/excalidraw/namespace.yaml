---
apiVersion: v1
kind: Namespace
metadata:
  name: excalidraw
  labels:
    webgrip.io/owner: platform
    webgrip.io/tier: app
    webgrip.io/exposure: internal
    # Opt into kyverno-generated default-deny (ingress+egress) + allow-dns.
    # Re-opened selectively by networkpolicy.yaml (ingress) — W7 zero-trust.
    kyverno.io/default-network-policies: "true"
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
