---
# cloudflare-tunnel-secret now sourced from OpenBao. Replaces secret.sops.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-tunnel-secret
  namespace: network
spec:
  refreshInterval: 15m
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: cloudflare-tunnel-secret, creationPolicy: Owner}
  data:
    - secretKey: TUNNEL_TOKEN
      remoteRef: {key: cloudflare/tunnel, property: TUNNEL_TOKEN}
