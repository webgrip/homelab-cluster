---
# Migration phase 1: seed cloudflare-tunnel-secret into OpenBao (secret/cloudflare/tunnel).
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: cloudflare-tunnel-secret
  namespace: network
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: cloudflare-tunnel-secret
  data:
    - match:
        secretKey: TUNNEL_TOKEN
        remoteRef:
          remoteKey: cloudflare/tunnel
          property: TUNNEL_TOKEN
