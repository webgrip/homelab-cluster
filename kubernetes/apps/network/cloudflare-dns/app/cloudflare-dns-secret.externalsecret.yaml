---
# cloudflare-dns-secret now sourced from OpenBao. Replaces secret.sops.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-dns-secret
  namespace: network
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: cloudflare-dns-secret, creationPolicy: Owner}
  data:
    - secretKey: api-token
      remoteRef: {key: cloudflare/dns, property: api-token}
