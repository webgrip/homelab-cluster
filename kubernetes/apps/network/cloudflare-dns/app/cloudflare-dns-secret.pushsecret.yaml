---
# Migration phase 1: seed cloudflare-dns-secret into OpenBao (secret/cloudflare/dns).
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: cloudflare-dns-secret
  namespace: network
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: cloudflare-dns-secret
  data:
    - match:
        secretKey: api-token
        remoteRef:
          remoteKey: cloudflare/dns
          property: api-token
