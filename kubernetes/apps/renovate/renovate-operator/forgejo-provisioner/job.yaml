---
# Tier-1 "do-once, gated, idempotent" bootstrap task (see ADR-0003).
# A bare Job (not a CronJob): it runs on first apply and re-runs ONLY when this spec changes,
# because its Flux Kustomization (ks-forgejo-provisioner.yaml) sets force: true and the completed
# Job is left as the "done" marker. No timer, so no recurring cluster load. To re-run on demand:
# `kubectl -n renovate delete job renovate-forgejo-provisioner` (Flux recreates it).
#
# Converges every run (writes only when something is missing/invalid):
#   1. ensure the bot user exists (Forgejo admin API)
#   2. reuse the stored token if it still authenticates; else resync the bot password and mint a
#      fresh scoped token into Secret renovate-forgejo-token (consumed by webgrip-forgejo)
#   3. ensure the throwaway pilot repo exists and is seeded with a deliberately-stale dependency
# All Forgejo calls go to the in-cluster Service (no external DNS/TLS dependency).
apiVersion: batch/v1
kind: Job
metadata:
  name: renovate-forgejo-provisioner
  labels:
    # If this Job exhausts its backoff (terminal Failed), the Kyverno
    # cleanup-opt-in-failed-jobs policy deletes it hourly and Flux recreates it =
    # automatic retry. Complete runs are never touched (the "done" marker above).
    cleanup.webgrip.io/retry-failed: "true"
spec:
  backoffLimit: 4
  template:
    spec:
      serviceAccountName: renovate-forgejo-provisioner
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: provision
          image: docker.io/alpine/k8s:1.36.1@sha256:692239d739589247c4a791205ed9619c28ae85a21286e19a6211c04a62c56668
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /tmp
            - name: FORGEJO_URL
              value: http://forgejo-http.forgejo.svc.cluster.local:3000
            - name: NAMESPACE
              value: renovate
            - name: TOKEN_SECRET
              value: renovate-forgejo-token
            - name: TOKEN_NAME
              value: renovate-operator
            - name: BOT_USERNAME
              value: renovate
            - name: BOT_EMAIL
              value: renovate@${SECRET_DOMAIN}
            - name: PILOT_REPO
              value: forgejo-renovate-pilot
            - name: ADMIN_USERNAME
              valueFrom: {secretKeyRef: {name: renovate-forgejo-admin, key: ADMIN_USERNAME}}
            - name: ADMIN_PASSWORD
              valueFrom: {secretKeyRef: {name: renovate-forgejo-admin, key: ADMIN_PASSWORD}}
            - name: BOT_PASSWORD
              valueFrom: {secretKeyRef: {name: renovate-forgejo-bot-password, key: password}}
          command:
            - /bin/sh
            - -ceu
            - |
              # Container env vars are referenced UNBRACED ($FORGEJO_URL) on purpose: Flux postBuild
              # substitution (substituteFrom cluster-secrets — only SECRET_DOMAIN is defined) blanks a
              # braced reference to an undefined var, while the unbraced form is left for the shell to
              # expand. (Dollar-dollar escaping is rejected by Flux's envsubst here.) See ADR-0003.
              api="$FORGEJO_URL/api/v1"
              admin="$ADMIN_USERNAME:$ADMIN_PASSWORD"
              bot="$BOT_USERNAME:$BOT_PASSWORD"

              # 1) Ensure the bot user exists.
              code="$(curl -sS -o /dev/null -w '%{http_code}' -u "$admin" "$api/users/$BOT_USERNAME")"
              if [ "$code" = "404" ]; then
                echo "creating bot user $BOT_USERNAME"
                curl -fsS -u "$admin" -H 'Content-Type: application/json' -X POST "$api/admin/users" \
                  -d "{\"username\":\"$BOT_USERNAME\",\"email\":\"$BOT_EMAIL\",\"password\":\"$BOT_PASSWORD\",\"must_change_password\":false}" >/dev/null
              elif [ "$code" != "200" ]; then
                echo "unexpected status probing bot user: $code" >&2; exit 1
              fi

              # 2) Reuse the stored token if it still authenticates; else (re)mint.
              tok="$(kubectl -n "$NAMESPACE" get secret "$TOKEN_SECRET" -o jsonpath='{.data.RENOVATE_TOKEN}' 2>/dev/null | base64 -d 2>/dev/null || true)"
              if [ -n "$tok" ] && curl -fsS -o /dev/null -H "Authorization: token $tok" "$api/user"; then
                echo "existing token still valid — no change"
              else
                echo "minting a fresh token"
                # resync the bot password so basic auth works, then rotate the named token
                curl -fsS -u "$admin" -H 'Content-Type: application/json' -X PATCH "$api/admin/users/$BOT_USERNAME" \
                  -d "{\"login_name\":\"$BOT_USERNAME\",\"source_id\":0,\"password\":\"$BOT_PASSWORD\",\"must_change_password\":false}" >/dev/null
                curl -sS -o /dev/null -u "$bot" -X DELETE "$api/users/$BOT_USERNAME/tokens/$TOKEN_NAME" || true
                tok="$(curl -fsS -u "$bot" -H 'Content-Type: application/json' -X POST "$api/users/$BOT_USERNAME/tokens" \
                  -d "{\"name\":\"$TOKEN_NAME\",\"scopes\":[\"write:repository\",\"read:user\",\"write:issue\",\"read:organization\"]}" | jq -r '.sha1')"
                [ -n "$tok" ] && [ "$tok" != "null" ] || { echo "token mint failed" >&2; exit 1; }
                kubectl -n "$NAMESPACE" create secret generic "$TOKEN_SECRET" \
                  --from-literal="RENOVATE_TOKEN=$tok" \
                  --from-literal="FORGEJO_TOKEN=$tok" \
                  --dry-run=client -o yaml | kubectl apply -f - >/dev/null
                echo "wrote Secret $TOKEN_SECRET"
              fi

              # 3) Ensure the throwaway pilot repo exists + is seeded (idempotent; safe to delete the repo anytime).
              curl -sS -o /dev/null -u "$bot" -H 'Content-Type: application/json' -X POST "$api/user/repos" \
                -d "{\"name\":\"$PILOT_REPO\",\"default_branch\":\"main\",\"auto_init\":true,\"private\":false,\"description\":\"Renovate-on-Forgejo pilot — safe to delete\"}" || true
              seed() { # path=$1  message=$2 ; file body on stdin
                body="$(jq -nc --arg m "$2" --arg c "$(base64 | tr -d '\n')" '{branch:"main",message:$m,content:$c}')"
                curl -sS -o /dev/null -u "$bot" -H 'Content-Type: application/json' \
                  -X POST "$api/repos/$BOT_USERNAME/$PILOT_REPO/contents/$1" -d "$body" || true
              }
              printf 'FROM alpine:3.18\nRUN echo "renovate-on-forgejo pilot"\n' \
                | seed "Dockerfile" "seed: pilot Dockerfile (alpine pinned old on purpose)"
              printf '%s\n' '{' '  "$schema": "https://docs.renovatebot.com/renovate-schema.json",' '  "extends": ["config:recommended"]' '}' \
                | seed ".renovaterc.json5" "seed: pilot renovate config"

              # 4) Ensure the bot has org-wide WRITE in the webgrip org (a 'renovate' team, write +
              #    all repos) so org-wide discovery can push branches/PRs. Idempotent; non-fatal.
              #    NB: Renovate still skips MIRROR repos — real PRs start as each repo is de-mirrored.
              org=webgrip; team=renovate
              tid="$(curl -fsS -u "$admin" "$api/orgs/$org/teams" 2>/dev/null | jq -r --arg t "$team" '.[] | select(.name==$t) | .id' | head -1)"
              if [ -z "$tid" ]; then
                tid="$(curl -fsS -u "$admin" -H 'Content-Type: application/json' -X POST "$api/orgs/$org/teams" \
                  -d "{\"name\":\"$team\",\"description\":\"Renovate bot — write, all repos\",\"permission\":\"write\",\"includes_all_repositories\":true,\"can_create_org_repo\":false,\"units\":[\"repo.code\",\"repo.issues\",\"repo.pulls\"]}" | jq -r '.id // empty')"
              fi
              if [ -n "$tid" ]; then
                # Team-member endpoints are GLOBAL in Forgejo/Gitea: PUT /teams/{id}/members/{user}
                # — NOT /orgs/{org}/teams/{id}/members/{user} (that path 404s). The old call also
                # lacked -f, so the 404 was reported as success and the bot was NEVER added → it had
                # no push/visibility on org repos (Renovate found nothing, can_push=false). -f makes a
                # real failure abort the Job (set -e). PUT is idempotent (204 on re-add); then verify.
                curl -fsS -o /dev/null -u "$admin" -X PUT "$api/teams/$tid/members/$BOT_USERNAME"
                curl -fsS -o /dev/null -u "$admin" "$api/teams/$tid/members/$BOT_USERNAME" \
                  && echo "bot is a member of $org/$team (id $tid, write + all repos)" \
                  || { echo "ERROR: bot not a member of $org/$team after add" >&2; exit 1; }
              else
                echo "ERROR: could not resolve $org/$team id (org-wide push will not work)" >&2; exit 1
              fi
              echo "provisioner converged"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
