---
# Stable, in-cluster-generated password for the Forgejo `renovate` bot user. No human ever types
# it; it exists only so the provisioner can (a) create the user and (b) basic-auth as the bot to
# mint the scoped token. generate-once + Retain keeps it stable across runs so basic-auth keeps
# working; deleting this Secret regenerates it (the provisioner then resyncs the bot's password).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-forgejo-bot-password
  namespace: renovate
spec:
  refreshInterval: "0" # generate once
  target:
    name: renovate-forgejo-bot-password
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator
      rewrite:
        - regexp: {source: "password", target: "password"}
