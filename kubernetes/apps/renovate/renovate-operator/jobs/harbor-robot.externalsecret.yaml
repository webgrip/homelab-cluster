---
# Replicate the webgrip Harbor CI robot credential from OpenBao into the renovate
# namespace, for two consumers:
#   1. the github-app-token CronJob, which folds it into RENOVATE_HOST_RULES so the
#      docker datasource can list tags in the PRIVATE `webgrip` Harbor project
#      (first-party charts: ploeg, erfbeeld — anonymous /v2 requests 401 there);
#   2. the RenovateJob workers, whose update-oci-digests.sh postUpgradeTask reads
#      HARBOR_ROBOT_USER/HARBOR_ROBOT_TOKEN directly (scripts/lib/oci.sh fetch_digest).
# Source of truth is secret/harbor/robot-webgrip (robot$webgrip+ci, project-scoped
# repository pull), generated in-cluster by the harbor app and mirrored to OpenBao —
# same credential CI's HARBOR_ROBOT_* comes from (forgejo-actions-secrets).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-harbor-robot
  namespace: renovate
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: renovate-harbor-robot, creationPolicy: Owner}
  data:
    - {secretKey: HARBOR_ROBOT_USER, remoteRef: {key: harbor/robot-webgrip, property: CI_USER}}
    - {secretKey: HARBOR_ROBOT_TOKEN, remoteRef: {key: harbor/robot-webgrip, property: CI_TOKEN}}
