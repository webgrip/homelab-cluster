---
# Forgejo admin credentials, replicated from OpenBao into the renovate namespace so the
# bot-provisioner CronJob can create the `renovate` user via the Forgejo admin API. This is the
# only step that needs admin; everything after uses the bot's own credentials/token.
# NOTE (security): this widens the Forgejo admin credential's blast radius to the renovate ns.
# Acceptable for a homelab; a hardening follow-up could run the provisioner in the forgejo ns
# (where the admin Secret already lives) and write the token Secret cross-namespace via RBAC.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-forgejo-admin
  namespace: renovate
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: renovate-forgejo-admin, creationPolicy: Owner}
  data:
    - {secretKey: ADMIN_USERNAME, remoteRef: {key: forgejo/admin, property: username}}
    - {secretKey: ADMIN_PASSWORD, remoteRef: {key: forgejo/admin, property: password}}
