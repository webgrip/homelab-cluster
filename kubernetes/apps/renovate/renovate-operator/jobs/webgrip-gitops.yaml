---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: webgrip-gitops
spec:
  discoveryFilters:
    - webgrip/*
  provider:
    name: github
    endpoint: https://api.github.com/
  # renovate-operator evaluates cron in its controller timezone (typically UTC).
  # Keep dashboard approvals responsive without overlapping the busiest batch windows.
  schedule: "17 */6 * * *"
  parallelism: 1
  image: docker.io/renovate/renovate:43.195.5-full@sha256:ca5fb31e87887f49d1d818d8a4d57e0e85241e0297a7cf906d0a1befcb734e32
  secretRef: renovate-runtime-token
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-webhook-auth
        key: token
  extraEnv:
    - name: RENOVATE_CONFIG_FILE
      value: /config/renovate.json
    - name: RENOVATE_BASE_DIR
      value: /tmp
    - name: HOME
      value: /tmp
    - name: NODE_OPTIONS
      value: --max-old-space-size=3000
    - name: LOG_LEVEL
      value: info
  extraVolumes:
    - name: config
      configMap:
        name: renovate-config-gitops
  extraVolumeMounts:
    - name: config
      mountPath: /config
      readOnly: true
  nodeSelector:
    nodegroup: fringe
  tolerations:
    - key: dedicated
      operator: Equal
      value: fringe
      effect: NoSchedule
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1500m"
      memory: 4Gi
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 12021
      runAsGroup: 12021
    container:
      allowPrivilegeEscalation: false
