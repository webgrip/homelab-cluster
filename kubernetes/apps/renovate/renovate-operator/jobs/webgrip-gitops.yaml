---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: webgrip-gitops
spec:
  # Explicit list, not `webgrip/*`: Forgejo-leading repos must NOT be processed on GitHub —
  # their GitHub copies are downstream force-push-mirrors, so a Renovate branch/automerge
  # commit there is silently destroyed by the next relay. Renovate's autodiscoverFilters
  # have UNION semantics (a negation pattern does not subtract from a glob), so exclusion
  # requires enumerating. This is the inverse of webgrip-forgejo's list; when a repo flips
  # Forgejo-leading, move it there. Trade-off: brand-new GitHub repos are no longer
  # auto-discovered (fine — the fleet is converging on Forgejo). Regenerate from live state:
  # kubectl -n renovate get renovatejob webgrip-gitops -o jsonpath='{range .status.projects[*]}{.name}{"\n"}{end}'
  discoveryFilters:
    - webgrip/.github
    - webgrip/.github-private
    - webgrip/GRIP
    - webgrip/SparkyFitness
    - webgrip/Tenants
    - webgrip/awesome-copilot
    - webgrip/code14-fullstack-assignment
    - webgrip/devops-is-a-philosophy
    - webgrip/docker-github-actions-runner
    - webgrip/impacttu-poc
    - webgrip/kotlin-fintech-starter-app
    - webgrip/mkdocs-runner
    - webgrip/opg-poc
    - webgrip/poc-samenoptrekken
    - webgrip/renovate
    - webgrip/twitch_exporter
    - webgrip/webcore
  provider:
    name: github
    endpoint: https://api.github.com/
  # renovate-operator evaluates cron in its controller timezone (typically UTC).
  # Keep dashboard approvals responsive without overlapping the busiest batch windows.
  schedule: "17 */6 * * *"
  parallelism: 1
  image: docker.io/renovate/renovate:43.209.0-full@sha256:f5963ab360818459a856eb4bc3e1655f95e5d7031f1a9d57cdedaf04f3fa2954
  secretRef: renovate-runtime-token
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-webhook-auth
        key: token
  extraEnv:
    - name: RENOVATE_CONFIG_FILE
      value: /config/renovate.json
    - name: RENOVATE_BASE_DIR
      value: /tmp
    - name: HOME
      value: /tmp
    - name: NODE_OPTIONS
      value: --max-old-space-size=3000
    # debug matches the forgejo job; worker-pod logs are the only way to
    # diagnose branch failures (pods live ~30min until the cleanup cron,
    # and are not shipped to VictoriaLogs)
    - name: LOG_LEVEL
      value: debug
  extraVolumes:
    - name: config
      configMap:
        name: renovate-config-gitops
  extraVolumeMounts:
    - name: config
      mountPath: /config
      readOnly: true
  nodeSelector:
    node.webgrip.io/pool: worker
  tolerations:
    - key: dedicated
      operator: Equal
      value: fringe
      effect: NoSchedule
  resources:
    requests:
      cpu: 250m
      # 1Gi stopped fitting once the CNPG DBs got memory requests (fringe
      # ~930Mi request-headroom, worker-1 CPU-request-full) — jobs sat Pending.
      # A request is a scheduling promise, not a cap; the 4Gi limit still
      # covers real usage bursts.
      memory: 512Mi
    limits:
      cpu: "1500m"
      memory: 4Gi
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 12021
      runAsGroup: 12021
    container:
      allowPrivilegeEscalation: false
