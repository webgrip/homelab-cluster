---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: webgrip-gitops
spec:
  discoveryFilters:
    - webgrip/*
  provider:
    name: github
    endpoint: https://api.github.com/
  # renovate-operator evaluates cron in its controller timezone (typically UTC).
  # Run frequently so Dependency Dashboard approvals take effect quickly.
  schedule: "0 */2 * * *"
  parallelism: 2
  image: docker.io/renovate/renovate:43.104.11-full@sha256:a1984b7e18cf1c2fbe9864d4ca5b7833e9834b1d25691fce03d0f55d8573d852
  secretRef: renovate-runtime-token
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-webhook-auth
        key: token
  extraEnv:
    - name: RENOVATE_CONFIG_FILE
      value: /config/renovate.json
    - name: RENOVATE_BASE_DIR
      value: /tmp
    - name: HOME
      value: /tmp
    - name: NODE_OPTIONS
      value: --max-old-space-size=3000
    - name: LOG_LEVEL
      value: info
  extraVolumes:
    - name: config
      configMap:
        name: renovate-config-gitops
  extraVolumeMounts:
    - name: config
      mountPath: /config
      readOnly: true
  nodeSelector:
    nodegroup: fringe
  tolerations:
    - key: dedicated
      operator: Equal
      value: fringe
      effect: NoSchedule
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      memory: 4Gi
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 12021
      runAsGroup: 12021
    container:
      allowPrivilegeEscalation: false
