---
# Migration phase 1 (seed): renovate-webhook-auth -> OpenBao secret/renovate/webhook-auth.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: renovate-webhook-auth
  namespace: renovate
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - kind: ClusterSecretStore
      name: openbao-push
  selector:
    secret:
      name: renovate-webhook-auth
  data:
    - match: {secretKey: token, remoteRef: {remoteKey: renovate/webhook-auth, property: token}}
