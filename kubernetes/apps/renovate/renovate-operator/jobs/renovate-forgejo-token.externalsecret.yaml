---
# Forgejo bot PAT + registry host-rules for the Forgejo-targeted RenovateJob.
# Provided (external) values: a human creates the Forgejo `renovate` bot user, mints a
# scoped PAT, mints a GitHub read:packages PAT for GHCR, assembles the RENOVATE_HOST_RULES
# JSON, and writes them once to OpenBao:
#   bao kv put secret/renovate/forgejo \
#     RENOVATE_TOKEN=<forgejo-bot-pat> \
#     RENOVATE_HOST_RULES='[{"matchHost":"ghcr.io","hostType":"docker","username":"<gh-user>","password":"<gh-read-packages-pat>"},{"matchHost":"docker.io","hostType":"docker","username":"<dockerhub-user>","password":"<dockerhub-token>"}]'
# See docs/techdocs/docs/renovate-forgejo-migration.md (Phase 0/1) and
# docs/techdocs/docs/architecture/adr-0012-forgejo-static-bot-pat.md.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-forgejo-token
  namespace: renovate
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: renovate-forgejo-token, creationPolicy: Owner}
  data:
    # Renovate authenticates with RENOVATE_TOKEN; the operator's discovery reads FORGEJO_TOKEN.
    # Both are the same Forgejo bot PAT.
    - {secretKey: RENOVATE_TOKEN, remoteRef: {key: renovate/forgejo, property: RENOVATE_TOKEN}}
    - {secretKey: FORGEJO_TOKEN, remoteRef: {key: renovate/forgejo, property: RENOVATE_TOKEN}}
    # Static registry auth (GHCR via read:packages PAT + Docker Hub), stored as a ready JSON blob.
    - {secretKey: RENOVATE_HOST_RULES, remoteRef: {key: renovate/forgejo, property: RENOVATE_HOST_RULES}}
