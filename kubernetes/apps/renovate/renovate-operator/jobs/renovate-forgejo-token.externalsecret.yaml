---
# Forgejo bot PAT for the Forgejo-targeted RenovateJob. The only provided (external) value is
# the Forgejo bot token; a human creates the `renovate` bot user, mints a scoped PAT, and writes
# it once to OpenBao:
#   bao kv put secret/renovate/forgejo RENOVATE_TOKEN=<forgejo-bot-pat>
# GHCR/Docker Hub auth is NOT here — webgrip-forgejo.yaml reuses the GitHub-App minter's
# RENOVATE_HOST_RULES (renovate-runtime-token) during dual-run (ADR-0013).
# See docs/techdocs/docs/renovate-forgejo-migration.md (Phase 0) and
# docs/techdocs/docs/architecture/adr-0012-forgejo-static-bot-pat.md.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-forgejo-token
  namespace: renovate
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: renovate-forgejo-token, creationPolicy: Owner}
  data:
    # Renovate authenticates with RENOVATE_TOKEN; the operator's discovery reads FORGEJO_TOKEN.
    # Both are the same Forgejo bot PAT.
    - {secretKey: RENOVATE_TOKEN, remoteRef: {key: renovate/forgejo, property: RENOVATE_TOKEN}}
    - {secretKey: FORGEJO_TOKEN, remoteRef: {key: renovate/forgejo, property: RENOVATE_TOKEN}}
