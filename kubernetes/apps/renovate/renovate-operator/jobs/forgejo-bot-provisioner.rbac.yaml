---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: renovate-forgejo-provisioner
  namespace: renovate

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: renovate-forgejo-provisioner
  namespace: renovate
rules:
  # Read its own inputs and create/update the minted-token Secret it owns at runtime.
  - apiGroups:
      - ""
    resources:
      - "secrets"
    verbs:
      - "get"
      - "create"
      - "update"
      - "patch"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: renovate-forgejo-provisioner
  namespace: renovate
subjects:
  - kind: ServiceAccount
    name: renovate-forgejo-provisioner
    namespace: renovate
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: renovate-forgejo-provisioner
