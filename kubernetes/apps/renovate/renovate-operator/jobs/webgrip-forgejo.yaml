---
# Forgejo-targeted RenovateJob — runs alongside webgrip-gitops (ADR-0011 dual-run).
# Dormant until activated from kustomization.yaml; see the gated block there and
# docs/techdocs/docs/renovate-forgejo-migration.md.
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: webgrip-forgejo
spec:
  discoveryFilters:
    # TODO(Phase 4): set to the single de-mirrored pilot repo (e.g. "webgrip/<pilot>").
    # The operator skips mirror repos, so only Forgejo-authoritative repos are ever acted on.
    # Widen to "webgrip/*" once the pilot proves the loop end-to-end.
    - webgrip/forgejo-renovate-pilot
  provider:
    name: forgejo
    endpoint: https://forgejo.${SECRET_DOMAIN}/api/v1
  # Offset from webgrip-gitops (:17) to avoid overlapping executor runs on the fringe pool.
  schedule: "47 */6 * * *"
  parallelism: 1
  image: docker.io/renovate/renovate:43.209.0-full@sha256:f5963ab360818459a856eb4bc3e1655f95e5d7031f1a9d57cdedaf04f3fa2954
  secretRef: renovate-forgejo-token
  # Webhook receiver auth only. The Phase-3 forgejo.sync block (auto-registers the Forgejo
  # webhook on discovered repos) is documented in renovate-forgejo-migration.md — add it here
  # once the operator CRD fields are confirmed against chart 4.10.1.
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-webhook-auth
        key: token
  extraEnv:
    - name: RENOVATE_CONFIG_FILE
      value: /config/renovate.json
    - name: RENOVATE_BASE_DIR
      value: /tmp
    - name: HOME
      value: /tmp
    - name: NODE_OPTIONS
      value: --max-old-space-size=3000
    - name: LOG_LEVEL
      value: info
    # GHCR/Docker Hub auth: reuse the GitHub-App token-minter's output (renovate-runtime-token),
    # which already runs for the dual-run GitHub path — no separate GHCR PAT or OpenBao entry
    # needed. optional: tolerates the secret not existing yet (GHCR falls back to anonymous until
    # the first mint). At GitHub-path retirement this re-homes to Harbor (ADR-0013).
    - name: RENOVATE_HOST_RULES
      valueFrom:
        secretKeyRef:
          name: renovate-runtime-token
          key: RENOVATE_HOST_RULES
          optional: true
  extraVolumes:
    - name: config
      configMap:
        name: renovate-config-forgejo
  extraVolumeMounts:
    - name: config
      mountPath: /config
      readOnly: true
  nodeSelector:
    nodegroup: fringe
  tolerations:
    - key: dedicated
      operator: Equal
      value: fringe
      effect: NoSchedule
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1500m"
      memory: 4Gi
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 12021
      runAsGroup: 12021
    container:
      allowPrivilegeEscalation: false
