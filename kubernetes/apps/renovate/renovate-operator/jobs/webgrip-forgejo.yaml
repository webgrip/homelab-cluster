---
# Forgejo-targeted RenovateJob — runs alongside webgrip-gitops (ADR-0029 dual-run).
# Dormant until activated from kustomization.yaml; see the gated block there and
# docs/techdocs/docs/renovate-forgejo-migration.md.
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: webgrip-forgejo
spec:
  discoveryFilters:
    # The Forgejo-authoritative (de-mirrored) webgrip repos, listed explicitly, + the bot's pilot.
    # Why not a `webgrip/*` glob: most webgrip repos are still gitea-mirror pull-mirrors (read-only),
    # so a glob spawns a serial executor Job per mirror every run — wasted churn + RenovateProjectRunFailed
    # noise — for repos Renovate can't push to anyway. This list GROWS as each repo flips
    # Forgejo-leading (mirror image: remove it from webgrip-gitops's explicit list), converging
    # on `webgrip/*` once the fleet has moved. homelab-cluster (the Flux source) flipped
    # 2026-07-13 (ADR-0011). Regenerate the non-mirror set with: scripts/forgejo-sync.sh --all.
    - webgrip/homelab-cluster
    - webgrip/infrastructure
    - webgrip/workflows
    - webgrip/renovate-config
    - webgrip/claude-config
    - webgrip/.profile
    - webgrip/traefik-local-development
    - webgrip/ledgerflow
    - webgrip/monitoring-platform
    - webgrip/invoiceninja-application
    - webgrip/application-template
    - webgrip/freshrss-application
    - webgrip/whisperx-application
    - webgrip/searxng-application
    - webgrip/backstage-application
    - webgrip/action-typescript-template
    - webgrip/telemetry-service
    - webgrip/common-charts
    - webgrip/agentic-workflows
    - webgrip/Tenants
    - webgrip/GRIP
    - webgrip/ploeg
    - renovate/forgejo-renovate-pilot
  provider:
    name: forgejo
    # In-cluster endpoint (see configmap-forgejo.yaml for the why): the public Cloudflare-fronted host
    # normalizes %2F in branch-ref API paths -> 404 -> Renovate aborts every run (forgejo issue#3).
    # Must match the Renovate config endpoint; the operator can surface this as RENOVATE_ENDPOINT, which
    # overrides the config file, so both have to point at forgejo-http to take effect.
    endpoint: http://forgejo-http.forgejo.svc.cluster.local:3000/api/v1
  # Offset from webgrip-gitops (:17) to avoid overlapping executor runs on the fringe pool.
  schedule: "47 */6 * * *"
  parallelism: 1
  image: docker.io/renovate/renovate:43.271.3-full@sha256:b85b0a6338c3c11fbbf9f3fad5f49675aae0bc392ffe3a439c4dac4e23af8c0e
  secretRef: renovate-forgejo-token
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-webhook-auth
        key: token
        # NOTE: no `forgejo.sync` block here. The operator's Forgejo webhook auto-registration was
        # always disabled (404s against Forgejo 15), and the 5.2.0 operator upgrade (bc367f54) removed
        # `.spec.webhook.forgejo` from the RenovateJob CRD entirely — keeping even a disabled block
        # fails server-side dry-run ("field not declared in schema") and blocks the whole Kustomization.
        # Immediate Dependency-Dashboard/PR-checkbox triggering stays wired per-repo:
        #   scripts/forgejo-sync.sh --repo <name> --only webhook --apply
        # (see jobs/README.md → "Make Dependency Dashboard actions immediate (Forgejo webhook)").
  extraEnv:
    - name: RENOVATE_CONFIG_FILE
      value: /config/renovate.json
    - name: RENOVATE_BASE_DIR
      value: /tmp
    - name: HOME
      value: /tmp
    - name: NODE_OPTIONS
      value: --max-old-space-size=3000
    # debug (not info): the Forgejo path runs only 4x/day, so the extra log volume is cheap, and the
    # per-branch reasoning (minimumReleaseAge soak, "PR has been edited", update failure, rate-limit,
    # repository-changed) is only emitted at debug. Keeps "why didn't this update?" one Loki query away:
    #   {pod=~"webgrip-forgejo-webgrip-infrastructure.*"} |= "renovate/<branch>"
    - name: LOG_LEVEL
      value: debug
    # GHCR/Docker Hub auth: reuse the GitHub-App token-minter's output (renovate-runtime-token),
    # which already runs for the dual-run GitHub path — no separate GHCR PAT or OpenBao entry
    # needed. optional: tolerates the secret not existing yet (GHCR falls back to anonymous until
    # the first mint). At GitHub-path retirement this re-homes to Harbor (ADR-0031).
    - name: RENOVATE_HOST_RULES
      valueFrom:
        secretKeyRef:
          name: renovate-runtime-token
          key: RENOVATE_HOST_RULES
          optional: true
    # github.com DATASOURCE auth (distinct from the GHCR registry auth above). On the Forgejo platform
    # Renovate has no github.com credential, so github-actions/github-releases/github-tags lookups hit
    # api.github.com anonymously and rate-limit ("Please set a GITHUB_COM_TOKEN"). Reuse the same
    # GitHub-App installation token the GitHub path already uses for these datasources (the gitops path
    # proves it can read them) — it authenticates public reads and lifts 60→5000/h. GITHUB_COM_TOKEN is
    # Renovate's purpose-built env for a non-github platform querying github.com (ADR-0031: GitHub stays
    # the version oracle during dual-run). optional: falls back to anonymous until the first token mint.
    - name: GITHUB_COM_TOKEN
      valueFrom:
        secretKeyRef:
          name: renovate-runtime-token
          key: token
          optional: true
    # Harbor robot for the PRIVATE webgrip project: registry auth arrives via
    # RENOVATE_HOST_RULES (token-minter folds it in), but the update-oci-digests.sh
    # postUpgradeTask reads these envs directly (scripts/lib/oci.sh fetch_digest —
    # anonymous requests 401 on first-party charts). optional: until the
    # renovate-harbor-robot ExternalSecret syncs, behavior stays as before.
    - name: HARBOR_ROBOT_USER
      valueFrom:
        secretKeyRef:
          name: renovate-harbor-robot
          key: HARBOR_ROBOT_USER
          optional: true
    - name: HARBOR_ROBOT_TOKEN
      valueFrom:
        secretKeyRef:
          name: renovate-harbor-robot
          key: HARBOR_ROBOT_TOKEN
          optional: true
  extraVolumes:
    - name: config
      configMap:
        name: renovate-config-forgejo
  extraVolumeMounts:
    - name: config
      mountPath: /config
      readOnly: true
  nodeSelector:
    node.webgrip.io/pool: worker
  tolerations:
    - key: dedicated
      operator: Equal
      value: fringe
      effect: NoSchedule
  resources:
    requests:
      cpu: 250m
      # 1Gi stopped fitting once the CNPG DBs got memory requests (fringe
      # ~930Mi request-headroom, worker-1 CPU-request-full) — jobs sat Pending.
      # A request is a scheduling promise, not a cap; the 4Gi limit still
      # covers real usage bursts.
      memory: 512Mi
    limits:
      cpu: "1500m"
      memory: 4Gi
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 12021
      runAsGroup: 12021
    container:
      allowPrivilegeEscalation: false
