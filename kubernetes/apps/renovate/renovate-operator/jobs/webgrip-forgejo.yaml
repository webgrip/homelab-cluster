---
# Forgejo-targeted RenovateJob — runs alongside webgrip-gitops (ADR-0011 dual-run).
# Dormant until activated from kustomization.yaml; see the gated block there and
# docs/techdocs/docs/renovate-forgejo-migration.md.
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: webgrip-forgejo
spec:
  discoveryFilters:
    # The provisioner creates this repo under the bot's own account, so the pilot needs no org/team
    # plumbing. The operator skips mirror repos, so only Forgejo-authoritative repos are ever acted on.
    # For the org-wide rollout: add the bot to the webgrip org/team, then widen to "webgrip/*".
    - renovate/forgejo-renovate-pilot
  provider:
    name: forgejo
    endpoint: https://forgejo.${SECRET_DOMAIN}/api/v1
  # Offset from webgrip-gitops (:17) to avoid overlapping executor runs on the fringe pool.
  schedule: "47 */6 * * *"
  parallelism: 1
  image: docker.io/renovate/renovate:43.209.0-full@sha256:f5963ab360818459a856eb4bc3e1655f95e5d7031f1a9d57cdedaf04f3fa2954
  secretRef: renovate-forgejo-token
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-webhook-auth
        key: token
    # The operator auto-registers a Forgejo repo webhook → the receiver endpoint, so Dependency
    # Dashboard / PR-checkbox actions trigger an immediate run instead of waiting for the cron.
    # Uses the bot token (admin on the repos it owns) to create the hook; CRD fields confirmed
    # against renovate-operator chart 4.10.1.
    forgejo:
      sync:
        enabled: true
        webhookURL: https://renovate-webhook.${SECRET_DOMAIN}/webhook/v1/forgejo
        topic: renovate
        events:
          - "issues"
          - "pull_request"
        tokenSecretRef:
          name: renovate-forgejo-token
          key: FORGEJO_TOKEN
        authTokenSecretRef:
          name: renovate-webhook-auth
          key: token
  extraEnv:
    - name: RENOVATE_CONFIG_FILE
      value: /config/renovate.json
    - name: RENOVATE_BASE_DIR
      value: /tmp
    - name: HOME
      value: /tmp
    - name: NODE_OPTIONS
      value: --max-old-space-size=3000
    - name: LOG_LEVEL
      value: info
    # GHCR/Docker Hub auth: reuse the GitHub-App token-minter's output (renovate-runtime-token),
    # which already runs for the dual-run GitHub path — no separate GHCR PAT or OpenBao entry
    # needed. optional: tolerates the secret not existing yet (GHCR falls back to anonymous until
    # the first mint). At GitHub-path retirement this re-homes to Harbor (ADR-0013).
    - name: RENOVATE_HOST_RULES
      valueFrom:
        secretKeyRef:
          name: renovate-runtime-token
          key: RENOVATE_HOST_RULES
          optional: true
  extraVolumes:
    - name: config
      configMap:
        name: renovate-config-forgejo
  extraVolumeMounts:
    - name: config
      mountPath: /config
      readOnly: true
  nodeSelector:
    nodegroup: fringe
  tolerations:
    - key: dedicated
      operator: Equal
      value: fringe
      effect: NoSchedule
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1500m"
      memory: 4Gi
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 12021
      runAsGroup: 12021
    container:
      allowPrivilegeEscalation: false
