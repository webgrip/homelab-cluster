---
# Admin/runtime Renovate config for the Forgejo path. Mirror of configmap-gitops.yaml with
# platform=forgejo, the Forgejo endpoint + bot gitAuthor, and the same manager/throttle/queue
# defaults. The api.github.com + docker.io hostRules stay — GitHub remains a read-only version
# oracle (ADR-0031). ${SECRET_DOMAIN} is substituted by the jobs Kustomization postBuild.
apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-config-forgejo
data:
  # endpoint is the in-cluster forgejo-http Service, NOT the public https://forgejo.${SECRET_DOMAIN} host:
  # Cloudflare (in front of the public host) normalizes the %2F in branch-ref API paths, e.g.
  #   /repos/.../commits/renovate%2Ffoo/statuses  ->  /repos/.../commits/renovate/foo/statuses  -> 404.
  # Renovate maps that 404 to REPOSITORY_CHANGED and aborts the whole run, so every cycle bailed with
  # result=repository-changed once renovate/* branches existed (forgejo issue#3). Hitting forgejo-http
  # directly preserves the encoded slash. Git clone uses this endpoint host too (in-cluster http,
  # bot-token auth) — fine cluster-internal. Keep in sync with provider.endpoint in webgrip-forgejo.yaml.
  renovate.json: |-
    {
      "$schema": "https://docs.renovatebot.com/renovate-schema.json",
      "platform": "forgejo",
      "endpoint": "http://forgejo-http.forgejo.svc.cluster.local:3000/api/v1",
      "autodiscover": false,
      "onboarding": true,
      "requireConfig": "optional",

      "extends": ["local>webgrip/renovate-config:forgejo"],

      "timezone": "Europe/Amsterdam",
      "gitAuthor": "Renovate Bot <renovate@${SECRET_DOMAIN}>",
      "userAgent": "webgrip-homelab/renovate-operator-webgrip-forgejo",

      "updateNotScheduled": true,
      "prConcurrentLimit": 10,
      "prHourlyLimit": 0,
      "branchConcurrentLimit": 10,
      "allowedCommands": ["^./scripts/update-oci-digests\\.sh$"],

      "hostRules": [
        {
          "matchHost": "api.github.com",
          "concurrentRequestLimit": 2,
          "maxRequestsPerSecond": 1
        },
        {
          "matchHost": "docker.io",
          "hostType": "docker",
          "concurrentRequestLimit": 1,
          "maxRequestsPerSecond": 1
        }
      ],

      "enabledManagers": [
        "flux",
        "kustomize",
        "kubernetes",
        "helm-values",
        "helmfile",
        "custom.regex",
        "github-actions",
        "renovate-config",
        "mise",
        "dockerfile",
        "docker-compose"
      ],

      "renovate-config": {
        "managerFilePatterns": ["/(^|/)\\.renovaterc\\.json5$/"]
      }
    }
