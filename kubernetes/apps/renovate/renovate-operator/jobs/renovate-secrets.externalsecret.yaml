---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-secrets
  namespace: renovate
spec:
  refreshInterval: 15m
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: renovate-secrets, creationPolicy: Owner}
  data:
    - {secretKey: RENOVATE_DOCKERHUB_TOKEN, remoteRef: {key: renovate/operator, property: RENOVATE_DOCKERHUB_TOKEN}}
    - {secretKey: RENOVATE_DOCKERHUB_USERNAME, remoteRef: {key: renovate/operator, property: RENOVATE_DOCKERHUB_USERNAME}}
    - {secretKey: RENOVATE_GITHUB_APP_ID, remoteRef: {key: renovate/operator, property: RENOVATE_GITHUB_APP_ID}}
    - {secretKey: RENOVATE_GITHUB_APP_INSTALLATION_ID, remoteRef: {key: renovate/operator, property: RENOVATE_GITHUB_APP_INSTALLATION_ID}}
    - {secretKey: RENOVATE_GITHUB_APP_PRIVATE_KEY, remoteRef: {key: renovate/operator, property: RENOVATE_GITHUB_APP_PRIVATE_KEY}}
