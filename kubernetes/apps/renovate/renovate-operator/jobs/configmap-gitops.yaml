---
apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-config-gitops
data:
  renovate.json: |-
    {
      "$schema": "https://docs.renovatebot.com/renovate-schema.json",
      "extends": [
        "config:recommended",
        ":dependencyDashboard",
        ":labels(dependencies)",
        ":configMigration",

        "docker:pinDigests",
        "helpers:pinGitHubActionDigests",
        ":pinDevDependencies",
        ":maintainLockFilesWeekly",

        "abandonments:recommended"
      ],

      "platform": "github",
      "autodiscover": false,
      "onboarding": true,
      "requireConfig": "optional",

      "timezone": "Europe/Amsterdam",

      "updateNotScheduled": false,
      "prConcurrentLimit": 4,
      "prHourlyLimit": 0,

      "branchConcurrentLimit": 6,
      "commitBodyTable": true,
      "allowedCommands": ["^./scripts/update-oci-digests\\.sh$"],

      "rebaseWhen": "conflicted",
      "recreateWhen": "auto",
      "fetchChangeLogs": "off",

      "schedule": ["at any time"],

      "dependencyDashboard": true,
      "dependencyDashboardAutoclose": true,
      "dependencyDashboardOSVVulnerabilitySummary": "unresolved",
      "osvVulnerabilityAlerts": true,

      "vulnerabilityAlerts": {
        "enabled": true,
        "labels": ["security"],
        "schedule": ["at any time"]
      },

      "hostRules": [
        {
          "matchHost": "api.github.com",
          "concurrentRequestLimit": 2,
          "maxRequestsPerSecond": 1
        }
      ],

      "enabledManagers": [
        "flux",
        "kustomize",
        "helm-values",
        "helmfile",
        "custom.regex",

        "github-actions",
        "pre-commit",

        "terraform",
        "terragrunt",

        "npm",
        "pip_requirements",
        "poetry",
        "pipenv",
        "gomod",
        "cargo",
        "maven",
        "gradle",
        "composer",
        "nuget",

        "dockerfile",
        "docker-compose"
      ],

      "ignorePaths": [
        "**/*.sops.yaml",
        "**/*.sops.yml",
        "bootstrap/**",
        "talos/**",
        ".github/workflows/flux-local.yaml",
        "kubeconfig",
        "github-push-token.txt",
        "github-deploy.key.pub"
      ],

      "packageRules": [
        {
          "matchManagers": ["flux"],
          "groupName": "Flux controllers & OCI artifacts",
          "separateMinorPatch": true,
          "pinDigests": true
        },
        {
          "description": "Disable digest-only Flux OCI chart updates. Renovate cannot reliably resolve digest-only updates for OCI Helm chart artifacts across all registries; version updates run scripts/update-oci-digests.sh before commit to pin the new tag to the registry manifest digest.",
          "matchManagers": ["flux"],
          "matchDatasources": ["docker"],
          "matchUpdateTypes": ["digest"],
          "enabled": false
        },
        {
          "description": "Automerge Flux OCI Helm chart patch updates (includes digest updates alongside version bumps)",
          "matchManagers": ["flux"],
          "matchUpdateTypes": ["patch"],
          "automerge": true,
          "automergeType": "pr",
          "schedule": ["at any time"]
        },
        {
          "description": "Disable Helmfile OCI Helm chart digest pinning (bootstrap-only, not GitOps-managed by Flux)",
          "matchManagers": ["helmfile"],
          "matchDatasources": ["docker"],
          "matchUpdateTypes": ["pinDigest", "digest"],
          "pinDigests": false,
          "enabled": false
        },
        {
          "matchManagers": ["helm-values", "kustomize"],
          "matchDatasources": ["docker"],
          "groupName": "GitOps container images",
          "pinDigests": true
        },
        {
          "description": "Helm charts that use a dedicated sha: field for digest pinning (e.g. kube-prometheus-stack). Renovate updates the sha: field directly via customManagers; do not also embed digest inline in tag: which causes a double-digest InvalidImageName error.",
          "matchManagers": ["helm-values"],
          "matchPackageNames": [
            "quay.io/prometheus-operator/prometheus-operator",
            "quay.io/prometheus-operator/prometheus-config-reloader",
            "quay.io/prometheus/prometheus",
            "quay.io/prometheus/alertmanager"
          ],
          "matchUpdateTypes": ["pinDigest", "digest"],
          "enabled": false
        },
        {
          "matchManagers": ["github-actions"],
          "groupName": "GitHub Actions",
          "automerge": false
        },
        {
          "matchManagers": ["pre-commit"],
          "groupName": "pre-commit hooks"
        },
        {
          "matchManagers": ["terraform", "terragrunt"],
          "groupName": "Terraform",
          "separateMinorPatch": true
        },
        {
          "matchManagers": ["npm"],
          "groupName": "npm",
          "rangeStrategy": "replace"
        },
        {
          "matchManagers": ["pip_requirements", "poetry", "pipenv"],
          "groupName": "python"
        },
        {
          "matchManagers": ["gomod"],
          "groupName": "go modules"
        },
        {
          "matchManagers": ["cargo"],
          "groupName": "rust crates"
        },
        {
          "matchManagers": ["maven", "gradle"],
          "groupName": "jvm"
        },
        {
          "matchManagers": ["composer"],
          "groupName": "php composer"
        },
        {
          "matchManagers": ["nuget"],
          "groupName": "dotnet"
        },
        {
          "matchManagers": ["dockerfile", "docker-compose"],
          "matchDatasources": ["docker"],
          "groupName": "application container images",
          "pinDigests": true
        },
        {
          "matchUpdateTypes": ["major"],
          "labels": ["major"],
          "dependencyDashboardApproval": true
        },
        {
          "matchUpdateTypes": ["patch"],
          "matchDepTypes": ["dependencies"],
          "automerge": true,
          "schedule": ["at any time"]
        },
        {
          "matchDepTypes": ["devDependencies"],
          "groupName": "dev-only deps",
          "automerge": true,
          "automergeType": "pr"
        },
        {
          "matchPackageNames": ["@types/**"],
          "groupName": "typescript types",
          "automerge": true
        }
      ]
    }
