---
# renovate-webhook-auth now sourced from OpenBao. Replaces webhook-auth.secret.sops.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-webhook-auth
  namespace: renovate
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: renovate-webhook-auth, creationPolicy: Owner}
  data:
    - secretKey: token
      remoteRef: {key: renovate/webhook-auth, property: token}
