---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate-github-app-token
  namespace: renovate
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: renovate-github-app-token
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          initContainers:
            - name: mint-token
              image: ghcr.io/mshekow/github-app-installation-token:2026.07.21@sha256:472c05105b8c463d8bf149f8e5ad909664cc7a97945cb52e01a2c6438297cd7e
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: renovate-secrets
              env:
                - name: GITHUB_API
                  valueFrom:
                    secretKeyRef:
                      name: renovate-secrets
                      key: RENOVATE_GITHUB_API
                      optional: true
                # Harbor robot for the PRIVATE webgrip project (first-party charts:
                # ploeg, erfbeeld). optional: the hostRule is simply omitted until the
                # renovate-harbor-robot ExternalSecret has synced.
                - name: HARBOR_HOST
                  value: harbor.${SECRET_DOMAIN}
                - name: HARBOR_ROBOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: renovate-harbor-robot
                      key: HARBOR_ROBOT_USER
                      optional: true
                - name: HARBOR_ROBOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-harbor-robot
                      key: HARBOR_ROBOT_TOKEN
                      optional: true
              command:
                - /bin/sh
                - -ceu
                - |
                  : "${RENOVATE_GITHUB_APP_ID:?missing RENOVATE_GITHUB_APP_ID}"
                  : "${RENOVATE_GITHUB_APP_INSTALLATION_ID:?missing RENOVATE_GITHUB_APP_INSTALLATION_ID}"

                  if [ ! -s /secrets/private-key.txt ]; then
                    echo "missing private key file (/secrets/private-key.txt)" >&2
                    exit 1
                  fi

                  node index.js \
                    "$RENOVATE_GITHUB_APP_ID" \
                    "$RENOVATE_GITHUB_APP_INSTALLATION_ID" \
                    /secrets/private-key.txt \
                    "${GITHUB_API:-https://api.github.com}" \
                    > /work/token

                  if [ ! -s /work/token ]; then
                    echo "failed to mint installation token" >&2
                    exit 1
                  fi

                  node - <<'EOF'
                  const fs = require('node:fs');

                  const token = fs.readFileSync('/work/token', 'utf8').trim();
                  const dockerHubUsername = process.env.RENOVATE_DOCKERHUB_USERNAME;
                  const dockerHubToken = process.env.RENOVATE_DOCKERHUB_TOKEN;

                  if ((dockerHubUsername || dockerHubToken) && !(dockerHubUsername && dockerHubToken)) {
                    console.error('set both RENOVATE_DOCKERHUB_USERNAME and RENOVATE_DOCKERHUB_TOKEN');
                    process.exit(1);
                  }

                  const hostRules = [
                    {
                      matchHost: 'ghcr.io',
                      hostType: 'docker',
                      username: 'x-access-token',
                      password: token,
                    },
                  ];

                  if (dockerHubUsername && dockerHubToken) {
                    hostRules.push({
                      matchHost: 'docker.io',
                      hostType: 'docker',
                      username: dockerHubUsername,
                      password: dockerHubToken,
                    });
                  }

                  const harborHost = process.env.HARBOR_HOST;
                  const harborUser = process.env.HARBOR_ROBOT_USER;
                  const harborToken = process.env.HARBOR_ROBOT_TOKEN;

                  if ((harborUser || harborToken) && !(harborUser && harborToken)) {
                    console.error('set both HARBOR_ROBOT_USER and HARBOR_ROBOT_TOKEN');
                    process.exit(1);
                  }

                  if (harborHost && harborUser && harborToken) {
                    hostRules.push({
                      matchHost: harborHost,
                      hostType: 'docker',
                      username: harborUser,
                      password: harborToken,
                    });
                  }

                  fs.writeFileSync('/work/host-rules.json', JSON.stringify(hostRules));
                  EOF
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - "ALL"
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 256Mi
              volumeMounts:
                - name: work
                  mountPath: /work
                - name: tmp
                  mountPath: /tmp
                - name: github-app-private-key
                  mountPath: /secrets
                  readOnly: true
          containers:
            - name: apply-secret
              image: docker.io/alpine/k8s:1.36.2@sha256:44ef4942e171939b9c665a4a84beb80e2dcdb9a24330d4651cfdfd2e9deecc47
              imagePullPolicy: IfNotPresent
              env:
                - name: RUNTIME_SECRET_NAME
                  value: renovate-runtime-token
                - name: RUNTIME_SECRET_KEY
                  value: token
              command:
                - /bin/sh
                - -ceu
                - |
                  token="$(cat /work/token)"

                  kubectl -n renovate create secret generic "$RUNTIME_SECRET_NAME" \
                    --from-literal="$RUNTIME_SECRET_KEY=$token" \
                    --from-literal="RENOVATE_TOKEN=$token" \
                    --from-file="RENOVATE_HOST_RULES=/work/host-rules.json" \
                    --dry-run=client \
                    -o yaml \
                    | kubectl apply -f -

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - "ALL"
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 256Mi
              volumeMounts:
                - name: work
                  mountPath: /work

          volumes:
            - name: work
              emptyDir: {}
            - name: tmp
              emptyDir: {}
            - name: github-app-private-key
              secret:
                secretName: renovate-secrets
                items:
                  - key: RENOVATE_GITHUB_APP_PRIVATE_KEY
                    path: private-key.txt
