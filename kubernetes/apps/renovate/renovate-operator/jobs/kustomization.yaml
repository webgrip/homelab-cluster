---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./configmap-gitops.yaml

  - ./job-cleanup.cronjob.yaml

  - ./renovate-secrets.externalsecret.yaml
  - ./renovate-secrets.pushsecret.yaml
  - ./renovate-webhook-auth.externalsecret.yaml
  - ./renovate-webhook-auth.pushsecret.yaml

  - ./webgrip-gitops.yaml

  # --- Renovate → Forgejo migration (dual-run). RFC: architecture/rfc-renovate-forgejo.md ---
  # Validated and ready, kept DORMANT until the human-only prerequisites are met:
  #   1. Forgejo `renovate` bot user + scoped PAT; bot email = renovate@${SECRET_DOMAIN}.
  #   2. GitHub read:packages PAT for ghcr.io/webgrip/*.
  #   3. bao kv put secret/renovate/forgejo RENOVATE_TOKEN=… RENOVATE_HOST_RULES='[…]'
  #      (exact command in renovate-forgejo-token.externalsecret.yaml).
  #   4. De-mirror the pilot repo and set it in webgrip-forgejo.yaml discoveryFilters.
  # Then uncomment to activate. See docs/techdocs/docs/renovate-forgejo-migration.md.
  # - ./renovate-forgejo-token.externalsecret.yaml
  # - ./configmap-forgejo.yaml
  # - ./webgrip-forgejo.yaml

  - ./arc-runner-renovate-rbac.yaml
  - ./github-app-token.rbac.yaml
  - ./github-app-token.cronjob.yaml
