---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./configmap-gitops.yaml

  - ./job-cleanup.cronjob.yaml

  - ./renovate-secrets.externalsecret.yaml
  - ./renovate-secrets.pushsecret.yaml
  - ./renovate-webhook-auth.externalsecret.yaml
  - ./renovate-webhook-auth.pushsecret.yaml

  - ./webgrip-gitops.yaml

  # --- Renovate → Forgejo migration: runtime (dual-run). RFC: architecture/rfc-renovate-forgejo.md ---
  # The bot + token + pilot repo are provisioned by a separate, gated, force:true Kustomization
  # (../ks-forgejo-provisioner.yaml → ../forgejo-provisioner/, a Tier-1 do-once Job per ADR-0019) —
  # kept out of this shared ks so the GitHub renovate path never depends on Forgejo. These two are
  # the steady-state runtime, consuming the Secret the provisioner mints.
  # See docs/techdocs/docs/renovate-forgejo-migration.md.
  - ./configmap-forgejo.yaml
  - ./webgrip-forgejo.yaml

  - ./arc-runner-renovate-rbac.yaml
  - ./github-app-token.rbac.yaml
  - ./github-app-token.cronjob.yaml
