---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./configmap-gitops.yaml

  - ./job-cleanup.cronjob.yaml

  - ./renovate-secrets.externalsecret.yaml
  - ./renovate-secrets.pushsecret.yaml
  - ./renovate-webhook-auth.externalsecret.yaml
  - ./renovate-webhook-auth.pushsecret.yaml

  - ./webgrip-gitops.yaml

  # --- Renovate → Forgejo migration (dual-run). RFC: architecture/rfc-renovate-forgejo.md ---
  # Zero-touch: the provisioner CronJob creates the bot user, mints the scoped token into
  # renovate-forgejo-token, and seeds the throwaway pilot repo — all idempotently. The only
  # prerequisite is OpenBao path forgejo/admin (already present, used by the forgejo app).
  # GHCR auth reuses the GitHub-App minter's host-rules (renovate-runtime-token).
  # Kept DORMANT to keep the cluster quiet; to activate: uncomment, then kick a one-off run:
  #   kubectl -n renovate create job --from=cronjob/renovate-forgejo-provisioner provision-now
  # See docs/techdocs/docs/renovate-forgejo-migration.md.
  # - ./renovate-forgejo-admin.externalsecret.yaml
  # - ./renovate-forgejo-bot-password.externalsecret.yaml
  # - ./forgejo-bot-provisioner.rbac.yaml
  # - ./forgejo-bot-provisioner.cronjob.yaml
  # - ./configmap-forgejo.yaml
  # - ./webgrip-forgejo.yaml

  - ./arc-runner-renovate-rbac.yaml
  - ./github-app-token.rbac.yaml
  - ./github-app-token.cronjob.yaml
