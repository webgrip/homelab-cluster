---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
spec:
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    # Burstable, not BestEffort — the Talos PSI OOM controller strikes BestEffort
    # first (killed alongside the CNPG DBs on fringe, 2026-07-11 01:27).
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 256Mi
    nodeSelector:
      node.webgrip.io/pool: worker
    tolerations:
      - key: dedicated
        operator: Equal
        value: fringe
        effect: NoSchedule
    fullnameOverride: renovate-operator
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    webhook:
      enabled: true
      route:
        enabled: true
        hostnames:
          - renovate-webhook.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
    route:
      enabled: false
