---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: renovate

components:
  - ../../components/sops

resources:
  - ./namespace.yaml
  - ./renovate-operator/ks.yaml
  - ./renovate-operator/ks-jobs.yaml
  # Renovate → Forgejo bot/token/pilot provisioner (Tier-1 do-once Job, ADR-0003).
  # Paired with the runtime block in renovate-operator/jobs/kustomization.yaml.
  - ./renovate-operator/ks-forgejo-provisioner.yaml
