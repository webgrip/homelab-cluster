---
# SEARXNG_SECRET is pure session/CSRF entropy (nothing encrypted at rest), so it is
# generated in-cluster once and never rotated. Replaces secret.sops.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: searxng-secrets
  namespace: searxng
spec:
  refreshInterval: "0" # generate once, never rotate
  target:
    name: searxng-secrets # exact name consumed by the HelmRelease envFrom.secretRef
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator
      rewrite:
        - regexp:
            source: "password"
            target: "SEARXNG_SECRET"
