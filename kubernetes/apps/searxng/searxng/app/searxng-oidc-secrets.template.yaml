---
# Plaintext template for SearXNG OIDC secrets.
#
# SOPS policy: do NOT commit this file with real values.
#
# How to use:
# 1) After the Authentik blueprint creates the SearXNG OIDC provider,
#    get the client ID and secret from: Authentik Admin → Applications → SearXNG → Provider
# 2) Fill in the values below
# 3) Encrypt with SOPS into: searxng-oidc-secrets.sops.yaml
# 4) Add the encrypted file to: kubernetes/apps/searxng/searxng/app/kustomization.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: searxng-oidc-secrets
  namespace: searxng
type: Opaque
stringData:
  SEARXNG_OAUTH_CLIENT_ID: "<from-authentik>"
  SEARXNG_OAUTH_CLIENT_SECRET: "<from-authentik>"
