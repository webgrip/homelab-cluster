---
# Dedicated Valkey for the LiteLLM proxy (mirrors the proven searxng-valkey
# manifest, plus AUTH). What it carries:
#   - virtual-key auth cache (litellm_settings.enable_redis_auth_cache)
#   - router tpm/rpm counters + cooldown state (router_settings.redis_*)
#   - opt-in response cache (litellm_settings.cache_params, mode: default_off)
# All of it is reconstructable, so: Deployment + emptyDir, no PVC. Password via
# requirepass because the ai namespace has no default-deny netpol — an open
# cache would let any pod poison LLM responses. $(VALKEY_PASSWORD) is kubelet
# env expansion (NOT Flux ${...} substitution — safe under postBuild).
# volatile-lru (not allkeys-lru): only TTL'd cache entries may be evicted under
# memory pressure, never un-TTL'd router/limit state.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-valkey
  labels:
    app.kubernetes.io/name: litellm-valkey
    app.kubernetes.io/part-of: litellm
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-valkey
  labels:
    app.kubernetes.io/name: litellm-valkey
    app.kubernetes.io/part-of: litellm
spec:
  selector:
    app.kubernetes.io/name: litellm-valkey
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-valkey
  labels:
    app.kubernetes.io/name: litellm-valkey
    app.kubernetes.io/part-of: litellm
spec:
  replicas: 1
  strategy:
    type: Recreate # single cache instance; no point running two during rollout
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm-valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-valkey
        app.kubernetes.io/part-of: litellm
      annotations:
        reloader.stakater.com/auto: "true" # restart if the AUTH secret rotates
    spec:
      serviceAccountName: litellm-valkey
      automountServiceAccountToken: false
      nodeSelector:
        node.webgrip.io/pool: worker # ADR-0002 — off the soyo control planes
        # ram: high = worker-1, co-located with the litellm app it caches for
        # (and off the memory-saturated fringe workstation) — VIK-331 slice 1.
        node.webgrip.io/ram: high
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: harbor.webgrip.dev/dockerhub/valkey/valkey:9.1.0@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-valkey
                  key: password
          args:
            - "--requirepass"
            - "$(VALKEY_PASSWORD)"
            - "--save"
            - ""
            - "--appendonly"
            - "no"
            - "--maxmemory"
            - "192mb"
            - "--maxmemory-policy"
            - "volatile-lru"
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - "ALL"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
