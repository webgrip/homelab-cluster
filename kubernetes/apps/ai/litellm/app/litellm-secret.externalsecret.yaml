---
# LiteLLM admin + provider credentials, sourced from OpenBao (seed once — see the
# app runbook / hand-over). LITELLM_MASTER_KEY mints virtual keys; ANTHROPIC_API_KEY
# is the upstream provider credential (real billing) the plane meters.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: litellm-secret
    creationPolicy: Owner
  data:
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: litellm
        property: LITELLM_MASTER_KEY
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: litellm
        property: ANTHROPIC_API_KEY
