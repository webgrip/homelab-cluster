---
# Valkey AUTH password, generated in-cluster (never human-known). The ai namespace
# has no default-deny NetworkPolicy yet, so requirepass is what stops any other
# pod from reading/poisoning the LLM response cache or rate-limit counters.
# Consumed by both the valkey container (requirepass) and the litellm app
# container (REDIS_PASSWORD).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-valkey
spec:
  refreshInterval: "0" # generate once; rotation would need a coordinated restart of both pods
  target:
    name: litellm-valkey
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator
