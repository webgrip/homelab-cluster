---
# Runtime monkeypatches for the litellm interpreter (sitecustomize.py is
# auto-imported by Python at startup). TWO stopgaps live here; each names its
# removal condition. Mounted into the venv's site-packages via subPath.
#
# PATCH 1 — SSO timeout (2026-07-15): litellm's Admin UI SSO uses fastapi-sso,
# which constructs `httpx.AsyncClient()` with NO timeout override in
# process_login (upstream source: tomasvotava/fastapi-sso sso/base.py) —
# that binds httpx's hardcoded 5.0s library default, with no constructor
# param/env var exposed to raise it. Authentik's real token exchange (code
# validate + group lookup + the litellm_role scope mapping + JWT sign + DB
# write) is intermittently exceeding 5s because authentik-server is pinned
# to the chronically memory-pressured fringe-workstation node (can't spread
# — shared RWO volume, roadmap #47) — see the fringe-workstation
# memory-pressure-incidents memory. Until that's resolved, every SSO login
# 500s with httpx.ReadTimeout.
#
# This patches ONLY the default: httpx.AsyncClient calls that already pass
# an explicit timeout (e.g. litellm's own LLM-provider httpx handlers) are
# untouched. sitecustomize.py is auto-imported by Python at interpreter
# startup from any dir on sys.path — mounted straight into the venv's
# site-packages via subPath so it doesn't shadow the rest of the directory.
# Remove this once fringe-workstation's load is resolved (or fastapi-sso
# ships a configurable timeout) — it isn't a real fix, just a wider net.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-runtime-patches
data:
  sitecustomize.py: |-
    import httpx

    _orig_init = httpx.AsyncClient.__init__

    def _patched_init(self, *args, **kwargs):
        if "timeout" not in kwargs:
            kwargs["timeout"] = httpx.Timeout(30.0)
        _orig_init(self, *args, **kwargs)

    httpx.AsyncClient.__init__ = _patched_init

    # PATCH 2 — MCP protocol-version cap (2026-07-18, VIK-263/VIK-314):
    # supergateway 3.4.3 (the mcp-vikunja bridge) ECHOES whatever
    # protocolVersion the client proposes in initialize — even ones it does
    # not support, like the mcp SDK's 2025-11-25 — instead of negotiating
    # down to its own maximum. The SDK then stamps that echoed version on
    # follow-up requests (MCP-Protocol-Version header), and supergateway's
    # header validation 400s it: "Unsupported protocol version (supported:
    # 2025-06-18, 2025-03-26, 2024-11-05, 2024-10-07)". Capping the client's
    # proposal at 2025-06-18 (supergateway's max, verified live) is
    # spec-compliant for every registered MCP server. Remove when
    # supergateway negotiates properly (upstream bug) or the SDK tolerates
    # the rejection.
    try:
        import mcp.types as _mcp_types
        _mcp_types.LATEST_PROTOCOL_VERSION = "2025-06-18"
    except Exception:
        pass
