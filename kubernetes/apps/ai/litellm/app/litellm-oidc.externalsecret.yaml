---
# LiteLLM Admin UI SSO — the OIDC client secret, read back from OpenBao
# (secret/litellm/oidc, mirrored there by the authentik-side PushSecret) and
# exposed to the proxy as GENERIC_CLIENT_SECRET. The non-secret half of the SSO
# config (client id, PROXY_BASE_URL, Authentik authorize/token/userinfo endpoints,
# scope, role attribute) is set directly in the HelmRelease env.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-oidc
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: litellm-oidc
    creationPolicy: Owner
  data:
    - secretKey: GENERIC_CLIENT_SECRET
      remoteRef:
        key: litellm/oidc
        property: client_secret
