---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  chartRef:
    kind: OCIRepository
    name: litellm
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true" # restart on ESO/config rotation
        pod:
          nodeSelector:
            node.webgrip.io/pool: worker # ADR-0002 — off the soyo control planes
          securityContext:
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm-database
              tag: v1.83.7-stable@sha256:44b7a2ac44889134cd9c52f0fa11a15db8ef45c470e657ab561981195fe31c72
            # The -database image runs `prisma migrate deploy` against DATABASE_URL
            # at startup, then serves the proxy on :4000 with our mounted config.
            args:
              - "--config"
              - "/etc/litellm/config.yaml"
              - "--port"
              - "4000"
            env:
              STORE_MODEL_IN_DB: "True"
              LITELLM_LOG: "INFO"
              # --- Admin UI SSO via Authentik (generic OIDC). Non-secret half;
              # the client secret arrives via envFrom (litellm-oidc ExternalSecret).
              # Callback is <PROXY_BASE_URL>/sso/callback — registered as the strict
              # redirect_uri in Authentik blueprint 38-oidc-litellm. Free tier allows
              # SSO for up to 5 users (Enterprise-gated beyond that). ---
              PROXY_BASE_URL: "https://litellm.${SECRET_DOMAIN}"
              GENERIC_CLIENT_ID: litellm
              GENERIC_AUTHORIZATION_ENDPOINT: "https://authentik.${SECRET_DOMAIN}/application/o/authorize/"
              GENERIC_TOKEN_ENDPOINT: "https://authentik.${SECRET_DOMAIN}/application/o/token/"
              GENERIC_USERINFO_ENDPOINT: "https://authentik.${SECRET_DOMAIN}/application/o/userinfo/"
              # litellm_role is the custom scope/claim emitted by the blueprint's
              # role scope mapping; GENERIC_USER_ROLE_ATTRIBUTE tells LiteLLM to read
              # it, elevating homelab-admins to proxy_admin (everyone else internal_user).
              GENERIC_SCOPE: "openid email profile litellm_role"
              GENERIC_USER_ROLE_ATTRIBUTE: litellm_role
              # Connection string for the keys/spend ledger — the whole point of
              # ADR-0044 (budgets + per-key spend). Sourced from the CNPG-generated
              # secret, never inlined.
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: litellm-db-app
                    key: uri
            # LITELLM_MASTER_KEY + ANTHROPIC_API_KEY (ESO → OpenBao secret/litellm).
            # GENERIC_CLIENT_SECRET (Admin UI SSO) from the litellm-oidc ExternalSecret.
            envFrom:
              - secretRef:
                  name: litellm-secret
              - secretRef:
                  name: litellm-oidc
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - "ALL"
            resources:
              requests:
                cpu: 50m
                # LiteLLM's boot (prisma migrate + provider-SDK imports) spikes
                # well past steady-state (~500Mi). A 1Gi limit OOMKilled it mid-boot
                # (exit 137) before it could bind :4000. 2Gi covers the spike;
                # worker-1 has ~13Gi free so the modest request keeps it schedulable.
                memory: 640Mi
              limits:
                memory: 2Gi
            probes:
              # Decouple slow boot from liveness: the startup probe grants ~5 min
              # for prisma migrate + first listen before liveness/readiness engage.
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/liveliness
                    port: 4000
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/liveliness
                    port: 4000
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/readiness
                    port: 4000
                  initialDelaySeconds: 45
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 3
    service:
      app:
        controller: litellm
        ports:
          http:
            port: 4000
    persistence:
      config:
        type: configMap
        name: litellm-config
        globalMounts:
          - path: /etc/litellm
            readOnly: true
