---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  chartRef:
    kind: OCIRepository
    name: litellm
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true" # restart on ESO/config rotation
        pod:
          nodeSelector:
            node.webgrip.io/pool: worker # ADR-0002 — off the soyo control planes
          securityContext:
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm-database
              tag: v1.83.7-stable@sha256:44b7a2ac44889134cd9c52f0fa11a15db8ef45c470e657ab561981195fe31c72
            # The -database image runs `prisma migrate deploy` against DATABASE_URL
            # at startup, then serves the proxy on :4000 with our mounted config.
            args:
              - "--config"
              - "/etc/litellm/config.yaml"
              - "--port"
              - "4000"
            env:
              STORE_MODEL_IN_DB: "True"
              LITELLM_LOG: "INFO"
              # Connection string for the keys/spend ledger — the whole point of
              # ADR-0044 (budgets + per-key spend). Sourced from the CNPG-generated
              # secret, never inlined.
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: litellm-db-app
                    key: uri
            # LITELLM_MASTER_KEY + ANTHROPIC_API_KEY (ESO → OpenBao secret/litellm).
            envFrom:
              - secretRef:
                  name: litellm-secret
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - "ALL"
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/liveliness
                    port: 4000
                  initialDelaySeconds: 45
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/readiness
                    port: 4000
                  initialDelaySeconds: 45
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 3
    service:
      app:
        controller: litellm
        ports:
          http:
            port: 4000
    persistence:
      config:
        type: configMap
        name: litellm-config
        globalMounts:
          - path: /etc/litellm
            readOnly: true
