---
# Drain-endpoint token (VIK-277), generated in-cluster (never human-known).
# Authenticates the graceful-drain call that stops new work before the
# Recreate strategy cuts long agent streams. Consumed by the litellm app
# container as DRAIN_ENDPOINT_TOKEN (config: general_settings.drain_endpoint_token).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-drain
spec:
  refreshInterval: "0" # generate once; the token has no at-rest data to corrupt
  target:
    name: litellm-drain
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: password-generator
