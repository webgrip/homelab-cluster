---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  # LiteLLM proxy configuration — the metered inference plane (ADR-0044).
  # Carries NO secrets: os.environ/* is resolved at runtime from the pod env
  # (ANTHROPIC_API_KEY + DEEPSEEK_API_KEY + LITELLM_MASTER_KEY from the
  # litellm-secret ExternalSecret; DATABASE_URL from the CNPG secret).
  # Mounted at /etc/litellm/config.yaml.
  config.yaml: |-
    # ⚠️ Verify model IDs against the current provider API catalogs — the `model:`
    # string must be a real upstream model. The proxy starts regardless; a
    # model is only contacted when a request names it. Add/rename freely.
    model_list:
      - model_name: claude-opus-4-8
        litellm_params:
          model: anthropic/claude-opus-4-8
          api_key: os.environ/ANTHROPIC_API_KEY
      - model_name: claude-sonnet-5
        litellm_params:
          model: anthropic/claude-sonnet-5
          api_key: os.environ/ANTHROPIC_API_KEY
      - model_name: claude-haiku-4-5
        litellm_params:
          model: anthropic/claude-haiku-4-5
          api_key: os.environ/ANTHROPIC_API_KEY
      - model_name: deepseek-chat
        litellm_params:
          model: deepseek/deepseek-chat
          api_key: os.environ/DEEPSEEK_API_KEY
      - model_name: deepseek-reasoner
        litellm_params:
          model: deepseek/deepseek-reasoner
          api_key: os.environ/DEEPSEEK_API_KEY

    general_settings:
      # Admin credential used to mint virtual keys (per-dev / per-agent / per-task)
      # with hard max_budget + tpm/rpm. Resolved from env at runtime.
      master_key: os.environ/LITELLM_MASTER_KEY
      # --- VIK-262: models come ONLY from git. DB-backed object loading is
      # limited to MCP registrations, so an Admin-UI-added model can't bypass
      # review; keys without an explicit MCP grant get an empty tool surface
      # (deny-by-default, set BEFORE real MCP servers are registered). ---
      supported_db_objects: ["mcp"]
      require_key_mcp_access_defined: true
      # --- VIK-277: proxy self-protection against agent stampedes.
      # NOTE: max_request_size_mb turned out Enterprise-gated in OSS (logged
      # "not checking … enterprise only" per request) — removed; a body-size
      # cap must come from the gateway layer instead (roadmap #16). An 11MB
      # body reproducibly crashed the app container (probe, 2026-07-18). ---
      global_max_parallel_requests: 100
      cancel_on_disconnect: true
      # Graceful restarts: token-authed drain stops new work before the
      # Recreate cut. Token is generator-minted (litellm-drain ExternalSecret).
      enable_drain_endpoint: true
      drain_endpoint_token: os.environ/DRAIN_ENDPOINT_TOKEN
      # --- VIK-279: ledger growth bounded on the 10Gi CNPG volume; spend
      # writes buffered through Valkey instead of hitting CNPG per-request.
      # Prompt posture (recorded decision 2026-07-18): store_prompts_in_spend_logs
      # stays OFF (default, privacy-lean) — flip deliberately if agent-traffic
      # audit needs it. disable_error_logs stays false (errors are ledger
      # value). proxy_batch_write_at reviewed: default is fine. ---
      maximum_spend_logs_retention_period: "90d"
      maximum_spend_logs_retention_interval: "1d"
      use_redis_transaction_buffer: true
      # --- VIK-282: admin-surface hardening — the master key never round-trips
      # UI flows; login goes straight to Authentik. Deferred (recorded):
      # allowed_routes until usage settles; service_account_settings arrives
      # with the identity provisioner (VIK-264); custom_key_generate +
      # alias-format validation are provisioner-side policy instead. ---
      disable_master_key_return: true
      auto_redirect_ui_login_to_sso: true
      # --- VIK-278: Claude-native clients through the proxy — forward
      # anthropic-beta etc. so beta features survive the hop; streaming
      # clients get live token counts.
      # use_chat_completions_url_for_anthropic_messages stays unset
      # (only-if-bitten, recorded). ---
      forward_client_headers_to_llm_api: true
      always_include_stream_usage: true
      # --- VIK-280 (owner-approved 2026-07-18): inference survives short CNPG
      # blips; accepted trade-off — keys are unverifiable during the window
      # (LAN-only cluster; the Valkey auth cache covers recently-seen keys).
      # Socket/pool bounds respect the 384Mi CNPG instance; connect-timeout
      # defaults reviewed as fine. ---
      allow_requests_on_db_unavailable: true
      database_socket_timeout: 30
      database_connection_pool_limit: 20

    litellm_settings:
      # Drop provider-unsupported params instead of erroring — keeps heterogeneous
      # clients (opencode, Claude Code, scripts) working through one endpoint.
      drop_params: true
      # --- VIK-260: the GitOps budget backstop — any user/team created OUTSIDE
      # an explicit spec (stray SSO login, future JWT team upsert) still lands
      # under a ceiling. Units are USD (provider billing currency); amounts are
      # an owner dial, deliberately modest. ---
      max_internal_user_budget: 10
      internal_user_budget_duration: "30d"
      default_team_params:
        max_budget: 25
        budget_duration: "30d"
        tpm_limit: 100000
        rpm_limit: 500
      # --- VIK-277: hang protection + log hygiene. request_timeout caps the
      # absurd 6000s default; json_logs makes VictoriaLogs field extraction
      # clean; the HF-tokenizer flag kills a runtime egress dependency. ---
      request_timeout: 600
      json_logs: true
      disable_hf_tokenizer_download: true
      # --- VIK-282: no anonymous keys — every mint carries an alias so the
      # spend ledger stays attributable. ---
      key_generation_settings:
        team_key_generation:
          required_params: ["key_alias"]
        personal_key_generation:
          required_params: ["key_alias"]
      # Persist request/spend rows to the CNPG ledger (DATABASE_URL) — the
      # dollars-per-key record ADR-0044 exists for. NOTE: OSS LiteLLM exposes no
      # Prometheus /metrics endpoint (Enterprise-gated); a ledger→VictoriaMetrics
      # exporter is the tracked follow-up. Data lands in the DB regardless.
      success_callback: ["postgres"]
      failure_callback: ["postgres"]
      # --- Valkey (redis-protocol, litellm-valkey.yaml). mode: default_off =
      # response caching is OPT-IN per request (body: {"cache": {"use-cache":
      # true}}) so agents never get surprise-stale completions; the always-on
      # wins are the auth cache below and the router counters in
      # router_settings. REDIS_* env comes from the litellm-valkey secret. ---
      cache: true
      cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: os.environ/REDIS_PORT
        password: os.environ/REDIS_PASSWORD
        mode: default_off
        ttl: 86400
      # Virtual-key auth lookups served from Valkey instead of a Postgres
      # round-trip per request (requires cache: true + type: redis).
      enable_redis_auth_cache: true

    router_settings:
      # Shared tpm/rpm counters + cooldown state in Valkey. Single replica today,
      # so this is future-proofing for a second replica — but provider budgets
      # and accurate rate-limit windows already benefit from surviving restarts.
      redis_host: os.environ/REDIS_HOST
      redis_port: os.environ/REDIS_PORT
      redis_password: os.environ/REDIS_PASSWORD
      # --- VIK-277: retry provider flakes, never auth/client errors; pre-call
      # checks reject over-context-window requests before tokens are spent. ---
      num_retries: 2
      retry_policy:
        TimeoutErrorRetries: 2
        RateLimitErrorRetries: 3
        InternalServerErrorRetries: 2
        AuthenticationErrorRetries: 0
        BadRequestErrorRetries: 0
        ContentPolicyViolationErrorRetries: 0
      enable_pre_call_checks: true
      # --- VIK-266: resilience. Cross-provider fallbacks per group; TTFT/
      # mid-stream freeze detectors (generous — hang detection, not slowness
      # police); hard USD/day provider caps (owner-approved 2026-07-18:
      # 5 anthropic / 2 deepseek) enforced by the router_budget_limiting
      # pre-call check on Valkey state. Cooldowns DISABLED (recorded): every
      # group is single-deployment — cooling the only deployment is a
      # self-inflicted outage; revisit at deployment #2.
      # content_policy_fallbacks deliberately NOT configured (owner-decided
      # 2026-07-18): refusals surface to the caller, never routed around via
      # the other provider. prompt_caching affinity is a no-op while groups
      # are single-deployment — set now for the day one gains #2. ---
      fallbacks:
        - claude-opus-4-8: ["claude-sonnet-5", "deepseek-chat"]
        - claude-sonnet-5: ["deepseek-chat"]
        - claude-haiku-4-5: ["deepseek-chat"]
        - deepseek-chat: ["claude-haiku-4-5"]
        - deepseek-reasoner: ["claude-sonnet-5"]
      default_fallbacks: ["deepseek-chat"]
      ttft_timeout: 60
      stream_idle_timeout: 120
      disable_cooldowns: true
      optional_pre_call_checks: ["router_budget_limiting", "prompt_caching"]
      provider_budget_config:
        anthropic:
          budget_limit: 5
          time_period: "1d"
        deepseek:
          budget_limit: 2
          time_period: "1d"
      # --- VIK-278: legacy/hardcoded model names resolve to current
      # deployments instead of 404ing. ---
      model_group_alias:
        claude-opus: claude-opus-4-8
        claude-sonnet: claude-sonnet-5
        claude-haiku: claude-haiku-4-5
        claude-3-5-sonnet-latest: claude-sonnet-5
        claude-3-5-haiku-latest: claude-haiku-4-5
