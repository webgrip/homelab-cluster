---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: litellm-db
spec:
  dependsOn:
    - name: cloudnative-pg
      namespace: cnpg-system
    # The database layer now carries the grafana_ro ExternalSecret/PushSecret pair.
    - name: external-secrets-stores
      namespace: security
  interval: 1h
  path: ./kubernetes/apps/ai/litellm/app/database
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 20m
  wait: true
