---
apiVersion: v1
kind: Namespace
metadata:
  name: ai
  labels:
    webgrip.io/owner: platform
    webgrip.io/tier: app
    webgrip.io/exposure: internal
    # NOTE: intentionally NOT opting into kyverno-generated default-deny yet
    # (no `kyverno.io/default-network-policies` label): the LiteLLM proxy needs
    # egress to the upstream provider API (api.anthropic.com) and consumers reach
    # it over the LAN. Zero-trust hardening (default-deny + explicit egress to the
    # provider + allow-from-consumers) is a tracked follow-up — see ADR-0044 /
    # rfc-dark-factory. Until then this namespace is open like the pre-zero-trust apps.
