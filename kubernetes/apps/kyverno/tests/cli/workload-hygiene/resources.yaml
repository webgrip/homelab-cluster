apiVersion: v1
kind: Namespace
metadata:
  name: app
  labels:
    kubernetes.io/metadata.name: app
---
apiVersion: v1
kind: Pod
metadata:
  name: missing-digest
  namespace: app
spec:
  containers:
    - name: app
      image: ghcr.io/acme/app:1.0.0
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: latest-digest
  namespace: app
spec:
  containers:
    - name: app
      image: ghcr.io/acme/app:latest@sha256:eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee
      readinessProbe:
        httpGet:
          path: /ready
          port: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: unapproved-registry
  namespace: app
spec:
  containers:
    - name: app
      image: registry.example.com/acme/app:1.0.0@sha256:ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff
      startupProbe:
        exec:
          command:
            - /bin/true
---
apiVersion: v1
kind: Pod
metadata:
  name: missing-probes
  namespace: app
spec:
  containers:
    - name: app
      image: ghcr.io/acme/app:1.0.0@sha256:1111111111111111111111111111111111111111111111111111111111111111
