---
apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: exception-governance
policies:
  - ../../policies/exception-governance.yaml
resources:
  - resources.yaml
results:
  - policy: exception-governance
    rule: require-exception-labels-and-annotations
    resources:
      - security/missing-labels-exception
    kind: PolicyException
    result: fail
  - policy: exception-governance
    rule: require-exception-labels-and-annotations
    resources:
      - security/well-formed-exception
    kind: PolicyException
    result: pass
