apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wrong-issuer-cert
  namespace: app
spec:
  secretName: wrong-issuer-tls
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  commonName: app.__SECRET_DOMAIN__
  dnsNames:
    - app.__SECRET_DOMAIN__
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    encoding: PKCS8
    rotationPolicy: Always
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wrong-dns-cert
  namespace: app
spec:
  secretName: wrong-dns-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: app.__SECRET_DOMAIN__
  dnsNames:
    - evil.example.net
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    encoding: PKCS8
    rotationPolicy: Always
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wrong-commonname-cert
  namespace: app
spec:
  secretName: wrong-commonname-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: evil.example.net
  dnsNames:
    - app.__SECRET_DOMAIN__
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    encoding: PKCS8
    rotationPolicy: Always
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: wrong-zone
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: wrong-zone-key
    solvers:
      - selector:
          dnsZones:
            - other.example.net
