apiVersion: v1
kind: Namespace
metadata:
  name: app
  labels:
    kubernetes.io/metadata.name: app
---
apiVersion: v1
kind: Namespace
metadata:
  name: minecraft
  labels:
    kubernetes.io/metadata.name: minecraft
---
apiVersion: v1
kind: Namespace
metadata:
  name: default
  labels:
    kubernetes.io/metadata.name: default
---
apiVersion: v1
kind: Service
metadata:
  name: nodeport-service
  namespace: app
spec:
  type: NodePort
  selector:
    app: demo
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: external-ips-service
  namespace: app
spec:
  externalIPs:
    - 10.0.0.10
  selector:
    app: demo
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: forbidden-lb-service
  namespace: app
  annotations:
    lbipam.cilium.io/ips: "10.0.0.55"
spec:
  type: LoadBalancer
  selector:
    app: demo
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: missing-ip-lb-service
  namespace: minecraft
  annotations:
    lbipam.cilium.io/ips: ""
spec:
  type: LoadBalancer
  selector:
    app: demo
  ports:
    - port: 25565
      targetPort: 25565
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-listener-route
  namespace: app
spec:
  hostnames:
    - app.__SECRET_DOMAIN__
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: http
  rules:
    - backendRefs:
        - name: app
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: external-route
  namespace: app
spec:
  hostnames:
    - app.__SECRET_DOMAIN__
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: app
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bad-hostname-route
  namespace: default
spec:
  hostnames:
    - bad.example.net
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: app
          port: 80
