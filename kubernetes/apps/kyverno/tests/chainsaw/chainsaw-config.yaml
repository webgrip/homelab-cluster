apiVersion: chainsaw.kyverno.io/v1alpha2
kind: Configuration
metadata:
  name: default
spec:
  discovery:
    testFile: chainsaw-test
  execution:
    failFast: true
    parallel: 1
  timeouts:
    apply: 30s
    assert: 60s
    cleanup: 60s
    delete: 30s
    error: 30s
  namespace:
    fastDelete: true
  report:
    format: JSON
    name: chainsaw-report
    path: ./reports
