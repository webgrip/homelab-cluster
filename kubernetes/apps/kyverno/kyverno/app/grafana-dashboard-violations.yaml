---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kyverno-violations
  annotations:
    grafana_folder: Security
  labels:
    grafana_dashboard: "1"
data:
  kyverno-violations.json: |-
    {
        "schemaVersion": 39,
      "title": "Kyverno / Policy Violations",
        "uid": "kyverno-violations",
        "timezone": "browser",
        "tags": [
            "kyverno",
            "policy",
            "security",
            "compliance",
            "violations"
        ],
        "description": "Actionable view of policy violations: what is failing, where, and why. Powered by Policy Reporter.",
        "editable": false,
        "graphTooltip": 1,
        "refresh": "2m",
        "time": {
            "from": "now-24h",
            "to": "now"
        },
        "timepicker": {
            "refresh_intervals": [
                "30s",
                "1m",
                "2m",
                "5m",
                "15m"
            ],
            "time_options": [
                "1h",
                "3h",
                "6h",
                "12h",
                "24h",
                "2d",
                "7d"
            ]
        },
        "templating": {
            "list": [
                {
                    "name": "datasource",
                    "type": "datasource",
                    "pluginId": "prometheus",
                    "label": "Datasource",
                    "hide": 0,
                    "current": {}
                },
                {
                    "name": "namespace",
                    "type": "query",
                    "datasource": {
                        "type": "prometheus",
                        "uid": "${datasource}"
                    },
                    "label": "Namespace",
                    "hide": 0,
                    "multi": true,
                    "includeAll": true,
                    "allValue": ".*",
                    "query": "label_values(policy_report_result, namespace)",
                    "refresh": 2,
                    "sort": 1,
                    "current": {}
                },
                {
                    "name": "policy",
                    "type": "query",
                    "datasource": {
                        "type": "prometheus",
                        "uid": "${datasource}"
                    },
                    "label": "Policy",
                    "hide": 0,
                    "multi": true,
                    "includeAll": true,
                    "allValue": ".*",
                    "query": "label_values(policy_report_result, policy)",
                    "refresh": 2,
                    "sort": 1,
                    "current": {}
                },
                {
                    "name": "severity",
                    "type": "query",
                    "datasource": {
                        "type": "prometheus",
                        "uid": "${datasource}"
                    },
                    "label": "Severity",
                    "hide": 0,
                    "multi": true,
                    "includeAll": true,
                    "allValue": ".*",
                    "query": "label_values(policy_report_result{status=\"fail\"}, severity)",
                    "refresh": 2,
                    "sort": 0,
                    "current": {}
                }
            ]
        },
        "annotations": {
            "list": []
        },
        "panels": [
            {
                "id": 1,
                "type": "row",
                "title": "\ud83d\udcca Compliance Overview",
                "collapsed": false,
                "gridPos": {
                    "h": 1,
                    "w": 24,
                    "x": 0,
                    "y": 0
                }
            },
            {
                "id": 2,
                "type": "stat",
                "title": "Active Violations",
                "description": "Resources currently failing at least one policy check",
                "gridPos": {
                    "h": 4,
                    "w": 4,
                    "x": 0,
                    "y": 1
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "thresholds"
                        },
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "green",
                                    "value": null
                                },
                                {
                                    "color": "yellow",
                                    "value": 10
                                },
                                {
                                    "color": "orange",
                                    "value": 50
                                },
                                {
                                    "color": "red",
                                    "value": 100
                                }
                            ]
                        },
                        "unit": "short",
                        "noValue": "0"
                    }
                },
                "options": {
                    "reduceOptions": {
                        "calcs": [
                            "lastNotNull"
                        ]
                    },
                    "orientation": "auto",
                    "textMode": "auto",
                    "graphMode": "area",
                    "colorMode": "background"
                },
                "targets": [
                    {
                        "expr": "sum(policy_report_result{status=\"fail\",namespace=~\"$namespace\",policy=~\"$policy\",severity=~\"$severity\"}) or vector(0)",
                        "legendFormat": "",
                        "instant": true,
                        "datasource": {
                            "type": "prometheus",
                            "uid": "${datasource}"
                        }
                    }
                ]
            },
            {
                "id": 3,
                "type": "stat",
                "title": "Critical / High",
                "description": "Violations with severity=critical or high",
                "gridPos": {
                    "h": 4,
                    "w": 4,
                    "x": 4,
                    "y": 1
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "thresholds"
                        },
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "green",
                                    "value": null
                                },
                                {
                                    "color": "orange",
                                    "value": 1
                                },
                                {
                                    "color": "red",
                                    "value": 5
                                }
                            ]
                        },
                        "unit": "short",
                        "noValue": "0"
                    }
                },
                "options": {
                    "reduceOptions": {
                        "calcs": [
                            "lastNotNull"
                        ]
                    },
                    "orientation": "auto",
                    "textMode": "auto",
                    "graphMode": "area",
                    "colorMode": "background"
                },
                "targets": [
                    {
                        "expr": "sum(policy_report_result{status=\"fail\",severity=~\"critical|high\",namespace=~\"$namespace\",policy=~\"$policy\"}) or vector(0)",
                        "legendFormat": "",
                        "instant": true,
                        "datasource": {
                            "type": "prometheus",
                            "uid": "${datasource}"
                        }
                    }
                ]
            },
            {
                "id": 4,
                "type": "stat",
                "title": "Medium",
                "description": "Violations with severity=medium",
                "gridPos": {
                    "h": 4,
                    "w": 4,
                    "x": 8,
                    "y": 1
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "thresholds"
                        },
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "green",
                                    "value": null
                                },
                                {
                                    "color": "yellow",
                                    "value": 5
                                },
                                {
                                    "color": "orange",
                                    "value": 30
                                }
                            ]
                        },
                        "unit": "short",
                        "noValue": "0"
                    }
                },
                "options": {
                    "reduceOptions": {
                        "calcs": [
                            "lastNotNull"
                        ]
                    },
                    "orientation": "auto",
                    "textMode": "auto",
                    "graphMode": "area",
                    "colorMode": "background"
                },
                "targets": [
                    {
                        "expr": "sum(policy_report_result{status=\"fail\",severity=\"medium\",namespace=~\"$namespace\",policy=~\"$policy\"}) or vector(0)",
                        "legendFormat": "",
                        "instant": true,
                        "datasource": {
                            "type": "prometheus",
                            "uid": "${datasource}"
                        }
                    }
                ]
            },
            {
                "id": 5,
                "type": "stat",
                "title": "Passing",
                "description": "Resources passing all policy checks",
                "gridPos": {
                    "h": 4,
                    "w": 4,
                    "x": 12,
                    "y": 1
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "fixed",
                            "fixedColor": "green"
                        },
                        "unit": "short",
                        "noValue": "0"
                    }
                },
                "options": {
                    "reduceOptions": {
                        "calcs": [
                            "lastNotNull"
                        ]
                    },
                    "orientation": "auto",
                    "textMode": "auto",
                    "graphMode": "area",
                    "colorMode": "background"
                },
                "targets": [
                    {
                        "expr": "sum(policy_report_result{status=\"pass\",namespace=~\"$namespace\",policy=~\"$policy\"}) or vector(0)",
                        "legendFormat": "",
                        "instant": true,
                        "datasource": {
                            "type": "prometheus",
                            "uid": "${datasource}"
                        }
                    }
                ]
            },
            {
                "id": 6,
                "type": "gauge",
                "title": "Compliance Score",
                "description": "pass \u00f7 (pass + fail + warn) across selected scope",
                "gridPos": {
                    "h": 4,
                    "w": 4,
                    "x": 16,
                    "y": 1
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "thresholds"
                        },
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "red",
                                    "value": null
                                },
                                {
                                    "color": "orange",
                                    "value": 70
                                },
                                {
                                    "color": "yellow",
                                    "value": 85
                                },
                                {
                                    "color": "green",
                                    "value": 95
                                }
                            ]
                        },
                        "unit": "percent",
                        "min": 0,
                        "max": 100
                    }
                },
                "options": {
                    "reduceOptions": {
                        "calcs": [
                            "lastNotNull"
                        ]
                    },
                    "showThresholdLabels": false,
                    "showThresholdMarkers": true
                },
                "targets": [
                    {
                        "expr": "100 * sum(policy_report_result{status=\"pass\",namespace=~\"$namespace\"}) / (clamp_min(sum(policy_report_result{status=~\"pass|fail|warn\",namespace=~\"$namespace\"}), 1))",
                        "legendFormat": "",
                        "instant": true,
                        "datasource": {
                            "type": "prometheus",
                            "uid": "${datasource}"
                        }
                    }
                ]
            },
            {
                "id": 7,
                "type": "stat",
                "title": "Cluster Violations",
                "description": "ClusterPolicyReport violations (cluster-scoped resources)",
                "gridPos": {
                    "h": 4,
                    "w": 4,
                    "x": 20,
                    "y": 1
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "thresholds"
                        },
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "green",
                                    "value": null
                                },
                                {
                                    "color": "yellow",
                                    "value": 5
                                },
                                {
                                    "color": "red",
                                    "value": 20
                                }
                            ]
                        },
                        "unit": "short",
                        "noValue": "0"
                    }
                },
                "options": {
                    "reduceOptions": {
                        "calcs": [
                            "lastNotNull"
                        ]
                    },
                    "orientation": "auto",
                    "textMode": "auto",
                    "graphMode": "area",
                    "colorMode": "background"
                },
                "targets": [
                    {
                        "expr": "sum(cluster_policy_report_result{status=\"fail\"}) or vector(0)",
                        "legendFormat": "",
                        "instant": true,
                        "datasource": {
                            "type": "prometheus",
                            "uid": "${datasource}"
                        }
                    }
                ]
            },
            {
                "id": 10,
                "type": "row",
                "title": "\ud83c\udfaf What Needs Attention Now",
                "collapsed": false,
                "gridPos": {
                    "h": 1,
                    "w": 24,
                    "x": 0,
                    "y": 5
                }
            },
            {
                "id": 11,
                "type": "bargauge",
                "title": "Top Violations by Policy / Rule",
                "description": "Policies with the most failing resources \u2014 fix the longest bar first.",
                "gridPos": {
                    "h": 12,
                    "w": 12,
                    "x": 0,
                    "y": 6
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "continuous-RdYlGr",
                            "seriesBy": "last"
                        },
                        "unit": "short",
                        "min": 0
                    },
                    "overrides": []
                },
                "options": {
                    "reduceOptions": {
                        "calcs": [
                            "lastNotNull"
                        ]
                    },
                    "orientation": "horizontal",
                    "displayMode": "gradient",
                    "valueMode": "color",
                    "showUnfilled": true,
                    "minVizWidth": 0,
                    "maxVizHeight": 300,
                    "text": {},
                    "namePlacement": "auto",
                    "fillOpacity": 80,
                    "gradientMode": "none",
                    "legend": {
                        "displayMode": "hidden"
                    }
                },
                "targets": [
                    {
                        "expr": "sort_desc(sum by (policy,rule,severity) (policy_report_result{status=\"fail\",namespace=~\"$namespace\",policy=~\"$policy\",severity=~\"$severity\"}))",
                        "legendFormat": "{{severity}} | {{policy}} / {{rule}}",
                        "instant": true,
                        "datasource": {
                            "type": "prometheus",
                            "uid": "${datasource}"
                        }
                    }
                ]
            },
            {
                "id": 12,
                "type": "bargauge",
                "title": "Top Violations by Namespace",
                "description": "Namespaces with the most failures \u2014 scope your remediation effort.",
                "gridPos": {
                    "h": 12,
                    "w": 12,
                    "x": 12,
                    "y": 6
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "continuous-RdYlGr",
                            "seriesBy": "last"
                        },
                        "unit": "short",
                        "min": 0
                    },
                    "overrides": []
                },
                "options": {
                    "reduceOptions": {
                        "calcs": [
                            "lastNotNull"
                        ]
                    },
                    "orientation": "horizontal",
                    "displayMode": "gradient",
                    "valueMode": "color",
                    "showUnfilled": true,
                    "minVizWidth": 0,
                    "maxVizHeight": 300,
                    "text": {},
                    "namePlacement": "auto",
                    "fillOpacity": 80,
                    "gradientMode": "none",
                    "legend": {
                        "displayMode": "hidden"
                    }
                },
                "targets": [
                    {
                        "expr": "sort_desc(sum by (namespace) (policy_report_result{status=\"fail\",namespace=~\"$namespace\",policy=~\"$policy\",severity=~\"$severity\"}))",
                        "legendFormat": "{{namespace}}",
                        "instant": true,
                        "datasource": {
                            "type": "prometheus",
                            "uid": "${datasource}"
                        }
                    }
                ]
            },
            {
                "id": 20,
                "type": "row",
                "title": "\ud83d\udccb All Failing Resources",
                "collapsed": false,
                "gridPos": {
                    "h": 1,
                    "w": 24,
                    "x": 0,
                    "y": 18
                }
            },
            {
                "id": 21,
                "type": "table",
                "title": "Namespace-Scoped Violations",
                "description": "Every resource currently failing a policy. Filter with the dropdowns above. Click column headers to sort.",
                "gridPos": {
                    "h": 16,
                    "w": 24,
                    "x": 0,
                    "y": 19
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "fieldConfig": {
                    "defaults": {
                        "unit": "short"
                    },
                    "overrides": [
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Severity"
                            },
                            "properties": [
                                {
                                    "id": "custom.width",
                                    "value": 85
                                },
                                {
                                    "id": "custom.displayMode",
                                    "value": "color-background"
                                },
                                {
                                    "id": "mappings",
                                    "value": [
                                        {
                                            "type": "value",
                                            "options": {
                                                "critical": {
                                                    "color": "dark-red",
                                                    "index": 0,
                                                    "text": "CRITICAL"
                                                },
                                                "high": {
                                                    "color": "red",
                                                    "index": 1,
                                                    "text": "HIGH"
                                                },
                                                "medium": {
                                                    "color": "orange",
                                                    "index": 2,
                                                    "text": "MEDIUM"
                                                },
                                                "low": {
                                                    "color": "yellow",
                                                    "index": 3,
                                                    "text": "LOW"
                                                },
                                                "info": {
                                                    "color": "blue",
                                                    "index": 4,
                                                    "text": "INFO"
                                                }
                                            }
                                        }
                                    ]
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Namespace"
                            },
                            "properties": [
                                {
                                    "id": "custom.width",
                                    "value": 130
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Kind"
                            },
                            "properties": [
                                {
                                    "id": "custom.width",
                                    "value": 90
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Resource"
                            },
                            "properties": [
                                {
                                    "id": "custom.width",
                                    "value": 220
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Policy"
                            },
                            "properties": [
                                {
                                    "id": "custom.width",
                                    "value": 230
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Rule"
                            },
                            "properties": [
                                {
                                    "id": "custom.width",
                                    "value": 250
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Category"
                            },
                            "properties": [
                                {
                                    "id": "custom.width",
                                    "value": 160
                                }
                            ]
                        }
                    ]
                },
                "options": {
                    "sortBy": [
                        {
                            "displayName": "Severity",
                            "desc": true
                        }
                    ],
                    "footer": {
                        "show": false
                    },
                    "frameIndex": 0,
                    "showHeader": true,
                    "cellHeight": "sm"
                },
                "transformations": [
                    {
                        "id": "organize",
                        "options": {
                            "renameByName": {
                                "namespace": "Namespace",
                                "kind": "Kind",
                                "name": "Resource",
                                "policy": "Policy",
                                "rule": "Rule",
                                "severity": "Severity",
                                "category": "Category",
                                "Value #A": "_v",
                                "Time": "_t",
                                "instance": "_i",
                                "job": "_j",
                                "pod": "_p",
                                "service": "_s",
                                "report": "_r",
                                "source": "_src",
                                "status": "_st"
                            },
                            "excludeByName": {
                                "_v": true,
                                "_t": true,
                                "_i": true,
                                "_j": true,
                                "_p": true,
                                "_s": true,
                                "_r": true,
                                "_src": true,
                                "_st": true,
                                "Value": true,
                                "__name__": true
                            }
                        }
                    }
                ],
                "targets": [
                    {
                        "expr": "policy_report_result{status=\"fail\",namespace=~\"$namespace\",policy=~\"$policy\",severity=~\"$severity\"}",
                        "legendFormat": "",
                        "instant": true,
                        "format": "table",
                        "datasource": {
                            "type": "prometheus",
                            "uid": "${datasource}"
                        }
                    }
                ]
            },
            {
                "id": 30,
                "type": "row",
                "title": "\ud83d\udcc8 Violation Trends",
                "collapsed": false,
                "gridPos": {
                    "h": 1,
                    "w": 24,
                    "x": 0,
                    "y": 35
                }
            },
            {
                "id": 31,
                "type": "timeseries",
                "title": "Violations by Severity Over Time",
                "description": "Total active failing results, split by severity. A downward trend = progress.",
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 0,
                    "y": 36
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "fieldConfig": {
                    "defaults": {
                        "unit": "short",
                        "custom": {
                            "lineWidth": 2,
                            "fillOpacity": 15,
                            "spanNulls": false,
                            "gradientMode": "opacity"
                        }
                    },
                    "overrides": [
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "critical"
                            },
                            "properties": [
                                {
                                    "id": "color",
                                    "value": {
                                        "fixedColor": "dark-red",
                                        "mode": "fixed"
                                    }
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "high"
                            },
                            "properties": [
                                {
                                    "id": "color",
                                    "value": {
                                        "fixedColor": "red",
                                        "mode": "fixed"
                                    }
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "medium"
                            },
                            "properties": [
                                {
                                    "id": "color",
                                    "value": {
                                        "fixedColor": "orange",
                                        "mode": "fixed"
                                    }
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "low"
                            },
                            "properties": [
                                {
                                    "id": "color",
                                    "value": {
                                        "fixedColor": "yellow",
                                        "mode": "fixed"
                                    }
                                }
                            ]
                        }
                    ]
                },
                "options": {
                    "legend": {
                        "displayMode": "list",
                        "placement": "bottom"
                    },
                    "tooltip": {
                        "mode": "multi",
                        "sort": "desc"
                    }
                },
                "targets": [
                    {
                        "expr": "sum by (severity) (policy_report_result{status=\"fail\",namespace=~\"$namespace\",policy=~\"$policy\"})",
                        "legendFormat": "{{severity}}",
                        "datasource": {
                            "type": "prometheus",
                            "uid": "${datasource}"
                        }
                    }
                ]
            },
            {
                "id": 32,
                "type": "timeseries",
                "title": "Top Policies by Violation Count",
                "description": "Top 8 policies by current violation count over time.",
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 12,
                    "y": 36
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "fieldConfig": {
                    "defaults": {
                        "unit": "short",
                        "custom": {
                            "lineWidth": 2,
                            "fillOpacity": 5,
                            "spanNulls": false
                        }
                    }
                },
                "options": {
                    "legend": {
                        "displayMode": "table",
                        "placement": "right",
                        "calcs": [
                            "lastNotNull"
                        ]
                    },
                    "tooltip": {
                        "mode": "multi",
                        "sort": "desc"
                    }
                },
                "targets": [
