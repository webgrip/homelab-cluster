---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
spec:
  chartRef:
    kind: OCIRepository
    name: kyverno
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    fullnameOverride: kyverno

    global:
      priorityClassName: system-cluster-critical

    grafana:
      enabled: true

    features:
      admissionReports:
        enabled: true
      aggregateReports:
        enabled: true
      policyReports:
        enabled: true
      validatingAdmissionPolicyReports:
        enabled: true
      reporting:
        validate: true
        mutate: true
        mutateExisting: true
        imageVerify: true
        generate: true
      backgroundScan:
        enabled: true
        backgroundScanWorkers: 4
        # Daily instead of hourly: the hourly re-scan was re-emitting ~12k audit
        # PolicyViolation events/hour (events have a 1h TTL), inflating etcd and the
        # apiservers' watch caches (soyo apiserver was using 3.4Gi). Violations are
        # still recorded in PolicyReports; only the redundant event churn shrinks.
        backgroundScanInterval: 24h
        skipResourceFilters: false
      generateValidatingAdmissionPolicy:
        enabled: true
      policyExceptions:
        enabled: true
        namespace: security
      logging:
        format: json
        verbosity: 2

    admissionController:
      replicas: 3
      apiPriorityAndFairness: true
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
      rbac:
        serviceAccount:
          automountServiceAccountToken: false
        clusterRole:
          extraResources:
            - apiGroups:
                - admissionregistration.k8s.io
              resources:
                - validatingadmissionpolicies
                - validatingadmissionpolicybindings
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
      certManager:
        enabled: true
      podDisruptionBudget:
        enabled: true
        minAvailable: 2
        unhealthyPodEvictionPolicy: AlwaysAllow
      topologySpreadConstraints:
        # DoNotSchedule, not ScheduleAnyway: the svc-fail webhooks make co-located
        # replicas a cluster-wide Flux outage risk if that one node degrades
        # (2026-06-12: 2 of 3 replicas sat on soyo-1 through a starvation wave).
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: admission-controller
              app.kubernetes.io/instance: kyverno
      service:
        trafficDistribution: PreferClose
      metricsService:
        trafficDistribution: PreferClose
      serviceMonitor:
        enabled: true
        # Drop the per-rule policy-execution latency histogram (~10.5k series, unused here).
        metricRelabelings:
          - action: drop
            sourceLabels:
              - __name__
            regex: "kyverno_policy_execution_duration_seconds_bucket"
      tracing:
        enabled: true
        address: alloy-gateway.observability.svc.cluster.local
        port: 4317

    backgroundController:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
      rbac:
        serviceAccount:
          automountServiceAccountToken: false
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
        unhealthyPodEvictionPolicy: AlwaysAllow
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: background-controller
              app.kubernetes.io/instance: kyverno
      metricsService:
        trafficDistribution: PreferClose
      serviceMonitor:
        enabled: true
        # Drop the per-rule policy-execution latency histogram (~10.5k series, unused here).
        metricRelabelings:
          - action: drop
            sourceLabels:
              - __name__
            regex: "kyverno_policy_execution_duration_seconds_bucket"
      tracing:
        enabled: true
        address: alloy-gateway.observability.svc.cluster.local
        port: 4317

    cleanupController:
      replicas: 1
      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          memory: 128Mi
      rbac:
        serviceAccount:
          automountServiceAccountToken: false
        clusterRole:
          extraResources:
            - apiGroups:
                - ""
              resources:
                - "pods"
              verbs:
                - "get"
                - "list"
                - "watch"
                - "delete"
            - apiGroups:
                - "batch"
              resources:
                - "jobs"
              verbs:
                - "get"
                - "list"
                - "watch"
                - "delete"
      certManager:
        enabled: true
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
        unhealthyPodEvictionPolicy: AlwaysAllow
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: cleanup-controller
              app.kubernetes.io/instance: kyverno
      metricsService:
        trafficDistribution: PreferClose
      serviceMonitor:
        enabled: true
        # Drop the per-rule policy-execution latency histogram (~10.5k series, unused here).
        metricRelabelings:
          - action: drop
            sourceLabels:
              - __name__
            regex: "kyverno_policy_execution_duration_seconds_bucket"
      tracing:
        enabled: true
        address: alloy-gateway.observability.svc.cluster.local
        port: 4317

    reportsController:
      replicas: 1
      apiPriorityAndFairness: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
      rbac:
        serviceAccount:
          automountServiceAccountToken: false
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
        unhealthyPodEvictionPolicy: AlwaysAllow
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: reports-controller
              app.kubernetes.io/instance: kyverno
      metricsService:
        trafficDistribution: PreferClose
      serviceMonitor:
        enabled: true
        # Drop the per-rule policy-execution latency histogram (~10.5k series, unused here).
        metricRelabelings:
          - action: drop
            sourceLabels:
              - __name__
            regex: "kyverno_policy_execution_duration_seconds_bucket"
      tracing:
        enabled: true
        address: alloy-gateway.observability.svc.cluster.local
        port: 4317
