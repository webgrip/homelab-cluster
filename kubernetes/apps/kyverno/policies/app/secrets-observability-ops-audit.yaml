---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: secrets-observability-ops-audit
  annotations:
    policies.kyverno.io/title: Secrets Observability Operations Audit
    policies.kyverno.io/category: Secrets, Observability, Operations
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: ConfigMap,ServiceMonitor,PodMonitor,PrometheusRule,CronJob,Deployment,StatefulSet
    kyverno.io/kyverno-version: 1.18.1
    policies.kyverno.io/description: >-
      Audit secret hygiene, monitoring metadata, operational defaults, and HA
      workload availability controls.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: disallow-sensitive-configmap-keys
      match:
        any:
          - resources:
              kinds:
                - ConfigMap
      validate:
        message: "ConfigMaps should not contain secret-like key names; use SOPS-managed Secrets."
        deny:
          conditions:
            any:
              - key: "{{ keys(request.object.data || `{}`)[] }}"
                operator: AnyIn
                value:
                  - "*password*"
                  - "*passwd*"
                  - "*secret*"
                  - "*token*"
                  - "*apikey*"
                  - "*api-key*"
                  - "*credential*"
    - name: require-servicemonitor-labels
      match:
        any:
          - resources:
              kinds:
                - ServiceMonitor
      validate:
        message: "ServiceMonitors should include app identity labels."
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"
    - name: require-podmonitor-labels
      match:
        any:
          - resources:
              kinds:
                - PodMonitor
      validate:
        message: "PodMonitors should include app identity labels."
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"
    - name: require-prometheusrule-labels
      match:
        any:
          - resources:
              kinds:
                - PrometheusRule
      validate:
        message: "PrometheusRules should include app identity labels."
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"
    - name: require-cronjob-operational-limits
      match:
        any:
          - resources:
              kinds:
                - CronJob
      validate:
        message: "CronJobs should set concurrencyPolicy and history limits."
        pattern:
          spec:
            concurrencyPolicy: Forbid
            successfulJobsHistoryLimit: "?*"
            failedJobsHistoryLimit: "?*"
    - name: require-ha-pdb-for-replicated-deployments
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
      preconditions:
        all:
          - key: "{{ request.object.spec.replicas || `1` }}"
            operator: GreaterThan
            value: 1
      context:
        - name: pdbs
          apiCall:
            urlPath: /apis/policy/v1/namespaces/{{ request.object.metadata.namespace }}/poddisruptionbudgets
            jmesPath: items[] | length(@)
      validate:
        message: "Replicated workloads should have a PodDisruptionBudget in the namespace."
        deny:
          conditions:
            any:
              - key: "{{ pdbs }}"
                operator: Equals
                value: 0
    - name: require-topology-spread-for-replicated-deployments
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
      preconditions:
        all:
          - key: "{{ request.object.spec.replicas || `1` }}"
            operator: GreaterThan
            value: 1
      validate:
        message: "Replicated workloads should define topology spread constraints or pod anti-affinity."
        anyPattern:
          - spec:
              template:
                spec:
                  topologySpreadConstraints:
                    - maxSkew: "?*"
          - spec:
              template:
                spec:
                  affinity:
                    podAntiAffinity:
                      =(preferredDuringSchedulingIgnoredDuringExecution):
                        - weight: "?*"
                      =(requiredDuringSchedulingIgnoredDuringExecution):
                        - labelSelector: "?*"
    - name: require-httproute-backed-probes
      match:
        any:
          - resources:
              kinds:
                - HTTPRoute
      validate:
        message: "HTTPRoute-backed apps should be covered by synthetic checks or blackbox probes."
        anyPattern:
          - metadata:
              labels:
                monitoring.webgrip.io/synthetic-check: "true"
          - metadata:
              annotations:
                monitoring.webgrip.io/synthetic-check: "?*"
