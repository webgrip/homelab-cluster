---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/policyexception_v2.json
# Exception for the Prometheus rule-files ConfigMap generated by kube-prometheus-stack.
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: exception-prometheus-rulefiles
  namespace: security
  labels:
    owner: platform-team
  annotations:
    policies.kyverno.io/description: >-
      The Prometheus operator renders all alerting/recording rules into the
      prometheus-...-rulefiles-0 ConfigMap. Rule expressions and alert text
      legitimately contain substrings like "token"/"secret" (e.g. SLO and
      auth-failure alerts), which trips disallow-sensitive-configmap-keys.
      These are PromQL rule definitions, not secret material — false positive.
      Operator-generated, not editable via our manifests.
spec:
  exceptions:
    - policyName: secrets-observability-ops-audit
      ruleNames:
        - disallow-sensitive-configmap-keys
  match:
    any:
      - resources:
          kinds:
            - ConfigMap
          namespaces:
            - observability
          names:
            - prometheus-kube-prometheus-stack-prometheus-rulefiles-0
