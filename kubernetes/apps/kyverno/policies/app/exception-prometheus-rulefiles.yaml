---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/policyexception_v2.json
# Exception for the rule-files ConfigMap the VictoriaMetrics operator renders for VMAlert.
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: exception-prometheus-rulefiles
  namespace: security
  labels:
    owner: platform-team
  annotations:
    policies.kyverno.io/description: >-
      The VictoriaMetrics operator renders all alerting/recording rules (converted
      from the cluster's PrometheusRule CRs) into the VMAlert rule-files ConfigMap.
      Rule expressions and alert text legitimately contain substrings like
      "token"/"secret" (e.g. SLO and auth-failure alerts), which trips
      disallow-sensitive-configmap-keys. These are MetricsQL/PromQL rule
      definitions, not secret material — false positive. Operator-generated, not
      editable via our manifests.
spec:
  exceptions:
    - policyName: secrets-observability-ops-audit
      ruleNames:
        - disallow-sensitive-configmap-keys
  match:
    any:
      - resources:
          kinds:
            - ConfigMap
          namespaces:
            - observability
          names:
            # VM operator names the VMAlert rule-files ConfigMap vm-<vmalert>-rulefiles-N.
            # Wildcard so the shard index (and any future VMAlert rename) stays covered.
            - vm-vmalert-rulefiles-*
