---
# Public half of the OpenBao Transit cosign key (transit/keys/cosign-webgrip). NON-SECRET
# and stable, so it lives in git and is read by the image-verify-harbor-audit policy via a
# configMap context (Kyverno runs in this `security` namespace).
#
# ┌─ ACTION REQUIRED (one-time, after the break-glass that creates the Transit key) ───────┐
# │ Replace the placeholder below with the real PEM:                                       │
# │   bao read -format=json transit/keys/cosign-webgrip | jq -r '.data.keys["1"].public_key'│
# │ Paste it under data."cosign.pub" (keep the 2-space block indentation).                 │
# │ Until then the Harbor verify policy reports failures in Audit mode (non-blocking).     │
# └────────────────────────────────────────────────────────────────────────────────────────┘
apiVersion: v1
kind: ConfigMap
metadata:
  name: cosign-webgrip-pub
  namespace: security
data:
  cosign.pub: |-
    -----BEGIN PUBLIC KEY-----
    REPLACE_WITH_TRANSIT_PUBLIC_KEY_FROM_BREAK_GLASS
    -----END PUBLIC KEY-----
