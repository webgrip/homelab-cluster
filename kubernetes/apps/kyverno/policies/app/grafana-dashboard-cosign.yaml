---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: security-cosign-github-oidc
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  allowCrossNamespaceImport: true
  folderRef: security
  json: |-
    {
      "schemaVersion": 39,
      "title": "Supply Chain / Cosign & GitHub OIDC",
      "uid": "security-cosign-github-oidc",
      "timezone": "browser",
      "tags": ["security", "cosign", "sigstore", "github-oidc", "slsa", "cyclonedx", "kyverno"],
      "description": "Audit view for keyless Cosign signatures, SLSA provenance, and CycloneDX SBOM evidence enforced by Kyverno image verification policies.",
      "editable": false,
      "graphTooltip": 1,
      "refresh": "1m",
      "time": {"from": "now-24h", "to": "now"},
      "templating": {
        "list": [
          {"name": "datasource", "type": "datasource", "pluginId": "prometheus", "label": "Datasource", "hide": 0, "current": {}},
          {"name": "namespace", "type": "query", "datasource": {"type": "prometheus", "uid": "${datasource}"}, "label": "Namespace", "multi": true, "includeAll": true, "allValue": ".*", "query": "label_values(policy_report_result{policy=~\"image-verify-audit|image-attestations-audit\"}, namespace)", "refresh": 2, "sort": 1, "current": {}},
          {"name": "policy", "type": "custom", "label": "Policy", "multi": true, "includeAll": true, "allValue": "image-verify-audit|image-attestations-audit", "query": "image-verify-audit,image-attestations-audit", "current": {}}
        ]
      },
      "annotations": {"list": [{"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}]},
      "panels": [
        {"id": 1, "type": "row", "title": "Keyless signature and attestation posture", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}, "collapsed": false},
        {"id": 2, "type": "stat", "title": "Signature audit failures", "gridPos": {"h": 4, "w": 6, "x": 0, "y": 1}, "datasource": {"type": "prometheus", "uid": "${datasource}"}, "targets": [{"refId": "A", "expr": "sum(policy_report_result{namespace=~\"$namespace\", policy=~\"$policy\", rule=\"verify-webgrip-images\", status=~\"fail|error|warn\"}) or on() vector(0)", "legendFormat": "signature"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"}, "fieldConfig": {"defaults": {"decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "orange", "value": 1}, {"color": "red", "value": 10}]}}, "overrides": []}},
        {"id": 3, "type": "stat", "title": "SLSA provenance failures", "gridPos": {"h": 4, "w": 6, "x": 6, "y": 1}, "datasource": {"type": "prometheus", "uid": "${datasource}"}, "targets": [{"refId": "A", "expr": "sum(policy_report_result{namespace=~\"$namespace\", policy=~\"$policy\", rule=\"verify-github-slsa-provenance\", status=~\"fail|error|warn\"}) or on() vector(0)", "legendFormat": "slsa"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"}, "fieldConfig": {"defaults": {"decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "orange", "value": 1}, {"color": "red", "value": 10}]}}, "overrides": []}},
        {"id": 4, "type": "stat", "title": "CycloneDX SBOM failures", "gridPos": {"h": 4, "w": 6, "x": 12, "y": 1}, "datasource": {"type": "prometheus", "uid": "${datasource}"}, "targets": [{"refId": "A", "expr": "sum(policy_report_result{namespace=~\"$namespace\", policy=~\"$policy\", rule=\"verify-cyclonedx-sbom\", status=~\"fail|error|warn\"}) or on() vector(0)", "legendFormat": "sbom"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"}, "fieldConfig": {"defaults": {"decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "orange", "value": 1}, {"color": "red", "value": 10}]}}, "overrides": []}},
        {"id": 5, "type": "stat", "title": "Signed image policy failures", "gridPos": {"h": 4, "w": 6, "x": 18, "y": 1}, "datasource": {"type": "prometheus", "uid": "${datasource}"}, "targets": [{"refId": "A", "expr": "sum(policy_report_result{namespace=~\"$namespace\", policy=~\"$policy\", rule=~\"verify-webgrip-images|verify-github-slsa-provenance|verify-cyclonedx-sbom\", status=~\"fail|error|warn\"}) or on() vector(0)", "legendFormat": "evidence"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto"}, "fieldConfig": {"defaults": {"decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green"}, {"color": "orange", "value": 1}, {"color": "red", "value": 10}]}}, "overrides": []}},
        {"id": 6, "type": "timeseries", "title": "Policy result trend", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 5}, "datasource": {"type": "prometheus", "uid": "${datasource}"}, "targets": [{"refId": "A", "expr": "sum by (policy, rule, result) (policy_report_result{namespace=~\"$namespace\", policy=~\"$policy\"})", "legendFormat": "{{policy}}/{{rule}} {{result}}"}], "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull"]}}, "fieldConfig": {"defaults": {"custom": {"drawStyle": "line", "fillOpacity": 15, "lineWidth": 2}}, "overrides": []}},
        {"id": 7, "type": "barchart", "title": "Top namespaces missing supply-chain evidence", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 5}, "datasource": {"type": "prometheus", "uid": "${datasource}"}, "targets": [{"refId": "A", "expr": "topk(15, sum by (namespace, rule) (policy_report_result{namespace=~\"$namespace\", policy=~\"$policy\", status=~\"fail|error|warn\"}))", "legendFormat": "{{namespace}} {{rule}}"}], "options": {"legend": {"displayMode": "list", "placement": "bottom"}}, "fieldConfig": {"defaults": {}, "overrides": []}},
        {"id": 8, "type": "table", "title": "Workloads failing signature/attestation audits", "gridPos": {"h": 10, "w": 24, "x": 0, "y": 13}, "datasource": {"type": "prometheus", "uid": "${datasource}"}, "targets": [{"refId": "A", "format": "table", "instant": true, "expr": "sum by (namespace, policy, rule, resource_kind, resource_name, status) (policy_report_result{namespace=~\"$namespace\", policy=~\"$policy\", status=~\"fail|error|warn\"})"}], "options": {"showHeader": true}, "fieldConfig": {"defaults": {}, "overrides": []}},
        {"id": 9, "type": "row", "title": "Admission path health", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 23}, "collapsed": false},
        {"id": 10, "type": "timeseries", "title": "Kyverno image verification admission volume", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24}, "datasource": {"type": "prometheus", "uid": "${datasource}"}, "targets": [{"refId": "A", "expr": "sum by (resource_namespace, resource_kind) (rate(kyverno_admission_requests_total{resource_namespace=~\"$namespace\", resource_kind=~\"Pod|Deployment|StatefulSet|DaemonSet|Job|CronJob\"}[5m]))", "legendFormat": "{{resource_namespace}} {{resource_kind}}"}], "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull"]}}, "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []}},
        {"id": 11, "type": "timeseries", "title": "Kyverno admission review latency", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24}, "datasource": {"type": "prometheus", "uid": "${datasource}"}, "targets": [{"refId": "A", "expr": "histogram_quantile(0.95, sum by (le) (rate(kyverno_admission_review_duration_seconds_bucket[5m])))", "legendFormat": "p95"}, {"refId": "B", "expr": "histogram_quantile(0.99, sum by (le) (rate(kyverno_admission_review_duration_seconds_bucket[5m])))", "legendFormat": "p99"}], "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull"]}}, "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}},
        {"id": 12, "type": "table", "title": "Expected GitHub OIDC identity contract", "gridPos": {"h": 7, "w": 24, "x": 0, "y": 32}, "datasource": {"type": "prometheus", "uid": "${datasource}"}, "targets": [{"refId": "A", "format": "table", "instant": true, "expr": "count by (policy, rule) (policy_report_result{policy=~\"image-verify-audit|image-attestations-audit\"})"}], "options": {"showHeader": true, "footer": {"show": false}}, "fieldConfig": {"defaults": {"custom": {"align": "auto"}}, "overrides": []}},
        {"id": 13, "type": "text", "title": "CI/CD signing requirements", "gridPos": {"h": 7, "w": 24, "x": 0, "y": 39}, "options": {"mode": "markdown", "content": "Images under `ghcr.io/webgrip/*` are expected to be released by `webgrip/infrastructure` from `.github/workflows/on_release_published.yml`, signed keylessly with Cosign, and published with SLSA provenance plus a CycloneDX SBOM attestation against the immutable image digest. Trivy SARIF is uploaded to GitHub Security for vulnerability review. Admission remains audit-only until every internal image publishes the required evidence."}}
      ]
    }
