---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kyverno-policy-alerts
  namespace: security
  labels:
    app.kubernetes.io/name: kyverno
    release: kube-prometheus-stack # must match the Helm release label so the Prometheus operator picks this up
spec:
  groups:
    - name: kyverno.admission
      interval: 1m
      rules:
        # -------------------------------------------------------------------
        # Enforce-mode admissions being denied – these are active blocks.
        # A non-zero rate over a 5-minute window warrants attention.
        # -------------------------------------------------------------------
        - alert: KyvernoAdmissionDenied
          expr: |
            sum by (policy_name, rule_name, resource_namespace, resource_kind) (
              increase(kyverno_policy_results_total{
                result="fail",
                policy_background_mode="false",
                request_operation=~"CREATE|UPDATE"
              }[5m])
            ) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Kyverno admission denied ({{ $labels.policy_name }}/{{ $labels.rule_name }})"
            description: |
              What's happening:
              - Policy {{ $labels.policy_name }} rule {{ $labels.rule_name }} denied a
                {{ $labels.resource_kind }} in namespace {{ $labels.resource_namespace }} (last 5m).

              Impact/risk:
              - A workload apply/update is being blocked at admission; a deploy may be stuck.

              Likely causes:
              - A genuine policy violation, or a legitimate workload needing a governed PolicyException.

              First actions:
              - Inspect PolicyReports and Kyverno admission webhook logs for the resource.
              - Fix the resource or add a reviewed PolicyException.
            runbook_url: "https://kyverno.io/docs/troubleshooting/"

        # -------------------------------------------------------------------
        # Audit violations accumulating – background scan found failures.
        # Alert when the total audit-fail count across any single policy is large.
        # -------------------------------------------------------------------
        - alert: KyvernoAuditViolationHigh
          expr: |
            sum by (policy_name, resource_namespace) (
              kyverno_policy_results_total{
                result="fail",
                policy_background_mode="true"
              }
            ) > 20
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "High Kyverno audit violations ({{ $labels.policy_name }})"
            description: |
              What's happening:
              - Policy {{ $labels.policy_name }} has >20 audit-mode failures in
                namespace {{ $labels.resource_namespace }}, sustained 15m.

              Impact/risk:
              - A backlog of audit violations blocks promoting the policy to enforce.

              Likely causes:
              - Non-compliant workloads accumulated, or the policy is stricter than the fleet.

              First actions:
              - Review PolicyReports for the policy/namespace.
              - Remediate the resources or add a governed PolicyException.
            runbook_url: "https://kyverno.io/docs/policy-reports/"

        # -------------------------------------------------------------------
        # Policy errors – misconfigurations or CEL/JMESPath parse failures
        # that prevent the rule from running at all.
        # -------------------------------------------------------------------
        - alert: KyvernoPolicyError
          expr: |
            sum by (policy_name, rule_name) (
              increase(kyverno_policy_results_total{result="error"}[10m])
            ) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Kyverno policy error ({{ $labels.policy_name }}/{{ $labels.rule_name }})"
            description: |
              What's happening:
              - Policy {{ $labels.policy_name }} rule {{ $labels.rule_name }} is producing
                errors (not denials) over 10m.

              Impact/risk:
              - The rule is NOT enforcing; whatever it should block can pass admission.

              Likely causes:
              - Broken CEL/JMESPath expression, or a referenced resource/context is missing.

              First actions:
              - Inspect Kyverno admission/controller logs for the policy error detail.
              - Fix or roll back the policy; confirm results return to pass/fail (not error).
            runbook_url: "https://kyverno.io/docs/troubleshooting/"

    - name: kyverno.controllers
      interval: 1m
      rules:
        # -------------------------------------------------------------------
        # Webhook latency – if the admission webhook is slow it will affect
        # all API server operations in the cluster.
        # -------------------------------------------------------------------
        - alert: KyvernoWebhookLatencyHigh
          expr: |
            histogram_quantile(0.99,
              sum by (le, controller) (
                rate(kyverno_admission_request_duration_seconds_bucket[5m])
              )
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Kyverno admission webhook p99 latency > 2s ({{ $labels.controller }})"
            description: |
              What's happening:
              - Kyverno admission p99 latency is {{ $value | humanizeDuration }} over 5m.

              Impact/risk:
              - The admission webhook is on the API write path; slowness degrades ALL
                create/update operations cluster-wide.

              Likely causes:
              - Controller CPU/memory pressure, complex policies, or large match scopes.

              First actions:
              - Check kyverno admission-controller resource usage and restarts.
              - Reduce policy complexity/scope or raise resources; watch p99 recover.
            runbook_url: "https://kyverno.io/docs/installation/platform-notes/"

        # -------------------------------------------------------------------
        # Background controller queue depth – large backlogs mean reports
        # are stale and enforce background scans are not completing.
        # -------------------------------------------------------------------
        - alert: KyvernoBackgroundQueueDepthHigh
          expr: |
            kyverno_controller_queue_depth{controller=~".*background.*"} > 500
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Kyverno background controller queue depth high ({{ $labels.controller }})"
            description: |
              What's happening:
              - The Kyverno background controller queue depth is {{ $value }}, sustained 10m.

              Impact/risk:
              - Background scans and report generation are falling behind; reports go stale.

              Likely causes:
              - Too few background workers, large scan scope, or controller resource pressure.

              First actions:
              - Check background-controller resource usage.
              - Increase backgroundScanWorkers or reduce scan scope; watch the queue drain.
            runbook_url: "https://kyverno.io/docs/installation/customization/"

        # -------------------------------------------------------------------
        # Reports controller queue depth
        # -------------------------------------------------------------------
        - alert: KyvernoReportsQueueDepthHigh
          expr: |
            kyverno_controller_queue_depth{controller=~".*report.*"} > 500
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Kyverno reports controller queue depth high ({{ $labels.controller }})"
            description: |
              What's happening:
              - The Kyverno reports controller queue depth is {{ $value }}, sustained 10m.

              Impact/risk:
              - PolicyReports are not written promptly; dashboards/alerts on reports lag reality.

              Likely causes:
              - reports-controller resource pressure or a large volume of report churn.

              First actions:
              - Check reports-controller resource usage and restarts.
              - Raise resources or reduce report churn; watch the queue drain.
            runbook_url: "https://kyverno.io/docs/installation/customization/"
