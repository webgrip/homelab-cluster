---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: image-supply-chain-audit
  annotations:
    pod-policies.kyverno.io/autogen-controllers: DaemonSet,Deployment,StatefulSet
    policies.kyverno.io/title: Image Supply Chain Audit
    policies.kyverno.io/category: Software Supply Chain
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    kyverno.io/kyverno-version: 1.18.1
    policies.kyverno.io/description: >-
      Audit image pinning and registry hygiene before requiring all workloads to
      use digest-pinned images from approved registries.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-image-digest
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions: &applicationNamespaces
                  - key: kubernetes.io/metadata.name
                    operator: NotIn
                    values:
                      - arc-systems
                      - cert-manager
                      - cilium-secrets
                      - cnpg-system
                      - default
                      - external-secrets
                      - flux-system
                      - keda
                      - kube-node-lease
                      - kube-public
                      - kube-system
                      - kyverno
                      - longhorn-system
                      - network
                      - observability
                      - renovate
                      - security
      validate:
        message: "Images should be pinned by digest."
        foreach:
          - list: request.object.spec.[ephemeralContainers, initContainers, containers][]
            pattern:
              image: "*@sha256:*"
    - name: disallow-latest-tag-even-with-digest
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions: *applicationNamespaces
      validate:
        message: "Use immutable version tags with digests; avoid latest even when digest-pinned."
        foreach:
          - list: request.object.spec.[ephemeralContainers, initContainers, containers][]
            pattern:
              image: "!*:latest@*"
    - name: require-approved-registries
      # Harbor is the ONLY approved OCI host. Every other registry (docker.io,
      # ghcr.io, quay.io, registry.k8s.io, gcr.io, public.ecr.aws, mcr...) must
      # be mirrored/proxied through Harbor before this can move to Enforce.
      # Kept at validationFailureAction: Audit (policy level) so this observes
      # the blast radius via PolicyReports without blocking pulls yet.
      # NOTE: this covers runtime container images in application namespaces only.
      # Flux OCIRepository Helm-chart sources are NOT yet restricted to Harbor —
      # tracked as a follow-up (see supply-chain-enforcement-roadmap.md).
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions: *applicationNamespaces
      validate:
        message: "Images must come from the in-cluster Harbor registry (harbor.${SECRET_DOMAIN}); no other OCI hosts are approved."
        foreach:
          - list: request.object.spec.[ephemeralContainers, initContainers, containers][]
            pattern:
              image: "harbor.${SECRET_DOMAIN}/*"
    - name: require-fully-qualified-images
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions: *applicationNamespaces
      validate:
        message: "Images should be fully qualified with an explicit registry hostname."
        foreach:
          - list: request.object.spec.[ephemeralContainers, initContainers, containers][]
            deny:
              conditions:
                any:
                  - key: "{{ contains(element.image, '/') }}"
                    operator: Equals
                    value: false
                  - key: "{{ contains(split(element.image, '/')[0], '.') || contains(split(element.image, '/')[0], ':') || split(element.image, '/')[0] == 'localhost' }}"
                    operator: Equals
                    value: false
