---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/policyexception_v2.json
# Exception for the KEDA-scaled Forgejo CI runner (forgejo namespace).
# The runner pods carry a privileged Docker-in-Docker native sidecar so workflow
# `docker build` steps reach a real daemon (ADR-0026 step 1, "prove the runner").
# Matched by label rather than name: KEDA generates ephemeral Jobs/Pods with random
# suffixes (forgejo-runner-xxxxx), and exception-governance forbids wildcard names.
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: exception-forgejo-runner-privileged
  namespace: security
  labels:
    owner: platform-team
  annotations:
    policies.kyverno.io/description: >-
      The forgejo-runner ScaledJob runs a privileged docker:dind native sidecar so
      ephemeral one-job runners can build images (DOCKER_HOST=tcp://localhost:2376).
      KEDA submits the runner as a Job, so pod-security-baseline-enforce blocks it via
      the autogen-privileged-containers rule before any runner pod exists — pending CI
      jobs are then never picked up. This waives ONLY the privileged-containers rule for
      runner Jobs/Pods; all other baseline controls (host namespaces, hostPath, host
      ports) still apply. Tracking: ADR-0026 — revisit if the runner moves to a
      rootless/sysbox DinD that no longer needs privileged.
spec:
  exceptions:
    - policyName: pod-security-baseline-enforce
      ruleNames:
        - privileged-containers
        - autogen-privileged-containers
  match:
    any:
      # The resource the webhook actually rejects: the KEDA-generated runner Job.
      # `scaledjob.keda.sh/name` is set by KEDA on every Job it spawns for this ScaledJob.
      - resources:
          kinds:
            - Job
          namespaces:
            - forgejo
          selector:
            matchLabels:
              scaledjob.keda.sh/name: forgejo-runner
      # The ephemeral runner Pod the Job spawns (base rule), carrying the template label.
      - resources:
          kinds:
            - Pod
          namespaces:
            - forgejo
          selector:
            matchLabels:
              app.kubernetes.io/name: forgejo-runner
