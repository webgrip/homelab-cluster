---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: image-attestations-audit
  annotations:
    pod-policies.kyverno.io/autogen-controllers: DaemonSet,Deployment,StatefulSet
    policies.kyverno.io/title: GHCR Image Signature + SBOM (Audit)
    policies.kyverno.io/category: Software Supply Chain
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    kyverno.io/kyverno-version: 1.18.1
    policies.kyverno.io/description: >-
      Audit that internal GHCR images carry a valid cosign signature + CycloneDX SBOM attestation
      signed by the OpenBao Transit key (cosign-webgrip-pub). Forgejo is now the sole release
      authority and signs GHCR with the SAME key as Harbor — there is no more GitHub keyless SLSA
      provenance / public-rekor flow, so this verifies the static key (no rekor), mirroring
      image-verify-harbor-audit. Audit-only; flip to Enforce once green.
spec:
  validationFailureAction: Audit
  background: false # verifyImages requires admission context
  webhookTimeoutSeconds: 30
  failurePolicy: Fail
  rules:
    - name: verify-webgrip-ghcr-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      context:
        # Public half of the OpenBao Transit cosign key — the same one Harbor verification uses.
        - name: cosignpub
          configMap:
            name: cosign-webgrip-pub
            namespace: security
      verifyImages:
        - imageReferences:
            - "ghcr.io/webgrip/*"
          # If the webgrip GHCR packages are PRIVATE, add imageRegistryCredentials with a ghcr-pull
          # secret (a read-scoped PAT) so Kyverno can fetch the manifest + signature/attestation.
          required: true
          mutateDigest: false
          verifyDigest: true
          # cosign signs with --tlog-upload=false → no Rekor entry. Kyverno/cosign verify the tlog BY
          # DEFAULT, so rekor.ignoreTlog MUST be set or Enforce rejects correctly-signed images. This
          # policy verifies the SBOM ATTESTATION; the cosign SIGNATURE is verified by image-verify-audit
          # (verify-webgrip-images). Matches the harbor key model.
          attestations:
            - predicateType: https://cyclonedx.org/bom
              attestors:
                - count: 1
                  entries:
                    - keys:
                        publicKeys: '{{ cosignpub.data."cosign.pub" }}'
                        rekor:
                          ignoreTlog: true
              # Require at least one component in the SBOM (sanity check).
              conditions:
                - all:
                    - key: "{{ components | length(@) }}"
                      operator: GreaterThan
                      value: 0
