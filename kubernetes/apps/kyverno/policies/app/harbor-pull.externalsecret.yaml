---
# Pull credential Kyverno uses to fetch image manifests + cosign signatures/attestations
# from the private, LAN-only Harbor when verifying harbor.webgrip.dev/webgrip/* images.
# Sourced from the same robot creds in OpenBao (secret/harbor/robot-webgrip); rendered as
# a dockerconfigjson Secret in Kyverno's namespace (security) and referenced by the
# image-verify-harbor-audit policy's imageRegistryCredentials.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pull
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target:
    name: harbor-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"harbor.webgrip.dev":{"username":"{{ .CI_USER }}","password":"{{ .CI_TOKEN }}","auth":"{{ printf "%s:%s" .CI_USER .CI_TOKEN | b64enc }}"}}}
  data:
    - {secretKey: CI_USER, remoteRef: {key: harbor/robot-webgrip, property: CI_USER}}
    - {secretKey: CI_TOKEN, remoteRef: {key: harbor/robot-webgrip, property: CI_TOKEN}}
