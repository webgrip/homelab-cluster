---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: image-verify-audit
  annotations:
    pod-policies.kyverno.io/autogen-controllers: DaemonSet,Deployment,StatefulSet
    policies.kyverno.io/title: Image Signature Verification (Audit)
    policies.kyverno.io/category: Software Supply Chain
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    kyverno.io/kyverno-version: 1.18.1
    policies.kyverno.io/description: >-
      Audit that container images carry valid Cosign signatures. First-party WebGrip images
      (ghcr.io/webgrip/*) are now key-signed by Forgejo (the sole release authority) with the
      OpenBao Transit key — the same key as Harbor, NOT GitHub keyless OIDC. Third-party images
      (e.g. kyverno) keep keyless verification. Audit mode surfaces unsigned workloads in
      PolicyReports without blocking; promote to Enforce once all images in scope are signed and
      deployments are digest-pinned.
spec:
  validationFailureAction: Audit
  background: false # verifyImages requires admission context
  webhookTimeoutSeconds: 30
  failurePolicy: Fail
  rules:
    # -----------------------------------------------------------------------
    # First-party images: ghcr.io/webgrip/*
    # Produced by webgrip/infrastructure releases and signed by Forgejo (the sole release authority)
    # with cosign + the OpenBao Transit key (cosign-webgrip-pub) — the same key as Harbor.
    # -----------------------------------------------------------------------
    - name: verify-webgrip-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      context:
        # Public half of the OpenBao Transit cosign key (same one Harbor + the SBOM-attestation
        # policy use). Kyverno runs in `security`, so this is an in-namespace read.
        - name: cosignpub
          configMap:
            name: cosign-webgrip-pub
            namespace: security
      verifyImages:
        - imageReferences:
            - "ghcr.io/webgrip/*"
          # Key-based: Forgejo (the sole release authority) signs GHCR with the OpenBao Transit key —
          # the SAME key as Harbor, NOT GitHub keyless OIDC. cosign signs with --tlog-upload=false, so
          # there is NO Rekor transparency-log entry. Kyverno/cosign verify the tlog BY DEFAULT, so
          # rekor.ignoreTlog MUST be set or Enforce rejects every (correctly) signed image.
          attestors:
            - count: 1
              entries:
                - keys:
                    publicKeys: '{{ cosignpub.data."cosign.pub" }}'
                    rekor:
                      ignoreTlog: true
          required: true
          mutateDigest: false
          verifyDigest: true
          imageRegistryCredentials:
            allowInsecureRegistry: false

    # -----------------------------------------------------------------------
    # Third-party images with keyless OIDC signing (sigstore)
    # These projects sign releases via GitHub Actions OIDC — no static key needed.
    # -----------------------------------------------------------------------
    - name: verify-kyverno-images-keyless
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: In
                    values:
                      - security
      verifyImages:
        - imageReferences:
            - "ghcr.io/kyverno/*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/kyverno/kyverno/.github/workflows/*"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
                    additionalExtensions:
                      githubWorkflowRepository: "kyverno/kyverno"
          required: true
          mutateDigest: false
          verifyDigest: true
