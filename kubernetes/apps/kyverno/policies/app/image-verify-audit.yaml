---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: image-verify-audit
  annotations:
    pod-policies.kyverno.io/autogen-controllers: DaemonSet,Deployment,StatefulSet
    policies.kyverno.io/title: Image Signature Verification (Audit)
    policies.kyverno.io/category: Software Supply Chain
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    kyverno.io/kyverno-version: 1.18.1
    policies.kyverno.io/description: >-
      Audit that first-party WebGrip images are signed with Sigstore/Cosign
      keyless signatures issued by the infrastructure release workflow via
      GitHub Actions OIDC.
      This policy runs in Audit mode so existing unsigned workloads are surfaced in
      PolicyReports without being blocked. Promote to Enforce once all images in scope
      are signed in CI with id-token: write and digest-pinned deployment references.
spec:
  validationFailureAction: Audit
  background: false # verifyImages requires admission context
  webhookTimeoutSeconds: 30
  failurePolicy: Fail
  rules:
    # -----------------------------------------------------------------------
    # First-party images: ghcr.io/webgrip/*
    # These images are produced by webgrip/infrastructure releases and signed by
    # that repository's release workflow using keyless Cosign and GitHub OIDC.
    # -----------------------------------------------------------------------
    - name: verify-webgrip-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/webgrip/*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subjectRegExp: "^https://github\\.com/webgrip/infrastructure/\\.github/workflows/on_release_published\\.yml@refs/tags/.+$"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
          required: true
          mutateDigest: false
          verifyDigest: true
          imageRegistryCredentials:
            allowInsecureRegistry: false

    # -----------------------------------------------------------------------
    # Third-party images with keyless OIDC signing (sigstore)
    # These projects sign releases via GitHub Actions OIDC — no static key needed.
    # -----------------------------------------------------------------------
    - name: verify-kyverno-images-keyless
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: In
                    values:
                      - security
      verifyImages:
        - imageReferences:
            - "ghcr.io/kyverno/*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/kyverno/kyverno/.github/workflows/*"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
                    additionalExtensions:
                      githubWorkflowRepository: "kyverno/kyverno"
          required: true
          mutateDigest: false
          verifyDigest: true
