---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/policyexception_v2.json
# Exception for the Kepler node power-metering DaemonSet (kepler namespace).
# Kepler reads Intel/AMD RAPL energy counters from the host's read-only /sys
# (powercap) + /proc and uses hostPID to attribute power to processes/containers.
# That needs host namespaces (hostPID) and hostPath mounts (/sys, /proc) --
# pod-security-baseline-enforce blocks the DaemonSet's autogen rules before any pod
# exists. This waives ONLY those two baseline rules for the kepler DaemonSet/Pods
# in the (PSA-privileged) kepler namespace; all other controls still apply.
# privileged-containers is NOT waived: kepler runs privileged:false since ticket
# #68's fix (CAP_SYS_PTRACE instead, matching upstream's own kepler-operator
# config), verified live across all 5 nodes. Audit hardening findings that
# remain open (root/seccomp) are intentionally NOT waived — they stay visible.
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: exception-kepler-privileged
  namespace: security
  labels:
    owner: platform-team
  annotations:
    policies.kyverno.io/description: >-
      Kepler DaemonSet needs hostPID + hostPath (/sys powercap, /proc) to read
      RAPL energy. Waives baseline-enforce host-namespaces / host-path for the
      kepler DaemonSet and Pods only. Does NOT waive privileged-containers --
      kepler runs unprivileged (CAP_SYS_PTRACE) since ticket #68.
spec:
  exceptions:
    - policyName: pod-security-baseline-enforce
      ruleNames:
        - host-namespaces
        - autogen-host-namespaces
        - host-path
        - autogen-host-path
  match:
    any:
      # The controller the webhook rejects first (autogen rules).
      - resources:
          kinds:
            - DaemonSet
          namespaces:
            - kepler
          selector:
            matchLabels:
              app.kubernetes.io/name: kepler
      # The DaemonSet's Pods (base rules, background scan).
      - resources:
          kinds:
            - Pod
          namespaces:
            - kepler
          selector:
            matchLabels:
              app.kubernetes.io/name: kepler
