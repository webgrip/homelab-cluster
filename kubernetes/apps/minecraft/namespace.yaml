---
apiVersion: v1
kind: Namespace
metadata:
  name: minecraft
  labels:
    webgrip.io/owner: platform
    webgrip.io/tier: game
    webgrip.io/exposure: private
    # Opt into kyverno-generated default-deny (ingress+egress) + allow-dns.
    # Re-opened selectively by minecraft/app/networkpolicy.yaml — W7 zero-trust.
    kyverno.io/default-network-policies: "true"
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
