---
# Migration phase 3 (seed): cnpg-backup-s3 -> OpenBao secret/s3/cnpg-backup.
# Rendered per-namespace (8 CNPG app namespaces); all copies are identical, so the
# pushes are idempotent (same value to the same KV path).
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: cnpg-backup-s3
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: cnpg-backup-s3}}
  data:
    - match: {secretKey: S3_ACCESS_KEY_ID, remoteRef: {remoteKey: s3/cnpg-backup, property: S3_ACCESS_KEY_ID}}
    - match: {secretKey: S3_SECRET_ACCESS_KEY, remoteRef: {remoteKey: s3/cnpg-backup, property: S3_SECRET_ACCESS_KEY}}
    - match: {secretKey: S3_REGION, remoteRef: {remoteKey: s3/cnpg-backup, property: S3_REGION}}
    - match: {secretKey: S3_ENDPOINT, remoteRef: {remoteKey: s3/cnpg-backup, property: S3_ENDPOINT}}
    - match: {secretKey: S3_BUCKET, remoteRef: {remoteKey: s3/cnpg-backup, property: S3_BUCKET}}
