---
# Migration phase 3 (seed): observability-s3 -> OpenBao secret/s3/observability.
# In-component (namespace inherited from the consuming app).
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: observability-s3
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: observability-s3}}
  data:
    - match: {secretKey: S3_ACCESS_KEY_ID, remoteRef: {remoteKey: s3/observability, property: S3_ACCESS_KEY_ID}}
    - match: {secretKey: S3_SECRET_ACCESS_KEY, remoteRef: {remoteKey: s3/observability, property: S3_SECRET_ACCESS_KEY}}
    - match: {secretKey: S3_REGION, remoteRef: {remoteKey: s3/observability, property: S3_REGION}}
    - match: {secretKey: S3_ENDPOINT, remoteRef: {remoteKey: s3/observability, property: S3_ENDPOINT}}
