---
# security-s3 now sourced from OpenBao (component-rendered per namespace).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: security-s3
spec:
  refreshInterval: 1h
  secretStoreRef: {kind: ClusterSecretStore, name: openbao}
  target: {name: security-s3, creationPolicy: Owner}
  data:
    - {secretKey: S3_ACCESS_KEY_ID, remoteRef: {key: s3/security, property: S3_ACCESS_KEY_ID}}
    - {secretKey: S3_SECRET_ACCESS_KEY, remoteRef: {key: s3/security, property: S3_SECRET_ACCESS_KEY}}
    - {secretKey: S3_REGION, remoteRef: {key: s3/security, property: S3_REGION}}
    - {secretKey: S3_ENDPOINT, remoteRef: {key: s3/security, property: S3_ENDPOINT}}
    - {secretKey: S3_GUAC_BUCKET, remoteRef: {key: s3/security, property: S3_GUAC_BUCKET}}
