---
# Plaintext template — encrypt with:
#   sops --encrypt --in-place kubernetes/components/security-s3/security-s3.sops.yaml
#
# Create the bucket in Garage first:
#   garage bucket create guac
#   garage key create security-apps
#   garage bucket allow --read --write --owner guac --key security-apps
#
# Use the same Garage instance (http://10.0.0.110:3900) already used by
# observability-s3 and cnpg-backup. The S3_ENDPOINT, S3_REGION, and optionally
# S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY can reuse an existing Garage key if
# you prefer to share access keys, or you can create a dedicated one.
apiVersion: v1
kind: Secret
metadata:
  name: security-s3
  namespace: security
type: Opaque
stringData:
  S3_ACCESS_KEY_ID: REPLACE_ME
  S3_SECRET_ACCESS_KEY: REPLACE_ME
  S3_REGION: garage
  S3_ENDPOINT: http://10.0.0.110:3900
  S3_GUAC_BUCKET: guac
