---
# Migration phase 3 (seed): security-s3 -> OpenBao secret/s3/security.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: security-s3
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - {kind: ClusterSecretStore, name: openbao-push}
  selector: {secret: {name: security-s3}}
  data:
    - match: {secretKey: S3_ACCESS_KEY_ID, remoteRef: {remoteKey: s3/security, property: S3_ACCESS_KEY_ID}}
    - match: {secretKey: S3_SECRET_ACCESS_KEY, remoteRef: {remoteKey: s3/security, property: S3_SECRET_ACCESS_KEY}}
    - match: {secretKey: S3_REGION, remoteRef: {remoteKey: s3/security, property: S3_REGION}}
    - match: {secretKey: S3_ENDPOINT, remoteRef: {remoteKey: s3/security, property: S3_ENDPOINT}}
    - match: {secretKey: S3_GUAC_BUCKET, remoteRef: {remoteKey: s3/security, property: S3_GUAC_BUCKET}}
