---
cluster:
  allowSchedulingOnControlPlanes: true
  apiServer:
    admissionControl:
      $$patch: delete
    extraArgs:
      # https://kubernetes.io/docs/tasks/extend-kubernetes/configure-aggregation-layer/
      enable-aggregator-routing: true
  controllerManager:
    extraArgs:
      bind-address: 0.0.0.0
  coreDNS:
    disabled: true
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
      # Default 100ms/1000ms is too tight for a shared-disk node.
      # 500ms heartbeat + 5s election timeout tolerate WAL fsync spikes
      # without triggering unnecessary leader elections.
      heartbeat-interval: "500"
      election-timeout: "5000"
    advertisedSubnets:
      - 10.0.0.0/24
  proxy:
    disabled: true
  scheduler:
    extraArgs:
      bind-address: 0.0.0.0
