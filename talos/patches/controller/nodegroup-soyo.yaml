---
machine:
  nodeLabels:
    nodegroup: soyo
    # Capability taxonomy (ADR-0025). Additive; nodegroup stays until the fringe
    # scheme is retired in Phase D. soyos are the low-RAM control-plane pool and
    # are NOT a Longhorn storage node (no storage.webgrip.io/longhorn label).
    node.webgrip.io/pool: soyo
    node.webgrip.io/cpu: standard
    node.webgrip.io/ram: low
