---
machine:
  nodeLabels:
    # Capability taxonomy (ADR-0025). fringe = the high-CPU worker and a Longhorn
    # storage node (SSD hot; HDD cold tier pending a disk wipe — ADR-0027).
    node.webgrip.io/pool: worker
    node.webgrip.io/cpu: high
    node.webgrip.io/ram: standard
    storage.webgrip.io/longhorn: "true"
    # Legacy label — KEPT temporarily: authentik (worker has RWO media) and
    # envoy-gateway (ingress data plane) are the last two apps still pinning to
    # nodeSelector nodegroup=fringe. Migrate them to pool=worker (careful: RWO
    # Recreate / ingress blip), THEN drop this label + apply-node. Removing it
    # before that strands those apps. See node-taxonomy-migration-status.md.
    nodegroup: fringe
  kubelet:
    extraArgs: {}
    # The `dedicated=fringe:NoSchedule` taint was RETIRED 2026-06-19 (ADR-0028):
    # apps now opt *onto* the workers via pool=worker affinity, so fringe is just
    # a normal worker. `register-with-taints` only applies at node registration,
    # so a live taint must be removed once by hand — dropping it here only stops
    # it returning on a future re-register:
    #   kubectl taint nodes fringe-workstation dedicated=fringe:NoSchedule-
    # NOTE: the 1 TB HDD cold-tier disk config was removed here on 2026-06-19.
    # It never worked: the disk still holds an NTFS filesystem from an old Windows
    # install, and Talos refuses to mkfs.xfs over it without --force, which wedged
    # the boot in a format-retry loop (block.VolumeManagerController failed). The
    # cold tier is re-introduced properly under ADR-0027 (Phase C) with an explicit
    # disk wipe first. Longhorn data lives on fringe's SSD (/var/lib/longhorn), not
    # this disk, so removing it loses nothing.
