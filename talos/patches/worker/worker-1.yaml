---
# worker-1 — placement is label-driven (capability taxonomy, ADR-0001), never
# hostname-pinned. Apps hard-pin to node.webgrip.io/pool=worker.
machine:
  nodeLabels:
    # Capability taxonomy (ADR-0001). The legacy `workload-tier` label was retired
    # 2026-06-21 (all apps moved to the pool/cpu/ram scheme).
    # worker-1 = the high-RAM worker and a Longhorn storage node (SSD hot).
    node.webgrip.io/pool: worker
    node.webgrip.io/cpu: standard
    node.webgrip.io/ram: high
    storage.webgrip.io/longhorn: "true"
