---
# Marks worker-1 as the general "apps tier" node. App workloads use a soft
# nodeAffinity preference (weight 100) for workload-tier=apps so they pack onto
# worker-1's headroom and stay off the RAM-tight soyo control-planes, while still
# falling back to a soyo if worker-1 is unavailable. Add this label to any future
# worker you want to host apps — placement is label-driven, never hostname-pinned.
machine:
  nodeLabels:
    workload-tier: apps
