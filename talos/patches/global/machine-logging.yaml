---
machine:
  logging:
    destinations:
      # Send all Talos kernel and service logs to the alloy-agent syslog listener
      # on this node. alloy-agent runs with hostNetwork=true so 127.0.0.1:6514 is
      # always the alloy pod on this specific node.
      # After adding this patch, run: talhelm apply (or talosctl apply-config per node).
      - endpoint: "tcp://127.0.0.1:6514"
        format: "json_lines"
