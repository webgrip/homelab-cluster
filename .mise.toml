[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_CONFIG = "{{config_root}}/.sops.yaml"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
JUST_UNSTABLE = "1"

[tools]
"python" = "3.14.5"
"uv" = "0.11.16"
"pipx" = "1.15.0"
"pipx:makejinja" = "2.8.2"
"just" = "1.56.0"
"gum" = "0.17.0"
"lefthook" = "2.1.8"
"sd" = "1.1.0"
"zizmor" = "1.26.1"
"aqua:budimanjojo/talhelper" = "3.1.11"
"aqua:cilium/cilium-cli" = "0.19.4"
"aqua:cli/cli" = "2.96.0"
"aqua:cloudflare/cloudflared" = "2026.7.1"
"aqua:cue-lang/cue" = "0.17.0"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.9.1"
"aqua:getsops/sops" = "3.13.1"
"aqua:go-task/task" = "3.52.0"
# OpenBao CLI (`bao`) — pinned to the cluster's server version (chart 0.28.3 / appVersion
# v2.5.4) so client/KV-v2 behaviour matches. Address derived from the live HTTPRoute via
# `just bao-login`; auth is Authentik OIDC (no static token, no root).
"aqua:openbao/openbao/bao" = "2.5.4"
"aqua:helm/helm" = "4.2.0"
"aqua:helmfile/helmfile" = "1.7.0"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubernetes-sigs/kustomize" = "5.8.1"
"aqua:kubernetes/kubectl" = "1.36.1"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:google/yamlfmt" = "0.21.0"
"aqua:siderolabs/talos" = "1.13.4"
# Claude Code hook linters — without these, .claude/hooks/validate-manifest.sh and
# the gitleaks scan in guard-secrets.sh silently no-op (they're optional-by-design).
# Pinned here so the local safety hooks actually enforce on edit.
"pipx:yamllint" = "1.38.0"
"aqua:yannh/kubeconform" = "0.8.0"
"aqua:gitleaks/gitleaks" = "8.30.1"

[hooks]
postinstall = "lefthook install"
