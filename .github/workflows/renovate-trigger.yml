# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: Renovate Trigger

on:
  workflow_dispatch:

concurrency:
  group: renovate-trigger
  cancel-in-progress: false

permissions: {}

jobs:
  trigger:
    name: Trigger Renovate
    runs-on: arc-runner-set
    steps:
      - name: Trigger all Renovate projects
        env:
          RENOVATE_NAMESPACE: renovate
          RENOVATE_JOB: webgrip-gitops
          RENOVATE_WEBHOOK_URL: https://renovate-webhook.webgrip.dev/webhook/v1/schedule
        run: |
          set -euo pipefail

          python3 <<'PY'
          import base64
          import json
          import os
          import ssl
          import sys
          import time
          import urllib.parse
          import urllib.request
          from urllib.error import HTTPError

          namespace = os.environ["RENOVATE_NAMESPACE"]
          renovate_job = os.environ["RENOVATE_JOB"]
          webhook_url = os.environ["RENOVATE_WEBHOOK_URL"]

          api_host = os.environ["KUBERNETES_SERVICE_HOST"]
          api_port = os.environ.get("KUBERNETES_SERVICE_PORT_HTTPS", "443")
          api_server = f"https://{api_host}:{api_port}"

          token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
          ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

          with open(token_path, encoding="utf-8") as token_file:
              service_account_token = token_file.read().strip()

          ssl_context = ssl.create_default_context(cafile=ca_path)

          def api_request(path, method="GET"):
              request = urllib.request.Request(
                  f"{api_server}{path}",
                  method=method,
                  headers={
                      "Authorization": f"Bearer {service_account_token}",
                      "Accept": "application/json",
                  },
              )
              with urllib.request.urlopen(request, context=ssl_context) as response:
                  body = response.read()
                  if not body:
                      return None
                  return json.loads(body)

          def delete_completed_jobs():
              jobs = api_request(f"/apis/batch/v1/namespaces/{namespace}/jobs")
              jobs_to_delete = []

              for job in jobs.get("items", []):
                  name = job["metadata"]["name"]
                  status = job.get("status", {})
                  active = int(status.get("active", 0) or 0)
                  succeeded = int(status.get("succeeded", 0) or 0)
                  failed = int(status.get("failed", 0) or 0)

                  if (
                      name.startswith(f"{renovate_job}-")
                      and active == 0
                      and (succeeded > 0 or failed > 0)
                  ):
                      jobs_to_delete.append(name)

              for name in jobs_to_delete:
                  encoded_name = urllib.parse.quote(name, safe="")
                  try:
                      api_request(
                          f"/apis/batch/v1/namespaces/{namespace}/jobs/{encoded_name}",
                          method="DELETE",
                      )
                  except HTTPError as error:
                      if error.code != 404:
                          raise

              if jobs_to_delete:
                  print(f"Deleted {len(jobs_to_delete)} completed jobs.")
              else:
                  print("No completed jobs to clean up.")

              return len(jobs_to_delete)

          def get_webhook_tokens():
              secret = api_request(
                  f"/api/v1/namespaces/{namespace}/secrets/renovate-webhook-auth"
              )
              encoded_token = secret.get("data", {}).get("token")
              if not encoded_token:
                  raise RuntimeError("Secret renovate-webhook-auth is missing data.token")
              decoded_token = base64.b64decode(encoded_token).decode("utf-8").strip()
              tokens = [token.strip() for token in decoded_token.split(",") if token.strip()]
              if not tokens:
                  raise RuntimeError("Secret renovate-webhook-auth token is empty")
              return tokens

          def get_renovate_job():
              return api_request(
                  "/apis/renovate-operator.mogenius.com/v1alpha1"
                  f"/namespaces/{namespace}/renovatejobs/{renovate_job}"
              )

          def get_projects():
              job = get_renovate_job()
              projects = [
                  project["name"]
                  for project in job.get("status", {}).get("projects", [])
                  if project.get("name")
              ]
              if not projects:
                  raise RuntimeError(
                      f"No projects discovered in RenovateJob {namespace}/{renovate_job}"
                  )
              return projects

          def post_webhook(project, webhook_tokens):
              query = urllib.parse.urlencode(
                  {
                      "job": renovate_job,
                      "namespace": namespace,
                      "project": project,
                  }
              )

              last_auth_error = None
              for webhook_token in webhook_tokens:
                  request = urllib.request.Request(
                      f"{webhook_url}?{query}",
                      data=b"",
                      method="POST",
                      headers={"Authorization": f"Bearer {webhook_token}"},
                  )

                  try:
                      with urllib.request.urlopen(request) as response:
                          return response.status
                  except HTTPError as error:
                      if error.code in (401, 403):
                          last_auth_error = error.code
                          continue
                      return error.code

              if last_auth_error is not None:
                  return last_auth_error
              return 500

          delete_completed_jobs()

          webhook_tokens = get_webhook_tokens()
          projects = get_projects()

          print(f"Triggering {len(projects)} projects...")
          failed_projects = []

          for project in projects:
              status_code = post_webhook(project, webhook_tokens)
              print(f"{project} -> {status_code}")
              if status_code < 200 or status_code >= 300:
                  failed_projects.append((project, status_code))

          print("Waiting for scheduled status confirmation...")
          time.sleep(5)

          refreshed_job = get_renovate_job()
          print("Final project statuses:")
          for project in refreshed_job.get("status", {}).get("projects", []):
              name = project.get("name", "<unknown>")
              status = project.get("status", "<unknown>")
              print(f"{name}\t{status}")

          schedule = refreshed_job.get("spec", {}).get("schedule", "<unknown>")
          print(f"Configured cron schedule: {schedule}")

          if failed_projects:
              print("One or more webhook requests failed:", file=sys.stderr)
              for project, status_code in failed_projects:
                  print(f"{project} -> {status_code}", file=sys.stderr)
              sys.exit(1)
          PY
