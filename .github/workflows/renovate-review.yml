# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Renovate PR Review

# Triggers on Renovate / Dependabot PRs and posts a supply-chain risk
# assessment comment using actions/ai-inference (GitHub Models).
#
# Uses only GITHUB_TOKEN — no PAT required.
# The model call is entirely read-only; no agent can push code here.
#
# Model: change via the `model` input on the ai-inference step.
# Full model list: https://github.com/marketplace/models

on:
  pull_request:
    types: [opened, reopened]

concurrency:
  group: renovate-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI dependency review
    if: >-
      (
        github.event.pull_request.user.login == 'renovate[bot]' ||
        github.event.pull_request.user.login == 'dependabot[bot]'
      ) &&
      !contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest

    permissions:
      contents: read        # checkout + read agent file + fetch diff
      pull-requests: write  # post comment
      models: read          # GitHub Models inference

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Strip frontmatter from agent file
        run: |
          # Extract the body after the second '---' delimiter (YAML frontmatter)
          awk 'BEGIN{d=0} /^---/{d++; next} d>=2{print}' \
            .github/agents/renovate-reviewer.agent.md \
            > /tmp/system-prompt.txt

      - name: Build prompt
        id: prompt
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch diff (truncated to keep well under model context limits)
          DIFF=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}" \
            -H "Accept: application/vnd.github.diff" | head -c 14000)

          # Fetch changed file list
          FILES=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --jq '.[] | "- `\(.filename)` (+\(.additions) -\(.deletions))"' | head -50)

          # Fetch PR body (Renovate release notes)
          BODY=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}" --jq '.body // ""' | head -c 6000)

          # Write prompt to file so special characters don't break env passing
          cat > /tmp/user-prompt.txt <<PROMPT
          Review this dependency update pull request.

          **Repository:** ${REPO}
          **PR #${PR_NUMBER}:** ${PR_TITLE}
          **Author:** ${PR_AUTHOR}

          ### Changed files
          ${FILES}

          ### PR body / release notes
          ${BODY:-_No PR body._}

          ### Diff
          \`\`\`diff
          ${DIFF}
          \`\`\`

          Produce the full structured review following the output template in your instructions.
          PROMPT

          echo "prompt-file=/tmp/user-prompt.txt" >> "$GITHUB_OUTPUT"

      - name: Run AI inference
        id: inference
        uses: actions/ai-inference@17ff458cb182449bbb2e43701fcd98f6af8f6570 # v2.1.0
        with:
          model: openai/gpt-4o
          system-prompt-file: /tmp/system-prompt.txt
          prompt-file: ${{ steps.prompt.outputs.prompt-file }}

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RESPONSE_FILE: ${{ steps.inference.outputs.response-file }}
          SENTINEL: "<!-- renovate-ai-review -->"
        run: |
          # Use response-file to avoid shell quoting issues with model output
          BODY="$(printf '%s\n' "${SENTINEL}"; cat "${RESPONSE_FILE}")"

          # Update existing sentinel comment if present, else create new
          COMMENT_ID=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${SENTINEL}\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api --method PATCH "/repos/${REPO}/issues/comments/${COMMENT_ID}" \
              -f body="${BODY}"
          else
            gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body "${BODY}"
          fi
