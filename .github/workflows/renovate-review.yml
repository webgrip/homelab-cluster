# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Renovate PR Review

on:
  pull_request:
    types: [opened, reopened]

concurrency:
  group: renovate-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI dependency review
    if: >-
      (
        github.event.pull_request.user.login == 'webgrip-renovate[bot]' ||
        github.event.pull_request.user.login == 'renovate[bot]' ||
        github.event.pull_request.user.login == 'dependabot[bot]'
      ) &&
      !contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: webgrip/.github/actions/renovate-review@main
        with:
          agent-token: ${{ secrets.COPILOT_AGENT_TOKEN }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          pr-number: ${{ github.event.pull_request.number }}
          pr-title: ${{ github.event.pull_request.title }}
          pr-author: ${{ github.event.pull_request.user.login }}
          repository: ${{ github.repository }}
