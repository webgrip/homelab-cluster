# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Renovate PR Review

# Triggers on Renovate / Dependabot PRs and assigns the Copilot cloud agent
# with the renovate-reviewer custom agent to produce a supply-chain risk assessment.
#
# Required secret: COPILOT_PAT
#   A classic PAT (repo scope) or fine-grained PAT (actions + contents + issues + pull-requests r/w)
#   from a user who has a Copilot Business / Enterprise seat.
#   The Copilot assignment API requires a *user* token — GITHUB_TOKEN won't work.
#   Create one at https://github.com/settings/tokens and store as an org secret.

on:
  pull_request:
    types: [opened, reopened]

jobs:
  assign-copilot:
    name: Assign Copilot renovate-reviewer
    if: >-
      (
        github.event.pull_request.user.login == 'renovate[bot]' ||
        github.event.pull_request.user.login == 'dependabot[bot]'
      ) &&
      !contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Assign Copilot with renovate-reviewer agent
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPO}/issues/${PR_NUMBER}/assignees" \
            --input - <<< '{
              "assignees": ["copilot-swe-agent[bot]"],
              "agent_assignment": {
                "target_repo": "'"${REPO}"'",
                "custom_agent": "renovate-reviewer",
                "custom_instructions": "This is an automated Renovate/Dependabot dependency update PR. Use the renovate-reviewer custom agent. Produce a supply-chain risk assessment comment only. Do NOT make code changes, do NOT push commits, do NOT create branches, do NOT approve or merge the PR."
              }
            }'
