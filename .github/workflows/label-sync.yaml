---
name: "Label Sync"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: [".github/labels.yaml"]

jobs:
  label-sync:
    name: Label Sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Sync Labels
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const fs = require('node:fs');

            function unquote(value) {
              return value.replace(/^['"]|['"]$/g, '');
            }

            const labels = [];
            let current;
            for (const rawLine of fs.readFileSync('.github/labels.yaml', 'utf8').split('\n')) {
              const line = rawLine.trim();
              if (!line || line === '---' || line.startsWith('#')) continue;

              const item = line.match(/^-\s+name:\s*(.+)$/);
              if (item) {
                current = { name: unquote(item[1].trim()) };
                labels.push(current);
                continue;
              }

              const field = line.match(/^(color|description):\s*(.*)$/);
              if (field && current) current[field[1]] = unquote(field[2].trim());
            }

            const desired = new Map(labels.map((label) => [label.name, label]));
            const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existingByName = new Map(existing.map((label) => [label.name, label]));

            for (const label of labels) {
              const existingLabel = existingByName.get(label.name);
              const payload = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label.name,
                color: label.color,
                description: label.description || '',
              };

              if (!existingLabel) {
                await github.rest.issues.createLabel(payload);
                continue;
              }

              if (existingLabel.color.toLowerCase() !== label.color.toLowerCase() || (existingLabel.description || '') !== payload.description) {
                await github.rest.issues.updateLabel({ ...payload, current_name: label.name });
              }
            }

            for (const label of existing) {
              if (!desired.has(label.name)) {
                await github.rest.issues.deleteLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
              }
            }
