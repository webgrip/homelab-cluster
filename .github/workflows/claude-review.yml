---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Claude Code review for manifest PRs (incl. Renovate) + on-demand @claude.
#
# Runs as a normal GitHub Action authenticated with ANTHROPIC_API_KEY — so it
# is NOT an "AI actor" and does not hit GitHub's approval gate. This replaced
# the former Copilot relay (renovate-review*.yml, now removed).
#
# Setup: add repository secret ANTHROPIC_API_KEY (Settings → Secrets → Actions).
name: Claude Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "kubernetes/**"
      - "talos/**"
      - "**/*.yaml"
      - "**/*.yml"
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Automated review of manifest changes on every PR (including Renovate bumps).
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '{"model":"claude-opus-4-8"}'
          prompt: |
            Review this pull request's changed Kubernetes/Flux/Talos manifests and post a concise PR review comment.
            ${{ github.actor == 'renovate[bot]' && 'This is a Renovate dependency bump: focus on chart/image compatibility, breaking changes, and whether a multi-major bump risks a Flux rollback.' || '' }}
            Check for: GitOps-tree correctness (ks.yaml wiring, postBuild substituteFrom, dependsOn), missing resource limits, insecure pod settings, plaintext secrets or non-encrypted *.sops.yaml, ingress wiring (envoy-internal vs envoy-external, sectionName https), and observability labels (release: kube-prometheus-stack on ServiceMonitor/PrometheusRule).
            Be specific and reference file:line. If it looks good, say so briefly. Do not modify files.

  # On-demand: comment "@claude ..." on a PR/issue to ask for changes or analysis.
  mention:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '{"model":"claude-opus-4-8"}'
