# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Triggered when the Copilot agent commits .copilot-review/result.md to its branch.
#
# The Copilot runtime strips all auth tokens (GITHUB_TOKEN etc.) before the agent
# runs, making direct API calls impossible. However git push works — it uses the
# agent's integration credential. So the agent writes the review to a file and
# commits it. This workflow picks that up and posts it to the Renovate PR.
#
name: Renovate Review — Relay from Copilot session

on:
  push:
    branches:
      - "copilot/**"
    paths:
      - ".copilot-review/result.md"

jobs:
  relay:
    name: Post review comment to Renovate PR
    runs-on: arc-runner-set

    permissions:
      contents: write      # checkout + delete the review file after posting
      issues: write        # post PR comment (issues API) + close tracking issue
      pull-requests: write # post PR review comments

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Read review file and post to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.copilot-review/result.md';

            if (!fs.existsSync(path)) {
              console.log('No review file found — skipping.');
              return;
            }

            const content = fs.readFileSync(path, 'utf8');
            const lines = content.split('\n');

            // First line must be: "pr: <number>"
            const prLine = lines[0].trim();
            const prMatch = prLine.match(/^pr:\s*(\d+)$/);
            if (!prMatch) {
              console.log(`First line "${prLine}" is not a valid "pr: <N>" header — skipping.`);
              return;
            }
            const prNumber = parseInt(prMatch[1], 10);
            const body = lines.slice(2).join('\n').trim(); // skip header + blank line

            console.log(`Review file targets PR #${prNumber} (${body.length} chars)`);
            if (!body) { console.log('Review body is empty — skipping.'); return; }

            // Post or update the sentinel comment on the Renovate PR
            const sentinel = '<!-- renovate-ai-review -->';
            const reviewBody = `${sentinel}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: prNumber, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(sentinel));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body: reviewBody,
              });
              console.log(`Updated review comment on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prNumber, body: reviewBody,
              });
              console.log(`Posted review comment to PR #${prNumber}`);
            }

            // Close tracking issue if one exists
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', per_page: 50,
            });
            for (const issue of openIssues.filter(i =>
              i.title.startsWith(`Renovate agent review for #${prNumber}:`) &&
              i.assignees.some(a => /copilot/i.test(a.login))
            )) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: 'closed', state_reason: 'completed',
              });
              console.log(`Closed tracking issue #${issue.number}`);
            }

      - name: Delete review file after posting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm .copilot-review/result.md
          git commit -m "chore: remove copilot review artifact"
          git push
