# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Closes the renovate-reviewer tracking issue after the Copilot agent session ends.
# The agent posts its review directly to the Renovate PR via `gh pr review`,
# so no relay step is needed — this workflow just does cleanup.
name: Renovate Review — Close tracking issue

on:
  workflow_run:
    workflows: ["Copilot"]
    types: [completed]

jobs:
  cleanup:
    runs-on: arc-runner-set
    permissions:
      issues: write

    steps:
      - name: Close tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;

            // Find open tracking issues linked to this Copilot run's triggering PR
            // The tracking issue title always starts with "Renovate agent review for #"
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: '',
              per_page: 50,
            });

            const tracking = issues.filter(i =>
              i.title.startsWith('Renovate agent review for #') &&
              i.assignees.some(a => a.login === 'Copilot' || a.login === 'copilot-swe-agent[bot]')
            );

            for (const issue of tracking) {
              // Only close if assigned to Copilot and no open agent run is active
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              console.log(`Closed tracking issue #${issue.number}`);
            }
