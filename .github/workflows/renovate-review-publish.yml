---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Polls copilot/** branches every 5 minutes for .copilot-review/result.md and
# prunes stale Copilot branches so the scan stays bounded over time.
#
# WHY SCHEDULED INSTEAD OF push/workflow_run:
# - GitHub requires approval before running workflows triggered by AI actors (Copilot bot).
# - The Copilot runtime strips auth tokens, so direct API calls from the agent fail.
# - The agent writes its review to .copilot-review/result.md and commits it.
# - This scheduled job (runs as GITHUB_TOKEN, not an AI actor) picks it up and posts
#   the comment to the Renovate PR without any approval gate.
#
name: Renovate Review — Relay from Copilot session

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
  workflow_dispatch: # manual trigger for debugging

jobs:
  relay:
    name: Post pending Copilot reviews to PRs
    runs-on: arc-runner-set

    permissions:
      contents: write # delete copilot/** branches after posting
      issues: write # post PR comment + close tracking issue
      pull-requests: write # close Copilot artifact PRs

    steps:
      - name: Find and post pending reviews
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |-
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sentinel = '<!-- renovate-ai-review -->';
            const staleBranchMaxAgeHours = 24;
            const staleBranchCutoffMs = Date.now() - (staleBranchMaxAgeHours * 60 * 60 * 1000);
            const relayedReviewCache = new Map();
            const closedArtifactPrNumbers = new Set();
            const renovateAuthors = new Set([
              'webgrip-renovate[bot]',
              'renovate[bot]',
            ]);

            function labelNames(pr) {
              return (pr.labels || []).map(label => label.name);
            }

            function hasLabel(pr, labelName) {
              return labelNames(pr).includes(labelName);
            }

            function getReviewField(body, fieldName) {
              const escaped = fieldName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const match = body.match(new RegExp(`^\\*\\*${escaped}:\\*\\*\\s*(.+)$`, 'im'));
              return match ? match[1].trim() : '';
            }

            function getReviewSection(body, heading) {
              const escaped = heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const match = body.match(new RegExp(`^###\\s+${escaped}\\s*$([\\s\\S]*?)(?=^###\\s+|\\z)`, 'im'));
              return match ? match[1].trim() : '';
            }

            function isNoneSection(section, patterns) {
              const normalized = section
                .replace(/<!--[\s\S]*?-->/g, '')
                .replace(/^\s*[-*]\s+/gm, '')
                .trim();

              return patterns.some(pattern => pattern.test(normalized));
            }

            function reviewAllowsMinorAutomerge(body) {
              const verdict = getReviewField(body, 'Verdict');
              const recommendation = getReviewField(body, 'Recommendation');
              if (!/^Green Low risk$/i.test(verdict)) {
                return { allowed: false, reason: `review verdict is "${verdict || 'missing'}"` };
              }
              if (!/^Merge(?: after checks)?$/i.test(recommendation)) {
                return { allowed: false, reason: `review recommendation is "${recommendation || 'missing'}"` };
              }

              const improvementOpportunities = getReviewSection(body, 'Improvement opportunities');
              if (!isNoneSection(improvementOpportunities, [/^None identified\.?$/i])) {
                return { allowed: false, reason: 'review lists improvement opportunities' };
              }

              const preMergeChecks = getReviewSection(body, 'Pre-merge checks');
              if (!isNoneSection(preMergeChecks, [/^\[ \]\s*No special pre-merge checks beyond normal CI\.?$/i])) {
                return { allowed: false, reason: 'review lists special pre-merge checks' };
              }

              const followUp = getReviewSection(body, 'Follow-up');
              if (!isNoneSection(followUp, [/^None\.?$/i])) {
                return { allowed: false, reason: 'review lists follow-up work' };
              }

              return { allowed: true, reason: 'review is green with no extras' };
            }

            async function enableAutoMerge(prNumber, reviewBody) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });

              if (pr.state !== 'open') {
                console.log(`PR #${prNumber} is ${pr.state}; skipping auto-merge enablement`);
                return;
              }
              if (pr.draft) {
                console.log(`PR #${prNumber} is a draft; skipping auto-merge enablement`);
                return;
              }
              if (!renovateAuthors.has(pr.user.login)) {
                console.log(`PR #${prNumber} is authored by ${pr.user.login}; skipping minor auto-merge gate`);
                return;
              }
              if (!hasLabel(pr, 'type/minor')) {
                console.log(`PR #${prNumber} is not labeled type/minor; skipping minor auto-merge gate`);
                return;
              }
              if (hasLabel(pr, 'hold')) {
                console.log(`PR #${prNumber} has the hold label; skipping auto-merge enablement`);
                return;
              }
              if (pr.auto_merge) {
                console.log(`Auto-merge is already enabled for PR #${prNumber}`);
                return;
              }

              const reviewGate = reviewAllowsMinorAutomerge(reviewBody);
              if (!reviewGate.allowed) {
                console.log(`PR #${prNumber} is not eligible for minor auto-merge: ${reviewGate.reason}`);
                return;
              }

              try {
                await github.graphql(
                  `mutation($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $pullRequestId,
                      mergeMethod: SQUASH
                    }) {
                      pullRequest {
                        number
                      }
                    }
                  }`,
                  { pullRequestId: pr.node_id }
                );
                console.log(`Enabled auto-merge for clean minor Renovate PR #${prNumber}`);
              } catch (e) {
                core.warning(`Could not enable auto-merge for PR #${prNumber}: ${e.message}`);
              }
            }

            function getCopilotPrs(prsByHead, branchName) {
              return prsByHead.get(branchName) || [];
            }

            function addPrByHead(prsByHead, pr) {
              const existing = prsByHead.get(pr.head.ref) || [];
              existing.push(pr);
              prsByHead.set(pr.head.ref, existing);
            }

            function extractTargetPrNumber(artifactPr) {
              const text = `${artifactPr.title}\n${artifactPr.body || ''}`;
              const patterns = [
                /PR #(\d+)/i,
                /pull request #(\d+)/i,
                /webgrip\/homelab-cluster#(\d+)/i,
              ];
              for (const pattern of patterns) {
                const match = text.match(pattern);
                if (match) return Number(match[1]);
              }
              return null;
            }

            async function listIssueComments(issueNumber) {
              return github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });
            }

            async function hasRelayedReview(prNumber) {
              if (relayedReviewCache.has(prNumber)) {
                return relayedReviewCache.get(prNumber);
              }

              const comments = await listIssueComments(prNumber);
              const relayed = comments.some(comment => comment.body && comment.body.startsWith(sentinel));
              relayedReviewCache.set(prNumber, relayed);
              return relayed;
            }

            async function deleteBranch(branchName, reason) {
              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branchName}`,
                });
                console.log(`Deleted Copilot branch ${branchName}${reason ? ` (${reason})` : ''}`);
              } catch (e) {
                if (e.status === 404 || e.status === 422) {
                  console.log(`Copilot branch ${branchName} was already gone`);
                } else {
                  throw e;
                }
              }
            }

            async function closeArtifactPr(artifactPr, targetPrNumber) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: artifactPr.number,
                body: `Relayed the Renovate review to #${targetPrNumber}; closing this Copilot artifact PR.`,
              });
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: artifactPr.number,
                state: 'closed',
              });
              closedArtifactPrNumbers.add(artifactPr.number);
              console.log(`Closed Copilot artifact PR #${artifactPr.number}`);
              await deleteBranch(artifactPr.head.ref, `closed artifact PR #${artifactPr.number}`);
            }

            async function getBranchCommitDate(branchName) {
              try {
                const { data: branch } = await github.rest.repos.getBranch({
                  owner,
                  repo,
                  branch: branchName,
                });
                const { data: commit } = await github.rest.repos.getCommit({
                  owner,
                  repo,
                  ref: branch.commit.sha,
                });
                return new Date(commit.commit.committer?.date || commit.commit.author?.date);
              } catch (e) {
                if (e.status === 404 || e.status === 422) {
                  console.log(`Copilot branch ${branchName} disappeared before age check`);
                  return null;
                }
                throw e;
              }
            }

            const trackingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const trackingIssuesByPr = new Map();
            for (const issue of trackingIssues) {
              if (issue.pull_request) continue;
              const match = issue.title.match(/^Renovate agent review for #(\d+):/);
              if (!match) continue;
              if (!(issue.assignees || []).some(assignee => /copilot/i.test(assignee.login))) continue;

              const prNumber = Number(match[1]);
              const existing = trackingIssuesByPr.get(prNumber) || [];
              existing.push(issue);
              trackingIssuesByPr.set(prNumber, existing);
            }

            async function closeTrackingIssues(prNumber) {
              const issues = trackingIssuesByPr.get(prNumber) || [];
              for (const issue of issues) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
                console.log(`Closed tracking issue #${issue.number}`);
              }
              trackingIssuesByPr.delete(prNumber);
            }

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner,
              repo,
              per_page: 100,
            });
            const copilotBranches = branches.filter(branch => branch.name.startsWith('copilot/'));
            console.log(`Found ${copilotBranches.length} copilot/** branches`);

            const pullRequests = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'all',
              per_page: 100,
            });
            const copilotPrsByHead = new Map();
            const openCopilotPrs = [];
            for (const pr of pullRequests.filter(pr => pr.head.ref.startsWith('copilot/'))) {
              addPrByHead(copilotPrsByHead, pr);
              if (pr.state === 'open') {
                openCopilotPrs.push(pr);
              }
            }
            console.log(`Found ${openCopilotPrs.length} open Copilot artifact PRs`);

            for (const branch of copilotBranches) {
              const branchPrs = getCopilotPrs(copilotPrsByHead, branch.name);
              let content = null;

              try {
                const resp = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: '.copilot-review/result.md',
                  ref: branch.name,
                });
                content = Buffer.from(resp.data.content, 'base64').toString('utf8');
              } catch (e) {
                if (e.status !== 404) {
                  throw e;
                }
              }

              if (content !== null) {
                console.log(`Found review file on branch: ${branch.name}`);

                const lines = content.split('\n');
                const prLine = lines[0].trim();
                const prMatch = prLine.match(/^pr:\s*(\d+)$/);
                if (!prMatch) {
                  console.log(`Invalid pr: header "${prLine}" on ${branch.name} — skipping`);
                  continue;
                }

                const prNumber = Number(prMatch[1]);
                const body = lines.slice(2).join('\n').trim();
                if (!body) {
                  console.log(`Empty review body on ${branch.name} — skipping`);
                  continue;
                }

                console.log(`Posting review for PR #${prNumber} from branch ${branch.name}`);

                const reviewBody = `${sentinel}\n${body}`;
                const comments = await listIssueComments(prNumber);
                const existing = comments.find(comment => comment.body && comment.body.startsWith(sentinel));
                if (existing) {
                  await github.rest.issues.updateComment({
                    owner,
                    repo,
                    comment_id: existing.id,
                    body: reviewBody,
                  });
                  console.log(`Updated review comment on PR #${prNumber}`);
                } else {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: prNumber,
                    body: reviewBody,
                  });
                  console.log(`Posted review comment to PR #${prNumber}`);
                }
                relayedReviewCache.set(prNumber, true);
                await enableAutoMerge(prNumber, body);

                for (const artifactPr of branchPrs.filter(pr => pr.state === 'open' && pr.number !== prNumber)) {
                  await closeArtifactPr(artifactPr, prNumber);
                }

                await deleteBranch(branch.name, 'processed review artifact');
                await closeTrackingIssues(prNumber);
                continue;
              }

              const openBranchPrs = branchPrs.filter(pr => pr.state === 'open');
              if (openBranchPrs.length > 0) {
                console.log(`Keeping active Copilot branch ${branch.name} with ${openBranchPrs.length} open PR(s)`);
                continue;
              }

              const closedBranchPrs = branchPrs.filter(pr => pr.state !== 'open');
              if (closedBranchPrs.length > 0) {
                await deleteBranch(branch.name, `closed Copilot PR #${closedBranchPrs[0].number}`);
                continue;
              }

              const commitDate = await getBranchCommitDate(branch.name);
              if (!commitDate) {
                continue;
              }

              if (commitDate.getTime() >= staleBranchCutoffMs) {
                console.log(`Keeping recent Copilot branch ${branch.name} from ${commitDate.toISOString()}`);
                continue;
              }

              await deleteBranch(
                branch.name,
                `stale with no PR or review artifact since ${commitDate.toISOString()}`
              );
            }

            // Cleanup fallback for old Copilot artifact PRs whose review was already relayed
            // before branch deletion existed in this workflow.
            for (const artifactPr of openCopilotPrs) {
              if (closedArtifactPrNumbers.has(artifactPr.number)) {
                continue;
              }

              const prNumber = extractTargetPrNumber(artifactPr);
              if (!prNumber || prNumber === artifactPr.number) {
                console.log(`Cannot determine target Renovate PR for Copilot PR #${artifactPr.number} — skipping`);
                continue;
              }

              if (!(await hasRelayedReview(prNumber))) {
                console.log(`No relayed review comment exists on PR #${prNumber}; keeping Copilot PR #${artifactPr.number} open`);
                continue;
              }

              await closeArtifactPr(artifactPr, prNumber);
              await closeTrackingIssues(prNumber);
            }
