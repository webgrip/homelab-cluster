---
name: "e2e"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  validate:
    name: Validate rendered cluster config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify OCIRepository digests
        run: ./scripts/verify-oci-digests.sh "$GITHUB_WORKSPACE"

      - name: Run flux-local test
        uses: docker://ghcr.io/allenporter/flux-local:v8.2.0@sha256:9c77739d8d7c71b808311693ea52d603d1ddb5190d3d4f23e47f6f33d5254602
        with:
          args: test --all-namespaces --path /github/workspace/kubernetes/flux/cluster -v

      - name: Run Kyverno CLI tests
        run: ./scripts/run-kyverno-cli-tests.sh "$GITHUB_WORKSPACE"

      - name: Run Chainsaw tests
        run: ./scripts/run-kyverno-chainsaw.sh "$GITHUB_WORKSPACE"
