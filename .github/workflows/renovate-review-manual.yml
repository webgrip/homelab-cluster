# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Renovate PR Review (Manual)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number to review'
        required: true
        type: number

concurrency:
  group: renovate-review-manual-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI dependency review
    runs-on: arc-runner-set
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Validate PR
        id: pr
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const prNumber = Number('${{ inputs.pr_number }}');
            const allowedAuthors = new Set([
              'webgrip-renovate[bot]',
              'renovate[bot]',
              'dependabot[bot]',
            ]);

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (!allowedAuthors.has(pr.user.login)) {
              throw new Error(
                `PR #${prNumber} is authored by ${pr.user.login}, not a supported dependency bot.`
              );
            }

            if (pr.labels.some(({ name }) => name === 'automerge')) {
              throw new Error(
                `PR #${prNumber} has the automerge label; review is intentionally skipped.`
              );
            }

            core.setOutput('number', String(pr.number));
            core.setOutput('title', pr.title);
            core.setOutput('author', pr.user.login);
            core.setOutput('base_ref', pr.base.ref);

      - uses: webgrip/.github/actions/renovate-review@6ac576d2dde5a5b6fc7327e111fe5f6823e14383 # main
        with:
          agent-token: ${{ secrets.COPILOT_AGENT_TOKEN }}
          base-ref: ${{ steps.pr.outputs.base_ref }}
          pr-number: ${{ steps.pr.outputs.number }}
          pr-title: ${{ steps.pr.outputs.title }}
          pr-author: ${{ steps.pr.outputs.author }}
          repository: ${{ github.repository }}
